ets me killed for nothing.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.pol_whistleblower", "op": "SetTrue"}, {"key": "sq.pol_pages", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 5}], "choices": []}, {"id": "leak", "speaker": "Scrivener Pol", "text": "*(The fear and the longing war in his face — and the longing, barely, wins.)* All of them. Copied wide. Nailed where the city reads. *(he breathes like a man stepping off a ledge.)* I've *dreamed* it. Lying awake, I've *composed* it — which presses, which nights the watch is thin, which walls the most eyes pass. I know *exactly* how to leak the sealed truth across the whole Gate in a single night, Returned. I've planned my own gallows in *detail*, because the planning was the only way to make the fear hold *still.* *(he grips a sheaf of pages.)* And I never *did* it, because doing it alone is just a quick way to hang. But you — *(hope, naked and dangerous)* — *you* could be the hands that carry, while I'm the hands that *copy.* I make the truth, you *spread* it, and maybe neither of us hangs because neither of us did the whole crime alone. *(fiercely, terrified, alive.)* Yes. *Yes.* Let's leak the lot. Let's make Candlekeep's sealed shame into the thing the whole city reads over breakfast. I've been ready for a year. I just needed someone to be ready *with.*", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.pol_leaks", "op": "SetTrue"}, {"key": "sq.pol_pages", "op": "SetTrue"}, {"key": "act1.mercy_remembered", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "sister", "speaker": "Scrivener Pol", "text": "*(He blinks, thrown by the kindness.)* The number. *(quietly.)* It's — it's *paid*, actually. Since winter. *(he looks away, ashamed.)* I don't tell buyers that. They like the story — *the desperate boy, the sister, the debt* — it makes them feel they're *helping* when they buy. The truth's less flattering: the debt's been gone for months and I *kept selling*, and I let everyone think I was still desperate because *desperate* is easier to forgive than *committed.* *(he meets your eyes, and the calculation drops away entirely.)* My sister's fine. She's *married*, if you can believe it, to a chandler in the Lower City, she doesn't even know what I do. *(softly.)* So you've caught me, Returned. The debt's not why anymore. Hasn't been for a while. The why now is just... the pages are *true*, and someone has to be the one who *won't stop copying them.* I'd rather you knew that than the sister story. You asked straight. That's worth a straight answer, even a damning one.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.pol_honest", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 3}], "choices": []}, {"id": "pages", "speaker": "Scrivener Pol", "text": "*(He hesitates — then presses a thick, ink-fresh sheaf into your hands, and the relief of *giving it to someone* nearly buckles him.)* The true ones. Not the spell-pages buyers want — these. *(he taps them.)* What the gods stopped doing and when. Which Reader sealed which truth and the *date* they did it. The Wall's own provenance, copied from the volume they pretend burned. *(his hands won't quite let go, then do.)* I've been *hoarding* these — too scared to sell the *real* dynamite, only the titillating stuff — telling myself I was *saving* them for the right hands. *(he laughs, wet.)* I think I was just saving them for someone who'd carry them somewhere *better* than a buyer's pocket. *(he wipes his eyes, smearing ink.)* Take them where they *do* something, Returned. I copied the truth for two years and never once got to see it *land.* Be the place it lands. That's — that's all a copyist ever wants, really. To have copied something that *mattered* to a hand that *used* it.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.pol_gives_pages", "op": "SetTrue"}, {"key": "sq.pol_pages", "op": "SetTrue"}, {"key": "act2.wall_provenance_pages", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 3}], "choices": []}, {"id": "deny", "speaker": "Scrivener Pol", "text": "*(He shakes his head fast, retreating into the safer story.)* Whistleblower — no, no, I'm a *businessman*, I sell *pages*, it's *commerce*, don't — don't make it *grand*, grand things get *hanged.* *(he gathers his sheaf protectively.)* It's the *debt.* It's *always* been the debt. If you want pages, the price is the price. If you want to make me into some — some *hero* — find another copyist. I just want the coin and to not be *noticed.* *(he won't meet your eyes, and you both know the denial is the most frightened thing he's said.)*", "dynamic": false, "auto": "close", "onEnter": [], "choices": []}, {"id": "scared", "speaker": "Scrivener Pol", "text": "*(The plan terrifies him back into his hole.)* Nailed across the *whole Gate* — no, no, that's — that's a *gallows*, that's not a *leak* that's a *confession with my name on it* — *(he's shaking.)* I copy in the *dark*, Returned, one page to one buyer, *small*, *quiet*, *survivable.* What you're describing is *loud*, and loud men *hang.* *(he hunches over his work.)* Buy a page if you want a page. But don't ask me to die *spectacularly* for a truth that'll get nailed over by noon. I haven't the *spine* for the version you're selling. I'm sorry. I'm only as brave as the dark allows.", "dynamic": false, "auto": "close", "onEnter": [], "choices": []}, {"id": "close", "speaker": "Scrivener Pol", "text": "*(Whatever you leave him with, Scrivener Pol bends back over his sealed pages, pen moving in the candlelight — a frightened man copying out the truth long after the coin stopped being the reason, becoming, one trembling letter at a time, the thing Candlekeep most fears and most needs: a hand that won't stop writing down what the library decided no one should read.)*", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "npc.keep.tym", "file": "CandlekeepDenizensTwoContent.cs", "title": "Npc · Keep · Tym", "start": "0", "nodes": [{"id": "0", "speaker": "Brother Tym", "text": "*(A monk surrounded by two enormous facing ledgers, humming, dipping a pen first in one and then the other with the serenity of the comprehensively unhinged.)* The Catalogue of the Living — *(he pats the left ledger)* — and the Ledger of the Wall — *(he pats the right)* — and my life's work, Returned, my *masterwork*, is to cross-reference them. Every soul filed Faithless, I look up in the Catalogue of the Living to see *who they were before.* *(he beams.)* It's wonderful work. It's driving me wonderfully mad. Would you like to know what I've found? You would. Everyone *should*, and *no one* does, which is rather the discovery's whole content.", "dynamic": false, "auto": "1", "onEnter": [{"key": "npc.tym_met", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "Brother Tym", "text": "*(He turns both ledgers toward you, vibrating with awful cheer.)* Here's the thing, the *funny* thing, the thing that's unstitched me so pleasantly. *(he taps a Faithless entry, then its match in the Living.)* This one — \"Faithless, sorted\" — was, in life, a midwife. Forty years catching babies, never lost a mother. *(taps another pair.)* This one taught children their letters. This one *mended the church's own roof.* *(his smile does not waver and his eyes are entirely too bright.)* Not one *villain*, Returned. Not one. I have cross-referenced eleven thousand of the Faithless against who they *were*, and they are *midwives and teachers and roofers*, sorted to the nothing for *doubt*, and the *doctrine says they chose it*, and I *cannot make the two ledgers agree*, and so — *(he giggles, once, horribly)* — so I just. Keep. Cross-referencing. It's very soothing. It's the opposite of soothing. Would you like to take the index to someone who can *do* something? I can't. I can only *count.*", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "[INSIGHT 16] \"You're not mad, Tym. You're the only sane man in Candlekeep. You found proof the Wall is a lie, and sanity is the thing that broke.\"", "next": "sane", "fail": "hum", "checkDC": 16, "checkAbility": "Wisdom"}, {"text": "\"Give me the index. Eleven thousand midwives and teachers — that's not a ledger, that's an indictment.\"", "next": "index", "fail": null, "effects": [{"key": "sq.tym_index", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 4}]}, {"text": "\"The doctrine says they chose the nothing by doubting. Your index says they were *good*. Both can't be true.\"", "next": "both", "fail": null}, {"text": "\"Keep counting, Brother. Someone has to. I'll carry what it means.\"", "next": "count", "fail": null}]}, {"id": "sane", "speaker": "Brother Tym", "text": "*(The humming stops. The horrible cheer drops, and underneath is a man who has stared at a true thing too long.)* ...The only sane one. *(very quietly.)* Yes. That's it exactly. I cross-referenced my way to a fact the whole library is built to avoid — *the Faithless were good people, sorted by bad luck and called justice* — and a *fact* like that, Returned, you can't *un-know.* *(he looks at his two ledgers.)* So the humming started. The cheer. The pleasant little madness. It's not a *breakdown*, do you see — it's a *roof*, a thing I built over the fact so I could keep living *under* it without it crushing me flat. *(he meets your eyes, lucid and terrible.)* You've just lifted the roof. Don't — don't put it back. I've been so lonely under here with the truth and the humming. Take the index. *Use* it. And let me stop pretending the madness was ever anything but the cost of being the one who *checked.*", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.tym_lucid", "op": "SetTrue"}, {"key": "sq.tym_index", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 5}], "choices": []}, {"id": "index", "speaker": "Brother Tym", "text": "*(He thrusts both ledgers at you with sudden, desperate purpose.)* Take it! Take it, take it — eleven thousand cross-references, the midwife, the teacher, the roofer, *all of them*, every soul the Wall called *guilty* shown beside the *good they did living.* *(he's weeping and laughing.)* I've wanted, for *three years*, for someone to *carry* it — because an indictment no one reads is just a man going mad in a corner, but an indictment in the *right hands* — *(he grips your arm)* — that's *evidence.* Nail it beside the auctioneer's ledger and the widow's window and the child's list. *(quietly, the madness clearing for one clean moment.)* I counted them, Returned. I counted them *right.* That was my whole vocation, in the end — not to *save* the Faithless, I couldn't, I'm only an indexer. Just to make *certain* that someone, somewhere, had the *numbers* when the reckoning came. Here are the numbers. Make the reckoning come.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.tym_gives_index", "op": "SetTrue"}, {"key": "sq.tym_index", "op": "SetTrue"}, {"key": "act1.mercy_remembered", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "both", "speaker": "Brother Tym", "text": "*(He nods so hard the cheer rattles.)* Both can't be true! *Exactly!* That's the — that's the whole — *(he jabs the two ledgers.)* The doctrine needs them *guilty*, the Catalogue proves them *good*, and an indexer's whole *soul* is the faith that two true ledgers can be *reconciled*, and these *cannot*, and so either the doctrine lies or the Catalogue does, and I have *checked the Catalogue*, Returned, I have checked it eleven thousand times, the midwife *caught those babies*, that's *recorded*, that's *witnessed*, that's *true* — *(he goes still, the logic completing.)* — which means it's the *doctrine* that's false. The Wall's ledger is the *lie.* *(a shaky, dawning calm.)* I've known it for three years and never let myself *say* it in a sentence that ended. You made the sentence end. Gods help me, that's a relief and a catastrophe at once. Take the index. The reconciliation was never coming. The *exposure* is.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.tym_concludes", "op": "SetTrue"}, {"key": "sq.tym_index", "op": "SetTrue"}], "choices": []}, {"id": "count", "speaker": "Brother Tym", "text": "*(He brightens, soothed, the humming resuming.)* You'll carry what it means! Oh, *thank* you — that's the division of labor I've prayed for. *(he pats his ledgers fondly.)* I'll count, you'll *mean.* I was never built for meaning, Returned, only for *accuracy* — give me a column and I'll make it true, but ask me what the truth *does* and I just. Hum. *(he dips both pens.)* So you take the meaning, and I'll keep the count current — there are new Faithless daily, you understand, the harvest doesn't pause for my filing — and between your meaning and my counting, *someone's* keeping the Faithless *real.* That's enough. That's a vocation. Off you go. Mind the wet ink.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.tym_keeps_counting", "op": "SetTrue"}], "choices": []}, {"id": "hum", "speaker": "Brother Tym", "text": "*(He smiles, the cheer sealing back over.)* Mad? Me? No, no — *content*, Returned, perfectly content, just an indexer and his lovely ledgers. *(he resumes humming.)* The numbers agree, you know. If you count them the *right* way. I'm sure they agree. I'll just check once more. And once more. It's very soothing.", "dynamic": false, "auto": "close", "onEnter": [], "choices": []}, {"id": "close", "speaker": "Brother Tym", "text": "*(He bends back over the two great ledgers — the living and the lost — humming, cross-referencing, the gentlest madman in the world's greatest library, who discovered the single fact the whole archive exists to bury and survived it the only way a counting-man could: by never, ever stopping the count.)*", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "npc.keep.tutor", "file": "CandlekeepDenizensTwoContent.cs", "title": "Npc · Keep · Tutor", "start": "0", "nodes": [{"id": "0", "speaker": "Mistress Ekko", "text": "*(A spare, sharp woman amid scrolls in scripts no living mouth can speak, who looks up at you and *flinches* — then leans in, hungry.)* Stand still. *(she circles you, reading the air.)* You carry a word. Half-formed. In a script I — *(she stops, and her sharpness cracks into wonder.)* — in a script I have only ever seen *carved.* Never *spoken.* The tongue of the very first sorting, the language the Wall was *written* in, dead ten thousand years and read by no one because no one *living* was ever named in it. *(she meets your eyes.)* Until you. You've a name in the dead tongue, Returned. Half-set. And I am the only soul in the Realms who can teach you to read it. The question is whether either of us is brave enough.", "dynamic": false, "auto": "1", "onEnter": [{"key": "npc.ekko_met", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "Mistress Ekko", "text": "*(She lays out a scroll, the same dead script, and her hands are not quite steady.)* I have spent sixty years on languages no one speaks — not for *use*, there's no use, but because a dead tongue is a *room* no one else can enter, and I have always preferred rooms with no one else in them. *(quietly.)* And now a Returned walks in wearing a *name* in the deadest tongue of all, and I find my solitary little room has a *door* in it I never knew was there. *(she taps the scroll.)* I can teach you the letters. You could read your own true name — the word the Wall couldn't keep, the word that makes you a person instead of a vacancy. *(she hesitates.)* But understand: I have *read* this tongue. The names carved in it are not gentle. To read your own may be to learn a thing about yourself that the *forgetting* was protecting you from. Shall I teach you, or shall we both keep our safe, lonely rooms?", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "\"Teach me. I'd rather read a terrible true name than wear a comfortable blank.\"", "next": "teach", "fail": null, "effects": [{"key": "act2.learning_true_name", "op": "SetTrue"}]}, {"text": "[ARCANA 17] \"This isn't only my name. It's the *Rosetta* of the whole Wall — teach me to read it and I can read every name carved in it. Every Faithless. All at once.\"", "next": "rosetta", "fail": "careful", "checkDC": 17, "checkAbility": "Intelligence"}, {"text": "\"What does a dead tongue cost the reader, Ekko? You flinched when you saw me.\"", "next": "cost", "fail": null}, {"text": "\"Sixty years alone in rooms no one enters. The name can wait. Tell me about *you* first.\"", "next": "you", "fail": null, "effects": [{"key": "companion.garrow.approval", "op": "AddInt", "amount": 2}]}]}, {"id": "teach", "speaker": "Mistress Ekko", "text": "*(She begins — and her sharpness becomes something almost tender as the letters take shape between you.)* This stroke is *the one who.* This, *was kept.* This — *(her voice catches)* — this is *not.* *(the word assembles, your word, in the dead tongue, and it means something vast and specific and *yours*, and she reads it with you, and stops, and looks at you with awe and pity both.)* ...Oh. *(quietly.)* Your name doesn't mean *Faithless*, Returned. The Wall *miscarved* it — or rather, it could never *finish* carving it, because the name resists the chisel. Your name, in the oldest tongue, means *the one who returns.* *(she sets down the scroll, shaken.)* You were never the *exception* to the Wall. You were *named*, before there was a Wall, as the thing that *unmakes* it. The forgetting wasn't hiding a shame. It was hiding a *purpose*, so vast the carving couldn't hold it. *(she meets your eyes.)* I have taught you to read yourself. I am not sure I have done you a kindness. But it is *true*, and you wanted true. There it is. *The one who returns.*", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.ekko_taught", "op": "SetTrue"}, {"key": "act2.true_name_meaning", "op": "SetTrue"}, {"key": "prologue.crack_seeded", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "rosetta", "speaker": "Mistress Ekko", "text": "*(She freezes, the scholar in her seeing it a half-second before the woman dares to.)* ...The Rosetta. *(very quietly.)* Your name is the *key* to the whole Wall. Teach you the dead tongue, and you could read *every* name carved into it — eleven thousand, ten thousand years of the Faithless, every one *legible* at last. *(she grips the scroll, trembling.)* They were never *anonymous*, Returned — that's the lie. The Wall *named* them, in this dead tongue, so precisely that no living reader could ever decode it and grieve them properly. The *forgetting* was *enforced by illiteracy.* *(she looks at you, fierce now.)* Then yes. *Yes.* I'll teach you. Not for your one name — for *all* of them. You'll be the first soul in ten thousand years who can stand before the Wall and *read it aloud.* Name by name. *(her sixty years of solitary rooms blaze into purpose.)* I kept this dead tongue alive in a lonely room, and I never knew *why*, and *this* is why — so that when the one who returns came, there'd be someone left who could teach him to *read the dead their own names.* Sit. We've ten thousand years of vocabulary and not a moment to waste.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.ekko_rosetta", "op": "SetTrue"}, {"key": "act2.learning_true_name", "op": "SetTrue"}, {"key": "sq.read_the_wall", "op": "SetTrue"}, {"key": "act1.mercy_remembered", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 5}], "choices": []}, {"id": "cost", "speaker": "Mistress Ekko", "text": "*(She is quiet a long moment.)* What it costs. *(she touches a scroll.)* A dead language is a *graveyard*, Returned. To read it fluently you must let the dead *speak in your own mind* — you must give them your living tongue to borrow, so their words can sound again. *(quietly.)* I flinched at you because I have spent sixty years lending my mind to the long dead, and you are a thing that came *back*, and for one moment I feared you'd come to *collect* the loan — to take back all the borrowed voices I've kept alive in here. *(a thin smile.)* You haven't. You've come to *add* one. So the cost is this: read your name, and you let ten thousand years of the dead a little further into your living head. *(she meets your eyes.)* I've borne it sixty years and it's made me strange and solitary and, I think, *better.* But I'd not lie to you about the weight. The dead are heavy company. They're also the only company that never leaves.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.ekko_the_cost", "op": "SetTrue"}], "choices": []}, {"id": "you", "speaker": "Mistress Ekko", "text": "*(She blinks — genuinely startled to be the subject.)* About *me.* *(slowly, unused to it.)* No one asks. They want the tongues, the translations, the *use* of me. *(she sets down the scroll.)* I was a loud girl, if you can credit it. Too loud for a quiet family. And I found, at fifteen, a scroll in a tongue no one spoke, and for the first time the *room went silent* — no one could argue with me about a language only I could read. *(quietly.)* So I collected silences. Dead tongues, one after another, each a room with a locked door and only my key. Sixty years of lovely, chosen solitude. *(she looks at you, and something unlocks.)* And I told myself it was *scholarship.* It was *hiding.* You're the first person in decades to knock on the door instead of asking for a translation. *(a real, rusty smile.)* ...Ask me for your name now, Returned. I find I'd like, just this once, to open the door *for* someone instead of *to* keep them out.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.ekko_opens_up", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 3}], "choices": []}, {"id": "careful", "speaker": "Mistress Ekko", "text": "*(She shakes her head, the scholar's caution winning.)* You leap ahead of the grammar. *(gently.)* One cannot read the Wall before one can read a *word.* The Rosetta is real, but it is *earned*, stroke by stroke, and the impatient reader of a dead tongue tends to read it *wrong* — and a wrong name, Returned, is worse than no name. *(she rolls the scroll.)* Come back when you've the patience for the first letter. The dead have waited ten thousand years; they can wait until you've learned to read them *correctly.*", "dynamic": false, "auto": "close", "onEnter": [], "choices": []}, {"id": "close", "speaker": "Mistress Ekko", "text": "*(She returns to her scrolls of dead tongues — the keeper of every silence no living mouth can break — and you carry away the dawning, vertiginous understanding that your true name was never a shame the forgetting hid, but a *purpose* the carving couldn't contain: *the one who returns.*)*", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "npc.keep.cole", "file": "CandlekeepDenizensTwoContent.cs", "title": "Npc · Keep · Cole", "start": "0", "nodes": [{"id": "0", "speaker": "Magister Cole", "text": "*(A precise, bloodless scholar who studies you the way one studies a misprint in a sacred text — with offense, and a red pen.)* Fascinating. *(he circles you, making notes.)* A *corruption* in the record, walking and warm. You understand what you are, of course — you're an *error.* The cosmos is a text, Returned; the law of the dead is its grammar; and you are a *solecism*, a sentence that violates the rules of the language it's written in. *(he taps his pen.)* I am a textual scholar. My life's work is the *correction* of corrupted manuscripts. And you are the most interesting corruption I have ever encountered. Hold still. I should like to *emend* you.", "dynamic": false, "auto": "1", "onEnter": [{"key": "npc.cole_met", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "Magister Cole", "text": "*(He consults a vast critical apparatus of the cosmos.)* My thesis is elegant, and I'll share it, because an error ought to understand its own correction. *(he lectures.)* Every soul is a *word* in the great text. Death is *editing* — the removal of the word from the active manuscript to the archive of the Wall. *(coolly.)* You were *edited*, properly, filed to the archive. And then you *un-edited yourself* — reinserted a deleted word back into the running text, against every rule of the cosmic grammar. *(he raises the red pen.)* This cannot stand. A text with an uncorrected error *propagates* — other words begin to think they too might un-delete themselves, and then the whole manuscript dissolves into chaos. *(he fixes you.)* So I must restore the correct reading. For the integrity of the text. Surely you, a *literate* corruption, can appreciate the necessity. Nothing personal. Merely... editorial.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "[ARCANA 18] \"You've got the metaphor backwards, Magister. I'm not the error. The *Wall* is — a deletion that was never authorized, of words the Author never meant to cut. I'm the *restoration*.\"", "next": "restoration", "fail": "pedant", "checkDC": 18, "checkAbility": "Intelligence"}, {"text": "[PERSUADE 16] \"An editor who deletes the words he finds inconvenient isn't preserving the text. He's rewriting it. *Who* authorized the Wall's edits, Cole? Show me the manuscript before the deletions.\"", "next": "author", "fail": "pedant", "checkDC": 16, "checkAbility": "Charisma"}, {"text": "\"I'm not a word in anyone's text, Cole. I'm the reader. And I've stopped trusting this edition.\"", "next": "reader", "fail": null}, {"text": "\"Try to emend me. I'll be fascinated to watch a red pen file a hole.\"", "next": "defiant", "fail": null, "effects": [{"key": "faction.kelemvor", "op": "AddInt", "amount": -1}]}]}, {"id": "restoration", "speaker": "Magister Cole", "text": "*(The red pen stops mid-air. For the first time, the bloodless certainty drains.)* ...The *restoration.* *(slowly, the textual scholar unable to resist a *better reading*.)* You propose that the Wall is not the *correct* text but a *corrupted* one — that the Faithless are not *deletions* but *lacunae*, words *lost* from the original, not *cut* by the Author. *(he sets down the pen, appalled and fascinated.)* And that you are not the error but the *emendation* — the recovered reading that restores the manuscript to what the Author *intended* before some later, lesser hand *abridged* it. *(he goes pale.)* If that is true, then I have spent my career *defending the corruption.* I have called the *lacunae* correct and the *restoration* an error. I have been — *(the word costs him everything)* — a *bad editor.* *(he looks at you with the horror of a purist shown his own mistake.)* I shall have to re-collate the entire cosmos. From the beginning. Against the hypothesis that the Wall is the interpolation and *you* are the true text. *(quietly, shaken.)* Do not mistake this for an alliance, corruption. It is *scholarship.* But scholarship has just turned its red pen on the *Wall*, and that — that may be more dangerous than any blade you carry.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.cole_converted", "op": "SetTrue"}, {"key": "act2.wall_is_the_corruption", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "author", "speaker": "Magister Cole", "text": "*(He freezes — the one question a textual scholar cannot wave away.)* Who *authorized* the edits. *(quietly.)* The provenance. The *editorial authority.* *(he flips through his apparatus, and his certainty curdles as he fails to find it.)* I — the Wall's deletions are attributed to... *(he searches)* ...to *no one.* There is no colophon. No editor's mark. No authorizing hand. The Faithless were cut from the text by an edit with *no recorded editor.* *(he looks up, white.)* In textual scholarship, Returned, an emendation with no authority is not a *correction.* It is *vandalism.* A later hand defacing the manuscript and *claiming* it was always thus. *(he sets down the red pen as if it burns.)* I have spent my life enforcing the readings of an *anonymous vandal* and calling it the original text. *(quietly, devastated.)* Show me the manuscript before the deletions, you said. *I cannot find it.* Someone *destroyed the base text.* And a scholar who's lost the base text has only one ethical move left: trust the *recovered* readings over the *received* ones. Which means trusting *you.* Gods. I need to lie down. The whole edition is compromised.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.cole_no_authority", "op": "SetTrue"}, {"key": "act2.wall_unauthorized", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 3}], "choices": []}, {"id": "reader", "speaker": "Magister Cole", "text": "*(He pauses, thrown off his lecture.)* The *reader.* *(he frowns.)* That's — no, that's a category error, you're a *word*, words don't *read* — *(but he stops, the implication landing.)* ...Unless. *(slowly.)* Unless a sufficiently *anomalous* word — one that can step *outside* the text and *regard* it — has ceased to be merely *written* and become, in some sense, a *reader of its own manuscript.* *(he is genuinely unnerved now.)* That would make you not an error to *correct* but a *critic* to *answer.* And one does not *emend* a critic, Returned. One *argues* with them. *(he sets down the pen, warily.)* You've promoted yourself from *corruption* to *colleague* with a single sentence, and I find I cannot demote you back, because the move was *valid.* *(coldly, but rattled.)* Very well. Not an error. A *reading I must contend with.* That is far more dangerous to me, and far more interesting. Go. I have to reconsider whether the text was ever as settled as I needed it to be.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.cole_unsettled", "op": "SetTrue"}], "choices": []}, {"id": "defiant", "speaker": "Magister Cole", "text": "*(A thin, bloodless smile.)* File a hole. *(he raises the pen.)* Yes — that is precisely the problem of you, stated crudely. The apparatus has no *siglum* for a soul that won't stay deleted. *(coolly.)* So I shall not *file* you, error. I shall *expurgate* you — strike you from the running text entirely, which is the one editorial operation that requires no authority, only a sufficiently firm hand. *(he makes a note.)* Run along and propagate, if you must. But know that there is a scholar in Candlekeep who has classified you as a *corruption to be expunged*, and scholars, Returned, are *patient*, and *thorough*, and we *always* get the last edition. *(he returns to his apparatus.)* The corrected reading will outlive the corrupt one. It always does. That is the entire faith of my profession.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.cole_enemy", "op": "SetTrue"}, {"key": "faction.kelemvor", "op": "AddInt", "amount": -1}], "choices": []}, {"id": "pedant", "speaker": "Magister Cole", "text": "*(He sniffs, your argument failing to meet his standard of rigor.)* A *spirited* reading. Poorly sourced. *(he makes a dismissive note.)* You reach for a conclusion the evidence does not yet support — the mark of the *amateur* emender. *(coolly.)* Bring me an *apparatus*, corruption, not a *sentiment*, and we'll speak. Until then, my thesis stands: you are an error, and errors, however eloquent, are for correcting. Good day.", "dynamic": false, "auto": "close", "onEnter": [], "choices": []}, {"id": "close", "speaker": "Magister Cole", "text": "*(Whatever you left him with, the bloodless scholar returns to his great critical apparatus of the cosmos — and you understand that you have either made an implacable editorial enemy or planted, in the most precise mind in Candlekeep, the one suggestion that could unravel the Wall from within: *that the deletions were never authorized, and the base text was destroyed to hide it.*)*", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "(CrownWarsContent)", "file": "CrownWarsContent.cs", "title": "(crownwarscontent)", "start": "0", "nodes": [{"id": "0", "speaker": "—", "text": "You fall further back than you have ever fallen — ten thousand years. Silver spires. Elven banners. A high court mid-session, beautiful and cold. And the matter before the court is not land, nor crowns. It is the *souls* of a defeated people.", "dynamic": false, "auto": "1", "onEnter": [{"key": "crownwars.arrived", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "The Returned", "text": "This is it. The first verdict. The afternoon they *decided* that the godless dead deserve to be unmade — before it hardened into the law of the Wall. I'm standing at the source.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}, {"id": "0", "speaker": "Ilfaeril", "text": "You carry the chill of the Wall on you, traveller — and the look of someone unstuck from time. I am Ilfaeril. I sit in that court. And I am about to do a thing I will spend ten thousand years trying to undo. If you have come to stop it... I would not stop you.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "What thing?", "next": "thing", "fail": null}, {"text": "Then help me. Walk with me.", "next": "join", "fail": null, "effects": [{"key": "companion.ilfaeril.recruited", "op": "SetTrue"}]}]}, {"id": "thing", "speaker": "Ilfaeril", "text": "I am about to raise my hand to damn an enemy people's souls to nothing — so that not even their memory has anywhere to rest. The court calls it justice. I will call it, in time, the only sin I could never bury. Come. Perhaps a soul from the future can do what my conscience cannot.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "Then let's change the vote. With me.", "next": "join", "fail": null, "effects": [{"key": "companion.ilfaeril.recruited", "op": "SetTrue"}]}]}, {"id": "join", "speaker": "Ilfaeril", "text": "Then my sword and my long, long regret are yours. Let us see if the past can be argued with.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}, {"id": "0", "speaker": "High Lord Aelryth", "text": "You are not of this court, outsider, yet Ilfaeril vouches for you, so I will hear you. The matter stands: shall the godless dead of our fallen enemies be *unmade* — denied even a resting-place — that our victory be total? Speak. Why should mercy stay my hand?", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "[PERSUADE DC 15] A law of vengeance outlives the vengeful. You damn your own descendants.", "next": "spared", "fail": "passed", "checkDC": 15, "checkAbility": "Charisma"}, {"text": "[INSIGHT DC 15] You do not want this. You want to be *told* you mustn't.", "next": "spared", "fail": "passed", "checkDC": 15, "checkAbility": "Wisdom"}, {"text": "Their souls are yours to take. Take them.", "next": "passed", "fail": null}, {"text": "(Say nothing. Let the court decide.)", "next": "passed", "fail": null}]}, {"id": "spared", "speaker": "High Lord Aelryth", "text": "...You are right. Gods help me, you are right, and I have wanted someone to say it since the first banner fell. The motion is *withdrawn.* Let their dead rest. Let this one court, at least, be remembered for the cruelty it did NOT do.", "dynamic": false, "auto": null, "onEnter": [{"key": "crownwars.verdict_spared", "op": "SetTrue"}, {"key": "companion.ilfaeril.approval", "op": "AddInt", "amount": 20}], "choices": []}, {"id": "passed", "speaker": "High Lord Aelryth", "text": "Then it is done. Their dead are unmade, root and memory. ...The chamber feels colder than I expected. History will not record this hour. History will only inherit it.", "dynamic": false, "auto": null, "onEnter": [{"key": "crownwars.verdict_passed", "op": "SetTrue"}], "choices": []}]}, {"id": "npc.crown.aedyn", "file": "CrownWarsDenizensContent.cs", "title": "Npc · Crown · Aedyn", "start": "0", "nodes": [{"id": "0", "speaker": "Coronal Aedyn", "text": "*(The high judge of the elven court is not a monster. That is the first and worst thing you notice. He is silver and sorrowful and kind-eyed, and he turns to you with the weary warmth of a good man who has been making terrible decisions for too long, and he speaks as if grateful for someone new to explain himself to.)* You're not of the court. *(gently.)* Good. The court has stopped *hearing* me — they only hear *yes* or *no* now, and I am trying to say something that is *neither.* *(he gestures to the chamber below, where a sentencing is being prepared.)* Sit with me, stranger. Tell me honestly, after you've heard it: is what I am about to do a *mercy* or a *monstrousness?* Because I have lost the ability to tell, and I would give my crown for one *clear* answer before I cast the first vote.", "dynamic": false, "auto": "1", "onEnter": [{"key": "npc.aedyn_met", "op": "SetTrue"}, {"key": "act3.crown_wars_witnessed", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "Coronal Aedyn", "text": "*(He explains it the way a physician explains an amputation — with care, with grief, with the dreadful reasonableness of someone who has thought it through.)* The Crown Wars have lasted *centuries.* Souls die by the *thousand*, and the worst of them — the *truly* faithless, the oath-breakers, the kinslayers who served *no* god and *no* law and *no* people but themselves — when they die, the gods have *no claim* on them, and so they simply... *dissolve.* *Annihilation.* Nothing. *(he leans forward, earnest.)* And I thought: is there not something *kinder?* These souls chose *nothing* in life — but must *nothing* be their *end?* So I devised a *sentence.* Not annihilation. *Preservation.* A place — a Wall — where the faithless are *kept.* *Held.* Not destroyed. *Remembered*, after a fashion. *(his kind eyes search yours.)* I call it *mercy*, stranger. To keep what would otherwise be *lost.* The court calls it *genius.* And yet — *(his voice drops)* — and yet when I imagine ten thousand years of a soul *held* in that grey, neither living nor dead nor reborn nor at *rest*... I wonder if I have invented not a mercy but the most *patient* cruelty in the history of the world. *(he looks at you, naked.)* Which is it? You have no stake. *Tell* me. Is *keeping* a soul kinder than *letting it go?*", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "[INSIGHT 18] \"You've confused *preserving* with *caring*, Aedyn. A thing kept against its will isn't *remembered* — it's *imprisoned.* You didn't invent mercy. You invented a way to never have to *grieve* them — to keep them filed instead of *mourned.*\"", "next": "filed", "fail": "sincere", "checkDC": 18, "checkAbility": "Wisdom"}, {"text": "[PERSUADE 18] \"There's a third option you can't see because you're a *judge*, and judges must *sentence.* You could let them *go* — true annihilation — and then *grieve* them as souls who *mattered* enough to mourn. Release isn't the cruel choice. The *Wall* is.\"", "next": "release", "fail": "sincere", "checkDC": 18, "checkAbility": "Charisma"}, {"text": "\"Mercy doesn't last ten thousand years against the recipient's will, Aedyn. Ask the *faithless* whether they'd rather be *nothing* or be *kept.* You never asked. You decided *for* them. That's not mercy. That's *ownership.*\"", "next": "ownership", "fail": null}, {"text": "\"You'll cast this vote believing it's kindness, and ten thousand years from now your Wall will be a machine no one remembers building, grinding souls no one chose to save. *Sincerity* is the most dangerous thing in this room.\"", "next": "sincerity", "fail": null, "effects": [{"key": "act3.wall_born_of_mercy", "op": "SetTrue"}]}]}, {"id": "filed", "speaker": "Coronal Aedyn", "text": "*(He recoils as if struck, and his kind face goes ashen.)* ...A way to never *grieve* them. *(very quietly.)* No. That's — *(but he stops, because a good man cannot lie to himself for long once the words are spoken.)* ...I have buried a great many souls in these wars, stranger. *Friends.* Children. And grief — grief is the most *expensive* thing a judge can spend, and I am nearly *bankrupt* of it. *(his hands tremble.)* And you're saying that when I devised a way to *keep* the faithless rather than *lose* them, what I *truly* devised was a way to never stand at their *graves* — because a soul *filed in a Wall* is not a soul you have to *mourn.* It's a soul you've *deferred.* Pending. *Archived.* *(he covers his face.)* Gods. I called it *preservation* because *grief* had become unbearable, and *filing* is *cheaper* than *weeping*, and I dressed the *economy of my own exhausted heart* in the robes of *mercy.* *(he looks up, devastated.)* The Wall isn't for *them.* It never was. It's for *me* — so I never have to feel the full weight of every soul I failed to save. *(his voice breaks.)* You've shown me the foundation of my great mercy, and it is *my own refusal to mourn.* ...I do not know if I can stop the vote. The machine is nearly built. But I will cast it now *knowing what it is.* That is worse, and it is *truer*, and I thank you for the cruelty of it.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.aedyn_filed", "op": "SetTrue"}, {"key": "act3.wall_avoids_grief", "op": "SetTrue"}, {"key": "act1.mercy_remembered", "op": "SetTrue"}, {"key": "companion.ilfaeril.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "release", "speaker": "Coronal Aedyn", "text": "*(He is silent a long, long moment, the judge warring with the grieving man.)* Let them *go.* *(slowly.)* And then *grieve* them. *(he stares at his own hands.)* You ask the one thing a *judge* is built to be unable to do. A judge's entire *function* is to *sentence* — to *do something*, to *act upon* the condemned. The idea that the *right* action might be *no action* — to *release*, and bear the *loss*, and *mourn* — that is, to a judge, indistinguishable from *failure.* *(his voice shakes.)* But you're right that it is a *choice* I cannot see, precisely *because* I wear this crown. The crown demands a *verdict.* And so I reached for the *most preserving verdict* — the Wall — and called it *mercy*, when the truly merciful thing was to *give no verdict at all*, to let the faithless *return to nothing* as is their *nature*, and to honor them not by *keeping* them but by *missing* them. *(he removes the silver circlet from his brow and stares at it.)* This crown cannot grieve. It can only *sentence.* And so it will *always* choose the Wall over the *letting-go* — because the Wall is a *verdict* and grief is a *surrender.* *(quietly, terribly.)* I fear I cannot un-invent it now. But you have named the trap of the office itself: *a crown cannot choose mercy, because mercy is sometimes the refusal to rule.* Remember that, stranger. When *you* are someday offered a crown. *Mercy is the verdict a crown cannot reach.*", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.aedyn_release", "op": "SetTrue"}, {"key": "act3.crown_cannot_grieve", "op": "SetTrue"}, {"key": "act3.break_the_crown_known", "op": "SetTrue"}, {"key": "companion.ilfaeril.approval", "op": "AddInt", "amount": 5}], "choices": []}, {"id": "ownership", "speaker": "Coronal Aedyn", "text": "*(His kind eyes flinch.)* I never asked them. *(slowly.)* ...No. I did not. *(he looks down at the chamber where the faithless are being assembled for sentencing.)* I asked the *court.* I asked the *gods' clergy.* I asked the *philosophers* whether *keeping* was kinder than *losing.* I asked *everyone* — except the *souls* whose eternity I was *designing.* *(his voice tightens.)* And you call that *ownership*, and the word is *exactly* right, and it is the word I have spent centuries *not* letting myself hear. To *decide* a soul's eternal fate *for* it, *without* it, *certain* I know its own good better than it does — *(he closes his eyes)* — that is not the posture of a *merciful judge.* That is the posture of an *owner* with a *kindly face.* *(he grips the arm of his chair.)* The slavers of the southlands say the same of their chattel — *\"they are better kept by us than free and starving.\"* And I have *despised* them for it. And I have just *built them a cosmology.* *(he looks at you, hollow.)* Mercy that is never *consented to* is only *dominion in soft robes.* I should have *asked* the faithless. It is, I think, far too late to start — the first of them is already in the dock. But I will *never* again mistake *deciding for* a soul with *caring about* one. You have unmade my comfort, stranger. Stay and watch what my comfort *built.*", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.aedyn_ownership", "op": "SetTrue"}, {"key": "act3.wall_without_consent", "op": "SetTrue"}, {"key": "companion.ilfaeril.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "sincerity", "speaker": "Coronal Aedyn", "text": "*(He absorbs this slowly, and something in him grays toward despair.)* Sincerity is the most dangerous thing in this room. *(quietly.)* You think to *warn* me, and instead you have *named* me. *(he looks at the half-built machinery of the sentence.)* A *cruel* man's evil *ends* with him — it is *recognized*, *resisted*, *buried* in his grave. But a *sincere* man's evil — a thing built in *genuine love*, with *genuine grief*, by a *genuinely good* judge — *(his voice hollows)* — that evil wears the *armor of good intention*, and the centuries cannot *strip* it, because every generation that inherits it says *\"surely a thing built with such *care* cannot be *wrong*.\"* *(he meets your eyes.)* You tell me that ten thousand years hence my Wall will grind on, tended by people who *never chose it*, who keep it only because *I* — a *good* man — *built* it, and *good* men's works are *trusted.* *(he bows his silver head.)* Then I have done a more terrible thing than any *villain* of these wars. The villains kill *thousands.* I have built a *kindness* that will imprison *millions*, and *armored* it in my own *sincerity* so that no future heart can *doubt* it. *(softly.)* Undo me, stranger, if you ever can. And know that the hardest evil to end is not the one done in *hatred.* It is the one done, like mine, in *love.*", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.aedyn_sincerity", "op": "SetTrue"}, {"key": "act3.wall_born_of_mercy", "op": "SetTrue"}, {"key": "act3.wall_has_no_author", "op": "SetTrue"}, {"key": "companion.ilfaeril.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "sincere", "speaker": "Coronal Aedyn", "text": "*(He shakes his silver head slowly, and the kind sorrow hardens into the conviction of a good man who has decided.)* No. *(gently, immovably.)* I have *wept* over this, stranger, more than you can know — and I keep returning to the same place: that *nothing* is the only alternative, and I *cannot* consign a soul to *nothing* when I have the power to *keep* it. *(he rises.)* Perhaps it is imperfect. Perhaps the grey is hard. But a *hard* preservation is kinder than a *gentle* annihilation — I *must* believe that, or I cannot cast this vote at all, and the vote *must* be cast, the wars *demand* an answer. *(he moves toward the chamber.)* You'll see, in time, that I chose the *kindest* road available to a judge in a *cruel* age. History will understand. *(and he descends to invent the Wall, sincere, sorrowful, and certain — which is exactly how the worst thing in the world gets built.)*", "dynamic": false, "auto": "close", "onEnter": [], "choices": []}, {"id": "close", "speaker": "Coronal Aedyn", "text": "*(Coronal Aedyn descends to cast the first vote — a good man, grieving, kind-eyed, about to invent ten thousand years of patient cruelty and call it mercy — and you carry away the most important and most terrible lesson of the whole saga: that the Wall was not built by a villain. It was built by *love*, exhausted past the strength to grieve, and *armored* in a sincerity that no later century would dare to question.)*", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "npc.crown.first", "file": "CrownWarsDenizensContent.cs", "title": "Npc · Crown · First", "start": "0", "nodes": [{"id": "0", "speaker": "A Soul in the First Dock", "text": "*(In the dock stands a soul — a tired, ordinary elven woman, a soldier by her scars — who does not look afraid, because the thing about to happen to her *has never happened to anyone* and so there is, as yet, no fear *shaped* for it. She watches the silver judge and the assembling court with mild, exhausted confusion, the way one watches a ceremony in a language one doesn't speak. When she sees you, she brightens, grateful for a face that isn't *official.*)* You — you're not with them, are you. *(quietly.)* Good. Maybe you can tell me. They keep saying a word at me. *Faithless.* Like it's a *sentence.* But I don't — *(she frowns)* — I don't understand what it's *for.* What does it *mean*, when they say it like that? Like it's the *end* of something?", "dynamic": false, "auto": "1", "onEnter": [{"key": "npc.first_faithless_met", "op": "SetTrue"}, {"key": "act3.crown_wars_witnessed", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "The First Faithless", "text": "*(She tries to explain herself, reasonable and weary, with no idea she is the precedent that will damn millions.)* I served no god. *(a tired shrug.)* Is that the crime? I never *hated* them — I just never *needed* one. I had my *company.* My *oath* was to *them*, the soldiers beside me, and I kept it — I *died* keeping it, pulling Calla out of the river when the bridge went. *(she touches a wound at her side.)* That's how I came here. Faithful to my *people*, if not to any *temple.* *(she watches the court murmur.)* And now the kind silver judge says because I served no *god*, no god will *claim* me, and so I am to be... *kept.* In a *wall.* Forever. *(she laughs, baffled.)* Forever's a *long* word for a soldier. I was hoping for *rest.* Maybe to be *poured back* — into a tree, a child, the river. *(she looks at you, and the first edge of true fear finally finds its shape.)* But he doesn't mean *rest*, does he. The way he says *kept.* He means I'll be... *awake.* In the grey. *Knowing.* Not *living*, not *resting*, just — *held.* For *being loyal to the wrong thing.* *(quietly.)* I pulled Calla out of the river. Doesn't that *count?* Doesn't *some* loyalty count, even if it wasn't *to a god?*", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "[INSIGHT 17] \"It counts to *me.* And it's the exact thing they're about to declare *worthless* — loyalty to *people* instead of *powers.* You're not faithless. You kept *every* faith that mattered. They're inventing a god-shaped hole and calling everyone who doesn't fill it *empty.*\"", "next": "counts", "fail": "blank", "checkDC": 17, "checkAbility": "Wisdom"}, {"text": "\"Listen to me carefully, because you are the *first*, and what they decide *about you* they will decide about *millions* after. You're not on trial for your life. You're on trial for the *definition.* Make them say your *name*, not your *category.*\"", "next": "precedent", "fail": null}, {"text": "\"Tell me about Calla. The one you pulled from the river. If your loyalty is going on trial, then let the court hear *who* you were loyal *to* — a name, a face, not an abstraction.\"", "next": "calla", "fail": null, "effects": [{"key": "companion.ilfaeril.approval", "op": "AddInt", "amount": 3}]}, {"text": "\"I can't stop the verdict — it's ten thousand years too old for me to undo from here. But I can *witness* it. I can be the one who *remembers* that the first Faithless pulled Calla from the river. You won't go unwitnessed.\"", "next": "witness", "fail": null, "effects": [{"key": "act3.first_faithless_remembered", "op": "SetTrue"}]}]}, {"id": "counts", "speaker": "The First Faithless", "text": "*(Her tired eyes fill — not with fear now, but with the relief of being *understood* a moment before being condemned.)* It counts to *you.* *(softly.)* You don't know what that — *(she presses her hand to the dock rail.)* They've been saying *faithless, faithless* for an hour, and the word started to get *into* me, you know? Started to feel like maybe I *was* empty, maybe I *did* fail some test everyone else passed. *(fiercely now.)* But I *didn't.* You're right. I kept faith with *Calla*, with my *company*, with the *oath I actually swore* — I just didn't swear it to anything with a *temple.* *(she stands straighter.)* They've invented a *hole shaped like a god* and they're going to spend ten thousand years calling everyone who doesn't *fit* it *empty.* And I'm the *first* one they're measuring. *(she looks at the silver judge, and there's steel in her now.)* Then let me be the first one who *says it back.* I am *not* faithless. I am loyal to *things that bleed* instead of things that *float.* And if their *Wall* can't tell the difference between a *traitor* and a *soldier who loved her company more than your gods* — then the *Wall* is the empty thing, not *me.* *(to you, fierce and grateful.)* Thank you. I'll go into the grey *knowing* I kept faith. That's — that's not nothing. You made sure it's not nothing.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.first_faithless_counts", "op": "SetTrue"}, {"key": "act3.faithless_kept_faith", "op": "SetTrue"}, {"key": "act1.mercy_remembered", "op": "SetTrue"}, {"key": "companion.ilfaeril.approval", "op": "AddInt", "amount": 5}], "choices": []}, {"id": "precedent", "speaker": "The First Faithless", "text": "*(She goes very still, the soldier in her recognizing the shape of a battlefield she didn't know she was standing on.)* The *first.* *(slowly.)* What they decide about *me*... they decide about everyone after. *(she looks at the court with new, sharp eyes.)* I thought this was *my* trial. *My* small bad luck. But it's not, is it — it's the *founding.* I'm not a *defendant.* I'm a *template.* *(her jaw sets.)* Make them say my *name.* Not my *category.* *(she nods slowly, fiercely.)* Because if I let them sentence *\"the Faithless\"* — the *abstraction*, the *type* — then it's *easy*, it's *clean*, they can do it ten thousand more times without a *flicker.* But if I make them sentence *Maerys* — *(she lifts her chin)* — yes, that's my name, *Maerys*, a *soldier*, who pulled *Calla* from the *river* — if I make them look at a *face* and a *name* and a *deed* and *still* say *\"into the Wall with her\"* — then they have to *know* what they're building. They have to do it to a *person*, not a *principle.* *(to you, grimly.)* I can't *win* this. But I can make the first stone of their Wall cost them a *name they'll have to remember.* Stand where they can see you nod when I say it. Let them know *someone* is keeping count. *(she turns to the court and draws a breath.)* My name is *Maerys.*", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.first_faithless_maerys", "op": "SetTrue"}, {"key": "act3.maerys_named", "op": "SetTrue"}, {"key": "act3.first_faithless_remembered", "op": "SetTrue"}, {"key": "companion.ilfaeril.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "calla", "speaker": "The First Faithless", "text": "*(Her weariness softens into something luminous.)* Calla. *(she smiles, the first real one.)* Loud. *Terrible* singer — and she sang *anyway*, all the time, marching, and the company *hated* it and would have *died* for the chance to hear it one more time. *(quietly.)* She was nineteen. Frightened of water her whole life — and when the bridge went, she went *under*, and I could hear her *not screaming*, just — *taking it in*, the way the very frightened do at the end. *(her hand tightens.)* So I went in after. Cold like a *blade.* Found her by her *hair.* Got her to the bank, and she *lived*, and I — the current had me by then. *(she looks at you.)* I drowned so a bad singer could keep singing. *(fiercely.)* And *that's* the loyalty your silver judge calls *nothing* — because it wasn't to a *god*, it was to a *loud girl who was scared of water.* *(her eyes blaze.)* If there's a *temple* anywhere that's *holier* than going into a cold river for *Calla*, I never found it, and I looked. *(softly.)* Remember her name too, would you? Calla. The reason I'm *faithless.* The best reason I ever had for anything. She's still up there, singing badly. Let *that* be on the record, under all their *faithless.* That I died for a *song.*", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.first_faithless_calla", "op": "SetTrue"}, {"key": "act3.died_for_a_song", "op": "SetTrue"}, {"key": "act1.mercy_remembered", "op": "SetTrue"}, {"key": "companion.ilfaeril.approval", "op": "AddInt", "amount": 5}], "choices": []}, {"id": "witness", "speaker": "The First Faithless", "text": "*(She studies you — the stranger who promises not rescue but *memory* — and something in her settles.)* You can't stop it. *(quietly.)* No. I didn't think anyone could; the judge has that *certain* kindness, the kind that doesn't *bend.* *(she nods slowly.)* But *witness.* *(she turns the word over.)* You know, that's — that might be *more* than rescue, in a strange way. A *rescue* saves *one* soldier. A *witness* — *(she looks at the assembling Wall)* — a *witness* is the one thing their whole *machine* can't *account* for. They can *sentence* me. They can *file* me. But if *someone walks out of this room remembering that Maerys pulled Calla from the river* — then the Wall didn't get *all* of me. It got the *body*, the *soul*, the *sentence.* It didn't get the *story.* *(she almost smiles.)* They're building a thing to make us *forgotten.* And you're going to make me the *one* faithless soul that *isn't.* *(fiercely.)* That's a crack in their Wall on the *very first stone*, stranger. Go. Carry me out. Tell it true: a soldier, a river, a bad singer, a name. *Maerys.* Make their forever *fail* at exactly *one* soul. It's a *start.*", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.first_faithless_witnessed", "op": "SetTrue"}, {"key": "act3.first_faithless_remembered", "op": "SetTrue"}, {"key": "act2.cataloguing_defeats_the_wall", "op": "SetTrue"}, {"key": "companion.ilfaeril.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "blank", "speaker": "The First Faithless", "text": "*(She doesn't understand the comfort, and the fear wins.)* You talk like the judge. *Pretty.* *(she shrinks in the dock.)* But pretty words don't *unsay* the sentence, do they. *Faithless.* *Kept.* *Forever.* *(she wraps her arms around herself.)* I just wanted to know what the word *meant.* I think — I think I'd rather *not* know, now. Go away. Let me have the last few moments where I don't *fully* understand what they're about to do to me. *Knowing* is worse. You've made it worse. *(she turns her face from you, and the first soul ever sentenced to the Wall waits out her last unknowing minutes alone.)*", "dynamic": false, "auto": "close", "onEnter": [], "choices": []}, {"id": "close", "speaker": "The First Faithless", "text": "*(Maerys stands in the first dock — a soldier who drowned for a bad singer, about to become the precedent that damns millions — and whether you gave her defiance, a name, a remembered face, or only the dignity of one witness, you carry out of that ancient room the seed of everything: that the very first Faithless was not faithless at all, but loyal to a girl and a song and a cold river, and that the Wall was a *lie* from its very first stone.)*", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "npc.crown.ilfaeril", "file": "CrownWarsDenizensContent.cs", "title": "Npc · Crown · Ilfaeril", "start": "0", "nodes": [{"id": "0", "speaker": "A Young Judge, Certain", "text": "*(He is achingly young — for an elf, barely more than a boy — and he wears the junior robes of the court with a pride that has not yet learned to be anything else. You know this face. You have seen it ten thousand years older, carrying a grief so deep it has its own gravity. But *here*, *now*, the eyes are *clear* and *certain* and entirely without the wound, and Ilfaeril the Younger straightens as you approach, eager to be taken seriously.)* You're observing the founding? *(brightly.)* Then you're witnessing *history.* The Coronal's mercy-sentence — the Wall. I'm to cast a *junior vote.* My *first.* *(he cannot quite hide his pride.)* My elders say I have the clearest legal mind of my generation. I intend to prove them right. I've studied the sentence from every angle, and it is *flawless.* I shall vote *yes* with a *whole heart.*", "dynamic": false, "auto": "1", "onEnter": [{"key": "npc.young_ilfaeril_met", "op": "SetTrue"}, {"key": "act3.crown_wars_witnessed", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "Ilfaeril, the Younger", "text": "*(He lays out his reasoning with the crisp, joyful confidence of a brilliant young man who has never yet been *wrong* about anything that mattered.)* Here is the elegance of it. *(he ticks the points off, alight.)* The faithless cannot be *claimed* by gods — fact. Unclaimed, they *annihilate* — fact. Annihilation is *irreversible* and therefore *maximally* cruel — fact. The Wall *preserves* — therefore the Wall is *less* cruel than the alternative — therefore the Wall is the *merciful* choice — therefore a *just* judge *must* vote for it. *(he beams.)* It's *airtight.* I've checked it a hundred times. *(then he pauses, and the first faint shadow — the one that will become his whole long life — crosses his clear young face.)* The only... the only piece I can't quite *close* is — well. The sentence assumes that *being kept* is *better* than *being nothing.* And I've *proven* that *logically*, but I keep — *(he frowns)* — I keep wanting to *ask* one of the faithless whether *they* agree, and my elders say that's *sentimental*, that the *logic* settles it, that a judge who needs the *defendant's* opinion isn't a judge but a — a *coward.* *(he looks at you, the certainty wobbling for just a heartbeat.)* It *is* airtight. Isn't it? The logic. ...You've been around. Tell me it's airtight. I vote within the hour.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "[INSIGHT 18] \"It's airtight because you built it out of *facts* and left out the one thing that isn't a fact — what it's *like* to be kept. You can't close it with logic because the hole in it is *experiential.* Go to the dock. Ask Maerys. Then vote.\"", "next": "ask", "fail": "loyal", "checkDC": 18, "checkAbility": "Wisdom"}, {"text": "\"I know how this vote ends, Ilfaeril, because I've met *you* — ten thousand years from now, still carrying it. The clear mind you're so proud of is about to make the one error it spends an *age* trying to forgive. *Don't raise your hand.*\"", "next": "future", "fail": "loyal"}, {"text": "\"Your elders call asking the defendant 'cowardice.' Flip it. The coward is the judge who hides behind *airtight logic* so he never has to *feel* the face he's condemning. Courage is asking the question that might *unmake* your proof.\"", "next": "courage", "fail": null}, {"text": "\"Vote however your conscience lands — but cast it having *looked* at her. Whatever you decide, decide it to Maerys's *face*, not to a syllogism. Owe her that much. Owe *yourself* that much.\"", "next": "face", "fail": null, "effects": [{"key": "companion.ilfaeril.approval", "op": "AddInt", "amount": 3}]}]}, {"id": "ask", "speaker": "Ilfaeril, the Younger", "text": "*(The young judge goes still, and the airtight certainty develops, for the first time in his life, a *crack* — the very crack you have watched the elder Ilfaeril carry for ten thousand years.)* The hole is *experiential.* *(slowly.)* I built the proof out of *facts* and the missing piece *isn't* one. *(he looks toward the dock, toward Maerys, and something in his clear young face begins — just begins — to be afraid.)* My elders said the *logic settles it.* But logic can only settle what it can *measure*, and I *cannot measure* what ten thousand years in the grey *feels like* — I *assumed* it was better than nothing because *I* would rather *exist* than not, but — *(his voice drops)* — but I have never been *kept against my will for an age.* I'm *guessing.* I dressed a *guess* in a *syllogism* and called it *justice.* *(he stares at his own young hand — the hand that is meant to rise in a vote.)* If I go to the dock... if I *ask* her... and she says *\"I would rather be nothing than be kept\"* — then my airtight proof *shatters*, and I'll have to vote *no*, and *defy* the Coronal, and *fail* my elders, and throw away the brilliant career they've promised me on my *first vote* — *(he looks at you, terrified and awake.)* — or I *don't* ask, and I vote *yes* in *comfortable ignorance*, and stay *brilliant*, and *certain*, and *clean.* *(quietly.)* You've shown me that the whole sentence rests on a question I've been *forbidden* to ask. I think — gods, I think I have to ask it. Even if it costs me *everything.* Where is she? Where is the first of the faithless? I need to *ask* before I can *raise my hand.*", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.young_ilfaeril_doubts", "op": "SetTrue"}, {"key": "act3.ilfaeril_asks", "op": "SetTrue"}, {"key": "act1.mercy_remembered", "op": "SetTrue"}, {"key": "companion.ilfaeril.approval", "op": "AddInt", "amount": 6}], "choices": []}, {"id": "future", "speaker": "Ilfaeril, the Younger", "text": "*(He stares at you, and the young certainty fractures into something between terror and yearning.)* You've *met* me. *(barely a whisper.)* Ten thousand years — *(his hand drifts to his chest.)* You're saying I — that I *do* vote yes. That I *raise my hand.* And that I spend an *age* — *(his voice shakes)* — *carrying* it. *(he searches your face.)* Then it *isn't* airtight. Because a *correct* vote doesn't leave a *wound* you carry for ten thousand years. A *just* act doesn't — doesn't *haunt* the man who did it across an entire *age.* *(he's trembling now.)* My elder self. Is he — am I — *(he can barely ask)* — am I *sorry?* Ten thousand years from now? Do I *regret* the hand I'm about to raise? *(and whatever he reads in your silence answers him.)* ...I do. *(quietly, devastated, and finally *wise* in a way the brilliant boy was not.)* Then the future is *begging* the past not to. And the past — *(he looks at his hand)* — the past is *me*, *right now*, *still able to choose.* *(he closes his hand into a fist, lowering it.)* I won't raise it. I don't *understand* what it costs yet — you do, the old me does — but I *trust* the grief you're describing more than I trust my own *airtight* pride. *(he meets your eyes, young and resolved.)* Tell my elder self — tell *me* — that the boy *listened.* That this time, the hand stayed *down.* Maybe that changes nothing. Maybe the Wall is built without my vote. But at least the *wound* — at least *this* version doesn't have to carry the *wound.*", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.young_ilfaeril_refuses", "op": "SetTrue"}, {"key": "act3.ilfaeril_hand_stays_down", "op": "SetTrue"}, {"key": "act3.loop_glimpsed", "op": "SetTrue"}, {"key": "companion.ilfaeril.approval", "op": "AddInt", "amount": 6}], "choices": []}, {"id": "courage", "speaker": "Ilfaeril, the Younger", "text": "*(He flinches, then leans in, the brilliant mind seizing the reframe.)* The coward hides behind airtight logic. *(slowly.)* So that he never has to *feel* the face. *(he looks toward the dock, stricken.)* My elders taught me that *feeling* is the *enemy* of *judgment* — that a great judge is *cold*, *clean*, *unmoved.* And I was so *proud* to be *cold* at *eighteen.* *(his voice tightens.)* But you've turned it over: a judge who *engineers* a proof so *tight* that the *defendant's suffering can't get in* — that judge isn't *brave* and *rigorous.* He's *hiding.* He built the *airtight* logic *precisely so the air — the breath, the face, the* please *— couldn't reach him.* *(he looks at his own hand.)* *Coward* was never the judge who asks. *Coward* was *me*, building a fortress of *therefores* so I'd never have to *look at her.* *(fiercely, young and shaking.)* Then I'll do the *brave* thing. The thing my elders call *weakness.* I'll go to the dock, and I'll *look*, and I'll let her face *into* my airtight proof, and if it *shatters* — *good.* A proof that can't survive *one human face* deserves to shatter. *(he straightens.)* Thank you. You've taught me that *rigor without mercy is just cowardice with footnotes.* I'd rather fail my elders *looking* than satisfy them *blind.*", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.young_ilfaeril_courage", "op": "SetTrue"}, {"key": "act3.ilfaeril_asks", "op": "SetTrue"}, {"key": "companion.ilfaeril.approval", "op": "AddInt", "amount": 5}], "choices": []}, {"id": "face", "speaker": "Ilfaeril, the Younger", "text": "*(He considers this — the gentlest of your challenges, and somehow the hardest.)* Decide it to her *face.* *(quietly.)* Not to the *syllogism.* *(he looks down at the dock, where Maerys waits.)* You're not even telling me how to *vote.* You're only telling me to *look* while I do it. *(he swallows.)* That's — that's somehow *worse* than if you'd argued with me. Because I *can* dismiss an *argument* — I'm *good* at that, it's my whole *gift.* But I can't dismiss a *request to simply look at the person.* *(he nods, slowly, the certainty not gone but *humbled.*)* You're right. Whatever I decide — yes, or no — I owe it to her, and to *myself*, to decide it *looking at a face* and not *reading a proof.* If the Wall is *just*, I should be able to vote for it while *meeting her eyes.* And if I *can't* meet her eyes and still raise my hand — *(his voice drops)* — then it was never *just*, and my *airtight* logic was only a way to *vote without seeing.* *(he straightens, young and grave.)* I'll go to the dock. I'll look at Maerys. And *then* I'll decide what my hand does. That's — that's the most *honest* thing anyone's asked of me since I put on these robes. Thank you, stranger. I was about to vote with my *eyes closed* and call it *clarity.*", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.young_ilfaeril_face", "op": "SetTrue"}, {"key": "act3.ilfaeril_asks", "op": "SetTrue"}, {"key": "act1.mercy_remembered", "op": "SetTrue"}, {"key": "companion.ilfaeril.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "loyal", "speaker": "Ilfaeril, the Younger", "text": "*(He pulls back, the young pride reasserting like a reflex.)* No — you're trying to make me *doubt*, and *doubt* is what my elders *warned* me about. *(he lifts his chin.)* The logic *is* airtight. I *checked* it. And a judge who lets a *stranger's riddles* unmake a *proof* on the eve of his *first vote* is no judge at all. *(but his hand, you notice, has curled slightly, uncertain.)* The Coronal is *wise.* My elders are *wise.* They cannot *all* be wrong, and I — I am *eighteen*, and *brilliant*, and I will not *throw away* their faith in me for a *feeling.* *(he turns toward the voting chamber.)* I vote *yes.* With a *whole heart.* As I *planned.* *(and he goes, certain and clear-eyed and proud, toward the hand-raising that will take him ten thousand years to understand — and you realize, with a chill, that you may have just watched the exact moment your companion's grief was born.)*", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.young_ilfaeril_votes_yes", "op": "SetTrue"}, {"key": "act3.ilfaeril_raises_hand", "op": "SetTrue"}], "choices": []}, {"id": "close", "speaker": "Ilfaeril, the Younger", "text": "*(The young judge moves toward his first vote — brilliant, certain, ten thousand years away from the grief that will hollow and deepen and finally *redeem* him — and whether his hand rose or stayed down, you carry out of that founding chamber the strangest grief of all: that you have looked your ancient, sorrowing companion in his *young* face, on the worst and most innocent day of his life, and seen exactly where the wound began.)*", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "npc.crown.lhoris", "file": "CrownWarsDenizensTwoContent.cs", "title": "Npc · Crown · Lhoris", "start": "0", "nodes": [{"id": "0", "speaker": "Singer Lhoris", "text": "*(A bard sits apart from the court with a lyre and a face like a man asked to dig his own friends' graves with a silver spade. He is tuning, retuning, unable to stop his hands, and when he sees you he speaks fast, desperate for anyone who isn't *commissioning* him.)* You're not from the Coronal? Thank every fading god. *(he sets the lyre down, picks it up again.)* They've commanded me a *song.* For the sentencing. A — *(he can barely say it)* — a *processional.* To play as the faithless are led to the Wall. To make the moment... *bearable.* *Solemn.* *Beautiful.* *(he laughs, sick.)* The high judge said, *\"Lhoris, give them dignity in their last walk.\"* And the *horror* of it, stranger, the thing eating me alive, is that I *can.* I *know* exactly the melody that will make ten thousand years of imprisonment sound like a *blessing.* My hands already *know* it. And I don't know if writing it is the kindest or the most *monstrous* thing I will ever do.", "dynamic": false, "auto": "1", "onEnter": [{"key": "npc.lhoris_met", "op": "SetTrue"}, {"key": "act3.crown_wars_witnessed", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "Singer Lhoris", "text": "*(He plays a fragment — and it *is* unbearably beautiful, a melody that makes your chest ache, and he stops as if burned.)* You hear it. *(quietly.)* That's the *first dirge*, stranger. The *original.* Every funeral song that will ever be sung, for ten thousand years after this day, will be a *grandchild* of the thing my hands are writing *right now*, to walk the faithless into the dark. *(he grips the lyre.)* And here is the trap I can't think my way out of. If I make it *beautiful* — and I *can*, gods help me, I can make it so beautiful the *condemned themselves weep with the sweetness of it* — then I give them *beauty* in their last walk. A *gift.* Mercy. *(his voice drops.)* But that *same* beauty makes it *bearable to the watchers.* It makes the *court* feel they did a *solemn, holy* thing instead of a *cruelty.* My song will let *ten thousand years of executioners* march souls into a wall and feel *moved* instead of *guilty.* *(he looks at you, anguished.)* The beauty is a *gift* to the dying and an *anesthetic* for the killers, and it is the *same notes*, the *exact same notes*, and I cannot give one without the other. So tell me, stranger: do I make it beautiful, and damn myself as the man whose *art laundered the Wall?* Or do I make it *ugly* — and rob the faithless of the one *kind* thing in their last hour?", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "[INSIGHT 18] \"There's a third song, Lhoris. Not beautiful, not ugly — *true.* A song that makes the watchers *more* guilty, not less. Give the dying their beauty, but weave their *names* through it, so every executioner who's ever moved by it is also *indicted* by it.\"", "next": "truesong", "fail": "craft", "checkDC": 18, "checkAbility": "Wisdom"}, {"text": "\"Your art will outlive this court by ten thousand years. That's not a curse — it's a *smuggling route.* Whatever you hide in the first dirge rides *every* dirge after it, forever. Hide the *truth* in it. Make remembrance the thing that can't be unsung.\"", "next": "smuggle", "fail": "craft"}, {"text": "\"You think beauty is the anesthetic. But beauty is also the one thing the Wall can't *file.* A sealed sentence is a fact. A *song* is a thing that has to be *sung again*, by someone, every time — and the singer can always change the words.\"", "next": "unfileable", "fail": null}, {"text": "\"Refuse the commission. Let the faithless walk in silence if the only song offered is one that comforts their jailers. Sometimes the kindest art is the song you *won't* write.\"", "next": "refuse", "fail": null, "effects": [{"key": "companion.ilfaeril.approval", "op": "AddInt", "amount": 2}]}]}, {"id": "truesong", "speaker": "Singer Lhoris", "text": "*(His hands go still on the strings, and his anguished face slowly transforms — the artist seeing the *real* composition for the first time.)* A song that makes the watchers *more* guilty. *(slowly.)* Beauty for the *dying* — and *names* for the *killers.* *(he begins to work it, half to himself, alight.)* If I weave the *names* of the faithless through the melody — not as a *list*, but as the *theme*, so the tune is *literally built out of who they were* — then every time the dirge is *beautiful*, it is beautiful *because of them*, by name, and any executioner moved to tears is weeping *at the people he's condemning.* *(his eyes blaze.)* The beauty stops being an *anesthetic* and becomes an *accusation that feels like grief.* The watcher can't *enjoy* the solemnity without *mourning the specific soul* whose name *is* the melody. *(he plays a few notes, and now the beauty has a *spine* in it.)* Ten thousand years of dirges, every one secretly *built from the names of the wronged* — so the whole tradition of funeral music becomes, without anyone *knowing* it, a *ten-thousand-year-long act of remembrance the Wall can never erase.* *(he looks at you, transformed.)* You've shown me how to obey the commission and *betray* it in the *same notes.* I'll give them their beautiful walk. And I'll make it the *most damning beautiful thing ever written.* Help me get the names. *Every* one. Starting with the first — the soldier, Maerys.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.lhoris_truesong", "op": "SetTrue"}, {"key": "sq.the_first_dirge", "op": "SetTrue"}, {"key": "act2.cataloguing_defeats_the_wall", "op": "SetTrue"}, {"key": "act1.mercy_remembered", "op": "SetTrue"}, {"key": "companion.ilfaeril.approval", "op": "AddInt", "amount": 5}], "choices": []}, {"id": "smuggle", "speaker": "Singer Lhoris", "text": "*(He stares at you, and the despair cracks into a wild, dawning hope.)* A *smuggling route.* *(he clutches the lyre.)* Through *time.* You're — gods, you're *right*, that's the one thing about this curse I've been too *sick* to see clearly: my song *will not die.* The court will crumble, the Coronal will be dust, the *language* will change — but the *melody* will be *handed down*, mother to child, singer to singer, for *ten thousand years*, because that is what a *true* dirge *does*, it *survives.* *(fiercely.)* So whatever I *hide* in it travels *free*, down all that time, in a vessel no tyrant thinks to *search* — because who *inspects a lullaby?* Who *audits a funeral song?* *(he's working now, fast.)* I'll bury the *truth* in the structure. Not the surface — the surface stays *solemn*, *approved*, *commissioned* — but in the *bones* of it, in the intervals only another *musician* could decode, I'll write *what really happened here.* *That the faithless kept faith. That the Wall was a lie. That a good man built it weeping.* *(he looks at you.)* And in ten thousand years, when someone with *ears* finally *listens* to the oldest dirge — they'll *hear* the indictment that's been *hiding in every funeral since the founding.* *(quietly, fervent.)* My art *can't* save these souls. But it can carry their *truth* past *everyone* who'd bury it. Let me write the longest-running secret in history. Give me the names to encode.", "dynamic": false, "auto":
