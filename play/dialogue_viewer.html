your way to whoever you'll tell: every child in that Wall was put there by someone who also thought they were doing the smaller evil. Go with my blessing. I mean that. And my count.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "almshouse.*", "file": "AlmshouseScene.cs", "title": "Almshouse", "start": "0", "nodes": [{"id": "0", "speaker": "NPC", "text": null, "dynamic": true, "auto": null, "onEnter": [], "choices": []}]}, {"id": "almshouse.deathbed", "file": "AlmshouseScene.cs", "title": "Almshouse · Deathbed", "start": "0", "nodes": [{"id": "0", "speaker": "Hensley, dying", "text": "An old man, hours from the end, grips your hand with a strength that surprises you. \"You've an honest face. Tell me true — did my boy ever ask after me? Tomas. I drove him off, forty years gone, and I'd give the rest of my breath to know he... that he didn't hate me at the end.\" (Mother Cass, behind you, gives the smallest shake of her head. Tomas never came. Tomas never wrote. There is no record of mercy here.)", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "\"He asked after you. He forgave you. He told me so.\" (A lie, to ease him out.)", "next": "lie", "fail": null, "effects": [{"key": "almshouse.deathbed_resolved", "op": "SetTrue"}, {"key": "almshouse.deathbed_lie", "op": "SetTrue"}]}, {"text": "\"I won't lie to a dying man. He never came. But you *asked* — that counts.\"", "next": "truth", "fail": null, "effects": [{"key": "almshouse.deathbed_resolved", "op": "SetTrue"}]}]}, {"id": "lie", "speaker": "Hensley, dying", "text": "Something in his face comes untied — forty years of held breath, let go. \"He did. Of course he did. He was always the better of us.\" He is asleep before you finish, smiling. You will never know if it was the cruelest kindness or the kindest cruelty. Mother Cass squeezes your shoulder. She has made this choice a thousand times. She does not tell you which way.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}, {"id": "truth", "speaker": "Hensley, dying", "text": "He weeps, which you feared. But then — quieter — \"...I *asked,* though. After all this. That's not nothing, is it. To still be the kind of man who'd want to know.\" He holds that, instead of a comfort that wasn't his. It is a harder thing to die holding. He dies holding it anyway, and it is *his.*", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "almshouse.keeper", "file": "AlmshouseScene.cs", "title": "Almshouse · Keeper", "start": "0", "nodes": [{"id": "0", "speaker": "Mother Cass", "text": null, "dynamic": true, "auto": null, "onEnter": [{"key": "almshouse.visited", "op": "SetTrue"}, {"key": "almshouse.blessing", "op": "SetTrue"}], "choices": [{"text": "Who do you keep here?", "next": "who", "fail": null}, {"text": "What do you need?", "next": "need", "fail": null}]}, {"id": "need", "speaker": "Mother Cass", "text": null, "dynamic": true, "auto": null, "onEnter": [{"key": "almshouse.token", "op": "SetTrue"}], "choices": []}]}, {"id": "almshouse.poor", "file": "AlmshouseScene.cs", "title": "Almshouse · Poor", "start": "0", "nodes": [{"id": "0", "speaker": "The unclaimed", "text": null, "dynamic": true, "auto": null, "onEnter": [], "choices": []}]}, {"id": "almshouse.roen_witness", "file": "AlmshouseScene.cs", "title": "Almshouse · Roen · Witness", "start": "0", "nodes": [{"id": "0", "speaker": "Roen", "text": "Funny. I've cracked mansions, a palace, a god's own counting-house. But this — a room full of people the world forgot — this is the only kind of place I've ever walked into and felt my shoulders come *down.* I grew up in a room like this. Might've died in one, if the Harpers hadn't picked me out of it.", "dynamic": false, "auto": null, "onEnter": [{"key": "almshouse.roen_witnessed", "op": "SetTrue"}, {"key": "companion.roen.approval", "op": "AddInt", "amount": 5}], "choices": [{"text": "You're not that kid anymore.", "next": "close", "fail": null}, {"text": "These are still your people.", "next": "close", "fail": null}]}, {"id": "close", "speaker": "Roen", "text": null, "dynamic": true, "auto": null, "onEnter": [], "choices": []}]}, {"id": "hub.herald", "file": "BaldursGateHub.cs", "title": "Hub · Herald", "start": "0", "nodes": [{"id": "0", "speaker": "Herald of the Gate", "text": "Returned. I felt you cross back — like a bell rung in an empty cathedral. Aldric Morn would speak with you. But the Doomguides have sealed the Cinderhaunt below, where the harvest still festers. Clear it, and the road to him opens.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "Why should I trust Aldric Morn?", "next": "1", "fail": null}, {"text": "I'll clear the Cinderhaunt.", "next": "accept", "fail": null}]}, {"id": "1", "speaker": "Herald of the Gate", "text": "Trust nothing. But you've seen the Wall of the Faithless. You know the question he asks is real. Decide below — in blood and shadow, where such things are decided.", "dynamic": false, "auto": "accept", "onEnter": [], "choices": []}, {"id": "accept", "speaker": "Herald of the Gate", "text": "Descend when you're ready; the stairs are marked. Try not to die a second time.", "dynamic": false, "auto": null, "onEnter": [{"key": "prologue.herald_met", "op": "SetTrue"}], "choices": []}]}, {"id": "hub.roen", "file": "BaldursGateHub.cs", "title": "Hub · Roen", "start": "0", "nodes": [{"id": "0", "speaker": "Roen Alleywind", "text": "So you're the one who walked back out of death. Relax — I'm a friend. The kind that knows every alley, lock, and lie in this city. The Harpers sent me to keep an eye on you. I'd rather keep the rest of me on you too. Mind some company down those stairs?", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "A Harper spy. Why would I trust you?", "next": "trust", "fail": null}, {"text": "Welcome aboard. We could use the blades — and the lockpicks.", "next": "join", "fail": null, "effects": [{"key": "companion.roen.recruited", "op": "SetTrue"}, {"key": "companion.roen.approval", "op": "AddInt", "amount": 10}]}]}, {"id": "trust", "speaker": "Roen Alleywind", "text": "You don't. That's the smart play. But the Doomguides want you in a cell and Aldric wants you on an altar — and I want neither. That puts me a cut above your other options. Coming?", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "Fair enough. Join me.", "next": "join", "fail": null, "effects": [{"key": "companion.roen.recruited", "op": "SetTrue"}, {"key": "companion.roen.approval", "op": "AddInt", "amount": 15}]}, {"text": "Not yet.", "next": "later", "fail": null}]}, {"id": "join", "speaker": "Roen Alleywind", "text": "Then I'm yours. Try not to get us both killed — I've grown fond of breathing.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}, {"id": "later", "speaker": "Roen Alleywind", "text": "Suit yourself. I'll be here, looking trustworthy. Come find me when you change your mind.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "hub.varra", "file": "BaldursGateHub.cs", "title": "Hub · Varra", "start": "0", "nodes": [{"id": "0", "speaker": "Varra", "text": "Returned, are you? A soul with a hole in it. Charming. I'm Varra — I've a hole in mine too, shaped exactly like a contract I signed when I was six. Misery loves company, and company with a sword is even better. Take me along before my patron remembers I exist?", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "Welcome aboard. We've both got debts to outrun.", "next": "join", "fail": null, "effects": [{"key": "companion.varra.recruited", "op": "SetTrue"}, {"key": "companion.varra.approval", "op": "AddInt", "amount": 15}]}, {"text": "A pact-bound warlock sounds like a liability.", "next": "liability", "fail": null}]}, {"id": "liability", "speaker": "Varra", "text": "Oh, absolutely. I'm a leash with a person on the end of it, and one day someone's going to *pull.* But until then I'm the funniest liability you'll ever meet, and I throw fire. Your call.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "Fair. Come on, then.", "next": "join", "fail": null, "effects": [{"key": "companion.varra.recruited", "op": "SetTrue"}, {"key": "companion.varra.approval", "op": "AddInt", "amount": 8}]}, {"text": "Not yet.", "next": "later", "fail": null}]}, {"id": "join", "speaker": "Varra", "text": "Excellent. Don't get attached — everyone who buys me eventually gets a bill. But the interim's a riot.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}, {"id": "later", "speaker": "Varra", "text": "Mm. Hovering near the exit. Smart. I'd do the same, if I had one.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "banter.garrow_roen.prayer", "file": "CampfireBanter.cs", "title": "Banter · Garrow · Roen · Prayer", "start": "0", "nodes": [{"id": "0", "speaker": "Garrow", "text": "You pray to nothing, thief. I have watched you do it — that small nod, before a lock. To whom?", "dynamic": false, "auto": "1", "onEnter": [{"key": "banter.garrow_roen.prayer.seen", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "Roen", "text": "It's not a prayer. It's a promise. \"Be quick, be quiet, be gone.\" Three gods I can keep.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "\"He has a point, Garrow.\"", "next": "roen_win", "fail": null, "effects": [{"key": "companion.roen.approval", "op": "AddInt", "amount": 3}]}, {"text": "\"He's stalling, and so are you.\"", "next": "stall", "fail": null}, {"text": "[INSIGHT 13] \"You nod to the people you've robbed. An apology you'll never say out loud.\"", "next": "apology", "fail": "deflect", "checkDC": 13, "checkAbility": "Wisdom"}, {"text": "\"...\"", "next": "watch", "fail": null}]}, {"id": "watch", "speaker": "Garrow", "text": "Hm. Three gods you can keep. That is two more than most priests manage. Mind your footing.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}, {"id": "roen_win", "speaker": "Garrow", "text": "...Kelemvor keeps promises too. He keeps all of them. See that yours stay the harmless kind.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}, {"id": "stall", "speaker": "Roen", "text": "Stalling is a profession, grave-digger. You should try it. You'd live longer.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}, {"id": "apology", "speaker": "Roen", "text": "*(He doesn't look at you for a moment.)* ...That's a nasty little trick, reading a man like that. Do it again and I'll teach you a lock you can't pick. But — yes. Something like that.", "dynamic": false, "auto": null, "onEnter": [{"key": "banter.roen.apology_seen", "op": "SetTrue"}, {"key": "companion.roen.approval", "op": "AddInt", "amount": 5}], "choices": []}, {"id": "deflect", "speaker": "Roen", "text": "It's a nervous habit. My old mentor had it. Leave the dead their habits, yes?", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "banter.varra_naeve.fire", "file": "CampfireBanter.cs", "title": "Banter · Varra · Naeve · Fire", "start": "0", "nodes": [{"id": "0", "speaker": "Varra", "text": "You flinch when I light the fire, Netherese. Every night. A wizard, flinching at a campfire.", "dynamic": false, "auto": "1", "onEnter": [], "choices": []}, {"id": "1", "speaker": "Naeve", "text": "I watched a city the size of a sky fall burning for a day and a night. Karsus reached for godhood and the Weave answered with ruin. You light a campfire; I see Netheril. It is not the same fire. It is always the same fire.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "\"Varra. Light it further from her.\"", "next": "kind", "fail": null, "effects": [{"key": "companion.naeve.approval", "op": "AddInt", "amount": 4}, {"key": "companion.varra.approval", "op": "AddInt", "amount": 1}]}, {"text": "\"You both lost a home to your own ambition. Sit with that.\"", "next": "mirror", "fail": null}, {"text": "[ARCANA 15] \"Karsus didn't fall to fire. He fell to a single missing word. You're not afraid of burning. You're afraid of being one word from ruin yourself.\"", "next": "truth", "fail": "quiet", "checkDC": 15, "checkAbility": "Intelligence"}]}, {"id": "kind", "speaker": "Varra", "text": "*(She moves the kindling, grumbling.)* There. Happy? I'm not a monster. A monster wouldn't have asked.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}, {"id": "mirror", "speaker": "Naeve", "text": "*(Varra's grin goes flat.)* ...We are not the same, conjurer. My ambition was a nation's. Yours fit in a contract.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}, {"id": "truth", "speaker": "Naeve", "text": "*(A long silence.)* ...You read me like Netherese script, and you are not even of the empire. Yes. One word. I have spent three centuries making certain I am never again one word from the end. *(quietly)* Thank you. No one has ever named it.", "dynamic": false, "auto": null, "onEnter": [{"key": "banter.naeve.karsus_named", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 8}], "choices": []}, {"id": "quiet", "speaker": "Naeve", "text": "Mind the Weave you cannot see, traveller. That is all I will say of it.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "banter.maerin_garrow.father", "file": "CampfireBanter.cs", "title": "Banter · Maerin · Garrow · Father", "start": "0", "nodes": [{"id": "0", "speaker": "Maerin", "text": "Sister — you knew my father. Before. When the Doomguides still said his name like a blessing.", "dynamic": false, "auto": "1", "onEnter": [{"key": "banter.maerin_garrow.seen", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "Garrow", "text": "I knew Aldric Morn. I buried beside him. He was the best of us, child, which is why the worst of him frightens me so. You have his eyes. Try not to have the rest.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "\"She's not him, Garrow.\"", "next": "defend", "fail": null, "effects": [{"key": "companion.maerin.approval", "op": "AddInt", "amount": 4}]}, {"text": "\"Maerin, you don't have to be either of them.\"", "next": "free", "fail": null, "effects": [{"key": "companion.maerin.approval", "op": "AddInt", "amount": 5}]}, {"text": "[INSIGHT 14] \"You're not warning her, Garrow. You're warning yourself — that you could still love him.\"", "next": "garrow_truth", "fail": "closed", "checkDC": 14, "checkAbility": "Wisdom"}]}, {"id": "defend", "speaker": "Garrow", "text": "No. She is not. *(softer)* Forgive an old priest her caution, Maerin. I have watched good people become reasons. I would spare you that.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}, {"id": "free", "speaker": "Maerin", "text": "*(She smiles — the unguarded one Aldric describes when he can't sleep.)* I loved the world like it was a free gift from no one. He taught me that, before the Wall. I'd like to keep the half of him that's worth keeping.", "dynamic": false, "auto": null, "onEnter": [{"key": "banter.maerin.free_gift", "op": "SetTrue"}], "choices": []}, {"id": "garrow_truth", "speaker": "Garrow", "text": "*(She is quiet a long moment.)* ...You see too much, Returned. Yes. I have stood at a great many gravesides certain of the doctrine. I have never once stood at his and stayed certain. Leave an old woman that.", "dynamic": false, "auto": null, "onEnter": [{"key": "banter.garrow.loves_aldric_still", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 6}], "choices": []}, {"id": "closed", "speaker": "Garrow", "text": "Mind the watch, both of you. The dead keep no schedule, and neither do his Choir.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "banter.roen_varra.contracts", "file": "CampfireBanter.cs", "title": "Banter · Roen · Varra · Contracts", "start": "0", "nodes": [{"id": "0", "speaker": "Roen", "text": "You and I are the same animal, warlock. We both signed something we couldn't read all the way down.", "dynamic": false, "auto": "1", "onEnter": [], "choices": []}, {"id": "1", "speaker": "Varra", "text": "*(She laughs, no warmth in it.)* You signed a guild ledger, thief. I signed in a language with no word for \"out.\" Don't you dare put us in the same sentence.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "\"He's trying to say he understands.\"", "next": "bridge", "fail": null, "effects": [{"key": "companion.roen.approval", "op": "AddInt", "amount": 2}]}, {"text": "\"She's right, Roen. Some debts you can't pick the lock on.\"", "next": "agree", "fail": null, "effects": [{"key": "companion.varra.approval", "op": "AddInt", "amount": 3}]}, {"text": "\"Both of you are still here. That's the part that matters.\"", "next": "here", "fail": null}]}, {"id": "bridge", "speaker": "Varra", "text": "*(A pause.)* ...Fine. He's trying. Badly, but trying. *(to Roen)* You want to understand, sticky-fingers? Then help me find the loophole. Mine, or yours. I'm not picky tonight.", "dynamic": false, "auto": null, "onEnter": [{"key": "banter.varra_roen.alliance", "op": "SetTrue"}], "choices": []}, {"id": "agree", "speaker": "Roen", "text": "*(He nods, slowly.)* Aye. I always thought a clever enough lock could open anything. Then I met a thing that was the lock and the key and the door. Point taken.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}, {"id": "here", "speaker": "Varra", "text": "*(She studies you, then snorts.)* ...Sentiment. From you. The world really is ending. Yes. We're both still here. Drinks are on the thief.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "banter.ilfaeril_naeve.time", "file": "CampfireBanter.cs", "title": "Banter · Ilfaeril · Naeve · Time", "start": "0", "nodes": [{"id": "0", "speaker": "Ilfaeril", "text": "You speak of Netheril as a wound, arcanist. To me it is recent news. I watched the Crown Wars; your floating cities were a child's bright idea built long after.", "dynamic": false, "auto": "1", "onEnter": [], "choices": []}, {"id": "1", "speaker": "Naeve", "text": "Then you understand what no one else in this party can. The loneliness is not in the losing. It is in being the last shelf in the library no one else can read.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "\"You're not the last shelf. You have each other now.\"", "next": "together", "fail": null, "effects": [{"key": "companion.naeve.approval", "op": "AddInt", "amount": 3}, {"key": "companion.ilfaeril.approval", "op": "AddInt", "amount": 3}]}, {"text": "[HISTORY 16] \"You're both wrong about why it hurts. It isn't that no one remembers. It's that you do.\"", "next": "remember", "fail": "polite", "checkDC": 16, "checkAbility": "Intelligence"}]}, {"id": "together", "speaker": "Ilfaeril", "text": "*(The ancient elf inclines his head.)* A young thought. *(but not unkind)* ...And yet. Two unreadable shelves, side by side, make a small and stubborn library. I find I do not mind it.", "dynamic": false, "auto": null, "onEnter": [{"key": "banter.ilfaeril_naeve.library", "op": "SetTrue"}], "choices": []}, {"id": "remember", "speaker": "Naeve", "text": "*(She and Ilfaeril share a look older than the others can follow.)* ...The traveller has it. Memory is the curse. The forgotten do not grieve. We are the ones who carry the empire's funeral, every day, alone — *(she glances at Ilfaeril)* — or, it seems, not entirely alone.", "dynamic": false, "auto": null, "onEnter": [{"key": "banter.naeve_ilfaeril.memory_named", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 5}, {"key": "companion.ilfaeril.approval", "op": "AddInt", "amount": 5}], "choices": []}, {"id": "polite", "speaker": "Ilfaeril", "text": "A kind effort. The young always try to fix what only outlasts. Walk on, friend; the road is long, and I have time.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "banter.garrow_varra.mercy", "file": "CampfireBanter.cs", "title": "Banter · Garrow · Varra · Mercy", "start": "0", "nodes": [{"id": "0", "speaker": "Varra", "text": "You spared the Returned at the shrine. Knocked them cold instead of finishing them. Sentiment, grave-digger? From Kelemvor's own?", "dynamic": false, "auto": "1", "onEnter": [{"key": "banter.garrow_varra.mercy.seen", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "Garrow", "text": "Mercy is not sentiment, tiefling. It is the discipline of not becoming the thing you fight. The Wall was built by people very certain they were doing the smaller evil. I will not earn my place in it.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "\"She spared them because they were people once. That's all.\"", "next": "people", "fail": null, "effects": [{"key": "companion.garrow.approval", "op": "AddInt", "amount": 3}]}, {"text": "\"Careful, Garrow. Mercy you can't afford is just a slower kind of cruelty.\"", "next": "hard", "fail": null, "effects": [{"key": "companion.varra.approval", "op": "AddInt", "amount": 4}]}, {"text": "\"...\"", "next": "watch", "fail": null}]}, {"id": "people", "speaker": "Garrow", "text": "Just so. Every soul in that Wall was a person once, dissolving for the crime of doubt. I bury people. I do not unmake them. Not even the ones that try to unmake me.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}, {"id": "hard", "speaker": "Varra", "text": "*(Varra actually nods, surprised.)* ...Huh. The grey priest has teeth. She's right, Garrow — spare a wolf today, bury a shepherd tomorrow. Keep that in the ledger.", "dynamic": false, "auto": null, "onEnter": [{"key": "banter.garrow.mercy_questioned", "op": "SetTrue"}], "choices": []}, {"id": "watch", "speaker": "Garrow", "text": "Mind the dark, both of you. The Returned do not announce themselves. Mercy is for after the danger, never instead of sense.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "banter.maerin_naeve.firsttime", "file": "CampfireBanter.cs", "title": "Banter · Maerin · Naeve · Firsttime", "start": "0", "nodes": [{"id": "0", "speaker": "Maerin", "text": "Naeve — you've lived three hundred years. Does it stop hurting? Coming back, I mean. Remembering the Wall when the others are laughing.", "dynamic": false, "auto": "1", "onEnter": [], "choices": []}, {"id": "1", "speaker": "Naeve", "text": "*(She considers the girl with something gentler than she shows the others.)* No. It does not stop. But it changes shape. The grief becomes a room you learn to live beside, rather than inside. You will furnish it. One day you will even invite people in.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "\"That's the kindest thing I've heard you say.\"", "next": "kind", "fail": null, "effects": [{"key": "companion.naeve.approval", "op": "AddInt", "amount": 4}]}, {"text": "\"Maerin — you don't have to do it alone. None of us came back whole.\"", "next": "together", "fail": null, "effects": [{"key": "companion.maerin.approval", "op": "AddInt", "amount": 5}]}]}, {"id": "kind", "speaker": "Naeve", "text": "*(A faint, real smile.)* Do not tell Varra. I have a reputation as a cold thing, and it keeps people a useful distance away. *(beat)* ...You may stay inside it, though, little Returned. You and I keep the same room.", "dynamic": false, "auto": null, "onEnter": [{"key": "banter.naeve_maerin.same_room", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 3}], "choices": []}, {"id": "together", "speaker": "Maerin", "text": "*(She breathes out, steadier.)* ...Thank you. Both of you. My father always said I loved the world like a free gift. I forgot, for a while, in the dark. I'd like to remember.", "dynamic": false, "auto": null, "onEnter": [{"key": "banter.maerin.remembering", "op": "SetTrue"}], "choices": []}]}, {"id": "banter.roen_ilfaeril.honesty", "file": "CampfireBanter.cs", "title": "Banter · Roen · Ilfaeril · Honesty", "start": "0", "nodes": [{"id": "0", "speaker": "Roen", "text": "You make me twitchy, old one. Ten thousand years and you never lie. A thief can't read a man who's got nothing to hide.", "dynamic": false, "auto": "1", "onEnter": [], "choices": []}, {"id": "1", "speaker": "Ilfaeril", "text": "*(A slow, weathered smile.)* I had ten thousand years to spend every lie I owned, thief. Honesty is simply what is left when one runs out of other currency. You will arrive there too, given time.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "\"He won't lie because there's no one left to lie to. That's not virtue. That's loss.\"", "next": "loss", "fail": null}, {"text": "\"Give it a rest, Roen. Not everyone's running a game.\"", "next": "rest", "fail": null, "effects": [{"key": "companion.ilfaeril.approval", "op": "AddInt", "amount": 2}]}, {"text": "[PERSUADE 14] \"Then tell me one true thing you've never told anyone.\"", "next": "truth", "fail": "declined", "checkDC": 14, "checkAbility": "Charisma"}]}, {"id": "loss", "speaker": "Ilfaeril", "text": "*(The old elf does not flinch.)* ...A sharp grief, well aimed. Yes. There is that, too. Honesty is cheap when the audience is gone. But it is still honesty, and I find I prefer it to the alternative I practiced for an age.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}, {"id": "rest", "speaker": "Roen", "text": "*(He raises his hands.)* Easy, easy. Just professional curiosity. A man who can't be read is the most interesting thing in any room.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}, {"id": "truth", "speaker": "Ilfaeril", "text": "*(He is quiet for the length of three breaths.)* ...I have forgotten her name. The one I did the unforgivable thing for. Ten thousand years, and the face stays, and the name is gone. I have never said that aloud. *(to you)* There. One true thing. Spend it kindly.", "dynamic": false, "auto": null, "onEnter": [{"key": "banter.ilfaeril.forgotten_name", "op": "SetTrue"}, {"key": "companion.ilfaeril.approval", "op": "AddInt", "amount": 7}], "choices": []}, {"id": "declined", "speaker": "Ilfaeril", "text": "Some truths I have carried too long to set down for a parlor trick, thief. Ask me again when you mean it.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "npc.keep.imisk", "file": "CandlekeepDenizensContent.cs", "title": "Npc · Keep · Imisk", "start": "0", "nodes": [{"id": "0", "speaker": "Gatewarden Imisk", "text": "*(An ancient monk at the great doors, who does not look at you, only at a list that may be your soul.)* The toll is a book Candlekeep does not hold. Not coin. Never coin. *(a dry voice, worn smooth by a thousand turnings-away.)* I have heard every substitute. \"A book in my heart.\" \"The book of my life.\" \"Surely my *experiences*—\" No. A *volume.* Bound. Lettered. *Unique.* That is the price of every page behind me, and it has not changed in nine hundred years, and it will not change for a corpse with interesting eyes.", "dynamic": false, "auto": "1", "onEnter": [{"key": "npc.imisk_met", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "Gatewarden Imisk", "text": "*(Now he looks at you, and his gaze is a librarian's — it *catalogues.*)* Though I confess, Returned, you present a *cataloguing difficulty.* *(he frowns.)* You are, yourself, a thing not held in any collection. A soul that walked out of the one archive no one escapes. *(slowly.)* By the strictest reading of the toll... *you* are a unique volume. Unbound. Unlettered. But *unique*, beyond dispute. *(he taps the list.)* I have turned away kings for want of a book. And here stands a *book that turned away the Wall*, asking entry. The doctrine of the toll and the *fact* of you are at war on my own threshold. *(a thin, scholarly thrill.)* I have not been *interested* in nine hundred years. Resolve me. What do you offer?", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "[HISTORY 16] \"Then catalogue me. A firsthand account of the Wall of the Faithless, dictated by the soul that escaped it — a volume that has never existed and never can again.\"", "next": "dictate", "fail": "formal", "checkDC": 16, "checkAbility": "Intelligence"}, {"text": "\"I offer the book I haven't written: my own. Let me in, and Candlekeep gets the only copy, on your shelves, at the end.\"", "next": "wager", "fail": null}, {"text": "\"Garrow carries forty years of funeral rites — every Faithless name the church wanted forgotten. A book that exists nowhere else, because nowhere else dared keep it.\"", "next": "garrowbook", "fail": null, "conditions": [{"key": "prologue.garrow_doubt", "op": "RequireBoolTrue"}]}, {"text": "\"You said I'm a unique volume. By your own toll, I've already paid. Open the doors.\"", "next": "selftoll", "fail": null}]}, {"id": "dictate", "speaker": "Gatewarden Imisk", "text": "*(For the first time in centuries, the ancient monk's composure breaks into something like hunger.)* A firsthand account. From *inside* the Wall. Dictated by the escapee. *(he is already gesturing the great doors open.)* In nine hundred years, no scholar, no king, no god's-own-priest has brought us *that* — the one book the greatest library in the Realms could never acquire, because its only possible author was a thing that *cannot exist.* *(the doors part on a hush like the inside of a thought.)* You will dictate it to our scribes before you leave. Every detail. The niches. The mortar. The voice. *(quietly, reverent.)* You are not paying the toll, Returned. You *are* the toll — the rarest acquisition in the history of acquisitions. Enter. And gods keep you: what you came here to learn is in the Sealed Stacks, and so, I think, is what you *are.*", "dynamic": false, "auto": "close", "onEnter": [{"key": "act2.candlekeep_entered", "op": "SetTrue"}, {"key": "act2.entry_firsthand", "op": "SetTrue"}, {"key": "npc.imisk_awed", "op": "SetTrue"}], "choices": []}, {"id": "wager", "speaker": "Gatewarden Imisk", "text": "*(A slow, scholar's smile — the first in an age.)* A book not yet written, promised to a library that outlasts its authors. *(he weighs it.)* That is either the cleverest toll ever offered at this door or the most arrogant, and in nine hundred years I have learned they are frequently the same thing. *(he opens the doors.)* Done. The bargain is *recorded* — and Candlekeep collects its debts across centuries; we have outlived every author who ever promised us a book and we have outlived their heirs. *(a dry warning.)* So write it, Returned. Whatever you become. The library will be *waiting* for its volume, patient as the Wall, and far less merciful about a missed return.", "dynamic": false, "auto": "close", "onEnter": [{"key": "act2.candlekeep_entered", "op": "SetTrue"}, {"key": "act2.entry_wager", "op": "SetTrue"}, {"key": "npc.imisk_bargain", "op": "SetTrue"}], "choices": []}, {"id": "garrowbook", "speaker": "Gatewarden Imisk", "text": "*(He receives the rites-book from Garrow with both hands, the way one handles a relic or a wound.)* Forty years of the unremembered, named and dated. *(quietly, to Garrow.)* Your church would burn this. *(to you.)* Which is precisely why it belongs *here*, where nothing is unremembered and nothing burns. *(the doors open.)* A book that exists nowhere else because nowhere else had the *nerve.* That is the truest unique volume of all — not the rare, but the *forbidden.* *(he bows slightly to Garrow.)* Sister. The order calls you fallen. The greatest library in the Realms calls you a *source.* I know which assessment outlasts the other. Enter, both of you. What you seek is below.", "dynamic": false, "auto": "close", "onEnter": [{"key": "act2.candlekeep_entered", "op": "SetTrue"}, {"key": "act2.entry_garrow_rites", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 5}], "choices": []}, {"id": "selftoll", "speaker": "Gatewarden Imisk", "text": "*(He considers this with the delight of a logician handed a clean proof.)* By my own toll, you've paid. *(he turns it over.)* The toll requires a unique volume. You are demonstrably unique and arguably a volume. The syllogism *holds.* *(a thin smile.)* And a Gatewarden who will not honor the logical consequence of his own nine-hundred-year rule is a Gatewarden who never believed the rule, only enjoyed the *power* of it. *(the doors open.)* I believed the rule. So I must open the doors to the book that *is* the toll. *(quietly, impressed.)* You argued your way past Candlekeep's gate with Candlekeep's own logic. There are scholars inside who'd have given a finger to manage that. Enter, Returned. You'll find the Sealed Stacks fond of a mind like yours. Possibly *too* fond.", "dynamic": false, "auto": "close", "onEnter": [{"key": "act2.candlekeep_entered", "op": "SetTrue"}, {"key": "act2.entry_logic", "op": "SetTrue"}, {"key": "npc.imisk_impressed", "op": "SetTrue"}], "choices": []}, {"id": "formal", "speaker": "Gatewarden Imisk", "text": "*(He shakes his head, the ancient formality reasserting.)* The framing is too loose for the registry. \"A firsthand account\" — by whom, witnessed how, on what authority? Candlekeep does not catalogue *anecdote.* *(he taps the list.)* Bring me a *form* I can shelve, or a *volume* I can bind, and we'll speak again. The toll is patient. So am I. I have turned away the impatient for nine centuries and felt nothing.", "dynamic": false, "auto": "close", "onEnter": [], "choices": []}, {"id": "close", "speaker": "Gatewarden Imisk", "text": "*(Whatever passed, the ancient monk returns to his list — the soul-shaped ledger of who may enter and who may not — and you carry away the unsettling sense that to Candlekeep, *you* are simply the most interesting acquisition in nine hundred years, and that interest, in a place that keeps everything forever, is its own kind of danger.)*", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "npc.keep.ovid", "file": "CandlekeepDenizensContent.cs", "title": "Npc · Keep · Ovid", "start": "0", "nodes": [{"id": "0", "speaker": "First Reader Ovid", "text": "*(An immensely old man, eyes long since clouded white, seated among more books than a life could hold, reading a blank page with his fingertips and weeping very slightly.)* You walk like someone who's read the last page and didn't care for the ending. *(he does not turn.)* I can hear it. Forty thousand volumes I've taken in, before the eyes went and after, and I learned to *hear* a person's table of contents in their footfalls. Yours has a chapter missing. *(he sets down the blank page.)* I am Ovid. First Reader. I have read everything Candlekeep holds, which is everything that *is* — and I remember *all* of it, every word, which is the gift, and which is the curse, and which, in the end, are the same affliction wearing two faces.", "dynamic": false, "auto": "1", "onEnter": [{"key": "npc.ovid_met", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "First Reader Ovid", "text": "*(He gestures at the blank page he was 'reading.')* This? Empty. Pristine. *(a watery smile.)* The only book in Candlekeep I can bear to read twice. *(quietly.)* You'll think me mad. But understand — I forget *nothing.* Every cruelty in every history, every name in every massacre, every last word of every dying poet, *all of it*, perfect, permanent, *playing at once* behind these dead eyes. The blank page is the only *silence* I have. *(he turns toward you.)* And *you*, Returned — you are a soul the Wall could not *file*, could not *fix in the record.* You are, to me, the most *restful* thing imaginable: an *un-remembered.* A person the great archive of death could not force to remember itself. *(achingly.)* Tell me. What is it like, to have a chapter that *won't stay written*? I should give every volume I hold to forget even one.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "[INSIGHT 18] \"You don't want to forget the histories. You want to forget *one* thing — a name, a face — and you've read forty thousand books trying to bury it under everything else.\"", "next": "oneface", "fail": "scholar", "checkDC": 18, "checkAbility": "Wisdom"}, {"text": "\"The missing chapter isn't peace, Ovid. It's a hole where my own name should be. We'd trade afflictions and both regret it.\"", "next": "trade", "fail": null}, {"text": "\"You've read everything. Then you know what the Crown is. What you are too frightened to say aloud.\"", "next": "crown", "fail": null}, {"text": "\"Read me, then. If my footfalls have a table of contents, tell me how the book ends.\"", "next": "readme", "fail": null}]}, {"id": "oneface", "speaker": "First Reader Ovid", "text": "*(The blind man goes utterly still, and a tear tracks down into the white of his eyes.)* ...One thing. *(barely a whisper.)* You read *me*, who has read everything. *(his ancient hands tremble on the blank page.)* Her name was — *(he stops; even now he cannot.)* No. You see? I cannot *forget* it, and I cannot *say* it, and I have read forty thousand volumes, *built a wall of every word in the world*, trying to bury one face beneath the entire library, and it *floats*, Returned, it floats to the top of all that knowledge like the only thing that was ever *true.* *(he weeps, silent and vast.)* That is the secret of the great archive. We don't gather knowledge to *know.* We gather it to *drown* the one thing we can't bear to remember. And it never, ever works. The blank page is the only mercy. The blank page, and you — the un-remembered, the chapter that won't stay. Stay a moment. Let an old reader sit beside the one soul that gets to *forget.* It's the rarest book in the world, and you don't even know you're holding it.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.ovid_one_face", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "trade", "speaker": "First Reader Ovid", "text": "*(He laughs, wet and ancient.)* We'd trade and both regret it. *(quietly.)* Of course we would. You'd take my perfect memory and drown in forty thousand cruelties; I'd take your blessed gap and find it's a *wound*, not a *window.* *(he nods, slow.)* The young always think the other person's affliction is the cure for their own. I read that error in ten thousand volumes before I learned it in my own bones. *(he touches the blank page.)* No. We keep our afflictions, you and I, and we sit together a moment — the man who can't forget and the soul that can't be remembered — and we are, briefly, the only two people in the Realms who understand that *memory* and *oblivion* are not opposites. They're the same hunger, starving from different ends.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.ovid_wisdom", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 2}], "choices": []}, {"id": "crown", "speaker": "First Reader Ovid", "text": "*(The white eyes widen.)* ...You ask the Reader to *say* it. *(he lowers his voice, though there's no one to hear in the hush.)* I have read every fragment, every heresy, every page the church tried to burn and we kept anyway. So yes. I know what the Crown is. *(a long, frightened pause.)* It is *Myrkul*, Returned — the dead god of the dead, unmade and folded into bone, waiting for a vessel. And it does not *command*; it *persuades*, in the vessel's own voice, so that every monstrous step feels like the wearer's own good sense. *(he grips your sleeve, blind and urgent.)* I have read forty thousand books and the most dangerous sentence in all of them is *\"it was my own idea.\"* When you find the Crown — and you will, your footfalls bend toward it — *distrust your own reasonableness.* That's the only defense the archive offers. The wisest will fall hardest, because the wisest are the most certain their thoughts are *theirs.*", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.ovid_crown_warning", "op": "SetTrue"}, {"key": "crown.is_myrkul", "op": "SetTrue"}], "choices": []}, {"id": "readme", "speaker": "First Reader Ovid", "text": "*(He turns his blind face to you, and his fingertips lift as if to read the air around you.)* Read you. *(slowly.)* Your table of contents... *(his hands trace shapes only he perceives.)* ...repeats. The same chapters, over and over, in a different hand each time, growing wearier. A book that has been *rewritten*, Returned — many times, by many *yous* — and the ending is always the same, save for one chapter that's never the same twice, because it's never been *finished.* *(he lowers his hands, troubled.)* I cannot read the unfinished chapter. No one can. It hasn't been *written* yet. *(quietly.)* And that, in a man who's read everything, is either the most frightening sentence I know — or the most *hopeful.* For once in forty thousand volumes, I cannot tell you how it ends. Go and *write* it, un-remembered one. Surprise the only reader who's read it all.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.ovid_reads_the_loop", "op": "SetTrue"}, {"key": "act3.lr_loop_revealed", "op": "SetTrue"}, {"key": "act3.seek_the_unrecorded_act", "op": "SetTrue"}], "choices": []}, {"id": "scholar", "speaker": "First Reader Ovid", "text": "*(He inclines his head, the white eyes giving nothing.)* A reasonable guess, but loosely sourced. *(gently.)* I am a scholar, Returned; my griefs are catalogued and shelved like everything else. *(he returns his fingertips to the blank page.)* Come back when your question has a citation. I do so prefer a well-footnoted intrusion to a sentimental one.", "dynamic": false, "auto": "close", "onEnter": [], "choices": []}, {"id": "close", "speaker": "First Reader Ovid", "text": "*(He bends back over the blank page, reading the one silence in all of Candlekeep with his fingertips — the man who knows everything, seeking the single mercy of a thing not written, and finding it, briefly, in the company of a soul that the world's great archive of the dead could not force to remember itself.)*", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "npc.keep.acquisitions", "file": "CandlekeepDenizensContent.cs", "title": "Npc · Keep · Acquisitions", "start": "0", "nodes": [{"id": "0", "speaker": "Brother Faolan", "text": "*(A wiry monk practically vibrating with want, who appraises you the way the Weeping Auctioneer never could — as a potential *acquisition.*)* You're new. New people *carry* things. *(he circles you.)* Letters, ledgers, a grandmother's recipe-book, a *diary* — anything *unique*, anything Candlekeep doesn't hold, I want it, I'll *trade* for it, I'll trade *generously*, I'll trade things I absolutely should not. *(he lowers his voice.)* The Gatewarden takes the toll, but *I'm* the one who decides what counts as a *book*, and I have grown — let us say *flexible* — in my definitions, because Acquisitions is judged on *accessions*, and accessions have been *thin*, and I will go *quietly mad* if I don't catalogue something new this month.", "dynamic": false, "auto": "1", "onEnter": [{"key": "npc.faolan_met", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "Brother Faolan", "text": "*(He wrings his hands.)* Here is my difficulty, and my offer. There exists *one* book that would make my career — secure my place among the First Readers, vindicate twenty years of *thin accessions* — the *Catalogue of the Unwritten*, a volume that lists every book that was *meant* to be written and never was. The poems the plague took before they were penned. The confessions that died with the confessor. *(his eyes shine.)* It is held in the Sealed Stacks, and the Stacks won't open for a mere monk — but they'd open for a *Returned*, a soul the record couldn't keep. *(he grips your arm.)* Bring me the Catalogue of the Unwritten, and I will trade you anything in my power: passage, secrets, the location of the *other* thing you seek down there. I want the book of the *never-written* more than I want my own salvation. Twenty years of thin accessions does that to a monk.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "[INSIGHT 15] \"You don't want the book to make your career. You want it because *you're* in it — a poem you meant to write, before you took your vows and went quiet.\"", "next": "ownpoem", "fail": "deflect", "checkDC": 15, "checkAbility": "Wisdom"}, {"text": "\"I'll bring you the Catalogue — if you swear it's read, not hoarded. The unwritten deserve readers, not a locked case.\"", "next": "read", "fail": null, "effects": [{"key": "sq.faolan_catalogue", "op": "SetTrue"}]}, {"text": "\"A book of everything never written. Brother, that's the saddest object in the Realms, and you want to *shelve* it.\"", "next": "saddest", "fail": null}, {"text": "\"What's the *other* thing in the Stacks? The thing you'll trade the location of?\"", "next": "other", "fail": null}]}, {"id": "ownpoem", "speaker": "Brother Faolan", "text": "*(He stops vibrating. Goes very still.)* ...You weren't supposed to be able to see that. *(quietly, the acquisitive fever draining.)* Yes. Before the vows. I was going to write — something. A cycle of poems, about my mother, about the sea at Baldur's Gate, about — *(he falters.)* And then I took orders, and orders fill the hours, and the poems went *unwritten*, year on year, until they were just... an ache where a book should be. *(he looks at his ink-stained, scholarly hands.)* The Catalogue of the Unwritten lists *my* poems. The ones I'll never write now. I want to hold the book that proves they *almost existed* — proof that I was, for one young moment, a person with something to *say*, before I became a person who *files what others said.* *(his voice cracks.)* It's not for my career, Returned. It's so I can read the one page that's *mine* — the books I was, before I shelved myself. Bring it to me. Please. Let me see who I almost was.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.faolan_the_unwritten_self", "op": "SetTrue"}, {"key": "sq.faolan_catalogue", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 3}], "choices": []}, {"id": "read", "speaker": "Brother Faolan", "text": "*(He hesitates — every instinct of Acquisitions is to *hoard* — then, with visible effort, nods.)* Read, not hoarded. *(quietly.)* You ask a great deal. My whole *order* is built on the principle that a book *secured* is a book *saved* — that to lock it in Candlekeep is to grant it eternity. *(he wrestles with it.)* But the *Unwritten*... the poems that died unborn, the confessions that went silent — they died of *not being heard.* To lock *them* away unread would be to kill them a second time, the same way they died the first: in *silence.* *(he straightens, a vow forming.)* Yes. I swear it. Bring me the Catalogue, and I will *read* it — aloud, in the great hall, every unwritten title — so the books that never got to exist get, at least, to be *spoken once.* That's not acquisition. That's a *funeral*, finally, for everything the world meant to make and didn't. Twenty years of thin accessions, and you've handed me the one that *matters.*", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.faolan_will_read", "op": "SetTrue"}, {"key": "sq.faolan_catalogue", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 3}], "choices": []}, {"id": "saddest", "speaker": "Brother Faolan", "text": "*(He pauses, the fever cooling into something more honest.)* The saddest object in the Realms. *(slowly.)* ...You're right, of course. A catalogue of everything that *almost was.* Every genius the plague took at nineteen. Every masterwork the war interrupted. Every kindness someone *meant* to write down and forgot. *(quietly.)* And I want to *shelve* it, file it, make it *safe* — because that's the only thing my order taught me to do with grief: *catalogue* it. *(he looks at you.)* You've named the disease of this whole place, Returned. We don't *read* the sorrow of the unwritten. We *acquire* it, and shelve it, and call the locking-away *preservation.* *(a long breath.)* Bring me the Catalogue anyway. But you've made me wonder whether the unwritten want a *shelf*... or a *voice.* I'll think on it. Twenty years a monk and a corpse has me reconsidering the whole of my vocation. The Stacks have a sense of humor. Or the dead do.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.faolan_reconsiders", "op": "SetTrue"}, {"key": "sq.faolan_catalogue", "op": "SetTrue"}], "choices": []}, {"id": "other", "speaker": "Brother Faolan", "text": "*(He glances about, then leans close.)* The *other* thing. *(barely audible.)* In the deepest Sealed Stack, behind the Catalogue, there is a book that *reads itself* — that turns its own pages, in a hand that changes, telling the same story with a different ending each time. *(he shivers.)* The First Reader won't speak of it. The Gatewarden pretends it's not catalogued. But I keep the accession ledgers, and I know what's down there. *(he meets your eyes.)* It's about *you*, Returned. Or a *you.* The self-reading book. Bring me the Catalogue of the Unwritten, and I'll guide you to the book that's writing *your* unfinished chapter, over and over, looking for the page it's never managed to turn. *(quietly.)* Acquisitions knows where everything is. Even the things that wish they weren't anywhere at all.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.faolan_knows_the_book", "op": "SetTrue"}, {"key": "sq.faolan_catalogue", "op": "SetTrue"}, {"key": "act3.lr_loop_revealed", "op": "SetTrue"}], "choices": []}, {"id": "deflect", "speaker": "Brother Faolan", "text": "*(He waves a hand, the fever covering for him.)* A poem! Me! No, no — *career*, Returned, pure ambition, twenty years of thin accessions, nothing so *maudlin* as a — *(he's vibrating again, too fast.)* Just bring me the book. The Catalogue. That's all. Career. Accessions. Nothing else. Off you go.", "dynamic": false, "auto": "close", "onEnter": [], "choices": []}, {"id": "close", "speaker": "Brother Faolan", "text": "*(He returns to his ledgers of want, a man who shelved his own unwritten self twenty years ago and has spent every day since acquiring everyone else's — and you carry away the strange certainty that the saddest library in the world is the one each of these scholars keeps locked inside their own abandoned youth.)*", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "npc.keep.henwick", "file": "CandlekeepDenizensContent.cs", "title": "Npc · Keep · Henwick", "start": "0", "nodes": [{"id": "0", "speaker": "Henwick", "text": "*(A dusty, mild man standing very upright on a library shelf, between two actual books, with a catalogue-tag tied to his toe.)* Don't reshelve me. *(he says it wearily, before you can speak.)* Everyone tries to reshelve me. I am, technically, currently, *correctly* shelved. Section H, \"Histories, Personal, Unreliable.\" *(he sighs.)* Sixty years ago a junior cataloguer — gods rest his thorough little soul — recorded me as a *primary source* rather than a *person*, accessioned me into the collection, and assigned me a *call number.* And Candlekeep, Returned, does not *deaccession.* It is easier to amend the laws of the gods than to remove a thing from this catalogue once it's been *entered.* So. Here I stand. Henwick. Call number HEN-440.7. A man, legally, a *book.*", "dynamic": false, "auto": "1", "onEnter": [{"key": "npc.henwick_met", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "Henwick", "text": "*(He adjusts his catalogue-tag with dignity.)* You'd think it a tragedy. *(mildly.)* It has its compensations. I am *very* well preserved — the climate controls are excellent. I am *consulted* — scholars come to read me, which is more attention than most men get. And I am, by the strictest reading of Candlekeep law, *immortal*, because the catalogue is eternal and I am *in* it. *(a small, dusty smile.)* The harvest cannot take me, you see. The Wall cannot file me. I'm already *filed* — correctly, here, in Section H. The one soul in the Realms the death-cult cannot touch, because a clerical error sixty years ago made me a *reference work.* *(he peers at you.)* You're a Returned. A soul the *other* archive couldn't keep. We're cousins, you and I — both saved by a *filing* the system can't undo. Only yours was an escape, and mine was an *accession.* I do envy you the legs.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "[INSIGHT 14] \"You stay on the shelf because down there, you'd be a lonely old man — but *here*, you're consulted, preserved, needed. The misfiling gave you the one thing life didn't: a *place.*\"", "next": "place", "fail": "mild", "checkDC": 14, "checkAbility": "Wisdom"}, {"text": "\"I could get you deaccessioned. Restored to a person. Would you even want it?\"", "next": "deaccession", "fail": null}, {"text": "\"You're proof the harvest can be *out-filed*. The Wall files the forgotten — but a thing properly *catalogued* can't be unmade. That's a weapon.\"", "next": "weapon", "fail": null, "effects": [{"key": "companion.naeve.approval", "op": "AddInt", "amount": 3}]}, {"text": "\"Sixty years a book. What have you learned, HEN-440.7, that the histories around you haven't?\"", "next": "learned", "fail": null}]}, {"id": "place", "speaker": "Henwick", "text": "*(The dusty composure softens.)* ...A *place.* *(quietly.)* You've read me better than the scholars do. *(he looks down the long shelf.)* Yes. Before the misfiling, I was a *minor* historian, unmarried, unremarkable, the sort of man who dies and leaves a thin volume and a thinner estate and no one to mind either. *(he touches his catalogue-tag.)* And then a junior clerk made his thorough little error, and *suddenly* — I was *kept.* Climate-controlled. Consulted. *Necessary.* I had spent sixty years *failing* to matter, and a *mistake* did in an afternoon what my whole life couldn't: it filed me somewhere I'd be *missed* if I went absent. *(a watery smile.)* So no, Returned. Don't reshelve me. Don't restore me. The shelf is the only place I was ever *wanted.* It took being mistaken for a book to make a forgettable man *unforgettable.* I'd not trade it for legs and loneliness. Not for anything. Section H is *home.*", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.henwick_belongs", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 3}], "choices": []}, {"id": "deaccession", "speaker": "Henwick", "text": "*(He recoils, gripping the shelf-edge.)* Deaccessioned. *(with quiet horror.)* You'd — restore me to a *person.* A free, *mortal*, *forgettable* person. *(he shudders.)* And then the harvest could take me, and the Wall could file me, and when I died — soon, I'm seventy-four — I'd be *forgotten*, like the minor historian I was always going to be, instead of *preserved* forever as HEN-440.7. *(he shakes his head, firm.)* No. *No.* You mean it kindly, and it is the cruelest mercy ever offered me. *(quietly.)* The misfiling is the only thing standing between Henwick and the nothing. Leave me misfiled, Returned. Leave me wrong. Being *wrongly kept* is infinitely better than being *rightly lost.* That's the whole secret of this place — and, I begin to suspect, of you.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.henwick_refuses", "op": "SetTrue"}], "choices": []}, {"id": "weapon", "speaker": "Henwick", "text": "*(His mild eyes sharpen with sudden scholarly excitement.)* A *weapon.* *(he leans forward on his shelf.)* You've seen it. The principle. *(rapidly, the historian waking.)* The Wall files the *forgotten* — souls with no record, no claim, no entry. The nothing *needs* the nothing; it can only take what isn't *kept somewhere else.* But a soul *properly catalogued* — entered, called-numbered, *referenced* — cannot be unmade, because to unmake it would create a *gap in the record*, and the universe, Returned, *abhors a dangling reference* even more than a vacancy. *(he's almost vibrating.)* That's why *I* can't be harvested. And that's how you fight the Wall — not by *freeing* the Faithless, but by *cataloguing* them. Enter them somewhere. Give them a call number. A name in a ledger the world can't deaccession. *(quietly, urgent.)* Tell the child with the list. Tell the auctioneer with the ledger. They're not *mourning* the forgotten. They're *out-filing the Wall.* And it's *working.* Henwick, HEN-440.7, mild and misfiled, has been the proof for sixty years.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.henwick_the_principle", "op": "SetTrue"}, {"key": "act2.cataloguing_defeats_the_wall", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "learned", "speaker": "Henwick", "text": "*(He considers, between his two book-neighbors.)* Sixty years a book. *(slowly.)* I've learned what the histories around me can't say, because they're *finished* and I'm still *accruing.* *(he taps a neighbor volume.)* This one's a chronicle of a war. Closed. Certain. Knows exactly how it ended. *(he taps his own chest.)* But *I* don't know how I end, because I'm not *done* — I'm a history still being *lived*, shelved among histories already *concluded.* *(quietly, profoundly.)* And what I've learned, Returned, sixty years among the finished, is this: *the certain ones are the dead ones.* A thing that knows exactly how its story goes is a thing whose story is *over.* The only *living* book on this shelf is the one that doesn't know its own ending. *(he looks at you, the un-finished soul.)* Which makes *you* the most alive thing to walk these stacks in an age. Stay unfinished, Returned. It's the only immortality that's actually worth having. The other kind — *(he gestures at the closed histories)* — is just a very tidy grave.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.henwick_wisdom", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 2}], "choices": []}, {"id": "mild", "speaker": "Henwick", "text": "*(He smiles, dusty and unbothered.)* A pleasant theory. *(mildly.)* But I'm simply a misfiled man making the best of an immortal clerical error. No deeper pathos required. *(he adjusts his tag.)* Do mind the shelf on your way. And if you see a junior cataloguer, send him along — I've a *correction* to *not* request.", "dynamic": false, "auto": "close", "onEnter": [], "choices": []}, {"id": "close", "speaker": "Henwick", "text": "*(He settles back between his book-neighbors, HEN-440.7, mild and misfiled and unforgettable — a man saved from oblivion by a mistake, who would not be corrected for the world — and you carry his principle down toward the Sealed Stacks like a key: *the Wall can only take what nothing else has kept.*)*", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "npc.keep.revenant", "file": "CandlekeepDenizensThreeContent.cs", "title": "Npc · Keep · Revenant", "start": "0", "nodes": [{"id": "0", "speaker": "A Voice From the Margins", "text": "*(The sealed stacks are walled in iron and silence. Behind the grate, something that was once a person — paper-thin, ink-dark, more marginalia than man — turns its eyeless face toward you and *recognizes* you, the way one mirror recognizes another.)* ...You're warm. *(a sound like a page turning underwater.)* You're *warm*, and you came *down here*, which means you've started reading the margins. Good. I wrote them. *(the thing presses a hand of dried vellum to the grate.)* I am what's left of the one who came before you, Returned. I walked the road you're walking. I reached the Court of the Dead. And I am *here* now — sealed in the stacks, indexed under *Cautionary* — because I made the choice you are about to be offered, and it was the *wrong* one.", "dynamic": false, "auto": "1", "onEnter": [{"key": "npc.revenant_met", "op": "SetTrue"}, {"key": "act2.predecessor_found", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "The Sealed-Stacks Revenant", "text": "*(It speaks faster now, as if afraid it will be reshelved mid-sentence.)* Listen — they don't seal you for *failing.* Failing's easy, failing just kills you and the loop starts fresh with a new fool. They seal you for *almost winning the wrong way.* *(the vellum hand trembles.)* I stood before the Wall. I was *offered the crown* — the Crown of Horns, the authority over the dead, the power to *re-sort* every soul by my own better judgment. And I took it. I thought: *I* will be the merciful sorter. *I* will judge rightly where the gods judged cruelly. *(a sound of terrible grief.)* And the moment I wore it, Returned, I *became the Wall.* A kinder Wall. A Wall that *agonized.* But a Wall. Because the crown doesn't let you *end* the sorting — it only lets you *do it better*, forever, and *better forever* is still *forever.* They sealed me here so the next Returned could *read what I learned* before reaching for the same bright ruin. *Don't take the crown.* Whatever else you do. The crown is the trap that looks like the answer.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "[INSIGHT 18] \"You didn't fail and you didn't win. You're a *warning the system files on purpose*. The Wall *keeps* a cautionary predecessor so each Returned arrives pre-discouraged. You're bait, and you know it.\"", "next": "bait", "fail": "grieve", "checkDC": 18, "checkAbility": "Wisdom"}, {"text": "\"If not the crown, then what? You walked further than anyone. Tell me the road past the place you fell.\"", "next": "road", "fail": null}, {"text": "\"Give me the margins. All of them. Every note you scratched. I'll read what it cost you to learn.\"", "next": "margins", "fail": null, "effects": [{"key": "sq.read_the_margins", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 3}]}, {"text": "\"You wore it and you *agonized*. That's not nothing. A Wall that grieves is one crack from a Wall that *stops*.\"", "next": "grieve", "fail": null}]}, {"id": "bait", "speaker": "The Sealed-Stacks Revenant", "text": "*(The eyeless face goes very still.)* ...Bait. *(the page-turn sound, slow.)* You read *that* in the margins too, then. The note I almost scratched out. *(quietly.)* Yes. I worked it out in my third decade behind this grate. They didn't seal me to *warn* you — warning me would mean they *want* you to win, and they do not. They sealed me because a Returned who meets a *broken predecessor* arrives at the Wall already half-convinced it can't be done. *(a sound like dry laughter.)* I am *demoralization*, indexed and shelved. The most efficient thing the Wall ever did was keep one of us *alive enough to despair at.* *(the vellum hand flattens on the grate, and its voice changes — fierce, freed.)* But here is the thing they didn't count on, Returned: *a piece of bait that knows it's bait can change what it says.* I was *meant* to tell you it's hopeless. *(slowly.)* I'm telling you instead: it can be done. Just *not with the crown.* I've spent forty years rewriting my own warning into a *map.* Read the margins. I turned the trap into directions while they thought I was just decaying.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.revenant_is_bait", "op": "SetTrue"}, {"key": "sq.read_the_margins", "op": "SetTrue"}, {"key": "act2.predecessor_freed", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 5}], "choices": []}, {"id": "road", "speaker": "The Sealed-Stacks Revenant", "text": "*(It is quiet a long moment, gathering the most expensive thing it knows.)* The road past the crown. *(softly.)* I only glimpsed it, in the half-second before I reached for the bright thing instead. *(the vellum hand traces a shape on the grate.)* The crown offers you *authority over* the dead — to sort them *better.* But there is another thing in that room, Returned, smaller, dimmer, almost hidden behind the crown's glare. *(quietly.)* It is the authority to *un-make the office entirely.* To not be a *better* sorter but the *last* one. To take the crown and *break* it, knowing that breaking it strips you of every power it offered — that you save the dead by making yourself *unable to rule them*, which means you cannot protect them after, which means you must *trust* what comes when no one sorts at all. *(a sound of unbearable longing.)* I couldn't do it. The crown was *certain* and the breaking was a *leap into dark.* I chose certainty. That's why I'm shelved. *(fiercely.)* You take the leap. Promise a dead thing behind a grate that *you'll take the leap.*", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.revenant_the_road", "op": "SetTrue"}, {"key": "act2.break_the_crown_known", "op": "SetTrue"}, {"key": "prologue.crack_seeded", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 5}], "choices": []}, {"id": "margins", "speaker": "The Sealed-Stacks Revenant", "text": "*(Relief floods the paper-thin face.)* Yes — *yes* — take them, read them, they're scratched in every cautionary volume in this stack, forty years of a dead fool's working-out. *(the vellum hand sketches frantically.)* The notes will tell you which gods *quit* and which still *care*; which faces at the Court can be *turned* and which are only painted on; the *exact* words the Wall uses to make taking the crown feel like *mercy.* *(quietly.)* I wrote them for you, you understand. Not for *me* — I was already lost when I started scratching. I wrote them the way a man falling down a well carves handholds *below* himself, for whoever falls next. *(its voice softens to almost nothing.)* That's the only afterlife I get, Returned. Not the crown. Not rest. Just the chance that my *forty years of failing usefully* become the reason *you* don't fail. Read the margins. Make me worth the shelving.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.revenant_gives_margins", "op": "SetTrue"}, {"key": "sq.read_the_margins", "op": "SetTrue"}, {"key": "act1.mercy_remembered", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "grieve", "speaker": "The Sealed-Stacks Revenant", "text": "*(The eyeless face turns away, and the silence stretches.)* A Wall that grieves. *(barely audible.)* I *did* grieve. Every soul I re-sorted, even mercifully, even *weeping* — I felt each one. I thought the grief *redeemed* the office. *(a sound of ash.)* It does not. Grief that *continues the thing it grieves* is just *suffering with good manners*, Returned. The dead I sorted kindly were *still sorted.* My tears changed the *temperature* of the Wall, not its *function.* *(it faces you again, and the warning is total.)* Do not mistake *feeling bad about a cruelty* for *ending* it. The crown will *let* you grieve — will *encourage* it, because a grieving sorter is a *committed* sorter, one who'll never quit because quitting would *waste* all that beautiful pain. *(quietly.)* My grief is the chain. Don't pick up a crown that runs on tears. *Yours* would be just as bright, and just as binding.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.revenant_grief_warning", "op": "SetTrue"}], "choices": []}, {"id": "close", "speaker": "The Sealed-Stacks Revenant", "text": "*(The thing behind the grate settles back into the dark of the sealed stacks — half man, half marginalia, the indexed warning that learned to rewrite itself into a map — and you climb back toward the lamplight carrying the one piece of knowledge the whole library was built to keep from you: that the crown at the end of the road is the *trap*, not the prize, and the one who came before you spent forty years of decay making certain you'd know it.)*", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "npc.keep.cat", "file": "CandlekeepDenizensThreeContent.cs", "title": "Npc · Keep · Cat", "start": "0", "nodes": [{"id": "0", "speaker": "A Grey Cat on a Closed Book", "text": "*(A large grey cat sits with deliberate, possessive weight upon a single closed volume, regarding you with the flat patience of a creature that has watched a great many warm things come and go. As you near, it does not run. It *blinks*, slowly, which from a cat is either a benediction or an appraisal, and you feel — absurdly, certainly — that it has *decided something* about you.)*", "dynamic": false, "auto": "1", "onEnter": [{"key": "npc.cat_met", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "The Cat Who Reads", "text": "*(The cat does not speak — cats don't — but its eyes track yours, and it shifts, very slightly, so the title of the book beneath it shows for one heartbeat before its paw covers it again. It is the book. The dangerous one. The one you came for. And the cat is *sitting on it*, watching you understand, entirely unhurried.)* *(A monk passes, murmurs:)* \"Don't mind Margin. She's the oldest thing in Candlekeep — older than the First Reader, some say. Animals aren't *judged*, you see, never sorted, so she's the one creature here that simply... goes *on.* She's watched every reader who ever opened *that* book.\" *(the monk lowers his voice.)* \"And she sits on it now because the last one who read it died at this table. She sat with the body three days before anyone came. She *liked* him.\"", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "[SPEAK-WITH-ANIMALS] \"*(crouch, meet the cat's eyes, and speak the small magic that lets you hear her)* Margin. May I read your book?\"", "next": "speak", "fail": null}, {"text": "[HANDLE-ANIMAL 15] \"*(slow blink back; offer the back of your hand; let her decide if you're worth the book)*\"", "next": "earn", "fail": "hiss"}, {"text": "\"*(reach, carefully, for the book beneath her)*\"", "next": "grab", "fail": null}, {"text": "\"Three days with the body. I'm sorry, Margin. He must have been kind.\"", "next": "mourn", "fail": null, "effects": [{"key": "companion.naeve.approval", "op": "AddInt", "amount": 2}]}]}, {"id": "speak", "speaker": "The Cat Who Reads", "text": "*(The magic catches, and the cat's regard arrives in your mind not as words but as *weights* — pressures of meaning, ancient and dry and grieving.)* *You are warm and you will go cold. They all go cold. I sit on the cold ones until someone comes.* *(she does not move from the book.)* *This one killed the last warm thing that opened it. Not the book. The* knowing *in it. He read what it said and his heart could not hold the size of it and it stopped.* *(her tail curls.)* *I have watched ten thousand readers. I cannot read. I do not need to. I know which books make the warm things go cold, and I sit on those, because I am the only one here who* remembers each of them *and the library only remembers the* books. *(slowly, she rises, and steps off the volume.)* *You may read it. You have the smell of a thing already half-cold — it cannot kill you the way it killed him; you are past the place where knowing stops a heart.* *(she watches you, ancient.)* *But sit when you read it. So that when you are cold, you will already be where I can reach you.*", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.cat_speaks", "op": "SetTrue"}, {"key": "sq.dangerous_book_access", "op": "SetTrue"}, {"key": "act2.the_book_known", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 3}], "choices": []}, {"id": "earn", "speaker": "The Cat Who Reads", "text": "*(She considers your hand with the gravity of a magistrate. A long moment. Then she leans, and presses the side of her face — once, deliberately — against your knuckles, marking you as a thing she has chosen to allow. She steps off the book.)* *(The passing monk stops dead.)* \"...She *moved.* For *you.* In sixty years I have seen her step off that book for exactly no one. She sits on it because she decides who's *ready*, and she has decided *no one* was ready, ever, until — \" *(he stares at you.)* \"What *are* you?\" *(The cat, for her part, has already returned to washing one paw, her work of judgment concluded. The book is yours to read. Her permission, you understand, is the only ward Candlekeep ever truly trusted.)*", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.cat_allows", "op": "SetTrue"}, {"key": "sq.dangerous_book_access", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "grab", "speaker": "The Cat Who Reads", "text": "*(Your fingers reach the book's edge — and the cat does not hiss, does not scratch, merely *looks*, and the look is so old and so unsurprised and so *disappointed* that your hand stops on its own. The monk hisses a warning too late.)* \"Don't — the ones who *take* it instead of *ask*, that's — that's how the *last* one started, he grabbed it off her too, and three days later — \" *(The cat steps off the book of her own accord, having made her point: she was never the lock. She was the *warning.* She lets you take it. She simply wants you to know she let the last warm thing take it too, and sat with him after.)*", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.cat_disappointed", "op": "SetTrue"}, {"key": "sq.dangerous_book_access", "op": "SetTrue"}], "choices": []}, {"id": "mourn", "speaker": "The Cat Who Reads", "text": "*(The cat goes still under your soft words. Then — slowly, the way a very old creature does anything — she rises, turns three times, and settles again, but this time facing *you*, the book half-uncovered between her paws like an offering she hasn't decided to give. Her purr starts: a low, dust-dry sound, the sound of the one mourner in a library that does not mourn.)* *(The monk whispers:)* \"She's *purring.* She purrs for the dead, mostly. For *him*, when she thinks no one's near. I think — I think she's deciding you're someone she'll have to sit with, someday. That's how she loves things. By agreeing, in advance, to keep their bodies company.\" *(The cat blinks at you, slow and final, and nudges the book a half-inch closer.)*", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.cat_mourns", "op": "SetTrue"}, {"key": "sq.dangerous_book_access", "op": "SetTrue"}, {"key": "act1.mercy_remembered", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 3}], "choices": []}, {"id": "hiss", "speaker": "The Cat Who Reads", "text": "*(You move too fast, or want it too plainly, and the cat flows backward onto the book with a single warning sound — not anger, just *no* — and settles immovably, eyes half-lidded, having reclassified you as Not Yet. The monk winces.)* \"Ah. She's decided you're not ready. She's never wrong about that, I'm afraid. Come back when you've... I don't know. *Changed.* She'll know before you do.\" *(The cat begins, pointedly, to wash, the audience concluded.)*", "dynamic": false, "auto": "close", "onEnter": [], "choices": []}, {"id": "close", "speaker": "The Cat Who Reads", "text": "*(The grey cat resumes her vigil on the dangerous book — the oldest unjudged thing in Candlekeep, the one mourner in the house of memory, who guards the lore not with claws but with the simple, devastating fact that she remembers every reader the books forgot, and intends to sit with each of them when they go cold.)*", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "npc.keep.pol", "file": "CandlekeepDenizensThreeContent.cs", "title": "Npc · Keep · Pol", "start": "0", "nodes": [{"id": "0", "speaker": "Scrivener Pol", "text": "*(A young copyist in a back alcove, ink to the elbows, who startles so violently at your approach that he knocks a candle and catches it mid-fall with the reflexes of a man who lives expecting to be caught.)* I'm not — this isn't — *(he sees you're no monk, and the panic curdles into wary calculation.)* ...You're the Returned. The one everyone's whispering about. *(he glances down the corridor, then back, lowering his voice to a thread.)* Then you'll want what I sell. Forbidden pages. Copied clean, no questions, half what a fence would charge — the things Candlekeep *seals* and pretends it doesn't have. *(his hands shake.)* I need the coin. Don't ask why. Everyone asks why. Just — do you want the pages or not?", "dynamic": false, "auto": "1", "onEnter": [{"key": "npc.pol_met", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "Scrivener Pol", "text": "*(He doesn't wait for an answer — terror makes him talk.)* I started two years ago. My sister's debt — the bad kind, the kind with men who *visit.* And I'm a *copyist*, it's the one thing I have, so I started copying the sealed pages by candlelight and selling them, and it *worked*, it paid the men, and I told myself I wasn't *reading* them, just *copying*, just letters, just *shapes.* *(his voice cracks.)* But you can't copy ten thousand words without *some* of them getting *in*, and the things they sealed, Returned — the things Candlekeep decided no one should read — *they're not dangerous spells.* Most of them. They're *true things.* About the Wall. About the Faithless. About what the gods *quietly stopped doing.* *(he stares at his ink-black hands.)* I'm a frightened man copying out the truth for coin, and somewhere in the last two years I *started believing it*, and now I can't stop copying because *someone has to be leaking this*, and I am going to *die* for pages I only meant to *sell.*", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "[INSIGHT 16] \"You're not a smuggler anymore, Pol. You're a *whistleblower* who hasn't admitted it. The coin stopped being the reason a while ago. You copy them now because they're *true.*\"", "next": "whistleblower", "fail": "deny", "checkDC": 16, "checkAbility": "Wisdom"}, {"text": "[PERSUADE 15] \"Then leak them *properly.* Not one page to one buyer — *all* of them, copied wide, nailed where the city reads. Make the dying *count* for something more than your sister's debt.\"", "next": "leak", "fail": "scared", "checkDC": 15, "checkAbility": "Charisma"}, {"text": "\"Your sister's debt. Tell me the number. Maybe the leaking and the paying don't have to be the same desperate thing.\"", "next": "sister", "fail": null, "effects": [{"key": "companion.garrow.approval", "op": "AddInt", "amount": 2}]}, {"text": "\"Give me the pages. The true ones. I'll carry the truth where it does more than pay a debt.\"", "next": "pages", "fail": null, "effects": [{"key": "sq.pol_pages", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 2}]}]}, {"id": "whistleblower", "speaker": "Scrivener Pol", "text": "*(He goes white, then very still, the word landing like a verdict he's been avoiding.)* A whistleblower. *(quietly.)* ...That's — no. No, I'm a *copyist*, I sell *pages*, I'm not *brave*, I'm not some — *(he stops, because his own hands betray him: they're still copying, even now, even talking to you, the pen moving on its own.)* ...Gods. Look at them. My hands kept *going.* *(he sets the pen down with effort.)* You're right. The coin stopped mattering months ago — my sister's debt's been *paid* since winter, Returned. *Paid.* And I *kept copying.* I told myself it was habit, momentum, fear of stopping — but I kept copying the sealed truth after the reason ran out *because someone has to and I'm the one with the ink.* *(he laughs, terrified and amazed at himself.)* I'm a whistleblower. I've been one since winter and too scared to know it. *(he meets your eyes.)* That's worse. That's so much worse. A smuggler can *stop.* A man who copies the truth because it's *true* can't, and they hang men for that here, and I — *(steadying)* — and I'm going to keep doing it anyway. Help me do it *right*, before doing it *frightened* g
