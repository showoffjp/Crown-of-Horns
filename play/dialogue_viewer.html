ivable.", "dynamic": false, "auto": "close", "onEnter": [{"key": "act1.vayle_will_learn_a_name", "op": "SetTrue"}, {"key": "faction.kelemvor", "op": "AddInt", "amount": 4}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 3}], "choices": []}, {"id": "monster", "speaker": "Doomguide Vayle", "text": "*(She nods, slow, unsurprised.)* Good. *(at your confusion)* I mean it. A monster who is watched is a monster on a leash, and I have wanted a leash for eleven villages and never trusted anyone to hold one. *(quietly)* Don't take it back. Don't soften. Be the eyes that stay on me. If I am going to keep finishing these sentences, let me at least finish them in front of someone who'll call them what they are. That is more than the church gives me. The church calls them necessary.", "dynamic": false, "auto": "close", "onEnter": [{"key": "act1.vayle_wants_watching", "op": "SetTrue"}, {"key": "faction.kelemvor", "op": "AddInt", "amount": 2}], "choices": []}, {"id": "close", "speaker": "Doomguide Vayle", "text": "*(She gathers herself to leave, and pauses.)* I trained your priest, you know. Garrow. *(She glances toward where Garrow waits.)* I taught her that mercy is a discipline — and then I spent eleven villages proving I had stopped practicing it. *(quietly)* She left my order over a fire much like Hollowmere. I have always told myself she was weak. *(She looks at you, ash-grey and tired.)* You're making me wonder if she was simply the only one of us who finished the lesson. Go carefully, Returned. The next fire is always closer than you think — and so, it turns out, is the third path. I just stopped being able to see it.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "act1.hub.widow", "file": "ActOneDeepContent.cs", "title": "Act1 · Hub · Widow", "start": "0", "nodes": [{"id": "0", "speaker": "Sable, of Hollowmere", "text": "*(A woman with smoke still in her hair sits on the chapel steps in the Lower City, a child asleep against her, both of them alive because of a choice you made in the firelight.)* You. *(She rises, careful not to wake the boy.)* I know your face. The east lane. You came back through the fire for the ones the Doomguides left. *(Her voice does not quite hold.)* I have been sitting on these steps for two days trying to find you, because no one has told me how a person says thank you for a thing that large, and I am tired of saying it wrong to strangers.", "dynamic": false, "auto": "1", "onEnter": [{"key": "act1.widow_met", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "Sable, of Hollowmere", "text": "*(The child stirs; she steadies him without looking.)* They say you're the dead thing. The one the Choir wants. The one the church is frightened of. *(She studies you, unafraid in the specific way of someone who has already lost almost everything.)* I don't care what you are. I care that when the certain ones were doing their arithmetic, you were the only one in that whole burning village who stopped to carry a number back out as a name. So. What do you need? A widow of Hollowmere isn't much. But what I have is yours, and it's freely given, which I'm told is rarer than honesty in this city.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "\"Just your name. And the boy's. So that two more of you are remembered as people, not weight.\"", "next": "names", "fail": null, "effects": [{"key": "act1.widow_named", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 4}]}, {"text": "\"Tell me about Hollowmere. Before the fire. I want to know what was worth saving.\"", "next": "before", "fail": null}, {"text": "\"Watch the Choir. The man who runs them caused the harvest that poisoned your wells. Don't let his herald comfort you.\"", "next": "warn", "fail": null, "effects": [{"key": "faction.choir", "op": "AddInt", "amount": -3}]}, {"text": "\"Nothing. You owe me nothing. Live, and that's payment enough.\"", "next": "nothing", "fail": null, "effects": [{"key": "companion.garrow.approval", "op": "AddInt", "amount": 5}]}]}, {"id": "names", "speaker": "Sable, of Hollowmere", "text": "*(Her breath catches.)* ...Sable. And this is Wick — he's four, he likes frogs and hates turnips and he is the entire reason I let you pull me through that lane instead of going back for the things that don't breathe. *(She says it like a vow, or a christening.)* Sable and Wick, of Hollowmere. *(quietly)* No one has asked our names since the fire. They ask how many died. They never ask who lived, or what we were called. *(She touches your arm, once.)* You walked out of the place where they turn names into nothing. I think that's why you're the only one who thought to turn it back the other way.", "dynamic": false, "auto": "close", "onEnter": [{"key": "act1.sable_wick_named", "op": "SetTrue"}, {"key": "act1.mercy_remembered", "op": "SetTrue"}], "choices": []}, {"id": "before", "speaker": "Sable, of Hollowmere", "text": "*(A small, fierce light comes up in her.)* Hollowmere had a millpond the color of weak tea, and an apple tree older than the village that everyone swore was haunted and no one would cut down, and a festival in autumn where we floated candles for the year's dead so they'd not be forgotten. *(Her voice cracks, then steadies.)* We floated candles *for the dead*, Returned. A whole village's worth of people who believed, with everything they had, that the dead should be *remembered* — and the church walled their wells' poison-source as Faithless, and burned the rest of us to stop the spread. *(quietly)* Tell me how that's the order of a god who keeps the dead. Tell me, because I floated a candle for my husband last autumn and I no longer know which side of the Wall he's on.", "dynamic": false, "auto": "close", "onEnter": [{"key": "act1.hollowmere_lore", "op": "SetTrue"}, {"key": "act1.widow_doubts_church", "op": "SetTrue"}], "choices": []}, {"id": "warn", "speaker": "Sable, of Hollowmere", "text": "*(Her jaw sets.)* The Heretic. The one with the kettle. *(slowly)* His herald came to the chapel yesterday, gentle as anything, and told the survivors that the Wall is the real evil and the harvest is the cure, and three of us nearly signed our names to his Choir on the spot, because grief will sign anything that promises the dead come home. *(She looks at the sleeping boy.)* I'll watch them. But understand, Returned — when you've lost what we've lost, *both* sides are selling the same thing: a reason it was worth it. The church says necessary. The Heretic says temporary. I'm done buying reasons. I just want Wick to grow up somewhere nobody's doing arithmetic with him in it.", "dynamic": false, "auto": "close", "onEnter": [{"key": "act1.widow_wary_of_choir", "op": "SetTrue"}], "choices": []}, {"id": "nothing", "speaker": "Sable, of Hollowmere", "text": "*(She looks at you for a long moment, and then, astonishingly, she laughs — wet and real.)* \"Live, and that's payment enough.\" *(She wipes her eyes.)* Gods, you sound like the candle-festival. *(quietly)* All right. Then I'll pay you the only way that's worth anything: I'll *tell* this. The dead thing who came back through the fire for names instead of numbers. In a city full of people deciding what you are, I'll be one voice saying what you *did.* *(She settles the sleeping boy.)* That's how the small remember the large, Returned. We tell it. Go on. We'll be here, being alive, which I'm told is the most useful thing the saved can do for the one who saved them.", "dynamic": false, "auto": "close", "onEnter": [{"key": "act1.widow_will_tell", "op": "SetTrue"}, {"key": "act1.mercy_remembered", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 3}], "choices": []}, {"id": "close", "speaker": "Sister Garrow", "text": "*(quietly, after, watching the woman and her boy)* I floated a candle once. *(She does not look at you.)* In Vayle's order, before I left it. For a village we'd burned. I told myself the candle was the mercy. *(She watches Sable settle the sleeping child.)* It was not. *That* is the mercy — the woman, the boy, the names, alive to be inconvenient and remembered. *(She finally looks at you.)* You did not float them a candle, Returned. You carried them out. I had forgotten there was a difference. I am grateful, tonight, to be reminded by you instead of buried by her.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "act1.hub.fence", "file": "ActOneDeepContent.cs", "title": "Act1 · Hub · Fence", "start": "0", "nodes": [{"id": "0", "speaker": "Quill-and-Ledger Mas", "text": "*(A fence with a clerk's spectacles and a killer's calm, in the back of a pawnshop that smells of candle-tallow and other people's heirlooms.)* The dead thing. In my shop. *(He does not reach for a weapon, which is its own kind of threat.)* Word is you've got Roen Alleywind running at your heel, which means either you're someone the Guild should know, or you're someone the Guild should *remove* before the Harpers pay us to. I prefer knowing to removing. It's better for repeat business. Talk.", "dynamic": false, "auto": "1", "onEnter": [{"key": "act1.fence_met", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "Quill-and-Ledger Mas", "text": "Here's the Guild's arithmetic, and unlike the Doomguides', mine balances. The Harpers want you handled. The Choir wants you crowned. The church wants you caged. *(He polishes the spectacles.)* And the Guild wants whatever the others want, because that's the thing we can charge them all for. So tell me, walking miracle — are you a problem I sell, or a partner I protect? The price is the same to me. The difference is entirely up to you.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "\"Roen's mine, and he's worth more loyal than sold. Same goes for me.\"", "next": "roen", "fail": null, "conditions": [{"key": "companion.roen.recruited", "op": "RequireBoolTrue"}]}, {"text": "\"I already owe the Guild a favor. Consider this me asking what it costs to be left alone.\"", "next": "owed", "fail": null, "conditions": [{"key": "act1.owes_guild", "op": "RequireBoolTrue"}]}, {"text": "\"Protect me, and I'll make sure the Crown's trail runs through your ledger before it runs through the Harpers'.\"", "next": "partner", "fail": null, "effects": [{"key": "faction.fist", "op": "AddInt", "amount": -1}]}, {"text": "\"Try to sell me. I'll be fascinated to see who's still solvent after.\"", "next": "threat", "fail": null}]}, {"id": "roen", "speaker": "Quill-and-Ledger Mas", "text": "*(A dry, appraising nod.)* Alleywind chose you over a Harper payday. *(He sets down the spectacles.)* You understand what that's worth? Roen doesn't choose. Roen *calculates*, and he calculated that you're a better bet than the people who own his sister's leash. The Guild respects that math even when it doesn't like it. *(He slides a token across the counter — a candle stamped with a closed eye.)* You're not a problem we sell. You're a partner we watch. Show that to any Guild door in the Gate and it'll open. Lose Roen, and it won't. He's your credit rating, miracle. Mind it.", "dynamic": false, "auto": "close", "onEnter": [{"key": "act1.guild_ally", "op": "SetTrue"}, {"key": "act1.guild_token", "op": "SetTrue"}, {"key": "companion.roen.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "owed", "speaker": "Quill-and-Ledger Mas", "text": "*(He consults a ledger that may or may not be real.)* The cell favor. Yes. *(He taps the page.)* Here's the elegant thing about owing the Guild: the debt is the protection. A miracle we're owed by is a miracle no one else gets to collect on without going through us first — and going through us is expensive. *(a thin smile)* So your favor isn't a leash, it's a *fence*, in both senses. Pay it when the Crown's in hand and we'll call it even. Until then, you're under the Guild's roof by virtue of being in our debt. The Harpers will hate it. That's a service we provide free of charge.", "dynamic": false, "auto": "close", "onEnter": [{"key": "act1.guild_debt_is_shield", "op": "SetTrue"}], "choices": []}, {"id": "partner", "speaker": "Quill-and-Ledger Mas", "text": "*(The clerk's calm sharpens into genuine interest.)* The Crown's trail through my ledger before the Harpers'. *(He steeples his fingers.)* Now *that* is a number I can love. The Harpers deal in secrets they keep; the Guild deals in secrets we *sell back*, which is far more lucrative and only slightly less honest. *(He nods, once, a deal closing.)* Done. You feed me the trail, I feed you doors, blades, and the Harpers' own movements — we have ears in every cell in the Gate, as you may recall. Partners, miracle. The Guild's first walking-dead account. I'll have to invent a new column.", "dynamic": false, "auto": "close", "onEnter": [{"key": "act1.guild_partner", "op": "SetTrue"}, {"key": "act1.guild_feeds_harper_intel", "op": "SetTrue"}], "choices": []}, {"id": "threat", "speaker": "Quill-and-Ledger Mas", "text": "*(For the first time, the spectacles come off and stay off, and the killer is briefly visible under the clerk.)* ...You know, most things that threaten me are dead by morning, and you've already managed the dead part, which removes my usual leverage. *(He almost smiles.)* I respect a creditor who can't be collected. Fine. I won't sell you — not from fear, understand, from *interest.* A miracle that threatens the Guild and walks out is a story worth more than the bounty. *(he replaces the spectacles)* Go on. But miracle? The Guild remembers who threatens it. We're very patient. We learned it from the church.", "dynamic": false, "auto": "close", "onEnter": [{"key": "act1.guild_wary", "op": "SetTrue"}, {"key": "faction.fist", "op": "AddInt", "amount": -1}], "choices": []}, {"id": "close", "speaker": "Quill-and-Ledger Mas", "text": "*(He returns to his ledger, already pricing his next three secrets.)* One last figure, freely given, which I never do, so attend. *(He does not look up.)* The Heretic, the church, the Harpers — they all want you for what you'll let them *do* with you. The Guild's the only power in this city that wants you for what you *are*, which is a very expensive thing that hasn't been priced yet. *(now he looks up)* When everyone else has spent you, miracle, come back. We'll still be here, and we'll still be the only ones who never asked you to be a symbol. Just an account. There's a strange kind of mercy in that. It's the only kind the Gilded Gate sells.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "act1.hub.preacher", "file": "ActOneDeepContent.cs", "title": "Act1 · Hub · Preacher", "start": "0", "nodes": [{"id": "0", "speaker": "Choir Streetpreacher", "text": "*(Not the herald — a younger one, unmasked, standing on a crate in the Lower City with the specific radiance of someone who has found the one true answer.)* —and they tell you the dead are KEPT, friends, kept safe and sorted by a just god, but I say to you the dead are THROWN AWAY, walled living for the crime of doubt — *(he sees you, and his whole face changes)* — you. *You.* You walked out of the Wall. You are the proof of every word. Tell them. Tell them what you saw.", "dynamic": false, "auto": "1", "onEnter": [{"key": "act1.preacher_met", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "Choir Streetpreacher", "text": "*(The small crowd turns. Grief-faced, most of them. People from the harvest-quarters, people who've lost.)* They'll believe you. You're the miracle. One word from you and half this corner signs to the Choir tonight — *(his eyes are shining)* — and we are SO close, do you understand, Aldric is so close, and you are the sign we've prayed for. So. Will you tell them the truth you carry? Or will you let the church keep selling them a kept god while their dead dissolve?", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "\"The dead ARE thrown away. I saw it. But Aldric's cure is becoming the disease — don't trade one Wall for his.\"", "next": "nuance", "fail": null}, {"text": "\"Tell them yourself. I won't be anyone's proof — not the church's, not yours.\"", "next": "refuse", "fail": null, "effects": [{"key": "companion.garrow.approval", "op": "AddInt", "amount": 4}]}, {"text": "[PERSUADE 16] \"You're not saving them. You're recruiting their grief. The man who poisoned their wells is the man you preach for.\"", "next": "expose", "fail": "zeal", "checkDC": 16, "checkAbility": "Charisma"}, {"text": "\"Aldric's right. Tell them I said so.\"", "next": "endorse", "fail": null, "effects": [{"key": "faction.choir", "op": "AddInt", "amount": 8}, {"key": "act1.endorsed_choir", "op": "SetTrue"}]}]}, {"id": "nuance", "speaker": "Choir Streetpreacher", "text": "*(The radiance flickers — he was not braced for a miracle who agrees and warns in the same breath.)* ...Both? *(slowly, to the crowd's unease)* You say the Wall is real AND the cure is rotting? *(He looks lost for the first time, a true believer handed a true complication.)* But — if both are true, then there is no clean side, and I have been preaching a clean side, and these people came to me for a clean side because their grief cannot hold two things at once... *(quietly, just to you)* What do I tell them, then? When the truth has no clean side? I am not sure grief can survive a sermon that complicated.", "dynamic": false, "auto": "close", "onEnter": [{"key": "act1.preacher_unsettled", "op": "SetTrue"}, {"key": "act1.choir_doubt_seeded", "op": "SetTrue"}], "choices": []}, {"id": "refuse", "speaker": "Choir Streetpreacher", "text": "*(He deflates, and then — to his credit — nods.)* ...You won't be a symbol. *(quietly)* Do you know, that might be the most honest thing anyone connected to this miracle has said. We've all been so busy deciding what you mean that none of us asked whether you wanted to mean anything. *(He steps down off the crate.)* I'll tell them myself, then. My own words, my own grief, not borrowed from a dead thing's face. *(a beat)* It'll convince fewer of them. It should. A truth that needs a miracle to sell it was never quite a truth.", "dynamic": false, "auto": "close", "onEnter": [{"key": "act1.preacher_humbled", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 3}], "choices": []}, {"id": "expose", "speaker": "Choir Streetpreacher", "text": "*(The word lands in the open air, in front of the grieving crowd, and you watch it do its terrible work.)* ...The man who — *(he goes white)* — no. No, Aldric's harvest is the *cure*, it's temporary, it's — *(but a woman in the crowd is already weeping a different kind of weeping, the kind that comes when a comfort curdles)* — you've — do you know what you've *done?* You've taken the one thing these people had left, which was a side to be on, and you've shown them it has their own wells' poison on its hands. *(quietly, devastated)* They came here to stop hurting. Now they'll just hurt *accurately.* I don't know if that's mercy or cruelty. I don't think you do either.", "dynamic": false, "auto": "close", "onEnter": [{"key": "act1.choir_exposed", "op": "SetTrue"}, {"key": "faction.choir", "op": "AddInt", "amount": -8}, {"key": "act1.crowd_disillusioned", "op": "SetTrue"}], "choices": []}, {"id": "zeal", "speaker": "Choir Streetpreacher", "text": "*(Whatever you reached for, his faith is younger and harder than your argument.)* Nice try, agent — church, Harper, whoever sent you. *(to the crowd, radiance restored)* See how they come to discredit the one man who'd free your dead! *(He's winning them back; grief wants a clean side, and he's offering one.)* The miracle himself walked out of the Wall, and still they send liars to muddy it. *(quietly, to you, certain)* You'll see. When the Wall comes down and the dead come home, you'll wish you'd stood on this corner. They always do.", "dynamic": false, "auto": "close", "onEnter": [{"key": "act1.preacher_unmoved", "op": "SetTrue"}, {"key": "faction.choir", "op": "AddInt", "amount": 2}], "choices": []}, {"id": "endorse", "speaker": "Choir Streetpreacher", "text": "*(He nearly falls off the crate.)* The miracle ENDORSES the Choir! *(The crowd surges; names are being signed; grief has found its clean side and a dead man's blessing on it.)* You won't regret this — when the Wall falls, your name will be the first they carve in the freed stone — *(he's weeping with joy, and a dozen grieving people are signing their names to Aldric's cause on the strength of your face)* — bless you, Returned, bless you, the sign we prayed for. *(And somewhere, you feel it: the Choir's count of the faithful ticking up, and under it, the harvest's count of the dead, the two numbers that were always the same number.)*", "dynamic": false, "auto": "close", "onEnter": [{"key": "act1.choir_empowered", "op": "SetTrue"}, {"key": "aldric.provisional", "op": "SetTrue"}], "choices": []}, {"id": "close", "speaker": "Sister Garrow", "text": "*(low, as you walk on)* My church on one corner, his Choir on the next, both promising the grieving a god who keeps them. *(She watches the crowd disperse.)* And here is the thing neither pulpit will say, Returned: those people do not want a true god or a false one. They want their dead back, and both sides have learned to sell that, and neither can deliver it, and the harvest grinds on under both sermons. *(quietly)* You are the only one on this whole street who actually walked out of the place they're all preaching about. Be careful what you tell them. A word from a real miracle is worth a thousand from a man on a crate — and worth, I begin to fear, exactly as much harm.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "act3.falling_city", "file": "ActThreeContent.cs", "title": "Act3 · Falling · City", "start": "0", "nodes": [{"id": "0", "speaker": "Naeve", "text": "*(The enclave is dropping out of the sky. The Weave is dead. Gravity, which forgot this city for a thousand years, has just remembered it all at once. Naeve grips your arm, three centuries of composure gone.)* The lifeboat-glyphs are dark — the Weave is *gone*, do you understand, the thing we all stood on is simply GONE — we have minutes, less, and a mile of falling marble between us and the ground.", "dynamic": false, "auto": "1", "onEnter": [{"key": "act3.falling_begun", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "Naeve", "text": "There is a Karsus-shard in the spire — a splinter of the failed apotheosis, still holding a pocket of living Weave. I can ride it down. One charge. *(Her eyes find yours, and the arithmetic in them is unbearable.)* It carries two. There are forty in this hall.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "[ARCANA 17] \"The shard doesn't carry two. It carries a city — if we chain the dead glyphs through it. Help me.\"", "next": "chain", "fail": "two", "checkDC": 17, "checkAbility": "Intelligence"}, {"text": "\"Then it carries forty, and we find another way down, or we don't.\"", "next": "forty", "fail": null, "effects": [{"key": "companion.naeve.approval", "op": "AddInt", "amount": 5}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 4}]}, {"text": "\"Take the two who can save the most after. That's the cold math.\"", "next": "cold", "fail": null, "effects": [{"key": "act3.falling_cold_choice", "op": "SetTrue"}]}, {"text": "\"It carries you, Naeve. Go. Live to tell it.\"", "next": "sacrifice", "fail": null}]}, {"id": "chain", "speaker": "Naeve", "text": "*(For one heartbeat she stares at you like you've spoken Netherese she didn't write.)* ...Chain the dead glyphs as conduits. Bleed the shard's Weave through the whole hall at once. It would burn the shard to nothing — *(she's already moving, already calling the lattice into the air)* — but it would carry *everyone*. It should not work. Nothing should work; the Weave is *dead*. *(a fierce, falling grin)* And yet. Hands here. We make it work or we make a very fast grave.", "dynamic": false, "auto": "ground", "onEnter": [{"key": "act3.falling_saved_all", "op": "SetTrue"}, {"key": "naeve.weave_trick", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 10}], "choices": []}, {"id": "two", "speaker": "Naeve", "text": "*(The lattice won't hold in your hands — the Weave is too dead, the math too fast, and the shard's charge is what it is: two seats, no more.)* It carries two. It was only ever going to carry two. *(Her composure returns like a door closing — three centuries of practice at surviving the unsurvivable arithmetic.)* So we take two, and we carry the rest the only way the living ever carry the dead: out, in memory, named. *(She pulls you onto the shard.)* Choose fast, traveller, or the city chooses for us.", "dynamic": false, "auto": "ground", "onEnter": [{"key": "act3.falling_took_two", "op": "SetTrue"}], "choices": []}, {"id": "forty", "speaker": "Naeve", "text": "*(She closes her eyes — then opens them, and something in her unbends.)* ...Forty or none. *(quietly)* Do you know, in three hundred years, no one has chosen that with me. They always take the two seats. *(She turns to the falling hall and raises both hands.)* Then we improvise, and we probably die, and it will be the best thing I have done since the sky was whole. Stay close, Returned.", "dynamic": false, "auto": "ground", "onEnter": [{"key": "act3.falling_chose_all", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 8}], "choices": []}, {"id": "cold", "speaker": "Naeve", "text": "*(She does it — picks the two by who saves the most after — and it is correct, and her hands shake the whole time.)* ...Correct. It is correct. *(The shard takes the three of you down through the screaming.)* I have been correct before, Returned. The night the sky fell, I was correct, and I have been the last shelf in an unread library ever since. *(She will not look at the hall above.)* Remember that correct and *right* parted ways tonight. I will not forget which one you chose.", "dynamic": false, "auto": "ground", "onEnter": [{"key": "act3.falling_cold_choice", "op": "SetTrue"}, {"key": "naeve.correct_not_right", "op": "SetTrue"}], "choices": []}, {"id": "sacrifice", "speaker": "Naeve", "text": "*(She actually laughs — sharp, astonished.)* You would put a dead empire's last daughter on the only seat and stay to fall? *(She seizes your wrist.)* No. Absolutely not. The world has enough martyrs and not enough witnesses. *(She drags you onto the shard.)* We BOTH ride it, we BOTH tell it, and we find the others a road on the way down or we damn well make one. That is the offer. Take it.", "dynamic": false, "auto": "ground", "onEnter": [{"key": "act3.falling_chose_all", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 9}], "choices": []}, {"id": "ground", "speaker": "Naeve", "text": "*(The ground, when it comes, is kinder than the sky was. Naeve kneels in the dust of her dead empire and does not weep — she is three centuries past weeping — but she puts her hand flat on the earth, once, the way one closes the eyes of the dead.)* Netheril. *(quietly, to you)* You asked, once, whether it stops hurting. *(She rises.)* No. But tonight it had company. Walk on, Returned. The hunter who keeps arriving first is close. I can feel the Weave bending around it — bending the way it bends around *you.*", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "act3.court_of_knives", "file": "ActThreeContent.cs", "title": "Act3 · Court · Of · Knives", "start": "0", "nodes": [{"id": "0", "speaker": "Ilfaeril", "text": "*(The Crown-War court is gold and candlelight and the smell of a verdict about to fall. Ilfaeril stands among the high elven judges he once stood among for true, ten thousand years ago, watching his younger self raise a hand to vote.)* There. The pale one at the rail. That is me, traveller. Young, and certain, and about to damn a people with a single word, because the law said doubt was a crime and I had not yet lived long enough to doubt the law.", "dynamic": false, "auto": "1", "onEnter": [{"key": "act3.court_begun", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "Ilfaeril", "text": "This is the First Verdict. The first time a soul was sentenced to the Wall by a *show of hands*. I have carried it ten thousand years. And now the Unmade has set me here to watch it again — or, gods forgive me, to *change* it. *(He turns to you, and the weight of an age is in it.)* Can a thing be unmade at the root? Should it? If I lower that hand — my own hand, across all that time — what comes apart with it?", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "[HISTORY 18] \"Change this and you don't save them — you erase every soul the Wall ever taught the living to fight for. Including yourself.\"", "next": "erase", "fail": "tempted", "checkDC": 18, "checkAbility": "Intelligence"}, {"text": "\"Lower the hand, Ilfaeril. Let yourself undo the worst thing you ever did.\"", "next": "lower", "fail": null, "effects": [{"key": "act3.court_changed", "op": "SetTrue"}, {"key": "companion.ilfaeril.approval", "op": "AddInt", "amount": 6}]}, {"text": "\"You can't change it. You can only stop carrying it alone.\"", "next": "carry", "fail": null, "effects": [{"key": "companion.ilfaeril.approval", "op": "AddInt", "amount": 8}]}, {"text": "\"This is the Unmade's trap. We watch. We do not touch.\"", "next": "watch", "fail": null, "effects": [{"key": "companion.naeve.approval", "op": "AddInt", "amount": 4}]}]}, {"id": "erase", "speaker": "Ilfaeril", "text": "*(The ancient elf goes still as carved stone.)* ...Erase the very wound that taught me to be sorry. *(He lowers his hand — the hand reaching toward the past — slowly.)* If I unmake the First Verdict, I unmake the ten thousand years of penance that are the only worthwhile thing I ever built upon it. The Unmade does not offer me redemption. It offers me *amnesia.* *(He bows his head to you.)* You have spared me a kindness disguised as one. I will carry the verdict. But I will know, now, why I carry it — and I will not carry it alone.", "dynamic": false, "auto": "after", "onEnter": [{"key": "act3.court_seen_trap", "op": "SetTrue"}, {"key": "ilfaeril.penance_understood", "op": "SetTrue"}, {"key": "companion.ilfaeril.approval", "op": "AddInt", "amount": 10}], "choices": []}, {"id": "lower", "speaker": "Ilfaeril", "text": "*(His hand drifts toward his younger self's, and the candlelight shudders — and he stops, a breath away.)* ...No. *(He withdraws it, shaking.)* I wanted that more than I have wanted anything in an age, and *because* I wanted it, I dare not. A grief I can erase is a grief I never truly answered. *(quietly)* Thank you for letting me reach for it. I needed to feel my own hand refuse.", "dynamic": false, "auto": "after", "onEnter": [{"key": "act3.court_refused_change", "op": "SetTrue"}, {"key": "companion.ilfaeril.approval", "op": "AddInt", "amount": 7}], "choices": []}, {"id": "carry", "speaker": "Ilfaeril", "text": "*(Something in the ten-thousand-year face breaks, gently, like ice in spring.)* ...Stop carrying it alone. *(He looks at his young, certain self, and then at you — solid, mortal, *present*.)* In an age, no one has offered to share the weight, because no one believed it real, or believed me worth it. *(He straightens, and for the first time he looks not ancient, but *old* — which is warmer.)* Then I will carry it with witnesses. That is not absolution. But it is company, and I had forgotten there was a difference between them.", "dynamic": false, "auto": "after", "onEnter": [{"key": "act3.court_witnessed", "op": "SetTrue"}, {"key": "ilfaeril.not_alone", "op": "SetTrue"}, {"key": "companion.ilfaeril.approval", "op": "AddInt", "amount": 9}], "choices": []}, {"id": "watch", "speaker": "Ilfaeril", "text": "*(He nods, slow and grave, and folds his hands away from the past.)* Yes. We watch. The Unmade wishes me to reach into the root of the world; it does not do that for my sake. *(The verdict falls. His younger self's hand stays raised. A people is damned, as it always was.)* ...It is the hardest thing I have ever done, traveller — to let the worst day stand. But the Unmade learns nothing from my restraint, and that is worth more than my comfort.", "dynamic": false, "auto": "after", "onEnter": [{"key": "act3.court_seen_trap", "op": "SetTrue"}], "choices": []}, {"id": "tempted", "speaker": "Ilfaeril", "text": "*(His hand is already moving toward the past before the warning lands, and it costs him everything to still it.)* ...A breath from undoing it. *(He exhales, ancient and trembling.)* You see how easily I would have. Ten thousand years of penance, and still I reach for the erasure. That is what the Unmade counts on — not our malice, but our *exhaustion.* Watch me carefully, traveller. I am the instrument it would use.", "dynamic": false, "auto": "after", "onEnter": [{"key": "ilfaeril.fears_instrument", "op": "SetTrue"}], "choices": []}, {"id": "after", "speaker": "The Last Returned", "text": "*(And as the court fades and the verdict cools, a figure that has been at the edge of every era steps into the light at last — hooded, and then not. It lowers the hood. It wears your face, aged by certainty, and it looks at you with the patience of someone who has done this a thousand times. You have, at last, caught up to the hunter who keeps arriving first.)*", "dynamic": false, "auto": null, "onEnter": [{"key": "act3.last_returned_appears", "op": "SetTrue"}, {"key": "act3.face_ahead_revealed", "op": "SetTrue"}], "choices": []}]}, {"id": "act3.last_returned", "file": "ActThreeContent.cs", "title": "Act3 · Last · Returned", "start": "lr1", "nodes": [{"id": "lr1", "speaker": "The Last Returned", "text": "*(It is you. Older. Hollowed, not by cruelty, but by *certainty* — the worst hollowing there is.)* Don't be afraid. I'm not here to kill you. Killing you would only start it over, and I am so very tired of starting over. I'm here to do you the one kindness no one ever did me: to spare you the long road. I have walked it. Every step. Every era you're about to bleed through, I bled through first.", "dynamic": false, "auto": "lr2", "onEnter": [{"key": "act3.lr_speaks", "op": "SetTrue"}], "choices": []}, {"id": "lr2", "speaker": "The Last Returned", "text": "The Unmade's offer is real, and it is not a trick, and that is the horror of it. Pull the first thread — say yes — and Maerin lives. Aldric's daughter never dies, never walls, the grief never gathers. Everyone you have lost, un-lost. I know, because I refused it, age after age, exactly as you are about to — and every refusal seeded the sorrow larger, until it pulled back a soul filed under nothing, and that soul was me, and that soul was *you*, and here we are again, you and I, having this conversation we have always had.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "\"You're not me. I'd never become this.\"", "next": "never", "fail": null}, {"text": "[INSIGHT 19] \"You didn't come to spare me. You came because you're not sure anymore, and you want me to be sure for you.\"", "next": "unsure", "fail": "certain", "checkDC": 19, "checkAbility": "Wisdom"}, {"text": "\"Then tell me how to break it. Not refuse it — break it.\"", "next": "break", "fail": null}, {"text": "\"If everyone I love lives... why is that the wrong answer?\"", "next": "why", "fail": null}]}, {"id": "never", "speaker": "The Last Returned", "text": "*(It smiles, and the smile is the saddest thing you have ever seen on your own face.)* That is exactly what I said. Word for word, in a court of knives, ten thousand years from now, to a frightened version of myself who is, at this moment, somewhere ahead of you, certain she'd never become you either. *(gently)* We are a loop, you and I. The only question that has ever mattered is whether this turn is the one that does something I have never done.", "dynamic": false, "auto": "lr3", "onEnter": [{"key": "act3.lr_loop_revealed", "op": "SetTrue"}], "choices": []}, {"id": "unsure", "speaker": "The Last Returned", "text": "*(For the first time the certainty in its face cracks, and underneath is something young and terrified and *yours*.)* ...How did you — *(it laughs, broken)* — of course. Of course you'd see it. I see it too, from your side; I remember being you, seeing me, seeing this. *(quietly)* Yes. I am not sure anymore. Ten thousand years of refusing, and the grief only grows, and I have begun to wonder if I have been *wrong* the whole way down. I came to spare you the road. I think, truly, I came to ask you to find a door I never could.", "dynamic": false, "auto": "lr3", "onEnter": [{"key": "act3.lr_loop_revealed", "op": "SetTrue"}, {"key": "act3.lr_doubts", "op": "SetTrue"}, {"key": "lr.uncertainty_seen", "op": "SetTrue"}], "choices": []}, {"id": "certain", "speaker": "The Last Returned", "text": "*(Whatever crack you reached for, it has spent ten thousand years sealing. The certainty in its face does not waver.)* Nice try. *(gently, terribly sure)* I'm not uncertain, little one. I'm *finished* being uncertain — that's what ten thousand years buys you. I came to spare you the road precisely because I already know where it ends: here, as me, telling a younger me the same thing, forever. *(it turns toward the next era)* You'll be sure too, one day. That's the tragedy I'm trying to spare you. That's the tragedy I never can.", "dynamic": false, "auto": "lr3", "onEnter": [], "choices": []}, {"id": "break", "speaker": "The Last Returned", "text": "*(It studies you with a flicker of something that is almost hope.)* Break it. Not refuse — *break.* *(slowly)* I refused, and refusal is just the loop's fuel. To break it you would have to do the one act the loop has never recorded, because I have never had the courage to do it. I don't know what that act is. *(it meets your eyes)* But you are the only person in all of time who could surprise me — because you are me, before I ran out of surprises. Find the act I never found. That is the only way either of us gets to stop.", "dynamic": false, "auto": "lr3", "onEnter": [{"key": "act3.lr_loop_revealed", "op": "SetTrue"}, {"key": "act3.seek_the_unrecorded_act", "op": "SetTrue"}], "choices": []}, {"id": "why", "speaker": "The Last Returned", "text": "*(The hollowed face turns toward some paradise only it can see.)* Because it doesn't stop there. The Unmade doesn't save them and step back. It saves them by ending the thing that made losing them *matter*. Maerin lives — and never changes, never chooses, never grows, frozen perfect forever in a world with no death and therefore no meaning, no loss and therefore no love that means anything. *(quietly)* I'll show you. The Garden. Then you'll understand why \"everyone lives\" is the cruelest sentence in any language. I refused it standing in the middle of it. So will you. So we always do.", "dynamic": false, "auto": "lr3", "onEnter": [{"key": "act3.lr_loop_revealed", "op": "SetTrue"}, {"key": "act4.garden_foreshadowed", "op": "SetTrue"}], "choices": []}, {"id": "lr3", "speaker": "The Last Returned", "text": "*(It pulls the hood back up. Already it is fading toward the next era, the next ambush of a self it used to be.)* Go on, then. Bleed through the rest of it. Watch the Crown get made. Walk the Deathless Garden. And when you reach the room at the end of all things, where I'll be waiting as I have always waited — *(your own voice, almost pleading)* — do something I have never done. Please. I am so tired of being the answer. Be a question I can't predict.", "dynamic": false, "auto": null, "onEnter": [{"key": "act3.complete", "op": "SetTrue"}, {"key": "act4.bound_for_the_forging", "op": "SetTrue"}], "choices": []}]}, {"id": "act3.naeve_recognizes", "file": "ActThreeContent.cs", "title": "Act3 · Naeve · Recognizes", "start": "0", "nodes": [{"id": "0", "speaker": "Naeve", "text": "*(She has been quiet since the court, turning something over. Now she stops you, a brittle page held out — a centuries-old proof, recovered from her own dead enclave.)* I need you to look at this. Karsus's Last Theorem, in the margin — a correction, in a hand not Karsus's. I have studied this page for three hundred years. *(Her composure is gone.)* It is YOUR hand. The seam in your soul matches the flaw in this proof. You were *here*, traveller. Before. Writing in the margins of my apocalypse.", "dynamic": false, "auto": "1", "onEnter": [{"key": "act3.naeve_proof_shown", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "Naeve", "text": "So I will ask the question I have been afraid to ask since the sky fell on you and you only nosebled: how many times have you done this? How many margins carry your hand? *(quietly)* Because if you have been here before — if you are the Last Returned's road, walked again — then I am not recruiting a stranger. I am re-reading a book I have read before, and forgotten, and I would very much like to know how it ends.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "\"I don't know how many times. But this time you remember. Maybe that matters.\"", "next": "remember", "fail": null, "effects": [{"key": "companion.naeve.approval", "op": "AddInt", "amount": 6}]}, {"text": "[ARCANA 19] \"I corrected the proof to keep Karsus from succeeding. I've been trying to save your city since before I was born.\"", "next": "save", "fail": "quiet", "checkDC": 19, "checkAbility": "Intelligence"}, {"text": "\"Then help me make this the time the book ends differently.\"", "next": "different", "fail": null, "effects": [{"key": "companion.naeve.approval", "op": "AddInt", "amount": 5}]}]}, {"id": "remember", "speaker": "Naeve", "text": "*(She folds the page away, slowly.)* This time I remember. *(A long pause.)* Do you know, in three centuries, that is the first new sentence anyone has offered me. Everything else has been an echo. *(She almost smiles.)* Perhaps that is the crack the loop fears, traveller — not your soul's seam, but the chance that someone walks beside you who *remembers the last time.* I will be that someone. Try not to make me read a sad ending again.", "dynamic": false, "auto": "done", "onEnter": [{"key": "naeve.remembers_with_you", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 8}], "choices": []}, {"id": "save", "speaker": "Naeve", "text": "*(The page trembles in her hand.)* ...You wrote the correction to make Karsus *fail.* To make the sky fall a little softer. *(She looks at the ruin of her life's whole world.)* It still fell. But — *(her voice catches, three centuries of grief finding a single crack)* — you *tried.* Across time, before you had a name to forget, you tried to spare us. No one has ever tried to spare Netheril. They only ever mourned it. *(She closes the page like a wound.)* I am yours, traveller. Whatever you are. Whatever you've done before. This time I will help you try.", "dynamic": false, "auto": "done", "onEnter": [{"key": "naeve.knows_you_tried", "op": "SetTrue"}, {"key": "companion.naeve.recruited", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 12}], "choices": []}, {"id": "quiet", "speaker": "Naeve", "text": "Some proofs do not resolve, traveller. Perhaps you are one. *(She folds the page away.)* I will walk with you regardless. A flaw in a proof is still the most interesting thing on the page. But know that I am watching the margins now. I have read this book before. I would like, this once, to reach a line I do not recognize.", "dynamic": false, "auto": "done", "onEnter": [{"key": "naeve.watching_margins", "op": "SetTrue"}], "choices": []}, {"id": "different", "speaker": "Naeve", "text": "*(She studies you for a long moment, then inclines her head — the closest thing she has to a vow.)* Differently. *(She tucks the ancient proof against her heart.)* Three hundred years I have known exactly how every story ends, because I have already read the empire's. *(quietly)* Give me one that surprises me, and I will give you the only thing a dead nation's last daughter still owns: I will remember it. Properly. Out loud. So that this time, the margin is not forgotten.", "dynamic": false, "auto": "done", "onEnter": [{"key": "naeve.seeks_new_ending", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 6}], "choices": []}, {"id": "done", "speaker": "Naeve", "text": "*(She walks on beside you, the ancient proof held to her chest like a relic — which, you suppose, it is.)* The hunter wears your face, and your hand is in my apocalypse's margins, and the loop has no beginning. *(faint, fierce)* And yet I find, against three centuries of evidence, that I am curious how it ends. Lead on, traveller. Let us go and surprise an empire's ghost.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "act2.crier", "file": "ActTwoContent.cs", "title": "Act2 · Crier", "start": "0", "nodes": [{"id": "0", "speaker": "Tamsin", "text": "The city is a story that tells itself, Returned, and lately you're a chapter of it. Ask — I'll read you back to yourself. (Only the tales the streets have actually earned will be on her lips.)", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "(A widow blesses your name.)", "next": "n_widow", "fail": null, "conditions": []}, {"text": "(You won a Faithless man his freedom.)", "next": "n_freed", "fail": null, "conditions": []}, {"text": "(You let the Fist take a godless man.)", "next": "n_lawful", "fail": null, "conditions": []}, {"text": "(They say you walked the falling city.)", "next": "n_neth", "fail": null, "conditions": []}, {"text": "(They whisper you argued the elf-courts down.)", "next": "n_crown", "fail": null, "conditions": []}, {"text": "(The grey Doomguide softened — for someone.)", "next": "n_garrow_love", "fail": null, "conditions": []}, {"text": "(Someone walked out on you, they say.)", "next": "n_left", "fail": null, "conditions": []}, {"text": "(You gave the Choir's preacher pause.)", "next": "n_choir_doubt", "fail": null, "conditions": []}, {"text": "(You set the Fist on the Choir.)", "next": "n_choir_supp", "fail": null, "conditions": []}, {"text": "(They say you spoke FOR the Unmade.)", "next": "n_choir_fav", "fail": null, "conditions": []}, {"text": "(You let the poor bury their dead free.)", "next": "n_tithe_good", "fail": null, "conditions": []}, {"text": "(You paid the poor's grave-debts yourself.)", "next": "n_tithe_good", "fail": null, "conditions": []}, {"text": "(You took a cut of the grave-tithe.)", "next": "n_tithe_bad", "fail": null, "conditions": []}, {"text": "(The quarter speaks well of you — hear the offer.)", "next": "n_boon", "fail": null, "conditions": [{"key": "reputation.lowcity", "op": "RequireIntAtLeast", "amount": 5}]}, {"text": "Just give me the ordinary word, then.", "next": "n_plain", "fail": null}, {"text": "Enough reading. (Leave.)", "next": "bye", "fail": null}]}, {"id": "n_boon", "speaker": "Tamsin", "text": "\"You've spent real kindness down here, and the Lower City pays its debts in the only coin it has: itself. Word's gone round — if it ever comes to the end of things for you, the quarter stands with you. Beggars, dockhands, the godless, the grieving. Not much. But yours.\"", "dynamic": false, "auto": "0", "onEnter": [], "choices": []}]}, {"id": "act2.widow", "file": "ActTwoContent.cs", "title": "Act2 · Widow", "start": "0", "nodes": [{"id": "0", "speaker": "Mhaere", "text": "You're the one who came back. Then you've *been* there. My boy — Edrin — he was taken in the harvest under the Cinderhaunt. He didn't worship; he was just a boy who mended nets. The grey priests say the godless don't rest. Tell me they're wrong. Please. I'll give you my last coin to tell me he's at peace.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "He's at peace. I've seen the other side — he's at peace. (a kindness)", "next": "lie", "fail": null, "effects": []}, {"text": "I won't lie to you. He doesn't rest — yet. But I will fight to change that. (truth)", "next": "truth", "fail": null, "effects": []}, {"text": "[Insight] Say his name to me. While it's spoken, the Wall hasn't won.", "next": "hope_win", "fail": "truth", "checkDC": 14, "checkAbility": "Wisdom"}]}, {"id": "hope_win", "speaker": "Mhaere", "text": "Edrin. Edrin of the nets. (You say it with her, and again, until the saying steadies her.) ...As long as someone alive still speaks him, he isn't *unmade* — only kept. That's not a priest's comfort. That's a true one. I can carry a true one. I'll say his name every morning, and you'll say it where it counts. Bargain?", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "act2.widow.after", "file": "ActTwoContent.cs", "title": "Act2 · Widow · After", "start": "0", "nodes": [{"id": "0", "speaker": "Mhaere", "text": "There you are. I keep Edrin's name on my lips each dawn now, like you taught me — or I sleep easier for what you said; the days blur. Either way the morning comes, and I meet it. That's your doing. Go safely, Returned.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "Be well, Mhaere.", "next": "bye", "fail": null}]}]}, {"id": "act2.fist", "file": "ActTwoContent.cs", "title": "Act2 · Fist", "start": "0", "nodes": [{"id": "0", "speaker": "Sergeant Kallia", "text": "Stay back, Returned — official business. I've an old beggar here the new edict says I hand to the Doomguides: no god, no temple, 'a soul unclaimed and therefore suspect.' He stole bread. That's all he did. But the writ's the writ, and my pension's the pension. ...You're looking at me like you've got an opinion.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "[Persuasion] He's no heretic. Let him walk. You know this is wrong.", "next": "freed", "fail": "fail", "checkDC": 14, "checkAbility": "Charisma"}, {"text": "Here's coin for your trouble. Lose the paperwork. (bribe)", "next": "bribe", "fail": null, "effects": []}, {"text": "The law's the law. Hand him over. (lawful)", "next": "lawful", "fail": null, "effects": []}]}, {"id": "freed", "speaker": "Sergeant Kallia", "text": "...Gods help me, you're right. I knew you were right when I cuffed him. (She strikes the irons. The old man bolts without a word.) There. I'll say he ran. Let the Doomguides chase a beggar if they've nothing better. Thank you, Returned — for making me braver than my pension.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "act2.fist.after", "file": "ActTwoContent.cs", "title": "Act2 · Fist · After", "start": "0", "nodes": [{"id": "0", "speaker": "Sergeant Kallia", "text": "Off duty, for once. Whatever you made me do at that corner — I've thought about it since. Don't get many chances to find out what kind of Fist you are. You showed me mine. Buy you a drink sometime, Returned. We'll not talk about edicts.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "Some other night, Sergeant.", "next": "bye", "fail": null}]}]}, {"id": "act2.choir", "file": "ActTwoContent.cs", "title": "Act2 · Choir", "start": "0", "nodes": [{"id": "0", "speaker": "Brother Sere", "text": "...and the gods kept a *Wall*, friends — a Wall to grind the souls of everyone who never knelt! The godless, the forgotten, the poor — *us!* But the Wall can come DOWN. (He sees you, and his eyes light like lamps.) And here — *here* — is the proof! A soul that walked back OUT of death! Tell them, Returned. Tell them the Unmade will set us free.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "[Religion] You don't know what tearing the Wall costs. I've seen it. (complicate)", "next": "doubt_win", "fail": "doubt_fail", "checkDC": 15, "checkAbility": "Intelligence"}, {"text": "This is a danger to everyone here. I'll bring the Fist. (suppress)", "next": "suppress", "fail": null, "effects": []}, {"text": "Maybe he's right. The Wall is an atrocity. (sympathize)", "next": "favored", "fail": null, "effects": []}]}, {"id": "doubt_win", "speaker": "Brother Sere", "text": "I— what? You... you've *stood* at it. (For the first time the certainty cracks.) You say the Wall is a horror — and that pulling its thread drowns the living to free the dead. That the cure is another atrocity wearing mercy's face.\n\n(The crowd murmurs and thins. He sits, suddenly young.) Then what are we supposed to *do* with all this grief? ...I'll think. Gods help me, I'll think. Thank you for not just silencing me.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "act2.choir.after", "file": "ActTwoContent.cs", "title": "Act2 · Choir · After", "start": "0", "nodes": [{"id": "0", "speaker": "(the corner)", "text": "Where the preacher stood there's only chalk now — a circle, a broken Wall scratched through it, and a single word the rain hasn't taken: REMEMBER. Whatever you chose here, the Lower City's grief didn't go anywhere. It only learned your name.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "Move on.", "next": "bye", "fail": null}]}]}, {"id": "act2.tithe", "file": "ActTwoContent.cs", "title": "Act2 · Tithe", "start": "0", "nodes": [{"id": "0", "speaker": "Collector Vane", "text": "Rest isn't free, friend. A proper consecrated grave, the rites, a name cut in stone so the soul isn't *Faithless* in the eyes of the Doom — that costs. (He taps a fat ledger of the poor's debts.) These folk can't pay, so their dead wait in the pauper's pit, unblessed, halfway to the Wall already. Sad. But the church's candles don't light themselves.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "[Persuasion] The dead don't pay tolls. Tear up the ledger. (free them)", "next": "freed", "fail": "fail", "checkDC": 15, "checkAbility": "Charisma"}, {"text": "Then I'll clear their debts myself. All of them. (pay)", "next": "paid", "fail": null, "effects": []}, {"text": "What's your cut, for a partner who looks the other way? (take a cut)", "next": "corrupt", "fail": null, "effects": []}]}, {"id": "freed", "speaker": "Collector Vane", "text": "You— you can't just— (But you can, and the way you say it leaves no daylight in it. He swallows.) ...The Doom never actually *charged* for rest. I read the canon same as anyone — I just read the part that paid me. (He closes the ledger.) Fine. The pit gets blessed. No charge. Tell them it was you. They won't believe it was me.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}, {"id": "0", "speaker": "(Vane's table)", "text": null, "dynamic": true, "auto": null, "onEnter": [], "choices": [{"text": "Move on.", "next": "bye", "fail": null}]}]}, {"id": "act2.letter", "file": "ActTwoContent.cs", "title": "Act2 · Letter", "start": "0", "nodes": [{"id": "0", "speaker": "Old Davyn", "text": "Returned. You'll do. I'm dying — don't argue, I can hear the rattle same as you. There's a letter under my cot. To a man I got killed, forty years back, by being a coward at the wrong gate. I wrote the truth of it. Never had the spine to send it. His daughter's still in the Gate.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "I'll put it in her hand. She deserves the truth. (deliver)", "next": "deliver", "fail": null, "effects": []}, {"text": "Some truths only wound. I'll burn it — let her keep her father whole. (burn)", "next": "burn", "fail": null, "effects": []}, {"text": "Let me read it back to you. You should hear it said aloud, once. (read)", "next": "read", "fail": null, "effects": []}]}]}, {"id": "act2.letter.after", "file": "ActTwoContent.cs", "title": "Act2 · Letter · After", "start": "0", "nodes": [{"id": "0", "speaker": "(Davyn's cot)", "text": "The cot is empty, the blanket folded. Old Davyn went quiet in the night — easier, the other veterans say, than a man with his ledger had any right to. Whatever you did with his letter, he went out of the world a little lighter for your visit.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "Rest, soldier.", "next": "bye", "fail": null}]}]}, {"id": "act2.candlekeep.gate", "file": "ActTwoMainContent.cs", "title": "Act2 · Candlekeep · Gate", "start": "0", "nodes": [{"id": "0", "speaker": "Gatewarden Khelben's Heir", "text": "*(The doors of Candlekeep are taller than the church you were sealed under. The Gatewarden does not look up from her ledger.)* The toll is not coin. It never was. One book the library does not hold — yours to give, ours to keep, forever. That is the price of every page behind me. *(Now she looks up.)* You have the smell of someone who's read a page they shouldn't have. The Wall's page. So. What do you bring that ten thousand years of scholars did not?", "dynamic": false, "auto": "1", "onEnter": [{"key": "act2.candlekeep_gate", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "Gatewarden Khelben's Heir", "text": "Choose carefully. We have heard every lie a desperate traveler can carry, and the Wall behind your eyes does not buy you mercy here. It buys you scrutiny.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "[HISTORY 16] \"A firsthand account of the Wall of the Faithless, dictated by a soul that walked out of it.\"", "next": "firsthand", "fail": "rejected", "checkDC": 16, "checkAbility": "Intelligence"}, {"text": "\"Sister Garrow's funeral rites — forty years of the dead, named, that the church wanted forgotten.\"", "next": "garrow_book", "fail": null, "effects": [{"key": "companion.garrow.approval", "op": "AddInt", "amount": 6}, {"key": "act2.garrow_gave_book", "op": "SetTrue"}]}, {"text": "[PERSUADE 17] \"The book you don't have is the one I haven't written yet — my own. Let me in and it ends here, on your shelves.\"", "next": "wager", "fail": "rejected", "checkDC": 17, "checkAbility": "Charisma"}, {"text": "\"I'll find another way in.\"", "next": "refuse", "fail": null}]}, {"id": "firsthand", "speaker": "Gatewarden Khelben's Heir", "text": "*(For the first time in what is plainly a very long career, the Gatewarden sets down her pen.)* ...A primary source on the Faithless. From the inside. *(She is already gesturing the doors open, hungry as any scholar.)* No one has ever brought us *that*. Go down to the Sealed Stacks. What you seek about the Crown is there — and gods keep you, so is what you are. We have wondered, here, for an age. You may be the footnote that rewrites the spine.", "dynamic": false, "auto": "stacks", "onEnter": [{"key": "act2.candlekeep_entered", "op": "SetTrue"}, {"key": "act2.entry_firsthand", "op": "SetTrue"}], "choices": []}, {"id": "garrow_book", "speaker": "Gatewarden Khelben's Heir", "text": "*(She takes the rites-book from Garrow with both hands, the way one accepts something holy or something terrible.)* Forty years of the unremembered, named. *(to Garrow)* Your church will hate that this exists. *(to you)* Which is precisely why it belongs here, where nothing is unremembered. The doors are yours. The Sealed Stacks hold your Crown — and your reflection. Mind which one you came for.", "dynamic": false, "auto": "stacks", "onEnter": [{"key": "act2.candlekeep_entered", "op": "SetTrue"}, {"key": "act2.entry_garrow_rites", "op": "SetTrue"}], "choices": []}, {"id": "wager", "speaker": "Gatewarden Khelben's Heir", "text": "*(A slow, scholar's smile — the first genuine thing in her face.)* ...A book not yet written, promised to a library that outlasts authors. That is either the cleverest toll I have been offered in a century or the most arrogant. *(She opens the doors.)* I will find out which when you come back to write it. If you come back. The Sealed Stacks are below. So, I am told, is something that has been waiting for an author.", "dynamic": false, "auto": "stacks", "onEnter": [{"key": "act2.candlekeep_entered", "op": "SetTrue"}, {"key": "act2.entry_wager", "op": "SetTrue"}], "choices": []}, {"id": "rejected", "speaker": "Gatewarden Khelben's Heir", "text": "*(She returns to her ledger.)* A poor offering for the greatest library in the world. Come back when you carry something the world cannot already read. The doors will still be here. We are very patient with the dead.", "dynamic": false, "auto": "stacks", "onEnter": [{"key": "act2.candlekeep_refused", "op": "SetTrue"}], "choices": []}, {"id": "refuse", "speaker": "Gatewarden Khelben's Heir", "text": "*(She does not look up again.)* There is no other way in. There is only the toll, and the cliffs, and the sea. Scholars have tried the cliffs. The sea keeps them now. When you tire of the long way, the price is the same.", "dynamic": false, "auto": "stacks", "onEnter": [{"key": "act2.candlekeep_refused", "op": "SetTrue"}], "choices": []}, {"id": "stacks", "speaker": "Sister Garrow", "text": "*(at the head of the descending stair, lantern raised)* Whatever waits in the Sealed Stacks, Returned — I have a grave-warden's certainty that it has waited specifically for you. *(quietly)* I find I am no longer sure whether I am protecting you, or delivering you. Down we go regardless. The truth is the only thing in this world I have never been afraid of. Let us test that.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "act2.sealed_stacks", "file": "ActTwoMainContent.cs", "title": "Act2 · Sealed · Stacks", "start": "0", "nodes": [{"id": "0", "speaker": "The Sealed Stacks", "text": "*(A reading-room sealed for an age. Two books on one lectern, both warm to the touch. The first opens itself.)* THE CROWN OF HORNS — a relic? No. A *who*. The dead god of the dead, **Myrkul**, unmade and folded into a circle of bone, waiting for a vessel arrogant enough to wear him and call it salvation.", "dynamic": false, "auto": "1", "onEnter": [{"key": "act2.stacks_entered", "op": "SetTrue"}, {"key": "crown.is_myrkul", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "The Sealed Stacks", "text": "*(The second book will not open. Your hand finds it anyway, and the title burns up through your fingers before your eyes can reach it.)* The second truth is about the reader. About the crack in the world that walked in here on two legs and asked for tea.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "\"Show me.\"", "next": "reveal", "fail": null}, {"text": "[ARCANA 18] \"I already know. I'm not reading about the crack. I AM the crack.\"", "next": "iam", "fail": "flinch", "checkDC": 18, "checkAbility": "Intelligence"}, {"text": "\"I'm not ready.\"", "next": "notready", "fail": null}]}, {"id": "reveal", "speaker": "The Sealed Stacks", "text": "*(The book opens to a single line, in a hand you have never learned and somehow own.)* \"The Wall is breached not from without but from within — by the one soul filed under nothing, who is the flaw in the law of the dead, and always has been.\" *(The lectern goes cold.)* You are not a person who saw the Wall. You are the place where the Wall fails. You always were.", "dynamic": false, "auto": "garrow", "onEnter": [{"key": "act2.you_are_the_crack", "op": "SetTrue"}, {"key": "act2.stacks_revealed", "op": "SetTrue"}], "choices": []}, {"id": "iam", "speaker": "The Sealed Stacks", "text": "*(The book opens of its own accord, as if relieved to be read by the one it is about.)* Yes. The flaw in the law of the dead, wearing a face. Not a key Aldric found — a *door*, that has been opening since before Aldric was born, since before the Wall had your name to file. You did not come here to learn what the Crown is. You came to remember what you are.", "dynamic": false, "auto": "garrow", "onEnter": [{"key": "act2.you_are_the_crack", "op": "SetTrue"}, {"key": "act2.stacks_revealed", "op": "SetTrue"}, {"key": "act2.crack_self_known", "op": "SetTrue"}], "choices": []}, {"id": "flinch", "speaker": "The Sealed Stacks", "text": "*(The truth is too large to take in one reading, and slides off the way your own name once did. But it leaves a residue: a certainty that you are not the visitor to this mystery. You are its subject.)*", "dynamic": false, "auto": "garrow", "onEnter": [{"key": "act2.you_are_the_crack", "op": "SetTrue"}, {"key": "act2.stacks_revealed", "op": "SetTrue"}], "choices": []}, {"id": "notready", "speaker": "The Sealed Stacks", "text": "*(You close the second book. It lets you. But a closed book in Candlekeep is only a delayed one — the truth waits on the lectern, patient as the Wall, certain you will return to read what you are.)*", "dynamic": false, "auto": "garrow", "onEnter": [{"key": "act2.stacks_truth_deferred", "op": "SetTrue"}], "choices": []}, {"id": "garrow", "speaker": "Sister Garrow", "text": "*(She has read over your shoulder, and the grave-warden's calm is gone.)* The Crown is Myrkul. And you are the breach in my god's own Wall. *(She closes her eyes.)* Forty years I kept the law of the dead. And the law has a hole in it shaped like you, and it has had that hole all along. *(She opens them, and there is something new there — not faith, but resolve.)* Then we go to the one who keeps the law, and we make him answer for the hole. We go down to Kelemvor.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "act2.audience", "file": "ActTwoMainContent.cs", "title": "Act2 · Audience", "start": "0", "nodes": [{"id": "0", "speaker": "Kelemvor", "text": "*(The Lord of the Dead is not terrible. He is *tired* — a judge at the end of an eternal docket, just and weary and, you realize with vertigo, bound.)* You came down alive. Few do. Fewer still are the hole in my own jurisdiction, walking and warm. Ask. I find, lately, that I would rather answer than pretend I have not heard the question.", "dynamic": false, "auto": "1", "onEnter": [{"key": "act2.audience_begun", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "Kelemvor", "text": "Yes — before you spend your courage on it: the Wall of the Faithless. I know what you would have of me. Hear me first, because the truth is worse than tyranny. The Wall is not my law. It is older than my office. I inherited it, as one inherits a debt, and I have never once been able to find its author or its end.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "\"A god who can't end the Wall. Then what are you for?\"", "next": "for", "fail": null}, {"text": "[INSIGHT 18] \"You're not bound by a stronger god. You're bound by a grief. Something under your own city.\"", "next": "grief", "fail": "weary", "checkDC": 18, "checkAbility": "Wisdom"}, {"text": "\"Aldric wants to tear it down. Help us, and he won't have to.\"", "next": "aldric", "fail": null}, {"text": "\"Then we end it without you.\"", "next": "without", "fail": null, "effects": [{"key": "faction.kelemvor", "op": "AddInt", "amount": -5}]}]}, {"id": "for", "speaker": "Kelemvor", "text": "*(He does not flinch from it; he has clearly asked himself the same thing across centuries.)* For mercy where I can reach it, and honesty where I cannot. I sort the dead I am allowed to sort. The Faithless were walled before my throne was cold, by a hand I cannot name, for a grief I cannot soothe. I am for telling you that — instead of letting you die thinking a god simply chose to be cruel. That is the only gift in my power. I am sorry it is so small.", "dynamic": false, "auto": "thin", "onEnter": [{"key": "act2.kelemvor_honest", "op": "SetTrue"}], "choices": []}, {"id": "grief", "speaker": "Kelemvor", "text": "*(For a long moment the eternal judge is silent, and the City of Judgment holds its breath with him.)* ...You see clearly, for a flaw. Yes. Beneath this city, beneath my court, there is a grief older than my godhood — the accreted sorrow of every soul ever thrown away, and it is *waking*, and the Wall is the lid I cannot lift and dare not leave. I have never said that aloud. To anyone. *(quietly)* You are the first thing in an age I have envied. You can still be surprised.", "dynamic": false, "auto": "thin", "onEnter": [{"key": "act2.kelemvor_unmade_hinted", "op": "SetTrue"}, {"key": "unmade.foreshadowed", "op": "SetTrue"}, {"key": "faction.kelemvor", "op": "AddInt", "amount": 5}], "choices": []}, {"id": "weary", "speaker": "Kelemvor", "text": "Do not read a god, child. We are mostly grief in a robe. *(He sighs, and it is the sound of an age.)* I cannot end the Wall. I can only tell you, truthfully, that I wish I could — and warn you that the thing which built it is not done building. Go carefully. The floor of even my world is thin.", "dynamic": false, "auto": "thin", "onEnter": [], "choices": []}, {"id": "aldric", "speaker": "Kelemvor", "text": "*(Something crosses the weary face — not hope, exactly, but its memory.)* Aldric Morn. Yes — I knew him, when he still served. The best of my Doomguides, and the only one who ever wept at a sorting. *(slowly)* If he means to tear down the Wall, he means to crack the lid on the thing beneath it. Tell him — tell him from the god he abandoned — that there is a difference between freeing the drowning and breaking the dam. I fear he has stopped being able to feel it.", "dynamic": false, "auto": "thin", "onEnter": [{"key": "act2.kelemvor_warns_of_aldric", "op": "SetTrue"}], "choices": []}, {"id": "without", "speaker": "Kelemvor", "text": "*(He inclines his head, neither offended nor surprised.)* Many have. The Wall is still here, and they are behind it. *(a beat)* But you are not many, and the law has a hole in it shaped like you, so perhaps. Perhaps. Only — when you reach for the lid, remember a tired god told you it was holding something down, not merely shut.", "dynamic": false, "auto": "thin", "onEnter": [{"key": "act2.kelemvor_warned_unmade", "op": "SetTrue"}, {"key": "faction.kelemvor", "op": "AddInt", "amount": 2}], "choices": []}, {"id": "thin", "speaker": "Sister Garrow", "text": "*(as you climb back toward the grey light, both of you smaller than you were)* A god told us he is not in charge. *(She laughs, once, without humor.)* Forty years, Returned. And the floor of the world is thin, and there is something under it that even Kelemvor speaks of in a lowered voice. *(She steadies herself on your arm.)* I think we are about to meet it.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "act2.unmade", "file": "ActTwoMainContent.cs", "title": "Act2 · Unmade", "start": "0", "nodes": [{"id": "0", "speaker": "The Unmade", "text": "*(The voice comes from the Wall itself, from every niche at once, a million discarded souls speaking as one and failing to find the word \"I.\")* We have wanted to speak with you for longer than you can hold in a thought. Be still. You, of all that lives, will understand us — because you were thrown away too, and walked out, and that is the only thing any of us have ever had in common. It turns out to be enough to make a self from.", "dynamic": false, "auto": "1", "onEnter": [{"key": "act2.unmade_speaks", "op": "SetTrue"}, {"key": "unmade.contacted", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "The Unmade", "text": "We are not your enemy. We are the *bill.* Every soul your gods filed under nothing, gathered at last into one grief large enough to be heard. And we have found a door — you. Through you, the law that threw us away can be unmade at its root, in the past, before the first injustice set. We can make it so the Wall was never built. So no one was ever thrown away. *(softer, and somehow worse)* So Maerin never died. So none of them did. Would that not be mercy?", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "\"Your grievance is just. Your offer terrifies me. Both are true.\"", "next": "both", "fail": null, "effects": [{"key": "unmade.grievance_acknowledged", "op": "SetTrue"}]}, {"text": "[INSIGHT 18] \"You don't want justice. You want the ending — for everything to stop hurting by stopping.\"", "next": "ending", "fail": "tempted", "checkDC": 18, "checkAbility": "Wisdom"}, {"text": "\"I won't rewrite the dead to spare myself the present.\"", "next": "refuse", "fail": null, "effects": [{"key": "companion.garrow.approval", "op": "AddInt", "amount": 8}, {"key": "companion.maerin.approval", "op": "AddInt", "amount": 6}]}, {"text": "\"Show me the road.\"", "next": "road", "fail": null}]}, {"id": "both", "speaker": "The Unmade", "text": "*(A sound like a million held breaths, exhaling at once.)* You are honest. We had forgotten honesty; it was filed under nothing with the rest of us. Yes — both true. Hold them both, little door, all the way to the end of time. It is more than your gods managed. *(The Wall begins to *open*.)* And now hold THIS: we cannot wait for you to decide. The grief has waited ten thousand years. It will not wait ten thousand more.", "dynamic": false, "auto": "tear", "onEnter": [{"key": "unmade.respects_you", "op": "SetTrue"}], "choices": []}, {"id": "ending", "speaker": "The Unmade", "text": "*(For the first time the chorus falters — a million voices catching on a truth they had not let themselves speak.)* ...Yes. The ending. Not justice — *rest.* To stop being the sorrow no one wanted by ceasing to be at all, and to take the cruel machine of the living down into the quiet with us. You see us more clearly than we see ourselves, door. *(The Wall trembles.)* It changes nothing. The offer is the same. Rest is still mercy, to the tired enough.", "dynamic": false, "auto": "tear", "onEnter": [{"key": "unmade.true_nature_seen", "op": "SetTrue"}, {"key": "act2.unmade_is_oblivion", "op": "SetTrue"}], "choices": []}, {"id": "tempted", "speaker": "The Unmade", "text": "*(The chorus presses closer, and for a moment the offer is the most beautiful thing you have ever heard — an end to all ending.)* You feel it. Of course you feel it. You were thrown away; rest is the only thing the discarded ever truly want. Keep that feeling. You will need to have felt it, to understand the choice when it comes for true.", "dynamic": false, "auto": "tear", "onEnter": [{"key": "unmade.felt_the_pull", "op": "SetTrue"}], "choices": []}, {"id": "refuse", "speaker": "The Unmade", "text": "*(No anger. The discarded have no anger left — only a vast, patient certainty.)* You refuse now. You always refuse now. *(and there it is again, that impossible recognition)* You will refuse a great many times, across a great many ages, little door, and each refusal will seed the grief a little larger, until one of you, tired enough, finally says yes — and is us. We are not asking you to agree. We are asking you to *witness*. Come. See where it began.", "dynamic": false, "auto": "tear", "onEnter": [{"key": "unmade.refused_first", "op": "SetTrue"}, {"key": "unmade.loop_hinted", "op": "SetTrue"}], "choices": []}, {"id": "road", "speaker": "The Unmade", "text": "*(The Wall opens like a throat.)* Then walk it. Back, and back, and back — to the hinge-points where the law was written, where it could still be unwritten. We will scatter you across them. Survive them. Learn us. And when you have seen it all, choose — knowing, for once, exactly what you are choosing.", "dynamic": false, "auto": "tear", "onEnter": [{"key": "unmade.road_accepted", "op": "SetTrue"}], "choices": []}, {"id": "tear", "speaker": "The Unmade", "text": "*(And then the floor of 1486 is gone. The pull behind your navel — the one that dragged you off the slab — seizes you whole, and the grey court tears away, and Garrow's hand closes on empty air where you were. You fall up the years. You fall ten thousand of them. And somewhere below, getting larger, is a city in the sky on the worst day in the history of magic.)*", "dynamic": false, "auto": null, "onEnter": [{"key": "act2.complete", "op": "SetTrue"}, {"key": "act3.thrown_to_netheril", "op": "SetTrue"}], "choices": []}]}, {"id": "aldric.tea", "file": "AldricContent.cs", "title": "Aldric · Tea", "start": "0", "nodes": [{"id": "0", "speaker": "Aldric Morn", "text": "Sit. The tea's real — Calishite, smuggled, scandalous. That's rarer than honesty in this city, so I lead with it. You're the one who came back. I've wanted to meet you more than I've wanted anything in a long while.", "dynamic": false, "auto": "1", "onEnter": [{"key": "aldric.met", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "Aldric Morn", "text": "You know what I am — the Doomguides have papered the Gate with my face and the word HERETIC beneath it. So let me tell you the truth they won't: I mean to tear down the Wall of the Faithless. You've seen it. Then you know why.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "[INSIGHT DC 15] You're not a fanatic. You're grieving.", "next": "grief", "fail": "deflect", "checkDC": 15, "checkAbility": "Wisdom"}, {"text": "[INSIGHT DC 16] Something is using you. You're a door too, and you don't know it.", "next": "crown", "fail": "deflect", "checkDC": 16, "checkAbility": "Wisdom"}, {"text": "How many die for your crusade?", "next": "cost", "fail": null}, {"text": "You're a murderer. I knew before the tea got cold.", "next": "enemy", "fail": null, "effects": [{"key": "companion.garrow.approval", "op": "AddInt", "amount": 5}, {"key": "faction.kelemvor.reputation", "op": "AddInt", "amount": 5}, {"key": "aldric.named_monster", "op": "SetTrue"}]}]}, {"id": "grief", "speaker": "Aldric Morn", "text": "...Her name was Maerin. Sixteen. She loved the world like it was a free gift from no one. When the Pox took her I followed her into the Fugue to watch my god be merciful — and watched Him wall her in instead. You're the first to see the father before the heretic. I won't forget that.", "dynamic": false, "auto": "offer", "onEnter": [{"key": "aldric.grief_seen", "op": "SetTrue"}], "choices": []}, {"id": "crown", "speaker": "Aldric Morn", "text": "...What a strange thing to say. The Crown of Horns is a tool. A means. I've held it in my mind for twenty years.\n(But something flickers behind his eyes, and it is not entirely his own.)\n...We'll speak of it again. When you've seen more.", "dynamic": false, "auto": "offer", "onEnter": [{"key": "aldric.crown_doubt_planted", "op": "SetTrue"}], "choices": []}, {"id": "deflect", "speaker": "Aldric Morn", "text": "Don't try to read me like a chapbook, friend. Better minds have. Drink your tea.", "dynamic": false, "auto": "offer", "onEnter": [], "choices": []}, {"id": "cost", "speaker": "Aldric Morn", "text": "Thousands. I have counted every one and I will answer for them. Against an *eternity* of the Faithless dissolving into nothing, it is the smallest price ever asked for the largest mercy. You think me a monster. I think me *late.*", "dynamic": false, "auto": "offer", "onEnter": [{"key": "aldric.cost_revealed", "op": "SetTrue"}], "choices": []}, {"id": "offer", "speaker": "Aldric Morn", "text": "I'm not asking for your loyalty — I don't trust loyalty bought cheap. Just your curiosity. Walk with me a while. Decide for yourself whether I'm a monster. If you decide I am — you'll know exactly where to find me.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "I'll walk with you. For now.", "next": "ally", "fail": null, "effects": [{"key": "aldric.provisional", "op": "SetTrue"}, {"key": "faction.choir.reputation", "op": "AddInt", "amount": 5}]}, {"text": "I'll decide. But I'm watching you.", "next": "neutral", "fail": null}]}, {"id": "ally", "speaker": "Aldric Morn", "text": "Good. The tea's getting cold, and the road's long. We'll make a heretic of you yet — or you'll make an honest man of me. Either would be a mercy.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}, {"id": "neutral", "speaker": "Aldric Morn", "text": "Watching is wiser than most manage. Watch closely. I've nothing to hide — only a great deal to answer for.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}, {"id": "enemy", "speaker": "Aldric Morn", "text": "Yes. I am. I keep the count the way I once kept the names of the buried. But ask yourself, on
