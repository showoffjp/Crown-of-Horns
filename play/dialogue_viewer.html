 an hour to find out if they're right.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "[INSIGHT 18] \"You're not lying *to* them. You're lying *for* them — the way you'd hum to a child in a falling carriage. But you'll never know if you robbed someone of their last *true* hour: a goodbye they'd have said, if you'd let them be afraid.\"", "next": "robbed", "fail": "serene", "checkDC": 18, "checkAbility": "Wisdom"}, {"text": "[PERSUADE 17] \"There's a third path between panic and a pretty lie. The *quiet* truth — told to the few who can *act.* Not 'we're fine,' not 'we're doomed,' but 'we have an hour; spend it on what matters.' Let me help you tell *that* one.\"", "next": "third", "fail": "serene", "checkDC": 17, "checkAbility": "Charisma"}, {"text": "\"Who did *you* lie to that you loved, Keeper? There's a specific face behind this much composure. Tell me the one lie that's costing you.\"", "next": "face", "fail": null, "effects": [{"key": "companion.naeve.approval", "op": "AddInt", "amount": 3}]}, {"text": "\"You decided four hundred strangers should be calm instead of informed. That's a *god's* decision, made by a tired engineer. I won't tell you it was right. But I'll tell you it was *brave.*\"", "next": "brave", "fail": null, "effects": [{"key": "companion.garrow.approval", "op": "AddInt", "amount": 2}]}]}, {"id": "robbed", "speaker": "The Mythallar-Keeper", "text": "*(For the first time the calm wavers — a single crack through perfect porcelain.)* ...The goodbye they'd have said. *(quietly.)* That. *That* is the thing that will follow me down. *(she steadies a failing valve by reflex.)* You see it exactly. I weighed *panic* against *peace* and chose peace — but there's a *third* thing in the scale I tried not to look at: the woman who, *told the truth*, would have run to her daughter's chamber and held her for the last hour. The man who would have *finally said it* to the one he never told. *(her hands still.)* My beautiful lie gave four hundred people a *calm* hour. It also stole, from some unknowable number of them, their *true* one — the goodbye, the confession, the last honest hour they'd have *chosen* if I'd let them be *afraid.* *(she meets your eyes, and the composure is a held thing now, not an effortless one.)* I will never know which I did to whom. That's the keeper's burden — I tend the engine, so I *decide*, and deciding means I'll fall not knowing if I gave peace or *robbed* goodbyes. *(softly.)* I think... I think I'd tell one true person, now. So that at least *one* soul gets the hour they'd choose. Will you help me pick who can *bear* it? I've spent my courage on the lying. I've little left for the truth.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.keeper_robbed", "op": "SetTrue"}, {"key": "act3.keeper_tells_truth", "op": "SetTrue"}, {"key": "act1.mercy_remembered", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 5}], "choices": []}, {"id": "third", "speaker": "The Mythallar-Keeper", "text": "*(Her eyes sharpen — the engineer recognizing a better solution.)* The quiet truth. *(slowly.)* Not the *lie* that infantilizes and not the *truth* that stampedes. The truth told *narrow* — to the steward who can ready the children, the captain who can keep order, the priest who can shrive the dying. *(she sets down her tools.)* Gods. I framed it as *two* doors — *peace or panic* — and stood between them congratulating myself on choosing the kinder. But you're right, there was always a *third* door, and I didn't open it because the third door requires *trusting people with a piece of the weight*, and I — *(a thin breath)* — I am a *keeper.* I hold the engine *alone.* I hold the *secret* alone. Sharing is not in my training. *(she straightens, decided.)* But an hour is too little to hoard. Help me tell the *right* few — quietly, precisely — so that the last hour of the Seventh Enclave isn't a *lie* or a *riot* but a *city quietly putting its house in order.* Children gathered. Debts forgiven. Hands held by *choice.* *(fiercely calm.)* That's a better falling than I'd planned. I was going to give them a beautiful lie. You've offered me a chance to give them a *dignified truth.* Let's spend the hour well.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.keeper_third_path", "op": "SetTrue"}, {"key": "act3.keeper_quiet_truth", "op": "SetTrue"}, {"key": "act3.witnessed_fall", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 5}], "choices": []}, {"id": "face", "speaker": "The Mythallar-Keeper", "text": "*(The composure holds, but her voice drops to something private.)* The one I love that I lied to. *(a long pause.)* ...My apprentice. Joss. Nineteen. He stood right *there* an hour ago — *(she nods at a spot by the engine)* — and he *saw* the amber stutter, and he's *clever*, he *knows* the readings, and he looked at me with the question already forming, and I — *(her hands tighten)* — I *smiled* and said *\"recalibration, Joss, fetch me the third lens.\"* And he *believed* me, because I'm his teacher, and he *trusts* me, and he *went to fetch the lens*, calm, while I let him walk away from his own last hour *learning a lie about valves.* *(quietly, the crack widening.)* He's the one. The face behind the composure. I can lie to four hundred strangers and keep my hands steady, but I sent the *boy I love like a son* to fetch a *lens* instead of telling him to *run home to his mother*, and *that* — *(she steadies herself on the engine)* — that one I cannot dress up as mercy. That one was just *cowardice* wearing a teacher's smile. *(she looks at you.)* Find Joss. Tell him the truth I couldn't. Let him spend his hour as *Joss*, not as the apprentice still believing in lenses. *Please.*", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.keeper_joss", "op": "SetTrue"}, {"key": "act3.find_joss", "op": "SetTrue"}, {"key": "act1.mercy_remembered", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "brave", "speaker": "The Mythallar-Keeper", "text": "*(Something in her eases, just slightly, at the word she didn't expect.)* Brave. *(a small, tired breath.)* No one's offered me *that* one. *Cold*, I've been called, in the three hours since I started lying — by the one other keeper who knows, who thinks I should *sound the alarm* and let the chips fall. *(she adjusts the dying engine.)* But sounding the alarm is *easy*, you see. It moves the weight *off* me and *onto* four hundred panicking souls. The *hard* thing — the thing I chose — was to *carry* the truth *alone* so that *they* wouldn't have to, and to *spend my own last hour lying* so that *theirs* could be *calm.* *(quietly.)* It may have been *wrong.* I've made my peace with possibly being *wrong.* What I could not bear was being *cowardly* — and you've named it *brave*, and I find that I needed, more than absolution, to be *seen* deciding the hard thing on purpose. *(she returns to the engine, steadier.)* Thank you. Now go — spend *your* hour better than I'm spending mine. Somebody in this city should get to fall *honestly.* I've chosen the lie. Don't *you* be calm. Be *true.* One of us should.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.keeper_brave", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 3}], "choices": []}, {"id": "serene", "speaker": "The Mythallar-Keeper", "text": "*(The warm, certain mask slides back into place, seamless.)* You're very kind to take an interest in the *engineering.* *(she smiles the smile she gives the nobles.)* But truly — a momentary flux. The mythallar recalibrates; the evening continues; there is *nothing* to trouble yourself over. *(she turns back to the stuttering amber light, her composure a sealed door.)* Do enjoy what's left of the party. The salmon, I'm told, is exceptional. *(and she will not let you in again — she has chosen her lie, and she will keep it beautifully, alone, to the end.)*", "dynamic": false, "auto": "close", "onEnter": [], "choices": []}, {"id": "close", "speaker": "The Mythallar-Keeper", "text": "*(The keeper turns back to the dying heart of the city — tending an engine that cannot be saved, weighing four hundred calm lies against four hundred true goodbyes — and you carry away the cruelest arithmetic in Netheril: that mercy and cowardice can wear the very same smile, and the only soul who'll ever know which one she chose is the one who has to fall holding the answer.)*", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "npc.neth.weavedeaf", "file": "NetherilDenizensContent.cs", "title": "Npc · Neth · Weavedeaf", "start": "0", "nodes": [{"id": "0", "speaker": "A Calm Child in a Screaming City", "text": "*(All around, arcanists clutch their heads and shriek — the Weave is dying, and to anyone attuned to it, its death is an unbearable *scream* tearing through the mind. Magelords weep blood. Apprentices claw at their ears. And in the middle of it, on a stone bench, a small girl sits *perfectly calm*, swinging her feet, watching the chaos with the mild interest of someone watching rain. She notices you noticing her stillness.)* You're not screaming either. *(she tilts her head.)* But you're not deaf like me. You hear it. You're just... *used* to terrible noises, I think. *(she pats the bench.)* Sit. You're the first grown-up who's looked at me instead of *through* me all day. Usually I'm the *broken* one. Today I'm the only one not bleeding from the ears, so. *(a small shrug.)* Funny how that works.", "dynamic": false, "auto": "1", "onEnter": [{"key": "npc.weavedeaf_met", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "The Weave-Deaf Child", "text": "*(She keeps swinging her feet, but her child's-voice carries something far older than her years.)* I was born Weave-deaf. It means I can't *hear* magic — can't feel the Weave, can't ever be a wizard, which in *Netheril* is like being born without a *face.* *(matter-of-fact.)* They tested me at four. The arcanist made the special light and asked what color it sang, and I said *lights don't sing*, and his face went all *sorry*, and after that everyone's face went all *sorry* whenever they looked at me. *Poor thing. Weave-deaf. Useless.* *(she watches a magelord collapse, screaming.)* And now the Weave is *dying*, and its dying is the loudest, worst sound there has ever been, and it's killing everyone who can *hear* it — driving them mad, stopping their hearts — and *I can't hear it at all.* *(she turns to you, and her calm is the eeriest thing in the falling city.)* The thing that made me *broken* my whole life is the only reason I'm the one person here who can still *think.* So I've been thinking. Somebody has to. Want to hear what the only calm person in a dying city worked out? I bet I'm right. Nobody ever lets me finish, usually.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "[INSIGHT 16] \"Every day of your life they called you broken for not hearing the one thing everyone treasured. And the universe just proved that the 'defect' was the *survival.* You weren't *less.* You were *built for exactly this hour.*\"", "next": "built", "fail": "small", "checkDC": 16, "checkAbility": "Wisdom"}, {"text": "\"Tell me what you worked out. You're the only clear head in the sky and we're falling — I'd be a fool not to listen to the one person who isn't screaming.\"", "next": "worked", "fail": null}, {"text": "\"What's your name? I want to thank the right person when your clear head saves lives. Not 'the Weave-deaf girl.' *You.*\"", "next": "name", "fail": null, "effects": [{"key": "companion.naeve.approval", "op": "AddInt", "amount": 3}]}, {"text": "\"Come with me. The arcanists are useless and the engine's failing, but *you* can think, and I need someone who isn't drowning in the scream. Be my clear head.\"", "next": "come", "fail": null, "effects": [{"key": "act3.weavedeaf_guide", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 2}]}]}, {"id": "built", "speaker": "The Weave-Deaf Child", "text": "*(For the first time, the eerie calm cracks — into something much more like a child, eyes filling.)* ...Built for this hour. *(very quietly.)* You really think — *(she scrubs at her eyes, fierce.)* They said *broken* so many times I — I made it my *name*, almost. The broken one. The deaf one. The *sorry-faced* one. I stopped trying to be *good* at things because *what's the point*, a Netherese who can't touch the Weave is a *joke*, a *waste*, a — *(she swallows.)* And now everyone who could touch the Weave is *dying of it*, and I'm sitting here *fine*, and *thinking*, and you're telling me I wasn't *less* — I was *for* something — *(she draws a shaking breath, and the calm that returns is different now, owned.)* That changes it. That changes *everything* about every *sorry* face. They felt sorry for the one thing that's keeping me *alive* and *clear* while they bleed. *(she stands, small and suddenly certain.)* Then I'm not going to *waste* it being sad about being right too late. I'm going to *use* it. Come on. The clear head's getting up. There are people to pull out of the scream before we hit the ground, and I'm the only one who can walk through it without falling down. *Built for this hour.* I'm going to *believe* that. Watch me.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.weavedeaf_built", "op": "SetTrue"}, {"key": "act3.weavedeaf_guide", "op": "SetTrue"}, {"key": "act1.mercy_remembered", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 5}], "choices": []}, {"id": "worked", "speaker": "The Weave-Deaf Child", "text": "*(She brightens — *finally*, someone's letting her finish — and lays it out with the crisp logic of a mind that thinks because no scream is stopping it.)* Right. So. Everyone's trying to *fix* the Weave or *escape* on teleport-magic, yes? *(she ticks it off on small fingers.)* Both *stupid.* The Weave's *dying* — you can't fix it, and every spell *fails* now, so teleporting just *splatters* you somewhere instead of *here.* *Magic is the thing that's broken.* So stop using magic. *(she points.)* The enclave is falling, but it's *falling*, not *vanished* — there's *time*, minutes, before the ground. And there are *non-magic* ways down. The cargo-gliders in the under-docks — *cloth and wood*, no Weave, the merchants use them when they don't want to pay the teleport-tax. They *still work*, because they were *never* magic. *(fiercely.)* Everyone's ignoring them because in *Netheril* you don't take the *peasant* way down — magic is for *lords*, gliders are for *cargo.* But the lords are all *bleeding from the ears*, and the *cargo-way* is the only way that *works* when the Weave is dead. *(she grins, sharp.)* The broken girl found the way out, and it's the way they were all too *proud* to look at. Funny how that works. Get people to the under-docks. I'll show you. I'm the only one who can read the way without a *guiding-spell* — because I *never had one.*", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.weavedeaf_plan", "op": "SetTrue"}, {"key": "act3.glider_escape", "op": "SetTrue"}, {"key": "act3.weavedeaf_guide", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "name", "speaker": "The Weave-Deaf Child", "text": "*(She blinks, genuinely startled.)* My name. *(slowly, like testing whether it's safe.)* ...It's Sefris. *(quietly.)* Most people don't ask. I'm *the Weave-deaf girl*, or *the Marsh's daughter*, or just *her*, the one you don't put in the wizard-school. *(she studies you.)* You asked like it *matters* which one I am. Like there's a *Sefris* worth thanking and not just a *defect* worth pitying. *(something steadies in her.)* Sefris. Yeah. *(a small, fierce smile.)* You know what — I like hearing it said like that. Like a *name* and not a *diagnosis.* *(she hops off the bench.)* Okay. *Sefris* is going to help you save some people, and when it's over and we're on the ground and not *under* it, you're going to tell whoever's left that *Sefris* did it. Not the deaf girl. *Sefris.* The one who could think when the whole sky was screaming. *(she offers a small hand to shake, solemn as a treaty.)* Deal?", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.weavedeaf_named", "op": "SetTrue"}, {"key": "act3.weavedeaf_guide", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "come", "speaker": "The Weave-Deaf Child", "text": "*(She hops off the bench immediately, as if she's been waiting all day to be *asked* to matter.)* *Finally.* *(she falls into step.)* Everyone else today either screamed at me or *prayed* at me or told me to *sit still and be brave*, and not *one* of them said *you can think, come help.* *(she glances up at you, sharp and pleased.)* You did. First one. *(matter-of-fact, walking into the chaos as the arcanists fall around her.)* I can walk through the scream — it's just *quiet* to me, I'll lead. I can find the ways the guiding-spells used to mark, because I learned every hall *by counting steps* instead of by magic — deaf kids do that. *(she takes your hand, small and certain.)* Stay close to the deaf girl, grown-up. Today the deaf girl's the one with *ears.* Come on. Let's go pull people out of a sky that won't stop screaming, and let's do it the *broken* way, which turns out to be the *only* way that *works.*", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.weavedeaf_joins", "op": "SetTrue"}, {"key": "act3.weavedeaf_guide", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 3}], "choices": []}, {"id": "small", "speaker": "The Weave-Deaf Child", "text": "*(She shrugs, the calm sliding back over whatever you stirred.)* It's okay. You don't have to make it a *whole thing.* *(she swings her feet.)* I'm used to being the broken one. Today it's *useful* broken instead of *sad* broken, that's all. Doesn't mean anything. *(but she watches you a moment longer than her words allow, as if hoping you'll insist it *does* — and when you don't, she just nods, and goes back to watching the screaming city with her terrible, lonely calm.)*", "dynamic": false, "auto": "close", "onEnter": [], "choices": []}, {"id": "close", "speaker": "The Weave-Deaf Child", "text": "*(The Weave-deaf child sits — or rises — in the heart of the screaming enclave, the one clear mind in a city of bleeding wizards, and you carry away the truest law of the whole falling age: that the thing a proud world calls *broken* is so often the thing built, in secret, for the hour the world breaks — and that the deaf girl counting steps in the dark was always the one who'd know the way down.)*", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "npc.neth.sabbath", "file": "NetherilDenizensTwoContent.cs", "title": "Npc · Neth · Sabbath", "start": "0", "nodes": [{"id": "0", "speaker": "Lady Sabbath", "text": "*(In a salon whose floor now slopes toward the abyss, a magelord reclines on a chaise as though the angle were a fashion she'd chosen, sipping wine that pools toward the high lip of the glass. Her gown is flawless. Her composure is geological. She regards the cargo-glider somebody has dragged into her elegant doorway with the precise distaste of a woman shown a chamber-pot at dinner.)* No. *(she sips.)* Absolutely not. I am told that *contraption* of cloth and tar is the *practical* means of descent. *(a delicate shudder.)* I am Lady Sabbath of the Seventh Enclave, and I have not spent forty years becoming *flawless* in order to arrive at the ground clutching a *cargo-sail* like a fishwife fleeing a fire. If the sky will have me, it will have me *seated.* With wine. *Elegant.*", "dynamic": false, "auto": "1", "onEnter": [{"key": "npc.sabbath_met", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "Lady Sabbath", "text": "*(She gestures you to a chair that is sliding slowly toward oblivion.)* You think me *mad*, or *vain*, or both. *(she swirls the wine.)* Sit, if you can manage the gradient. Let me tell you a thing I have told no one in forty years. *(quietly, the diction never slipping.)* I was *born* in the under-tiers. The *vulgar* levels, where the enclave's waste runs down. My mother gutted fish for the magelords' tables. *(she examines her flawless nails.)* And I clawed — *clawed* — my way up tier by tier, learning the *walk*, the *vowels*, the *thousand tiny knives of being a lady*, until not one soul in the Seventh could smell the fish on me. I *built* her. Lady Sabbath. Brick by elegant brick. She is the finest thing I have ever made, and she is *entirely* a forgery, and she is *also* the only *me* I can bear to be. *(she meets your eyes.)* So you see the trouble. To take your *sensible glider* is to arrive at the ground as the *fishwife* again — to admit, in my last hour, that the lady was always a *costume.* *(a thin, glittering smile.)* I would genuinely, truly rather *die* as Lady Sabbath than *live* as the gutter-child who only ever *pretended.* Is that vanity? Or is it the most honest thing a self-made woman ever did?", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "[INSIGHT 18] \"The lady isn't the forgery, Sabbath. The *fishwife* is — that's the role *they* assigned you, the one you refused. You didn't put on a costume forty years ago. You took one *off.* The elegance is the truth. So *live* in it.\"", "next": "truth", "fail": "sneer", "checkDC": 18, "checkAbility": "Wisdom"}, {"text": "[PERSUADE 17] \"There is nothing *elegant* about performing for a dead audience. The truly elegant thing — the thing no fishwife would dare — is to *survive*, vulgarly, defiantly, and make the ground *witness* a lady who was too refined to die on cue.\"", "next": "survive", "fail": "sneer", "checkDC": 17, "checkAbility": "Charisma"}, {"text": "\"Forty years building someone the gutter could never touch — and the one thing that proves she's *real* is that she's brave enough to be *seen* climbing into a cargo-sail. Cowards die elegant. *Ladies* improvise.\"", "next": "improvise", "fail": null}, {"text": "\"Tell me about your mother. The one who gutted fish. Not as the thing you climbed away from — as the woman who made the climb *possible.*\"", "next": "mother", "fail": null, "effects": [{"key": "companion.naeve.approval", "op": "AddInt", "amount": 3}]}]}, {"id": "truth", "speaker": "Lady Sabbath", "text": "*(The wine glass stops halfway to her lips. For the first time the geology of her composure *shifts.*)* ...The fishwife is the forgery. *(very quietly.)* No one has ever — *(she sets down the glass with enormous care.)* They all assume the *gutter* is the *real* me and the *lady* is the lie. *You* propose the reverse. That the frightened fish-gutting child was the *role circumstance forced on me*, and Lady Sabbath is who I *was underneath it all along*, finally *excavated.* *(her voice, for one heartbeat, loses the cultivated vowels and finds something rawer and truer.)* Do you know, I think — I think that might be *correct.* I never *felt* like the gutter. I felt like a *jewel in mud*, my whole childhood, *certain* there was a self the fish-stink wasn't. And I spent forty years *digging her out.* *(the elegance returns, but warmer now, owned rather than performed.)* If the lady is the *truth* and not the *mask* — then a truth does not need to *die* to prove it was real. A truth can *survive.* *(she rises, magnificent, and regards the glider with new eyes.)* Help me into your dreadful contraption, then. Not as the fishwife fleeing. As *Lady Sabbath, declining to die merely to flatter a doctrine that says ladies must perish prettily.* The truest elegance, it seems, is *outliving the people who'd have preferred you gone.*", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.sabbath_truth", "op": "SetTrue"}, {"key": "act3.sabbath_survives", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 5}], "choices": []}, {"id": "survive", "speaker": "Lady Sabbath", "text": "*(She tilts her head, and a slow, dangerous delight kindles.)* Performing for a *dead audience.* *(she laughs — a real one, surprised out of her.)* Oh, that's *vicious.* And *accurate.* For whom, precisely, am I dying elegantly? The magelords who'd have me die in *form?* They're *bleeding from the ears.* There's no one *left* to be impressed by a beautiful corpse. *(she sets down the wine, intrigued against her will.)* You reframe it cleverly. To die elegant is to obey the *last instruction of a society that's already dead.* To *survive* — to climb into the vulgar sail and live, vulgar and breathing — *that's* the move no rule anticipated, and a lady's whole art is *the move no one anticipated.* *(she stands, smoothing the flawless gown.)* Very well. I shall *survive.* And I shall be *insufferable* about it — the only magelord of the Seventh refined enough to understand that *dying on cue is for amateurs.* *(she sweeps toward the glider.)* Let the ground receive a lady who declined her own funeral. *That,* darling, is *style.* The dead can keep their elegant ashes. I intend to be *rudely, gorgeously alive.*", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.sabbath_defiant", "op": "SetTrue"}, {"key": "act3.sabbath_survives", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 3}], "choices": []}, {"id": "improvise", "speaker": "Lady Sabbath", "text": "*(A long pause. Then a small, conceding incline of the head — the salute of a duelist who's been touched.)* *Ladies improvise.* *(softly.)* You've found the one argument the forgery can't refuse — because it's *true to the craft.* A *lady* is not a woman who follows the *rules of elegance.* Any debutante can follow rules. A *lady* is a woman who *makes* the room *agree* that whatever *she* does *is* elegant. *(she rises, the decision crystallizing.)* So if Lady Sabbath climbs into a cargo-sail with her chin up and her wine in hand — then *that is elegant*, by definition, because *I* did it, and *I* decide. *(she lifts the glass in a small toast to you.)* The fishwife would have been *ashamed* of the glider. The *lady* is too grand for shame. *(a glittering smile.)* You've just saved my life by appealing to my *vanity*, and I want you to know that I *see* the manipulation, and I *approve* of it, because it was *deftly done.* Come. Hand a lady into her ridiculous salvation. We shall descend in *style*, and I shall tell everyone at the bottom it was *entirely my idea.*", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.sabbath_improvise", "op": "SetTrue"}, {"key": "act3.sabbath_survives", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 3}], "choices": []}, {"id": "mother", "speaker": "Lady Sabbath", "text": "*(The cultivated mask doesn't drop, but something behind it goes very still and very old.)* My mother. *(a long silence; the floor creaks.)* ...Her name was Pell. She gutted fish for nine hours a day and her hands were *ruined* by the salt — split, scarred, never *clean*, no matter how she scrubbed. *(quietly.)* And every night she took those ruined hands and she *braided my hair* as if I were a *princess*, and she told me — *(the vowels slip; the under-tier comes through)* — she told me, *\"You're not for here, my girl. You're for somewhere with clean hands.\"* *(she looks at her own flawless, unblemished fingers.)* She *died* in the mud, of course. The vulgar levels don't *let* you up; *I* had to *claw.* But every tier I climbed, I climbed on *her* certainty that I was *for* somewhere better. *(the mask reasserts, but wet at the edges.)* So when you ask about the fishwife I *climbed away from* — understand, I did not climb away from *her.* I climbed *because* of her, *toward* the clean hands she swore I'd have. Lady Sabbath is *Pell's* monument, not Pell's *betrayal.* *(fiercely elegant.)* And Pell did not give me clean hands so I could *die in them on schedule.* ...Fetch the glider. My mother's daughter chooses to *live.*", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.sabbath_mother", "op": "SetTrue"}, {"key": "act3.sabbath_survives", "op": "SetTrue"}, {"key": "act1.mercy_remembered", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "sneer", "speaker": "Lady Sabbath", "text": "*(She lifts one perfect eyebrow, and the full weight of forty years of cultivated disdain descends.)* How *earnest.* *(she sips her sliding wine.)* You mistake me for someone in *crisis*, darling. I am not *agonizing.* I have simply *decided*, and a lady's decisions are not *débated* with — *(a small wave)* — *adventurers.* Run along to your sensible little glider and your sensible little survival. *(she reclines deeper into the tilting chaise.)* I shall finish my wine. The vintage deserves a *witness*, and the floor and I have an appointment. *(and she turns her flawless profile to the abyss, declining, with infinite grace, to be saved by anyone so *vulgar* as to *care.*)*", "dynamic": false, "auto": "close", "onEnter": [], "choices": []}, {"id": "close", "speaker": "Lady Sabbath", "text": "*(Whether she rode the vulgar glider down with her chin up or kept her appointment with the floor, wine in hand, Lady Sabbath of the Seventh remains the most deliberate soul in the falling city — a fishwife's daughter who built a lady brick by brick and had to decide, in the last hour, whether the finest thing she ever made was worth *living* in or only worth *dying* as.)*", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "npc.neth.ynn", "file": "NetherilDenizensTwoContent.cs", "title": "Npc · Neth · Ynn", "start": "0", "nodes": [{"id": "0", "speaker": "Proctor Ynn", "text": "*(An arcanist surrounded by toppling stacks of annotated folios looks up at you — and *drops his pen.* His face goes through astonishment, terror, and a scholar's helpless delight in the space of a breath. He scrambles up, knocking over a decade of careful work, and stares at you as though you are a word he has read ten thousand times and never once expected to *speak* to.)* It's *you.* *(barely a whisper.)* I'd know that — gods, I'd know it anywhere — I've spent *eleven years* reading your *handwriting.*", "dynamic": false, "auto": "1", "onEnter": [{"key": "npc.ynn_met", "op": "SetTrue"}, {"key": "act3.ynn_recognition", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "Proctor Ynn", "text": "*(He seizes a folio from the nearest stack with shaking hands — it is a copy of Karsus's master-work, dense with arcane notation, and in the *margins*, in a second hand, are annotations: warnings, corrections, small desperate notes.)* Karsus's *Folly.* The spell that is *killing the sky as we speak.* *(he jabs at the margins.)* And in *every* copy — *every one* — there is a *second annotator.* A hand that *warned* him. *\"This severs the Weave at the root.\" \"Mystryl will not survive the seizing.\" \"Stop. There is another way. Stop.\"* *(he looks up at you, white.)* Eleven years I've studied this second hand, this *anonymous prophet* who saw the catastrophe *coming* and wrote it in the *margins* and was *ignored* — and I have *dreamed* of who they might be, and just now, watching you cross my floor, I — *(his voice cracks)* — *the way you move, the way you tilt your head reading* — it's the *same* as the *hand.* I can't explain how I know. But I know. *(he grips the folio.)* You wrote these warnings. And that's *impossible*, because these annotations are *older than you*, some of them older than my *grandfather* — and yet here you *are.* So I have to ask, and I'm *terrified* of the answer: *have you been here before?*", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "[INSIGHT 18] \"You've spent eleven years proving a stranger warned Karsus and was ignored. But the warning didn't fail because no one *wrote* it. It failed because no one would *read* it. You're not meeting the prophet, Ynn. You're meeting the *unheeded* — and you're the first to finally *listen.*\"", "next": "unheeded", "fail": "doubt", "checkDC": 18, "checkAbility": "Wisdom"}, {"text": "\"I don't know if I wrote them. But my hand recognizes them too — I felt it the moment you held up the page. As if I'm reading something I'll write, or wrote, or am writing. Time doesn't sit straight around me, Ynn.\"", "next": "loop", "fail": null, "effects": [{"key": "act3.returned_annotator", "op": "SetTrue"}]}, {"text": "\"Show me the warnings. All of them. If I wrote them once and Karsus ignored them, then maybe the second reader — *you* — is the one they were *really* for.\"", "next": "warnings", "fail": null, "effects": [{"key": "sq.karsus_margins", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 3}]}, {"text": "\"Be careful what you've found, Ynn. A man who proves the apocalypse was *annotated* has proved it was *preventable* — and that knowledge has driven steadier scholars than you to the abyss.\"", "next": "careful", "fail": null, "effects": [{"key": "companion.garrow.approval", "op": "AddInt", "amount": 2}]}]}, {"id": "unheeded", "speaker": "Proctor Ynn", "text": "*(He sits down hard, the folio sliding from his hands.)* ...The *unheeded.* *(slowly, the eleven years rearranging in his mind.)* Not the prophet who *failed.* The prophet who *succeeded* — who saw it *perfectly*, wrote it *plainly*, *\"Stop, there is another way, stop\"* — and was *read by no one with the power to act.* *(he stares at the margins.)* I've been studying it *backwards.* I kept asking *why didn't the warning work* — as if the *warning* were flawed. But the warning is *flawless.* It's *correct in every particular.* It didn't fail. It was *ignored.* *(he looks up at you, and there are tears.)* And that's so much *worse*, isn't it. A *flawed* prophecy is a tragedy of *knowledge.* A *perfect* one, *unheeded*, is a tragedy of *will* — the sky is dying not because no one *knew* but because the one who *mattered* would not *read his own margins.* *(fiercely.)* Then let me be the reader eleven years too late. Whatever you are — *Returned, looped, impossible* — I have *read* you. I have read every word you wrote in the dark and I *believe* every one. The warning finally reached *someone.* It's me. It's eleven years late and one apocalypse short, but the prophet has, at last, *one* faithful reader. *Tell me what the margins say to do.*", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.ynn_unheeded", "op": "SetTrue"}, {"key": "act3.returned_annotator", "op": "SetTrue"}, {"key": "sq.karsus_margins", "op": "SetTrue"}, {"key": "act1.mercy_remembered", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 5}], "choices": []}, {"id": "loop", "speaker": "Proctor Ynn", "text": "*(He goes very still, and the scholar in him and the frightened man in him reach the same conclusion together.)* Time doesn't sit straight around you. *(a whisper.)* Then it's *true.* The thing I've never dared write in my notes because they'd have *committed* me for it: that the second annotator isn't *one person at one time.* That the hand appears in folios *centuries* apart, always the same, always *warning*, always *ignored* — because it belongs to someone who *moves through the catastrophe more than once.* *(he stares at you.)* You've done this *before.* Reached this falling city, or one like it, and written *stop* in the margins of a hundred disasters, and watched a hundred Karsuses *not read them.* *(his voice shakes.)* That's not a *prophet*, that's a — a *prisoner.* Someone *condemned* to witness the same refusal across all of time, scribbling warnings into margins that the powerful will *never* lower their eyes to see. *(he reaches out, almost touches your sleeve.)* How many times have you written *stop*, Returned? And how many times has the world said *thank you, but no?* *(quietly, devastated.)* No wonder your hand looks so *tired* in the later folios. I always thought it was the *quill* failing. It was *you.*", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.ynn_loop", "op": "SetTrue"}, {"key": "act3.returned_annotator", "op": "SetTrue"}, {"key": "act3.loop_glimpsed", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "warnings", "speaker": "Proctor Ynn", "text": "*(He gathers the folios with trembling reverence and spreads them before you — a constellation of marginalia across centuries of copies.)* All of them. Here. *(he traces the second hand.)* *\"This severs the Weave at the root.\"* *\"There is a smaller working that grants the same end without the seizing — see the third axiom.\"* *\"You do not need to be a god to be enough, Karsus. Stop.\"* *(his voice breaks on the last.)* *That* one. *\"You do not need to be a god to be enough.\"* That's not *arcana*, Returned. That's not a *correction.* That's — that's *pleading* with a *frightened, grandiose man* not to *destroy everything* trying to be *more* than he already *was.* *(he looks at you.)* Whoever wrote these *understood* Karsus. Loved him, almost. Tried to save him from his *own bigness.* *(he presses the folios into your hands.)* Take them. If you wrote them, they're *yours.* And if you *didn't* — if it only *looks* like your hand — then take them anyway, because the *next* Karsus, the next grandiose frightened soul reaching for a crown too big, will need someone who *carries the warning* and knows how it *ends.* The margins were always *for* the reader who'd come *after.* You came after. They're yours.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.ynn_gives_margins", "op": "SetTrue"}, {"key": "sq.karsus_margins", "op": "SetTrue"}, {"key": "act3.you_do_not_need_to_be_a_god", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 3}], "choices": []}, {"id": "careful", "speaker": "Proctor Ynn", "text": "*(He laughs, short and frayed, and the eleven years show in it.)* Too late for *careful.* *(he gestures at the toppling stacks, the obsession of a decade.)* I crossed the line you're warning me from *years* ago, Returned. The day I realized the apocalypse was *annotated* — that someone *saw it coming* and *said so* — I stopped being able to think of *anything else.* Because if it was *foreseen*, then it was *preventable*, and if it was *preventable*, then every soul about to fall out of this sky is dying of a *choice* somebody made to *not read the margin.* *(he steadies himself.)* That knowledge *has* driven me half to the abyss. You're right. But here's the thing the steadier scholars never understood: *someone has to hold the proof that it didn't have to happen.* Otherwise the survivors will call it *fate*, and *fate* absolves everyone, and the *next* Karsus reaches for the *next* crown with a clean conscience. *(fiercely.)* So I'll stay half-mad by the abyss, thank you, *guarding the evidence that the sky was murdered, not doomed.* It's a *terrible* vocation. It's *mine.* ...But I'd be *steadier*, I think, if you'd carry a copy. So I'm not the *only* one who knows it was a *choice.*", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.ynn_careful", "op": "SetTrue"}, {"key": "sq.karsus_margins", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 3}], "choices": []}, {"id": "doubt", "speaker": "Proctor Ynn", "text": "*(He shakes his head, clutching the folio defensively.)* No — no, you're trying to make it *philosophy*, and it's not *philosophy*, it's *handwriting*, it's *evidence*, it's *real* — *(he hunches over the stacks.)* The warning didn't *fail* of *will*, it — it must have been *garbled*, or *late*, or *miscopied*, there must be a *flaw* in it I haven't found yet, because if the warning was *perfect* and *ignored* then — *(he stops, can't finish, won't.)* No. There's a flaw. There's *always* a flaw. I'll *find* it. Eleven years and I'll *find* the reason the warning *failed*, because the alternative — *(his hands shake)* — the alternative is that *perfect knowledge changes nothing*, and a *scholar* cannot live in a world where that's *true.* Go. Let me find the flaw. It's *there.* It has to be there.", "dynamic": false, "auto": "close", "onEnter": [], "choices": []}, {"id": "close", "speaker": "Proctor Ynn", "text": "*(Proctor Ynn bends back over his constellation of margins — the man who proved the apocalypse was annotated, and now cannot stop reading the warning that a frightened god refused — and you carry away the first cold thread of a mystery about your own hand: that someone with your exact tired script has been writing *stop* in the margins of catastrophes for longer than you have been alive, and the powerful have, every time, declined to lower their eyes.)*", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "npc.neth.bondsman", "file": "NetherilDenizensTwoContent.cs", "title": "Npc · Neth · Bondsman", "start": "0", "nodes": [{"id": "0", "speaker": "A Bound Servant With a Folded Paper", "text": "*(Amid the panic, one bound servant stands unnervingly calm beside a magelord who is shrieking at a teleport-scroll that will not fire. The servant — collar still on, posture still deferential by long habit — holds a single folded document, and watches his master's terror with an expression you cannot quite read: not triumph, not pity, but the flat exhaustion of a man who has waited a very, very long time for a moment that is arriving *wrong.*)* You're staring at the collar. *(he doesn't look at you.)* Everyone does. The collar says *property.* *(he unfolds the paper a half-inch.)* This says otherwise. As of three days ago, by the enclave's own contract law, *I* own *him.* *(a glance at the screaming magelord.)* I have wanted this moment for nineteen years. It is *here.* And the sky is *falling.* So.", "dynamic": false, "auto": "1", "onEnter": [{"key": "npc.bondsman_met", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "The Bondsman", "text": "*(He refolds the paper with great precision.)* He bought me at eleven. Worked me, named me *after his dog* — the *previous* dog, so I'd know my place. *(flatly.)* And he taught me letters, because a *literate* slave fetches better prices and reads ledgers he's too lazy to read himself. *(the faintest cold smile.)* Nineteen years I read his ledgers. And his *contracts.* And four years ago I found it — a clause, in the bonding-deed *he* signed without reading, that voids his claim if certain debts went unpaid. *(he taps the paper.)* They went unpaid. I made *certain* they went unpaid — quietly, ledger by ledger, for *four years.* And three days ago the clause *triggered*, and by the enclave's own sacred law, the *bond inverted.* I am his *master* now. He doesn't know yet. I was *savoring* it. *(he looks at the falling sky, and the savor curdles.)* And now the world ends, and my great *victory* — the thing I built my whole *self* around — is a *folded paper* that will hit the ground exactly as *fast* as I do. *(he meets your eyes, and the flatness cracks.)* Tell me, Returned. What does a man *do* with justice that arrives one hour before the end of the world?", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "[INSIGHT 18] \"You never actually wanted to *own* him. You wanted to be *seen* as a person — and you thought owning him would force it. But the paper can't make him see you. Only *you* can decide you were a person all along, paper or not.\"", "next": "seen", "fail": "bitter", "checkDC": 18, "checkAbility": "Wisdom"}, {"text": "\"Free him. Not for *his* sake — for *yours.* Spend your one hour of ownership doing the one thing he never did with his: *letting someone go.* Make the paper mean something he never made it mean.\"", "next": "free", "fail": null}, {"text": "\"Tear it up, or hold it to the end — but don't waste your last hour *watching him.* You spent nineteen years looking at that man. Look at something *worth* your eyes instead.\"", "next": "elsewhere", "fail": null, "effects": [{"key": "companion.naeve.approval", "op": "AddInt", "amount": 2}]}, {"text": "\"He named you after his dog. So he never gave you a name. Tell me the one you'd have *chosen* — the free man's name. I'll call you by it for whatever hour's left.\"", "next": "name", "fail": null, "effects": [{"key": "companion.garrow.approval", "op": "AddInt", "amount": 3}]}]}, {"id": "seen", "speaker": "The Bondsman", "text": "*(The folded paper trembles, just slightly, in his steady hand.)* ...To be *seen.* *(very quietly.)* Nineteen years and you've named it in a *sentence.* *(he looks at the document as if it's changed shape.)* I told myself I wanted *ownership.* *Inversion.* To make him *property*, as he made me. But you're right — that was never — *(he swallows.)* What I wanted, at *eleven*, collared and renamed-after-a-dog, was for *one person* to look at me and see a *boy* and not a *deed.* And I couldn't *get* that, so I — I substituted a thing I *could* get. The *paper.* The *law.* *Owning* him. As if making the *deed* run the *other way* would fill the hole where *being seen* should have gone. *(the paper lowers.)* And it *won't.* I could own him a thousand times and still be the *unseen boy.* Because the seeing was never *his* to give — he *can't* see me, he never could, men like him are *blind* to the collared by *design.* *(he looks at you, and something nineteen years old finally loosens.)* *You* saw me. A stranger, in the last hour, looked at the collar and asked about the *man.* That's — that's the thing I built the whole legal war to *force*, and you gave it for *free.* *(he breathes.)* The paper can go to the ground without me now. I got the *real* thing. Thank you, Returned. I was a *person* all along. I just needed one set of eyes to *confirm* it before the end.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.bondsman_seen", "op": "SetTrue"}, {"key": "act1.mercy_remembered", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 5}], "choices": []}, {"id": "free", "speaker": "The Bondsman", "text": "*(He goes very still. The idea clearly never occurred to him — that ownership could be *spent* rather than *savored.*)* Free him. *(slowly.)* With the *one hour* I waited *nineteen years* for. *(he looks at the screaming magelord — pathetic now, clawing at a dead scroll.)* You understand what you're asking. He showed me *no* mercy. *None.* Named me after a *dog.* And you want me to spend my single hour of *power* over him *releasing* him. *(a long, long pause. Then something shifts — not forgiveness, something harder and cleaner.)* ...No. Not for *him.* You said it right — *for me.* *(he unfolds the paper fully.)* He *owned* people and it made him *small* — a shrieking thing clutching a scroll, owning everything and worth nothing. *(he looks at the document.)* If I *own* him and *gloat*, I become *him* — a man whose whole self is a deed over another. But if I *own* him and *release* him — *(his voice steadies into something almost free)* — then I am the *one* person in this transaction who did with ownership the thing he *never* could: *gave it up.* *(he tears the paper, deliberately, in half.)* There. He's free. He'll never even know I held his leash. *(he lets the pieces fall toward the abyss.)* But *I* know. And in my last hour I was a man who *let go*, not a man who *clutched.* That's the only revenge worth having. Not becoming the thing that hurt me. *Out-growing* it, with the clock running out. Come. I'd rather not watch him fall. I've a better use for my eyes now.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.bondsman_frees", "op": "SetTrue"}, {"key": "act3.bondsman_freed_master", "op": "SetTrue"}, {"key": "act1.mercy_remembered", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "elsewhere", "speaker": "The Bondsman", "text": "*(He blinks, as if surfacing from nineteen years underwater.)* ...Look at something worth my eyes. *(slowly, he turns away from the magelord — *physically* turns, putting his back to the man he watched for two decades.)* Do you know, I've not — I've not *looked away* from him in nineteen years. Always watching. *Where is he, what does he want, is he angry, is he pleased.* My eyes *belonged* to him long before the law did. *(he faces the great windows instead, the falling golden sky.)* And I was about to spend my *last hour* the same way — staring at *him*, savoring a paper, my gaze *still his property* even in the moment I supposedly *owned* him. *(a slow breath.)* The sky is *beautiful*, falling. I never noticed. I was always *watching him.* *(he looks at it, really looks, perhaps for the first time.)* Thank you. You've freed my *eyes*, which turns out to be the only part of me the collar ever truly held. *(quietly.)* Let him scream at his scroll. I'm going to spend my hour looking at *anything* — *everything* — that isn't *him.* Nineteen years is long enough to watch a small man. The sky deserves a turn.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.bondsman_elsewhere", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 3}], "choices": []}, {"id": "name", "speaker": "The Bondsman", "text": "*(For a moment he can't speak. When he does, his voice has gone rough.)* The name I'd have *chosen.* *(quietly.)* No one has ever asked me that. He named me *Scrap* — after the dog. I've *answered* to *Scrap* for nineteen years, and *hated* it, and *answered* anyway, because the collar answers when it's called. *(he closes his eyes.)* But in here — *(he touches his chest)* — in here, where he couldn't reach, I had a *different* name. I chose it at *twelve*, reading a history he didn't know I read, about a freedman who built an *aqueduct* — water for a whole city, his name on every stone. *(he opens his eyes.)* *Castian.* I named myself *Castian.* The man who'd build something that *gave* instead of *took.* *(his voice shakes.)* Nineteen years and you're the first soul to ask the *free* name, and now someone, *once*, before the end, can *call* it — *(he looks at you, desperate and grateful.)* — *say* it, please. Call me by it. Let the air hold *Castian* out loud, just once, so it was *real*, so I wasn't *Scrap* all the way to the ground.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.bondsman_castian", "op": "SetTrue"}, {"key": "act1.mercy_remembered", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "bitter", "speaker": "The Bondsman", "text": "*(His face closes like a ledger.)* Spare me the *philosophy.* *(flatly.)* You've never worn a collar, so you've the *luxury* of telling me what I *really* wanted. *(he refolds the paper.)* What I *really* wanted was *him*, *under* my *heel*, the way I was under his — and I *got* it, three days too late to enjoy and one hour too late to matter, and your *gentle reframing* doesn't change that the *one* thing I built my life around is *worthless ash.* *(he turns back to watching the magelord.)* Go. Let me have my *bitter little victory* in peace. It's *small*, and it's *late*, and it's *mine*, and I'll not have a stranger *improve* it into a *lesson.* Some things are just *robbed*, Returned. Mine is one. Leave me to it.", "dynamic": false, "auto": "close", "onEnter": [], "choices": []}, {"id": "close", "speaker": "The Bondsman", "text": "*(The bondsman stands with his folded paper as the city falls — a man who won a nineteen-year war for justice exactly one hour too late to spend it — and whether he tore the deed, looked away, or clutched his bitter victory to the end, you carry the cold knowing that the cruelest thing the enclave ever did was not the collar, but the way it taught a boy that *being owned* and *being seen* were the same unreachable thing.)*", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "npc.neth.naeve", "file": "NetherilDenizensTwoContent.cs", "title": "Npc · Neth · Naeve", "start": "0", "nodes": [{"id": "0", "speaker": "Naeve", "text": "*(In a collapsing archive, a young woman works with furious, mechanical speed — not fleeing, not weeping, but *sorting*, cross-referencing, stamping, building a wall of documents around herself as the literal walls come down. She does not look up.)* If you're here to *rescue* me, the door's behind you and I'm not coming. *(stamp.)* If you're here to *help*, then *carry* — *(she shoves a stack at you without looking)* — these are the only copies and they cannot be allowed to *burn* with everything else. *(stamp.)* If you're here to tell me the sky is *falling*, I am *aware*, I have *charted* it, I know the descent rate to the *foot.* *(finally, she looks up, and her eyes are red-rimmed and absolutely dry, the eyes of someone who has moved *past* crying into something colder and more useful.)* So. Which are you.", "dynamic": false, "auto": "1", "onEnter": [{"key": "npc.naeve_met", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "Naeve", "text": "*(She keeps working as she talks, the documents a fortress between her and the falling world.)* I am Naeve. Of the Seventh Enclave. The *last* of the Seventh, as of about three hours ago, when the rest of my house took the *teleport-scrolls* I *told them wouldn't fire* and are now *smeared* across the lower atmosphere. *(stamp.)* I am not building a *raft.* I am not building an *escape.* I am building *proof.* *(she gestures at the documents — and you see, now, what they are: arcane analyses, witness-seals, copied margins.)* Proof that this — *(she gestures at the screaming sky)* — was not *fate.* Was not *the gods.* Was not *bad luck.* Karsus was *warned.* In the *margins of his own work.* Someone saw it *coming* and *wrote it down* and the magelords of *eight enclaves*, including *my father*, the great *Lord of the Seventh*, *read the warning and voted to proceed anyway* because stopping would have cost them *prestige.* *(her stamp comes down hard.)* My family is dying of *vanity*, Returned, dressed up as *fate*, and when the survivors crawl out of the wreckage they will call it a *tragedy* and *grieve cleanly* and learn *nothing.* *(her dry eyes burn.)* I will not *let* them. I am assembling the *indictment.* So that it goes down in the record as what it *was*: not a *fall.* A *murder*, with *signatures.*", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "[INSIGHT 18] \"You're not assembling proof, Naeve. You're assembling a *wall* — out of paper, around the one thing you can't afford to feel. Every stamp is a sob you won't let land. The indictment is real. It's also a place to hide from the grief.\"", "next": "wall", "fail": "cold", "checkDC": 18, "checkAbility": "Wisdom"}, {"text": "\"Then I'll carry the indictment where it can't be buried. But it needs more than a clerk, Naeve — it needs someone *alive* at the end to *read* it aloud. Come with me. Be the witness, not just the archivist.\"", "next": "recruit", "fail": "bristle"}, {"text": "\"The annotator. The hand in the margins who warned Karsus. I've met a man who's studied it eleven years — and who thinks it's *mine.* Your proof and my mystery are the same thread, Naeve.\"", "next": "annotator", "fail": null, "effects": [{"key": "act3.naeve_knows_annotator", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 3}]}, {"text": "\"Your father read the warning and voted to proceed. Tell me about him — not the verdict, the *man.* You're indicting someone you loved. That's the part the record won't hold.\"", "next": "father", "fail": null, "effects": [{"key": "companion.naeve.approval", "op": "AddInt", "amount": 2}]}]}, {"id": "wall", "speaker": "Naeve", "text": "*(Her stamp stops mid-air. For a long moment she doesn't move, doesn't breathe — and then, slowly, she sets the stamp down, and her dry eyes finally, terribly, *fill.*)* ...A wall of paper. *(barely a whisper.)* Around the thing I can't — *(her hands are shaking now.)* Damn you. *Damn* you, I had it *managed.* I had it *sorted.* If I keep *stamping* I don't have to feel that my *mother* is a *smear* in the *sky* and my *father* is a *murderer* I still *love* and I am *alone* in a *falling building* assembling the *evidence of my own orphaning.* *(a sound tears out of her, half sob, half fury.)* Every document is — you're *right* — every stamp is a *grief* I *filed* instead of *felt*, because *feeling* it means *stopping*, and *stopping* means it's *real*, and if it's *real* then I'm a *girl* whose *family* chose *pride* over her *life* and I — *(she presses her hands to her face.)* I can't *carry* the indictment *and* the grief. I haven't the *hands.* *(she looks at you, drowning.)* So I chose the indictment. Because the indictment *needs* doing and the grief just — *needs.* *(quietly, breaking.)* Will you — gods, I don't even know how to ask — will you carry the *proof*, so that I have a *hand free* to finally *grieve* the people whose murder I've been *documenting?* I think if someone *else* held the evidence, I could afford to *feel* it. Just once. Before the ground.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.naeve_wall", "op": "SetTrue"}, {"key": "sq.naeve_indictment", "op": "SetTrue"}, {"key": "act1.mercy_remembered", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 6}], "choices": []}, {"id": "recruit", "speaker": "Naeve", "text": "*(She stops, and looks at you properly for the first time — measuring, sharp, the grief-fury banked into something appraising.)* A witness. Not a clerk. *(slowly.)* You understand the flaw in my whole project, then. I've been building an indictment with *no one left to read it.* A *perfect* case, *filed*, in a building that's about to become a *crater.* *(she stands, abandoning the stamp.)* What good is proof that *vanity murdered Netheril* if it goes down in the wreckage with the last witness? *(her eyes narrow, the plan reforming around you.)* You're *Returned.* You *persist.* You walk out of catastrophes that swallow everyone else. *(fiercely.)* Then you're not a *helper*, Returned. You're a *vector.* The one carrier who can take this indictment *out* of the fall, *forward*, to a place and time where it can be *read aloud* and *believed* — where my father's *signature* under the warning can *damn* him in front of someone with the power to make the *next* magelord *read his margins.* *(she gathers the core documents, decisive.)* I'm coming with you. Not to be *saved* — I've made my peace with the ground. To make *certain* the indictment has *legs.* I'll be your *evidence*, and your *prosecutor*, and the *living memory* of the Seventh, for as long as a last daughter can be. Get me and these documents *out.* Then point me at *anyone* who still thinks the powerful should be *trusted to read their own warnings.*", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.naeve_recruit", "op": "SetTrue"}, {"key": "sq.naeve_recruit", "op": "SetTrue"}, {"key": "act3.naeve_will_join", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 5}], "choices": []}, {"id": "annotator", "speaker": "Naeve", "text": "*(Her head snaps up, and the cold archivist vanishes into raw, electric focus.)* The annotator. You've — *(she's around the table in a heartbeat, gripping your arm.)* You've *met* someone who's *studied the hand?* Eleven *years?* *(she's shaking, but with purpose now, not grief.)* Do you understand what that *means* for the indictment? My whole case rests on proving the warning was *real* — that a *specific intelligence* saw the catastrophe and *recorded* it, so that \"no one could have known\" becomes a *lie* I can *prove.* And if there's a *scholar* who can *authenticate* the second hand, *date* it, *testify* to it — *(she stops, the second half of your sentence landing.)* ...*Yours.* He thinks it's *yours.* *(she steps back, staring at you with a wild new calculation.)* That's — that's either the *keystone* of my case or the thing that *shatters* it, because a warning written by a *Returned* — by someone *outside* normal time — is either the *most* damning evidence imaginable or *inadmissible madness.* *(fiercely.)* I have to *see* it. The margins, the scholar, *your* hand beside the *annotation.* *(she's already gathering documents.)* If your hand *matches*, Returned, then you and I are carrying the *same truth* from *two ends* — you *wrote* the warning, I *prove* it was *ignored* — and *together* that's not an indictment of *one* fallen city. That's an indictment of *every* power that ever refused to read what it didn't want to see. Take me to the proctor. *Now.*", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.naeve_annotator", "op": "SetTrue"}, {"key": "act3.naeve_knows_annotator", "op": "SetTrue"}, {"key": "sq.naeve_indictment", "op": "SetTrue"}, {"key": "act3.returned_annotator", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "father", "speaker": "Naeve", "text": "*(The fury drains, and what's left is much younger and much worse.)* My father. *(she sits, slowly, the stamp forgotten.)* Lord Aubrey of the Seventh. *(quietly.)* He used to — when I was small, before I was *useful* to him — he used to take me up to the observation spire at night and *name the stars*, and he'd say *\"You see, Naeve? We float among them. We are nearly their equals. That is the privilege of Netheril — to be *almost* divine.\"* *(her voice cracks.)* And I *worshipped* him. The brilliant, beautiful Lord of the Seventh, *almost* a god. *(her dry eyes shine.)* And that's the thing the *record* won't hold, the thing my *indictment* can't *capture*: that the *vanity* that *killed* him — *\"we are nearly their equals\" * — is the *same* wonder he gave me on the spire as a *gift.* The thing I *loved* him for is the thing that *murdered* him. *(she presses her hand flat on the documents.)* So when I stamp his signature into the indictment — *\"Lord Aubrey, voted to proceed\"* — I am damning the man who *named me the stars.* And both are *true.* He was *worth loving* and he *killed us all* and the record only has room for the *second*, and I — *(she looks at you, breaking)* — I need *one* other soul to know the *first.* That he was *beautiful* before he was *guilty.* That I'm not indicting a *monster.* I'm indicting my *father*, who showed me the *stars.* Hold *that*, would you? The record can't. But you can.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.naeve_father", "op": "SetTrue"}, {"key": "act3.naeve_father_grief", "op": "SetTrue"}, {"key": "act1.mercy_remembered", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 5}], "choices": []}, {"id": "cold", "speaker": "Naeve", "text": "*(Her face shutters, and the stamp resumes its mechanical fall.)* Spare me. *(stamp.)* I don't need a *diagnosis*, I need *hands.* If you want to lecture me on my *unprocessed grief*, there's a queue of dead relatives who'd love to *join* you, except they're *smeared across the sky.* *(stamp.)* I am *functioning.* Functioning is *underrated.* Functioning is how the *indictment* gets *built* while everyone *wiser* than me *feels their feelings* all the way to the *crater.* *(stamp.)* Carry the documents or leave. But do *not* stand in my collapsing archive and tell me my *coping* is a *wall.* Of *course* it's a wall. *(her voice cracks once, hard, then re-freezes.)* It's the only wall in this city that *isn't* falling. Let me *have* it. Go.", "dynamic": false, "auto": "close", "onEnter": [], "choices": []}, {"id": "bristle", "speaker": "Naeve", "text": "*(She shakes her head sharply, retreating into the work.)* I'm not *companion* material, Returned. I'm a *last daughter* with an *indictment* and *three hours* of life expectancy. *(stamp.)* Take the *documents* if you'll carry them — *those* matter, *those* persist. *Me* coming along is just *one more body* to drag out of a *fall*, and bodies are *heavy* and *sentimental* and I haven't *time* for either. *(she won't look at you.)* The *proof* is the part of me worth saving. Take *that* and let the *girl* go down with the *house.* It's *tidier.* It's what the *evidence* would *recommend.* Go.", "dynamic": false, "auto": "close", "onEnter": [], "choices": []}, {"id": "close", "speaker": "Naeve", "text": "*(Naeve of the Seventh works on in her collapsing archive — the last daughter of a murdered house, building an indictment out of grief she will not let herself feel — and whether she came with you or stayed to fall among her father's signatures, you carry away the truest weight of Netheril: that the most damning evidence of the apocalypse is written in the hand of someone who *loved* the men who voted to proceed, and that the record will never have room for the part that hurts the most — that they were *beautiful*, before they were *guilty.*)*", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "netheril.naeve_witness", "file": "NetherilEra.cs", "title": "Netheril · Naeve · Witness", "start": "0", "nodes": [{"id": "0", "speaker": "Naeve", "text": "I have done the impossible arithmetic of my own life ten thousand times, and never once did it let me back *here* — the hour it fell, the air still warm with the Weave before Karsus reached too far. That balcony. I derived my first proof on that balcony. It is about to be sky.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "We can't stop the fall. But you're not watching it alone this time.", "next": "stay", "fail": null}, {"text": "Is there anything here you need to see?", "next": "see", "fail": null}]}, {"id": "close", "speaker": "Naeve", "text": null, "dynamic": true, "auto": null, "onEnter": [{"key": "netheril.naeve_witnessed", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 5}], "choices": []}]}, {"id": "prologue.reservation", "file": "PrologueContent.cs", "title": "Prologue · Reservation", "start": "0", "nodes": [{"id": "0", "speaker": "The Wall", "text": "*(There is no speaker. The voice is the architecture itself — a sound like a million held breaths.)* Here is the place kept for you. Read the niche. The name is half-formed; the mortar has not set. You were always going to be here. The only surprise is that you are reading it with eyes.", "dynamic": false, "auto": "1", "onEnter": [{"key": "prologue.wall_seen", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "The Wall", "text": "*(Your own name is being spoken somewhere behind you, over a body that is yours — and one word in it you cannot hold. It slides off the mind like water off glass.)*", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "\"Whose name is that?\"", "next": "name", "fail": null}, {"text": "[ARCANA 12] \"This isn't a punishment. It's a filing system.\"", "next": "filing", "fail": "cold", "checkDC": 12, "checkAbility": "Intelligence"}, {"text": "\"I don't belong here.\"", "next": "refuse", "fail": null, "effects": [{"key": "prologue.refused_wall", "op": "SetTrue"}]}]}, {"id": "name", "speaker": "The Wall", "text": "Yours. It has always been yours. The word you cannot keep is the one that makes you a person instead of a vacancy. Someone is saying it now. Someone will forget it. *(A long, patient silence.)* So will you.", "dynamic": false, "auto": "pull", "onEnter": [], "choices": []}, {"id": "filing", "speaker": "The Wall", "text": "*(For the first time the voice seems almost to attend to you.)* ...A cold way to put it. A true one. We are the souls no ledger wanted. Filed under nothing. You read quickly, for the newly dead. *(beat)* You will need that.", "dynamic": false, "auto": "pull", "onEnter": [{"key": "prologue.wall_insight", "op": "SetTrue"}], "choices": []}, {"id": "cold", "speaker": "The Wall", "text": "Doubt is the crime, little vacancy. You will learn the punishment by living inside it. Read your niche. Wait your turn.", "dynamic": false, "auto": "pull", "onEnter": [], "choices": []}, {"id": "refuse", "speaker": "The Wall", "text": "*(The held breath of a million almost laughs.)* No one belongs here. That is the entire point. Belonging was the thing you all lacked. *(The mortar at the edge of your name has not set.)* ...And yet yours is the one that did not take. Curious. Hold that thought. Something else has hold of it too.", "dynamic": false, "auto": "pull", "onEnter": [{"key": "prologue.crack_seeded", "op": "SetTrue"}], "choices": []}, {"id": "pull", "speaker": "The Wall", "text": "*(Far off, a hand on your true chest. A pull, like a hook behind the navel. The Wall recedes — unwilling, for the first time in its existence, to let one go.)*", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "prologue.waking", "file": "PrologueContent.cs", "title": "Prologue · Waking", "start": "0", "nodes": [{"id": "0", "speaker": "Sister Garrow", "text": "*(Grey robes, a grave-warden's lantern, a face that has buried more people than it has loved.)* Be still. You stopped breathing on this slab a quarter-hour past. I closed your eyes myself. And now they are open, and Kelemvor's seal on your soul is — *(she falters, a priest losing her certainty)* — torn. Cleanly. From the inside.", "dynamic": false, "auto": "1", "onEnter": [{"key": "prologue.garrow_met", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "Sister Garrow", "text": "I have served the Lord of the Dead forty years. I have never once seen a thing come back. So I will ask plainly, and your answer decides whether I help you up or put you down: do you know what you are?", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "\"I saw the Wall. My name is in it.\"", "next": "wall", "fail": null, "effects": [{"key": "companion.garrow.approval", "op": "AddInt", "amount": 5}, {"key": "prologue.told_garrow_wall", "op": "SetTrue"}]}, {"text": "\"I don't know. But something pulled me back.\"", "next": "pulled", "fail": null, "effects": [{"key": "companion.garrow.approval", "op": "AddInt", "amount": 3}]}, {"text": "[INSIGHT 13] \"You're not afraid of me. You're afraid you've been lied to for forty years.\"", "next": "doubt", "fail": "guard", "checkDC": 13, "checkAbility": "Wisdom"}, {"text": "\"Put me down, then. If you can.\"", "next": "defiant", "fail": null, "effects": [{"key": "companion.garrow.approval", "op": "AddInt", "amount": 2}]}]}, {"id": "wall", "speaker": "Sister Garrow", "text": "*(She goes very still.)* The Wall of the Faithless. You saw it from the inside and walked out the wrong way. *(She helps you sit, and her hands are shaking, and she is ashamed of it.)* Then the doctrine I have preached over a thousand graves is at best incomplete. I would rather know that than be comfortable. Come. The Cinderhaunt is no place to be newly alive.", "dynamic": false, "auto": "escape", "onEnter": [{"key": "prologue.garrow_shaken", "op": "SetTrue"}], "choices": []}, {"id": "pulled", "speaker": "Sister Garrow", "text": "Something. *(dry)* In my experience, child, \"something\" with the strength to unmake Kelemvor's own seal is rarely benign. We will find out together what has its hand on you. On your feet. The harvesters will have heard your heart restart.", "dynamic": false, "auto": "escape", "onEnter": [], "choices": []}, {"id": "doubt", "speaker": "Sister Garrow", "text": "*(The lantern trembles, just once.)* ...You read the living as easily as the dead read you. Yes. If you are real — and you are insultingly warm for a corpse — then someone has been wrong for a very long time, and I have helped them be wrong. I intend to make that right. Starting with getting you out of here. Move.", "dynamic": false, "auto": "escape", "onEnter": [{"key": "prologue.garrow_doubt", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 8}], "choices": []}, {"id": "defiant", "speaker": "Sister Garrow", "text": "*(A grim flicker that might, in better light, be respect.)* No. I don't think I can. And a thing I cannot put down is a thing I had best understand. Walk with me, Returned. The exit is through the harvest-floor, and the harvest is not finished.", "dynamic": false, "auto": "escape", "onEnter": [], "choices": []}, {"id": "guard", "speaker": "Sister Garrow", "text": "Spare me the cold-reading, corpse. Better confessors than you have tried. *(She offers a hand anyway.)* Up. Questions later. Knives now.", "dynamic": false, "auto": "escape", "onEnter": [], "choices": []}, {"id": "escape", "speaker": "Sister Garrow", "text": "Stay behind me until you remember how your own legs work. When the Returned come — and they will — strike for the joints, not the heart. They have no more use for hearts than you did, an hour ago.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "prologue.choir_herald", "file": "PrologueContent.cs", "title": "Prologue · Choir · Herald", "start": "0", "nodes": [{"id": "0", "speaker": "Choir Herald", "text": "*(A masked acolyte of the Faithless Choir, frozen at the cellar mouth, staring at you like a sum that won't add.)* No. No, you're — I sealed that door. I read the rites. You were *filed.* They don't — *(his voice cracks behind the mask)* — they never come back. Not once. Not in all the years.", "dynamic": false, "auto": "1", "onEnter": [{"key": "prologue.herald_met", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "Choir Herald", "text": "He'll want to know. Gods help me, he'll *want* you. *(He backs toward the stair, hands raised.)* I'm not your enemy. I'm not — we're trying to *end* the Wall, do you understand? The man who runs us watched it take his own daughter. If you are what you are, then you are the thing he has prayed twenty years to find.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "\"Who is he?\"", "next": "name", "fail": null}, {"text": "[PERSUADE 14] \"Then take me to him. No tricks.\"", "next": "escort", "fail": "flee", "checkDC": 14, "checkAbility": "Charisma"}, {"text": "\"I'm no one's miracle. Run.\"", "next": "dismiss", "fail": null, "effects": [{"key": "companion.garrow.approval", "op": "AddInt", "amount": 3}]}, {"text": "\"...\"", "next": "flee", "fail": null}]}, {"id": "name", "speaker": "Choir Herald", "text": "Aldric Morn. *(He says it the way some say a saint's name and others say a curse — and isn't sure which he means.)* The Heretic of the Lower City. Forty years a Doomguide, until he stopped believing the dead were being kept and started believing they were being *thrown away.* Find a chandler's shop with a kettle always on. He'll be expecting you. He's been expecting you for twenty years.", "dynamic": false, "auto": "gone", "onEnter": [{"key": "aldric.name_known", "op": "SetTrue"}, {"key": "prologue.points_to_aldric", "op": "SetTrue"}], "choices": []}, {"id": "escort", "speaker": "Choir Herald", "text": "*(He hesitates, then nods, fast.)* ...Yes. Yes, all right. But not like this, not bleeding, not with a Doomguide of Kelemvor at your shoulder — *(he glances at Garrow)* — she'll have us both in cells. Go up, go quiet, find the kettle. Tell him the herald sent you. Tell him... tell him it's true. After all this time, it's *true.*", "dynamic": false, "auto": "gone", "onEnter": [{"key": "aldric.name_known", "op": "SetTrue"}, {"key": "prologue.herald_ally", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": -2}], "choices": []}, {"id": "dismiss", "speaker": "Choir Herald", "text": "*(Something in him sags with relief and grief at once.)* ...Maybe you're right. Maybe a miracle should get to choose. *(He turns to flee, then stops.)* His name is Aldric Morn. If you ever want to know what you are — that's the man who's spent his life asking. For what it's worth. For whatever you are.", "dynamic": false, "auto": "gone", "onEnter": [{"key": "aldric.name_known", "op": "SetTrue"}], "choices": []}, {"id": "flee", "speaker": "Choir Herald", "text": "*(He's already gone up the stair, three steps at a time, shouting a name into the dark above — Aldric, Aldric, it's true — and the word follows you out of the Cinderhaunt like a hook already set.)*", "dynamic": false, "auto": "gone", "onEnter": [], "choices": []}, {"id": "gone", "speaker": "Sister Garrow", "text": "*(quietly, beside you)* Aldric Morn. I knew him, Returned. Before. He was the best of us. *(She looks at the stair the herald fled up, and her grave-warden's face is, for once, simply afraid.)* Which is exactly why I want to reach him before he reaches you.", "dynamic": false, "auto": null, "onEnter": [{"key": "prologue.complete", "op": "SetTrue"}], "choices": []}]}, {"id": "lady.tally", "file": "RiddleContent.cs", "title": "Lady · Tally", "start": "0", "nodes": [{"id": "0", "speaker": "Tally (a one-eyed storyteller)", "text": "—and the hero died in the first chapter and came back *wrong.* Oh! Speak of the margin. Sit. I've a pouch for you and a question. The pouch first; you'll want it for the question. I keep a little vault between the pages — ten pedestals, a brazier, and the best company you'll ever lose a riddle to. Care to play?", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "Show me your Vault of Tens.", "next": "yes", "fail": null, "effects": [{"key": "vault.requested", "op": "SetTrue"}]}, {"text": "Who ARE you?", "next": "who", "fail": null}, {"text": "Maybe later.", "next": "later", "fail": null}]}, {"id": "who", "speaker": "Tally", "text": "A storyteller. A gambler. A note someone left in the margin of a very long book and forgot to erase. Which of those is true? *All of them, on a good day.* Now — the Vault?", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "Lead on.", "next": "yes", "fail": null, "effects": [{"key": "vault.requested", "op": "SetTrue"}]}, {"text": "Not yet.", "next": "later", "fail": null}]}, {"id": "yes", "speaker": "Tally", "text": "Wonderful. Mind the step between the pages — it's a long way down to the footnotes.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}, {"id": "later", "speaker": "Tally", "text": "Mm. I'll be here. I'm always here. That's rather the whole tragedy of me.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}, {"id": "0", "speaker": "Tally (between the pages)", "text": "Fancy meeting you here, time-walker. A quick one — no vault required: I'll not speak till I'm spoken to, and then I always have the last word. Mock me from a mountain, and you're mocked in your own voice, unheard. What am I?", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "An echo.", "next": "right", "fail": null, "effects": [{"key": "riddle.amusement", "op": "AddInt", "amount": 3}, {"key": "tally.roaming1.done", "op": "SetTrue"}]}, {"text": "A shadow.", "next": "wrong", "fail": null, "effects": [{"key": "tally.roaming1.done", "op": "SetTrue"}]}, {"text": "Silence.", "next": "wrong", "fail": null, "effects": [{"key": "tally.roaming1.done", "op": "SetTrue"}]}]}, {"id": "right", "speaker": "Tally", "text": "Mm. You'll fight a roomful of those, later — wearing the faces you love. Keep the answer. Keep the warning. I'll be three pages ahead, as ever.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}, {"id": "wrong", "speaker": "Tally", "text": "Ha — no. But you *tried*, and trying amuses me almost as much as winning. Almost. Off you go.", "dynamic": false, "auto": null, "onEnter":
