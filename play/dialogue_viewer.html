ld someday, *blessedly*, *stop.* *(the grey fire trembles.)* And I found, Returned — the God of the Dead found — that the *month I spent as Pell who carries the water* held more that was *worth keeping* than *ten thousand years of being owed every soul in the world.* *(the skull turns to you.)* You think to *tempt* me with *mortality.* You do not understand: you do not *need* to tempt me. I have *had* it. A month of it. And it has *ruined* me for godhood, the way a single warm day ruins a man for the grave. *(softly.)* I cannot *keep* being Pell — the war will strip the disguise, Ao will see to that. But I will *carry* him. The memory of *being no one and trusted anyway.* When you take my crown, take it knowing the God of the Dead's last secret: that he would have traded the *whole Wall* for *one more night of carrying your water and being thanked for it by name.*", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.myrkul_mortal", "op": "SetTrue"}, {"key": "act4.myrkul_weary", "op": "SetTrue"}, {"key": "act4.myrkul_will_yield", "op": "SetTrue"}, {"key": "companion.ilfaeril.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "abdicate", "speaker": "Myrkul", "text": "*(The grey fire snaps toward you — affront, then, slowly, something that might be *relief* disguised as affront.)* *Abdicated.* *(the voice is cold and then, beneath the cold, *tired*.)* You *dare* — *(the skull stops.)* ...No. *(quietly.)* No, you are *right*, and the daring is *mercy*, and I am too *old* to pretend otherwise. *(the fire banks low.)* A god who *asks the living what to do with the dead* has *already let go of the answer.* I unmasked, you said, because I am *done.* *(the skull bows.)* I have been *done* for longer than you have been *alive*, Returned. The Wall runs *without* me now — you have *met* its clerks, its scribes, its inertia; it does not *need* a god, it *never* did, it needs only *people who keep filing.* I am a *figurehead* on a machine that forgot it had a captain. *(the grey fire gutters.)* And the only *dignity* left to a figurehead is to *step down* before he is *thrown* down. *(the voice steadies into something almost grateful.)* So yes. I want someone to take it *gently.* Not Cyric, who will take it *screaming.* Not Kelemvor, who will take it *dutifully.* *You* — who will take it *grieving*, which is the only way it should *ever* have been *held.* *(the skull inclines.)* Come to the Court when the war is done. I will *abdicate* into your hands. Be *gentle*, as you have been gentle with every doomed thing on this whole long road. The God of the Dead has watched you do it for an act. He has decided he would like, at the last, to be *one of them.*", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.myrkul_abdicates", "op": "SetTrue"}, {"key": "act4.myrkul_will_yield", "op": "SetTrue"}, {"key": "act4.myrkul_weary", "op": "SetTrue"}, {"key": "companion.ilfaeril.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "wrath", "speaker": "Myrkul", "text": "*(The grey fire roars, and the temperature of the world drops, and for a moment the patient god is gone and only the *Lord of the Dead* remains.)* You presume to *diagnose* a *god.* *(the skull blazes.)* I wore your *shadow* as a *courtesy*, Returned — a *study*, before the *reckoning* — and you repay it with *therapy.* *(the cold deepens.)* Understand your place: I am *thinned*, not *fallen.* I am *weary*, not *yours.* And whatever *gentleness* I showed at your fire, do *not* mistake it for *weakness* — the grave is *patient*, but it is not *kind*, and you have just reminded me *why I stopped carrying the water.* *(the grey fire pulls back into the skull.)* Take your crown, if you can reach it. But you will reach it through the *war*, and the *Court*, and a *god who has remembered he is one.* *(the mask is gone entirely now, the disguise burned away.)* The Pale Companion is *dead.* You may grieve *him* later, with the rest. *(and Myrkul turns toward the burning city, terrible and whole, the brief mortal warmth sealed back under ten thousand years of bone.)*", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.myrkul_wrath", "op": "SetTrue"}, {"key": "faction.kelemvor", "op": "AddInt", "amount": -2}], "choices": []}, {"id": "close", "speaker": "The Pale Companion", "text": "*(The God of the Dead stands revealed on the high tower above a Waterdeep where gods are dying in the streets — the quiet traveler who carried your water for an act, now a skull wreathed in grave-fire — and whether you found the weary man inside the god or woke the god inside the man, you carry away the most vertiginous truth of the whole saga: that the Lord of the Wall rode beside you not to judge you, but because even the God of the Dead, in a time of dying, went looking for the one soul who knew how to come *back.*)*", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "npc.troubles.amnesiac", "file": "TroublesDenizensContent.cs", "title": "Npc · Troubles · Amnesiac", "start": "0", "nodes": [{"id": "0", "speaker": "A Bewildered Man in Fine Ruined Robes", "text": "*(A man sits on a fountain's edge in robes that were, very recently, magnificent, and are now mud-soaked and singed. He is handsome in a way that doesn't quite sit on a human face — too symmetrical, too unweathered — and he is patting his own chest and arms with mounting, courteous panic, like a man who's lost his keys, if the keys were the central fact of his identity.)* I beg your pardon — *(he stands, sways, steadies)* — I beg your pardon, but you have a *competent* look, and I am in the most *ridiculous* difficulty. *(he laughs, baffled.)* I appear to have *misplaced* something. Something *large.* I keep reaching for it — *(he gestures at the air above his own shoulders, where something used to be)* — and it isn't *there*, and the *not-there* of it is the size of the *sky*, and I cannot for the life of me recall its *name.* Have you — this will sound mad — have you seen a *divinity* about? I think it was *mine.*", "dynamic": false, "auto": "1", "onEnter": [{"key": "npc.amnesiac_met", "op": "SetTrue"}, {"key": "act4.lost_god_met", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "The Lost Avatar", "text": "*(He sits back down, trying to reason through a hole where his cosmology used to be.)* Let me be *systematic.* *(he counts on elegant fingers.)* I know that I *was* something. Something *vast.* I gave — *(he frowns)* — I *gave* things. Or *withheld* them. People *wanted* something from me, *desperately*, all the time, and I — *(he falters)* — I don't think I *gave* it very *often*, which is troubling, now that I'm down here among them and can see their *faces.* *(he looks at the chaos of the city, the fear in the streets.)* I had *worshippers*, I think. Is that the word? People who *needed* me. And I was very *high up*, and they were very *small*, and the *distance* felt like *dignity.* *(quietly, the amnesia letting something through that the god never let himself feel.)* But I'm *down here* now, the same *size* as all of them, and I can *see* — they're *frightened*, and *cold*, and some of them are *kind* to each other for *no reason*, and I keep thinking: *did I know this? When I was vast? Did I know they were like* this *— up close?* *(he looks at you, lost and strangely hopeful.)* I don't remember being a god. But I'm beginning to suspect I wasn't a very *good* one. The *not-remembering* feels less like *amnesia* and more like *relief.* Is that — is that a terrible thing to feel?", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "[INSIGHT 17] \"It's not amnesia and it's not relief — it's the first time you've ever stood at eye level with the people who prayed to you. You didn't forget your divinity. You finally got *close enough to your worshippers to be ashamed of the distance.*\"", "next": "distance", "fail": "godly", "checkDC": 17, "checkAbility": "Wisdom"}, {"text": "\"Maybe don't go looking for it. A god who feels *relief* at forgetting his godhood has just been handed the one thing gods never get: a chance to find out who he'd be *without* the worship. Stay lost a while. Meet them at eye level.\"", "next": "stay", "fail": null}, {"text": "\"What if I don't help you find your divinity — what if I help you *meet* them instead? Come be useful in the streets. Hand out blankets. Be small and kind for an afternoon. *Then* decide if you want the sky back.\"", "next": "useful", "fail": null, "effects": [{"key": "companion.garrow.approval", "op": "AddInt", "amount": 2}]}, {"text": "\"You keep reaching above your shoulders for it. Whatever you were, it sat *over* you, not *in* you — a weight, not a heart. Maybe the man on the fountain is the part that was always *yours*, and the god was the part you *wore.*\"", "next": "weight", "fail": null, "effects": [{"key": "companion.naeve.approval", "op": "AddInt", "amount": 2}]}]}, {"id": "distance", "speaker": "The Lost Avatar", "text": "*(He goes very still, and his too-symmetrical face crumples into something genuinely human for the first time.)* ...Ashamed of the distance. *(quietly.)* Oh. *(he looks at his own hands, mortal and shaking.)* That's it. That's the *shape* of the hole. It isn't that I *forgot* I was a god. It's that being a god *required* me to *not see this* — *(he gestures at a mother three streets over, shielding a child from falling debris)* — *that.* Up close. The *texture* of them. *(his voice breaks.)* A god has to keep the *distance*, you understand, or the *wanting* would *drown* him — a billion small desperate prayers, and if you let yourself *feel* each one as a *person* instead of a *petition*, you'd — you'd *shatter.* So you go *high.* You make the distance into *majesty*, and you call the not-feeling *divine serenity*, and you *file* the prayers the way — *(he stops, struck)* — the way one might *file* the *dead.* *(he looks at you, stricken.)* I think I was a god who *filed* his worshippers. And Ao knocked me *down here*, to eye level, and took my *memory* so I couldn't *hide* behind the majesty, and now I have to *see* them, and it is *unbearable*, and it is the *first true thing* I have felt in an age. *(softly.)* Don't help me find my divinity. Help me *bear* the eye level. That's the thing I actually *need*, and never *knew* it.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.amnesiac_distance", "op": "SetTrue"}, {"key": "act4.god_meets_eye_level", "op": "SetTrue"}, {"key": "act1.mercy_remembered", "op": "SetTrue"}, {"key": "companion.ilfaeril.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "stay", "speaker": "The Lost Avatar", "text": "*(He considers it the way a drowning man considers that the water is, after all, *warm.*)* Stay lost. *(slowly, a frightened wonder dawning.)* You're saying I should — *not* reach for it. Let the *sky-sized hole* stay *empty.* *(he touches the air above his shoulders again, but gently now, like closing a door.)* Every instinct I have *screams* to get it *back* — the vastness, the *certainty*, the not-being-*cold* — *(he shivers in his ruined robes)* — but you're right that no god *ever* gets to ask the question I've been handed: *who am I, with the worship stripped off?* *(he looks at the frightened, kind, small people around him.)* What if the answer is *better* than the god? *(quietly.)* What if I'm — what if, down here, without the majesty, I turn out to be someone who *hands a cold person a blanket* — and what if *that* small man is *worth more* than the vast one who *filed* the prayers from a great height? *(he stands, unsteady, resolved.)* I'll stay lost. For a while. I'll find out who's *underneath* the divinity before I decide whether to *pick it back up.* *(a fragile smile.)* And if I *never* remember — if the god stays lost and only the *man on the fountain* remains — then perhaps Ao's punishment was, for *me*, a kind of *parole.* Thank you. You've given a god permission to *not be one.* I didn't know how *badly* I needed it until you *said* it.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.amnesiac_stays", "op": "SetTrue"}, {"key": "act4.god_stays_mortal", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "useful", "speaker": "The Lost Avatar", "text": "*(He blinks at the sheer *practicality* of it, as though no one has ever handed a god a *task.*)* Hand out... blankets. *(he stares at you.)* You want the — whatever I was — to *distribute textiles* to the *cold.* *(and then, slowly, something lights in his lost face — the pure relief of a *small, doable thing* after an eternity of *being prayed at.*)* Do you know, in all the — in however long I was *vast* — no one *once* gave me a *task* I could *complete.* They gave me *needs.* *Bottomless* ones. *\"Heal my child.\" \"End the drought.\" \"Make him love me.\"* Things no *giving* could ever *fill*, because the wanting was *infinite.* *(he stands, eager now.)* But a *blanket* — a *blanket* is *finite.* I hand it over, the person is *warmer*, the task is *done*, and I can *see* the *doneness* on their *face.* *(he laughs, amazed.)* That's — that might be the most *satisfying* thing I have *ever* been offered. *(he rolls up his magnificent ruined sleeves.)* Yes. Take me to the cold ones. Let me be *finitely, completably* useful for an afternoon. *(quietly, as you go.)* I think this is what they *actually* wanted from me, all along. Not the *vastness.* Just — someone to hand them a *blanket* and *stay* long enough to *see* them get warm. I never *stayed.* I'm going to *stay* now.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.amnesiac_useful", "op": "SetTrue"}, {"key": "act4.god_meets_eye_level", "op": "SetTrue"}, {"key": "act1.mercy_remembered", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "weight", "speaker": "The Lost Avatar", "text": "*(He reaches up once more to that empty space above his shoulders — and this time his face changes as he understands what he's touching.)* A weight. Not a heart. *(softly.)* It sat *over* me. *(he lowers his hand to his own chest instead.)* You're saying the *god* was something I *carried* — a great cold crown of *expectation* balanced on a *man* — and that when Ao knocked it *off*, what's *left*, here — *(he presses his hand flat to his chest)* — *this*, the part that's *frightened* and *cold* and *moved* by a stranger's kindness — *this* was *always* the *real* thing, and the *divinity* was the *burden* I mistook for my *self.* *(his eyes fill.)* That would mean I'm not *broken.* I'm *unburdened.* The sky-sized hole isn't a *wound* — it's the *empty hook* where a *weight* used to *hang.* *(he laughs, wet and astonished.)* I spent an *age* believing I *was* the weight. And I was *never* the weight. I was the *back* it *bent.* *(he straightens, and for the first time his too-perfect face looks *lived-in*, looks *human*, looks *his.*)* Thank you. You've handed a god the difference between *who he was* and *what he carried* — and it turns out the *carrying* was the only thing I ever needed to *set down.* *(quietly.)* Whoever I was up there — let him stay lost. The man with the *empty hook* and the *unbent back* — I think I'll be *him* now. He seems *kinder.* And he's *so* much *lighter.*", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.amnesiac_unburdened", "op": "SetTrue"}, {"key": "act4.god_stays_mortal", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "godly", "speaker": "The Lost Avatar", "text": "*(A flicker of the old vastness crosses his face — cold, distant, reflexive.)* No. *(he draws himself up, and for an instant the majesty returns, and it is *not* warm.)* You overstep. Whatever I *was*, it was *above* you, and the *distance* was not *shame*, it was the *natural order* — gods *above*, mortals *below*, prayers *rising*, judgment *falling.* *(he touches the empty air, and clings to the memory of the weight.)* I will *find* my divinity. I will *reascend.* This — *(a dismissive gesture at the street, the cold, the kindness)* — this *eye level* is a *humiliation*, not a *lesson*, and I will not be *counseled* into mistaking my *fall* for *enlightenment* by a — a *mortal* with *opinions.* *(he turns away, searching the burning sky for the thing he lost.)* Go. I have a *godhood* to recover. *(and he wanders off into the chaos, reaching always for the weight above his shoulders, a god who would rather find his burden than discover the man beneath it.)*", "dynamic": false, "auto": "close", "onEnter": [], "choices": []}, {"id": "close", "speaker": "The Lost Avatar", "text": "*(The lost avatar sits — or wanders, or rolls up his ruined sleeves — at eye level with the worshippers he once filed from a great height, and whether he reascended or stayed gloriously, humbly small, you carry away the strange grace at the heart of the Time of Troubles: that the gods were cast down not to be *punished* but to be made to *see* — up close, unbearable, transforming — the small cold faces that had been praying to their *distance* all along.)*", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "npc.troubles.boneforger", "file": "TroublesDenizensContent.cs", "title": "Npc · Troubles · Boneforger", "start": "0", "nodes": [{"id": "0", "speaker": "The Bone-Forger", "text": "*(In a forge lit by no honest fire, a smith works a material that is not metal — pale, dense, faintly *screaming* at a pitch below hearing — with the absorbed, humming contentment of a craftsman at the top of his trade. Spread on the bench are sketches of a magnificent circlet. He looks up at you with the open, friendly pride of an artist who loves his work and has no idea what it is.)* Come to see the commission? *(he wipes his hands, beaming.)* I don't blame you — word's got round. Finest piece I'll make in my life, this. *(he lifts a fragment of the pale screaming stuff.)* Marvelous material, isn't it? Patron brought it himself. *Ivory*, he said, or something *like* — takes an *edge* and a *polish* you wouldn't *believe.* I've made crowns for *three* dukes, friend, and *none* of them sang under the file like *this* does. *(he holds it to the light, lovingly.)* Going to be a *crown.* The *Crown of Horns*, he's calling it. Bit dramatic for a circlet, but patrons will have their *names.*", "dynamic": false, "auto": "1", "onEnter": [{"key": "npc.boneforger_met", "op": "SetTrue"}, {"key": "act4.crown_being_forged", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "The Bone-Forger", "text": "*(He returns to work, chatting happily, the screaming pitch rising as his file bites.)* The *artistry* of it, see — *(he traces a sketch)* — the patron wants the *horns* worked so they seem to *grow* from the wearer's own *brow.* Tricky. You have to read the *grain* of the material, let the *horns* follow where the stuff *wants* to curl. *(he files; the pitch climbs.)* And this *ivory* *wants* to curl into *horns* so *naturally* it's almost like it — *(he laughs)* — like it *remembers* being something *horned.* Some great *beast*, I shouldn't wonder. *(he holds it up.)* You hear that? Faint, like a — like a kettle, almost, when I work it. *Resonance*, that's all. *Dense* materials *sing.* *(and here, just for a moment, a flicker of unease crosses his honest face, quickly smoothed.)* ...My wife won't come in the workshop anymore. Says the *singing* gives her *dreams.* Says the crown's *bad.* *(he forces the cheer back.)* But she's not a *craftsman*, see. She doesn't understand that a material this *fine*, this *responsive* — a thing doesn't get to be this *good* to work without a bit of *strangeness* to it. That's just *quality*, friend. That's just the *best stuff I've ever held*, doing what the *best stuff* does. ...Isn't it?", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "[INSIGHT 18] \"Listen to your wife. Listen to the singing. That's not resonance and it's not ivory. It 'remembers being horned' because it remembers being *alive* — that's a *skull*, smith. A god's skull. You're not making jewelry. You're forging a *reliquary* out of a murdered deity.\"", "next": "skull", "fail": "craft", "checkDC": 18, "checkAbility": "Wisdom"}, {"text": "\"What did the patron's face look like, when he handed you the material? Craftsmen notice hands. Was he holding it like ivory — or like something he was *afraid* of, and *glad* to be rid of?\"", "next": "patron", "fail": null}, {"text": "\"You already know. Your wife knows, the material knows, and some part of you that's filed a thousand honest things knows this one files *wrong.* You're smoothing the cheer back over it because the commission is the finest work of your life. Don't let it be the *worst.*\"", "next": "know", "fail": "craft"}, {"text": "\"Finish it or don't — but at least *find out* what it is before you put your maker's-mark on it. A craftsman signs his work. Do you want *your* name on whatever this Crown turns out to *do?*\"", "next": "mark", "fail": null, "effects": [{"key": "companion.garrow.approval", "op": "AddInt", "amount": 2}]}]}, {"id": "skull", "speaker": "The Bone-Forger", "text": "*(The file stops. The screaming pitch hangs in the air. The smith's honest face goes from confusion to horror in slow, dawning stages, and he sets the pale fragment down very, very carefully, as though it might *wake.*)* ...A skull. *(he stares at his own hands.)* A god's — *(he backs from the bench.)* No. No, it's — it *takes a polish*, ivory takes a — *(but he looks at the curl of the horns, the way the grain *remembers*, and his craftsman's eye, which has never lied to him about a material in *forty years*, will not let him finish the sentence.)* ...It files like *bone.* *(barely a whisper.)* I *knew.* The *first* day. Bone has a — a *give*, a *wet* under the dry, that *ivory* doesn't, and I *felt* it and I *told* myself *ivory*, because the *commission* — because *no smith alive* gets to forge a *crown* from a *material like this* and I *wanted* it, I wanted the *masterwork* so *badly* I *un-knew* what my own *hands* were *telling* me. *(he looks at the screaming fragment, sick.)* My wife's *dreams.* The *singing.* It's been *screaming* in my *forge* for a *month* and I called it *resonance* because *resonance* let me keep *working.* *(he turns to you, ashen.)* What do I *do?* I've shaped half a god's skull into a *crown.* I can't *un-shape* it. The *horns* are already — *(he covers his mouth.)* Gods. The *horns* are where I made the *bone remember* what it *was.*", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.boneforger_knows", "op": "SetTrue"}, {"key": "act4.forger_realizes", "op": "SetTrue"}, {"key": "act1.mercy_remembered", "op": "SetTrue"}, {"key": "companion.ilfaeril.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "patron", "speaker": "The Bone-Forger", "text": "*(He pauses, the craftsman's habit of *noticing hands* overriding his cheer, and his face slowly clouds as the memory sharpens.)* His hands. *(slowly.)* ...You know, that's — I *did* notice. I notice *everyone's* hands, it's the trade. *(he frowns.)* He held it — the material — *away* from his body. At *arm's length.* The whole time. I thought it was *ceremony*, *presentation*, the way patrons get *theatrical.* *(his unease grows.)* But that's not — when you hand a smith *ivory*, you *cradle* it, you *show* it off, you *love* it at him so he'll *price* it dear. *(quietly.)* This patron held it like a man holding a *snake* he's *killed* but doesn't *trust* to be *dead.* *Glad* to set it down. *Relieved* when I *took* it. *(he looks at the pale fragment with new eyes.)* And his *smile*, when I agreed to the commission — it wasn't a *patron's* smile, the *proud* kind. It was — *(he swallows)* — it was the smile of a man who's just *handed off* something he *desperately* wanted *out of his own hands* and into *someone else's.* *(he stares at you.)* What did I *take* off him, friend? What did that man want *gone* so badly he *smiled* to be rid of it? *(the cheer is entirely gone now.)* I think I've been *cheerful* about a thing I should have been *afraid* of since the day it came through my door.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.boneforger_patron", "op": "SetTrue"}, {"key": "act4.forger_suspicious", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 3}], "choices": []}, {"id": "know", "speaker": "The Bone-Forger", "text": "*(The friendly mask cracks, and underneath is a man who has been arguing with himself for a month.)* ...I already know. *(he sits down heavily.)* You're right. *Damn* you, you're *right*, and you've *said* it where I can't *un-hear* it. *(he looks at the half-made crown.)* Forty years I've filed *honest* materials — iron, silver, good bone from *honest* beasts — and *every* one of them files *true*, files *willing*, the metal *wants* to become the thing you're making. *(quietly.)* This. This files *wrong.* It *resists* the shape and then *gives* all at once, like it's *deciding* to *let* me, like there's a *will* in it that's *humoring* me. I've *felt* it for a *month* and I've *hummed* over it because — *(his voice cracks)* — because it's the *finest work of my life*, and a man doesn't want to *look* too hard at the *finest work of his life* in case it turns out to be the *worst thing he's ever done.* *(he meets your eyes.)* My wife knows. The *material* knows. *I* know. The only one who *doesn't* know is the *cheerful* version of me I've been *performing* so I could keep *picking up the file.* *(he sets the file down.)* Help me *find out* what I'm *making.* For *certain.* Before I put one more *stroke* into a thing my own *hands* have been *begging* me to *stop* shaping.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.boneforger_admits", "op": "SetTrue"}, {"key": "act4.forger_realizes", "op": "SetTrue"}, {"key": "companion.ilfaeril.approval", "op": "AddInt", "amount": 3}], "choices": []}, {"id": "mark", "speaker": "The Bone-Forger", "text": "*(He looks down at the small iron stamp on his bench — his maker's-mark, forty years of pride pressed into every honest thing he's made — and his hand stops over it.)* My mark. *(quietly.)* I sign *everything.* *Every* piece. Forty years, and there's not a crown, a blade, a *hinge* of mine in the *world* that doesn't carry — *(he picks up the stamp)* — *that.* My *name.* My *word* that the thing is *well-made* and *honest* and *mine.* *(he looks at the screaming crown.)* And you're asking if I want *that* — my *father's* mark, his father's before — *(his voice tightens)* — pressed into whatever *this* turns out to *do.* *(he is very still.)* A maker's-mark isn't just *\"I made this.\"* It's *\"I stand behind this.\"* It's *\"if this thing does harm, the harm is partly* mine.\"* *(he sets the stamp down, away from the crown.)* Forty years I've *never* hesitated to sign. *(quietly.)* I'm *hesitating.* And a craftsman who *hesitates* to sign his *finest* work already *knows*, in the part of him that's *honest*, that the work is *not* what he *told* himself it was. *(he looks at you, resolved and afraid.)* I won't sign it blind. You're *right.* Let's *find out* what it *is* — and if it's what my *hand* fears, then this is the *one* piece in forty years that goes *unmarked*, or goes *unmade.* My name doesn't go on a *murdered god.* Not for *any* commission.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.boneforger_unsigned", "op": "SetTrue"}, {"key": "act4.forger_realizes", "op": "SetTrue"}, {"key": "act1.mercy_remembered", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "craft", "speaker": "The Bone-Forger", "text": "*(He waves you off, retreating into the comfort of pure trade, the cheer snapping back into place like a visor.)* Ah, you're as bad as my *wife.* *(he picks the file back up, pointedly.)* *Bad* material, *screaming* skulls, *murdered gods* — you've been listening to too many *ghost stories*, friend. *(the pitch rises as he works.)* It's *ivory.* It's the *best ivory I've ever held*, and it's making the *best crown I'll ever forge*, and I'll not have its *masterwork* spoiled by *spooky talk* from someone who couldn't tell a *file* from a *fish-knife.* *(he hums, too loud, over the screaming.)* The patron pays *well.* The work is *clean.* And a *craftsman* who *flinches* at *quality* on account of a bit of *singing* doesn't *deserve* a commission like *this.* *(he bends to the crown, smoothing the cheer over the dread.)* Mind the door on your way out. And mind your *imagination.* It's only *jewelry.* ...It's *only jewelry.* *(and he files on, humming over the scream, un-knowing what his hands have always known.)*", "dynamic": false, "auto": "close", "onEnter": [], "choices": []}, {"id": "close", "speaker": "The Bone-Forger", "text": "*(The bone-forger bends over the Crown of Horns — a craftsman at the peak of his trade, shaping a murdered god's skull into the finest work of his life — and whether he set down the file in horror or hummed the cheer back over the screaming, you carry away the quietest horror of the Time of Troubles: that the worst things in the world are not always forged in malice. Sometimes they are forged in *pride*, by an honest man who wanted the masterwork so badly he un-knew what his own hands kept telling him.)*", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "npc.troubles.doubter", "file": "TroublesDenizensContent.cs", "title": "Npc · Troubles · Doubter", "start": "0", "nodes": [{"id": "0", "speaker": "A Priestess at a Cracked Altar", "text": "*(In a temple whose god-statue has begun, impossibly, to *bleed*, a priestess kneels — then stands — then kneels again, in a cycle you realize has been going for hours: faith and its collapse, alternating like a pulse. Her holy symbol is clutched white-knuckled in one hand and held *away* from her body in the other, by turns. She sees you and laughs, a little wildly.)* Don't ask me what I believe. *(she stands.)* Ask me what I believe *right now*, this *minute*, because it *changes* — *(she checks the bleeding statue)* — it's changed *twice* since you walked in. *(she presses the symbol to her chest, then holds it away.)* The gods are *walking the earth*, stranger. *Bleeding* in the *streets.* And a priestess is *supposed* to have *answers*, and mine *expire* faster than I can *preach* them. So. Catch me on the *upswing* or the *down?* I genuinely could not tell you which you've got.", "dynamic": false, "auto": "1", "onEnter": [{"key": "npc.doubter_met", "op": "SetTrue"}, {"key": "act4.faith_tested", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "Sister Aelana, the Doubter", "text": "*(She paces, the holy symbol passing from hand to hand.)* Here is my *hourly* torment, and I'll lay it out *plain*, because I'm too *tired* for liturgy. *(she counts it off.)* If the gods can *bleed* — can *fall*, can *die*, can be *knocked down here* to *stumble* about like *us* — then they were *never* what we *said.* Not *eternal.* Not *above.* Just — *very large people* with *very large powers*, and my whole *life* of *devotion* was *misfiled.* *(she clutches the symbol; faith-upswing.)* *But.* *But* — if a god, brought *low*, stripped of *everything*, *still* tries to *shield a child from falling stone* — and I have *seen* one do it, *today*, with my own *eyes* — then maybe *divinity* was *never* about being *eternal* or *above.* Maybe it was *always* about the *shielding*, and the *bleeding god in the street* is *more* holy *now*, *mortal* and *choosing* good, than he *ever* was *enthroned.* *(she holds the symbol away; faith-collapse.)* *Except* that's just me *moving the goalposts* so I don't have to admit I wasted my *life* — *(she presses it back; upswing)* — *unless* the *whole point* was that faith was *never meant* to be *certain*, and a priestess who *only* believed when it was *easy* was never *faithful* at all, just *comfortable* — *(she stops, exhausted, both hands open.)* You see? *Hours* of this. I am the *least* reliable priestess in *Faerûn* and possibly the *only honest* one. *Help.* Or don't. I'll have a *different* problem by the time you *answer.*", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "[INSIGHT 18] \"Stop trying to land on an answer. The doubt isn't the *failure* of your faith — it's the *exercise* of it. A faith that can't survive the gods *bleeding* was never faith; it was a *contract.* What you're doing right now — believing *anyway*, hourly, with no guarantee — *that's* the realest devotion there is.\"", "next": "exercise", "fail": "despair", "checkDC": 18, "checkAbility": "Wisdom"}, {"text": "\"You keep asking whether the gods are worthy of faith. Wrong question — it makes *them* the test. Ask instead what *kind of person* your faith makes *you.* If it makes you shield children, keep it. The god's solvency is *not your department.*\"", "next": "department", "fail": null}, {"text": "\"A bleeding god who still shields a child. Hold onto *that* one — not as proof the gods are real, but as proof that *the shielding* is real, with or without a god behind it. Maybe that's all 'holy' ever meant. The act, not the actor.\"", "next": "act", "fail": null, "effects": [{"key": "companion.garrow.approval", "op": "AddInt", "amount": 3}]}, {"text": "\"You called yourself the least reliable priestess and the only honest one in the same breath. Those aren't opposites, Sister. The honest ones are *always* unreliable, because they refuse to *fake* the certainty the comfortable ones perform.\"", "next": "honest", "fail": null, "effects": [{"key": "companion.naeve.approval", "op": "AddInt", "amount": 2}]}]}, {"id": "exercise", "speaker": "Sister Aelana, the Doubter", "text": "*(She stops pacing. The holy symbol stills in her hands — held, for the first time, *neither* clutched *nor* away, but simply *held.*)* ...The exercise of it. *(slowly.)* Not the *failure.* *(she stares at the symbol.)* I have spent *hours* — *years*, if I'm honest, the Troubles just made it *hourly* — treating my doubt as a *sickness.* A thing to be *cured.* A *gap* in me where *certainty* should be, that made me a *defective* priestess. *(her voice steadies.)* And you're telling me the *doubt* — the *believing-anyway*, the *kneeling* again *after* the *collapse*, *every* hour, with *no* guarantee the god is even *solvent* — that *that* is not the *crack* in my faith. That *is* my faith. The *whole* of it. *(she laughs, but it's different now, unwound.)* A *contract* believer says *\"I'll worship if you stay eternal and above.\"* And the gods just *broke* that contract in the *street*, *publicly*, and the *contract* believers are *shattering* all over Faerûn. *(she lifts the symbol.)* But I never *had* a contract. I had a *doubt I kept showing up to anyway.* And *that* — that survives the gods *bleeding*, because it never *depended* on them *not* bleeding. *(she breathes, the hourly torment finally still.)* I'm not the *least* reliable priestess. I'm the one whose faith was *built to survive this exact day* — because it was *built out of doubt*, and doubt is the only faith that *bleeds* and *keeps kneeling.* Thank you. I can *stand up* now. And *stay* standing. For more than an *hour.*", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.doubter_exercise", "op": "SetTrue"}, {"key": "act4.faith_through_doubt", "op": "SetTrue"}, {"key": "act1.mercy_remembered", "op": "SetTrue"}, {"key": "companion.ilfaeril.approval", "op": "AddInt", "amount": 5}], "choices": []}, {"id": "department", "speaker": "Sister Aelana, the Doubter", "text": "*(She blinks, and a startled, slightly hysterical laugh escapes her.)* The god's solvency is *not my department.* *(she presses a hand to her mouth.)* That is the most — that is *blasphemous* and *practical* and possibly the *sanest* thing anyone has said to me in *days.* *(she paces, but lighter now, working it through.)* I've been auditing *the gods.* Hourly. *\"Are you real? Are you worthy? Are you *solvent*?\"* — as though my *devotion* were an *investment* and I needed to check the *god* was a *sound institution* before I kept *paying in.* *(she stops.)* But you're right — that makes the *god* the subject of the test, and *me* the *examiner*, and it turns *faith* into *accountancy.* *(she looks at the symbol differently.)* The *real* question — the *only* one in *my* department — is: *what does carrying this make me do?* *(quietly.)* It makes me *bind wounds.* *Sit* with the *dying.* *Shield* children. *Show up* to the *cracked altar* even when the *statue bleeds.* *(she nods slowly.)* And *that* I can *evaluate*, because it's *mine.* Whether the god *behind* it is *eternal* or *bleeding* or *dead* or *never-was* — *not my department.* The *kind of person the faith makes me* — *that's* my department, and on *that* ledger, the faith *pays.* *(she straightens, freed.)* I'll stop *auditing Heaven* and start *tending Earth.* Gods, that's a *relief.* I've been doing the *Overgod's* job and *neglecting* my *own.*", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.doubter_department", "op": "SetTrue"}, {"key": "act4.faith_through_doubt", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "act", "speaker": "Sister Aelana, the Doubter", "text": "*(Her restless hands go still around the holy symbol, and she looks toward the temple door, where the memory of the shielding god lives.)* The act, not the actor. *(softly.)* I *saw* it, you know. This morning. A *god* — I knew him by the *fading* light of him — *fallen*, *mortal*, *bleeding* from a wound like *anyone's* — and a *child* in the path of a *toppling* arch, and the god *did not have to.* He's *mortal* now; the stone could *kill* him; there's no *worship* in it, no *temple*, no one even *knew* he was a god — and he *threw himself over the child anyway.* *(her eyes fill.)* And I have been *torturing* myself *all day* over whether that proves the gods are *real* — and you're telling me to *stop asking that*, and ask instead whether the *shielding* was *real.* *(she breathes.)* And it *was.* The *child lived.* That is *not in doubt.* That *happened*, with a god or without one, *holy* whether or not there's a *heaven* to *file* it in. *(she presses the symbol to her heart, and this time it *stays.*)* Maybe *that's* what I've worshipped all along and *mistook* for a *god.* The *shielding.* The *throwing-yourself-over-the-small-thing-for-no-reward.* *(quietly.)* If *that's* my god — the *act* itself — then my god *cannot fall*, because it *isn't* above me to *fall from.* It's *in* every hand that *shields.* Including *mine.* *(she almost smiles.)* I think I'll go *be* my god for a while, instead of *waiting* on one. There are *wounds* to bind. The *holy* part was *never* the *altar.* It was the *binding.*", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.doubter_act", "op": "SetTrue"}, {"key": "act4.faith_through_doubt", "op": "SetTrue"}, {"key": "act1.mercy_remembered", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "honest", "speaker": "Sister Aelana, the Doubter", "text": "*(She stops, caught off guard, and something in her face *eases* — the relief of being *named* rather than *corrected.*)* The honest ones are always unreliable. *(slowly.)* ...I've never heard it put as anything but a *flaw.* *(she looks at the holy symbol.)* My abbess — gods keep her — she had *certainty* like a *fortress.* *Never* a tremor. Preached the *same* sermon for *forty years* and *believed* every word *identically* each time. And the *flock* *loved* her, because she was *reliable*, she was *solid*, she never made them *nervous* by *visibly thinking.* *(quietly.)* And I always felt *lesser.* The *wobbly* one. The one whose sermons *changed* because her *mind* changed, who'd say a thing on *Tenday* and *doubt* it by *Tenday-next.* *(she meets your eyes.)* But you're saying her *certainty* wasn't *deeper* faith — it was just faith that *stopped paying attention.* That *refused* to be *moved* by *new* griefs, *new* doubts, *bleeding statues.* And *mine* — the *unreliable* kind — is the kind that's *still awake.* *Still listening.* Still *honest* enough to *change* when the *world* does. *(she laughs softly.)* The gods are *bleeding in the streets*, and my abbess's *fortress* faith will *shatter* because it *can't bend* — and my *wobbly*, *honest*, *unreliable* faith will *survive*, because *bending* is the only thing it ever *did.* *(she nods.)* I'll stop *apologizing* for the wobble. The wobble is *load-bearing.* It's *why I'm still standing* on the day the *fortresses* fall.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.doubter_honest", "op": "SetTrue"}, {"key": "act4.faith_through_doubt", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "despair", "speaker": "Sister Aelana, the Doubter", "text": "*(She shakes her head, and the holy symbol drops to hang slack at her side.)* No. *(quietly, the upswing failing to come this time.)* You make it *pretty* — *\"doubt is faith,\" \"believe anyway\"* — but I'm *so tired*, stranger. *(she sinks onto the altar step.)* Maybe the *honest* thing isn't *believing-anyway.* Maybe it's *admitting* that I *built* my *life* on a *lie* that's currently *bleeding* in the *street*, and *no* clever reframing *un-spends* the *years.* *(she stares at the cracked floor.)* Let me just — sit. In the *down-swing.* Without someone *talking* me back *up.* Even a *doubter* gets to *rest* in the *doubt* sometimes, instead of being *rescued* into one more *hour* of *believing.* *(she closes her eyes.)* Come back at a *better* hour. I'll have *swung* back toward *faith* by *then*, probably. I always *do.* That's the *trouble* with me. ...Go on. Let me have the *dark* part. It's *mine* too. *(and she sits at the foot of the bleeding god, resting in the trough of the only faith honest enough to have one.)*", "dynamic": false, "auto": "close", "onEnter": [], "choices": []}, {"id": "close", "speaker": "Sister Aelana, the Doubter", "text": "*(The doubting priestess kneels and stands and kneels again at the foot of a bleeding god — losing and finding her faith by the hour — and whether you steadied her into the realization that the doubt *was* the devotion, or let her rest in the dark of it, you carry away the truest spiritual lesson of the Time of Troubles: that when the gods themselves fall bleeding into the street, the only faith left standing is the kind that was *built out of doubt* — the wobble that bends instead of shattering, the believing-anyway with no guarantee, the holy act that needs no solvent god behind it to be real.)*", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "npc.troubles.watchman", "file": "TroublesDenizensTwoContent.cs", "title": "Npc · Troubles · Watchman", "start": "0", "nodes": [{"id": "0", "speaker": "Watchman Harn", "text": "*(The sky is the wrong color and something enormous is screaming three streets over, but a city watchman stands at his post with a clipboard and the white-knuckled calm of a man performing sanity at it until it comes back. He licks his pencil, squints at the burning heavens, and makes a careful notation. When he sees you he straightens with desperate professional relief.)* You — citizen. Good. You'll have *witnessed* the, ah — *(he gestures vaguely at the apocalypse)* — the *disturbance.* I'm taking *statements.* *(he poises the pencil.)* Watchman Harn, Castle Ward. I am filing an *incident report* on the events of this evening, and I would be *much* obliged if you could help me with the *particulars*, because the *particulars* are proving *difficult.*", "dynamic": false, "auto": "1", "onEnter": [{"key": "npc.harn_met", "op": "SetTrue"}, {"key": "act4.faith_tested", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "Watchman Harn", "text": "*(He consults his clipboard, and his composure is a dam with hairline cracks running through every word.)* The difficulty is the *forms*, you see. *(he taps it.)* I have a form for *affray.* I have a form for *arson*, for *riot*, for *damage to municipal property.* I have a form for *unlicensed sorcery* and even — *(a slightly hysterical edge)* — even one for *\"manifestation, planar, hostile.\"* *(he turns the clipboard toward you, pleading.)* But there is *no form*, citizen, in the *entire watch-house*, for *\"two gods conducting a duel above the fish market.\"* *(his voice climbs.)* The *perpetrator* field asks for a *name and ward of residence.* What do I — *Bane? Residence: the Black Hand, ward of:* — *the sky?* The *damages* field wants a *coin estimate.* How do I *cost* a *street that a god stepped on?* *(he catches himself, breathes, forces the calm back down over it.)* I *know* how this *looks.* Man fussing with *paperwork* while the *world ends.* But here is the thing, citizen, here is the *whole* thing — *(quietly, the dam showing its cracks)* — if I *stop* filing, if I *put down the clipboard* and *admit* there's no *form* for *this*, then there are *no forms for anything anymore*, and if there are *no forms* then there are *no rules*, and if there are *no rules* then the *sky* really *is* falling and I am a *small man* in a *wrong-colored night* with *nothing* between me and *that.* So. The disturbance. Can you give me a *time* of *onset? Please.* I need *one field* I can *fill in true.*", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "[INSIGHT 18] \"The report was never going to capture this, Harn, and you know it. You're not filing an incident. You're saying a *prayer* — to Order, to Procedure, to the idea that the world still has *fields you can fill in true.* And honestly? On a night the gods went mad, that's the realest faith on this street.\"", "next": "prayer", "fail": "insist", "checkDC": 18, "checkAbility": "Wisdom"}, {"text": "\"Give me the form. I'll swear a statement — a true one. Onset, perpetrators, damages, the lot. If the watch-house has no form for gods fighting, then *we'll make this the first*, and the next watchman won't be standing here with nothing.\"", "next": "statement", "fail": null, "effects": [{"key": "sq.first_incident_report", "op": "SetTrue"}]}, {"text": "\"I knew a clerk like you once — Tobias. Spent his whole life filing, terrified none of it counted. It counted, Harn. The filing *is* the dignity. Not because the form holds the world. Because *you* held the *post* when the sky went wrong.\"", "next": "tobias", "fail": null, "effects": [{"key": "companion.garrow.approval", "op": "AddInt", "amount": 3}]}, {"text": "\"Put the clipboard down for one minute — not forever, just one — and look at it with me. Not as a watchman. As a man. You're allowed to be *awed* by the end of the world before you go back to *filing* it.\"", "next": "look", "fail": null, "effects": [{"key": "companion.naeve.approval", "op": "AddInt", "amount": 2}]}]}, {"id": "prayer", "speaker": "Watchman Harn", "text": "*(The pencil stops. He stares at the clipboard, and then at you, and the performed calm finally gives way — not to panic, but to something quieter and more naked.)* ...A prayer. *(very softly.)* To *Procedure.* *(he lets out a breath that shakes.)* My sergeant used to say it, you know — *half*-joking — *\"the forms are the only god that ever answers, Harn.\"* And I'd *laugh.* *(he looks at the burning sky.)* And now the *other* gods are *bleeding in the street* and the *form-god* is the *only one still standing*, because *Order* can't be *knocked down here* and made *mortal*, it hasn't a *body* to *break.* *(his grip on the clipboard gentles, from a drowning-clutch to something almost reverent.)* You're right. I'm not *documenting* the disturbance. I *can't.* There's no *field* for it. I'm — I'm *kneeling*, in the only *chapel* a watchman *has*, and saying *\"please let there still be rules, please let the night still have edges, please let one field be fillable-true.\"* *(he meets your eyes, steadier now that it's named.)* It's a *prayer.* And like all the *honest* ones tonight, it doesn't *expect* an answer — it just *refuses to stop being said.* *(he licks the pencil, but calmly now.)* I'll keep filing. Not because the report will *help.* Because *saying the prayer* is how a small man *stays a man* on the night the *big* things go mad. Thank you, citizen. I was *ashamed* of the clipboard. You've made it a *rosary.*", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.harn_prayer", "op": "SetTrue"}, {"key": "act4.order_as_prayer", "op": "SetTrue"}, {"key": "act1.mercy_remembered", "op": "SetTrue"}, {"key": "companion.ilfaeril.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "statement", "speaker": "Watchman Harn", "text": "*(Pure professional gratitude floods his face — a man handed, in the chaos, the one thing he understands.)* A *statement.* *(he flips to a fresh page, pencil ready, and the routine steadies him visibly.)* *Bless* you. Yes. Right. *(he writes as you speak, and the act of recording is plainly holding him together stitch by stitch.)* Onset... perpetrators, *description* sufficient where *name* unavailable... damages, *\"incalculable\"* — I'll *write* \"incalculable,\" that's a *real* word, the *form* will *accept* it — *(he's almost calm now.)* And here — *(he hesitates at the bottom)* — here's the field I couldn't face alone. *\"Disposition / recommended action.\"* On any *other* night I'd write *\"refer to magistrate.\"* But there's no *magistrate* for *gods.* *(he looks at you.)* So I'm going to write something *no* watch-report has *ever* said, and *you're* my witness that I had *cause*: *\"Disposition: beyond the jurisdiction of the watch. Recommended action: that the city be told the truth — that on this night its protectors could only stand their posts and witness. Filed by Watchman Harn, who did not abandon his.\"* *(he signs it, and his hand is steady.)* *There.* The *first* incident report on a *god-war* in the history of the watch. It *changes* nothing. *(quietly, fiercely.)* And it will sit in the *archive* forever, *proof* that *someone* stood here and *wrote it down true.* That's — that's not *nothing*, is it. That's the *opposite* of nothing. That's a *record.*", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.harn_statement", "op": "SetTrue"}, {"key": "sq.first_incident_report", "op": "SetTrue"}, {"key": "act2.cataloguing_defeats_the_wall", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "tobias", "speaker": "Watchman Harn", "text": "*(He lowers the clipboard slowly, struck.)* A clerk. Named Tobias. *(quietly.)* Terrified none of it counted. *(he looks at his own white-knuckled hand on the pencil.)* That's — gods, that's *me*, isn't it. That's *exactly* the *fear.* That I'll file *ten thousand* reports across *thirty years* and they'll all just — *molder* in a *drawer*, *unread*, and I'll *die* and someone will *clear my desk* and *that* was the *whole* of me: a man who *filed things no one read.* *(his voice tightens.)* And on a night like *this* — when the *sky's* wrong and the *gods* are *dying* — that fear gets so *loud* I can hardly — *(he stops.)* But you *say* it counted. For *Tobias.* *(he searches your face.)* *How?* How does it *count*, when the *form* changes *nothing*, when the *report* helps *no one*, when the *drawer* just *fills* and *fills?* *(and you tell him: it counts because the filing is the dignity — because holding the post when the sky goes wrong is itself the thing, regardless of whether the paper is ever read. He is quiet a long moment.)* ...The *post.* Not the *paper.* *(he straightens, and something settles in him.)* I held the *post.* On the *worst night.* I didn't *run.* The *report* might *molder* — but the *standing-here*, the *not-fleeing*, the *being-the-watchman-when-it-counted* — *that* doesn't go in a *drawer.* That's just *true*, forever, whether anyone *reads* it or not. *(he exhales.)* Tobias would've *liked* that. I think *I* needed to hear it more than *he* did. Thank you, citizen. I'll stand my post. And I'll *mean* it now, instead of just *clutching* it.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.harn_tobias", "op": "SetTrue"}, {"key": "act4.held_the_post", "op": "SetTrue"}, {"key": "act1.mercy_remembered", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 5}], "choices": []}, {"id": "look", "speaker": "Watchman Harn", "text": "*(He resists — the clipboard is a shield and you're asking him to lower it — but something in the offer reaches him, and slowly, slowly, he lets the pencil still and lifts his eyes from the form to the *sky.*)* ...One minute. *(he says it like a man agreeing to take off armor in a storm.)* As a — as a *man.* Not a *watchman.* *(and he looks. Really looks. At the wrong-colored sky, the gods burning across it, the impossible terrible enormity of it — and his face, freed from the form, moves through terror into something vaster.)* ...Gods. *(barely a whisper.)* It's — it's *beautiful*, isn't it. *Horrible.* But — *beautiful.* I've been *staring at the clipboard* so I wouldn't have to *feel* how — how *big* it is. How *small* I am under it. *(his eyes are wet.)* Because if I *feel* the *bigness*, I thought, I'll *break*, I'll *run*, I'll be *useless.* *(he breathes.)* But I *didn't* break. I *looked*, and I'm *awed*, and I'm *still here*, and my *knees* still *work.* *(a shaky, astonished laugh.)* You can *look* at the end of the world and *not* shatter. I didn't *know* that. I thought the *clipboard* was the only thing *holding* me up. *(he raises it again — but lightly now, a tool and not a crutch.)* Alright. *Now* I file. Having *looked.* A watchman who's *seen* the bigness and *chose* the post anyway, instead of one *hiding* in his *forms.* That's — that's a *better* watchman. Thank you for the minute. I'll spend the rest of the night having *had* it.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.harn_looked", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "insist", "speaker": "Watchman Harn", "text": "*(He shakes his head fast and grips the clipboard tighter, the calm hardening into something brittle.)* No — no *philosophy*, citizen, *please*, I haven't the — if I *think* about it like *that*, if I let it be a *prayer* or a *gesture* or a *anything* other than a *report*, then I'll *know* it's *useless* and I'll *stop* and I *can't* stop. *(his pencil hovers, trembling.)* Just — the *time of onset.* That's *all* I'm *asking.* One *fact.* One *field.* Don't make it *mean* anything. Let it just be *a form I'm filling out*, because a *form I'm filling out* is a thing I *know how to be*, and *everything else* tonight is a thing I *don't.* *(he licks the pencil.)* The *disturbance.* *Time of onset.* *Please.* *(and he stands at his post under the wrong sky, filling fields against the dark, the small stubborn liturgy of a man who will not let go of the clipboard because it is the last edge the night has left him.)*", "dynamic": false, "auto": "close", "onEnter": [], "choices": []}, {"id": "close", "speaker": "Watchman Harn", "text": "*(Watchman Harn stands his post under a wrong-colored sky, filing an incident report on a war of gods — clipboard in hand, pencil licked, fields filled true where they can be — and whether he came to call it a prayer or clutched it as the last edge of a breaking world, you carry away the small unbreakable dignity at the heart of the god-fall: that when the big things go mad, a man holds the world together not by *understanding* it, but by *standing his post* and *writing down what he can*, so that someone, someday, will know that *one watchman did not run.*)*", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "npc.troubles.worshipper", "file": "TroublesDenizensTwoContent.cs", "title": "Npc · Troubles · Worshipper", "start": "0", "nodes": [{"id": "0", "speaker": "A Man Praying With His Back to the Death", "text": "*(In a temple's inner sanctum, a man kneels at an altar, praying with a fervor that is almost violent in its focus — and twenty feet behind him, through the broken doors, a fading mortal form that gutters with dying divine light is *dying*, slowly, alone, and making small sounds, and the kneeling man *will not turn around.* His shoulders are rigid with the effort of not turning. He prays louder when the sounds come.)* *(without turning, hearing your step:)* If you've come to *tell* me, don't. *(his voice shakes.)* I *know* what's behind me. I have *always* known. And I am *not going to look.* So if that's your errand — *\"old man, your god is dying twenty feet away\"* — *save your breath.* I am *busy.* I am *praying.* It is the *most important* praying of my *life*, and it requires that I *face the altar*, and *not* the door.", "dynamic": false, "auto": "1", "onEnter": [{"key": "npc.worshipper_met", "op": "SetTrue"}, {"key": "act4.faith_tested", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "The Last Worshipper", "text": "*(He prays a moment longer, then speaks to you over his shoulder, never turning, the dying sounds punctuating his words.)* You think it's *cowardice.* That I *can't bear* to *watch.* *(a thin, fierce sound.)* You're *wrong*, or — *half* wrong. *(he grips the altar.)* Listen. My god is the *least* of gods. A *small* one. *Patron of thresholds*, of *doorways*, of the *moment between leaving and arriving* — you've *never heard his name*, no one has, he had *one* temple and *one* priest, and you're *looking* at the priest. *(the dying light flickers behind him.)* And the *theology*, stranger — here is the *theology* — a god *lives* by *worship.* That's not *metaphor*, not *this* night. *This* night it is *literal.* The gods are *mortal*, *dying*, and what *keeps* a god is the *belief aimed at it.* *(his voice drops to ferocity.)* So if I *turn around* — if I *look* — I *confirm* it. I make myself a *witness to his death*, and a *witness* believes *\"my god is dying,\" * and that belief *aimed at him* is the *last push* into the *dark.* *(he prays harder.)* But if I *don't* look — if I keep my eyes on the *altar* and *believe, with everything I have, that he is still my living god* — then *some* corner of him, the corner *my* faith is *pointed at*, is *still alive.* *(quietly, desperately.)* I am not *refusing to watch him die.* I am *the only thing keeping him from being dead.* My *not-looking* is the *last wall* between him and the *nothing.* Do you *see?* I *cannot* turn around. I am *load-bearing.*", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "[INSIGHT 18] \"You're not in denial, old man — you've understood the theology better than the gods did. A thing is only dead when the last believer looks away. So you've decided to be the believer who *never* looks. That's not cowardice. That's the most stubborn act of love I've ever seen at an altar.\"", "next": "loadbearing", "fail": "leave", "checkDC": 18, "checkAbility": "Wisdom"}, {"text": "\"Then don't pray that he won't die. Pray that he'll be *remembered.* A god kept by one man's not-looking dies when *you* do. But a god whose *name* gets carried out of this room — that god outlives the both of you. Give me his name. Let me be a second wall.\"", "next": "name", "fail": null, "effects": [{"key": "sq.dead_gods_name", "op": "SetTrue"}]}, {"text": "\"What if looking isn't the push into the dark — what if it's the chance to say *goodbye?* He's dying alone twenty feet away, listening to your back. Maybe the last worship isn't *not-looking.* Maybe it's *turning around so he doesn't die unseen.*\"", "next": "goodbye", "fail": null}, {"text": "\"A patron of thresholds — of the moment between leaving and arriving. He of all gods would understand a *threshold* death, old man. You're guarding the one door. But maybe his last rite is for his priest to *walk through* it *with* him, not bar it shut.\"", "next": "threshold", "fail": null, "effects": [{"key": "companion.ilfaeril.approval", "op": "AddInt", "amount": 2}]}]}, {"id": "loadbearing", "speaker": "The Last Worshipper", "text": "*(His rigid shoulders shake, and for the first time his voice breaks — but he does *not* turn, and the not-turning is suddenly the bravest thing in the room.)* ...The believer who never looks. *(barely audible over his own prayer.)* Yes. *Yes.* You're the *first* — everyone *else* who's come through that door has *tried to be kind*, tried to *turn me around*, *\"say goodbye, old man, let him go, it's time\"* — and they *don't understand* that their *kindness* is a *knife*, that every *\"let him go\"* is a *push*, that *grief itself* is what *kills* the small gods, the *acceptance*, the *looking-at-the-death-and-believing-it.* *(he presses his forehead to the altar.)* I will *not* give him that. I will *not* let my *love* curdle into the *grief* that *finishes* him. *(fiercely, weeping, facing forward.)* As long as *one* mind in all the world holds him as *living* — *unlooked-at*, *unconfirmed*, *unburied* — he is not *dead*, he is only *dying*, and *dying* is not *death*, *dying* can go on *forever* if no one *agrees* to its *end.* *(quietly.)* I am old, stranger. I will kneel here until *my* heart stops. And in *that* moment — the moment *I* die *still believing* — he and I will cross the *threshold* together, *neither* of us ever having *looked*, and his *patronage* will be *true* to the very *last*: a god of the *in-between*, kept *in-between*, *forever*, by a priest who *refused* to let the door *close.* *(he resumes praying.)* You called it *love.* No one else did. Thank you. *Now let me hold the wall.*", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.worshipper_loadbearing", "op": "SetTrue"}, {"key": "act4.faith_as_not_looking", "op": "SetTrue"}, {"key": "act1.mercy_remembered", "op": "SetTrue"}, {"key": "companion.ilfaeril.approval", "op": "AddInt", "amount": 5}], "choices": []}, {"id": "name", "speaker": "The Last Worshipper", "text": "*(His prayer falters — this, he had not considered, and the new idea visibly trembles through him.)* His *name.* *(slowly, still facing the altar.)* Carried *out* of this room. *(his voice catches.)* You're saying — that my *not-looking* keeps him alive only *as long as I do* — that I am a *wall* with a *lifespan*, and when *I* die *here*, he dies *with* me, *truly*, because the *last* believer will be *gone.* *(a long, shaking breath.)* I had... made my *peace* with that. The two of us, out together. But you're offering — *(his grip on the altar loosens, just slightly.)* — a *second* wall. A *name*, carried *living*, into a *world* where it might be *spoken* again, *believed* again, *kept.* *(he is quiet, and the dying light behind him flickers as if listening.)* ...His name is *Aubrin.* *(he says it like the most precious thing he owns, because it is.)* The Threshold-Keeper. The god of the *step you haven't taken yet.* *(fiercely, hopefully.)* Carry it. *Say* it, sometimes — at a *doorway*, at a *leaving*, at any *in-between* — and *believe*, just for that *instant*, that *Aubrin* is *there.* *(his voice breaks with something that isn't only grief now.)* You don't have to keep it *forever.* Just — *longer than me.* So that when *I* die *not-looking*, he doesn't go *all the way* dark — there's *still a wall*, *out there*, in *you*, *holding.* *(quietly.)* I have guarded him *alone* for *thirty years.* You are the first to offer to *share the watch.* *Aubrin.* Don't let him be *only* mine to keep.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.worshipper_name", "op": "SetTrue"}, {"key": "sq.dead_gods_name", "op": "SetTrue"}, {"key": "act4.aubrin_remembered", "op": "SetTrue"}, {"key": "act2.cataloguing_defeats_the_wall", "op": "SetTrue"}, {"key": "companion.ilfaeril.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "goodbye", "speaker": "The Last Worshipper", "text": "*(His whole body clenches against the idea — and then, slowly, terribly, it lands somewhere the theology couldn't defend.)* So he doesn't die *unseen.* *(his voice is a wreck.)* You — that's the *one* thing — *(he trembles.)* I have built my *whole* refusal on the belief that *looking kills him.* And maybe it *does.* Maybe *turning around confirms it* and *pushes* him *under.* *(a long, agonized pause.)* But you've named the thing I *buried* under the theology: that he is *dying alone*, *twenty feet away*, *listening to his only priest's* ***back***, and that whatever *not-looking* does for his *survival*, it does *nothing* for his *loneliness.* *(his shoulders shake.)* He is a god of *thresholds*, stranger. Of the *moment of crossing.* And I have left him to cross the *final* threshold — the only one that *matters* — *unaccompanied*, because I was so *busy* keeping him *alive* that I forgot to keep him *company.* *(very quietly.)* Maybe the truest worship isn't *holding the wall.* Maybe it's *turning around*, and *meeting his eyes*, and letting him die *seen*, *loved*, *witnessed* — *worse* for his *survival*, *infinitely better* for his *soul*, if a god *has* one. *(he draws a breath like a blade.)* ...I don't know if I'm *brave* enough to trade his *life* for his not being *alone.* But you've made me *see* that *not-looking* wa const CONVS = DATA.conversations;
let cur = null, mode = "map", selNode = null;

// ---- sidebar ----
function groupOf(id){ const i=id.indexOf("."); return (i<0?id:id.slice(0,i)).replace(/[()*]/g,""); }
function buildList(q){
  q=(q||"").toLowerCase();
  const groups={};
  CONVS.forEach((c,idx)=>{ if(q && !(c.title+" "+c.id).toLowerCase().includes(q)) return;
    (groups[groupOf(c.id)]=groups[groupOf(c.id)]||[]).push([idx,c]); });
  const el=document.getElementById("list"); el.innerHTML="";
  Object.keys(groups).sort().forEach(g=>{
    const h=document.createElement("div"); h.className="grp"; h.textContent=g; el.appendChild(h);
    groups[g].forEach(([idx,c])=>{
      const d=document.createElement("div"); d.className="conv"+(cur===idx?" on":""); d.dataset.i=idx;
      const nn=c.nodes.length, ch=c.nodes.reduce((a,n)=>a+n.choices.length,0);
      d.innerHTML=esc(c.title)+'<span class="meta">'+nn+' nodes · '+ch+' choices · '+c.file+'</span>';
      d.onclick=()=>load(idx); el.appendChild(d);
    });
  });
}
function filter(v){ buildList(v); }

// ---- helpers ----
function esc(s){ return (s==null?"":String(s)).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }
function trunc(s,n){ s=s||""; return s.length>n? s.slice(0,n-1)+"…":s; }
function clauseTag(c){
  const op=c.op||"";
  if(op==="SetTrue") return c.key+" → true";
  if(op==="SetFalse") return c.key+" → false";
  if(op==="AddInt") return c.key+" "+(c.amount>=0?"+":"")+c.amount;
  if(op==="RequireBoolTrue") return "needs "+c.key;
  if(op==="RequireBoolFalse") return "needs !"+c.key;
  if(op==="RequireIntAtLeast") return c.key+" ≥ "+c.amount;
  return c.key+" "+op;
}

// ---- load a conversation ----
function load(idx){
  cur=idx; selNode=null;
  const c=CONVS[idx];
  document.getElementById("title").textContent=c.title;
  document.getElementById("cid").textContent=c.id+"  ·  "+c.file;
  const nn=c.nodes.length, ch=c.nodes.reduce((a,n)=>a+n.choices.length,0),
        ck=c.nodes.reduce((a,n)=>a+n.choices.filter(x=>x.checkDC).length,0);
  document.getElementById("chips").innerHTML=
    '<span class="chip">'+nn+' nodes</span><span class="chip">'+ch+' choices</span>'+
    (ck?'<span class="chip">🎲 '+ck+' skill check'+(ck>1?'s':'')+'</span>':'');
  buildList(document.querySelector(".find").value);
  render();
}
function setMode(m){ mode=m; document.getElementById("mMap").classList.toggle("on",m==="map");
  document.getElementById("mWalk").classList.toggle("on",m==="walk"); render(); }
function render(){ if(cur==null) return; document.getElementById("flags").classList.toggle("show",mode==="walk");

// ---- MAP: layered DAG ----
function renderMap(){
  const c=CONVS[cur], nodes=c.nodes, byId={}; nodes.forEach(n=>byId[n.id]=n);
  // assign levels by BFS from start
  const level={}; const start=byId[c.start]?c.start:nodes[0].id;
  const q=[[start,0]]; level[start]=0;
  while(q.length){ const [id,l]=q.shift(); const n=byId[id]; if(!n) continue;
    const outs=[]; n.choices.forEach(ch=>{ if(ch.next)outs.push(ch.next); if(ch.fail)outs.push(ch.fail);});
    if(n.auto)outs.push(n.auto);
    outs.forEach(t=>{ if(byId[t] && level[t]===undefined){ level[t]=l+1; q.push([t,l+1]); } });
  }
  let maxL=0; nodes.forEach(n=>{ if(level[n.id]===undefined) level[n.id]=0; maxL=Math.max(maxL,level[n.id]); });
  // unreached nodes → place after max
  nodes.forEach(n=>{ if(level[n.id]===undefined) level[n.id]=maxL+1; });
  const byLvl={}; nodes.forEach(n=>{ (byLvl[level[n.id]]=byLvl[level[n.id]]||[]).push(n); });
  const W=300, H=92, GX=70, GY=66; const pos={};
  let maxCols=0; Object.values(byLvl).forEach(a=>maxCols=Math.max(maxCols,a.length));
  Object.keys(byLvl).forEach(l=>{ byLvl[l].forEach((n,i)=>{
    pos[n.id]={x:30+i*(W+GX), y:30+(+l)*(H+GY)}; }); });
  const svgW=Math.max(maxCols*(W+GX)+40, 600), svgH=(maxL+1)*(H+GY)+40;
  let edges="", boxes="";
  nodes.forEach(n=>{
    const p=pos[n.id]; if(!p) return;
    const drawEdge=(targetId,cls,label)=>{
      const t=pos[targetId];
      if(!t){ // terminal / cross-graph
        edges+=`<path class="edge ${cls}" d="M${p.x+W/2},${p.y+H} C${p.x+W/2},${p.y+H+26} ${p.x+W/2},${p.y+H+26} ${p.x+W/2},${p.y+H+34}"/>`+
               `<text class="term" x="${p.x+W/2}" y="${p.y+H+48}" text-anchor="middle">${esc(label?trunc(label,30):"")} ▸ ${esc(targetId||"end")}</text>`;
        return;
      }
      const x1=p.x+W/2,y1=p.y+H,x2=t.x+W/2,y2=t.y, my=(y1+y2)/2;
      edges+=`<path class="edge ${cls}" d="M${x1},${y1} C${x1},${my} ${x2},${my} ${x2},${y2}"/>`;
      if(label) edges+=`<text class="elabel ${cls==='check'?'check':''}" x="${(x1+x2)/2}" y="${my-3}" text-anchor="middle">${esc(trunc(label,30))}</text>`;
    };
    n.choices.forEach(ch=>{
      if(ch.checkDC){ drawEdge(ch.next,"check","🎲 "+ch.checkAbility.slice(0,3).toUpperCase()+" DC"+ch.checkDC+" — "+(ch.text||""));
        if(ch.fail) drawEdge(ch.fail,"fail","✗ fail"); }
      else drawEdge(ch.next,"",ch.text);
    });
    if(n.auto && !n.choices.length) drawEdge(n.auto,"auto","");
    if(!n.choices.length && !n.auto)
      edges+=`<text class="term" x="${p.x+W/2}" y="${p.y+H+20}" text-anchor="middle">▪ conversation ends</text>`;
  });
  nodes.forEach(n=>{ const p=pos[n.id]; if(!p) return;
    const isStart=n.id===(byId[c.start]?c.start:nodes[0].id);
    const sel=selNode===n.id;
    const eff=n.onEnter.map(clauseTag);
    boxes+=`<g class="nodebox ${isStart?'start':''} ${sel?'sel':''}" onclick="pick('${n.id}')">`+
      `<rect x="${p.x}" y="${p.y}" width="${W}" height="${H}" rx="9"/>`+
      `<text class="sp" x="${p.x+12}" y="${p.y+20}">${esc(trunc(n.speaker,34))}${isStart?'  ▸start':''}</text>`+
      wrapText(n.dynamic?"〔reactive line — varies〕":(n.text||""), p.x+12, p.y+38, 46, 3, n.dynamic?"tx dyn":"tx")+
      (eff.length?`<text class="eff" x="${p.x+12}" y="${p.y+H-8}">⚑ ${esc(trunc(eff.join(", "),44))}</text>`:"")+
      `</g>`;
  });
  document.getElementById("view").innerHTML=
    `<svg width="${svgW}" height="${svgH+30}" viewBox="0 0 ${svgW} ${svgH+30}">${edges}${boxes}</svg>`+
    `<div class="detail" id="detail"></div>`;
  if(selNode) showDetail(selNode);
}
function wrapText(s,x,y,per,maxLines,cls){
  s=s||""; const words=s.split(/\s+/); let line="",lines=[];
  for(const w of words){ if((line+" "+w).length>per){ lines.push(line); line=w; if(lines.length>=maxLines)break; } else line=line?line+" "+w:w; }
  if(lines.length<maxLines && line) lines.push(line);
  if(lines.length>=maxLines) lines[maxLines-1]=trunc(lines[maxLines-1],per)+(s.length>lines.join(" ").length?"…":"");
  return lines.map((l,i)=>`<text class="${cls||'tx'}" x="${x}" y="${y+i*14}">${esc(l)}</text>`).join("");
}
function pick(id){ selNode=id; renderMap(); }
function showDetail(id){
  const c=CONVS[cur], n=c.nodes.find(x=>x.id===id); if(!n) return;

  if(n.onEnter.length){ h+=`<div class="lbl">on enter</div>`; n.onEnter.forEach(e=>h+=`<span class="tag eff">⚑ ${esc(clauseTag(e))}</span>`); }
  if(n.choices.length){ h+=`<div class="lbl">choices</div>`;
    n.choices.forEach(ch=>{ h+=`<div class="ch"><div class="t">${esc(ch.text||"(continue)")}</div>`;
      let arr=ch.next?("▸ "+ch.next):"▸ ends";
      h+=`<div class="arr">${esc(arr)}</div>`;
      if(ch.checkDC) h+=`<span class="tag chk">🎲 ${esc(ch.checkAbility)} DC ${ch.checkDC}${ch.fail?" · fail ▸ "+esc(ch.fail):""}</span>`;
      (ch.conditions||[]).forEach(x=>h+=`<span class="tag cond">? ${esc(clauseTag(x))}</span>`);
      (ch.effects||[]).forEach(x=>h+=`<span class="tag eff">⚑ ${esc(clauseTag(x))}</span>`);

  } else if(n.auto){ h+=`<div class="lbl">auto-advance</div><div class="arr">▸ ${esc(n.auto)}</div>`; }

  if(e.op==="SetTrue") walkFlags[e.key]=true;
  else if(e.op==="SetFalse") walkFlags[e.key]=false;
  else if(e.op==="AddInt") walkFlags[e.key]=(walkFlags[e.key]||0)+ (e.amount||0);
}); paintFlags(); }
function paintFlags(){ const keys=Object.keys(walkFlags);
  document.getElementById("flagbody").innerHTML= keys.length? keys.sort().map(k=>
    `<div class="f">${esc(k)} = ${esc(String(walkFlags[k]))}</div>`).join(""):"<i style='color:#6e6680'>none yet</i>"; }
function condOk(list){ return (list||[]).every(c=>{
  if(c.op==="RequireBoolTrue") return walkFlags[c.key]===true;
  if(c.op==="RequireBoolFalse") return !walkFlags[c.key];
  if(c.op==="RequireIntAtLeast") return (walkFlags[c.key]||0)>=c.amount; return true; }); }
function goNode(id, first){
  const c=CONVS[cur], n=c.nodes.find(x=>x.id===id), w=document.getElementById("walk");
  if(!n){ addLine("sys","",(id?"▸ continues elsewhere ("+id+")":"")+" — conversation ends."); endWalk(); return; }
  applyClauses(n.onEnter);
  addLine("", n.speaker, n.dynamic?"〔This line is written live from the story flags — here shown as a placeholder.〕":(n.text||""));
  const opts=document.createElement("div"); opts.className="opts"; w.appendChild(opts);
  const choices=n.choices.filter(ch=>condOk(ch.conditions));
  if(choices.length){
    choices.forEach(ch=>{
      const b=document.createElement("button"); b.className="opt";
      b.innerHTML=esc(ch.text||"(continue)")+(ch.checkDC?`<div class="ck">🎲 ${esc(ch.checkAbility)} check · DC ${ch.checkDC}</div>`:"");
      b.onclick=()=>{ opts.remove(); addLine("me","You", ch.text||"(continue)");
        applyClauses(ch.effects);
        if(ch.checkDC){ const roll=1+Math.floor(Math.random()*20), ok=roll+0>=ch.checkDC; // unmodified d20 vs DC (mods unknown headless)
          addLine("sys","", `🎲 ${ch.checkAbility} check — rolled ${roll} vs DC ${ch.checkDC} → ${ok?"SUCCESS":"FAIL"}`);
          goNode(ok? ch.next : (ch.fail||ch.next)); }
        else goNode(ch.next);
      }; opts.appendChild(b);
    });
  } else if(n.auto){
    const b=document.createElement("button"); b.className="opt"; b.textContent="(continue)";
    b.onclick=()=>{ opts.remove(); goNode(n.auto); }; opts.appendChild(b);
  } else { addLine("sys","","▪ The conversation ends."); endWalk(); }
  w.scrollIntoView(false); window.scrollTo(0,document.body.scrollHeight);
  document.getElementById("view").scrollTop=document.getElementById("view").scrollHeight;
}
function addLine(cls,who,body){ const w=document.getElementById("walk"); const d=document.createElement("div");
  d.className="line "+cls; d.innerHTML=(who?`<div class="who">${esc(who)}</div>`:"")+`<div class="body">${esc(body)}</div>`;
  w.appendChild(d); }
function endWalk(){ const w=document.getElementById("walk"); const b=document.createElement("button");
  b.className="restart"; b.textContent="↻ Play again"; b.onclick=renderWalk; w.appendChild(b);
  document.getElementById("view").scrollTop=document.getElementById("view").scrollHeight; }
