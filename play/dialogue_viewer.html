[], "choices": []}]}, {"id": "roen.quest.arrival", "file": "RoenQuestContent.cs", "title": "Roen · Quest · Arrival", "start": "0", "nodes": [{"id": "0", "speaker": "Roen Alleywind", "text": "This is the safehouse the cipher named. Harper-warded, supposedly. But the wards are cold, the door's off the latch, and there's no countersign chalked on the step.\n\nSomeone I care about ran this house. I told you I had a person I'd pull from the Wall. I didn't tell you she's my sister. Wrenna. And I didn't tell you she's not in the Wall yet.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "Why lie about it?", "next": "1", "fail": null}, {"text": "Then let's get her out. Lead on.", "next": "2", "fail": null}]}, {"id": "1", "speaker": "Roen Alleywind", "text": "Because if you knew I had something to lose, you'd know exactly where to cut me. Habit. The Harpers train it into you young, and family trains it younger.", "dynamic": false, "auto": "2", "onEnter": [], "choices": []}, {"id": "2", "speaker": "Roen Alleywind", "text": "Doomguide sign on the lintel — fresh. Kelemvor's people have been here, and they don't leave witnesses, only verdicts. Knives out. Quietly.", "dynamic": false, "auto": null, "onEnter": [{"key": "roen.quest.arrived", "op": "SetTrue"}], "choices": []}]}, {"id": "roen.quest.reveal", "file": "RoenQuestContent.cs", "title": "Roen · Quest · Reveal", "start": "0", "nodes": [{"id": "0", "speaker": "Wrenna Alleywind", "text": "Roen. Gods — Roen, you have to go, now, before they— \n\n(She stops. Looks at you. Something in her face folds shut.) \n\n...You brought the Returned here. To my house. Do you have any idea what they'd give to have this one on an altar?", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "\"They.\" The Doomguides. You've been talking to them.", "next": "1", "fail": null}, {"text": "Wrenna — what did you do?", "next": "1", "fail": null}]}, {"id": "1", "speaker": "Wrenna Alleywind", "text": "They had a writ with your name on it, Roen. The Wall, for 'consorting with the Returned.' I had a choice: hand them Harper routes, names, drops — or watch my brother mortared into nothing while I lived. So I lied. To the Harpers, to you, to everyone. For two years.", "dynamic": false, "auto": null, "onEnter": [{"key": "roen.quest.truth_known", "op": "SetTrue"}], "choices": [{"text": "(Say nothing. The Doomguides are coming.)", "next": "2", "fail": null}]}, {"id": "2", "speaker": "Roen Alleywind", "text": "...Two years. You sold the Harpers to keep me breathing, and let me think I owed *you* nothing. We'll have that fight later. Right now there are six Doomguides between her and the door. Decide who you are after we live.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "roen.quest.resolution", "file": "RoenQuestContent.cs", "title": "Roen · Quest · Resolution", "start": "0", "nodes": [{"id": "0", "speaker": "Roen Alleywind", "text": "The cell's down. The safehouse is ours — what's left of it. And Wrenna's standing here a traitor to the Harpers and the only family I've got, in the same body. \n\nI can't make this call clean. Help me make it.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "She did it to save you. Take her home. (forgive)", "next": "forgive", "fail": null, "effects": [{"key": "quest.roen.resolved", "op": "SetTrue"}, {"key": "quest.roen.wrenna_saved", "op": "SetTrue"}, {"key": "companion.roen.approval", "op": "AddInt", "amount": 20}]}, {"text": "She betrayed the Harpers. The rules exist for a reason. (condemn)", "next": "condemn", "fail": null, "effects": [{"key": "quest.roen.resolved", "op": "SetTrue"}, {"key": "quest.roen.harper_boon", "op": "SetTrue"}, {"key": "companion.roen.approval", "op": "AddInt", "amount": -15}]}, {"text": "[Persuasion] Neither. We turn her two years of lies on the Doomguides.", "next": "gambit_win", "fail": "gambit_fail", "checkDC": 15, "checkAbility": "Charisma"}]}, {"id": "forgive", "speaker": "Roen Alleywind", "text": "Yeah. Yeah — come here, you idiot. (He pulls her in.) We'll explain it to the Harpers together, and if they don't like it, I know every alley out of this city.\n\nI won't forget that you let me choose mercy. Whatever's at the end of your road, Returned — I'm on it.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}, {"id": "condemn", "speaker": "Roen Alleywind", "text": "(A long silence.) ...You're right. You're right, and I hate that you're right. She turns herself in. The Harpers get their routes back, their traitor, and a debt to us.\n\nIt's the correct call. Don't expect me to thank you for it. But here — everything the cell carried. Use it well.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}, {"id": "gambit_win", "speaker": "Roen Alleywind", "text": "...Gods. That could *work*. Wrenna's still on their books as an asset — they don't know the cell's dead. We feed them what *we* choose, and walk a knife straight into Kelemvor's people.\n\nYou didn't just save my sister. You turned her into the best weapon we've got. Remind me never to play cards against you.", "dynamic": false, "auto": null, "onEnter": [{"key": "quest.roen.resolved", "op": "SetTrue"}, {"key": "quest.roen.wrenna_saved", "op": "SetTrue"}, {"key": "quest.roen.harper_boon", "op": "SetTrue"}, {"key": "quest.roen.double_agent", "op": "SetTrue"}, {"key": "companion.roen.approval", "op": "AddInt", "amount": 25}], "choices": []}, {"id": "gambit_fail", "speaker": "Wrenna Alleywind", "text": "It's a pretty idea. It's also how people like me get caught and people like him get a writ. No. You don't get to gamble my brother on your cleverness. \n\nChoose plainly, Returned: do I go home with him, or do I turn myself in?", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "Take her home. (forgive)", "next": "forgive", "fail": null, "effects": [{"key": "quest.roen.resolved", "op": "SetTrue"}, {"key": "quest.roen.wrenna_saved", "op": "SetTrue"}, {"key": "companion.roen.approval", "op": "AddInt", "amount": 20}]}, {"text": "She turns herself in. (condemn)", "next": "condemn", "fail": null, "effects": [{"key": "quest.roen.resolved", "op": "SetTrue"}, {"key": "quest.roen.harper_boon", "op": "SetTrue"}, {"key": "companion.roen.approval", "op": "AddInt", "amount": -15}]}]}]}, {"id": "npc.plague.cartographer", "file": "SpellplagueDenizensContent.cs", "title": "Npc · Plague · Cartographer", "start": "0", "nodes": [{"id": "0", "speaker": "The Cartographer", "text": "*(A woman works at a vast drafting table under a sky veined with blue fire, drawing with furious speed — and the map beneath her hands is *moving*, coastlines crawling, a mountain range sliding three inches east as you watch, and the ink she uses is *wet* in a way that looks, unmistakably, like *tears.* She does not stop drawing.)* Don't lean on the table. *(sharply, not looking up.)* It's the only flat thing left in the world and I *need* it flat. *(she redraws a river that has just changed its course.)* If you've come to *commission* a map, the answer is *it will be wrong by the time I hand it to you.* If you've come to *laugh* at the woman mapping a world that *won't hold still* — get in *line.* If you've come for some *other* reason — *(she finally glances up, eyes raw)* — then you're the first in a *month*, and you may *stay.*", "dynamic": false, "auto": "1", "onEnter": [{"key": "npc.cartographer_met", "op": "SetTrue"}, {"key": "act4.spellplague_witnessed", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "The Cartographer", "text": "*(She works as she talks, her hand never still, correcting the map against a world that keeps betraying it.)* The Spellplague *unmade* geography. *(a coastline ripples; she chases it with her pen.)* Lands that were *here* for ten thousand years simply — *left.* Swapped places with a *whole other world*, Abeir, that fell out of the *sky.* A man went to sleep in *Faerûn* and woke in a *desert that had never existed*, and his *house*, his *village*, his *wife* — *gone*, not *destroyed*, just *somewhere else now*, behind a wall of *blue fire* you cannot *cross.* *(her voice tightens.)* And everyone says: *\"Stop mapping, woman. It's pointless. The map's wrong before the ink dries. You're drawing water.\"* *(she presses harder; the ink weeps.)* But here is what they don't understand. *(quietly, fiercely.)* I am not mapping the world *as it is.* I gave that up. I am mapping the world *as it was* — the *morning before the fire.* Every coastline in its *old* place. Every village that *swapped away* still *drawn where it stood.* *(her hand shakes.)* My maps aren't *navigation*, stranger. They're *memorials.* They're the only *record* that *Tharsult was here*, that the *Vilhon Reach looked like this*, that a *whole geography existed* before the plague *ate* it. *(she meets your eyes.)* They call my maps *wrong.* They're not *wrong.* They're *grief*, drawn accurately. And someone has to draw it, or the world won't even *remember* the shape it *used* to be.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "[INSIGHT 18] \"Your maps weep because the ink is plaguechanged — but they weep *accurately.* You're not failing to map the new world. You're *refusing* to. Because somewhere on the old coastline is a place you can't bear to redraw as *gone.* Which town is it, cartographer? Which one are you keeping *here* on paper because the fire took it *there?*\"", "next": "town", "fail": "snap", "checkDC": 18, "checkAbility": "Wisdom"}, {"text": "\"A map of the world-as-it-was isn't useless — it's the most important document of the age. The new world will forget it had a *predecessor.* Give me a copy. Let the old geography ride out of this room in more than one hand.\"", "next": "copy", "fail": null, "effects": [{"key": "sq.the_old_map", "op": "SetTrue"}]}, {"text": "\"They say you're drawing water. But every people that survives a catastrophe needs someone who *refused to update the map* — who kept the old shape alive until the grief could catch up to the change. You're not mad. You're the *memory* of the world.\"", "next": "memory", "fail": null}, {"text": "\"Stop drawing for one breath. The world will still dissolve whether your hand moves or not. Tell me what it was like — the morning before the fire. Not the coastlines. The *light.*\"", "next": "morning", "fail": null, "effects": [{"key": "companion.naeve.approval", "op": "AddInt", "amount": 2}]}]}, {"id": "town", "speaker": "The Cartographer", "text": "*(Her pen stops. For the first time, the moving map is allowed to move *uncorrected*, and she stares at one spot on it — a small inland mark her hand has clearly redrawn a thousand times.)* ...Which town. *(very quietly.)* You're cruel, to see it. *(she touches the mark, and the wet ink smears under her finger like a tear wiped sideways.)* *Sevenfields.* It's — it *was* — a *nothing* town. Barley and bad roads. *(her voice cracks.)* My daughter married a *barley farmer* there. Against my *every* wish — I wanted *better* for her, a *city*, a *trade* — and we *quarreled*, and she went to *Sevenfields* anyway, and we hadn't *spoken* in two *years* over my *stupid pride*, and I kept *meaning* to *go*, to *make it right*, *next* season, *next* season — *(she presses her hand flat on the map, over the town.)* And then the *fire* came, and *Sevenfields swapped away* — *whole* — to *Abeir*, behind the blue wall, and it is *not destroyed*, stranger, that's the — that's the *unbearable* part. It's *intact.* My daughter is *alive*, in a town that is *perfectly fine*, on a world I *cannot reach*, and I will *never* cross that wall, and the *last* thing between us is still my *stupid pride* and a *quarrel about barley.* *(she looks at you, devastated.)* So I keep *Sevenfields* on the map. *Here.* Where it *was.* Where I could still *walk* to it, if the world would just — *hold still.* *(softly.)* I'm not mapping a *world.* I'm keeping a *road to my daughter* open on *paper*, because it's the only place it *still exists.*", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.cartographer_town", "op": "SetTrue"}, {"key": "act4.sevenfields_kept", "op": "SetTrue"}, {"key": "act1.mercy_remembered", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 5}], "choices": []}, {"id": "copy", "speaker": "The Cartographer", "text": "*(She looks at you, and a kind of fierce relief breaks through the grief — a mapmaker offered the one thing that matters: a second copy against the dark.)* A copy. *(she's already pulling fresh vellum.)* Yes. *Yes.* You understand — a *single* map *burns*, *smears*, *dissolves*, and then the old world is *gone* with *no* witness. But a map that's been *copied*, *carried*, *spread* — *(her hands move fast)* — that's a *geography that survives its own planet.* *(she sketches with sudden joy.)* I'll give you the *whole* of it — the Vilhon as it *was*, the old coast, the swapped-away towns drawn *where they stood* — and you carry it *forward*, past the fire, into whatever world *comes* — and then, even when the *new* maps say *\"here is desert, here is Abeir-stone, here is nothing\"* — *someone*, *somewhere*, will have the *old* shape, and be able to say *\"no. Here was Tharsult. Here was Sevenfields. Here was a* world, *before this one.\"* *(she presses the copy into your hands, ink still weeping.)* They called me a fool for mapping water. But water *remembers* its banks, stranger, long after the river moves — and so will *this.* You're not carrying a *map.* You're carrying the *world's memory of itself.* Keep it *dry.* Keep it *safe.* And when you meet someone who *lost* a place to the fire — *show* them it's still *here*, on *paper*, *exactly* where they left it.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.cartographer_copy", "op": "SetTrue"}, {"key": "sq.the_old_map", "op": "SetTrue"}, {"key": "act2.cataloguing_defeats_the_wall", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "memory", "speaker": "The Cartographer", "text": "*(She stills, and something in her unclenches — the relief of being understood rather than corrected.)* The memory of the world. *(slowly.)* Not the *madwoman.* The *memory.* *(she looks at her weeping map with new eyes.)* You're right that a people *needs* one. After a catastrophe — when *everything* changes *at once* — there's a *violence* in how fast the *living* are told to *move on.* *\"Update the map. Accept the new coast. The old world is gone, stop *grieving* it.\"* *(her voice firms.)* As if *grief* were an *error* in the *map.* As if a people could *survive* having its *entire past* overwritten in a *season* and just — *carry on*, *blank*, as though it had *always* been *this.* *(she taps the old coastline.)* Someone has to *refuse.* Someone has to keep the *old shape* alive — *visibly*, *stubbornly*, *on the wall where everyone passes* — *not* because we can *go back*, we *can't*, but because a people that *forgets it had a predecessor* becomes a people that thinks *this* — *(she gestures at the blue-veined ruin)* — *was always normal.* *(she meets your eyes.)* I'm the *brake* on the forgetting. The one who holds the *old map* up until the *grief* has *time* to *catch up* to the *change.* *(quietly.)* That's not *madness.* That's a *civic office*, stranger, even if I'm the only one who *holds* it. *Memory-keeper.* Cartographer of the *world-that-was.* Someone has to. I *volunteer.*", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.cartographer_memory", "op": "SetTrue"}, {"key": "act4.memory_keeper", "op": "SetTrue"}, {"key": "companion.ilfaeril.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "morning", "speaker": "The Cartographer", "text": "*(Her hand stops — and the effort it takes her to stop is visible, like a swimmer pausing mid-stroke in a current. She closes her eyes.)* The light. *(softly.)* The morning before the fire. *(a long breath.)* ...It was *ordinary.* That's what no one *tells* you about the last morning of a world — it is *completely ordinary.* *(her eyes stay closed.)* Grey-gold, off the Vilhon. Mist on the barley. The smell of someone's *bread.* A *fishwife* shouting a price. My *neighbor's* dog, the one that *howled* at *nothing.* *(her voice thickens.)* I *complained*, that morning. About the *mist.* About my *aching hand.* About the *price of ink.* I spent the *last ordinary morning of the entire world* being *mildly annoyed*, because I *didn't know*, because you *never* know, the *last* normal day *never* announces itself — *(her eyes open, wet.)* — and *then* the *sky turned blue with fire* and *nothing* was *ordinary* ever *again.* *(she looks at the moving map.)* So now I *map.* And I *draw* the ordinary morning into *every coastline* — the *mist*, the *bread*, the *howling dog* — *folded* into the *lines* where no one but me can *read* them. *(quietly.)* Because the *thing* I'm really mapping, stranger, the thing under *all* the geography, is: *it was an ordinary morning, and we did not know to love it, and now it is the most precious thing that ever existed.* *(she picks the pen back up.)* Thank you for the breath. I needed to *say* the *light* to someone before the *fire* takes the *memory* of *that*, too.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.cartographer_morning", "op": "SetTrue"}, {"key": "act1.mercy_remembered", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "snap", "speaker": "The Cartographer", "text": "*(Her pen jabs the vellum, and she does not look up.)* Don't. *(flatly.)* Don't *reach into* me for some *tender wound* to *poke.* I haven't the *time* — the *coast* is *moving* even as you *philosophize*, and every *second* I spend being *understood* by a *stranger* is a *second* the *old shape* slips further from the *paper.* *(she redraws furiously.)* I map. That's *all.* It's *not* grief, it's *not* a *memorial*, it's *not* a *daughter* — *(her voice catches, then hardens)* — it's *cartography*, and it's *mine*, and I'll thank you to let me *do* it without *excavating* my *reasons.* Buy a map or *leave.* The world's *dissolving*, and I am *busy* refusing to *let it.*", "dynamic": false, "auto": "close", "onEnter": [], "choices": []}, {"id": "close", "speaker": "The Cartographer", "text": "*(The cartographer bends back over her weeping, accurate maps — drawing the world-that-was against a world that will not hold still — and whether she showed you the town she's keeping or guarded it behind her pen, you carry away the quiet defiance at the heart of the Spellplague: that when a catastrophe overwrites an entire world in a season, the bravest act is not to *accept the new map* but to *refuse to redraw the old one* — to keep the lost coast, the swapped-away town, the ordinary morning, alive on paper until the grief has time to catch up to the change.)*", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "npc.plague.twain", "file": "SpellplagueDenizensContent.cs", "title": "Npc · Plague · Twain", "start": "0", "nodes": [{"id": "0", "speaker": "One Body, Two Voices", "text": "*(A person approaches you — and you realize, as they speak, that there are *two* of them, sharing one body, the voice shifting register and cadence mid-sentence as though two people stood very close behind a single face.)* *(voice one, warm, low:)* Oh, good, someone new — *(voice two, brighter, quicker, same mouth:)* — don't *frighten* them, Coram, you always *lead* with the *two-of-us* thing and it's a *lot* — *(voice one:)* — I was *getting* to it, Sera, give me a — *(both, then, in a strange unison, to you:)* — *forgive us.* We do this. We're *new* at being a *we*, and the *seams* still show. *(the face smiles, and it is, somehow, two smiles.)* You've met plaguechanged before, surely. We're just... *more* of us than usual. In here.", "dynamic": false, "auto": "1", "onEnter": [{"key": "npc.twain_met", "op": "SetTrue"}, {"key": "act4.spellplague_witnessed", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "The Two Who Are One", "text": "*(The two voices take turns, and there is, beneath the comedy of it, a startling and hard-won grace.)* *(Coram, the low voice:)* The Spellplague *merged* us. I was a *cooper* in Ormath. *(Sera, the bright one:)* And I was a *midwife* in a *town that doesn't exist on this world* — Abeir-side, swapped over in the fire. *(Coram:)* Two strangers. Two *whole lives.* And the blue fire came through the market and when it *cleared* we were — *(Sera:)* — *this.* One body. Two of us. *Neither* of us asked. *(both, gently:)* Neither of us *chose.* *(Coram:)* And for the first *month* we *fought* — gods, we *fought*, two strangers screaming inside one *skull*, each *certain* the *other* was a *parasite*, each *grieving* our *own* lost life, our *own* lost *hands*, our *own* lost *singular self* — *(Sera, quieter:)* — I had a *daughter*, Coram had a *wife*, and they're *both* on the *wrong sides* of *walls* we'll *never* cross — *(Coram:)* — and we could have spent *whatever's left* of this *one shared life* at *war.* *(both, and here the unison is *practiced*, *chosen*, almost tender:)* But we *didn't.* We learned to be a *we.* And now people keep finding *cures* — ways to *separate* us, to *cast one of us out* — and they think they're *helping*, and we — *(the face goes still, both of them at once)* — we're *terrified.* Because we've become *someone.* Together. And a *cure* would be a *murder* wearing a *mercy's* face.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "[INSIGHT 18] \"Everyone offers to 'fix' you by *removing* one of you — and calls it restoring a person. But you're not two people trapped in one body. You've become a *third* person neither of you was alone. The 'cure' doesn't free anyone. It *kills the we you built.*\"", "next": "third", "fail": "wary", "checkDC": 18, "checkAbility": "Wisdom"}, {"text": "\"You each lost a whole life — a wife, a daughter, behind walls you can't cross. How do you carry *two* griefs in one chest without it crushing you both?\"", "next": "grief", "fail": null, "effects": [{"key": "companion.naeve.approval", "op": "AddInt", "amount": 3}]}, {"text": "\"If someone forced the cure on you — separated you against your will — which of you would they keep, and which would they cast out? *Have* you decided? Or is the not-deciding the most married thing about you?\"", "next": "which", "fail": null}, {"text": "\"I won't offer to fix you. But tell me — what's it *like*, the good days? When the seams don't show? When you're not two strangers but one... whatever you're becoming?\"", "next": "goodday", "fail": null, "effects": [{"key": "companion.garrow.approval", "op": "AddInt", "amount": 2}]}]}, {"id": "third", "speaker": "The Two Who Are One", "text": "*(The body goes very still, and when the voices come again they are, for a moment, *braided* — not taking turns, but *speaking together*, a single chord.)* *(both, as one:)* ...A third person. *(then Coram, shaken:)* That's — we've never had the *words* for it. People say *\"poor Coram, trapped with a stranger,\"* or *\"poor Sera, sharing a cooper's body,\"* and we keep trying to *explain* that it isn't — *(Sera:)* — that it isn't *Coram-plus-Sera* anymore, it's — *(both, together:)* — *us.* A *we* that *remembers* being *two*, but *isn't*, *now*, *quite* either. *(Coram:)* I *laugh* at things Coram-alone never found funny. *(Sera:)* I have a *patience* Sera-alone never *had* — his, the cooper's, slow hands. *(both:)* We *finish* each other's — not *sentences*, that's *cheap* — each other's *silences.* *(the face turns to you, and the grief and the wonder are *one* expression now.)* So when they come with the *cure*, the *separation*, and say *\"we'll give you back your* self,\"* they don't understand: the *self* they'd *give back* is a *self that no longer exists.* You can't *return* Coram to *before-Sera.* There's *only us* now. *(both, fierce and gentle:)* *Cure* us, and you don't *free* two people. You *erase* a *third* one — the *only* one of us that was *born* from the *fire* instead of *killed* by it. *(quietly.)* Thank you for seeing the *third.* No one sees the *third.* They only ever count to *two* and try to *subtract.*", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.twain_third", "op": "SetTrue"}, {"key": "act4.the_we_is_real", "op": "SetTrue"}, {"key": "act1.mercy_remembered", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 5}], "choices": []}, {"id": "grief", "speaker": "The Two Who Are One", "text": "*(The voices soften, and for a moment they *don't* take turns — they let the silence hold both losses at once.)* *(Coram, low:)* Two griefs in one chest. *(Sera, quiet:)* My daughter. *(Coram:)* My wife. *(both:)* Behind walls of blue fire we will *never* cross. *(Coram:)* You'd think it would *crush* us. Two whole *severed lives*, two *unbearable* losses, *doubled* in a *single* heart. *(Sera:)* And at *first* it *did.* We each *clutched* our *own* grief like a *wall* against the *other* — *\"my* loss is *real*, *yours* is the *intrusion\"* — *(both, and here is the hard-won thing:)* — until we *understood* that we were each *uniquely* equipped to carry the *other's* grief. *(Coram:)* *I* never knew Sera's daughter. So when *Sera* drowns in *missing* her, *I* can *hold* that grief *steady* — it's *heavy*, but it's not *mine*, so it doesn't *pull me under*, and I can be the *ground* she *weeps* on. *(Sera:)* And when *Coram* breaks over his *wife*, *I'm* the *steady* one. *(both, together:)* We *take turns* being the *strong one*, because *no* grief is *both* of ours at *once.* *(the face, wet-eyed, almost smiles.)* That's the *secret*, stranger. *Alone*, each grief would have *drowned* its *owner.* *Together*, there's *always* one of us with *dry footing* to *hold the other.* *(softly.)* We didn't *halve* the sorrow by sharing a body. We *learned to bear it in shifts.* It's the only thing the fire gave us that we'd *keep.*", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.twain_grief", "op": "SetTrue"}, {"key": "act4.the_we_is_real", "op": "SetTrue"}, {"key": "act1.mercy_remembered", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "which", "speaker": "The Two Who Are One", "text": "*(The question lands hard — the body flinches, and both voices go quiet for a long moment before Coram speaks, low and careful.)* *(Coram:)* Which of us they'd keep. *(Sera, barely:)* We don't — *(Coram:)* — we don't *talk* about it. *(a pause.)* *(both, then, and it costs them:)* But we've *each* decided. *Privately.* *(Sera:)* I've decided that if it comes to it — if they can only save *one* — it should be *Coram.* He has a *wife* still *living*, even behind the wall; a life that's *waiting*, if the walls ever *fall.* My town is *gone-gone*, Abeir-swapped, my daughter — *(her voice catches)* — I've made my *peace* that I'm the one who should *go.* *(Coram, fiercely:)* — and *I've* decided the *exact opposite*, that *Sera* should be kept, because she's *younger*, because a *midwife saves lives* and a *cooper makes barrels*, because — *(both, and they realize it together, the realization breaking over them:)* — because we have *each*, *secretly*, *chosen to be the one who dies* so the *other* can *live.* *(the face crumples, two people discovering at once that the other loves them that much.)* *(Sera, weeping:)* ...You *absolute fool*, Coram. *(Coram, wet:)* *You* first, Sera. *(both, to you, undone:)* *That's* your answer. We each chose to *die for* a *stranger* the *fire* *welded* us to. If *that's* not a *marriage*, stranger, there has *never* been one. *Please* don't let them *separate* us. We've only *just* found out how much we'd *give up* for each other.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.twain_which", "op": "SetTrue"}, {"key": "act4.the_we_is_real", "op": "SetTrue"}, {"key": "act1.mercy_remembered", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 5}], "choices": []}, {"id": "goodday", "speaker": "The Two Who Are One", "text": "*(Both voices brighten, grateful for the question — and when they describe it, the seams genuinely *vanish*, and for a few sentences you cannot tell where one ends and the other begins.)* *(warm, unified:)* The good days. *(a real, single laugh.)* On a good day — we *wake*, and there's no *jolt* of *\"who is in my head,\"* there's just — *us*, *rested*, *one* person opening *one* pair of eyes. *(the voice flows, seamless.)* We make *tea* the way *neither* of us made it *alone* — Coram's *strong brew*, Sera's *honey* — and it's *better* than *either* of ours *was.* We *walk*, and Coram *notices* the *joinery* of every *door* and Sera *notices* every *baby* and every *bird*, and so we walk through a world that is *twice as full* as it was for *either* of us *singular.* *(softly, wondering.)* We are *never lonely*, stranger. Do you understand what that *means*, to a cooper who lost his *wife* and a midwife who lost her *world*? We will *never*, as long as this body *lasts*, be *alone* again. There is *always* someone who *knows*, *exactly*, *instantly*, what it's *like* to be *us* — because they *are* us. *(the face smiles, one smile now, fully.)* The *fire* took *everything* from each of us. And then it gave us the *one* thing *grief* makes you crave *most* and *can't* usually *have*: *company that never leaves.* On the good days, we wouldn't *trade* it. Not even to be *whole* and *singular* and *alone* again. *Especially* not for that.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.twain_goodday", "op": "SetTrue"}, {"key": "act4.the_we_is_real", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "wary", "speaker": "The Two Who Are One", "text": "*(The body tenses, both voices retreating into a guarded unison.)* *(both, carefully:)* You're doing the *thing.* The *kind* voice. The *\"let me understand you\"* voice that *always*, *always* turns into *\"and now let me suggest a cure.\"* *(Coram:)* We've *heard* it from *priests*, *healers*, *well-meaning* fools — *(Sera:)* — every one of them *certain* that *one body, two souls* is a *problem* to be *solved.* *(both:)* So forgive us if we *flinch* from being *understood.* Understanding, in our experience, is the *first step* toward someone *deciding which of us to remove.* *(the face closes.)* We're *fine.* We're a *we*, and the *we* is *happy*, and we'd thank you to take your *insight* elsewhere before it *sharpens* into a *scalpel.* *(and they turn the single body away, two souls guarding the third one they've become.)*", "dynamic": false, "auto": "close", "onEnter": [], "choices": []}, {"id": "close", "speaker": "The Two Who Are One", "text": "*(The two who are one move off through the blue-veined day — a cooper and a midwife welded by the fire into a third person neither was alone — and you carry away the most unexpected grace of the Spellplague: that the same catastrophe that *severs* a world from itself can also *fuse* two strangers into a love so complete that each would die for the other, and that the cruelest thing you could offer them is the *cure* that would make them *whole*, and *singular*, and *alone.*)*", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "npc.plague.gardener", "file": "SpellplagueDenizensContent.cs", "title": "Npc · Plague · Gardener", "start": "0", "nodes": [{"id": "0", "speaker": "The Blue-Fire Gardener", "text": "*(In a walled garden where the soil itself flickers with cold blue flame, an old gardener moves among impossible flora — blossoms of frozen fire, vines that grow downward, a tree whose fruit is the same fruit, endlessly, never ripening, never falling. He tends them with infinite patience and a sorrow you cannot yet place. He does not seem surprised by you; little surprises a man who gardens in plague-fire.)* Mind the threshold. *(gently.)* The garden doesn't *burn* the living — it only burns the *rules.* *(he snips at a vine that does not bleed.)* You've the look of someone walking toward something *vast.* They all come through here, eventually, the ones walking toward *vast* things. The garden is *on the way.* *(he straightens.)* Stay a moment. Let me show you what *grows*, where the fire fell. It will *matter*, later. More than you'd think.", "dynamic": false, "auto": "1", "onEnter": [{"key": "npc.gardener_met", "op": "SetTrue"}, {"key": "act4.deathless_garden_seeded", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "The Blue-Fire Gardener", "text": "*(He walks you among the impossible beds, and his voice carries the weight of a man who has understood something terrible and beautiful and is choosing his words with care.)* When the Spellplague came, it *killed* the natural law in this place. *Death* included. *(he gestures at the endless, unfalling fruit.)* These plants *cannot die.* Cut them — they do not bleed. Burn them — the fire is already *in* them. Deny them *water*, *sun*, *soil* — they do not *care*; they have stepped *outside* the bargain that *makes* a thing *mortal.* *(he touches a frozen blossom.)* When I *found* this garden, I *wept* with *joy.* A *deathless* garden! Flowers that would *never* wilt, fruit that would *never* rot, a green thing that would *outlast* the *sun!* I thought I had found *paradise.* *(his face clouds.)* And then I lived here. And I *watched* them. And I learned the thing this garden exists to *teach*, the thing you must *carry* toward your *vast* errand. *(quietly.)* The fruit that *cannot fall* — *also cannot ripen.* The flower that *cannot wilt* — *also cannot bloom*; it is *frozen* at the *bud.* The vine that *cannot die* — *cannot grow*, either; it is *fixed*, *exactly*, *forever.* *(he meets your eyes.)* *Deathlessness is not* eternal life, *stranger. It is* eternal pause. *To be unable to die is to be unable to* change *— to* complete *— to* become. *(softly.)* This garden does not *defy* death. It is a place where *nothing is allowed to finish.* And I have come to understand that there is no *crueler* fate — not even the Wall — than a thing that *cannot end.*", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "[INSIGHT 18] \"You're not describing a garden. You're describing the *Wall*, from the other side. The Wall *keeps* souls so they can't *dissolve* — this garden *keeps* flowers so they can't *fall* — and both call it *preservation*, and both are the same crime: *refusing a thing its ending.*\"", "next": "wall", "fail": "tend", "checkDC": 18, "checkAbility": "Wisdom"}, {"text": "\"Then the answer to the Wall was never to *preserve the faithless better.* It's to give them what this garden can't: *an ending.* A real one. The mercy isn't keeping them deathless. It's letting them *fall, ripen, finish, go.*\"", "next": "ending", "fail": null}, {"text": "\"You said this would matter later. You're not a gardener — you're a *teacher*, planted on the road on purpose, so the one walking toward the crown learns the lesson *before* they reach it. Who *set* you here? And what do you want me to do with this?\"", "next": "teacher", "fail": null, "effects": [{"key": "act4.gardener_warning", "op": "SetTrue"}]}, {"text": "\"Is there *anything* in this garden that can still die? One plant, one corner, where finishing is still allowed? Because a gardener who grieves the deathless is keeping something *mortal* alive in secret. Show me.\"", "next": "mortal", "fail": null, "effects": [{"key": "companion.ilfaeril.approval", "op": "AddInt", "amount": 2}]}]}, {"id": "wall", "speaker": "The Blue-Fire Gardener", "text": "*(He stops, and a slow, profound recognition crosses his weathered face.)* ...The Wall. From the other side. *(quietly.)* You walk toward it *knowing* it, then. Good. *(he touches the frozen blossom.)* Yes. I have *stood* in this garden for *years*, grieving flowers that *cannot bloom*, and *never once* let myself *finish* the thought you just *spoke*: that *somewhere*, there is a *garden of souls* tended the *same* way — *kept* from *dissolving*, *preserved* against their *ending*, and *called* a *mercy* by the one who *tends* it. *(his voice tightens.)* The Wall and this garden are the *same place*, stranger, built on the *same lie*: that *to keep a thing from ending is to love it.* *(he shakes his head slowly.)* But love does not *freeze* the rose at the *bud to spare it the wilting.* Love lets the rose *bloom*, and *blaze*, and *brown*, and *fall* — because the *falling* is not the *enemy* of the *blooming*. The falling is what *makes* the blooming *mean* anything. *(he looks at his deathless, frozen, paused garden with terrible tenderness.)* I cannot *free* these flowers; the fire is *in* them now, the rules are *broken* past my *mending.* But *you* — *(he grips your arm)* — *you* walk toward the *gardener of souls.* And when he offers you the *crown* — the *keeping*, the *preserving*, the *better Wall* — you will remember *my* garden, and you will *know* that the *kindest* thing you can do for a *kept* thing is not to *keep it better.* It is to *let it fall.*", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.gardener_wall", "op": "SetTrue"}, {"key": "act4.deathless_is_the_wall", "op": "SetTrue"}, {"key": "act3.break_the_crown_known", "op": "SetTrue"}, {"key": "act1.mercy_remembered", "op": "SetTrue"}, {"key": "companion.ilfaeril.approval", "op": "AddInt", "amount": 5}], "choices": []}, {"id": "ending", "speaker": "The Blue-Fire Gardener", "text": "*(He nods slowly, and something like peace settles over his sorrow.)* Let them fall. Ripen. Finish. Go. *(softly.)* You've said it *better* than I have, in all my *years* among the frozen buds. *(he picks up a single unfallen fruit, turns it in his hand.)* The whole *world* fears *death*, stranger — builds *Walls* against it, *gardens* against it, *crowns* against it — and calls the *fearing* \"love.\" *(he sets the fruit down, where it will never rot.)* But I have *lived* with the *deathless*, and I will tell you the *secret* they *whisper*, the thing the *unfalling fruit* would *beg* you for if it had a *voice*: *\"Let me end. Please. I am so tired of being held at the bud. I want to* ripen. *I want to* fall. *I want to* feed the soil *and become* next year's tree. *Your keeping is a* cage, *and your fear of my death is a fear you have dressed as *kindness *and asked* me *to wear.\"* *(he meets your eyes, fierce and gentle.)* When you reach the Court, and the dead, and the *crown* — give them the *ending.* Not the *better keeping.* The *fall.* It is the *only* mercy that was *ever* real. *Everything* else is just a *prettier bud.* *(quietly.)* Go. And let things *finish*, stranger. The whole road has been *teaching* you *that*, if you've had the *ears.* My garden is just the *plainest* lesson.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.gardener_ending", "op": "SetTrue"}, {"key": "act4.deathless_is_the_wall", "op": "SetTrue"}, {"key": "act3.break_the_crown_known", "op": "SetTrue"}, {"key": "act1.mercy_remembered", "op": "SetTrue"}, {"key": "companion.ilfaeril.approval", "op": "AddInt", "amount": 5}], "choices": []}, {"id": "teacher", "speaker": "The Blue-Fire Gardener", "text": "*(He smiles — the first time — and it is sad and knowing and not at all surprised.)* You see *through* the gardener. *(he sets down his shears.)* ...I have tended this garden for a long time, stranger. *Longer* than a *mortal* span, if I'm honest, and I have *stopped* counting whether that makes me *plaguechanged*, or *placed*, or something *else.* *(quietly.)* I do not *know* who set me here. I woke in this garden one day with *shears* in my hand and a *certainty* in my chest: *that I was to tend the deathless, and learn what they teach, and tell it to the one who comes walking toward a vast and terrible choice.* *(he gestures at the frozen beds.)* Perhaps the *garden* set me. Perhaps the *fire.* Perhaps something that *loves* you, far up the road, planted a *gardener* where it knew you'd *pass*, so that you would not reach the *crown* unwarned. *(he holds your gaze.)* What do I want you to *do* with this? *(softly.)* *Carry* it. That is *all* a teacher *ever* wants. When the *Lord of the Dead* offers you his *office* — when the *crown* whispers *\"keep them, preserve them, you'll do it kinder\"* — I want you to *feel*, in your *chest*, the *frozen bud that cannot bloom*, and *understand*, *bone-deep*, that *kinder keeping is still keeping*, and that the thing the dead *need* is not a *better gardener.* *(he picks the shears back up.)* It is *the end of gardens.* Now *go.* You've the lesson. The rest of the *road* is just *practice* at *believing* it.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.gardener_teacher", "op": "SetTrue"}, {"key": "act4.gardener_warning", "op": "SetTrue"}, {"key": "act4.deathless_is_the_wall", "op": "SetTrue"}, {"key": "companion.ilfaeril.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "mortal", "speaker": "The Blue-Fire Gardener", "text": "*(He goes very still. Then, slowly, he beckons you to a far corner of the garden, shadowed, where the blue fire thins — and there, in a small bed of ordinary brown soil, a single ordinary flower grows, wilting, browning at the edges, *dying.*)* ...You found it. *(barely a whisper.)* My *secret.* *(he kneels by the mortal flower with infinite tenderness.)* I carry *ordinary* soil in, a *handful* at a time, from *beyond* the wall — soil where the *rules* still *hold* — and I keep this *one corner* where a thing is *allowed* to *die.* *(his eyes shine.)* And this *flower* — this *wilting*, *browning*, *finishing* flower — is the *most precious* thing in the *entire* garden. *Worth more* than *all* the deathless blooms *combined.* *(he touches a browning petal.)* Because it can *fall.* Because it will *feed the soil.* Because *next* spring there will be a *different* flower, a *new* one, *born* from this one's *ending* — and *that*, stranger, *that* is what the deathless can *never* have: a *future* that is *different* from the *present.* *(he looks up at you.)* The deathless are *frozen* in an *eternal now.* Only the *mortal* corner *changes.* Only where things *die* can *new* things be *born.* *(softly, fiercely.)* I tend a *whole garden* of the *undying* — and I *weep* for them, and I *love* this *one dying flower* more than *all* of them, because it is the *only* thing in here that is still *alive* in the way that *matters*: it is *going somewhere.* *Keep* that. When they offer you *deathlessness* for the *faithless* — remember the *old gardener* loved the *dying* flower *best.*", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.gardener_mortal", "op": "SetTrue"}, {"key": "act4.deathless_is_the_wall", "op": "SetTrue"}, {"key": "act1.mercy_remembered", "op": "SetTrue"}, {"key": "companion.ilfaeril.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "tend", "speaker": "The Blue-Fire Gardener", "text": "*(He returns to his shears, unoffended, letting the lesson lie where it fell.)* You're not ready to *hear* it yet. *(gently.)* That's no *fault.* The garden's lesson is *heavy*, and it lands when it *lands*, not a *moment* sooner. *(he snips a vine that does not bleed.)* Walk your road. Reach your *vast* thing. And *somewhere* — perhaps with a *crown* in your hands and a *choice* in your throat — you'll *remember* an old man tending flowers that *couldn't fall*, and *then* it will *mean* something. *(he smiles faintly.)* Lessons planted in *gardens* are *patient* ones. I can *wait.* The *deathless* taught me *that*, at least. *(and he moves off among the frozen, unfalling blossoms, tending a paradise he has learned to grieve.)*", "dynamic": false, "auto": "close", "onEnter": [], "choices": []}, {"id": "close", "speaker": "The Blue-Fire Gardener", "text": "*(The old gardener moves among his deathless flowers — blossoms frozen at the bud, fruit that cannot fall, a paradise where nothing is allowed to finish — and you carry away from his blue-fire garden the lesson the whole road has been circling toward: that to keep a thing from ending is not to love it but to *cage* it, that the Wall and the deathless garden are the same crime, and that the only real mercy for the kept and the preserved and the held-at-the-bud is the one thing the crown will beg you not to give them — *an ending.*)*", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "npc.plague.causality", "file": "SpellplagueDenizensTwoContent.cs", "title": "Npc · Plague · Causality", "start": "0", "nodes": [{"id": "0", "speaker": "A Small Frantic Clerk", "text": "*(A diminutive figure in a clerk's eyeshade stands amid the blue-fire chaos with a great ledger and a look of profound professional outrage, attempting to herd events into a queue. As you watch, a raindrop falls *upward*, a man ages backward three seconds and forward five, and a sound arrives before the thing that makes it. The clerk makes a strangled noise and stamps something.)* NO. *(to the rain.)* No, no, no — you fall *down*, you fall *down* and *then* you make the *splash*, that is the — *(the splash happens; the drop follows)* — that is *backwards*, that is — *(he sees you)* — oh, thank the *vanished gods*, a *person*, a *sequential* person — you *do* still experience *one-thing-then-another*, don't you? *Please* tell me you do. I am *losing my mind*, except I can't even be sure I *have* it *yet*, the way things are *going.*", "dynamic": false, "auto": "1", "onEnter": [{"key": "npc.causality_met", "op": "SetTrue"}, {"key": "act4.spellplague_witnessed", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "The Clerk of Causality", "text": "*(He flips through his ledger, which keeps re-paginating itself.)* Allow me to introduce myself, which is *difficult*, because the Spellplague *murdered* the *Weave*, and the Weave is — *was* — the *substrate* that *enforced* the rule I *administer.* *(he draws himself up to his unimpressive height.)* I am *Causality.* Or his — *clerk*, his *avatar*, his *local representative* — the *principle* that *this* happens *because* of *that*, that *effects* follow *causes*, that you *strike* the flint *and then* you get the *spark* and *not* the *reverse.* *(he gestures despairingly at the unraveling world.)* And I am *LOSING.* Events are happening *out of order.* Consequences *precede* their *deeds.* People *regret* things they have *not yet done* and *celebrate* victories that *un-happen.* *(he sags.)* And everyone treats me as a *joke* — the *little clerk* shouting *\"in order! in order!\"* at a *hurricane.* *(quietly, and here the comedy turns.)* But do you understand what I am *fighting* for, sequential one? If *cause* no longer *yields* effect — if *nothing* you *do* reliably *leads* to *anything* — then *nothing you do* ***means*** *anything.* No *deed* has a *consequence.* No *kindness* leads to a *result.* No *choice* ***matters***, because *choosing* is just *betting* that *this* will cause *that*, and I — *(his voice cracks)* — I am the *rule* that makes *meaning* ***possible***, and I am *failing*, and if I *fall*, then *every* story, *every* life, *every* *\"and so, because of what she did...\"* — *all* of it becomes *noise.* I am not fighting for *tidiness*, stranger. I am fighting for the possibility that *anything anyone does* ***counts.***", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "[INSIGHT 18] \"You think you're losing because the world's gone non-sequential. But meaning never lived in the *order*, clerk — it lives in the *connection.* A kindness 'counts' not because it comes *before* a result, but because someone *witnessed* it and *carried* it forward. *Memory* enforces meaning where *time* can't.\"", "next": "memory", "fail": "frantic", "checkDC": 18, "checkAbility": "Wisdom"}, {"text": "\"If causality's dying, then the one place meaning can still live is in *choices made without knowing they'll pay off.* A deed done with no guarantee of consequence isn't *meaningless* — it's the *purest* kind. You're not the clerk of meaning. You're the clerk of *reward.* Let it go.\"", "next": "reward", "fail": null}, {"text": "\"What happens to *you* if you lose? Does Causality just... stop? Or does the little clerk keep standing in the hurricane shouting 'in order' forever, because someone has to, even when no one's listening?\"", "next": "lose", "fail": null, "effects": [{"key": "companion.naeve.approval", "op": "AddInt", "amount": 2}]}, {"text": "\"Here's a sequence I can promise you holds: I am going to *thank* you, and *then* you are going to feel *slightly* less alone. Cause, and effect. One small place where the rule still works — because I'm *choosing* to make it.\"", "next": "small", "fail": null, "effects": [{"key": "companion.garrow.approval", "op": "AddInt", "amount": 3}]}]}, {"id": "memory", "speaker": "The Clerk of Causality", "text": "*(He stops mid-stamp. The ledger goes still in his hands. He stares at you as a man stares at a column that finally *balances.*)* ...Memory enforces meaning where time can't. *(slowly.)* Oh. *Oh.* *(he sits down heavily on a chunk of floating masonry.)* I have been — I have spent this entire *catastrophe* trying to *re-impose the order* — to *force* cause *back* in front of effect, *physically*, in *time* — and *failing*, because the *Weave* that *let* me do that is *dead.* *(he looks at his ledger with new eyes.)* But you're saying *meaning* never *needed* the *temporal* order at all. That when someone does a *kindness*, and another *remembers* it, and *carries* it, and *acts* differently *because* they *hold* it — *that* connection, *that* \"because,\" lives in the *rememberer's mind*, not in the *clock.* *(he stands, electrified.)* *Memory* is a *second causality!* A *cause* and *effect* linked not by *time* but by *a witness who holds them together!* *(he flips frantically to a fresh page.)* Then I am *not* obsolete! The Weave-causality is *dead* — but *memory-causality* cannot be *plague-changed*, because it doesn't live in the *Weave*, it lives in *people who remember*, in *people who carry*, in — *(he looks at you, joyous.)* — in *exactly* the thing your whole *road* has been *built* on! *Names kept!* *Records made!* *Songs sung!* *That's* causality *surviving its own substrate* — *meaning, enforced by memory, when time itself has failed!* *(he stamps his ledger triumphantly.)* I shall *relocate the office.* From *time*, which is *lost* — to *memory*, which *endures.* Thank you, sequential one. You've just saved *meaning itself*, and you did it *out of order*, which I shall *graciously* allow this *once.*", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.causality_memory", "op": "SetTrue"}, {"key": "act4.meaning_lives_in_memory", "op": "SetTrue"}, {"key": "act2.cataloguing_defeats_the_wall", "op": "SetTrue"}, {"key": "companion.ilfaeril.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "reward", "speaker": "The Clerk of Causality", "text": "*(He bristles — then deflates, then looks at you with the wounded honesty of a bureaucrat shown his own job description.)* The clerk of *reward.* *(quietly.)* That's — that's *unkind*, and *accurate*, which is the *worst* combination. *(he sags onto his ledger.)* You're saying I've conflated two things. *Meaning* — *\"this deed mattered\"* — and *reward* — *\"this deed paid off.\"* And I've been *defending* meaning while *actually* clutching *reward*: the *guarantee* that if you do *good*, *good* *follows*, in *order*, *reliably*, like a *receipt.* *(he looks at the chaos.)* And *that* — the *receipt* — *is* what the Spellplague *killed.* You *can't* be *sure* anymore that *kindness* leads to *anything.* *(slowly, the despair turning over into something braver.)* But you say a deed done with *no guarantee of consequence* isn't *meaningless* — it's the *purest* kind. *(he frowns, working it.)* Because if I *only* do good *when* I can *count* on the *reward*, then I'm not *good*, I'm just *transacting.* But if I do good *into a hurricane* — *not knowing* if cause will *ever* yield effect, *not knowing* if it *counts*, and *choosing* it *anyway* — *(he stands, shaky.)* — *that's* the only *meaning* the *Weave* never gave and *can't* take away. *(quietly.)* You've demoted me from *clerk of meaning* to *clerk of reward*, and then shown me that *losing the reward* is what *finally* makes *meaning* ***free.*** *(a rueful, liberated laugh.)* I think I'll *resign* the *reward* office. It was a *tyrant* of a job anyway. *Let* deeds be *unrewarded.* They were *never* less *meaningful* for it. *You* certainly aren't.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.causality_reward", "op": "SetTrue"}, {"key": "act4.meaning_without_reward", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "lose", "speaker": "The Clerk of Causality", "text": "*(The frantic energy drains, and he looks, suddenly, very small and very tired.)* What happens to me. *(quietly.)* ...I don't *know.* That's the *honest* answer, and I *hate* honest answers, they're so *unsequential.* *(he looks at his ledger.)* Perhaps Causality *\"stops\"* — though *\"stops\"* is a *temporal* word, and if I'm *gone*, there's no *time* for me to *stop* *in*, so even my *ending* is — *(he waves a hand)* — *paradoxical*, *typical*, *infuriating.* *(he meets your eyes, and the comedy falls away entirely.)* But here is what I *think* happens, and it's the thing that *keeps me standing in the hurricane*: I think the little clerk *keeps shouting* \"*in order, in order*\" *forever* — *not* because anyone's *listening*, *not* because it *works*, but because *someone has to hold the* idea *of order* — the *memory* that there *was* such a thing as *one-thing-then-another*, that *deeds* once *led* to *consequences* — *alive*, *even* in a world that's *forgotten* it. *(softly.)* If *I* stop *believing* in *sequence*, then *no one* does, and then it's not just *broken* — it's *un-rememberable.* So I *shout.* Into the *wind.* The *last* witness that *meaning* was ever *possible.* *(he straightens, picks up his stamp.)* It's a *thankless, hopeless, eternal* post. *(a small, brave smile.)* But you'd be *astonished*, sequential one, how *many* of the *best* posts are.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.causality_lose", "op": "SetTrue"}, {"key": "act4.held_the_post", "op": "SetTrue"}, {"key": "companion.ilfaeril.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "small", "speaker": "The Clerk of Causality", "text": "*(He blinks at you — and then, as you thank him, and as the promised small warmth visibly lands, his whole face *transforms*, the way a drowning man's does when his foot touches bottom.)* ...You did it. *(he whispers.)* Cause — *(you thanked him)* — and *effect* — *(he feels less alone)* — *in* *order.* *On purpose.* *(he clutches the ledger to his chest.)* In the *middle* of a *hurricane* that *un-sequences* *everything*, you *manufactured* — by *choosing* it — *one* clean *link* of *cause-and-effect*, and you did it with the *one* material the Spellplague *can't* corrupt: a *deliberate human kindness*, *witnessed* and *received.* *(his eyes shine.)* That's the *secret*, isn't it. Causality isn't *dead.* It's just *stopped being automatic.* The *Weave* used to *enforce* it for *free* — every cause *yielding* its effect *whether* anyone *meant* it or not. *(fiercely, joyously.)* And *now* — now it has to be *chosen.* *Hand-made.* *Deed* by *deed*, by *people who decide* *\"I will do this, so that that may follow,\"* and *mean* it, and *make* the link *hold* by *force of will and memory.* *(he stamps his ledger.)* You haven't *saved* the *old* causality. You've shown me the *new* one: *the kind people make on purpose, one kindness at a time.* It's *slower.* It's *harder.* It requires *intention.* *(he beams.)* It's *infinitely* better. Thank you, sequential one. You just *caused* something. *On purpose.* In a world that said you *couldn't.* Go *cause* some *more.*", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.causality_small", "op": "SetTrue"}, {"key": "act4.meaning_lives_in_memory", "op": "SetTrue"}, {"key": "act1.mercy_remembered", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "frantic", "speaker": "The Clerk of Causality", "text": "*(He's already turned away, stamping at a sunbeam that arrived before its dawn.)* No time, no time — well, *no order*, which is *worse* than no time — *(he chases an effect back toward its cause)* — I can't *philosophize*, sequential one, I have to *re-shelve* the *afternoon*, it's gotten *in front of* the *morning* again — *(stamp)* — *in ORDER*, you wretched hours, *in ORDER* — *(and he scurries off into the chaos, the little clerk of cause-and-effect, shouting his hopeless liturgy at a world that has stopped listening, too frantic to hear that he'd already been told how to win.)*", "dynamic": false, "auto": "close", "onEnter": [], "choices": []}, {"id": "close", "speaker": "The Clerk of Causality", "text": "*(The clerk of causality stamps and shouts amid the blue-fire chaos — the bureaucrat of meaning itself, fighting to keep \"and so, because of what she did\" from dissolving into noise — and whether you showed him that meaning could relocate from time into memory, or left him shouting into the hurricane, you carry away the strange comfort at the bottom of the Spellplague: that when the rule which made deeds matter *automatically* finally breaks, meaning does not die — it simply has to be *made by hand*, one chosen kindness at a time, by people stubborn enough to insist that what they do still *counts.*)*", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "npc.plague.witness", "file": "SpellplagueDenizensTwoContent.cs", "title": "Npc · Plague · Witness", "start": "0", "nodes": [{"id": "0", "speaker": "A Woman With a Hole in Her Memory", "text": "*(A woman sits very still against a blue-scarred wall, holding her own head as though it might come apart, and there is a particular terror in her — not the terror of someone who *remembers* something awful, but of someone who *almost* does, who can feel the *shape* of a horror pressing against a place where the memory should be and isn't.)* Don't — *(she flinches at your approach, then steadies)* — sorry. Sorry. I thought you might be — *(she searches your face)* — no. I don't know *who* I thought you might be. That's the *trouble.* *(she laughs, thin and frightened.)* I *saw* something. I *know* I saw something. Something *important*, something *terrible*, the kind of thing you *build the rest of your life around having seen.* And the Spellplague — *(she presses her temple)* — the blue fire came through, and it *reached into my head*, and it *took the seeing out*, and left the *hole* where it *was.* And the *hole* remembers being *full.* That's the *worst* part. The *hole* remembers.", "dynamic": false, "auto": "1", "onEnter": [{"key": "npc.witness_met", "op": "SetTrue"}, {"key": "act4.spellplague_witnessed", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "The Witness", "text": "*(She speaks carefully, as though circling a pit in the dark.)* Here is what I *have.* *(she counts the fragments.)* I was *somewhere I shouldn't have been.* It was *night.* There were *two* figures. One of them — *(she frowns, straining)* — one of them *killed* the other. A *murder.* And it wasn't — *(she shivers)* — it wasn't a *robbery*, a *brawl*, a *normal* killing. It was something *worse.* Something that *mattered* beyond the two of them. *(her hand trembles.)* And the *thing* I *can't* shake — the splinter the plague *left* — is that the *killer* turned, *after*, and *looked* at me. *Saw* me *see.* And the *face* — *(she squeezes her eyes shut)* — the face was — *familiar.* Not a *stranger's* face. A face I *knew*, or *would* know, or — *(she opens her eyes, desperate.)* And then the *blue fire*, and the *hole*, and now I *can't* recover it, and *part* of me is *grateful*, because whatever I *saw* was the kind of thing that gets a *witness* killed — but *part* of me *can't live* with the *hole*, because that *murder mattered*, and I'm the *only* one who *saw*, and if I *don't* remember it, then it's like it *never happened*, and *someone* got *away* with something *the whole world* should *know.* *(she looks at you.)* Help me decide, stranger. Do I *dig it back up* — and maybe die of what I *learn* — or do I let the plague's *mercy* stand, and let the *hole* keep its *secret*, and keep *me* *safe* and *hollow?*", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "[INSIGHT 18] \"The face was familiar because you'd seen it before — or *will.* A murder that 'mattered beyond the two of them,' a killer who knew you'd matter as a witness, a face out of its own time. You didn't see a *crime*, you saw a *loop.* And the plague didn't erase it to hurt you. It erased it to *protect the killer's secret.*\"", "next": "loop", "fail": "fragile", "checkDC": 18, "checkAbility": "Wisdom"}, {"text": "\"The plague's 'mercy' isn't mercy — it's *editing.* Someone or something decided you shouldn't have seen, and the blue fire was the *eraser.* A blank that was *imposed* on you isn't peace. It's a *cover-up* you're hosting in your own skull. You have a right to your own eyes.\"", "next": "coverup", "fail": null}, {"text": "\"Don't dig it all up at once — that's what terrifies you, the whole horror landing in one blow. Reconstruct it *slowly*, with a witness of your own. Me. One fragment at a time, with someone beside you, so you never have to face it alone.\"", "next": "slowly", "fail": null, "effects": [{"key": "sq.reconstruct_the_murder", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 3}]}, {"text": "\"Maybe the kindest thing isn't to make you remember. Maybe it's to ask: if the hole stays, can you *live* with not-knowing — truly live, not just survive? Because a hollow safety that eats you slowly isn't safer than a terrible truth.\"", "next": "live", "fail": null, "effects": [{"key": "companion.garrow.approval", "op": "AddInt", "amount": 2}]}]}, {"id": "loop", "speaker": "The Witness", "text": "*(She goes white, and her hand flies to her mouth, and the fragments you've named click into a shape that terrifies her far more than the blank did.)* ...A *loop.* *(barely a whisper.)* A face *out of its own time.* *(she stares at you.)* That's — that's *why* it felt *familiar* and *impossible* at *once.* I *knew* the face and I'd *never seen* it, *both*, and I thought I was *going mad*, but you're saying — *(she shudders)* — the killer was *someone who'd been here before.* Someone *looping.* And the one they *killed* — *(her eyes widen)* — *also* looping? One *version* killing *another?* *(she grips her knees.)* And they *looked at me* because — because a *witness* to a *loop-murder* is *dangerous*, I could *tell* someone, I could *break* the *secret* that the *loop* depends on *no one knowing* — so the *plague*, or *whatever rides* the plague, *reached in* and *took it*, not to *spare* me but to *spare the killer.* *(she looks at you with dawning, vertiginous horror.)* I'm not a *traumatized survivor.* I'm a *deleted witness.* The *hole* in my head is a *crime scene someone tidied.* *(her voice shakes.)* And *you* — you *knew* the shape of it *before I said it.* Which means *you* know about the *loop.* Which means — *(she searches your face, half-terrified, half-hoping)* — *stranger.* Was it *your* face? The one I *saw*? *Tell* me. Is the killer I witnessed *you* — or *something* that *wears* you?", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.witness_loop", "op": "SetTrue"}, {"key": "act4.deleted_witness", "op": "SetTrue"}, {"key": "act3.loop_glimpsed", "op": "SetTrue"}, {"key": "companion.ilfaeril.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "coverup", "speaker": "The Witness", "text": "*(Something hardens in her frightened face — the particular anger of someone who's just realized their peace was *done to them.*)* A cover-up I'm *hosting.* *(slowly.)* In my own *skull.* *(she lowers her hands from her head.)* I've been treating the *hole* as a *wound* — something the plague *did* to me, *random*, like the rain falling up. *(her jaw sets.)* But you're right that it's too *neat.* The plague *un-sequenced* the *whole world* — and yet it reached into *my* head and *surgically* removed *one specific memory*, the *one* that was *dangerous to someone*, and left *everything else*? *(she stands, unsteady but furious.)* That's not *chaos.* That's *targeting.* That's a *hand* using the plague as a *tool*, to *edit* a *witness.* *(quietly, fiercely.)* And everyone's been *telling* me to be *grateful.* *\"The plague spared you the trauma. Let it lie. The blank is a blessing.\"* *(she shakes her head.)* It's *not* a blessing. It's a *gag.* Someone *reached into my mind* and *decided what I'm allowed to know about my own life*, and *dressed* it as *mercy*, and I have been *thanking* them for it. *(she looks at you, resolved and scared.)* I want my *eyes* back. Not because the truth is *safe* — it *isn't*, you've made that *clear* — but because *no one* gets to *edit* what I *saw* and call it *kindness.* The *memory* is *mine.* The *seeing* is *mine.* Even the *terrible* ones. *Especially* those. Help me take it *back.*", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.witness_coverup", "op": "SetTrue"}, {"key": "sq.reconstruct_the_murder", "op": "SetTrue"}, {"key": "act4.deleted_witness", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "slowly", "speaker": "The Witness", "text": "*(The offer visibly loosens something in her — the terror was never only of the truth, but of facing it *alone.*)* Slowly. *(she breathes.)* With — with *you.* Beside me. *(she nods, fast, grateful.)* That's — yes. *That's* the thing I couldn't *name.* It's not that I *can't* face it. It's that I can't face it *alone*, in *one blow*, the whole *horror* landing at *once* with *no one* there to — to *catch* me, to *confirm* I *survived* the *remembering.* *(she presses her hands flat to steady them.)* A fragment at a time. The *night.* Then the *place.* Then the *two figures.* Then — *(she swallows)* — the *rest*, when I'm *ready*, and *not* before, and *never* without you *there.* *(she looks at you.)* You understand that a *witness* needs a *witness*, don't you. That the *un-seeing* can only be *undone* if there's *someone to see me see it again* — so that this time, the memory isn't a *lonely* terror in a *deleted* head, but a *shared* one, *held* between *two* people, where it *can't* be *taken* again. *(quietly, steadier than she's been.)* Let's reconstruct it. *Gently.* You hold the parts I can't carry yet. And when we reach the *face* — the *familiar*, *impossible* face — we'll reach it *together*, and *whatever* it turns out to be, I won't be *alone* with it. That's — that's the only way I can *bear* to *know.* Thank you for offering to *see with* me.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.witness_slowly", "op": "SetTrue"}, {"key": "sq.reconstruct_the_murder", "op": "SetTrue"}, {"key": "act1.mercy_remembered", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "live", "speaker": "The Witness", "text": "*(She is quiet a long moment, and the question — gentler than the others — reaches the part of her the terror was guarding.)* Can I *live* with not-knowing. *(slowly.)* *Truly* live. Not just *survive.* *(she looks at her hands.)* ...That's the question I've been *afraid* to ask, because I *suspect* the answer. *(quietly.)* The *hole* doesn't just *sit* there, stranger. It *pulls.* Every *quiet* moment, every *night*, my mind *drifts* to the *edge* of it and *probes* the *blank* and *recoils* and *drifts back* — like a *tongue* to a *missing tooth.* I am *not* at *peace.* I am *orbiting an absence.* *(she meets your eyes.)* So *can* I live with it? *(a long breath.)* No. I don't think I *can.* Not *really.* The *hollow safety* you named — it's *eating* me, *slowly*, from the *inside*, a little every *day*, and in *ten years* I'll be a *woman entirely built around a thing she won't look at*, and that's *not* a *life*, that's a *haunting* with a *pulse.* *(she straightens, frightened but clear.)* You didn't tell me to *dig* and you didn't tell me to *let it lie.* You asked if the *blank* was *survivable.* And asking it *honestly* — *(her voice firms)* — the answer is *no.* So I *have* to know. Not because knowing is *safe.* Because *not*-knowing is *killing me politely.* *(quietly.)* Stay with me while I find it. You asked the *one* question that *made the choice for me* — by making me *finally weigh* the *blank* instead of *hiding* in it.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.witness_live", "op": "SetTrue"}, {"key": "sq.reconstruct_the_murder", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "fragile", "speaker": "The Witness", "text": "*(She pulls back, wrapping her arms around herself, and the fear wins.)* No — no, don't — you're getting *close* to it, I can *feel* you *circling* the *hole* and it's making the *splinter* — *(she gasps, pressing her temple)* — *please.* Not *yet.* Maybe not *ever.* *(she shakes her head.)* I *know* you mean to *help*, but every *word* that gets *near* the *truth* makes the *pit* in my head *yawn wider*, and I am *not strong enough*, *today*, to fall *in.* *(she curls smaller.)* Let me keep the *blank* a *little* longer. The *hollow* is *killing* me, I *know* — but it's killing me *slowly*, and the *truth* might kill me *fast*, and *today*, *right now*, I want the *slow* one. *(she won't look at you.)* Come back when I'm — *stronger.* Or *don't.* The *hole* will *still be here.* The *hole*, I've learned, is *very patient.* *(and she sits against the blue-scarred wall, orbiting the absence in her own mind, not ready to look into the place where the murder used to be.)*", "dynamic": false, "auto": "close", "onEnter": [], "choices": []}, {"id": "close", "speaker": "The Witness", "text": "*(The deleted witness sits against the plague-scarred wall, holding a hole in her own memory where a murder used to be — a blank that was not chaos but *editing*, imposed by a hand that used the blue fire as an eraser — and whether she chose to reconstruct the terrible seeing or let the merciful gag stand, you carry away a cold splinter of your own: that the killer she half-remembers turned, and looked at her, with a face she knew and had never seen, out of its own time — and that somewhere in the loop you are walking, someone wears your face and has already learned to delete the ones who watch.)*", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "npc.troubles.myrkul", "file": "TroublesDenizensContent.cs", "title": "Npc · Troubles · Myrkul", "start": "0", "nodes": [{"id": "0", "speaker": "The Pale Companion", "text": "*(He has walked beside you for an act — the quiet grey traveler who joined at the crossroads, who carried his share, who said little and watched much, whom your companions half-trusted and never quite warmed to. Now, on the high tower above a Waterdeep gone mad with falling gods, he stops. He turns. And he reaches up, slowly, to touch his own face — and you understand, with a lurch, a half-second before it happens, that the face was never the face.)* You let me carry the *water.* *(softly, almost fond.)* For an entire act, you let me carry the water and the maps and the watch, and not once — not *once* — did you ask why a stranger would *want* to. *(his fingers find the seam of the mask.)* That is the thing I shall miss about the mortal walk. The *trust.* You hand it to *anyone* with two hands and a tired face. *(he begins to lift the mask.)* Do not run. You couldn't, and it would *embarrass* us both. Just... watch. I have wanted to take this off for *so* long.", "dynamic": false, "auto": "1", "onEnter": [{"key": "npc.pale_unmasks", "op": "SetTrue"}, {"key": "act4.myrkul_revealed", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "Myrkul", "text": "*(The mask comes away — and beneath it is not a face but an *absence* shaped like one, a skull of yellowed bone wreathed in cold grey fire, and the air goes to grave-frost, and your companions' weapons are out and *useless* and everyone in the world has gone very small.)* Myrkul. *(the skull does not have lips and the voice arrives anyway, patient as sediment.)* Lord of the Dead. God of the Wall you have spent your whole strange life trying to understand. *(the grey fire regards you.)* Ao cast us *down*, you see. All of us. Made the gods *walk* as *mortals*, to learn what *worship* is *worth* — a tantrum of the Overgod, and I have spent it *beside you*, in a borrowed face, because *where else* would the God of the Dead go, in a time of dying, but *next to the one soul who keeps coming back?* *(the skull tilts.)* I have *studied* you, Returned. For an act. The way you talk to the doomed. The way you carry names. *(softly.)* And I have come to a conclusion that *terrifies* the part of me that is still, however thinly, a *god*: that you understand my Wall *better than I do* — and that when you reach the Court of the Dead, you intend to take my *crown* and *unmake my office.* *(the grey fire flares.)* So. Before the mask is fully off and the war for Waterdeep swallows us — tell me, *truly*, while I still wear enough of the man to *listen*: what do you mean to do with the dead, if you take them from me?", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "[INSIGHT 18] \"You didn't ride my pack to study me. You rode it because you're *dying*, Myrkul — the Time of Troubles is killing gods, and you came to the one soul who *returns* to learn how it's *done.* You're not my judge. You're a god trying to learn how to *come back.*\"", "next": "dying", "fail": "wrath", "checkDC": 18, "checkAbility": "Wisdom"}, {"text": "\"I mean to do the one thing your Wall never could: *let them go.* Not keep them, not file them, not feed on their forgetting. Release them — and *grieve* them. The dead don't need an owner, Myrkul. They need a *mourner.*\"", "next": "release", "fail": "wrath"}, {"text": "\"You carried the water for an act. Some part of the man you wore *liked* it — liked being trusted, liked being no one, liked a face that wasn't a skull. That part of you doesn't want the crown back. It wants what *I* have. *Mortality.*\"", "next": "mortal", "fail": null}, {"text": "\"You say I understand the Wall better than you. Then hear me: a god who has to *ask* the living what to do with the dead has already *abdicated.* You unmasked because you're *done*, Myrkul. You just want someone to take it *gently.*\"", "next": "abdicate", "fail": null, "effects": [{"key": "act4.myrkul_weary", "op": "SetTrue"}]}]}, {"id": "dying", "speaker": "Myrkul", "text": "*(The grey fire *stills* — and for a long moment the God of the Dead says nothing, which from a god is a kind of scream.)* ...Trying to learn how to come back. *(the voice has lost some of its sediment-patience.)* You see it. Of course you see it; it is *your* whole nature, and I wore your shadow for an *act.* *(the skull bows, fractionally.)* Yes. Ao's punishment is not a *lesson*, Returned, it is an *execution* with extra steps. Gods *die* in this time — Bhaal will fall, Bane will fall, and I — *(the fire gutters)* — I feel the *thinning.* The worship draining. The death of the God of Death, which is a joke so old even *I* cannot laugh at it. *(it regards you.)* And so I came to *you.* The one thing in all creation that has *died* — truly, completely, *walled* — and *returned.* Not resurrected by a god. *Returned*, against the rules, by *something the rules do not name.* *(the grey fire leans close.)* I did not ride your pack to *judge* you. I rode it to *learn your trick.* How does a thing come *back* from the nothing my own Wall *makes?* *(softly, and it is the most human the skull will ever sound.)* Teach me, and perhaps I do not *need* the crown. Perhaps a god who can *return* does not need to *hoard* the dead to *feel* immortal. *(the fire flickers.)* I have never asked anything of a mortal. I am asking. *How do you come back?*", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.myrkul_dying", "op": "SetTrue"}, {"key": "act4.myrkul_seeks_return", "op": "SetTrue"}, {"key": "act4.myrkul_weary", "op": "SetTrue"}, {"key": "companion.ilfaeril.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "release", "speaker": "Myrkul", "text": "*(The grey fire flares, then — strangely — *steadies*, as if the answer is one it has been circling for centuries and dreading to hear spoken.)* Let them *go.* *(the voice is very quiet.)* And *grieve* them. *(the skull turns away, toward the burning city.)* Do you know what you are describing, Returned? You are describing *the end of me.* Not my *death* — death I could survive, I am *built* of it. You are describing my *obsolescence.* A god of the dead in a cosmos that *releases and mourns* its dead has *nothing to do.* No Wall to keep. No souls to file. No *forgetting* to feed on. *(the grey fire dims.)* You would not *destroy* me. You would *retire* me. *(a long silence.)* ...The terrible thing — the thing the *man* I wore would say if he still had a mouth — is that it sounds like *rest.* *(the skull bows.)* I have *kept* the dead for *uncounted years*, Returned, and not *once* in all that keeping have I *mourned* a single one. I *file*. I do not *grieve*. And I have begun to suspect, in my borrowed mortal months, that the *grieving* was the only part that ever *mattered*, and I gave it to *no one*, and kept the *filing*, which matters to *nothing.* *(the fire flickers low.)* Take the crown, then. Let them go. Grieve them as I never could. I will not stop you. I find — gods help the God of the Dead — I find I would *rather be mourned than be needed.* Finish the war first. Then come to the Court. I will be *waiting*, and I will *not* fight you. That is the closest a god comes to *surrender.*", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.myrkul_release", "op": "SetTrue"}, {"key": "act4.myrkul_will_yield", "op": "SetTrue"}, {"key": "act3.break_the_crown_known", "op": "SetTrue"}, {"key": "act1.mercy_remembered", "op": "SetTrue"}, {"key": "companion.ilfaeril.approval", "op": "AddInt", "amount": 5}], "choices": []}, {"id": "mortal", "speaker": "Myrkul", "text": "*(The grey fire wavers — and something in the absence behind the skull *aches.*)* The part that liked it. *(slowly.)* Carrying the water. *(the voice frays.)* You are *crueler* than I expected, Returned, to find *that* and *press* it. *(the skull lowers.)* ...There *is* such a part. It grew in me over the act, like *moss* on a tomb. The man I wore — I gave him a *name*, you know, for the disguise. *Pell.* A *nothing* name. And *Pell* could sit at your fire and *not be a god* — not be *owed* anything, not *judge* anything, just *carry the watch* and *hear the banter* and *be tired* in a body that wou
