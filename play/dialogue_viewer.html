 "close", "onEnter": [{"key": "npc.lhoris_smuggle", "op": "SetTrue"}, {"key": "sq.the_first_dirge", "op": "SetTrue"}, {"key": "act3.truth_smuggled_in_song", "op": "SetTrue"}, {"key": "companion.ilfaeril.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "unfileable", "speaker": "Singer Lhoris", "text": "*(He goes very still, the way a musician does when a true chord resolves.)* A song has to be *sung again.* *(slowly.)* Every time. By *someone.* *(he looks at his lyre with new eyes.)* You're right — that's the *difference* I've been circling. The *sentence* they're writing today is a *fact* — carved, sealed, *fixed.* It *sits* in a ledger and *needs* no one. *(he plucks a string.)* But a *song* — a song is *never* finished. It only exists in the *moment of singing*, and that moment belongs to the *singer*, not the *composer*, not the *court.* *(his voice strengthens.)* Which means every singer for ten thousand years who performs my dirge holds a *choice* the Coronal can never take from them: to sing it as *written* — or to *change a word.* *(he almost smiles.)* I can write the song *so* — leave it *deliberately open*, a melody that *invites* its own alteration, with a line that *begs* to be replaced — so that *some* singer, some century, *will* change *\"they chose the nothing\"* to *\"they were stolen by it\"* — and once *one* singer does, the *new* words travel too. *(he looks at you, fierce.)* The Wall is a fact that needs no one. My song is a *question* that needs a singer *every single time.* And a thing that must be *re-chosen* forever can be *re-chosen better.* I'll write the *unfileable* song. The one whose meaning is never *settled* — so it can always, *eventually*, be *freed.*", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.lhoris_unfileable", "op": "SetTrue"}, {"key": "sq.the_first_dirge", "op": "SetTrue"}, {"key": "act2.cataloguing_defeats_the_wall", "op": "SetTrue"}, {"key": "companion.ilfaeril.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "refuse", "speaker": "Singer Lhoris", "text": "*(He looks at the lyre for a long moment, and something in him steadies toward a harder, quieter resolve.)* The song I won't write. *(slowly.)* You may be right. There's a kind of *courage* in it I hadn't weighed — to look the Coronal in his *kind* face and say *\"No. I will not score your atrocity. If you wall them, you will do it to the sound of your own boots, and the silence will be the only honest thing in the room.\"* *(he sets the lyre down.)* A *silent* march indicts the watchers *more* than any dirge — there's nowhere to *hide* in silence, no beauty to *launder* the thing, just the *shuffle of the condemned* and the *court's own held breath.* *(he hesitates.)* But — the *dying.* I keep returning to them. If I refuse, they walk in a silence that the *court* finds damning, yes — but that *they* find *cold.* No beauty. No gift. *(he wavers.)* It may be the bravest choice and the *least kind* one. *(he meets your eyes.)* I don't know if I'm strong enough to give the *killers* their deserved silence at the cost of the *dying's* last comfort. But you've named it as a *real* option, and not the *cowardice* the court would call it. Let me sit with the weight of the song I might *not* write. It may be the truest composition of my life — the one that's only a *blank page* held up to a guilty room.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.lhoris_refuses", "op": "SetTrue"}, {"key": "act3.the_silent_march", "op": "SetTrue"}, {"key": "companion.ilfaeril.approval", "op": "AddInt", "amount": 3}], "choices": []}, {"id": "craft", "speaker": "Singer Lhoris", "text": "*(He shakes his head, retreating into the safety of pure technique.)* You don't *understand* composition. *(a little desperately.)* A song does what its *craft* does — you can't just *will* it to mean the *opposite* of its notes, that's not how *music* — *(he plays a fraught fragment.)* If it's *beautiful*, it *comforts.* If it's *ugly*, it *fails.* There's no *secret third thing*, that's a *layman's* fantasy. *(but his hands have faltered, uncertain.)* I'll write what I was *commissioned* to write, make it as *bearable* as I can, and *live* with it, the way artists always live with the patrons who feed them. *(he won't look at you.)* It's just a *song*, in the end. Go. Let me do my *craft* and not think about whose *march* it scores. *(and he bends over the lyre, writing the first dirge as ordered — beautiful, and damning, and exactly as compromised as he fears.)*", "dynamic": false, "auto": "close", "onEnter": [], "choices": []}, {"id": "close", "speaker": "Singer Lhoris", "text": "*(Singer Lhoris bends over his lyre to write the first dirge in the world — the song that will seal a sentence and father every funeral melody for ten thousand years — and whether he laced it with names, smuggled the truth in its bones, left it open to be freed, or refused the silver spade entirely, you carry away the oldest question of every artist who ever served a power: whether beauty in the service of cruelty is a *mercy* to the victims or an *anesthetic* for the guilty — and that it is, unbearably, always *both.*)*", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "npc.crown.scribe", "file": "CrownWarsDenizensTwoContent.cs", "title": "Npc · Crown · Scribe", "start": "0", "nodes": [{"id": "0", "speaker": "The Scribe", "text": "*(At a small table beside the great court sits a scribe — neat, unremarkable, dutiful — with a fresh tablet and a sharp stylus, waiting to record the vote. She is the calmest person in the chamber, because hers is the *smallest* job: she does not *decide* anything. She only *writes it down.* She glances up at you with mild, professional patience.)* You'll want to stand back of the rail; the recording space must be kept clear. *(she dips the stylus.)* I'm to enter the verdict into the ledger the moment it's cast. First of its kind, this ledger — *(she pats the blank tablet, a touch of craftsman's pride)* — they had it specially made. A *permanent* record. I'm told it will be *copied forward forever.* Quite an honor, really, for a *scribe.* I only *write* it. But someone has to write it *correctly.*", "dynamic": false, "auto": "1", "onEnter": [{"key": "npc.scribe_met", "op": "SetTrue"}, {"key": "act3.crown_wars_witnessed", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "The Scribe", "text": "*(She arranges her tools with the serene competence of someone who has built an entire identity on *not being responsible.*)* I've recorded a thousand proceedings. Tax assessments, land grants, marriages, *executions.* *(she shrugs.)* The trick of the work — and they don't teach you this, you *learn* it — is that the *scribe does not have opinions.* The judge decides. The court votes. The condemned is *condemned.* And I — *(she taps the stylus)* — I simply make the *true record* of *what was decided by others.* My hands are *clean*, you see. The cruelest verdict in the world passes *through* me to the page, and I am no more *guilty* of it than the *parchment* is. *(she says it like a creed, like something she's needed to believe for a thousand proceedings.)* So when they sentence this first soul to the Wall — *(she readies the tablet)* — I'll write *\"Faithless. Sentenced to Preservation. By unanimous decree.\"* Neat. *Accurate.* And then I'll go home and sleep, because I *decided* nothing. *(a flicker, quickly suppressed.)* That's — that's how it works. The scribe decides *nothing.* ...You're looking at me strangely. The scribe decides *nothing.* That's the *whole point* of a scribe.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "[INSIGHT 18] \"You've said 'the scribe decides nothing' four times. That's not a fact you know — it's a wall you're holding up. Because some part of you has worked out the truth: the verdict isn't *real* until you *write* it. The Wall isn't built of stone. It's built of *your ledger.*\"", "next": "ledger", "fail": "clean", "checkDC": 18, "checkAbility": "Wisdom"}, {"text": "\"A thousand years from now there'll be a clerk stamping FAITHLESS on souls out of pure habit, and he'll say exactly what you're saying — *'I only record.'* You're not the bottom of the chain, scribe. You're the *top.* You're his ancestor. *Teach him better by deciding now.*\"", "next": "ancestor", "fail": "clean"}, {"text": "\"You can't change the verdict. But you write the *record* — and the record is the only thing that survives. Leave a *margin.* Write what the court decreed *and* write, beside it, that the first Faithless pulled Calla from the river. Let the truth ride in your own hand.\"", "next": "margin", "fail": null, "effects": [{"key": "sq.scribe_margin", "op": "SetTrue"}]}, {"text": "\"What's the smallest true thing you could do, scribe — that no one would even notice — that would make this ledger a fraction less of a tomb?\"", "next": "small", "fail": null, "effects": [{"key": "companion.ilfaeril.approval", "op": "AddInt", "amount": 2}]}]}, {"id": "ledger", "speaker": "The Scribe", "text": "*(The stylus stops. Her serene competence cracks, and underneath is someone who has been *very carefully not thinking* for a long time.)* ...A wall I'm holding up. *(very quietly.)* I've said it four times. *(she looks at the blank tablet as if it's grown teeth.)* Because — *(her hand trembles)* — because the *judge's* vote is only *air.* It's a *word*, spoken in a *room*, and words *fade.* The sentence isn't — it doesn't — *(she swallows)* — it isn't *real* until it's *written.* Until it's *in the ledger*, *copied forward*, made *permanent.* *(she stares at the stylus.)* The Coronal can *decree* the Wall all he likes. But a decree that *no one records* is just a *man talking.* It's *my stylus* that turns his *word* into a *fact.* It's *my ledger* the future will *obey.* *(her creed collapses.)* The Wall isn't built of *stone*, is it. There is no *stone.* It's built of *exactly this* — a neat scribe, writing it down *correctly*, and *meaning nothing by it*, ten thousand times, forever. *I'm* the mortar. *My clean hands* are the *only thing* that makes the cruelty *stick.* *(she looks at you, horrified.)* A thousand proceedings, and I told myself the *parchment* was as guilty as me. But the *parchment* didn't *choose* to be *accurate.* I did. *(she sets the stylus down as if it's burning.)* Gods. What do I *do?* I never *decided* before. I don't know *how.*", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.scribe_ledger", "op": "SetTrue"}, {"key": "act3.wall_is_the_ledger", "op": "SetTrue"}, {"key": "act1.mercy_remembered", "op": "SetTrue"}, {"key": "companion.ilfaeril.approval", "op": "AddInt", "amount": 5}], "choices": []}, {"id": "ancestor", "speaker": "The Scribe", "text": "*(She frowns — and then her face changes, the professional distance turning to a kind of horror at her own reflection across time.)* A clerk. A thousand years on. Stamping *FAITHLESS* out of *habit.* Saying *\"I only record.\"* *(slowly.)* My — my *words.* In *his* mouth. *(she looks at her stylus.)* You're telling me this — this *creed* I take such *comfort* in, *\"the scribe decides nothing\"* — that I'm not just *using* it, I'm *founding* it. *Inventing* the excuse that a *thousand years* of clerks will *inherit* from me, each one *filing* a soul to the Wall and feeling *clean* because *the scribe before him* felt clean, all the way back to — *(she stops)* — to *me.* To *this tablet.* I'm *patient zero* of *\"I only record.\"* *(her hands close.)* And if it *starts* with me — then it can be *refused* by me. *(fiercely, frightened.)* The clerk a thousand years from now *won't be able* to refuse — he'll have a *thousand years* of *precedent* telling him recording isn't deciding, and he'll *believe* it, because *I made it true.* But *I* have *no* precedent. I'm *first.* I'm the *only* scribe who *isn't* yet trapped in the excuse — because *I'm the one writing it.* *(she looks at you.)* Then let me be the *ancestor* who *broke* it instead of the one who *began* it. Tell me how a scribe *decides.* I have to learn in the next *minute*, before the vote — and teach it *down the whole line.*", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.scribe_ancestor", "op": "SetTrue"}, {"key": "act3.scribe_refuses_inertia", "op": "SetTrue"}, {"key": "act3.wall_is_the_ledger", "op": "SetTrue"}, {"key": "companion.ilfaeril.approval", "op": "AddInt", "amount": 5}], "choices": []}, {"id": "margin", "speaker": "The Scribe", "text": "*(She looks at the wide, blank edges of the tablet — and something in her, a craftsman's secret pride, kindles.)* A margin. *(slowly.)* They commissioned the *center* of the ledger. The *verdict.* *\"Faithless. Sentenced to Preservation.\"* *(she traces the empty edge.)* But they said *nothing* about the *margins.* Scribes have *always* kept marginalia — a note on the weather, a correction, a *prayer* — it's *expected*, it's *invisible*, no one *reads* the margin. *(her eyes sharpen.)* So in the *center*, in the *commissioned* hand, I write what the court *decreed.* And in the *margin*, in the *small* hand, the one only another *scribe* ever bothers to read — I write what's *true.* *\"This one was Maerys. A soldier. She drowned pulling Calla from the river. She kept faith with her company. The court called it nothing.\"* *(she looks up at you, fierce and quiet.)* And every *copyist* for ten thousand years who *duplicates* this ledger will *duplicate the margin too* — because that's the *rule* of copying, you reproduce the *whole page*, marginalia and all. *(a small, dangerous smile.)* They'll *carry my truth forward* without even *reading* it, thinking it's *decoration.* The verdict and the *refutation of the verdict*, traveling together, in the *same ledger*, forever. *(she dips the stylus.)* I *can't* stop the sentence. But I can make *certain* the record that *enforces* it also *contains the proof it was a lie.* Give me her name again. *Slowly.* I want the margin *perfect.*", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.scribe_margin", "op": "SetTrue"}, {"key": "sq.scribe_margin", "op": "SetTrue"}, {"key": "act3.first_faithless_remembered", "op": "SetTrue"}, {"key": "act2.cataloguing_defeats_the_wall", "op": "SetTrue"}, {"key": "companion.ilfaeril.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "small", "speaker": "The Scribe", "text": "*(She considers the question with unexpected seriousness — the craftsman weighing the smallest possible intervention.)* The smallest true thing. *(she taps the stylus, thinking.)* ...I could *not abbreviate* her. *(quietly.)* That sounds like *nothing*, I know. But — the *form* for a Faithless verdict, as they've drafted it, reduces the soul to a *category.* *\"Subject: Faithless. Disposition: Preservation.\"* No *name.* The *name* is considered *irrelevant* to the *legal fact* — they told me to record the *sentence*, not the *person.* *(she looks at the tablet.)* So the smallest true thing — the thing no one would *challenge*, that I could do *within* my instructions — is to *write her name anyway.* In the *subject* line. *\"Subject: Maerys, called Faithless.\"* *(her voice firms.)* It changes *no* verdict. It *delays* nothing. It is *entirely* within a scribe's discretion to record a defendant by *name.* But it means that the *very first entry* in the ledger of the Wall — the *template* every future clerk will *copy* — has a *human name* in it where they wanted a *category.* *(she meets your eyes.)* And a form with a *name* in it is *harder to fill in coldly* than a form with a *blank.* I'll make the *template* itself *resist* the forgetting. One name. The smallest mutiny a scribe can commit. *(she almost smiles.)* It's *mine* to commit, though. They never said I *couldn't.*", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.scribe_names_her", "op": "SetTrue"}, {"key": "act3.first_faithless_remembered", "op": "SetTrue"}, {"key": "companion.ilfaeril.approval", "op": "AddInt", "amount": 3}], "choices": []}, {"id": "clean", "speaker": "The Scribe", "text": "*(She draws back, clutching the creed tighter.)* My hands are *clean.* *(firmly, a little desperately.)* I *record.* That is *all.* If I start imagining that the *scribe* is *guilty* of every verdict that passes through her stylus, then I cannot *do* the *work* — and the work *must* be done, *someone* must keep the record, and a record-keeper who *weeps* over every entry is *useless.* *(she squares the tablet.)* The judge decides. I write. My *conscience* is *not in the ledger.* *(but she does not quite meet your eyes.)* Stand back of the rail, please. The vote is coming, and I must record it *accurately*, and *accuracy* has no room for — for whatever *you're* trying to put in my head. *(and she fixes her gaze on the court, stylus ready, the first of ten thousand years of clerks who decided that writing it down was not the same as doing it.)*", "dynamic": false, "auto": "close", "onEnter": [], "choices": []}, {"id": "close", "speaker": "The Scribe", "text": "*(The scribe sits with her stylus poised over the first page of the ledger of the Wall — the neat, dutiful, unremarkable woman whose clean hands turn a man's spoken cruelty into a permanent fact — and whether she left a margin, named the first Faithless, or held to her creed of clean hands, you carry away the quietest and most damning truth of the founding: that the Wall is not made of stone or sentence or god's decree. It is made of a record, kept correctly, by someone who decided that keeping it was no decision at all.)*", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "npc.crown.exile", "file": "CrownWarsDenizensTwoContent.cs", "title": "Npc · Crown · Exile", "start": "0", "nodes": [{"id": "0", "speaker": "An Old Elf Outside the Walls", "text": "*(Beyond the court, beyond the city, on a hill where the founding chamber is only a distant gleam, an elf sits alone — and though everyone else in this era is *of* this era, *he* is somehow not; his eyes hold a depth that should not be possible in a living face, as though he has been sitting on this hill not for an afternoon but for *ten thousand years.* He does not seem surprised to see you. He pats the grass beside him.)* You've come from the founding. *(gently.)* I can see it on you — the *weight* of having watched them build it. Sit. I'm the one who *didn't* build it. The only one. It's a lonelier distinction than you'd think.", "dynamic": false, "auto": "1", "onEnter": [{"key": "npc.exile_met", "op": "SetTrue"}, {"key": "act3.crown_wars_witnessed", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "The Exile Who Forgave", "text": "*(He speaks slowly, with the strange patience of someone for whom time has stopped meaning what it means to you.)* When the vote came, I was a judge of the court, like Aedyn, like the young one — Ilfaeril, was it? *(a faint, sad smile.)* When they called for hands, I *kept mine down.* I said: *\"I will not sentence a soul to a fate I would not accept myself. If this is mercy, let it be mercy that is chosen. If it is not, let us not pretend.\"* *(he looks at the distant gleam.)* And so they *exiled* me. Not for a *crime* — for a *refusal.* Stripped my name, my rank, my *people.* Cast me out of the city and out of the *record*, so that no one would remember there had been a *no.* *(quietly.)* That was ten thousand years ago, stranger. For me. I do not age, out here — that was part of the curse, or the gift, I've never decided which: *to watch.* To sit outside and *witness* the Wall I refused to build, for *all the centuries it has stood.* *(he turns his ancient eyes on you.)* And do you know what I have *done*, in all that time, with all that watching? *(softly.)* I *forgave* them. Every one. Aedyn for his exhausted mercy. The young judge for his certain hand. Even the souls who exiled me. I have had *ten thousand years*, and I have spent them learning to *forgive* — and I will tell you the secret of it, if you like, because you are walking toward a place where you will *badly* need to know.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "[INSIGHT 18] \"You forgave them — but no one ever came to *be* forgiven. Ten thousand years of pardoning an empty hill. Your forgiveness is real, and it's *complete*, and it has been *unbearably* alone. You're not at peace. You're at peace *by yourself*, which is a harder thing.\"", "next": "alone", "fail": "riddle", "checkDC": 18, "checkAbility": "Wisdom"}, {"text": "\"Tell me the secret, then. I'm walking toward a man who built a wall out of grief, and a companion who can't forgive his own young hand, and a crown that wants me to judge the dead. I'll need it.\"", "next": "secret", "fail": null}, {"text": "\"You kept your hand down and they erased you for it. Was it worth it? Ten thousand years of exile for one *no* that the record doesn't even remember?\"", "next": "worth", "fail": null, "effects": [{"key": "companion.ilfaeril.approval", "op": "AddInt", "amount": 3}]}, {"text": "\"There's a young judge back there — Ilfaeril — about to raise his hand, who will carry the guilt for as long as you've carried the exile. If anyone could reach him, it's the one who refused. Come back with me. Tell him there was another way.\"", "next": "ilfaeril", "fail": null, "effects": [{"key": "act3.exile_may_return", "op": "SetTrue"}]}]}, {"id": "alone", "speaker": "The Exile Who Forgave", "text": "*(For a long moment the ancient calm does not change. Then, slowly, something behind it — something held still for a hundred centuries — *moves*, and his eyes fill.)* ...No one ever came to be forgiven. *(very quietly.)* You see it. In ten thousand years, you are the *first* to see it. *(he looks at his open hands.)* They all assume — the rare souls who find me — that I am *serene.* The *wise exile* on his hill, who *forgave* and found *peace.* And the forgiveness is *true*, stranger, I did not lie about that. I forgave them *completely.* *(his voice breaks, just slightly, after ten thousand years.)* But forgiveness is meant to be a *bridge.* Two people walk onto it — the one who *wronged* and the one who *pardons* — and they meet in the middle and are *reconciled.* *(he closes his hands.)* I built my half of the bridge. I built it *perfectly.* And then I *waited* on it. For ten thousand years. And *no one walked onto the other half.* Aedyn never came to *ask* my pardon. The young judge never came. My people never came. *(quietly.)* So I have a *complete* forgiveness that has never been *received* — a bridge to *no one* — and I have mistaken the *ache* of that for *peace* for so long that I forgot there was a difference. *(he looks at you, and the wisdom in his eyes is suddenly, achingly lonely.)* You did not come to be forgiven either. But you *came.* And you *saw* me. That is — gods — that is closer to *crossing the bridge* than anything in ten thousand years. *(softly.)* Thank you for seeing that the saint on the hill is also just a man who has been *waiting*, alone, for someone to *need* what he learned to give.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.exile_alone", "op": "SetTrue"}, {"key": "act3.exile_seen", "op": "SetTrue"}, {"key": "act1.mercy_remembered", "op": "SetTrue"}, {"key": "companion.ilfaeril.approval", "op": "AddInt", "amount": 5}], "choices": []}, {"id": "secret", "speaker": "The Exile Who Forgave", "text": "*(He nods slowly, and gives it to you like water to someone he knows is about to cross a desert.)* The secret of forgiveness. *(quietly.)* It is this: *forgiveness is not earned, and it is not deserved, and it is not a reward for the wrongdoer being sorry.* *(he meets your eyes.)* Everyone believes the *wrong* one — that you forgive someone *because* they've *changed*, or *apologized*, or *suffered enough.* That forgiveness is a *transaction*: their *remorse* buys your *pardon.* *(he shakes his head.)* But if forgiveness must be *earned*, then it is just *another debt* — another *ledger*, another *Wall*, where souls are *kept* until they've *paid.* *(softly.)* Real forgiveness is a *decision the forgiver makes alone*, for the *forgiver's* sake, with or without the other's remorse. It is *setting down a weight* you have *every right* to keep carrying — not because the one who *gave* it to you *deserves* relief, but because *your arms are tired*, and *you* deserve to put it down. *(he looks toward the distant Wall.)* Aedyn never *earned* my pardon. He never even *asked.* I forgave him anyway — not to *free him*, he doesn't even *know* — but to free *myself* from carrying *ten thousand years of justified rage.* *(he holds your gaze.)* You are walking toward people who cannot be *made* to deserve forgiveness — a god, a grieving father, your own young companion. Do not *wait* for them to *earn* it. That is the Wall's logic. *Set it down because you are tired of carrying it.* That is the only secret. It is very simple. It is the hardest thing in the world.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.exile_secret", "op": "SetTrue"}, {"key": "act3.forgiveness_is_not_earned", "op": "SetTrue"}, {"key": "act3.break_the_crown_known", "op": "SetTrue"}, {"key": "companion.ilfaeril.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "worth", "speaker": "The Exile Who Forgave", "text": "*(He is quiet a long while, watching the distant gleam of the city that erased him.)* Was it worth it. *(slowly.)* Ten thousand years for one *no* that the record doesn't remember. *(he turns the question over with the care of someone who has asked it of himself ten thousand times.)* ...The honest answer is that I *don't know*, and I have *stopped needing* to know, and those are two different kinds of peace, and I've had to make do with the *second.* *(quietly.)* If you measure it by *consequence* — was the Wall *stopped?* No. It stands. My *no* changed *nothing* the court did. By that measure, I traded my entire *life*, my *people*, my *name*, for a *gesture* that the very *record was edited to forget.* A fool's price. *(he looks at you.)* But there is another measure. *(softly.)* Somewhere — *here*, now, in *you*, in this *conversation* — there is a person who knows that *one judge kept his hand down.* That it was *possible.* That the vote was *not* unanimous, no matter what the ledger says. *(his ancient eyes hold yours.)* And as long as *one* soul knows that *refusal was possible*, then the founding was *not* the seamless, inevitable, *everyone-agreed* thing the Wall *needs* us to believe it was. *(he almost smiles.)* My *no* didn't stop the Wall. But it put a *crack* in the *story* of the Wall — the story that says *\"there was no other way.\"* *(quietly.)* Was that worth ten thousand years? Ask me again when you reach the end of your road, and tell me whether knowing *\"someone refused\"* helped you *refuse* too. *Then* I'll know if it was worth it. You're carrying my answer, stranger. You just don't know it yet.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.exile_worth", "op": "SetTrue"}, {"key": "act3.refusal_was_possible", "op": "SetTrue"}, {"key": "companion.ilfaeril.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "ilfaeril", "speaker": "The Exile Who Forgave", "text": "*(Something stirs in him — the first urgency you've seen, ten thousand years of stillness cracking.)* The young judge. *(slowly.)* About to raise his hand. *(he looks toward the distant chamber, and his ancient face works.)* You're asking me to — to *go back.* To walk *into* the city that *exiled* me, to the *founding* I *refused*, and *stand* in front of the boy I last saw as a *colleague* and tell him — *(his voice catches)* — tell him *\"keep your hand down. I did. It costs everything. Do it anyway.\"* *(he is quiet.)* For ten thousand years I have sat on this hill and *forgiven* from a *distance.* Forgiveness is *safe* at a distance. It asks *nothing* of me but to *let go.* But what you're asking — to *return*, to *intervene*, to risk the boy *hating* me, the court *seizing* me, my hard-won *peace* shattering against the one moment I've spent ten thousand years *forgiving from afar* — *(he closes his eyes.)* That's not *forgiveness*, stranger. That's *love.* And love is *so* much more dangerous than forgiveness, because love *acts*, love *goes back*, love *risks the peace.* *(he opens his eyes, and they are wet and resolved.)* ...You're right that I'm the only one who could reach him. The only one who *chose* the other path and *survived* to speak of it. *(he rises, slowly, ten thousand years uncoiling.)* I forgave them all from this hill. Perhaps it is *time* I came down off it — and *forgave them to their faces*, by *helping the boy not become one of the ones I had to forgive.* Take me to Ilfaeril. Before the hand goes up. Let the *no* that was erased from the record speak *once* where it might still *matter.*", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.exile_returns", "op": "SetTrue"}, {"key": "act3.exile_may_return", "op": "SetTrue"}, {"key": "act3.refusal_was_possible", "op": "SetTrue"}, {"key": "act1.mercy_remembered", "op": "SetTrue"}, {"key": "companion.ilfaeril.approval", "op": "AddInt", "amount": 5}], "choices": []}, {"id": "riddle", "speaker": "The Exile Who Forgave", "text": "*(He smiles, gently, and lets your scrutiny pass through him like wind through grass.)* You reach for the *wound* in me, to prove the *peace* is false. *(softly.)* It's a kind instinct, and a young one. But you'll find, if you sit out here long enough, that *peace* and *ache* are not *opposites*, stranger — they learn, after enough centuries, to *share a chair.* *(he looks at the horizon.)* I am *both* serene *and* lonely, *both* whole *and* waiting. You needn't *resolve* me. I stopped needing to be *resolved* about four thousand years ago. *(he pats the grass.)* Sit, if you like. Or go on to your road. The hill will be here. *I* will be here. That is either the *saddest* thing about me or the *most reliable*, and I have, at last, stopped *grading* it. *(and he returns his gaze to the distant Wall, the exile who forgave, serene and aching in the same breath, declining to be solved.)*", "dynamic": false, "auto": "close", "onEnter": [], "choices": []}, {"id": "close", "speaker": "The Exile Who Forgave", "text": "*(The exile sits on his hill above the founding — the one judge who kept his hand down, erased from the record for a refusal, who has had ten thousand years to learn that forgiveness is a bridge you build alone and then wait on — and whether he came down off the hill or stayed to watch another age, you carry away the secret he was kept alive to give you: that forgiveness is never *earned*, only *set down*, and that the hardest thing on the road ahead will not be defeating the Wall, but laying down the rage you have every right to carry.)*", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "crownwars.ilfaeril_witness", "file": "CrownWarsEra.cs", "title": "Crownwars · Ilfaeril · Witness", "start": "0", "nodes": [{"id": "0", "speaker": "Ilfaeril", "text": "I have stood in this hall ten thousand times, in nightmares. I did not think I would ever stand in it again with *feet.* There — the third bench from the dais. That is where I raised my hand. I can smell the lamp-oil. Gods help me, I can *smell* it.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "Then change it. Argue the verdict down — you have the chance now.", "next": "act", "fail": null}, {"text": "Just breathe. I'm here. You don't face it alone this time.", "next": "stay", "fail": null}]}, {"id": "close", "speaker": "Ilfaeril", "text": null, "dynamic": true, "auto": null, "onEnter": [{"key": "crownwars.ilfaeril_witnessed", "op": "SetTrue"}, {"key": "companion.ilfaeril.approval", "op": "AddInt", "amount": 5}], "choices": []}]}, {"id": "docks.ferryman", "file": "DocksScene.cs", "title": "Docks · Ferryman", "start": "0", "nodes": [{"id": "0", "speaker": "Ferryman", "text": "\"Help — please! My skiff's going under by the third piling and old Pell's still aboard, can't swim a stroke! The Fist won't come for a pauper and I can't haul him alone — *please!*\"", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "[Jump in.] Grab him — I've got the other side.", "next": "saved", "fail": null, "effects": [{"key": "docks.ferryman_resolved", "op": "SetTrue"}, {"key": "docks.ferryman_saved", "op": "SetTrue"}, {"key": "reputation.lowcity", "op": "AddInt", "amount": 2}]}, {"text": "I've no time for this. (Walk on.)", "next": "refused", "fail": null, "effects": [{"key": "docks.ferryman_resolved", "op": "SetTrue"}, {"key": "reputation.lowcity", "op": "AddInt", "amount": -1}]}]}, {"id": "saved", "speaker": "Ferryman", "text": "You go in cold and graceless and get a fist in Pell's collar; between you the old man comes over the gunwale coughing river. The ferryman can't speak for shaking. The dockfolk saw. They always see who comes for the people the city writes off.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}, {"id": "refused", "speaker": "Ferryman", "text": "\"...Aye. Of course. No one ever has.\" He turns back to the water alone. (Behind you, as you go, a splash and a younger voice swearing — someone else jumped. The Lower City keeps its own.)", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "docks.*", "file": "DocksScene.cs", "title": "Docks", "start": "0", "nodes": [{"id": "0", "speaker": "NPC", "text": null, "dynamic": true, "auto": null, "onEnter": [], "choices": []}]}, {"id": "toot.echo", "file": "EraEchoes.cs", "title": "Toot · Echo", "start": "0", "nodes": [{"id": "0", "speaker": "A Grey Gravedigger", "text": "Mind the rows, traveller — fresh ones, all of them. When the gods walk as men and die as men, the dead come faster than the prayers. I bury the claimed on the hill. The *unclaimed* — the godless, the faithless — I bury here, in the low ground, where the law says their souls go to the Wall and nowhere. You have the look of someone who has argued with that law before.", "dynamic": false, "auto": null, "onEnter": [{"key": "toot.echo_seen", "op": "SetTrue"}], "choices": [{"text": "Once. Ten thousand years ago.", "next": "close", "fail": null}]}, {"id": "close", "speaker": "A Grey Gravedigger", "text": null, "dynamic": true, "auto": null, "onEnter": [], "choices": []}]}, {"id": "spellplague.echo", "file": "EraEchoes.cs", "title": "Spellplague · Echo", "start": "0", "nodes": [{"id": "0", "speaker": "A Half-Unmade Voice", "text": "You can *see* me? Most can't, in the blue. I'm coming apart — not dying, undoing, like a word scratched out mid-sentence. The fire doesn't burn here so much as it *forgets* you. And yet you look at me and I stay. Stay a moment longer. Being looked at is the only thing keeping me a *me.*", "dynamic": false, "auto": null, "onEnter": [{"key": "spellplague.echo_seen", "op": "SetTrue"}], "choices": [{"text": "I see you. I'm not looking away.", "next": "close", "fail": null}]}, {"id": "close", "speaker": "A Half-Unmade Voice", "text": null, "dynamic": true, "auto": null, "onEnter": [], "choices": []}]}, {"id": "toot.crown_echo", "file": "EraEchoes.cs", "title": "Toot · Crown · Echo", "start": "0", "nodes": [{"id": "0", "speaker": "A Keeper of the Bone Crown", "text": "Careful where you step, pilgrim — that is not a forge-fire's heat you feel. It is *attention.* They are beating a god's skull thin and curved, and the god is still *in* it — still awake, still choosing. Most who come here feel only the cold. You feel the *looking.* You've felt it before, haven't you. Somewhere far downriver of this hammer.", "dynamic": false, "auto": null, "onEnter": [{"key": "toot.crown_echo_seen", "op": "SetTrue"}], "choices": [{"text": "I've felt it. On a gentle man's shelf.", "next": "close", "fail": null}]}, {"id": "close", "speaker": "A Keeper of the Bone Crown", "text": null, "dynamic": true, "auto": null, "onEnter": [], "choices": []}]}, {"id": "toot.garrow_witness", "file": "EraWitness.cs", "title": "Toot · Garrow · Witness", "start": "0", "nodes": [{"id": "0", "speaker": "Sister Garrow", "text": "Forty years a Doomguide and I never once let myself imagine *this.* They are beating a god of death into a crown of horns. Death itself — mortal, screaming, spent like coin. Every certainty I ever buried someone with is being forged into a tyrant's hat, right in front of me.", "dynamic": false, "auto": null, "onEnter": [{"key": "toot.garrow_witnessed", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 5}], "choices": [{"text": "What does it change, for you?", "next": "close", "fail": null}, {"text": "Steady. I'm here.", "next": "close", "fail": null}]}, {"id": "close", "speaker": "Sister Garrow", "text": null, "dynamic": true, "auto": null, "onEnter": [], "choices": []}]}, {"id": "spellplague.varra_witness", "file": "EraWitness.cs", "title": "Spellplague · Varra · Witness", "start": "0", "nodes": [{"id": "0", "speaker": "Varra", "text": "Oh, I *love* it here. Feel that? The Weave's coming apart at the seams — every rule that ever held magic in place, just... optional, in the blue fire. My pact-flame's going feral in my hands and I have never felt more *free,* which should probably frighten me more than it does.", "dynamic": false, "auto": null, "onEnter": [{"key": "spellplague.varra_witnessed", "op": "SetTrue"}, {"key": "companion.varra.approval", "op": "AddInt", "amount": 5}], "choices": [{"text": "Careful. Free isn't the same as safe.", "next": "close", "fail": null}, {"text": "What are you really thinking?", "next": "close", "fail": null}]}, {"id": "close", "speaker": "Varra", "text": null, "dynamic": true, "auto": null, "onEnter": [], "choices": []}]}, {"id": "(FugueContent)", "file": "FugueContent.cs", "title": "(fuguecontent)", "start": "0", "nodes": [{"id": "0", "speaker": "—", "text": "The grey is not a colour. It is the absence of the argument for colour. You are walking — though you don't remember choosing to — in a long grey river of the recently dead, toward a city that never gets closer. And then you see the Wall.", "dynamic": false, "auto": "1", "onEnter": [{"key": "fugue.arrived", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "The Returned", "text": "It's made of *people.* Faces in the mortar. Mouths still moving — small fragments of names, of weather, of *someone please.* The godless dead, dissolving one unremembered syllable at a time. ...And near the end of the curve: a niche. Empty. The only empty one. With my name half-carved above it.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}, {"id": "0", "speaker": "A girl in the Wall", "text": "You. You're the Returned — you can *reach* in here, I can feel it. My father's burning the whole world to pull me out of this. Don't you do it too. Whatever it costs — and it costs something, the Wall never gives without taking — I am not worth a—", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "I'm pulling you free. Hold on to me.", "next": "pull", "fail": null, "effects": [{"key": "companion.maerin.recruited", "op": "SetTrue"}, {"key": "fugue.pull_maerin", "op": "SetTrue"}]}, {"text": "...You're right. I won't pay that price.", "next": "leave", "fail": null, "effects": [{"key": "fugue.left_maerin", "op": "SetTrue"}]}]}, {"id": "pull", "speaker": "Maerin", "text": "—No. NO. The Wall — it's screaming, it won't give without taking, it's *taking someone* — I can feel the grey close on one of them — I'm sorry, I'm sorry, I didn't ask for this—\n\n(She comes free in your arms, whole and luminous and fading and *furious.* And there are fewer of you than there were a moment ago. There will be fewer of you forever.)", "dynamic": false, "auto": null, "onEnter": [], "choices": []}, {"id": "leave", "speaker": "Maerin", "text": "...Good. You're learning. Most don't. They look at a girl in a wall and stop doing arithmetic. Go. Before the grey decides it likes the look of you, too.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "npc.fugue.doorman", "file": "FugueDenizensContent.cs", "title": "Npc · Fugue · Doorman", "start": "0", "nodes": [{"id": "0", "speaker": "The Doorman", "text": "*(A vast, patient figure at the threshold of Kelemvor's court, sorting the endless grey river of the newly dead with the unbothered rhythm of an eternity at the same task. He reaches you, and the rhythm *stops.*)* Faithful — to the left. Faithless — to the — *(he pauses. He looks at you again. Something that has not happened in an age happens to his face.)* ...You are *breathing.* *(quietly, with mounting professional horror.)* I have sorted the dead since before this city had a name. I have a *column* for everyone. I do not have a column for *breathing.* Step aside. Please. You're — you're holding up the *queue*, and the queue, you must understand, has never once been held up in the entire history of death.", "dynamic": false, "auto": "1", "onEnter": [{"key": "npc.doorman_met", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "The Doorman", "text": "*(He fumbles a great ledger, deeply unsettled.)* This is — this is *highly* irregular. *(the grey river of souls flows past on either side; he ignores it, which clearly costs him.)* My function is *binary.* Faithful, Faithless, left, right, for all of time, and I have *loved* the simplicity of it, the *certainty*, the never-once-in-eternity having to *think.* *(he stares at you.)* And now a *living* soul stands at the threshold, fitting *neither* column, and I find — gods help a doorman — I find I am *thinking*, for the first time in an age, and I do not care for it. Thinking is what the *judges* do. I *sort.* Tell me where you go, Returned, so that I may stop *thinking* and resume *sorting*, which is the only peace a threshold ever knows.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "[INSIGHT 16] \"You don't want a column for me. You want to KEEP not thinking — because if you ever started, you'd have to ask whether the Faithless column was ever fair.\"", "next": "thinking", "fail": "sort", "checkDC": 16, "checkAbility": "Wisdom"}, {"text": "\"Put me in no column. Let me through to Kelemvor. A soul that fits neither is a soul the *judge* should see.\"", "next": "through", "fail": null, "effects": [{"key": "act2.audience_begun", "op": "SetTrue"}]}, {"text": "\"How many of the 'Faithless' you've sorted left were as confused as you are right now?\"", "next": "confused", "fail": null}, {"text": "\"Sort me Faithless, then. I'll walk into the nothing and walk back out, and you can watch your binary break.\"", "next": "faithless", "fail": null, "effects": [{"key": "prologue.crack_seeded", "op": "SetTrue"}]}]}, {"id": "thinking", "speaker": "The Doorman", "text": "*(The great patient figure goes utterly still, and the grey river backs up behind you, and for the first time in eternity the Doorman does not care.)* ...You would have me *keep* not thinking. *(very quietly.)* Yes. That is — that is the truest sorting anyone has done to *me.* *(he looks at the ledger, at the two columns, at the endless river.)* I have sorted billions, left and right, and I never once *thought*, because thinking is the small crack through which the question gets in: *was the line in the right place?* *(he sets down the pen, trembling, a thing that does not tremble.)* And once I think it, I cannot un-think it, and I will look at every Faithless soul I have ever shoved rightward and wonder. *(he meets your eyes, and there is terror and something like gratitude in it.)* You have ruined a perfectly good doorman, Returned. I shall never sort cleanly again. *(quietly.)* ...Go through to the judge. Tell Kelemvor his doorman has begun to *think*, and that the threshold is no longer *certain*, and that this is either the end of the sorting or the beginning of its mercy. I no longer know which. That uncertainty is your gift and your curse, and now it is mine.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.doorman_doubts", "op": "SetTrue"}, {"key": "act2.audience_begun", "op": "SetTrue"}, {"key": "unmade.foreshadowed", "op": "SetTrue"}], "choices": []}, {"id": "through", "speaker": "The Doorman", "text": "*(He hesitates — every fiber of his function rebels — then, with the relief of a man handing a problem upward, he steps aside.)* To the judge. *(quietly.)* Yes. A soul that fits neither column is, by definition, *above my pay grade*, and oh, what a *relief* it is to have a pay grade for the first time in eternity. *(he gestures you through the great doors.)* Kelemvor will know what to do with you. Or he won't, and then we'll *both* be uncertain, and misery loves a threshold. *(as you pass, quietly.)* Returned. When you stand before him — ask the judge why a doorman was given two columns and no third. Ask him who *removed* the third. I have always suspected there was a third, once. The grief of the sorting feels exactly the size of a column someone *took away.*", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.doorman_lets_through", "op": "SetTrue"}, {"key": "act2.audience_begun", "op": "SetTrue"}, {"key": "act2.kelemvor_unmade_hinted", "op": "SetTrue"}], "choices": []}, {"id": "confused", "speaker": "The Doorman", "text": "*(The question lands like a stone in still grey water.)* How many were *confused.* *(slowly.)* I — do not look at their *faces*, Returned. That is the discipline. Sort the *category*, never the *face*, for if you look at the face you see the *confusion* — and they are *all* confused, every one, the Faithless especially, because no one *chooses* the nothing, they are simply *sorted* into it while still asking *why.* *(he goes quiet.)* Billions of confused faces I have not allowed myself to see, shoved rightward mid-question. *(he looks at the river with new horror.)* You've made me *see* one. I don't — I cannot *un-see* now. They were all asking *why*, weren't they. And I never once let myself hear it, because hearing it would have meant *answering* it, and a doorman has no answers, only columns. *(quietly, undone.)* Go on. Before I start hearing the whole river at once. I think it would unmake me. I think it *should.*", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.doorman_sees_faces", "op": "SetTrue"}], "choices": []}, {"id": "faithless", "speaker": "The Doorman", "text": "*(He recoils.)* Sort you — and watch you *walk back.* *(horrified fascination.)* You would have me file you to the nothing, on purpose, so that the *one direction no soul returns from* delivers a soul *back to my threshold.* *(he grips the ledger.)* If you did that — if the *Faithless* column *gave one back* — then the column is not a *destination*, it's a *door*, and a door, Returned, can be *opened from the other side*, and if it can be opened then everyone I've sorted rightward is not *gone*, they are *waiting*, and the whole architecture of my function is *(his voice fails)* — is a *lie* I have enforced for eternity. *(he steps back from his own threshold.)* Don't. *Please* don't. Not because I doubt you'd do it — because if you *prove* the nothing gives souls *back*, I shall have to spend the rest of forever wondering which of the billions I might have *un-sorted*, had I only known the door swung both ways. *(quietly, devastated.)* ...Though. Perhaps that's a wondering a doorman *should* be made to do. Perhaps the cruelest mercy you could do me is exactly that. Go on, then. Break my binary. I find, against eternity, that I want it broken.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.doorman_wants_it_broken", "op": "SetTrue"}, {"key": "prologue.crack_seeded", "op": "SetTrue"}], "choices": []}, {"id": "sort", "speaker": "The Doorman", "text": "*(He shakes himself, the rhythm reasserting, relieved.)* You overreach, living thing. I am a *doorman*, not a philosopher. I sort; I do not *question* the sorting. *(he gestures you firmly aside.)* Step out of the queue. The dead are patient but the *quantity* is not. Faithful left, Faithless right, and the breathing — the breathing may simply *wait*, as an irregularity awaits a supervisor. I'll fetch one. In an age or two. The threshold keeps its own time.", "dynamic": false, "auto": "close", "onEnter": [], "choices": []}, {"id": "close", "speaker": "The Doorman", "text": "*(He resumes his eternal sorting — left, right, faithful, faithless — but his rhythm has a hitch in it now, a half-beat's hesitation at each soul, and you understand you have introduced into the oldest bureaucracy in creation the single most corrosive substance there is: *a doubt at the threshold.*)*", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "npc.fugue.petitioner", "file": "FugueDenizensContent.cs", "title": "Npc · Fugue · Petitioner", "start": "0", "nodes": [{"id": "0", "speaker": "Petitioner 9,000,001", "text": "*(A grey, threadbare soul holds a tattered numbered ticket, standing in a queue so long both ends vanish into mist, with the bottomless patience of the truly lost.)* Are you the one I'm waiting for? *(hopefully, then sagging.)* No. No, you've a number too low. I'm nine million and one. *(he shows you the ticket; the ink has faded almost to nothing.)* I've held this ticket so long I've — *(he frowns)* — I've forgotten what I'm *in line for.* Isn't that the thing. You wait so long for a thing that the *waiting* becomes the thing, and the thing you were waiting for just... falls out the bottom of you. *(he peers at you.)* You don't look dead. Have you come to tell us the line's moving? They send someone, sometimes, to say the line is moving. It's never true. But it's nice to be told.", "dynamic": false, "auto": "1", "onEnter": [{"key": "npc.petitioner_met", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "Petitioner 9,000,001", "text": "*(He shuffles forward an inch, out of pure reflex, into space that doesn't open.)* The terrible thing — *(conversationally, as one discusses weather)* — is that I think I *was* somebody. Before the ticket. I had a — a *trade*, I think, and people who'd have looked for me, and a *reason* I joined this line. Judgment, was it? Reward? Reunion? *(he turns the faded ticket over.)* But nine million ahead of me, and the line never moves, and a soul can only hold its *self* so long with nothing to feed it. So I let the self go, bit by bit, to make the waiting bearable — and now I'm just... a number, and a ticket, and a patience. *(quietly.)* Which is, I've come to suspect, *exactly* what the line is *for.* Not to judge us. To *wear us down* to nothing, politely, with a number, so the nothing feels like *our idea.* The Wall takes the *faithless* by force. The *line* takes the *patient* by attrition. Same destination. Better manners.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "[INSIGHT 17] \"The line isn't broken. It's *working.* Kelemvor's court can't process this many dead — so the harvest's overflow gets *queued* into forgetting. You're being filed by *waiting*.\"", "next": "queued", "fail": "shuffle", "checkDC": 17, "checkAbility": "Wisdom"}, {"text": "\"What was your name? Not your number. Before the ticket. Try.\"", "next": "name", "fail": null, "effects": [{"key": "companion.garrow.approval", "op": "AddInt", "amount": 3}]}, {"text": "\"The line will never move. Step out of it. Come with me to the judge directly.\"", "next": "stepout", "fail": null}, {"text": "\"Give me your ticket. I'll carry your number to the front myself.\"", "next": "ticket", "fail": null}]}, {"id": "queued", "speaker": "Petitioner 9,000,001", "text": "*(The faded eyes widen with the first real focus in an age.)* Filed by *waiting.* *(slowly.)* Oh. *Oh.* That's — yes. The court can't *sort* us fast enough, the harvest sends too many, so the *overflow* — the ones not quite Faithless enough to wall, not quite Faithful enough to judge — we get *queued*, indefinitely, and the queue is just the Wall *with better manners*, the nothing administered as *patience* instead of *punishment.* *(he looks at his ticket with horror.)* I've been *Faithlessed* by *bureaucracy.* Worn to nothing by a number, and *thanked* for my patience the whole way down. *(he crumples the ticket in a grey fist, the first decisive act in eternity.)* Then the line was never going to call my number, because *my number was the point.* *(fiercely, waking.)* Tell the others. There are nine million of us, and not one knows the line is the *killing*, not the *cure.* If they knew — if they all *stepped out at once* — the overflow-queue would *collapse*, and the court would have to *actually face* how many the harvest's killing. *(he meets your eyes.)* You've given a number back its *outrage.* That's the most alive I've felt since I forgot my name. Go on. Wake the queue.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.petitioner_wakes", "op": "SetTrue"}, {"key": "act2.queue_is_the_wall", "op": "SetTrue"}, {"key": "act2.kelemvor_unmade_hinted", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "name", "speaker": "Petitioner 9,000,001", "text": "*(He closes his eyes, and reaches, and it is the hardest thing you have ever watched a soul do — to feel for a self deliberately let go.)* My name. *(a long, trembling silence.)* It was — it started with — *(his grey face works.)* — there was a *garden.* I grew — *pears*, I think, I grew pears, and there was a woman who laughed at how *seriously* I took the pears, and she called me — *(a sound escapes him, half sob, half birth.)* — *Edwy.* She called me Edwy. *(he opens his eyes, and they are full, and *present*, a person again where a number stood.)* Edwy. The pear-man. Who joined this line to *find her*, that's why, that was always why, she went ahead and I followed and the line *ate the reason* — *(fiercely, tears falling.)* — but I *have* it now, I have *Edwy* and the *pears* and *her*, and a soul that remembers why it's waiting *cannot be worn to nothing*, that's the trick, that's the *whole trick* — *(he grips your hand.)* — thank you. Thank you. A number can be filed forever. But *Edwy the pear-man* is going to *find his wife*, line or no line. Help me out of it. I've a reason again, and a reason is the one thing the queue can't digest.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.petitioner_remembers", "op": "SetTrue"}, {"key": "act2.queue_is_the_wall", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 5}], "choices": []}, {"id": "stepout", "speaker": "Petitioner 9,000,001", "text": "*(He looks at the space beside the line — the simple, unguarded, never-considered *out* — with dawning vertigo.)* Step... *out.* *(quietly.)* In nine million places' worth of waiting, it has never once occurred to me that I *could.* *(he tests it, lifting one grey foot from the line's invisible groove.)* There's no — there's no *rope.* No *wall.* No *guard.* The line holds us by *nothing but the agreement to be in it.* *(he steps out, and does not dissolve, and looks astonished to be intact.)* It was never a *prison*, Returned. It was a *consensus.* Nine million souls agreeing to wait, and the agreement was the only thing holding any of us. *(he looks back at the endless mist-bound queue with pity and terror.)* They don't know they can leave. *That's* the cruelty — not a locked door, but an *unlocked one no one tries.* *(fiercely.)* Take me to the judge. And on the way, let's tell every soul we pass that the line is *optional.* It's the most subversive thing in the afterlife: a queue that no one has to be in, full of people who never thought to ask.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.petitioner_steps_out", "op": "SetTrue"}, {"key": "act2.queue_is_optional", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 3}], "choices": []}, {"id": "ticket", "speaker": "Petitioner 9,000,001", "text": "*(He clutches the faded ticket, then — with a wrenching effort — holds it out.)* Carry my number to the front. *(quietly.)* You'd do that. Skip nine million places, march up to wherever the front *is*, and demand they call *Edwy* — *(he stops, the name surfacing, and his eyes fill)* — Edwy, that's — that's my *name*, it came back just *saying* it — *(he presses the ticket into your hand.)* Take it. But not to skip the line, Returned. Take it to the judge and *show* him — show him a ticket so old the ink's *died*, and ask him how a just court keeps a soul waiting long enough to *forget its own name.* *(fiercely.)* That ticket's not a place in line. It's *evidence.* Of a mercy that processes the dead so slowly the waiting becomes the punishment. Carry it like the auctioneer's ledger and the child's list. One more proof that the nothing wears many manners, and *patience* is the politest of them.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.petitioner_gives_ticket", "op": "SetTrue"}, {"key": "act2.queue_is_the_wall", "op": "SetTrue"}], "choices": []}, {"id": "shuffle", "speaker": "Petitioner 9,000,001", "text": "*(He shuffles forward an inch, the focus gone, the patience reasserting.)* Working, broken — it's all the same to a number, friend. *(he turns the faded ticket.)* You'll have a low number. You'll be called first. Tell them — tell them nine million and one is still waiting. Patiently. So patiently. *(he gazes into the mist.)* It's nice to be told the line is moving. Even when it isn't.", "dynamic": false, "auto": "close", "onEnter": [], "choices": []}, {"id": "close", "speaker": "Petitioner 9,000,001", "text": "*(Whether you woke him or left him waiting, you carry away the grey ticket's lesson down toward the judge's court: that the Wall is only the *loudest* of the nothing's many doors, and the quietest — a numbered queue, a polite eternity, a patience that eats the self — may be claiming more souls than the harvest ever did.)*", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "npc.fugue.reaper", "file": "FugueDenizensContent.cs", "title": "Npc · Fugue · Reaper", "start": "0", "nodes": [{"id": "0", "speaker": "The Reaper", "text": "*(A robed figure with a soul cupped in its skeletal hands like a sheltered candle-flame, who startles at your approach and *hides* the soul behind itself — a reaper, *concealing* a death.)* Don't — *(then it sees you're not what it feared.)* ...Oh. You're the living one. The crack. *(it relaxes, fractionally, the cupped soul still hidden.)* You won't report me, then. The *others* would. *(quietly, with the exhaustion of the truly compromised.)* I am a psychopomp. My function is to *deliver* the dead to their sorting — to carry each soul faithfully to the threshold, where the faithless are walled. *(it looks at the small light in its hands.)* And lately I have been... *not delivering* some of them. Hiding them. In corners of the grey the court forgot to map. It is the gravest dereliction in the cosmos. I cannot seem to stop.", "dynamic": false, "auto": "1", "onEnter": [{"key": "npc.reaper_met", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "The Reaper", "text": "*(It uncups its hands, just enough; the hidden soul is a child's, frightened, faintly glowing.)* This one doubted. Eight years old. By the law, I deliver her to the threshold, the Doorman sorts her right, the Wall takes her, she dissolves to nothing, *correctly.* *(its skeletal voice cracks.)* I have delivered a *billion* to that nothing, faithfully, because *delivery* is my whole *being* — a reaper who doesn't reap is a *contradiction*, a function without a function. *(it shelters the child-light again.)* And then, a season ago, I looked at one of them — really *looked*, the way the Doorman won't — and I could not make my hands open. And I have not been able to since. *(it meets your eyes, hollow-socketed and desperate.)* I am hiding *forty-one souls* in the unmapped grey, Returned. Children, mostly. Doubters. I feed them what scraps of *being* I can spare. It is not enough. They are *fading.* And I do not know if I am *saving* them or merely *prolonging* their nothing, and I have no one to ask, because every other reaper would *report* me, and the question is *eating* me. What do I do? You're the only soul that ever beat the nothing. *Tell* me. What do I *do*?", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "[INSIGHT 18] \"You're not saving them by hiding them — you're keeping them company while they fade, which is more than the Wall offers. But they need *out*, and you can't carry them out alone. That's why you stopped me.\"", "next": "company", "fail": "falter", "checkDC": 18, "checkAbility": "Wisdom"}, {"text": "\"Hide them with me. I'm going to the judge — and a soul a reaper *refused to deliver* is exactly the witness Kelemvor needs to see.\"", "next": "witness", "fail": null, "effects": [{"key": "sq.reaper_hidden_souls", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 5}]}, {"text": "\"Forty-one souls a reaper wouldn't reap. That's not dereliction. That's the first honest sorting in the history of death.\"", "next": "honest", "fail": null}, {"text": "\"If you can hide forty-one, you can hide forty-one thousand. Stop delivering, reaper. Strike.\"", "next": "strike", "fail": null, "effects": [{"key": "act2.reaper_strike", "op": "SetTrue"}]}]}, {"id": "company", "speaker": "The Reaper", "text": "*(The skeletal figure goes very still, and the hidden child-light flickers against its ribs.)* ...Keeping them company while they fade. *(hollow, devastated.)* Yes. That is the unbearable truth I have hidden from *myself.* I cannot *save* them — I am a reaper, not a god, I have no power to make a doubting soul *persist* — I can only *delay*, and *witness*, and hold the small lights while they go out *slower.* *(it cups the child closer.)* And I told myself that was *rescue.* It is only *accompaniment.* But — *(it looks at you, and something hardens in the hollow voice)* — you are right that I *stopped* you. I did. I have been waiting, in the unmapped grey, for *someone who could carry them out* — out of the Fugue entirely, past the nothing, the way *you* came. *(it extends the cupped child toward you, trembling.)* I cannot save them. *You* might. Not all. Perhaps not most. But a reaper who could not reap has kept forty-one candles burning against the dark for a season, hoping the *one soul that beat death* would come and carry even *one* of them back to the light. *(quietly.)* Be the carrying I cannot do. Please. I have held them as long as I can.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.reaper_the_truth", "op": "SetTrue"}, {"key": "sq.reaper_hidden_souls", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 6}], "choices": []}, {"id": "witness", "speaker": "The Reaper", "text": "*(Hope flares in the empty sockets.)* A *witness.* *(it gathers the hidden souls — forty-one small frightened lights — into the shelter of its robe.)* You would take them *before the judge.* Not as *contraband* to be re-sorted, but as *evidence* — forty-one souls a reaper *refused to deliver to the nothing*, laid before Kelemvor himself, so the god of the dead must *look* at what his law does to children who *doubted.* *(its skeletal voice shakes.)* It is either the bravest thing I have ever conceived or the most foolish, and a reaper is built for *neither* bravery nor folly, only *delivery.* *(it presses the forty-one lights toward you.)* But you have given my dereliction a *purpose* beyond mere stalling. Carry them to the judge. Make him *see* them. And if he sorts them right anyway — if even *Kelemvor* shrugs and sends them to the Wall — then at least they will have been *witnessed* by their god before the nothing, which is forty-one more honest reckonings than the law was ever going to grant them.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.reaper_gives_souls", "op": "SetTrue"}, {"key": "sq.reaper_hidden_souls", "op": "SetTrue"}, {"key": "act2.audience_begun", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 5}], "choices": []}, {"id": "honest", "speaker": "The Reaper", "text": "*(The hollow sockets fix on you.)* The first honest sorting in the history of death. *(slowly, the weight of it settling.)* You reframe my crime as a *virtue.* *(quietly.)* I have called it *dereliction* for a season, flinched from it as *failure of function* — a reaper that won't reap. *(it looks at the hidden souls.)* But you say the function was *always wrong* — that *faithful delivery to an unjust nothing* was the dereliction, and *refusing* it is the first time a psychopomp ever did its *true* office, which was never *delivery* but *care.* *(it straightens, the robe full of small lights.)* Then I am not a *broken* reaper. I am a *corrected* one. The first to remember that we were made to *guide* the dead, not to *feed* them to a wall. *(fiercely, for a thing of bone.)* Stay near me, Returned. I have forty-one now. With your help I might have four hundred. The Wall's overflow has to pass *through* reapers, and reapers can *refuse.* You have just recruited the gentlest rebellion in the cosmos: the ones who carry the dead, declining to carry them to nothing.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.reaper_corrected", "op": "SetTrue"}, {"key": "sq.reaper_hidden_souls", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "strike", "speaker": "The Reaper", "text": "*(It recoils, the forty-one lights guttering at the scale of the thought.)* Forty-one *thousand.* A *strike.* *(hollow horror, then dawning.)* If the reapers stopped *delivering* — all of us, at once — the dead would simply *pile* at the threshold, un-sorted, and the Wall would *starve*, because the Wall cannot reach what is not *brought* to it. *(it trembles.)* But, Returned — a reaper who strikes is a reaper *unmade*, and the court would simply *replace* us with things that *don't doubt*, mindless deliverers, and then the dead would have no one who might *look* at them at all. *(it shelters its forty-one.)* No. Not a strike. A strike is too loud and too brief and ends with gentler hands than mine on the children's lights. *(quietly, resolved.)* But a *quiet refusal*, soul by soul, reaper by reaper, *unmappable* in the grey — *that*, the court cannot replace, because it cannot *find* it. I will not strike. I will *smuggle.* Like the one-eyed woman on the docks you'll have met. An underground railway, but for the dead the Wall is reaching for. Help me build it. It is the slowest rebellion imaginable. It is also the only one that doesn't get the children re-sorted by morning.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.reaper_smuggles", "op": "SetTrue"}, {"key": "sq.reaper_hidden_souls", "op": "SetTrue"}, {"key": "act2.reaper_underground", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 5}], "choices": []}, {"id": "falter", "speaker": "The Reaper", "text": "*(Your insight glances off; the reaper only clutches its hidden light tighter, lost.)* I — perhaps. I do not *know* what I am doing, that is the whole of my torment. *(hollow, exhausted.)* Saving, prolonging, accompanying — the words blur, and the children fade, and I have no judge to ask but the one who'd condemn me. *(it shrinks back into the unmapped grey.)* Go to Kelemvor if you're going. And if he is *kind* — truly kind, not lawful — send him to the corners of the grey he forgot to map. There are forty-one small reasons here he ought to *see.* I cannot bring them to him. I can only hide them. It is all a broken reaper has.", "dynamic": false, "auto": "close", "onEnter": [], "choices": []}, {"id": "close", "speaker": "The Reaper", "text": "*(It withdraws into the unmapped grey with its sheltered, fading lights — the one psychopomp in all the cosmos that looked at a death and could not deliver it — and you carry toward the judge's court the most dangerous question in the afterlife: *what if the ones who reap the dead simply stopped?*)*", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "npc.fugue.wallclerk", "file": "FugueDenizensContent.cs", "title": "Npc · Fugue · Wallclerk", "start": "0", "nodes": [{"id": "0", "speaker": "The Clerk of the Wall", "text": "*(At a desk built into the base of the Wall itself, a grey functionary stamps soul after soul with a single word — FAITHLESS — FAITHLESS — FAITHLESS — with the dead-eyed rhythm of a thing that stopped meaning it aeons ago.)* Next. *(stamp.)* Faithless. Into the mortar. *(stamp.)* Next. *(he does not look up; he has not looked up in an age.)* Whatever you are, take a number — no, wait, you're *warm*, the warm don't get *stamped*, the warm aren't my department, my department is the *cold* and the *doubting* and the *(stamp)* — *forget I said department, I haven't a department, I have a *stamp*, and the stamp has *me*, and between us we've walled a city's worth of souls this morning and it isn't yet — is it morning? It's never morning. Next.", "dynamic": false, "auto": "1", "onEnter": [{"key": "npc.wallclerk_met", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "The Clerk of the Wall", "text": "*(He stamps another, mechanically.)* You want to know who I serve. *(stamp.)* Jergal. The first scribe. *(stamp.)* Except — *(he pauses, the stamp hovering, the longest pause in aeons.)* — except Jergal *left.* Abdicated. Handed the ledger to Myrkul, who handed it to Kelemvor, who never wanted it, and somewhere in all that *handing* — *(stamp, but slower)* — everyone forgot to tell *me* to *stop.* *(he looks at the stamp in his grey hand as if seeing it new.)* I have been stamping FAITHLESS on the doubting dead for *ten thousand years* on the authority of a god who *quit*, under orders no one alive remembers giving, for a Wall whose *purpose* not one of my superiors could now *state.* *(quietly, the inertia cracking.)* I am the most diligent clerk in creation. And I have not, in an age, had the faintest idea *why.* Next. *(but the stamp doesn't fall.)*", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "[INSIGHT 18] \"Then *stop.* There are no orders. There's no Jergal. There's just a stamp, and inertia, and ten thousand years of a man too dutiful to notice no one's in charge of him.\"", "next": "stop", "fail": "inertia", "checkDC": 18, "checkAbility": "Wisdom"}, {"text": "\"Who gave the *original* order, Clerk? Before Jergal quit. Whose authority is the Wall actually built on?\"", "next": "origin", "fail": null}, {"text": "\"Stamp ME, then. FAITHLESS. And watch what a soul does when it refuses the stamp.\"", "next": "stampme", "fail": null, "effects": [{"key": "prologue.crack_seeded", "op": "SetTrue"}]}, {"text": "\"Ten thousand years of stamping. Show me the ledger. Every name you've walled.\"", "next": "ledger", "fail": null, "effects": [{"key": "sq.wall_ledger", "op": "SetTrue"}]}]}, {"id": "stop", "speaker": "The Clerk of the Wall", "text": "*(The stamp hangs in the air. The grey functionary stares at it, and at you, and the enormity arrives slowly, the way a glacier arrives.)* ...*Stop.* *(barely audible.)* There are no orders. *(he sets the stamp down on the desk, and the sound of it is the loudest thing in the Fugue.)* I could have *stopped.* At any point in ten thousand years, I could have simply — *set it down* — and no one would have *corrected* me, because there is no one *to* correct me, because the chain of command *dissolved* an age ago and left only the *habit* of obedience, obeying *nothing.* *(he looks at his empty stamping hand, horrified.)* I walled a *billion* souls on the *momentum* of an order that *expired before half of them were born.* Not from cruelty. From *diligence.* From being too good a clerk to *check* whether the job still had a *reason.* *(he pushes the stamp away from himself with a trembling grey finger.)* I will not pick it up again. *(quietly, hollow, free.)* The most dangerous thing in any bureaucracy, Returned, is not the cruel clerk. It is the *dutiful* one, who'll administer an atrocity *flawlessly* long after everyone who ordered it has gone, simply because *stopping* was never *on the form.* I was that clerk. For ten thousand years. *(he stands, for the first time in an age.)* No more. Let the souls pile up un-stamped. Let someone *with authority* come and explain *why*, or let the Wall finally *starve* for want of a clerk too obedient to quit. Either way — I am *done* stamping nothing on behalf of no one.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.wallclerk_stops", "op": "SetTrue"}, {"key": "act2.wall_unauthorized", "op": "SetTrue"}, {"key": "act2.kelemvor_unmade_hinted", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 5}], "choices": []}, {"id": "origin", "speaker": "The Clerk of the Wall", "text": "*(The stamp lowers. He frowns, reaching back past ten thousand years of habit.)* The *original* order. *(slowly.)* Before Jergal. *(he searches a memory worn smooth by repetition.)* I — there *was* no order, was there. *(quietly, the realization dawning.)* The Wall was *here* when Jergal *arrived.* He inherited it, the way Kelemvor inherited it, the way *I* inherited the stamp — *everyone* in the whole chain *inherited* this Wall from someone who *also* inherited it, and if I follow it *back* — *(his grey face goes slack with vertigo)* — it goes back, and *back*, and there is *no first orderer.* No founding authority. No god who *built* it. The Wall has *always* been being-administered-by-someone-who-didn't-build-it, all the way down, an atrocity with *no author*, only an endless chain of *inheritors* too dutiful to ask the question I'm asking now. *(he stares at you.)* It's *orphaned*, Returned. The cruelest law in creation is a *foundling* — abandoned by its maker so long ago that no one even remembers it *had* one. *(quietly, undone.)* Who do I even *rebel against*? There's no *one* there. There never was. Just the stamp, and the habit, and ten thousand years of us all assuming *someone else* was in charge.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.wallclerk_origin", "op": "SetTrue"}, {"key": "act2.wall_has_no_author", "op": "SetTrue"}, {"key": "act5.loop_hinted", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 3}], "choices": []}, {"id": "stampme", "speaker": "The Clerk of the Wall", "text": "*(For the first time in an age, he looks *up*, the dead eyes focusing on you with alarm.)* Stamp *you.* *(the stamp trembles in his hand.)* You're *warm.* I don't — the warm aren't — *(but you press forward, and old habit lifts the stamp, and it comes down on you: FAITHLESS — and *nothing happens.* You do not dissolve. You do not go to the mortar. You stand, stamped, *alive*, and the word slides off you like water off glass.)* *(the Clerk drops the stamp.)* It didn't — *take.* *(quietly, ten thousand years cracking.)* I have stamped a *billion* souls and not *one* ever — the stamp *always works*, that's the whole — *(he stares at the FAITHLESS mark fading from you.)* You took the stamp and *refused* it. Which means the stamp was never *power*, Returned. It was *agreement.* The souls dissolved because they *believed* the stamp, because no one ever *told* them they could *refuse* — *(he looks at his own hand in horror.)* — ten thousand years, and the most powerful instrument in the afterlife is a *rubber stamp* that only works on souls who *don't know they can say no.* *(quietly, shattered and freed.)* What have I been *part* of. Go. *Go*, and tell the doubting dead the one thing the stamp depends on them never learning: *it only works if you let it.*", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.wallclerk_stamp_fails", "op": "SetTrue"}, {"key": "act2.wall_is_agreement", "op": "SetTrue"}, {"key": "prologue.crack_seeded", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "ledger", "speaker": "The Clerk of the Wall", "text": "*(He hesitates, then — with the relief of a clerk handing off a burden — heaves up a ledger the size of a door.)* Every name. Ten thousand years. *(quietly.)* I stamped them, but I *recorded* them first — that's the procedure, you *log* before you *wall* — and so I have, Returned, the *complete register of the Faithless*, every soul the Wall ever took, in order, by name. *(he pushes it toward you.)* The church burns its copies. The Choir wants it for the harvest. But *I* kept the *true* one, because a clerk's *first* loyalty is to the *record*, even over the *purpose.* *(his grey voice cracks.)* Take it. It is the largest grave in existence and the only *complete* one. Every name the nothing swallowed, written by the hand that swallowed them, kept against the day someone would come who could *read them back.* *(he meets your eyes.)* I have wanted, for ten thousand years, to be *forced* to surrender this. You're the first who thought to *ask.* The dead in this ledger were never *anonymous*, Returned. They were *catalogued* — by me — and a thing catalogued can be *recovered.* Carry it to whoever's learning to read the dead tongue. Every name in here is waiting to be *spoken.*", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.wallclerk_gives_ledger", "op": "SetTrue"}, {"key": "sq.wall_ledger", "op": "SetTrue"}, {"key": "act2.cataloguing_defeats_the_wall", "op": "SetTrue"}, {"key": "act1.mercy_remembered", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 5}], "choices": []}, {"id": "inertia", "speaker": "The Clerk of the Wall", "text": "*(Your insight glances off ten thousand years of habit; the stamp resumes, mechanical.)* Stop. *(stamp.)* One doesn't simply *stop*, warm thing. *(stamp.)* There's a *queue.* There's a *procedure.* There's — *(stamp)* — there's the *stamp*, and the stamp must *fall*, that's the whole — next. Faithless. Into the mortar. *(he does not look up again.)* Take a number if you've business. The cold come first. They always come first. There are always more of the cold.", "dynamic": false, "auto": "close", "onEnter": [], "choices": []}, {"id": "close", "speaker": "The Clerk of the Wall", "text": "*(Whether you woke him or left him stamping, you carry away the most quietly devastating truth in the whole architecture of the dead: that the Wall of the Faithless has *no author* — only ten thousand years of dutiful inheritors, each assuming someone else was in charge — and that an atrocity no one *chose* is somehow harder to forgive, and far harder to stop, than one that had a villain.)*", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "npc.fugue.wickless", "file": "FugueDenizensTwoContent.cs", "title": "Npc · Fugue · Wickless", "start": "0", "nodes": [{"id": "0", "speaker": "A Small Wandering Flame", "text": "*(A little flame drifts at knee-height through the grey — wickless, bodiless, a candle-fire with no candle, guttering and recovering, guttering and recovering, as if walking against a wind only it can feel. It bobs toward you, brightens with something like hope, and a voice comes from inside it, small and warm and lost.)* Oh — *oh*, you're going somewhere. Everyone here just *stands.* You're *going.* Can I — would you — *(the flame dips, shy.)* I'm looking for my name. I was lit *for* someone, at the festival, the
