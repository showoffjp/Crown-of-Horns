ound. But you, child — you make the note *bend.* Like a string going slack. Like the Wall forgot the words to its own song when you walked past. *(She finally stops playing.)* I've sung over this city forty years. I have never once heard the Wall hesitate. You make it hesitate. Tell me true, while an old woman's nerve holds — what *are* you?", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "\"I'm the soul the Wall couldn't keep. The one whose name didn't take.\"", "next": "name", "fail": null}, {"text": "[PERSUADE 14] \"Sing me the bent note. I need to hear what the Wall sounds like when it's afraid.\"", "next": "sing", "fail": "sorrow", "checkDC": 14, "checkAbility": "Charisma"}, {"text": "\"I don't know what I am. I was hoping the song knew.\"", "next": "unknown", "fail": null}, {"text": "\"Don't put me in your dirges, Threnody. I'm not dead yet.\"", "next": "refuse", "fail": null}]}, {"id": "name", "speaker": "Old Threnody", "text": "*(She nods slowly, and a tear tracks down a face that has cried so many it's worn channels.)* The one that didn't take. *(She plucks a single string, and it *bends*, exactly the wrong way, and the hair rises on your arms.)* That's you. That's the sound of you. *(quietly)* Do you know what hope sounds like, child, to someone who's only sung grief for forty years? It sounds *wrong.* It sounds like a mistake. *(She smiles, toothless and radiant.)* I have been waiting my whole career for a wrong note. Go and bend the whole song. I'll put it to words after, if there's anyone left to sing it to.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.threnody_blessing", "op": "SetTrue"}, {"key": "prologue.crack_seeded", "op": "SetTrue"}], "choices": []}, {"id": "sing", "speaker": "Old Threnody", "text": "*(She lifts the viol, and what comes out is not music. It is the sound of a million held breaths, and under it, threaded through, one note bending free — and you recognize it, with horror, as the sound you make. The crowd nearby goes silent. A dog howls. Threnody plays on, weeping, until she cannot.)* *(She lowers the bow, spent.)* That. That's the Wall, and that's you in it, pulling loose. *(barely a whisper)* It's the most frightened sound I've ever made. And the most *hopeful.* I didn't know a sound could be both. I do now. You taught an old dirge-singer something new at the end of her life. Bless you for it, and damn you for it, which round here is the same blessing.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.threnody_played_the_wall", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 3}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 2}], "choices": []}, {"id": "unknown", "speaker": "Old Threnody", "text": "*(She resumes playing, gently now.)* The song doesn't know *what* you are, child. Songs never do. They only know how you *feel*, which is a truer thing and no use at all for planning. *(the viol sighs)* And you feel like a door left ajar in a house full of the locked-in. *(quietly)* Whatever you are, you're a draught. And the kept have been so still, so long, that even a draught feels like weather. Go make weather. The still ones are dying of stillness.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.threnody_door_ajar", "op": "SetTrue"}], "choices": []}, {"id": "refuse", "speaker": "Old Threnody", "text": "*(She cackles, delighted.)* Not dead yet! Oh, child, *none* of us are dead yet, that's the whole horror — we're all of us *not dead yet*, right up until the part where we're filed under nothing forever. *(She waves the bow.)* Fine, fine, no dirge for the living miracle. But I'll keep a verse open. I keep verses open for all the interesting ones. You'd be amazed how many come back to claim them.", "dynamic": false, "auto": "close", "onEnter": [], "choices": []}, {"id": "sorrow", "speaker": "Old Threnody", "text": "*(She lowers the bow, gentle.)* Not today, child. Some sounds you don't make twice in a day; they cost too much, and I've a long evening of ordinary grief ahead. *(she plucks one soft, kind string)* Come back when your nerve and mine both hold. The Wall's note isn't going anywhere. More's the pity. More's the whole pity.", "dynamic": false, "auto": "close", "onEnter": [], "choices": []}, {"id": "close", "speaker": "Old Threnody", "text": "*(She bends back over the viol, and the dirge resumes, and you walk away certain that the old blind woman on the chapel step understands the entire shape of the saga better than any priest, scholar, or king you will ever meet.)*", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "npc.gate.smiling", "file": "GateDenizensContent.cs", "title": "Npc · Gate · Smiling", "start": "0", "nodes": [{"id": "0", "speaker": "The Smiling Man", "text": "*(He is unremarkable in every way except the smile, which is warm, and patient, and never once reaches the stillness of his eyes.)* Friend. You look troubled. The whole city looks troubled, lately — and isn't that *strange*, in a city with a god who promises to keep the dead? *(The smile deepens, kindly.)* I represent some people who think the trouble has a cause, and a cure. We don't shout it from crates like that poor zealous boy on the corner. We just... ask reasonable questions. May I ask you one?", "dynamic": false, "auto": "1", "onEnter": [{"key": "npc.smiling_met", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "The Smiling Man", "text": "*(He folds his hands.)* If a god could end all death — truly end it, the Wall and the grave and the grief, every one — and the only cost were a little fire now, in the short term, borne by people who were going to die anyway... *(the smile holds, immovable)* ...would refusing that not be the *real* cruelty? I ask everyone. Most can't answer. You, I think, can. You've seen the other side of the question. So. Would refusing be cruel?", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "\"That's not a question. That's a leash with a smile on it.\"", "next": "leash", "fail": null, "effects": [{"key": "faction.choir", "op": "AddInt", "amount": -4}]}, {"text": "[INSIGHT 16] \"You don't believe a word of it. You're a recruiter, not a believer — Aldric's the true one, and you're his salesman.\"", "next": "salesman", "fail": "smile", "checkDC": 16, "checkAbility": "Wisdom"}, {"text": "\"Yes. Refusing would be cruel. ...And I still might.\"", "next": "might", "fail": null}, {"text": "\"Take your reasonable question and your unreasonable smile elsewhere.\"", "next": "dismiss", "fail": null, "conditions": [{"key": "act1.named_vayle_monster", "op": "RequireBoolTrue"}]}]}, {"id": "leash", "speaker": "The Smiling Man", "text": "*(The smile does not falter — that is the unsettling thing, it *never* falters.)* A leash with a smile. *(He inclines his head, as if you've paid him a compliment.)* You're sharper than most. Yes, of course it's a leash. *Everything* offered to the grieving is a leash. The church's heaven is a leash. The Heretic's cure is a leash. The difference is only which hand holds it, and whether that hand smiles. *(softly)* I smile. You'll find, in the end, that you prefer the leash that smiles. They all do. We're very patient. Grief makes everyone patient eventually — patient, and tired, and ready to be led.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.smiling_unmasked", "op": "SetTrue"}], "choices": []}, {"id": "salesman", "speaker": "The Smiling Man", "text": "*(For one half-second — one — the smile *thins*, and something cold and amused looks out, and then it's gone.)* ...Ah. You've met the type before. *(He doesn't deny it.)* Yes. Aldric *believes*; belief is his gift and his disease. I *sell.* He's never noticed the difference, bless him — a true believer never can tell the apostle from the hawker, they sound so alike. *(the smile returns, complete)* But understand: a thing can be *sold* and still be *true.* The Wall really is a horror. The cure really might work. I'm simply the one who can say so without weeping, which makes me far more dangerous than the weepers, and far better company. Do consider us.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.smiling_is_salesman", "op": "SetTrue"}, {"key": "act1.choir_doubt_seeded", "op": "SetTrue"}], "choices": []}, {"id": "might", "speaker": "The Smiling Man", "text": "*(Genuine, naked delight — the first real expression you've seen on him.)* *\"And I still might.\"* *(He actually claps, once, soft.)* Oh, that's *honest.* That's the most honest thing anyone's said to me at this corner. You understand the cost, you grant it's cruel to refuse, and you reserve the cruelty anyway, *knowingly.* *(the smile turns, for once, into something like respect)* That's not a recruit. That's a *peer.* We don't get peers. We get the desperate and the certain. *(he steps back, bowing slightly)* When you choose — and you will choose, your sort always does — I do hope you'll remember the man who didn't lie to you about the leash. So few of us don't.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.smiling_respects_you", "op": "SetTrue"}], "choices": []}, {"id": "dismiss", "speaker": "The Smiling Man", "text": "*(He bows, the smile sailing serenely on.)* You named the Doomguide a monster, I hear, in the firelight at Hollowmere. *(He's well-informed; that's its own threat.)* So you're not squeamish about monsters — you're only deciding *which* monster you trust. That's all anyone in this city is doing. *(he withdraws)* When you've finished deciding, friend, the Choir's door smiles wider than the church's. Remember that. Monsters should stick together. We're so rarely invited anywhere else.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.smiling_notes_your_deeds", "op": "SetTrue"}], "choices": []}, {"id": "smile", "speaker": "The Smiling Man", "text": "*(The smile receives your failed read like a wall receiving a thrown pebble.)* Mm. Not quite. *(gently)* You reached for the man behind the smile and found only more smile. Don't feel badly. Cleverer people have. *(he folds his hands)* The offer stands, friend. It always stands. That's the whole technique.", "dynamic": false, "auto": "close", "onEnter": [], "choices": []}, {"id": "close", "speaker": "The Smiling Man", "text": "*(He turns to the next troubled face in the crowd, and the warm, patient, bottomless smile begins again, word for word, and you understand that you have met something far more frightening than a fanatic: a man who is *right*, and *calm*, and *for sale.*)*", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "npc.gate.velith", "file": "GateDenizensContent.cs", "title": "Npc · Gate · Velith", "start": "0", "nodes": [{"id": "0", "speaker": "Velith", "text": "*(A thin man at an empty gaming table, rolling dice against himself and losing.)* Don't. *(He doesn't look up.)* Whatever you're about to propose — a wager, a game, a friendly little flip of the coin — don't. Not out of menace. Out of *mercy.* I am Velith, and I cannot win. Not \"rarely win.\" *Cannot.* I have flipped a two-headed coin and had it land on its edge, in mud, and roll into a sewer, and come up tails *somehow.* The gods don't hate me. Hate would require attention. They simply *forgot to give me luck*, and I've been filing the complaint for thirty years.", "dynamic": false, "auto": "1", "onEnter": [{"key": "npc.velith_met", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "Velith", "text": "*(He rolls. Snake eyes. He nods, unsurprised, almost serene.)* See? *(He sweeps his own coins toward an empty chair, paying a debt to no one.)* People think it's a curse. It's not dramatic enough for a curse. A curse would *do* something. This is just... statistical malice. The universe's most boring miracle. *(He finally looks at you, and his eyes are oddly peaceful.)* But here's the thing nobody believes until they've lost everything they have: once you *cannot* win, you stop being afraid of losing. And a man with nothing left to lose is the freest creature in the Gilded Gate. Ask me anything. I've no luck to protect.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "\"If you can't win, why keep rolling?\"", "next": "whyroll", "fail": null}, {"text": "[INSIGHT 14] \"You're not unlucky. You're *grieving*. You gambled away something that mattered, and now you lose on purpose so it stops being your fault.\"", "next": "grief", "fail": "laugh", "checkDC": 14, "checkAbility": "Wisdom"}, {"text": "\"A man with nothing to lose. I could use one of those. Walk with me.\"", "next": "recruit", "fail": null}, {"text": "\"Roll for me. Once. Let's see if my luck cancels yours.\"", "next": "rollforme", "fail": null}]}, {"id": "whyroll", "speaker": "Velith", "text": "*(He gathers the dice with a gambler's tenderness.)* Because the *roll* is the only honest moment left in this city. *(quietly)* Everything else is rigged — the harvest, the church, the patriars' courts, the Choir's smiling man. Everyone's loading the dice. But *my* dice? *(he tumbles them)* My dice are pure. Incorruptibly, catastrophically *fair.* They take everything from me every single time, and they never once cheat to do it. *(he smiles, beatific)* In a city of loaded games, I am the last honest table. I lose, but I lose *clean.* You've no idea how restful that is. Pull up a chair. Lose something clean. It's the only luxury I can afford to share.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.velith_philosophy", "op": "SetTrue"}], "choices": []}, {"id": "grief", "speaker": "Velith", "text": "*(The dice go still in his hand. For a long moment he says nothing.)* ...Her name was Anneke. *(very quietly)* I had one good roll, once. One. The best of my life — a card-game that won me a little house and a future and a girl who laughed at my terrible luck like it was charming. And I got *greedy*, friend. I bet the house, the future, the lot, on one more roll, because for once I thought my luck had *turned* — *(he sets the dice down)* — and it hadn't, and I lost it all, and her with it. *(he meets your eyes)* So now I lose on purpose. Small things. Coppers. Because if I'm *meant* to lose, then losing Anneke wasn't my *fault*, it was just... the dice. *(a broken smile)* You're the first to see the difference. Damn you for it. ...Thank you for it. With me it's the same coin. Lands on its edge.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.velith_anneke", "op": "SetTrue"}, {"key": "companion.varra.approval", "op": "AddInt", "amount": 3}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 2}], "choices": []}, {"id": "recruit", "speaker": "Velith", "text": "*(He laughs, the first warmth in it.)* Walk with you. A Returned and a loser — gods, what a pair. *(he pockets his pure, pitiless dice)* You know what, miracle? Yes. A man who fears losing is a man who hesitates, and you don't look like you can afford a companion who hesitates. *(he stands)* I'll throw myself between you and whatever's coming, gladly, because the *worst* case is I die, and dying's just the biggest loss, and I've made my peace with the whole *genre.* *(beat)* Besides. Standing next to the one thing in creation that beat the house? *(grinning)* Maybe your luck's contagious. It's the first bet I've wanted to make in years.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.velith_joins_loosely", "op": "SetTrue"}, {"key": "sq.velith_wager_available", "op": "SetTrue"}], "choices": []}, {"id": "rollforme", "speaker": "Velith", "text": "*(He hesitates, then — intrigued — places the dice in your palm.)* The Returned's hand. The one thing the universe couldn't keep. *(quietly)* Go on, then. Roll. If anything in the Realms could break my streak, it's the soul that broke death's bookkeeping. *(You roll. The dice tumble. And come up — gods — a perfect, impossible pair of sixes, the first win Velith has witnessed in thirty years. He stares. His eyes fill.)* ...Oh. *(barely a whisper)* Oh, you *can.* You really are a hole in the rules. *(he closes your fingers over the dice, reverent.)* Keep them. The luckiest things I own, for the one night they ever worked. And friend — if you can break *my* luck, you can break anything. *Anything.* Go and prove me right.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.velith_witnessed_a_win", "op": "SetTrue"}, {"key": "npc.velith_lucky_dice", "op": "SetTrue"}, {"key": "companion.varra.approval", "op": "AddInt", "amount": 2}], "choices": []}, {"id": "laugh", "speaker": "Velith", "text": "*(He chuckles, sweeping coppers to the empty chair.)* Grieving! Everyone's a philosopher when they meet a loser. No, friend, I'm just unlucky — it's far less interesting and twice as permanent. Roll if you're rolling. Or move along and let an honest man lose in peace.", "dynamic": false, "auto": "close", "onEnter": [], "choices": []}, {"id": "close", "speaker": "Velith", "text": "*(He rolls again. Loses again. And smiles, the freest man in the Gilded Gate, at the one honest table in a loaded city.)*", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "npc.gate.bricka", "file": "GateDenizensContent.cs", "title": "Npc · Gate · Bricka", "start": "0", "nodes": [{"id": "0", "speaker": "Sergeant Bricka", "text": "*(A scarred Fist sergeant eating a meat pie with the grim efficiency of someone who's learned to eat whenever there's food, because there often isn't.)* Huh. The dead one. *(She chews.)* You know how many \"impossible\" things I've filed a report on this year? Six. A talking statue, a rain of frogs that turned out to be a wizard's laundry accident, and now you, four times, because nobody upstairs believes the first three reports. *(she gestures with the pie)* I've stopped being amazed. Amazement's a young soldier's hobby. I'm just trying to get through my shift without it ending up being *about* anything.", "dynamic": false, "auto": "1", "onEnter": [{"key": "npc.bricka_met", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "Sergeant Bricka", "text": "*(She squints at you, sizing up which kind of trouble you are.)* So which are you. Because from where I stand there's three kinds of person in the Gate right now: the kind that makes my shift longer, the kind that makes it shorter, and the kind that makes it *end early and badly.* *(she finishes the pie)* The harvest's got everyone choosing sides — church, Choir, Heretic — and every side's convinced the other two are the villains, and meanwhile *I'm* the one scraping the results off the cobbles. So. You going to make my shift longer, shorter, or fatal? Be honest. I've a pie's worth of patience and it's gone.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "\"Shorter. I'm trying to end the harvest at the source.\"", "next": "shorter", "fail": null, "conditions": [{"key": "act1.vayle_third_path", "op": "RequireBoolTrue"}]}, {"text": "\"Longer, probably. I attract complications.\"", "next": "longer", "fail": null}, {"text": "\"I helped your sergeant at the gate. Ask him. I'm on the short-shift side.\"", "next": "ally", "fail": null, "conditions": [{"key": "act1.fist_ally", "op": "RequireBoolTrue"}]}, {"text": "[INSIGHT 13] \"You've already decided I'm trouble. You're just hoping I'm the *useful* kind.\"", "next": "useful", "fail": "shrug", "checkDC": 13, "checkAbility": "Wisdom"}]}, {"id": "shorter", "speaker": "Sergeant Bricka", "text": "*(She actually stops chewing.)* The *source.* *(she sets down the pie, which from Bricka is the equivalent of standing at attention)* You know how long I've been writing \"recommend addressing root cause\" at the bottom of harvest reports? Eleven months. You know what happens to those recommendations? They get *filed*, which in this city is a word with a nasty second meaning. *(she stands)* If you're really going for the source — not a side, the *source* — then you've got one Fist sergeant's unofficial, deniable, absolutely-against-orders help. *(she jerks a thumb at the barracks)* I know which patrols are bought and which doors don't lock. Come find me. Let's make my shift *shorter* for once. Permanently.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.bricka_ally", "op": "SetTrue"}, {"key": "sq.fist_backchannel", "op": "SetTrue"}, {"key": "faction.fist", "op": "AddInt", "amount": 5}], "choices": []}, {"id": "longer", "speaker": "Sergeant Bricka", "text": "*(She sighs, retrieves the pie.)* Knew it. The honest ones are always the complicated ones. *(she resumes eating)* Fine. You'll make my shift longer. But you know what? *(grudgingly)* Longer's better than *fatal*, and lately those are the only two options walking through my district. A complication I can write up is a complication that didn't kill anybody. *(she points the pie at you)* Stay the *write-up* kind of trouble, dead one. The other kind, I have to attend the funerals for, and I've run out of black.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.bricka_neutral", "op": "SetTrue"}], "choices": []}, {"id": "ally", "speaker": "Sergeant Bricka", "text": "*(She brightens fractionally — for Bricka, a sunrise.)* You're the one Hargroves vouched for. *(she nods, recalculating)* He's a soft touch but he's not a *fool*, and if he stuck his neck out for a walking corpse, the corpse is probably worth a sergeant's nod. *(she offers the last bite of pie, the highest honor in her gift)* Here. Fist hospitality. You're on the short-shift list, dead one. That means when you're in my district and something goes sideways, my patrol arrives *first* and asks questions *second.* In this city that's worth more than gold and twice as rare as honesty.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.bricka_ally", "op": "SetTrue"}, {"key": "faction.fist", "op": "AddInt", "amount": 3}], "choices": []}, {"id": "useful", "speaker": "Sergeant Bricka", "text": "*(A bark of laughter, genuine.)* Ha! Aye. Caught me. *(she salutes with the pie)* I decided you were trouble the second I saw you — that's just *experience*, dead one, everything interesting is trouble — but I'm *hoping* you're the kind of trouble I can point at *bigger* trouble. *(she leans in)* Because there's a lot of bigger trouble in this city right now, and a sergeant's got no budget to address root causes, but a *miracle* with a grudge? That's off the books entirely. Be my off-the-books solution. I'll keep the patrols off your back. Deal?", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.bricka_ally", "op": "SetTrue"}, {"key": "sq.fist_backchannel", "op": "SetTrue"}, {"key": "faction.fist", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "shrug", "speaker": "Sergeant Bricka", "text": "*(She shrugs, unbothered, eating.)* Cold read, dead one. I've been read by better and arrested most of them. *(she waves the pie)* Go on. Be whatever kind of trouble you are. I'll find out which on the report, same as always.", "dynamic": false, "auto": "close", "onEnter": [], "choices": []}, {"id": "close", "speaker": "Sergeant Bricka", "text": "*(She finishes the pie, dusts the crumbs from a breastplate that's stopped more knives than she'll ever admit, and ambles back toward a shift that is, against all the odds of the Gilded Gate, still merely long and not yet fatal.)*", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "npc.gate.cass", "file": "GateDenizensContent.cs", "title": "Npc · Gate · Cass", "start": "0", "nodes": [{"id": "0", "speaker": "Mother Cass", "text": "*(A stout old woman in an apron, ladling soup in a low room that smells of cabbage and, underneath it, of dignity kept alive by sheer stubbornness.)* Sit, sit, there's broth — don't argue, everyone who comes through that door gets broth, it's the one rule, even the dead ones. *(she peers at you)* And you'd be a dead one, wouldn't you. I can always tell. Not by the chill. By the *eyes.* The recently-dead and the about-to-die have the same eyes — like they've read the last page and didn't care for the ending. Here. *(she presses a bowl into your hands.)* You'll have read a worse ending than most. Broth first. Sorrows after.", "dynamic": false, "auto": "1", "onEnter": [{"key": "npc.cass_met", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "Mother Cass", "text": "*(She wipes her hands and produces, from a deep apron pocket, a heavy clinking bag.)* These are tokens. *(she pours a few into her palm — small clay disks, each scratched with a name.)* One for every soul that died in my almshouse with no kin to claim them, no coin for a burial, no name the church would write. The Faithless, most of them. The forgotten. *(her voice is matter-of-fact, which is somehow worse than weeping.)* I make a token. I scratch the name. And I keep them, because somebody has to, because the whole *point* of the Wall is that nobody does. *(she looks at you.)* I'm seventy-one, love. When I go, the bag goes in a drawer and the names go quiet. I've been praying for someone who could carry them somewhere they'd *matter.* And then a dead thing walked in for broth.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "\"Give me the tokens. I'll carry them to the Court of the Dead itself if I have to.\"", "next": "carry", "fail": null, "effects": [{"key": "almshouse.token", "op": "SetTrue"}, {"key": "sq.cass_tokens_taken", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 6}]}, {"text": "[PERSUADE 15] \"Don't give them away yet. Let me get the almshouse funded so YOU can keep carrying them — and outlive the drawer.\"", "next": "funded", "fail": "humble", "checkDC": 15, "checkAbility": "Charisma"}, {"text": "\"Why clay? Why not just remember the names yourself?\"", "next": "whyclay", "fail": null}, {"text": "\"That's a heavy bag for one old woman.\"", "next": "heavy", "fail": null}]}, {"id": "carry", "speaker": "Mother Cass", "text": "*(Her hands shake as she ties the bag closed and presses it into yours, and she does not let go for a moment.)* You'll carry them. *(quietly)* I have ladled broth in this room for forty years and buried half the people I served it to, and I have never once been able to do the one thing that mattered — make the *forgetting* stop. *(she finally lets go)* Now there's a token in that bag for every name the city threw away, and a Returned to carry it, and if you ever stand before the god of the dead himself — *(her voice cracks, the first crack)* — you put these on his table, love. You make him *read them.* That's all the unclaimed ever wanted. Not heaven. Just to be *read.*", "dynamic": false, "auto": "close", "onEnter": [{"key": "almshouse.token", "op": "SetTrue"}, {"key": "sq.cass_tokens_taken", "op": "SetTrue"}, {"key": "act1.mercy_remembered", "op": "SetTrue"}], "choices": []}, {"id": "funded", "speaker": "Mother Cass", "text": "*(She blinks, the ladle pausing.)* Fund the — outlive the drawer. *(slowly, a hope she'd long since stopped letting herself feel)* You'd get some patriar to pay for cabbage and broth and a roof, so I could keep the bag a while longer, keep scratching names, keep being the one who remembers? *(she sets the bag down, but close, like a hand on a sleeping child.)* That's — love, that's better than carrying them away. That's letting the *remembering* go on living. *(fierce, suddenly)* Yes. Yes, do that. I'm not done. I've names in me yet, and broth to ladle, and I will be *furious* to die before the drawer's full. Get me my roof. I'll keep the dead company till you do.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.cass_wants_funding", "op": "SetTrue"}, {"key": "sq.almshouse_funding_active", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 5}], "choices": []}, {"id": "whyclay", "speaker": "Mother Cass", "text": "*(She turns a token over in her fingers, fond.)* Because memory dies with me, love, but clay's stubborn. *(she taps it.)* A thing I *remember* is a thing that ends when I do — and at seventy-one, that's a short lease on a soul. But a thing I *make*, with my hands, with the name scratched in — that can be held by another hand after mine. *(she presses the token to her chest.)* The church writes the saved in a great gold book and says that's eternity. I scratch the forgotten in cabbage-smelling clay and say *this* is eternity, the kind you can fit in an apron. *(she smiles, gap-toothed.)* I'll back my clay against their gold any day. Clay remembers the ones the gold left out.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.cass_philosophy", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 3}], "choices": []}, {"id": "heavy", "speaker": "Mother Cass", "text": "*(She hefts the bag, and her old arms know its weight exactly.)* Aye. It is. *(quietly)* Gets heavier every season, and not just the clay. *(she sets it down with a tenderness usually reserved for the living.)* But here's the thing, love — it's *meant* to be heavy. A light bag would mean I'd stopped scratching names, and a city that lets you carry the forgotten *lightly* is a city that's finished forgetting them. *(she returns to her ladle.)* So I carry it heavy, and I complain about my back, and I keep the names. It's the most useful aching I've ever done. Drink your broth. You've a heavy bag of your own to carry, I think, and yours doesn't fit in a pocket.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.cass_wisdom", "op": "SetTrue"}], "choices": []}, {"id": "humble", "speaker": "Mother Cass", "text": "*(She shakes her head gently, pressing the bag toward you anyway.)* No, no — you're kind, love, but no patriar funds an old woman's bag of dead strangers. I've asked. They smile and they don't. *(she ties the bag.)* Take them instead. A dead thing carrying the dead — that's a likelier miracle than a rich man's charity. Carry them well. That's the only funding the forgotten ever get: somebody who won't put the bag in a drawer.", "dynamic": false, "auto": "close", "onEnter": [], "choices": []}, {"id": "close", "speaker": "Mother Cass", "text": "*(She resumes ladling broth for the about-to-die and the already-gone, a small stout monument to the radical proposition that no one, no one at all, should be filed under nothing while Mother Cass has cabbage and breath.)*", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "npc.gate.tobias", "file": "GateDenizensContent.cs", "title": "Npc · Gate · Tobias", "start": "0", "nodes": [{"id": "0", "speaker": "Tobias Ledgerwhite", "text": "*(A translucent, fastidious clerk shuffling spectral papers at a desk that isn't there, in the corner of a counting-house everyone else carefully avoids looking at.)* You're late. *(he doesn't look up.)* Form fourteen-C, the harvest-tithe reconciliation, was due at noon and it is — *(he checks a watch that passes through his own wrist)* — it is always noon, somehow, which is precisely the *sort* of irregularity I'd flag if anyone would *bring me the form.* No one brings me the form. No one brings me *anything.* The service in this counting-house has deteriorated *shockingly* in the last — how long has it been? It feels like months. Have I had lunch? I can't recall having lunch.", "dynamic": false, "auto": "1", "onEnter": [{"key": "npc.tobias_met", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "Tobias Ledgerwhite", "text": "*(He finally looks up, and there's a terrible bewildered patience in him.)* You'll do. You've a *competent* look. Tell me — and I ask everyone, and they all just *walk away*, the rudeness — tell me why no one will process my filings. Why my colleagues won't meet my eye. Why the ink won't take and the papers won't stay and I can't, for the *life* of me, recall going home. *(he laughs, a thin spectral thing.)* \"For the life of me.\" Curious expression. Why did that feel... cold, just now. Why is it always noon. Tell me. You've a competent look. Competent people give straight answers.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "\"Tobias. You're dead. The harvest took you. You've been filing forms in the afterlife.\"", "next": "dead", "fail": null}, {"text": "[INSIGHT 15] \"The form you keep waiting for is your own death certificate. Some part of you knows. That's why it's always noon — you stopped the clock at the moment.\"", "next": "certificate", "fail": "confused", "checkDC": 15, "checkAbility": "Wisdom"}, {"text": "\"You're not late, Tobias. You're early. You died before your time, and the paperwork hasn't caught up.\"", "next": "early", "fail": null}, {"text": "\"What was the last form you remember filing?\"", "next": "lastform", "fail": null}]}, {"id": "dead", "speaker": "Tobias Ledgerwhite", "text": "*(The spectral papers drift to the floor that isn't there.)* ...Dead. *(a long, awful pause, his whole fastidious world rearranging.)* That would — *(slowly)* — that would actually reconcile a great deal. The ink. The noon. The cold. The way Henrik on the third stool keeps *weeping* when he passes my desk; I'd assumed a personal matter. *(he looks at his translucent hands.)* I'm *dead.* And I've been... working. *(and then, devastatingly, the smallest, most human thing:)* Did anyone notice I'd gone? Or did they only notice the forms stopped? *(he is weeping now, ghostly and silent.)* Forty years I balanced this city's ledgers. I should so like to know if I balanced as a *person*, or only as a *function.*", "dynamic": false, "auto": "2", "onEnter": [{"key": "npc.tobias_knows", "op": "SetTrue"}, {"key": "sq.taxghost_active", "op": "SetTrue"}], "choices": []}, {"id": "certificate", "speaker": "Tobias Ledgerwhite", "text": "*(He goes very still, and for the first time the fussiness drops entirely.)* ...My own. *(he understands all at once, the way only a clerk could — through the filing.)* The form I've been waiting for is the one that files *me.* And I've stopped the clock at noon because — *(his voice fails)* — because to let it strike one would be to let the day *end*, and a day that ends is a *life* that ended, and I am not — I was not — *ready.* *(he looks at you with infinite weary gratitude.)* No one's ever been competent enough to tell me. They just look away. You looked *at* me, and read the ledger of me, and found the one unfiled form. *(quietly)* Thank you. I think. Ask me to help and I'll know, now, that it's a dead man volunteering. That's only proper. One should know one's own status before signing anything.", "dynamic": false, "auto": "2", "onEnter": [{"key": "npc.tobias_knows", "op": "SetTrue"}, {"key": "sq.taxghost_active", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 2}], "choices": []}, {"id": "early", "speaker": "Tobias Ledgerwhite", "text": "*(He brightens, pathetically.)* Early! Yes — *early*, that's far more *orderly* than the alternative I can feel pressing at the edges. *(but the relief can't hold.)* Though... early for *what*, exactly. The paperwork catching up to *what.* *(his face falls by degrees as the logic completes itself, because he is, above all, logical.)* ...Oh. Oh, I see. The form that's late is the one that ends me. I've been *avoiding my own deadline.* *(a hysterical little laugh.)* A lifetime of punctuality and I'm late for the only appointment that mattered. *(he steadies.)* Help me file it properly. If I must be dead, I'll be dead *correctly*, with the forms in order. It's all I ever was. It's not nothing. Tell me it's not nothing.", "dynamic": false, "auto": "2", "onEnter": [{"key": "npc.tobias_suspects", "op": "SetTrue"}, {"key": "sq.taxghost_active", "op": "SetTrue"}], "choices": []}, {"id": "lastform", "speaker": "Tobias Ledgerwhite", "text": "*(He frowns, reaching back.)* The last form. Let me — it was — *(his spectral hand finds it in the air, and he reads, and the color drains from a face that has none.)* \"Harvest reconciliation, district seven. Souls processed: four hundred and eleven. Discrepancy: one. Unaccounted: one.\" *(he looks up, terrified.)* District seven is *this* district. And the discrepancy — the one unaccounted soul — *(he stares at his own translucent hands.)* The form I was filing when I died was the form that *should have listed me.* And I left myself off. I was the discrepancy. I've been hunting my own missing entry for — for however long noon has lasted. *(quietly)* Help me account for the one unaccounted soul. Help me file *Tobias.* I cannot rest as a rounding error.", "dynamic": false, "auto": "2", "onEnter": [{"key": "npc.tobias_the_discrepancy", "op": "SetTrue"}, {"key": "sq.taxghost_active", "op": "SetTrue"}], "choices": []}, {"id": "confused", "speaker": "Tobias Ledgerwhite", "text": "*(He blinks, the fussiness snapping back like a defense.)* My own — no, no, that's far too *irregular* a notion, a form that files the filer, it doesn't *reconcile.* *(but his hands have begun to tremble through the desk.)* ...Though it would explain the noon. And the cold. And why Henrik weeps. *(he shakes himself.)* No. I shan't think about it. I shall simply wait for someone to bring the correct form, as I always have, as I always — *(quietly, lost)* — as I always will, apparently. Forever. At noon. *(he doesn't finish the thought; some part of him won't let himself.)*", "dynamic": false, "auto": "2", "onEnter": [{"key": "npc.tobias_in_denial", "op": "SetTrue"}], "choices": []}, {"id": "2", "speaker": "Tobias Ledgerwhite", "text": "*(He gathers his spectral papers with shaking, careful hands.)* Then here is my situation, stated plainly, as I'd want it stated to me: I am dead, unfiled, and stuck. To move on — to let it be one o'clock at last — I must complete my own death-certificate, form forty-four, which requires *(he winces)* three signatures I can no longer obtain: my employer's, the church's, and *(quietly)* a witness who'll swear I *mattered*, which is the box no clerk ever expects to need filled, and which I find, at the end, is the only one I'm afraid of. Will you help me file myself? It is a small quest, and a strange one, and the most important thing I have ever asked anyone.", "dynamic": false, "auto": null, "onEnter": [{"key": "sq.taxghost_active", "op": "SetTrue"}], "choices": [{"text": "\"I'll get your three signatures, Tobias. Including the last one.\"", "next": "accept", "fail": null, "effects": [{"key": "sq.taxghost_accepted", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 3}]}, {"text": "\"Why does a clerk need a *witness that he mattered* to rest?\"", "next": "whymatter", "fail": null}, {"text": "\"I have my own dead to file first. But I'll come back.\"", "next": "later", "fail": null}]}, {"id": "accept", "speaker": "Tobias Ledgerwhite", "text": "*(He straightens, and forty years of dignity settle onto him like a clean coat.)* Then I am, for the first time since noon, a man with a *deadline he intends to meet.* *(he hands you a blank form forty-four, which somehow you can hold.)* The employer's signature you'll find at the counting-house above; the church's at the Kelemvorite chapel, though they're stingy with ink for the Faithless and I may technically qualify, which is a horror I'll address *after* I'm filed. And the witness — *(he falters)* — the witness I leave to you. You barely know me. But you're the only one who *looked.* Perhaps that's witness enough. Perhaps that's what witnessing *is.*", "dynamic": false, "auto": "close", "onEnter": [], "choices": []}, {"id": "whymatter", "speaker": "Tobias Ledgerwhite", "text": "*(He folds his hands precisely.)* Because, in forty years of balancing this city's books, I came to suspect I *was* a book — a function, a column that added correctly and was loved by no one and noticed only when it stopped. *(quietly)* The death-certificate's witness-box exists for the *kin*, the friends, the mourners. I have none. So the box has been empty my whole afterlife, and an empty box, to a clerk, means the entry is *invalid.* I cannot file an invalid soul. *I* cannot rest as one. *(he meets your eyes.)* I need someone to swear I was a person and not a procedure. It is the only sum I was never able to total myself.", "dynamic": false, "auto": "2", "onEnter": [{"key": "npc.tobias_the_fear", "op": "SetTrue"}], "choices": []}, {"id": "later", "speaker": "Tobias Ledgerwhite", "text": "*(He nods, with a clerk's understanding of priority queues.)* Of course. Your filings first; mine will keep. *(a thin smile.)* It's kept this long. Noon is very patient. *(quietly)* But do come back. I've been a rounding error for so long, and you're the first to suggest I might be a *name.* I should like to test that hypothesis before the clock strikes one.", "dynamic": false, "auto": "close", "onEnter": [], "choices": []}, {"id": "close", "speaker": "Tobias Ledgerwhite", "text": "*(He returns to his phantom desk, but he does not file; he simply sits, for the first time, *waiting* — which is, you realize, a far more alive thing for a dead clerk to do than working.)*", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "npc.gate.lula", "file": "GateDenizensContent.cs", "title": "Npc · Gate · Lula", "start": "0", "nodes": [{"id": "0", "speaker": "Lula", "text": "*(A girl of maybe twelve, sharp-eyed and ink-stained, perched on a barrel with an enormous, fraying ledger far too big for her lap, muttering names under her breath like a rosary.)* —Hessel the netmender, Asa who sold winkles, Old Bray with the limp, Tam, little Tam, Tam who liked frogs— *(she notices you, and her hand flattens protectively over the page.)* Don't read over my shoulder. These are *mine.* Well. They're not mine. That's the point. They're nobody's. That's *why* they're mine. *(she eyes you.)* You're the dead one everyone's whispering about. Good. You'll understand, then. You came back. These didn't. Somebody has to keep them till they can.", "dynamic": false, "auto": "1", "onEnter": [{"key": "npc.lula_met", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "Lula", "text": "*(She turns the great ledger toward you, fierce and proud.)* It's a list. Every name the harvest took and the church won't write and the Choir only wants to *use.* I get them from Grud the gravedigger, from Mother Cass's tokens, from the weeping man at the auction, from anybody who'll tell me a forgotten name before it's gone. *(she taps the page.)* The church says the Faithless are *meant* to be forgotten — that the forgetting *is* the punishment. So I decided, when they took my brother Tam, that I would be the thing the punishment didn't account for. I would *remember on purpose.* I'm twelve. It's all I've got. It's *working.* *(quietly, the fierceness wavering)* Only — people have started asking for the list. Grown-up people. With reasons.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "\"Who's asking for the list, Lula? And what do they want it for?\"", "next": "who", "fail": null}, {"text": "[INSIGHT 14] \"You're not just remembering them. You're keeping your brother company. As long as the list grows, Tam isn't alone in it.\"", "next": "tam", "fail": "guard", "checkDC": 14, "checkAbility": "Wisdom"}, {"text": "\"The list is the bravest thing in this whole city. Let me help you protect it.\"", "next": "protect", "fail": null, "effects": [{"key": "sq.lulaslist_active", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 5}]}, {"text": "\"A list of the dead is dangerous to carry, child. The wrong people would kill for those names.\"", "next": "danger", "fail": null}]}, {"id": "who", "speaker": "Lula", "text": "*(She counts them off on ink-stained fingers, too young to be this wary and far too practiced at it.)* The Choir's smiling man — he says the names should be *honored*, which means *harvested*, because a named soul's worth more to whatever Aldric's building than a forgotten one. *(a finger.)* A church clerk — he says the list is *heresy*, that writing the Faithless undoes the sorting, and he'd like to *burn* it, politely. *(a finger.)* And a patriar's man, who'd *buy* it, to sell back to the survivors one name at a time. *(she closes the ledger with a snap.)* Three grown-ups. Three reasons. All of them want my list to make the dead *useful* again. *(she glares.)* But the dead aren't *for* anything. That's the whole — that's the *whole thing.* They're just supposed to be *remembered.* Why does everyone want to make remembering into a *transaction?*", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.lula_threats_known", "op": "SetTrue"}, {"key": "sq.lulaslist_active", "op": "SetTrue"}], "choices": []}, {"id": "tam", "speaker": "Lula", "text": "*(Her sharp little face crumples, just for a second, before the fierceness clamps back down.)* ...You're not supposed to be able to see that. *(very quietly)* He was eight. He liked frogs. He doubted — about gods, about everything, he was a *questioner*, my Tam, and they decided questioning was a crime worth the nothing. *(she opens the ledger to a page she's clearly opened ten thousand times.)* His name's first. Right at the top. And every name I add under it is a — is a *neighbor*, see, so he's not in the dark alone. *(she looks up, and the whole tragic engine of her is suddenly visible.)* As long as the list grows, Tam's got *company.* That's all the list is. It's me, refusing to let my little brother be alone in the nothing. *(fierce again, wet-eyed.)* So you understand why I'd die before I'd let the smiling man *use* him.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.lula_tam", "op": "SetTrue"}, {"key": "sq.lulaslist_active", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 6}], "choices": []}, {"id": "protect", "speaker": "Lula", "text": "*(She studies you with a child's merciless assessment, and decides.)* ...All right. *(she says it like a treaty.)* You're dead, so you can't be bought, and you're a miracle, so the smiling man can't out-reason you, and you looked at the *list* before you looked at *me*, which means you understand what matters. *(she shoves the great ledger half toward you, then clutches it back, then compromises by holding one side while you hold the other.)* We protect it *together.* You keep the grown-ups with reasons off it, and I keep *adding*, because the second I stop adding, the forgetting wins. *(quietly, the deal sealed.)* And if it ever comes to the Court of the Dead — if you ever stand where the sorting happens — you bring the list. You make them read every name. Starting with Tam. Promise me. Promise me on whatever a dead thing swears by.", "dynamic": false, "auto": "close", "onEnter": [{"key": "sq.lulaslist_active", "op": "SetTrue"}, {"key": "sq.lulaslist_allied", "op": "SetTrue"}, {"key": "act1.mercy_remembered", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "danger", "speaker": "Lula", "text": "*(She lifts her sharp little chin.)* I *know* it's dangerous. *(quietly)* My brother died for *doubting.* I'm not going to be scared into forgetting him by people who'd kill for a list of the people they already killed. *(she clutches the ledger.)* That's the trick they don't expect, see — they think a child with a list is *fragile.* But I've already lost the thing I was afraid of losing. Tam's already gone. *(fierce.)* You can't threaten somebody whose worst day already happened. You can only *help* them, or get *out of their way.* So which are you, dead one? Help, or out of the way? Because I've names to add and the light's going.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.lula_unbreakable", "op": "SetTrue"}], "choices": []}, {"id": "guard", "speaker": "Lula", "text": "*(She hugs the ledger to her chest.)* Don't do the clever-grown-up thing where you guess at me. *(warily)* You're not the first to try and *understand* me into handing it over. Help or don't. But don't *read* me. I'm not on the list. Only the dead get to be on the list.", "dynamic": false, "auto": "close", "onEnter": [], "choices": []}, {"id": "close", "speaker": "Lula", "text": "*(She bends back over the great fraying ledger, ink-stained and unbreakable, murmuring the names of the forgotten into the failing light — Hessel, Asa, Old Bray, little Tam who liked frogs — a twelve-year-old standing alone against the entire architecture of oblivion, and winning.)*", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "npc.gate.aldwin", "file": "GateDenizensFourContent.cs", "title": "Npc · Gate · Aldwin", "start": "0", "nodes": [{"id": "0", "speaker": "Duke Aldwin", "text": "*(A pleasant, vague nobleman behind a desk fortified with paperwork, flanked by two clerks who answer everything before he can.)* Ah, the — *(a clerk murmurs)* — the Returned, yes, thank you, Pell. You'll want to petition about the harvest, everyone does, and I want you to know that the matter is *under active review* by the Standing Committee on Irregular Mortality, which meets — *(a clerk murmurs)* — quarterly, and reports to the Subcommittee on Civic Calm, which I chair, in an advisory capacity, without a vote. *(he beams.)* So you see, it's *very* in hand. Whose hand exactly, I couldn't say. That's rather the system's strength.", "dynamic": false, "auto": "1", "onEnter": [{"key": "npc.aldwin_met", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "Duke Aldwin", "text": "*(He gestures at the fortifications of paper.)* People call me *the Absent*, you know. They mean it unkindly. But consider — *(he leans forward, and for a moment there's a sharp little mind under the vagueness)* — a Duke who *decides* things is a Duke who can be *blamed* for them. A Duke who refers everything to committee can never have approved the harvest, never have denied the harvest, never be on *record* at all. *(he smiles.)* I have governed this city through its worst season by ensuring that no decision was ever, technically, *mine.* It is the safest possible leadership. It is also, I'm aware — *(the sharpness flickers and is gone)* — completely useless to a single dying soul. But it keeps *me* in the chair, and the chair is the thing, isn't it. The chair is always the thing.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "[INSIGHT 16] \"You're not vague. You're a coward with excellent administrative instincts. You could stop the harvest with one signature and you won't, because a signature can be hanged.\"", "next": "coward", "fail": "committee", "checkDC": 16, "checkAbility": "Wisdom"}, {"text": "\"One decision, Duke. Just one. Order the Fist to protect the harvest-quarters. I'll take the blame if it costs you.\"", "next": "onedecision", "fail": null}, {"text": "\"Refer the harvest to a committee that actually meets. With Mother Cass and Sergeant Bricka on it.\"", "next": "committee2", "fail": null, "effects": [{"key": "faction.fist", "op": "AddInt", "amount": 2}]}, {"text": "\"You're the most honest politician I've met. You've simply automated your own uselessness.\"", "next": "honest", "fail": null}]}, {"id": "coward", "speaker": "Duke Aldwin", "text": "*(The vagueness drops entirely. The man underneath is tired, and clever, and afraid.)* ...A coward with excellent administrative instincts. *(quietly.)* Do you know, no one's ever put it that precisely. They say \"absent,\" \"ineffectual,\" \"weak.\" You say *coward with a system*, which is the truth, and the truth costs me nothing now that you've said it for me. *(he straightens a paper that doesn't need it.)* Yes. I could end the harvest with a stroke. And the Choir would have me dead by morning, and the church the morning after, and the patriars would simply *replace* me with someone who refers everything to committee, and the harvest would continue, and I'd be *dead and irrelevant* instead of *alive and irrelevant.* *(he meets your eyes.)* The system isn't cowardice protecting *power*, Returned. It's cowardice protecting the *illusion* that someone's in charge. Pull that illusion and you'll find no one is. No one at all. That's the real horror under the paperwork. Now — was there anything *else* I can refer to committee for you?", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.aldwin_unmasked", "op": "SetTrue"}, {"key": "act1.duke_powerless", "op": "SetTrue"}], "choices": []}, {"id": "onedecision", "speaker": "Duke Aldwin", "text": "*(He goes very still, the quill trembling over the inkwell.)* One decision. With your name on the blame. *(a long pause; you can see him *want* it.)* You'd take the record. The Choir's knife. The church's wrath. All of it, so a Duke could sign one merciful order and survive it. *(slowly, he draws a fresh sheet.)* ...No. *(he sets down the quill.)* No, I can't let you. Not because I doubt you'd take it — because if a *dead foreigner* has to take the blame for a Duke doing his *job*, then the chair was never worth keeping, and I've been guarding an empty thing. *(he signs the order himself, hand shaking, the first decision in years.)* There. The Fist protects the harvest-quarters. By *my* authority. On *my* record. *(he looks ill and alive.)* Gods. Forty years of committees, undone by a corpse who offered to take the fall. Get out before I reconsider. And — thank you. For making the fall seem survivable enough to risk myself.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.aldwin_acts", "op": "SetTrue"}, {"key": "act1.duke_signs_order", "op": "SetTrue"}, {"key": "faction.fist", "op": "AddInt", "amount": 5}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "committee2", "speaker": "Duke Aldwin", "text": "*(He brightens — this is a language he speaks.)* A committee that *meets!* With — *(a clerk starts to murmur; he waves him off, himself for once)* — with the almshouse woman and a Fist sergeant. *(he considers.)* Do you know, that's the cleverest thing anyone's proposed at this desk in a decade. I can't *act* — acting gets you killed — but I can *convene*, and if I convene the *right* people, with the *real* authority, and simply... *never disband them*... *(a sly little smile.)* ...then the decisions get made, and *they* take the record, and the harvest gets fought, and I remain technically, gloriously *absent.* *(he's already drafting.)* The Standing Committee on Mercy, with teeth and a budget. You've found the loophole in my own cowardice, Returned. I'll convene it by week's end. It's the bravest thing I'll never admit to doing.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.aldwin_convenes", "op": "SetTrue"}, {"key": "act1.mercy_committee", "op": "SetTrue"}, {"key": "faction.fist", "op": "AddInt", "amount": 2}], "choices": []}, {"id": "honest", "speaker": "Duke Aldwin", "text": "*(A dry, grateful laugh.)* \"Automated my own uselessness.\" *(he savors it.)* I shall have that engraved somewhere private. *(he spreads his hands over the paperwork.)* You're kinder than I deserve. Most see a fool; you see a *machine* a frightened man built to survive a thing he couldn't fix. *(quietly.)* It's not a *defense*, mind. The harvest-dead don't care how elegant my abdication is. But it's *true*, and a politician hearing a true thing about himself is rare enough that I'll give you a true thing back: there's a Standing Committee key in this drawer that opens every locked office in the Upper City. Take it. Do the things I'm too automated to do. I'll refer my own complicity to committee, where it belongs.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.aldwin_gives_key", "op": "SetTrue"}, {"key": "sq.upper_city_access", "op": "SetTrue"}], "choices": []}, {"id": "committee", "speaker": "Duke Aldwin", "text": "*(The vagueness reasserts itself like a shield.)* Goodness, that's rather *pointed*, isn't it. *(he gestures vaguely.)* I'm sure the Committee on Civic Sentiment would be glad to *receive* your characterization — Pell, do minute that the Returned finds the Duke insufficiently decisive — and we'll review it in due course. *(he beams, fully absent again.)* Was there anything else? No? Splendid. The system thanks you for your input.", "dynamic": false, "auto": "close", "onEnter": [], "choices": []}, {"id": "close", "speaker": "Duke Aldwin", "text": "*(Whatever you wrung from him, the Duke retreats behind his paper fortifications — though you notice, as you leave, that one of the clerks is quietly weeping with relief, and you suspect that clerk has been begging the Duke to *do something* for a very long time.)*", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "npc.gate.delancie", "file": "GateDenizensFourContent.cs", "title": "Npc · Gate · Delancie", "start": "0", "nodes": [{"id": "0", "speaker": "Ysolde de Lancie", "text": "*(A young patrician draped across a chaise, examining you through a jeweled lorgnette with the precise enthusiasm of someone choosing wallpaper.)* So *you're* the thing everyone's frightened of. *(she yawns, delicately.)* I bought an archdevil last season — frightfully overrated, all paperwork and brooding, I returned it — and Mother says one mustn't collect the *occult* two seasons running, it looks *desperate.* But a *Returned.* A soul that beat the Wall. *(she sits up, the boredom flickering into something hungrier.)* Tell me, dead thing — what does it *cost*, to come back? Because I have *quite* a lot of money and an absolutely *crushing* amount of time, and I should very much like to never die. Name your price. I'm prepared to be vulgar about it.", "dynamic": false, "auto": "1", "onEnter": [{"key": "npc.delancie_met", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "Ysolde de Lancie", "text": "*(She circles you, lorgnette raised.)* You think me a monster. *(unbothered.)* Everyone does, the *interesting* ones especially. But consider — I am *honest*, which the church and the Choir are not. They dress their death-trade in *doctrine* and *salvation.* I simply want what they're selling — *escape from the nothing* — and I'm willing to say so plainly and *pay.* *(she taps the lorgnette against her teeth.)* Is that worse than the smiling Choir man, who wants the same thing and calls it *crusade*? At least I don't pretend my survival is a *cause.* I want to live forever because dying is *common* and I am *not.* There. Cleaner than a priest, aren't I. Now — the price?", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "[PERSUADE 16] \"There's no price. But there IS a thing worth more than immortality to someone crushed by time: a *use*. Fund the resistance. Be the first patrician the harvest-poor remember kindly.\"", "next": "use", "fail": "bored", "checkDC": 16, "checkAbility": "Charisma"}, {"text": "\"You can't buy what I am. But you can buy what I *do* — bankroll Hessa's underground, and your money saves more souls than your immortality ever would.\"", "next": "bankroll", "fail": null, "effects": [{"key": "sq.delancie_patron", "op": "SetTrue"}]}, {"text": "[INSIGHT 15] \"You're not afraid of dying. You're afraid you'll die having *done nothing* — and immortality just postpones the verdict.\"", "next": "nothing", "fail": "deny", "checkDC": 15, "checkAbility": "Wisdom"}, {"text": "\"You're exactly as common as everyone else, Ysolde. The Wall doesn't check your blood.\"", "next": "common", "fail": null, "effects": [{"key": "companion.varra.approval", "op": "AddInt", "amount": 2}]}]}, {"id": "use", "speaker": "Ysolde de Lancie", "text": "*(The lorgnette lowers. For the first time the boredom cracks into genuine surprise.)* A *use.* *(slowly.)* You've offered me the one thing I've never been able to *buy.* *(she rises, restless.)* Do you know what it is to be a de Lancie? Everything is *provided.* I have never *needed* to be anything, and so I have never *become* anything, and the time stretches *(she shudders)* — endlessly, emptily — and I thought *more* time was the cure, when of course more empty time is the *disease.* *(she fixes you, hungry in a new direction.)* \"The first patrician the harvest-poor remember kindly.\" That's — that's a thing money *can't* purchase, isn't it. It must be *earned.* *(a wild, delighted laugh.)* How *novel.* How *vulgar.* Mother will be appalled. Yes. Fund your resistance. Make me *useful*, dead thing. It's the most exotic thing I've ever collected: a *point.*", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.delancie_finds_purpose", "op": "SetTrue"}, {"key": "sq.delancie_patron", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "bankroll", "speaker": "Ysolde de Lancie", "text": "*(She considers the ledgers of her own boredom.)* Bankroll a smuggler. *(she taps the lorgnette.)* It's *deliciously* declassé. Mother would faint. *(she smiles, sharp.)* And it accomplishes what my archdevil never did — it makes me *consequential* without the tedious paperwork of immortality. *(she rings a small bell; a steward appears.)* Open a line of credit to — what's the one-eyed woman's name, the turnip-smuggler — and route it through three shells so the church can't trace it to the family. *(to you.)* There. Souls bought, by a bored noblewoman, out of pure *novelty.* Don't mistake it for virtue, dead thing. It's *appetite*, pointed somewhere new. But the harvest-poor won't care about my motives, and neither, I suspect, will you. Spend it well.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.delancie_bankrolls", "op": "SetTrue"}, {"key": "sq.delancie_patron", "op": "SetTrue"}, {"key": "sq.hessa_underground", "op": "SetTrue"}], "choices": []}, {"id": "nothing", "speaker": "Ysolde de Lancie", "text": "*(The lorgnette drops to her lap. The languor drains out of her entirely.)* ...Oh, that's *cruel.* *(quietly.)* That's the cruelest thing anyone's said to me, and I've been *insulted* by professionals. *(she looks at her own jeweled hands.)* Die having done nothing. Yes. That's it, isn't it. Not the *dying.* The *ledger* at the end, the page that reads *Ysolde de Lancie: provided for, did nothing, took up space beautifully.* *(she shudders.)* And immortality just keeps the page *open*, blank, forever, which is *worse* — eternity to do nothing in. *(she meets your eyes, and the hunger has turned inward, terrified.)* You've just made immortality sound like *damnation.* Which — *(a hysterical little laugh)* — which is precisely what the Wall *is*, isn't it. Nothing, forever. I was *shopping* for the Wall. Gods. I need to *do* something. Quickly. Before the page sets. Tell me what.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.delancie_terrified", "op": "SetTrue"}, {"key": "sq.delancie_patron", "op": "SetTrue"}], "choices": []}, {"id": "common", "speaker": "Ysolde de Lancie", "text": "*(She bristles, then — to her own evident shock — laughs.)* As common as *everyone.* *(she touches her own face.)* The Wall doesn't check my *blood.* *(quietly.)* Do you know, that should horrify me, and instead it's the most *interesting* thing I've heard all season. *(she rises.)* All my life the lesson was that de Lancies are *different*, *better*, *exempt.* And you tell me the one democracy left in the Realms is the *nothing* — that the harvest takes patrician and pauper alike, sorts us all to the same grey. *(a strange smile.)* Then perhaps the only *un-common* thing left to do is to *fight* the thing that makes us all equal. How perverse. How *thrilling.* You've given a bored girl a reason, dead thing. I shan't thank you. But I shan't forget it either.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.delancie_leveled", "op": "SetTrue"}], "choices": []}, {"id": "bored", "speaker": "Ysolde de Lancie", "text": "*(She yawns, the moment lost.)* Mm. A *cause.* How tiring. *(she waves the lorgnette.)* The harvest-poor remembering me kindly — darling, they can't even afford to remember me *expensively.* No. Run along. Send me something *immortal* when you've got it. I'll be here. I'm always here. That's rather the whole problem.", "dynamic": false, "auto": "close", "onEnter": [], "choices": []}, {"id": "deny", "speaker": "Ysolde de Lancie", "text": "*(The lorgnette comes back up, a shield.)* Afraid of having done *nothing.* How *quaint.* I'm afraid of *dying*, dead thing, the ordinary way, like a *commoner.* *(but she doesn't quite meet your eye.)* Don't pretend to read me. Better-bred people have failed. Send me immortality or send me nothing. ...The second one I've already got, apparently. *(she frowns at that, and waves you off.)*", "dynamic": false, "auto": "close", "onEnter": [], "choices": []}, {"id": "close", "speaker": "Ysolde de Lancie", "text": "*(She reclines back into her boredom — but you'd swear the lorgnette stays trained on you a moment too long, and that somewhere behind the languor, a girl who has never needed anything has just discovered the terror and the thrill of *wanting to matter.*)*", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "npc.gate.threnn", "file": "GateDenizensFourContent.cs", "title": "Npc · Gate · Threnn", "start": "0", "nodes": [{"id": "0", "speaker": "Archivist Threnn", "text": "*(A precise woman in a counting-house surrounded by ledgers, who covers a page as you enter the way a gambler covers a hand.)* Whatever you've heard, the *official* harvest-toll is four hundred and twelve souls, district-wide, year to date, and that is the figure the property assessments are based on, and that is the figure that *stays.* *(she folds her hands over the hidden page.)* You're the Returned. You'll have seen more bodies than my ledger admits. I'd ask you, as a *professional* courtesy, to keep that arithmetic to yourself. The Upper City's land values rest on a comfortable number, and a great many *innocent* fortunes would crater if the *true* one got about.", "dynamic": false, "auto": "1", "onEnter": [{"key": "npc.threnn_met", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "Archivist Threnn", "text": "*(She taps the covered page.)* You think me ghoulish. I'm an *archivist.* I record what is, and what *is*, Returned, is that a city which admits its true death-toll is a city whose patriars flee, whose rents collapse, whose *remaining* living lose the homes they have left. *(coldly reasonable.)* So I keep two ledgers. The *true* one — *(she touches it, and her composure flickers)* — and the *survivable* one. And I tell myself the lie keeps the living housed, which is *also* a mercy, of a colder kind. *(she meets your eyes.)* Tell me I'm wrong. Tell me the truth doesn't crater a fortune that shelters real families. Tell me an honest number wouldn't kill more of the living than my lie ever buried.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "[INSIGHT 17] \"The true ledger isn't for property values. It's the only honest grave any of these people will ever get. You keep it because *someone* has to count them right — even if you can't say so.\"", "next": "truegrave", "fail": "defend", "checkDC": 17, "checkAbility": "Wisdom"}, {"text": "\"Show me the true ledger. The dead deserve an accurate count more than the patriars deserve cheap rent.\"", "next": "truecount", "fail": null, "effects": [{"key": "sq.threnn_true_ledger", "op": "SetTrue"}]}, {"text": "\"Both can be true, Threnn. Keep the lie public — but give the true count to Lula's list, where the names can rest right.\"", "next": "lula", "fail": null, "conditions": [{"key": "sq.lulaslist_active", "op": "RequireBoolTrue"}]}, {"text": "\"You've made forgetting into bookkeeping. That's the most respectable evil in this whole city.\"", "next": "evil", "fail": null, "effects": [{"key": "companion.garrow.approval", "op": "AddInt", "amount": -1}]}]}, {"id": "truegrave", "speaker": "Archivist Threnn", "text": "*(Her hand stills on the covered page, and when she speaks the precision has gone soft.)* ...The only honest grave. *(quietly.)* You've seen it, then. What I couldn't say even to myself. *(she uncovers the page — column after column of names, in a hand far more careful than any property ledger requires.)* I tell the world it's for the assessments. The truth is I cannot *bear* for them to be a round number. Four hundred and twelve is a *figure.* But here — *(she touches a name)* — here is Hessel, who mended nets, and here is Asa, who sold winkles, and I have written each one *correctly*, in full, because if I am the only person in this city keeping the *true* count, then I am the only person treating them as *subtractions from something that mattered* rather than *adjustments to a land value.* *(she swallows.)* I am a coward who hides it behind arithmetic. But the arithmetic is *true*, Returned. It's the truest thing in the Upper City. And no one was ever meant to see it but the dead.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.threnn_true_ledger_revealed", "op": "SetTrue"}, {"key": "sq.threnn_true_ledger", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 5}], "choices": []}, {"id": "truecount", "speaker": "Archivist Threnn", "text": "*(She hesitates, the archivist warring with the accountant.)* The true count. *(slowly, she slides the page toward you.)* Take it. *(quietly.)* I have wanted, for a year, to be *forced* to surrender it — so that the cratering of fortunes would be *your* doing, not mine, and I could keep my comfortable lie and my comfortable conscience both. *(she stops you, hand on yours.)* But understand what you carry. This page, made public, *will* collapse rents, *will* drive patriars to flee, *will* make some of the living homeless to honor the dead. *(she lets go.)* I've kept the lie because I couldn't choose. You can. So choose with your eyes open, Returned — the dead's true grave, or the living's cheap shelter. I never found the courage to pick. Gods help you if you do.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.threnn_surrenders_ledger", "op": "SetTrue"}, {"key": "sq.threnn_true_ledger", "op": "SetTrue"}], "choices": []}, {"id": "lula", "speaker": "Archivist Threnn", "text": "*(She blinks, the accountant genuinely startled by an *elegant* solution.)* Both ledgers. *(slowly.)* The lie stays public — the rents hold, the living keep their homes — but the *true* count goes to the child's list, where it's a *memorial*, not an *assessment.* *(a long pause.)* That's... that's the first proposal I've heard that doesn't make me choose between the dead and the living. *(she copies the page with swift, practiced strokes — an archivist's true gift.)* The girl gets the names, exact and whole. The patriars keep their comfortable number. And I — *(her voice catches)* — I get to stop being the only one who knows the truth, which is a loneliness I'd not wish on a tax collector. Take it to her. Tell her an archivist says: *count them right, where it can't crater anything but the silence.* That, I can finally afford.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.threnn_gives_to_lula", "op": "SetTrue"}, {"key": "sq.threnn_true_ledger", "op": "SetTrue"}, {"key": "sq.lulaslist_active", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "evil", "speaker": "Archivist Threnn", "text": "*(She receives it without flinching, an accountant tallying a debt.)* The most respectable evil in the city. *(quietly.)* Yes. I've thought so myself, at the bottom of the true ledger, where no assessment goes. *(she covers the page again.)* But respectable evil keeps the living housed, Returned, and dramatic virtue would put grieving widows on the street to honor the grieving dead, and I have never been able to weigh one grief against the other and call it *solved.* *(coldly.)* You judge the bookkeeping. Fine. But before you do — find me the moral arithmetic that saves *both* the dead's honor and the living's roof, and I will adopt it gladly. I've been looking for it for a year. The ledger's the best I could manage. It's not enough. I *know* it's not enough. Knowing isn't the same as having a better column to write in.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.threnn_judged", "op": "SetTrue"}], "choices": []}, {"id": "defend", "speaker": "Archivist Threnn", "text": "*(The precision snaps back into place.)* A sentimental theory. *(coolly.)* The ledger is for the assessments, nothing more. I am an archivist; I do not *grieve* in columns. *(but her hand has not left the covered page.)* Good day, Returned. The figure is four hundred and twelve. It will remain four hundred and twelve. Some numbers are load-bearing, whatever lies beneath them.", "dynamic": false, "auto": "close", "onEnter": [], "choices": []}, {"id": "close", "speaker": "Archivist Threnn", "text": "*(She returns to her two ledgers — the survivable lie and the unbearable truth — and you carry away the understanding that even here, in the coldest counting-house in the Upper City, *someone* could not stop herself from writing the names of the forgotten down correctly, where only the dead would ever read them.)*", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "npc.gate.marrow", "file": "GateDenizensFourContent.cs", "title": "Npc · Gate · Marrow", "start": "0", "nodes": [{"id": "0", "speaker": "Old Marrow", "text": "*(Propped against a headstone in Grud's graveyard, grey and unmistakably deceased, a corpse rattles a dice cup with surprising dexterity.)* Grud not about? Good. *(the dead jaw works; the voice is dry as turned earth.)* Then I'll deal you in before the big lummox 'plants' me again. *(he is, you note, entirely a corpse, and entirely animate, and entirely cheating — you can see the loaded die from here.)* Name's Marrow. Been dead, oh, three months now. Grud keeps burying me; I keep coming up for the morning game. He thinks I don't notice the dirt. I think he doesn't notice I *win.* We're both being polite. It's the foundation of every good friendship — mutual, courteous denial.", "dynamic": false, "auto": "1", "onEnter": [{"key": "npc.marrow_met", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "Old Marrow", "text": "*(He rattles the cup; the loaded die clicks.)* Now you're wondering — and don't deny it, the living always wonder — *why* a dead man's still rattling about a graveyard cheating at dice instead of off to his rest. *(he chuckles, a sound like gravel.)* Simple. I *owe* Grud thirty years of dice debts, see, from when we were both breathing, and a Tendir does *not* skip out on a debt by the cheap expedient of *dying.* *(he sets down the cup.)* So I stay. I lose on purpose at first — let him win back a copper here, a copper there — and then I cheat to even it, so we end each morning square, and neither of us ever has to say goodbye. *(quietly, for a corpse.)* That's the secret nobody tells you about the dead, friend. Some of us don't linger out of *unfinished business.* We linger out of *unfinished friendship.* The business I'd happily leave owing.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "[INSIGHT 14] \"You're not paying off a debt. You're staying because Grud buried his whole family, and you're the one friend the harvest can't take from him — because you're already gone.\"", "next": "friend", "fail": "deny", "checkDC": 14, "checkAbility": "Wisdom"}, {"text": "\"Does Grud know you cheat? Does he know you *know* he knows you're dead?\"", "next": "know", "fail": null}, {"text": "\"Loaded die, third from the left. Rest, Marrow. The debt's paid — you stayed three months past dying to square it.\"", "next": "rest", "fail": null}, {"text": "\"Deal me in, then. A dead man's game sounds like the only honest table left.\"", "next": "deal", "fail": null, "effects": [{"key": "companion.varra.approval", "op": "AddInt", "amount": 2}]}]}, {"id": "friend", "speaker": "Old Marrow", "text": "*(The dice cup goes still in his grey hands. For a long moment the corpse just regards you.)* ...Well. *(quietly, the gravel softening.)* Aren't you the sharp one. *(he sets the cup down.)* Aye. The harvest took his whole family in the bad winter — eight of them, all at once, and Grud planted every one with a joke on his lips and his heart in pieces. *(the dead eyes are, impossibly, wet.)* And I thought: the harvest can take the *living* from that big daft fellow, but it can't take *me* — I'm already *gone*, see, already filed, nothing left for the nothing to *want.* *(he chuckles, wet.)* So I'm the one friend that can't be harvested out from under him. I stay to lose at dice of a morning so he's got *one* face that turns up every day, reliable as the dirt. *(quietly.)* Don't tell him I said so. He thinks it's the debt. Let him think it's the debt. A man who's buried eight can't bear to know he's being *pitied* by a corpse. Let it be dice. Dice he can stand.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.marrow_truth", "op": "SetTrue"}, {"key": "npc.grud_has_marrow", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "know", "speaker": "Old Marrow", "text": "*(He wheezes a laugh.)* Does Grud *know.* *(he shakes his grey head, fond.)* 'Course he knows. He's a gravedigger, friend, not a fool — he knows a corpse when he plants one, and he's planted *me* a dozen times. *(he taps his temple, where the skin's gone to parchment.)* And I know he knows. And he knows I know he knows. *(he picks up the cup.)* But the *morning* he *says* it — the morning one of us admits I'm a dead man cheating a grieving friend at dice — that's the morning it has to *stop*, see. That's the morning I rest and he's alone again. *(quietly.)* So we don't say it. We just play. Some kindnesses can only survive in the *unsaid*, friend. Name them out loud and they die of the exposure. Now — you playing, or philosophizing? With me it's hard to do both; I've only the one expression left.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.marrow_the_unsaid", "op": "SetTrue"}], "choices": []}, {"id": "rest", "speaker": "Old Marrow", "text": "*(He goes very still. The loaded die rolls from his slackening grey fingers and comes up, for once, an honest number.)* ...You'd send me off. *(quietly, without rancor.)* Aye. The debt's paid. Three months of squaring it, copper by copper. I *could* rest. *(he looks toward the graveyard gate, where the morning light is coming up gold.)* But here's the thing you've not weighed, sharp as you are: if I rest, Grud's alone of a morning. The harvest took his eight, and I'm the ninth face, the only one left that turns up reliable. *(he picks the honest die back up, and palms the loaded one again, deliberate.)* So no. Not yet. The debt's an excuse and we both know it. I'll stay till *Grud's* ready to lose his last friend — and that big daft grieving man is not ready, not near. *(he rattles the cup.)* Rest can wait. Friendship's the longer debt. Deal you in?", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.marrow_stays_for_grud", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 3}], "choices": []}, {"id": "deal", "speaker": "Old Marrow", "text": "*(He brightens, insofar as a corpse can.)* HA! A *living* one, sitting down to a dead man's game! *(he deals with grey, dextrous fingers.)* Now *this* is a morning. *(he leans in, conspiratorial.)* Fair warning, friend — I cheat. Shamelessly. It's the one vice the grave didn't cure. But I cheat *gentle*, just enough to keep things even, never enough to *win* — winning's rude, and besides, a corpse with money's got nowhere to spend it. *(he rolls; the loa
