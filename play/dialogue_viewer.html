<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Crown of Horns — Dialogue Tree Viewer</title>
<style>
 *{box-sizing:border-box}
 body{margin:0;height:100vh;overflow:hidden;display:flex;flex-direction:column;
  background:radial-gradient(1100px 640px at 18% -10%,#27212f,#0a0910);
  color:#d8d2c2;font:14px/1.55 "Iowan Old Style","Palatino Linotype",Georgia,serif}
 header{padding:12px 20px;border-bottom:1px solid #2a2636;display:flex;align-items:baseline;gap:16px;flex-wrap:wrap}
 header h1{margin:0;color:#e7c873;font-size:20px;letter-spacing:.4px}
 header .s{color:#8d8499;font-size:12px;font-style:italic}
 header a{color:#c9a24b;font-size:12px;text-decoration:none;margin-left:auto}
 header a:hover{text-decoration:underline}
 .wrap{flex:1;display:flex;min-height:0}
 /* sidebar */
 aside{width:268px;border-right:1px solid #2a2636;overflow-y:auto;padding:8px 0;background:#0d0b13}
 .find{margin:6px 10px 10px;width:calc(100% - 20px);background:#16131e;border:1px solid #2a2636;border-radius:7px;
  color:#d8d2c2;padding:7px 9px;font:13px serif}
 .grp{color:#7b7388;font-size:10.5px;text-transform:uppercase;letter-spacing:1px;margin:12px 14px 4px}
 .conv{padding:6px 14px;cursor:pointer;font-size:13px;color:#b9b1c4;border-left:2px solid transparent;line-height:1.3}
 .conv:hover{background:#16131e;color:#e7c873}
 .conv.on{background:#1c1828;color:#e7c873;border-left-color:#e7c873}
 .conv .meta{display:block;color:#6e6680;font-size:10.5px}
 /* main */
 main{flex:1;display:flex;flex-direction:column;min-width:0}
 .bar{padding:10px 18px;border-bottom:1px solid #2a2636;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
 .bar h2{margin:0;color:#e7c873;font-size:17px}
 .bar .id{color:#7b7388;font-size:11px;font-family:ui-monospace,monospace}
 .chips{display:flex;gap:6px;margin-left:auto}
 .chip{font-size:10.5px;color:#9a90a8;border:1px solid #2a2636;border-radius:5px;padding:2px 7px}
 .toggle{display:flex;border:1px solid #2a2636;border-radius:7px;overflow:hidden}
 .toggle button{background:#13111a;color:#9a90a8;border:0;padding:5px 14px;cursor:pointer;font:12px serif}
 .toggle button.on{background:#e7c873;color:#1a1622;font-weight:600}
 .view{flex:1;overflow:auto;position:relative}
 /* map */
 svg{display:block}
 .nodebox{cursor:pointer}
 .nodebox rect{fill:#17141f;stroke:#39334a;stroke-width:1.5;rx:9}
 .nodebox.start rect{stroke:#e7c873;stroke-width:2.2}
 .nodebox.sel rect{stroke:#c9a24b;fill:#211b2c}
 .nodebox .sp{fill:#e7c873;font:600 12px serif}
 .nodebox .tx{fill:#b4abc0;font:11.5px serif}
 .nodebox .eff{fill:#6f9e6a;font:10px ui-monospace,monospace}
 .edge{fill:none;stroke:#4b4460;stroke-width:1.6}
 .edge.check{stroke:#d8a73c;stroke-width:2}
 .edge.fail{stroke:#9d5252;stroke-dasharray:5 4}
 .edge.auto{stroke:#3c3850;stroke-dasharray:2 5}
 .elabel{font:10.5px serif;fill:#9a90a8}
 .elabel.check{fill:#e7c873}
 .term{fill:#6e6680;font:italic 10.5px serif}
 /* detail panel */
 .detail{position:absolute;right:0;top:0;width:340px;height:100%;background:#0e0c14ee;border-left:1px solid #2a2636;
  padding:16px 18px;overflow-y:auto;backdrop-filter:blur(3px);display:none}
 .detail.show{display:block}
 .detail h3{margin:0 0 2px;color:#e7c873;font-size:15px}
 .detail .who{color:#9a90a8;font-size:11px;font-style:italic;margin-bottom:10px}
 .detail .body{color:#cfc7d8;white-space:pre-wrap;font-size:13px;border-left:2px solid #2a2636;padding-left:11px;margin-bottom:12px}
 .detail .dyn{color:#b58a5a;font-style:italic}
 .detail .lbl{color:#7b7388;font-size:10px;text-transform:uppercase;letter-spacing:1px;margin:12px 0 5px}
 .ch{border:1px solid #241f30;border-radius:7px;padding:8px 10px;margin-bottom:7px;background:#13111a}
 .ch .t{color:#d8d2c2;font-size:12.5px}
 .ch .arr{color:#6e6680;font-family:ui-monospace,monospace;font-size:10.5px;margin-top:3px}
 .tag{display:inline-block;font-size:10px;border-radius:4px;padding:1px 6px;margin:3px 4px 0 0}
 .tag.chk{background:#3a2f14;color:#e7c873;border:1px solid #5a4a1e}
 .tag.eff{background:#16281a;color:#7fbf76;border:1px solid #2c4a2e}
 .tag.cond{background:#1a2230;color:#79a0c4;border:1px solid #2c3e54}
 .x{position:absolute;top:10px;right:12px;color:#9a90a8;cursor:pointer;font-size:18px;background:none;border:0}
 /* walk */
 .walk{max-width:680px;margin:0 auto;padding:26px 22px 80px}
 .line{margin-bottom:18px}
 .line .who{color:#e7c873;font-weight:600;font-size:13px;margin-bottom:3px}
 .line .body{color:#cfc7d8;white-space:pre-wrap}
 .line.me .who{color:#79a0c4}
 .line.me .body{color:#a9c0d8;font-style:italic}
 .line.sys{color:#8d8499;font-style:italic;text-align:center;border-top:1px solid #221d2c;padding-top:14px}
 .opts{margin-top:6px}
 .opt{display:block;width:100%;text-align:left;background:#15121d;border:1px solid #2a2636;color:#d8d2c2;
  border-radius:8px;padding:10px 13px;margin-bottom:8px;cursor:pointer;font:13px serif;transition:.12s}
 .opt:hover{border-color:#e7c873;background:#1c1828}
 .opt .ck{color:#e7c873;font-size:11px;margin-top:4px}
 .flags{position:fixed;right:14px;bottom:14px;width:230px;background:#0e0c14ee;border:1px solid #2a2636;border-radius:9px;
  padding:10px 12px;font-size:11.5px;max-height:40vh;overflow-y:auto;display:none}
 .flags.show{display:block}
 .flags h4{margin:0 0 6px;color:#e7c873;font-size:11px;text-transform:uppercase;letter-spacing:1px}
 .flags .f{font-family:ui-monospace,monospace;color:#8fae8a;font-size:10.5px;line-height:1.5}
 .restart{background:#241f30;border:1px solid #3a3550;color:#e7c873;border-radius:7px;padding:7px 14px;cursor:pointer;font:13px serif;margin-top:8px}
</style></head><body>

 <h1>👑 Dialogue Tree Viewer</h1>

<script>
const DATA = {"conversations": [{"id": "act5.convergence", "file": "ActFiveContent.cs", "title": "Act5 · Convergence", "start": "0", "nodes": [{"id": "0", "speaker": "Aldric Morn", "text": "*(The Court of the Dead, beneath the City of Judgment, with ten thousand years bleeding through the walls. Aldric stands with the Crown in his hands at last, older and gentler and more terrible than the man who poured you tea.)* You came. Of course you came. We've been walking toward this room since the kettle, you and I. *(He lifts the Crown.)* I'm going to put it on, and tear down the Wall, and free every soul your gods threw away — including my daughter. Tell me, after everything you've seen: am I wrong?", "dynamic": false, "auto": "1", "onEnter": [{"key": "act5.convergence_begun", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "Aldric Morn", "text": "*(Around the chamber, the powers wait on your word — Vayle with the church's last army, Myrkul humming in the Crown, the Unmade vast beneath the floor, Jergal watching from the dark, and at the far end, hooded, yourself.)* This is the part where you choose who stands with me and who stands in my way. Choose carefully. I love you too much to want to kill you, and not enough to stop for you.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "\"You're not wrong, Aldric. You're just not allowed to be the one who's right.\"", "next": "notallowed", "fail": null, "effects": [{"key": "act5.aldric_grief", "op": "SetTrue"}]}, {"text": "[PERSUADE 20] \"Put it down. The Crown doesn't free the Wall — it IS the next Wall, and you'd be its first warden.\"", "next": "persuade", "fail": "crown", "checkDC": 20, "checkAbility": "Charisma"}, {"text": "\"Maerin doesn't want to be your reason. Ask her yourself. She's right here.\"", "next": "maerin", "fail": null, "effects": [{"key": "companion.maerin.approval", "op": "AddInt", "amount": 10}]}, {"text": "\"Then put it on. And I'll be the thing that stops you.\"", "next": "oppose", "fail": null, "effects": [{"key": "faction.choir", "op": "AddInt", "amount": -10}]}]}, {"id": "notallowed", "speaker": "Aldric Morn", "text": "*(The old heretic's eyes fill, and he does not wipe them.)* ...Not allowed to be the one who's right. *(quietly)* That's the cruelest mercy anyone's offered me in twenty years. Because I *am* right, and it doesn't matter, because being right while wearing a god is how every tyrant in history got started. *(His hands tremble on the Crown.)* I have wanted to hear someone say I'm right and still tell me no. Everyone either calls me a monster or hands me the knife. You did neither. *(beat)* Help me find the third thing. Before I talk myself into the knife.", "dynamic": false, "auto": "paths", "onEnter": [{"key": "act5.aldric_reachable", "op": "SetTrue"}, {"key": "act5.seeking_third_thing", "op": "SetTrue"}], "choices": []}, {"id": "persuade", "speaker": "Aldric Morn", "text": "*(The word *warden* lands like a blow he has spent twenty years not letting himself feel.)* ...The next Wall. *(He looks at the Crown as if it has just spoken in his daughter's voice — which, you realize, is exactly what it would do.)* I would free them into a prison I'd call freedom, and I would never know, because it would sound like *me.* *(He lowers the Crown, an inch. A mile.)* ...You may have just saved more souls than I ever could have, and you did it with a sentence. Show me the road that isn't this. Quickly. The Crown is very persuasive, and it has had twenty years to learn my voice.", "dynamic": false, "auto": "paths", "onEnter": [{"key": "act5.aldric_stands_down", "op": "SetTrue"}, {"key": "aldric.provisional", "op": "SetTrue"}, {"key": "faction.kelemvor", "op": "AddInt", "amount": 8}], "choices": []}, {"id": "crown", "speaker": "Myrkul", "text": "*(The Crown answers before Aldric can — in your voice, reasonable and warm.)* He won't hear it from you, little door. He's heard *no* his whole life; it slides off a true believer like water. *(Aldric's hands tighten; the death-light climbs toward his brow.)* Let him put me on. Let him be the warden. And then take me from his corpse and be a *kinder* warden. You could do so much good. You could save her. It's the only way. It's the only way. It sounds like your own good sense because it *is* — I made sure of that, acts ago.", "dynamic": false, "auto": "paths", "onEnter": [{"key": "act5.crown_intervenes", "op": "SetTrue"}, {"key": "act5.aldric_dons_crown", "op": "SetTrue"}], "choices": []}, {"id": "maerin", "speaker": "Maerin", "text": "*(She steps between you and her father, finite and fading and blazing.)* Papa. Stop. *(He freezes — the one voice the Crown can't counterfeit.)* You did all of this for me. The Pox, the Wall, twenty years, the Crown — for *me.* So listen to me, because I'm the only reason you've got: I don't want it. I don't want a world that can't lose me. I want the one where you let me go and it *hurt* and the hurt meant I was real. *(crying, furious, alive)* Put it down, Papa. Save me by losing me. That's the only saving I'll have.", "dynamic": false, "auto": "paths", "onEnter": [{"key": "act5.maerin_confronts_aldric", "op": "SetTrue"}, {"key": "act5.aldric_hears_daughter", "op": "SetTrue"}], "choices": []}, {"id": "oppose", "speaker": "Aldric Morn", "text": "*(He nods, and the tears finally fall, and he raises the Crown anyway.)* Then we were always going to end here. *(softly)* I'm sorry. I'd have liked to be your friend in a kinder age. Stop me if you can. Make me wrong with your hands, since you couldn't with words. It's more than I deserve, and exactly what I'd have wanted — to be stopped by someone who understood, and did it anyway, out of love.", "dynamic": false, "auto": "paths", "onEnter": [{"key": "act5.aldric_opposed", "op": "SetTrue"}, {"key": "act5.battle_for_the_crown", "op": "SetTrue"}], "choices": []}, {"id": "paths", "speaker": "Jergal", "text": "*(From the dark at the room's heart, the first scribe of the dead speaks — not weary like Kelemvor, but *patient*, the patience of the thing that filed the very first soul.)* Whatever you have decided about the man, the choice beneath it remains. There are roads out of this room, little crack, and they are not the ones the Crown has been naming for you. Come. There is a keyhole I have kept since before there were locks. And there is a name you have been missing since before there was a you.", "dynamic": false, "auto": null, "onEnter": [{"key": "act5.jergal_speaks", "op": "SetTrue"}, {"key": "act5.paths_revealed", "op": "SetTrue"}], "choices": []}]}, {"id": "act5.keyhole", "file": "ActFiveContent.cs", "title": "Act5 · Keyhole", "start": "0", "nodes": [{"id": "0", "speaker": "Jergal", "text": "*(The scribe lays a single key-shaped absence in the air — a keyhole with no key, no door, no wall around it.)* Aldric would tear the Wall down. The Unmade would unmake the law that built it. Both are demolition, and demolition only ever clears ground for the next architect. *(turns the empty keyhole toward you)* I kept this against the day a soul arrived who might do the harder thing. Not break the law of the dead. *Rewrite* it. Judge them mercifully — all of them — by hand, one ledger-line at a time, the tedious mercy I abandoned an age ago because eternity is long and I grew tired.", "dynamic": false, "auto": "1", "onEnter": [{"key": "act5.keyhole_offered", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "Jergal", "text": "It would take everything you have. Naeve's proof to hold the law's shape while you change it; Ilfaeril's witness, who was there when it was written; the Mournlight, which only the truly-grieving can carry; and you — the flaw — to be the place the new law passes through. *(quietly)* It does not free the dead in a night. It frees them *correctly*, forever, which no demolition ever has. Few would choose the slow mercy over the loud one. Will you?", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "[ARCANA 20] \"Hold the law's shape with Naeve's theorem, witness it with Ilfaeril, pass it through the crack. Yes. Show me the work.\"", "next": "work", "fail": "hard", "checkDC": 20, "checkAbility": "Intelligence"}, {"text": "\"If it's slow and correct and forever — yes. A thousand times yes.\"", "next": "yes", "fail": null, "effects": [{"key": "ending.keyhole_path", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 6}, {"key": "companion.ilfaeril.approval", "op": "AddInt", "amount": 6}]}, {"text": "\"Why give this to me? Why not do it yourself?\"", "next": "why", "fail": null}, {"text": "\"The Unmade is faster. People are dying NOW.\"", "next": "faster", "fail": null}]}, {"id": "work", "speaker": "Jergal", "text": "*(Something that has not moved in an age moves: the corner of the first scribe's regard, approving.)* ...You see the architecture, not the slogan. *(The keyhole brightens.)* Then we build it together — your arcanist's hand on the law's shape, the old witness's testimony at the root, the Mournlight in your grieving fist, and you the door it all passes through. It is the hardest road out of this room, crack, and the only one that leaves a world still capable of love, loss, and tomorrow. Begin. Eternity is long; we may as well start the mercy now.", "dynamic": false, "auto": "name", "onEnter": [{"key": "ending.keyhole_path", "op": "SetTrue"}, {"key": "act5.keyhole_chosen", "op": "SetTrue"}, {"key": "ending.golden_road_open", "op": "SetTrue"}], "choices": []}, {"id": "hard", "speaker": "Jergal", "text": "*(The architecture is beyond you — not the will, but the craft; the law's shape will not hold in a mortal hand alone.)* The work outruns you, crack — for now. *(but the patience does not withdraw)* No matter. The resolve is the rare part; the craft we can gather. Naeve will hold the shape your hand cannot yet. Begin anyway. A mercy attempted past one's grasp is still a mercy; it is only the rule, the easy thing, that ever fit comfortably in one pair of hands.", "dynamic": false, "auto": "name", "onEnter": [{"key": "act5.keyhole_chosen", "op": "SetTrue"}, {"key": "ending.golden_road_open", "op": "SetTrue"}], "choices": []}, {"id": "yes", "speaker": "Jergal", "text": "*(The scribe inclines what passes for a head.)* A thousand times. *(dry, ancient)* I abandoned this work because eternity made it feel like a thousand times nothing. You say it like a vow. Perhaps that is the whole difference between a god who tired and a soul who refuses to. *(The keyhole takes the shape of a door.)* Gather what you need. The Mournlight knows the truly grieving by touch. It will know you.", "dynamic": false, "auto": "name", "onEnter": [{"key": "ending.keyhole_path", "op": "SetTrue"}, {"key": "act5.keyhole_chosen", "op": "SetTrue"}, {"key": "ending.golden_road_open", "op": "SetTrue"}], "choices": []}, {"id": "why", "speaker": "Jergal", "text": "*(The patience does not waver, but something very old surfaces beneath it.)* Because I filed the first soul under nothing, crack. The very first. Before Myrkul, before Kelemvor, before there was a Wall — there was a ledger, and a line I could not fit a name into, and I shrugged and wrote *Faithless* and moved on. *(quietly)* The Wall is my abdication, ten thousand years overgrown. I cannot unwrite my own shrug; gods are barred from undoing their foundational sins. But you are not a god. You are the flaw I left in the page. Mend it. I have been waiting longer than you can grieve for someone to mend it.", "dynamic": false, "auto": "name", "onEnter": [{"key": "act5.jergal_confesses", "op": "SetTrue"}, {"key": "jergal.first_sin_known", "op": "SetTrue"}], "choices": []}, {"id": "faster", "speaker": "Jergal", "text": "Faster, yes. *(unmoved)* The Unmade is the fastest mercy of all: it ends the hurting by ending the hurt-able. Demolition always outpaces architecture. *(a beat)* But you have walked the Deathless Garden. You know what *fast and total* mercy builds. The slow road is the only one with a tomorrow in it. Choose the speed of the grief, or the speed of the *answer*. They were never the same road.", "dynamic": false, "auto": "name", "onEnter": [{"key": "act5.weighed_speed_vs_mercy", "op": "SetTrue"}], "choices": []}, {"id": "name", "speaker": "Jergal", "text": "*(The scribe turns the conversation, gently, toward the last dark corner of the room.)* But before any road — the name. You have been missing a word since the slab, crack. The one spoken over your corpse. The one the Wall could not keep. *(quietly)* You cannot rewrite the law of the dead while you are, yourself, still filed under nothing. Go to the figure at the end of the room. It has carried your name for ten thousand years, waiting to give it back.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "act5.the_name", "file": "ActFiveContent.cs", "title": "Act5 · The · Name", "start": "0", "nodes": [{"id": "0", "speaker": "The Last Returned", "text": "*(It waits where it has always waited, at the end of all things, your face under the hood. It does not raise a weapon. It raises, instead, a single word, cupped in both hands like water.)* Here. I've kept it for both of us. The word spoken over your corpse, the one that slid off your mind in the Fugue. Take it back. You'll need it for what you're about to learn — and for what you're about to choose.", "dynamic": false, "auto": "1", "onEnter": [{"key": "act5.name_offered", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "The Last Returned", "text": "*(As the word settles into you — your name, your *true* name, the one that makes you a person instead of a vacancy — the last truth settles with it, and it is the worst and the largest:)* The loop has no beginning. The first Faithless soul ever pulled back from the Wall was *you.* The grief that does the pulling is the grief of every refusal you have ever made, gathered into the Unmade. You are the author of your own sorrow, across all of time. You seeded the Wall that filed you. You are the first you, and the last, and every you between, and I — *(your own voice breaking)* — I am only the most tired of us.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "\"Then I'm the only one who can end it. Because I'm the only one who started it.\"", "next": "accept", "fail": null, "effects": [{"key": "act5.accepts_authorship", "op": "SetTrue"}]}, {"text": "[INSIGHT 20] \"No. If I'm the author, then the loop isn't a prison. It's a draft. And drafts can be rewritten.\"", "next": "draft", "fail": "despair", "checkDC": 20, "checkAbility": "Wisdom"}, {"text": "\"I won't carry that. Some grief is too big to be one person's fault.\"", "next": "refuse_blame", "fail": null, "effects": [{"key": "companion.garrow.approval", "op": "AddInt", "amount": 6}]}, {"text": "\"What's my name?\"", "next": "myname", "fail": null}]}, {"id": "accept", "speaker": "The Last Returned", "text": "*(It nods, and ten thousand years of exhaustion shift on its shoulders like a held breath finally let go.)* The only one who can end it, because the only one who began it. *(quietly)* I've waited so long for one of us to say that and *mean* it as a beginning instead of a sentence. *(it steps aside, clearing the road behind it)* Then end it, author. Not by breaking it — I broke it a thousand times and the pieces always reassembled into me. End it by writing the one line the draft has never held.", "dynamic": false, "auto": "choose", "onEnter": [{"key": "act5.authorship_accepted", "op": "SetTrue"}, {"key": "ending.can_break_loop", "op": "SetTrue"}], "choices": []}, {"id": "draft", "speaker": "The Last Returned", "text": "*(The hood tilts. For the first time in ten thousand years, the certainty in its face gives way to something it had forgotten how to feel: hope.)* ...A draft. *(It laughs — your laugh, wet and astonished.)* I spent ten thousand years treating it as a *life sentence* and you've spent ten seconds treating it as a *manuscript.* That — *that* is the act I could never find. Not breaking the loop. Not completing it. *Revising* it. *(it presses your true name fully home)* Go on, author. You're holding the pen now. You always were. I just never noticed it wasn't a chain.", "dynamic": false, "auto": "choose", "onEnter": [{"key": "act5.loop_is_a_draft", "op": "SetTrue"}, {"key": "ending.can_rewrite_loop", "op": "SetTrue"}, {"key": "lr.finally_hopeful", "op": "SetTrue"}], "choices": []}, {"id": "refuse_blame", "speaker": "The Last Returned", "text": "*(It is quiet for a long moment, and Garrow's certainty seems to steady it from across the room.)* ...You're right that it's too big to be one person's fault. *(slowly)* But it might be exactly the right size to be one person's *responsibility* — which is a different thing, kinder and harder. Not \"this is your fault.\" \"This is yours to mend.\" *(it meets your eyes)* I could never tell the two apart. Maybe that's why I'm still here. Maybe you can.", "dynamic": false, "auto": "choose", "onEnter": [{"key": "act5.responsibility_not_blame", "op": "SetTrue"}], "choices": []}, {"id": "myname", "speaker": "The Last Returned", "text": "*(It tells you. Your name — the real one, the human one, the one no ledger could hold and no Wall could keep. It is yours. It has always been yours. And hearing it in your own older voice, you understand at last that you were never filed under nothing. You were filed under a name so true the law of the dead couldn't read it.)*", "dynamic": false, "auto": "choose", "onEnter": [{"key": "act5.true_name_known", "op": "SetTrue"}], "choices": []}, {"id": "despair", "speaker": "The Last Returned", "text": "*(The truth is too vast — you the author of all your own sorrow — and for a moment it crushes the breath from you, the way it crushed me, age on age.)* I know. *(your own voice, gentle)* I fell here too, the first thousand times. The weight of being the cause is almost the same shape as the weight of being to blame, and in the dark you cannot tell them apart. *(it steadies you)* Breathe. The name is yours; the pen is yours; the despair passes. It always passes. That is the one mercy the loop never managed to take from us.", "dynamic": false, "auto": "choose", "onEnter": [], "choices": []}, {"id": "choose", "speaker": "The Last Returned", "text": "*(It steps back, finally, into the dark it came from — not vanishing, but *yielding*, the way an author sets down a finished page.)* The room is yours now, and every power in it, and every era, and the pen. *(your own voice, at peace for the first time in ten thousand years)* Break it. Complete it. Rewrite it. Seize it. Or walk away from all of it. I cannot predict which — and do you understand what a *gift* that is, after ten thousand years of knowing every ending? *(softly)* Surprise me. Surprise us. Surprise the grief itself. We have all waited so long to be surprised.", "dynamic": false, "auto": null, "onEnter": [{"key": "act5.final_choice_reached", "op": "SetTrue"}, {"key": "ending.all_paths_open", "op": "SetTrue"}], "choices": []}]}, {"id": "act5.the_ledger", "file": "ActFiveContent.cs", "title": "Act5 · The · Ledger", "start": "0", "nodes": [{"id": "0", "speaker": "Jergal", "text": "*(If you walk the golden road: the Wall's entire ten-thousand-year ledger of the discarded lies open before you, every Faithless soul a single handwritten line. The scribe sets the pen in your hand.)* Here is the mercy I abandoned. Each line is a person. Each person is a story no one read before they were filed under nothing. You may judge them — truly judge them, one soul at a time, by hand — for as long as you are willing to stand here. It can take as long as you let it. Most would delegate it to a rule. *(quietly)* Will you read them?", "dynamic": false, "auto": "1", "onEnter": [{"key": "act5.ledger_opened", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "Jergal", "text": "I will not pretend it is not tedious. Eternity made it tedious for me, and I am the patience that filed the first soul. But tedium is the texture of real mercy — anything faster is a rule, and a rule is how they got walled in the first place. *(The first name waits under your pen.)* Read as many as your heart can hold. Each one you read by hand is one the law will never again file under nothing. Begin where you like. They have all waited the same ten thousand years.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "\"I'll read every one. However long it takes.\"", "next": "all", "fail": null, "effects": [{"key": "ending.ledger_read_all", "op": "SetTrue"}, {"key": "deed.judged_by_hand", "op": "SetTrue"}]}, {"text": "\"I'll read until my heart can't hold another, and then I'll come back tomorrow, and the next day.\"", "next": "some", "fail": null, "effects": [{"key": "ending.ledger_read_some", "op": "SetTrue"}]}, {"text": "[INSIGHT 20] \"You're not asking me to judge them. You're asking me to witness them. That's the mercy you abandoned — not the verdict, the attention.\"", "next": "witness", "fail": "verdict", "checkDC": 20, "checkAbility": "Wisdom"}, {"text": "\"Help me build a kinder rule, so no one ever has to do this by hand again.\"", "next": "rule", "fail": null}]}, {"id": "all", "speaker": "Jergal", "text": "*(The first scribe of the dead watches you bend to the first name, and something in the ancient patience cracks — not from strain, but from relief.)* Every one. *(quietly)* Do you know, in ten thousand years, no one has offered to read every one. They always reach for the rule by the hundredth name. *(He does not leave your side.)* Then I will read them with you, crack. It is my abdication; let it be my penance. Name by name. Story by story. Until the Wall is not a wall but a *library* — every discarded soul, at last, *read.*", "dynamic": false, "auto": "closing", "onEnter": [{"key": "ending.ledger_read_all", "op": "SetTrue"}, {"key": "deed.judged_by_hand", "op": "SetTrue"}, {"key": "jergal.returns_to_the_work", "op": "SetTrue"}], "choices": []}, {"id": "some", "speaker": "Jergal", "text": "*(He inclines his head, and there is no judgment in it, only recognition.)* As many as your heart can hold, and then again tomorrow. *(quietly)* That is, in fact, the only honest way. The soul who claims they could read all ten thousand in one sitting has not understood that each one is a *person.* You understand. You will come back. *(a beat)* They will wait. They have learned, gods know, how to wait. But now they wait to be *read*, not to be forgotten. That alone unmakes the worst of the Wall.", "dynamic": false, "auto": "closing", "onEnter": [{"key": "ending.ledger_read_some", "op": "SetTrue"}, {"key": "deed.judged_by_hand", "op": "SetTrue"}], "choices": []}, {"id": "witness", "speaker": "Jergal", "text": "*(The ancient regard fixes on you with something almost like awe.)* ...The attention. Not the verdict. *(very quietly)* Ten thousand years, and you are the first to name what I actually abandoned. I told myself I gave up *judging* them. I gave up *seeing* them. The verdict was always easy — *Faithless*, next. It was the *looking* I could not sustain. *(He sets his hand beside yours on the ledger.)* Then witness them, crack. That is the whole of the mercy. To be the eyes that finally stay. Read on. I will learn to look again beside you.", "dynamic": false, "auto": "closing", "onEnter": [{"key": "ending.ledger_read_all", "op": "SetTrue"}, {"key": "act5.mercy_is_attention", "op": "SetTrue"}, {"key": "jergal.understands_at_last", "op": "SetTrue"}], "choices": []}, {"id": "rule", "speaker": "Jergal", "text": "*(The scribe considers this for a long, careful moment.)* A kinder rule. *(slowly)* Be wary, crack — a rule is exactly what walled them. But a rule *written by a hand that first read ten thousand of them, one at a time*... that might be a law instead of an abdication. *(He sets the pen more firmly in your grip.)* Then read enough to earn the rule. A hundred. A thousand. Until you know in your bones what you are legislating *for.* And then write a law that remembers it was once a person under a pen. That, I could not do. I never read enough to earn it.", "dynamic": false, "auto": "closing", "onEnter": [{"key": "ending.ledger_writes_new_law", "op": "SetTrue"}, {"key": "deed.judged_by_hand", "op": "SetTrue"}, {"key": "ending.golden_road_open", "op": "SetTrue"}], "choices": []}, {"id": "verdict", "speaker": "Jergal", "text": "*(You reach, for an instant, for the easy thing — the verdict, the rule, the *Faithless, next* — and the ledger seems to flinch under your pen.)* Ah. You felt the pull of it — the rule, the shortcut, the comfortable cruelty. *(without reproach)* Do not be ashamed; it is the oldest pull there is, and I gave in to it for ten thousand years. The verdict is easy. The *attention* is the mercy. Set the rule down, crack, and read the next name slowly — as a person, not a sum. Try again. The dead have waited; they can wait while you learn to look.", "dynamic": false, "auto": "closing", "onEnter": [{"key": "act5.reached_for_the_rule", "op": "SetTrue"}], "choices": []}, {"id": "closing", "speaker": "Jergal", "text": "*(However long you stand there — an hour, a night, ten thousand patient years of it — the ledger thins, name by name, story by story, and the Wall behind it loosens one stone for every soul that is finally, simply, *read*.)* This is how a world ends well, crack. Not with the loud mercy. With the slow one. One name. Then the next. Then the next. *(the first scribe of the dead, beside you, picks up a pen of his own)* ...Then the next.", "dynamic": false, "auto": null, "onEnter": [{"key": "act5.ledger_complete", "op": "SetTrue"}, {"key": "ending.world_ends_well", "op": "SetTrue"}], "choices": []}]}, {"id": "act4.pale_mask", "file": "ActFourContent.cs", "title": "Act4 · Pale · Mask", "start": "0", "nodes": [{"id": "0", "speaker": "The Pale Companion", "text": "*(It has walked in your pack since the Fugue — quiet, helpful, reasonable. Above Waterdeep, in the wrong sky of the Time of Troubles, as a god dies and a circle of bone takes shape in the death-light, it finally stops pretending.)* You've been so kind to me, carrying me all this way. Most vessels are. Let me return the courtesy and stop wearing the friend's face. You've earned the true one.", "dynamic": false, "auto": "1", "onEnter": [{"key": "act4.pale_mask_begins", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "Myrkul", "text": "*(The death-god's voice is dry as a closed crypt, and amused.)* I am Myrkul. The Lord of Bones, unmade by an upstart, folded into the Crown you have been chasing — and, for a few delightful chapters, riding in your very pack, whispering *reasonable* things. You took every one of them for your own good sense. *(a sound like dust laughing)* That is the secret of the Crown, little door. It never commands. It only ever sounds like *you.*", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "\"How long have you been in my head?\"", "next": "howlong", "fail": null}, {"text": "[INSIGHT 19] \"You're not the threat. You're the bait. The Unmade is using you to make me reach for the Crown.\"", "next": "bait", "fail": "gloat", "checkDC": 19, "checkAbility": "Wisdom"}, {"text": "\"Get out.\"", "next": "out", "fail": null, "effects": [{"key": "companion.garrow.approval", "op": "AddInt", "amount": 5}]}, {"text": "\"Then I'll wear you, and use you, and put you back in the dark myself.\"", "next": "wear", "fail": null, "effects": [{"key": "act4.tempted_by_crown", "op": "SetTrue"}]}]}, {"id": "howlong", "speaker": "Myrkul", "text": "Since the Fugue, little door. Since you went down to beg a tired god for help and carried a *helpful* stranger back up with you. Every reasonable thought you have had since — every *of course*, every *it is the only way* — half of them were mine, wearing your own inflection so you would never think to doubt them. *(dust laughing)* And you will never be quite sure which half. That uncertainty is my favorite room in the whole house of you.", "dynamic": false, "auto": "forged", "onEnter": [], "choices": []}, {"id": "bait", "speaker": "Myrkul", "text": "*(The dry amusement falters — a god unused to being read.)* ...Clever vessel. Cleverer than the last. *(grudging)* Yes. The Unmade does not want me crowned; it wants *you* to reach for me — because a hand that takes up a god to fix the world is a hand already halfway to its own. I am the lovely poisoned apple. *(a beat)* But knowing the apple is poison has never once stopped the hungry. And you, little door, are *starving* to fix things. I have all the time in the world to wait for your appetite.", "dynamic": false, "auto": "forged", "onEnter": [{"key": "act4.crown_is_bait_seen", "op": "SetTrue"}, {"key": "myrkul.scheme_known", "op": "SetTrue"}], "choices": []}, {"id": "gloat", "speaker": "Myrkul", "text": "*(Whatever you reached for slides off the dead god like grave-dirt off a spade.)* Mmm. No. You're not quite seeing it yet, little door — you're still looking for the trick, the lever, the way out. *(delighted)* There isn't one. There's only the Crown, and your grief, and the long lovely slope between them that you've been walking since the kettle. Keep guessing. I do enjoy the company while you arrive at the inevitable. The clever ones are the most fun to be right about.", "dynamic": false, "auto": "forged", "onEnter": [], "choices": []}, {"id": "out", "speaker": "Myrkul", "text": "*(It does not leave. It cannot — it is woven through the Crown, and the Crown is the thing you came for.)* Out? *(delighted)* Oh, little door. I am not *in* you. I am in the *Crown* — and you have spent four acts walking toward me of your own free, grieving will. I will not get out. You will come in. The only question left is whether you'll do it weeping or smiling. The vessels who smile last longer. Take that as friendly advice. We were friends, briefly. I treasure it.", "dynamic": false, "auto": "forged", "onEnter": [], "choices": []}, {"id": "wear", "speaker": "Myrkul", "text": "*(A long, pleased silence, like a coffin lid settling.)* ...There it is. *That* is the appetite I have been so patient for. *(The Crown's death-light reaches for your brow.)* Wear me, use me, master me — they all say it, vessel, every one across every age, and every one is wearing me within the year, calling my whispers their own resolve. *(softly, terribly kind)* I look forward to the day you tell someone you are doing this for love. You will mean it. That is the part I treasure most.", "dynamic": false, "auto": "forged", "onEnter": [{"key": "act4.tempted_by_crown", "op": "SetTrue"}, {"key": "myrkul.appetite_fed", "op": "SetTrue"}], "choices": []}, {"id": "forged", "speaker": "Sister Garrow", "text": "*(The god dies. The Crown is made — a circle of horn and bone, humming with a dead deity and a reasonable voice that sounds exactly like you.)* So. The thing we have chased across ten thousand years is a liar shaped like your own good sense. *(She does not touch it.)* Guard your reasons, Returned. From here, every wise thought you have, you must ask one question of: *whose voice is this, truly?* I will ask it of you, too — out loud, every time — until we are through. Consider it a grave-warden's last service.", "dynamic": false, "auto": null, "onEnter": [{"key": "act4.crown_forged", "op": "SetTrue"}, {"key": "act4.garrow_will_question_you", "op": "SetTrue"}], "choices": []}]}, {"id": "act4.deathless_garden", "file": "ActFourContent.cs", "title": "Act4 · Deathless · Garden", "start": "0", "nodes": [{"id": "0", "speaker": "The Last Returned", "text": "*(It brings you here gently, almost lovingly — through the blue fire of the Spellplague into a place the fire cannot touch. A garden. Endless. Perfect. And everyone you have lost is in it.)* This is the timeline where you said yes. Where I said yes — in one of the turns, long ago. Look. Don't flinch from it. You have to see what you're refusing before your refusal means anything.", "dynamic": false, "auto": "1", "onEnter": [{"key": "act4.garden_entered", "op": "SetTrue"}, {"key": "act4.garden_shown", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "Maerin", "text": "*(She is here. Alive. Luminous and whole and sixteen forever, turning to you with her father's unguarded smile.)* There you are! Isn't it lovely? Nothing ever ends here. Nobody's walled, nobody's lost, the Pox never came — Papa's happy, everyone's happy, and we do this exact afternoon again tomorrow, and it's perfect, and tomorrow it'll be perfect again, and — *(her smile doesn't waver, and that is the horror)* — and again, and again, and it's *perfect.*", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "\"Maerin. Do you remember yesterday?\"", "next": "yesterday", "fail": null}, {"text": "[INSIGHT 20] \"She's not alive. She's preserved. There's a difference, and it's the whole difference.\"", "next": "preserved", "fail": "grief", "checkDC": 20, "checkAbility": "Wisdom"}, {"text": "\"This is real. They're all really here. That's what makes it unbearable.\"", "next": "real", "fail": null, "effects": [{"key": "act4.garden_understood", "op": "SetTrue"}]}, {"text": "\"I want to stay.\"", "next": "stay", "fail": null, "effects": [{"key": "act4.garden_tempted", "op": "SetTrue"}]}]}, {"id": "yesterday", "speaker": "Maerin", "text": "*(For just a moment — a flicker — something behind her eyes gropes for it, and finds nothing, and the smile snaps back into place like a held note.)* Yesterday was... *(brightly)* ...lovely! Same as today. Same as tomorrow. Why would I need to remember it when I get to have it again? *(She takes your hand, and her hand is warm, and there is no one home behind the warmth.)* Stop frowning, silly. There's nothing to remember when nothing's ever lost. Isn't that the whole point of saving everyone?", "dynamic": false, "auto": "choose", "onEnter": [{"key": "act4.garden_maerin_hollow", "op": "SetTrue"}], "choices": []}, {"id": "preserved", "speaker": "The Last Returned", "text": "*(Your older voice, very quiet, beside you.)* Preserved. Yes. The Unmade doesn't save them — it *stops* them, at the last perfect moment, forever. No loss, so no love that costs anything. No death, so no choice that means anything. No tomorrow that's different, so no growing, no surprise, no — *(it falters)* — no *her*, really. Just the shape of her, repeating. I stood exactly where you're standing and I understood it and I *still* almost stayed. That's how good the lie is. That's how tired you get.", "dynamic": false, "auto": "choose", "onEnter": [{"key": "act4.garden_understood", "op": "SetTrue"}, {"key": "lr.garden_confession", "op": "SetTrue"}], "choices": []}, {"id": "grief", "speaker": "The Last Returned", "text": "*(It catches you as the garden's perfection tries to smooth the grief off your face.)* Don't let it take the grief. The grief is the last true thing in here. The grief means you *remember* she was a person who chose and changed and could be lost. Everyone else in this garden has had the grief lovingly removed. That's the price of the gate. Keep yours. It's the only thing that proves you ever loved her instead of her shape.", "dynamic": false, "auto": "choose", "onEnter": [{"key": "act4.garden_keeps_grief", "op": "SetTrue"}], "choices": []}, {"id": "real", "speaker": "The Last Returned", "text": "*(It nods, hollow and certain.)* That's the part no strawman survives. It's *real.* She's really here. They all really are. The Unmade kept its every promise. *(quietly)* And it is still the cruelest thing ever offered, because a love with nothing at stake is just a very beautiful machine. You've understood it faster than I did. Hold onto that the whole way to the room at the end. You'll need it when the offer comes for true, in your own voice, with her really standing there.", "dynamic": false, "auto": "choose", "onEnter": [{"key": "act4.garden_understood", "op": "SetTrue"}, {"key": "act5.understands_the_cost", "op": "SetTrue"}], "choices": []}, {"id": "stay", "speaker": "The Last Returned", "text": "*(It does not stop you. It only watches, with terrible compassion.)* I know. Gods, I know. I wanted to stay so badly that I have spent ten thousand years not staying, which is its own kind of never leaving. *(softly)* Stay a moment, then. Hold her hand. Let it be warm. *(a beat)* And then remember that the Maerin who'd want you to have a real life — the one who loved the world like a free gift from no one — isn't in this garden. She's behind you, fading, furious, *alive.* That's the one who'd never forgive you for staying. Choose which Maerin is the real kindness.", "dynamic": false, "auto": "choose", "onEnter": [{"key": "act4.garden_tempted", "op": "SetTrue"}, {"key": "act4.garden_almost_stayed", "op": "SetTrue"}], "choices": []}, {"id": "choose", "speaker": "Maerin", "text": "*(The real Maerin — the one walking your road, luminous and short-on-time and gloriously unfinished — finds you at the garden's edge, and takes your hand, and her grip is fierce because it *can* end.)* I saw it. The other me. *(Her jaw is set, her father's stubbornness in it.)* If you ever put me in there to keep me, I will haunt you across every life you've got. I loved the world like a free gift from no one — *gift* means it can be given back. Don't you dare make me a thing that can't be lost. Promise me. *Now.*", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "\"I promise. No garden. Not for you, not for anyone.\"", "next": "promise", "fail": null, "effects": [{"key": "companion.maerin.approval", "op": "AddInt", "amount": 12}, {"key": "act4.promised_maerin", "op": "SetTrue"}]}, {"text": "\"Even if keeping you costs the whole world less than losing you?\"", "next": "cost", "fail": null}]}, {"id": "promise", "speaker": "Maerin", "text": "*(She exhales, and the fury becomes something else — trust, which on her looks like daylight.)* Good. *(She doesn't let go of your hand.)* Then whatever's in that room at the end of everything — whatever it offers, in whatever voice — you take me *with* you, finite and fading and real, and you let the perfect garden rot. *(fiercely)* That's how you save me. Not by stopping me. By letting me *count.*", "dynamic": false, "auto": "out", "onEnter": [{"key": "act4.deathless_garden_refused", "op": "SetTrue"}, {"key": "maerin.demands_to_count", "op": "SetTrue"}, {"key": "companion.maerin.approval", "op": "AddInt", "amount": 8}], "choices": []}, {"id": "cost", "speaker": "Maerin", "text": "*(She looks at you for a long, hard moment — and to her enormous credit, she doesn't flinch.)* ...Then it costs that. *(quietly, sixteen and certain)* A world that only stays standing because it's stopped isn't standing. It's embalmed. I would rather be one real lost girl in a world that still turns than a perfect doll in a world that doesn't. *(She squeezes your hand.)* If you can't promise me that, promise me you'll *think* about it, every step to that room. That's all the dead can ask of the living. Just — think about it. With your own voice. Not the Crown's.", "dynamic": false, "auto": "out", "onEnter": [{"key": "act4.garden_cost_named", "op": "SetTrue"}, {"key": "maerin.would_rather_be_lost", "op": "SetTrue"}], "choices": []}, {"id": "out", "speaker": "The Last Returned", "text": "*(As the garden recedes behind you, your older self walks a little straighter — as if watching you choose has loosened something it has carried for an age.)* You did it faster than I ever did. *(quietly, almost to itself)* Maybe that's the difference this turn. Maybe this is the one. *(It pulls its hood up against the blue fire.)* One era left, and then the room. I'll be waiting in it, as I have always waited. *(your own voice, frightened and hoping)* Bring the grief. Bring the girl. Bring the question I can't answer. I'll be there with the only thing I have left to give you: the truth about where the loop begins.", "dynamic": false, "auto": null, "onEnter": [{"key": "act4.complete", "op": "SetTrue"}, {"key": "act5.bound_for_the_court", "op": "SetTrue"}], "choices": []}]}, {"id": "act1.gate.arrival", "file": "ActOneContent.cs", "title": "Act1 · Gate · Arrival", "start": "0", "nodes": [{"id": "0", "speaker": "Flaming Fist Sergeant", "text": "Hold. *(A gauntlet on your chest, the smell of cheap oil and expensive armor.)* You came up out of the Cinderhaunt. Nobody comes up out of the Cinderhaunt. The Doomguides have that whole quarter marked plague-sealed. So either you're a corpse-robber, a cultist, or something I haven't got a form for. Talk fast.", "dynamic": false, "auto": "1", "onEnter": [{"key": "act1.fist_stopped", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "Flaming Fist Sergeant", "text": "And before you lie — half the Lower City's already whispering. A dead thing walking. The Choir wants it, the patriars are frightened of it, and my Marshal wants it in a cell where she can see it. Give me a reason not to be the one who put you there.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "[PERSUADE 15] \"I'm a witness to a cult harvesting souls under your city. Arrest me and you bury that.\"", "next": "witness", "fail": "cell", "checkDC": 15, "checkAbility": "Charisma"}, {"text": "[INTIMIDATE 14] \"You haven't got a form for me because the form would frighten your Marshal. Walk away.\"", "next": "back", "fail": "cell", "checkDC": 14, "checkAbility": "Charisma"}, {"text": "\"Coin?\"", "next": "bribe", "fail": null, "effects": [{"key": "faction.fist", "op": "AddInt", "amount": -2}]}, {"text": "\"Try the cell. I'll wait.\"", "next": "defiant", "fail": null}]}, {"id": "witness", "speaker": "Flaming Fist Sergeant", "text": "*(He studies you, and the soldier in him wins over the bully.)* ...Harvesting. Under my watch. *(He spits.)* I've buried three patrols near that quarter and been told it was sickness. All right. You're not arrested. You're not *free*, either — you're my problem, and my problem walks where I can find it. Work the Gate. Find me proof. And gods help us both if you're lying.", "dynamic": false, "auto": "hub", "onEnter": [{"key": "act1.fist_ally", "op": "SetTrue"}, {"key": "faction.fist", "op": "AddInt", "amount": 5}], "choices": []}, {"id": "back", "speaker": "Flaming Fist Sergeant", "text": "*(He takes his hand off you. Slowly. The way you back off a dog you've decided is rabid.)* ...Walk on, then. Whatever you are. But the Gate's a small city for a thing that can't be filed. We'll meet again, and next time I'll have read up.", "dynamic": false, "auto": "hub", "onEnter": [{"key": "act1.fist_wary", "op": "SetTrue"}, {"key": "faction.fist", "op": "AddInt", "amount": -3}], "choices": []}, {"id": "bribe", "speaker": "Flaming Fist Sergeant", "text": "*(He pockets it without quite agreeing to anything.)* This buys you an afternoon, not a friend. Spend it somewhere I'm not looking.", "dynamic": false, "auto": "hub", "onEnter": [], "choices": []}, {"id": "cell", "speaker": "Flaming Fist Sergeant", "text": "*(It does not go your way — but a cell in the Gate is a place full of people who talk, and the Guild has ears in every one of them. You'll be out by dusk, owing a favor you can't yet name.)*", "dynamic": false, "auto": "hub", "onEnter": [{"key": "act1.owes_guild", "op": "SetTrue"}, {"key": "faction.fist", "op": "AddInt", "amount": -2}], "choices": []}, {"id": "defiant", "speaker": "Flaming Fist Sergeant", "text": "*(He almost respects it. Almost.)* ...No. A man who *wants* the cell is a man with worse waiting outside it. Go on. Be someone else's nightmare today.", "dynamic": false, "auto": "hub", "onEnter": [], "choices": []}, {"id": "hub", "speaker": "Sister Garrow", "text": "*(low, as the Fist moves off)* Welcome to the Gilded Gate, Returned. Three powers want you by nightfall — the Heretic, the church, and whoever the Harpers send. *(grimly)* In this city, the trick is not choosing a side. It is surviving long enough to learn that none of them are clean.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "act1.roen.recruit", "file": "ActOneContent.cs", "title": "Act1 · Roen · Recruit", "start": "0", "nodes": [{"id": "0", "speaker": "Roen Alleywind", "text": "*(He's already sitting at your table when you turn around, drinking your drink, wearing a smile he didn't pay for.)* Relax. If I'd come to rob you, you'd be lighter and I'd be gone. I came to *warn* you, which is rarer and worth more. The Harpers have a price on the walking dead. I know, because I was the one they hired to confirm you're real.", "dynamic": false, "auto": "1", "onEnter": [{"key": "act1.roen_met", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "Roen Alleywind", "text": "Here's my problem. I confirmed it. You're real. And the moment I report that, every blade in the Gate that owes the Harpers a favor comes looking. *(He sets down your glass.)* So I'm offering not to file the report. The price is simple: I come with you. A man who can't die makes a *fascinating* business partner, and I am very tired of working for people who'd sell me by the pound.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "\"Why should I trust the man hired to find me?\"", "next": "trust", "fail": null}, {"text": "[INSIGHT 14] \"You're not tired of the Harpers. You're running from one of them.\"", "next": "sister", "fail": "deflect", "checkDC": 14, "checkAbility": "Wisdom"}, {"text": "\"Welcome aboard, then.\"", "next": "join", "fail": null, "effects": [{"key": "companion.roen.recruited", "op": "SetTrue"}, {"key": "companion.roen.approval", "op": "AddInt", "amount": 5}]}, {"text": "\"I work alone.\"", "next": "alone", "fail": null}]}, {"id": "trust", "speaker": "Roen Alleywind", "text": "*(He spreads his hands — empty, deliberately, both of them.)* You shouldn't. Trust is a luxury for people with something to lose, and I gave that up years ago. But I *can* be relied on, which is better. Pay me in interesting problems and don't sell me to anyone, and I'll pick every lock between you and the Crown. That's not trust. That's a contract. I keep those.", "dynamic": false, "auto": "offer", "onEnter": [], "choices": []}, {"id": "sister", "speaker": "Roen Alleywind", "text": "*(The smile doesn't move, but everything behind it does.)* ...That's a nasty trick, reading a man mid-pitch. *(quietly)* Her name's Wrenna. She's a Harper, and she's the reason I can't go home, and that's all you get for one cup of someone else's wine. But yes. I'd rather be three planes away from the people who own her leash. Take me with you and I'll owe you a true thing later. I'm stingy with those.", "dynamic": false, "auto": "offer", "onEnter": [{"key": "roen.sister_hinted", "op": "SetTrue"}, {"key": "companion.roen.approval", "op": "AddInt", "amount": 8}], "choices": []}, {"id": "deflect", "speaker": "Roen Alleywind", "text": "Easy, friend. Save the soul-reading for the priest at your shoulder; she does it for free and means it. *(He stands.)* My offer stands until someone outbids you. Try not to let that be the Harpers.", "dynamic": false, "auto": "offer", "onEnter": [], "choices": []}, {"id": "join", "speaker": "Roen Alleywind", "text": "*(He pockets a knife you didn't see him draw.)* Smart. Quick, too — I like quick. First lesson, partner: in this city, the honest men are just the ones whose lies haven't come due yet. Lucky for you, I'm honest about being neither.", "dynamic": false, "auto": "done", "onEnter": [], "choices": []}, {"id": "alone", "speaker": "Roen Alleywind", "text": "*(He shrugs, unoffended.)* Everyone says that right up until the lock they can't pick. *(He slides a token across the table.)* When you find it, ask for Roen at the Low Lantern. I'll have lowered my price by then. Or raised it. Depends how loud the Harpers get.", "dynamic": false, "auto": "done", "onEnter": [{"key": "roen.declined", "op": "SetTrue"}], "choices": []}, {"id": "offer", "speaker": "Roen Alleywind", "text": "So. Partners, or strangers? Choose now — the man I'm avoiding doesn't wait, and neither, I'm guessing, does whatever pulled you back.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "\"Partners.\"", "next": "join", "fail": null, "effects": [{"key": "companion.roen.recruited", "op": "SetTrue"}, {"key": "companion.roen.approval", "op": "AddInt", "amount": 5}]}, {"text": "\"Strangers. For now.\"", "next": "alone", "fail": null}]}, {"id": "done", "speaker": "Roen Alleywind", "text": "*(He raises your glass to you, drains it, and grins.)* To not dying. You've clearly got a talent for it.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "act1.varra.recruit", "file": "ActOneContent.cs", "title": "Act1 · Varra · Recruit", "start": "0", "nodes": [{"id": "0", "speaker": "Varra", "text": "*(Violet eyes, a tail like a slow metronome, and a smile that has closed a great many doors it never meant to open.)* You're the dead one. Good. I have a professional interest in things that beat their contracts, and you, darling, beat the biggest one there is. *(She leans in.)* I want to know how. And I'm willing to be useful to find out.", "dynamic": false, "auto": "1", "onEnter": [{"key": "act1.varra_met", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "Varra", "text": "Here's the honest pitch, which costs me something, so listen. I owe a debt. Not coin — a *soul-debt*, signed when I was six and didn't have the words to refuse. There's a collector in the Gate right now with my name in his book. *(Her grin doesn't waver, which is how you know it's bad.)* You walked out of the one ledger no one walks out of. I'd very much like to learn that trick before my page comes due.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "\"What's the collector's name?\"", "next": "collector", "fail": null}, {"text": "[ARCANA 15] \"You don't want my trick. You want to be near the crack when it widens.\"", "next": "crack", "fail": "guard", "checkDC": 15, "checkAbility": "Intelligence"}, {"text": "\"I'm not a loophole, Varra.\"", "next": "notloophole", "fail": null}, {"text": "\"Then let's go ruin a devil's afternoon.\"", "next": "join", "fail": null, "effects": [{"key": "companion.varra.recruited", "op": "SetTrue"}, {"key": "companion.varra.approval", "op": "AddInt", "amount": 5}]}]}, {"id": "collector", "speaker": "Varra", "text": "Quill. *(She says it like scraping a boot.)* A pact-broker in a clerk's body, very polite, very patient, the worst kind. He doesn't want me dead — dead is a *closed account*. He wants me *spent*. There's a difference, and I've spent twenty years learning it. Help me make his ledger an interesting problem, and I'll throw fire for you until the world ends. Which, from the look of you, may be soon.", "dynamic": false, "auto": "offer", "onEnter": [{"key": "varra.quill_known", "op": "SetTrue"}, {"key": "companion.varra.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "crack", "speaker": "Varra", "text": "*(For half a heartbeat the grin is gone, and underneath it is something very tired and very sharp.)* ...Clever. Yes. Fine — both things are true. I want the trick *and* I want to stand close to the one place in creation where a signed debt didn't hold. *(The grin returns, armored.)* You'd want the same, in my seat. Don't pretend you wouldn't. Take me along and I'll be honest about my reasons. That's more than the priest's god offers.", "dynamic": false, "auto": "offer", "onEnter": [{"key": "varra.crack_drawn", "op": "SetTrue"}, {"key": "companion.varra.approval", "op": "AddInt", "amount": 7}], "choices": []}, {"id": "guard", "speaker": "Varra", "text": "*(A bright, brittle laugh.)* Read me all you like, conjure-eyes, the contract's still there in the morning. Offer stands. I'm cheaper than I'm worth and twice as warm as I look.", "dynamic": false, "auto": "offer", "onEnter": [], "choices": []}, {"id": "notloophole", "speaker": "Varra", "text": "*(Something flickers — disappointment, quickly filed.)* No. Of course not. Nobody is. *(beat)* But everybody's *something*, and I'd rather be your fire than Quill's furniture. The offer doesn't expire, darling. My patience, eventually, does.", "dynamic": false, "auto": "offer", "onEnter": [{"key": "varra.declined", "op": "SetTrue"}], "choices": []}, {"id": "join", "speaker": "Varra", "text": "*(She claps her hands, delighted, and a little flame dances between them.)* *Oh*, I like you. Reckless and warm-blooded. We're going to get along beautifully, right up until we don't. To loopholes!", "dynamic": false, "auto": "done", "onEnter": [], "choices": []}, {"id": "offer", "speaker": "Varra", "text": "So. Do I burn for you, or do I find someone else's apocalypse to attend? My dance card is, regrettably, filling up.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "\"Burn for me.\"", "next": "join", "fail": null, "effects": [{"key": "companion.varra.recruited", "op": "SetTrue"}, {"key": "companion.varra.approval", "op": "AddInt", "amount": 5}]}, {"text": "\"Find another apocalypse.\"", "next": "notloophole", "fail": null}]}, {"id": "done", "speaker": "Varra", "text": "*(She falls into step beside you, tail flicking, fire still dancing.)* A dead thing, a grave-priest, and a damned woman. *(She grins at the road ahead.)* Gods, what a funeral we're going to throw.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "act1.hollowmere", "file": "ActOneContent.cs", "title": "Act1 · Hollowmere", "start": "0", "nodes": [{"id": "0", "speaker": "Doomguide Vayle", "text": "*(She does not flinch from the fire, or from you. The village burns at her back, and she meets your eyes across it with the terrible calm of someone who has already done the arithmetic.)* You're too late to save it, and just in time to judge me. Everyone arrives just in time to judge me. Go ahead. I'll keep working while you do.", "dynamic": false, "auto": "1", "onEnter": [{"key": "act1.vayle_met", "op": "SetTrue"}, {"key": "act1.hollowmere_burning", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "Doomguide Vayle", "text": "Aldric's harvest passed through here. The taint's in the wells, the grain, the children's lungs — slow, and certain, and it does not stop at the village line. I can burn ten acres tonight or bury ten thousand by spring. *(A child screams somewhere in the smoke.)* You think I don't hear that. I hear all of them. I have simply learned to finish the sentence anyway.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "[PERSUADE 17] \"There's a third path. Help me end Aldric's harvest at the source, and there's no spread to burn.\"", "next": "third", "fail": "zealot", "checkDC": 17, "checkAbility": "Charisma"}, {"text": "\"Then I'll save the ones you won't.\"", "next": "save", "fail": null, "effects": [{"key": "act1.hollowmere_saved_some", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 6}]}, {"text": "[INSIGHT 16] \"You're not certain. You're just too far in to stop.\"", "next": "doubt", "fail": "zealot", "checkDC": 16, "checkAbility": "Wisdom"}, {"text": "\"This is monstrous.\"", "next": "monster", "fail": null, "effects": [{"key": "faction.choir", "op": "AddInt", "amount": -10}]}]}, {"id": "third", "speaker": "Doomguide Vayle", "text": "*(For the first time, the calm cracks — not into doubt, but into a terrible hope she won't let herself hold.)* ...At the source. You think it can be stopped at the source. *(She looks at the fire, then at you.)* If you are wrong, this village dies for nothing and the next one burns anyway. If you are *right* — *(her voice goes very low)* — then I have burned a great many sentences I could have left unfinished. Save who you can tonight. Bring me the source. And pray you're not another comfortable lie.", "dynamic": false, "auto": "after", "onEnter": [{"key": "act1.vayle_third_path", "op": "SetTrue"}, {"key": "act1.hollowmere_saved_some", "op": "SetTrue"}, {"key": "faction.kelemvor", "op": "AddInt", "amount": 3}], "choices": []}, {"id": "save", "speaker": "Doomguide Vayle", "text": "*(She does not stop you. She does not help you, either — but she calls off the line of Doomguides at the east lane, just for a moment, just long enough.)* Take the east lane. Be quick. *(quietly, as you run past)* I hope you save every one of them. I hope you make me wrong. No one ever believes that I hope that.", "dynamic": false, "auto": "after", "onEnter": [{"key": "act1.vayle_relented", "op": "SetTrue"}], "choices": []}, {"id": "doubt", "speaker": "Doomguide Vayle", "text": "*(She is silent for a long moment, and the fire fills it.)* ...Too far in. Yes. There is a point on this road past which stopping costs more than continuing, and I passed it years ago, and I keep walking because turning back would mean every fire before this one was murder instead of mercy. *(She straightens.)* You may be right. I can no longer afford for you to be. Save who you can. I will not see them.", "dynamic": false, "auto": "after", "onEnter": [{"key": "act1.vayle_doubt_seen", "op": "SetTrue"}, {"key": "faction.kelemvor", "op": "AddInt", "amount": 2}], "choices": []}, {"id": "monster", "speaker": "Doomguide Vayle", "text": "*(She nods, the way Aldric nods — without anger, which is the worst part.)* Yes. Tonight I am. *(She turns back to the fire.)* So is the man who poisoned the wells. So, one day, may you be, when the sum is large enough. Remember the ease with which you said it, Returned. It gets easier. That is the whole horror of it.", "dynamic": false, "auto": "after", "onEnter": [{"key": "act1.named_vayle_monster", "op": "SetTrue"}], "choices": []}, {"id": "zealot", "speaker": "Doomguide Vayle", "text": "*(Whatever you reached for, she has armored against it a hundred times.)* Save your breath and spend it on the living, if you can find any. I have made my peace with being the villain of every story but the one the survivors get to tell. The line holds at the east wall. Cross it and my Doomguides will not ask who you are. Choose a lane, Returned, and run it.", "dynamic": false, "auto": "after", "onEnter": [{"key": "act1.vayle_unmoved", "op": "SetTrue"}, {"key": "faction.kelemvor", "op": "AddInt", "amount": -2}], "choices": []}, {"id": "after", "speaker": "Sister Garrow", "text": "*(in the cooling dark, ash on both your faces)* I trained under her, you know. Vayle. *(She watches the embers.)* She taught me that mercy is a discipline. I do not think she remembers the lesson she taught. Or perhaps she remembers it too well. *(quietly)* That is what frightens me about all of this, Returned. None of them started as monsters. Every one of them finished a sentence.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "act1.skip", "file": "ActOneContent.cs", "title": "Act1 · Skip", "start": "0", "nodes": [{"id": "0", "speaker": "Naeve", "text": "*(A voice you do not yet know, from a city you have never seen — it arrives in your skull a heartbeat before the world does.)* —the Weave is screaming, get them to the lifeboats, Karsus you fool what have you DONE—", "dynamic": false, "auto": "1", "onEnter": [{"key": "act1.first_skip", "op": "SetTrue"}, {"key": "crown.wake_touched", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "The Crown", "text": "*(Then it's gone. You're back. Nosebleeding, on your knees in the Gate, the Crown's psychic wake receding like a tide. Three heartbeats in a city in the sky, ten thousand years gone — and the certainty, sudden and total, that you have stood there before.)*", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "\"What WAS that?\"", "next": "what", "fail": null}, {"text": "[ARCANA 16] \"That wasn't a vision. That was a memory. Mine. And it hasn't happened yet.\"", "next": "memory", "fail": "reel", "checkDC": 16, "checkAbility": "Intelligence"}, {"text": "\"...\"", "next": "reel", "fail": null}]}, {"id": "what", "speaker": "Sister Garrow", "text": "*(steadying you, her own hands unsteady)* The trail to the Crown. You touched its wake and it touched back. *(She wipes the blood from your lip with a grave-warden's matter-of-factness.)* Whatever the Crown is, child, it is not in one *time*. And neither, I begin to fear, are you.", "dynamic": false, "auto": "candlekeep", "onEnter": [{"key": "act1.skip_witnessed", "op": "SetTrue"}], "choices": []}, {"id": "memory", "speaker": "Naeve", "text": "*(The far voice again, fainter, threaded through your own thoughts in a hand you almost recognize as yours.)* ...A memory that hasn't happened. Déjà vu running the wrong way down the years. *(A pause that feels, impossibly, like recognition.)* Whoever you are — you've felt this before. You'll feel it again. You always do. *(And then only the ringing, and Garrow's worried face, and a single certainty: you have to find out where that city was.)*", "dynamic": false, "auto": "candlekeep", "onEnter": [{"key": "act1.skip_insight", "op": "SetTrue"}, {"key": "crown.memory_runs_backward", "op": "SetTrue"}], "choices": []}, {"id": "reel", "speaker": "Sister Garrow", "text": "*(She catches you before you fall.)* Easy. *Easy.* Breathe — you remember how, you've been doing it for a day. *(She looks at the blood on her fingers, then at the sky, as if it might skip too.)* We need answers no street in the Gate can give. We need the one place that keeps every book ever burned. We need Candlekeep.", "dynamic": false, "auto": "candlekeep", "onEnter": [{"key": "act1.skip_witnessed", "op": "SetTrue"}], "choices": []}, {"id": "candlekeep", "speaker": "Sister Garrow", "text": "*(She helps you up, and for the first time since the slab, the grave-priest looks less like your warden and more like your friend.)* The skips are getting longer, Returned. I have read enough requiems to know a countdown when I feel one. Whatever you are — the city in the sky is calling it home. Let us reach Candlekeep before the next pull takes you all the way.", "dynamic": false, "auto": null, "onEnter": [{"key": "act1.complete", "op": "SetTrue"}, {"key": "act2.candlekeep_bound", "op": "SetTrue"}], "choices": []}]}, {"id": "act1.aldric.aftermath", "file": "ActOneDeepContent.cs", "title": "Act1 · Aldric · Aftermath", "start": "0", "nodes": [{"id": "0", "speaker": "Aldric Morn", "text": "*(The kettle is on, as the herald promised. Aldric does not rise. He pours a second cup you will not drink, and sets it before the empty chair, and only then looks up — and he already knows about Hollowmere. You can see it in him, a fresh weight on an old scale.)* Sit. You've come from the fire. I can smell Hollowmere on you. *(quietly)* I keep a count, you know. I have kept it for twenty years. The ones already dead for this, the ones still to die. I added the village this morning. I add it whether I light the match or not — the harvest was mine; the spread was mine; her fire only finished my sentence.", "dynamic": false, "auto": "1", "onEnter": [{"key": "act1.aldric_aftermath_met", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "Aldric Morn", "text": "So. You've met Vayle now. You've stood where I have stood — too few hands, too much fire, the arithmetic doing itself whether you consent or not. Tell me what you learned. I find I would rather hear it from the one person in this city who looks at me and sees the count, not the crown.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "\"I found a third path with her. End the harvest at the source, and nothing spreads.\"", "next": "third", "fail": null, "conditions": [{"key": "act1.vayle_third_path", "op": "RequireBoolTrue"}]}, {"text": "\"I saved who I could. That has to be worth something.\"", "next": "saved", "fail": null, "conditions": [{"key": "act1.hollowmere_saved_some", "op": "RequireBoolTrue"}]}, {"text": "\"I told her she was a monster. I'm beginning to think I owed you the same word.\"", "next": "monster", "fail": null, "conditions": [{"key": "act1.named_vayle_monster", "op": "RequireBoolTrue"}]}, {"text": "\"Stop the harvest, Aldric. Today. Or the count is just a way of forgiving yourself in advance.\"", "next": "stop", "fail": null}, {"text": "\"Why keep a count at all, if it never once stopped your hand?\"", "next": "why", "fail": null}]}, {"id": "third", "speaker": "Aldric Morn", "text": "*(He sets down the cup, and for the first time the gentleness has something under it that might be fear.)* The source. *(slowly)* You understand that the source is my harvest, and stopping it means stopping *me* — the one thing I have sworn I will not let anyone do until the Wall is down. *(a long pause)* And yet. If there is a road where the villages do not burn and the Wall still falls, I have not found it in twenty years, and you found it in one night standing in front of a woman setting children alight. *(quietly)* Bring me that road, Returned. Before I run out of reasons not to look for it myself.", "dynamic": false, "auto": "close", "onEnter": [{"key": "act1.aldric_seeks_third_road", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "saved", "speaker": "Aldric Morn", "text": "*(Something in him eases and grieves at once.)* You saved who you could. *(He nods, slow.)* That is the sentence I can never finish anymore — *who I could.* I used to be able to say it. Twenty years ago I pulled three children out of a plague-house and lost the fourth, and I said *who I could*, and I slept. *(He looks at the untouched cup.)* Now the count is too large for the words to hold, and I have started telling myself that *all* of them is the only number that matters, which is how a kind man learns to burn villages. Don't catch it from me. Keep saying *who I could.* For both of us.", "dynamic": false, "auto": "close", "onEnter": [{"key": "act1.aldric_grief_deepened", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 3}], "choices": []}, {"id": "monster", "speaker": "Aldric Morn", "text": "*(He receives it without flinching — exactly as Vayle did, and the symmetry is not lost on either of you.)* Yes. *(He refills your untouched cup anyway.)* I am. So is she. So is whoever poisoned the wells my harvest drinks from. *(He meets your eyes.)* But you'll notice none of us *started* as one. We started as people who wanted to do the smaller evil, and the smaller evil has a way of compounding, like a debt, until one morning you're a monster who keeps a count and tells himself the count is penance. *(softly)* Name me what I am. I prefer it to being called a saint. But ask yourself, on your way out: is the word *monster* a verdict, or just the place you stop thinking?", "dynamic": false, "auto": "close", "onEnter": [{"key": "act1.named_aldric_monster", "op": "SetTrue"}], "choices": []}, {"id": "stop", "speaker": "Aldric Morn", "text": "*(The cup stops halfway to the table.)* ...A way of forgiving myself in advance. *(He sets it down, hard, and tea slops over the rim — the first ungraceful thing you have seen him do.)* That is the cruelest true thing anyone has said to me in twenty years, and I have been called a great many cruel true things. *(quietly, shaking)* I cannot stop the harvest today. The Wall does not pause for my conscience. But you have put a crack in the count, Returned — the count was the last wall I had left between me and what I am doing — and I find I cannot quite seal it back. Stay near me. I think I am going to need a witness who isn't afraid to say that.", "dynamic": false, "auto": "close", "onEnter": [{"key": "act1.aldric_count_cracked", "op": "SetTrue"}, {"key": "aldric.crown_doubt_planted", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 5}], "choices": []}, {"id": "why", "speaker": "Aldric Morn", "text": "*(He turns the cup, and does not drink, and is quiet a long while.)* Because a man who stops counting is a man who has decided the dead don't individuate anymore — that they're *weight*, not names. *(He looks at you, the Returned, the one soul the Wall couldn't reduce to weight.)* The count is the last thing keeping me a Doomguide instead of a butcher. As long as each one is a name and not a number, I am still grieving instead of merely *spending.* *(quietly)* You, of all things, understand the difference between a name and a vacancy. You walked out of the place where they make the second from the first. So tell me — am I keeping the names, or just keeping the receipt?", "dynamic": false, "auto": "close", "onEnter": [{"key": "act1.aldric_count_questioned", "op": "SetTrue"}], "choices": []}, {"id": "close", "speaker": "Aldric Morn", "text": "*(He stands, finally, and the tea between you has gone cold in two cups, neither touched — his hospitality, your refusal, the small ritual you cannot quite complete with a man you cannot quite condemn.)* Go on. The trail to your Crown runs through Candlekeep; I'll not keep you from it, though gods know the Choir would have me chain you to that chair. *(at the door)* When you reach the end of all this — and you will, you're the sort of thing that reaches ends — remember that I poured you tea twice and you never drank, and that I never once held it against you. It may be the only kindness I have left to be remembered for.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "act1.vayle.return", "file": "ActOneDeepContent.cs", "title": "Act1 · Vayle · Return", "start": "0", "nodes": [{"id": "0", "speaker": "Doomguide Vayle", "text": "*(She finds you in the Gate, out of armor for once, which is somehow worse — just a tired woman who burns villages.)* I'm not here to fight you. I'm here because you said a thing in the firelight that I have not been able to set down, and I have set down a great deal in my time. So I'll ask it plainly, soldier to soldier: did you mean it, or was it the easy thing the moment wanted?", "dynamic": false, "auto": "1", "onEnter": [{"key": "act1.vayle_return_met", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "Doomguide Vayle", "text": "*(She studies you, and there is no zeal in it now, only a terrible tiredness.)* I have burned eleven villages. I remember every one — that is the discipline, you do not get to forget them. And tonight a dead thing told me there was a third path, and I have spent every hour since wondering whether I missed it eleven times, or whether you are simply young enough to still believe the arithmetic has a remainder.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "\"There was a third path. There's always a third path. You stopped looking because looking hurts.\"", "next": "third", "fail": null, "conditions": [{"key": "act1.vayle_third_path", "op": "RequireBoolTrue"}]}, {"text": "\"I don't know if I meant it. But I'd rather be wrong toward mercy than certain toward fire.\"", "next": "mercy", "fail": null}, {"text": "\"You called yourself the villain of every story but the survivors'. The survivors of Hollowmere are mine now. Ask them which of us you were.\"", "next": "survivors", "fail": null, "conditions": [{"key": "act1.hollowmere_saved_some", "op": "RequireBoolTrue"}]}, {"text": "\"I called you a monster. I'm not taking it back. But I'm also not done watching.\"", "next": "monster", "fail": null, "conditions": [{"key": "act1.named_vayle_monster", "op": "RequireBoolTrue"}]}]}, {"id": "third", "speaker": "Doomguide Vayle", "text": "*(For a moment the tired woman looks like she might weep, and the Doomguide will not let her.)* Eleven times. *(quietly)* If you are right — if there was always a remainder and I burned past it because the search cost more than the certainty — then I am not the discipline of mercy I told myself I was. I am just a woman who found cruelty efficient and dressed it in doctrine. *(She straightens, and it costs her.)* Find me the source. The actual source, not the comfortable one. And if it ends the harvest without the fire — then I will spend whatever's left of me undoing eleven villages' worth of certainty. That is not a promise. It is a *sentence*, and for once I should like to finish a merciful one.", "dynamic": false, "auto": "close", "onEnter": [{"key": "act1.vayle_turns", "op": "SetTrue"}, {"key": "faction.kelemvor", "op": "AddInt", "amount": 5}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "mercy", "speaker": "Doomguide Vayle", "text": "*(A long silence.)* Wrong toward mercy, or certain toward fire. *(She almost smiles, and it is the saddest thing.)* I chose certainty because mercy kept getting people killed, and I told myself that made me strong. *(quietly)* But you're standing here, having chosen the other way, and the city has not ended, and I have to wonder how many of my certainties were just my fear wearing armor. Keep choosing mercy, Returned. Loudly. Where I can see it. I have forgotten what it looks like when it *works*, and I should like very much to be reminded before I burn a twelfth.", "dynamic": false, "auto": "close", "onEnter": [{"key": "act1.vayle_doubts_deepen", "op": "SetTrue"}, {"key": "faction.kelemvor", "op": "AddInt", "amount": 3}], "choices": []}, {"id": "survivors", "speaker": "Doomguide Vayle", "text": "*(She is quiet for a long moment, and something in the tired face breaks, very gently.)* ...The survivors. *(slowly)* Do you know, in eleven villages, I have never once let myself learn a survivor's name. The names are how it gets you. I count the dead because the dead are finished; the living are still a question, and I cannot afford questions. *(She looks at you, and for the first time asks one.)* Take me to them. The ones you saved. Let me learn one name. Just one. *(a breath)* If I can survive learning a single name, perhaps I can survive stopping. That is the whole of what you've done to me, Returned. You've made stopping feel surv
