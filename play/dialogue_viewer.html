uietly.)* You think I rode in here, against orders, to a market where I knew he'd be, because I needed a *miracle* to tell me it's all right to choose my brother. *(a long breath.)* ...Aye. That's exactly what I did, and I'm a Harper, we don't *get* permission, we get *orders*, and somewhere in four years I forgot they're different things. *(she touches the Harper pin at her collar, then — deliberately — turns it over, hiding it.)* Permission granted, then. By a dead thing, which is fitting, since the leash I'm cutting would've had me hand a dead thing to its end. *(she almost smiles.)* Go on. I've a brother to reintroduce myself to, and a superior to lie to, and for the first time in four years I know which of those I'm loyal to.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.wrenna_cuts_leash", "op": "SetTrue"}, {"key": "roen.wrenna_reconciling", "op": "SetTrue"}, {"key": "faction.harper", "op": "AddInt", "amount": -2}, {"key": "companion.roen.approval", "op": "AddInt", "amount": 5}], "choices": []}, {"id": "threat", "speaker": "Wrenna Alleywind", "text": "*(Her hand drifts toward a blade she doesn't draw.)* A knife that cuts threads. *(coldly.)* Then understand, miracle: the thread you're nearest to cutting is the one holding a Harper's order to *remove* you, and *I'm* the Harper. *(quietly, dangerous.)* Threaten me, and I stop being the sister stalling for time and start being the agent doing her duty. *(but her eyes flick to Roen, and the danger wavers.)* ...Don't make me choose between my orders and my brother by being the kind of thing my orders were *written for.* You've one chance to be worth what he thinks you are. Don't spend it threatening the only Harper in the Gate inclined to look away.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.wrenna_wary", "op": "SetTrue"}, {"key": "faction.harper", "op": "AddInt", "amount": -2}], "choices": []}, {"id": "deny", "speaker": "Wrenna Alleywind", "text": "*(The Harper armor seals over.)* Cold read, and a poor one. I'm here on assignment, nothing more. *(but she doesn't quite meet your eye.)* Assess and report. That's the job. *(she turns to go.)* ...Tell my brother nothing. I'll handle the Harpers. *(quietly, almost to herself.)* I always handle the Harpers. It's the only thing I've handled in four years.", "dynamic": false, "auto": "close", "onEnter": [], "choices": []}, {"id": "close", "speaker": "Wrenna Alleywind", "text": "*(She melts back into the crowd, Harper-quiet — but you notice she takes the long way, the one that passes within speaking distance of where Roen stands, and you notice that this time, brother and sister both pretend a little less hard not to see each other.)*", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "npc.gate.quill", "file": "GateDenizensTwoContent.cs", "title": "Npc · Gate · Quill", "start": "0", "nodes": [{"id": "0", "speaker": "Quill", "text": "*(A small, exquisitely polite man in a clerk's coat, with a ledger bound in something that is definitely not calfskin and ink that is, on closer inspection, definitely not ink.)* Ah. The associate of one Varra — *(he checks the ledger, though he plainly needs no reminding)* — account opened at age six, principal: one soul, terms: standard, collection: *imminent.* *(he smiles, and it is a genuinely warm smile, which is the horror of him.)* I'm Quill. I broker pacts. I'm not here to threaten you, or her — threats are vulgar, and I'm a *professional.* I'm here because you've been seen in her company, and I always introduce myself to the *collateral* before a collection. One does want to know who'll be inconvenienced.", "dynamic": false, "auto": "1", "onEnter": [{"key": "npc.quill_met", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "Quill", "text": "*(He turns a page with one neat claw.)* I'll be transparent — it costs nothing and disarms everyone. Varra owes a soul. Not by trickery; her parents signed in good faith, in a bad winter, for bread, and the contract is *flawless*, I drafted it myself. *(he sets down the ledger.)* She thinks you might be her way *out*, you see — a Returned, a soul that beat its own filing. And I confess a *professional* curiosity: I've never had collateral who'd personally voided death's paperwork. *(the warm smile.)* So. Are you going to make my collection *difficult*, walking miracle? I do hope so. An easy collection is just bookkeeping. A *difficult* one is the only fun an old broker gets.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "\"Her parents signed under duress, for bread. That's not good faith. That's a predator with a pen.\"", "next": "duress", "fail": null, "conditions": [{"key": "companion.varra.recruited", "op": "RequireBoolTrue"}]}, {"text": "[INSIGHT 17] \"You don't want to collect her. You want her to *win*. A soul that beats you is worth more to your reputation than a soul you bank.\"", "next": "wantwin", "fail": "smile", "checkDC": 17, "checkAbility": "Wisdom"}, {"text": "\"What would it take to buy out her contract? Name a price I can't pay, and watch me pay it.\"", "next": "buyout", "fail": null}, {"text": "\"Touch her and I'll show you exactly what voiding death's paperwork looks like from your side.\"", "next": "threat", "fail": null, "effects": [{"key": "companion.varra.approval", "op": "AddInt", "amount": 3}]}]}, {"id": "duress", "speaker": "Quill", "text": "*(He inclines his head, delighted to be argued with properly.)* \"A predator with a pen.\" *(he savors it.)* You've described my entire profession, and flatteringly. *(he folds his hands.)* But duress, my dear collateral, is the *substrate* of every contract worth drafting. No one signs away a soul on a *good* day. We are a famine industry. The flaw you're reaching for — \"they had no choice\" — is, alas, not a flaw in the *contract.* It's a flaw in the *world*, and I don't draft those; I merely *file* in them. *(the warm smile, unbudged.)* Bring me a *world* with no bad winters and I'll tear up every pact I hold. Until then, the bread was real, the signature was real, and the soul is *due.* ...Though I confess, I enjoy you. Most collateral weeps. You *litigate.* Varra chose her company well.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.quill_respects_argument", "op": "SetTrue"}, {"key": "sq.varra_contract_engaged", "op": "SetTrue"}], "choices": []}, {"id": "wantwin", "speaker": "Quill", "text": "*(For the first time the warm smile *changes* — becomes, briefly, real.)* ...Ah. *(quietly.)* You've read the small print of *me.* *(he closes the ledger.)* Do you know how long I've collected souls? Long enough that a *banked* soul is nothing — a number, a tick, ten thousand of them moldering in the Ninth's vaults, indistinguishable. *(he leans in, and the politeness becomes something almost wistful.)* But a soul that *beats* the contract — cleanly, by some loophole I didn't foresee — *that* is the only thing that's surprised me in an age, and surprise, to an immortal bureaucrat, is the rarest coin there is. *(the smile returns, warmer now, conspiratorial.)* So yes. Find me the loophole. Make me *lose.* I'll fight you every clause of the way, because a victory you didn't earn would bore us both — but between you and me and this ledger that isn't calfskin... I am *rooting* for the collateral. Don't tell the Ninth. They'd dock my surprise.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.quill_secretly_hopes", "op": "SetTrue"}, {"key": "sq.varra_contract_engaged", "op": "SetTrue"}, {"key": "companion.varra.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "buyout", "speaker": "Quill", "text": "*(He brightens — this is his favorite kind of conversation.)* A *buyout!* Oh, splendid, a negotiation. *(he produces terms from the air.)* The price of a soul contracted at six, with imminent collection... is not coin, you understand. Coin's beneath us. *(he taps the ledger.)* The price is a *substitution* — another soul, freely given, of equal or greater interest — OR a *clause* I've never seen before, payment in *novelty.* *(the warm smile sharpens.)* You, a Returned, are a walking unforeseen clause. I'd take *you* in trade, gladly — but I suspect you've prior liens. *(he chuckles.)* So bring me a substitution I'd *want*, or a loophole I'd *admire*, and Varra walks free with my compliments. I'm not a monster, collateral. I'm a *connoisseur.* The distinction matters enormously to me and not at all to her, which is the tragedy of my whole trade.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.quill_buyout_terms", "op": "SetTrue"}, {"key": "sq.varra_contract_engaged", "op": "SetTrue"}], "choices": []}, {"id": "threat", "speaker": "Quill", "text": "*(He claps his small hands, genuinely thrilled.)* Oh, a *threat!* From the one soul in creation who could conceivably *make good* on it! *(he doesn't retreat an inch.)* Do you know, in nine thousand years, no collateral has threatened me *credibly.* You may be the first. *(the warm smile, unwavering.)* But consider, before you void my paperwork from my side: I am one broker. The Ninth is a *firm.* Unmake me, and they send someone *without* my fondness for a good loophole, someone who collects Varra in an afternoon and files her without a flicker of sporting interest. *(he bows.)* I am, improbably, the *best* friend her contract has. Threaten me if it pleases you. But you'd be removing the one devil in Hell who *wants* her to win. Do reflect. I'll wait. I've nothing but time and other people's souls.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.quill_threatened", "op": "SetTrue"}, {"key": "sq.varra_contract_engaged", "op": "SetTrue"}, {"key": "companion.varra.approval", "op": "AddInt", "amount": 2}], "choices": []}, {"id": "smile", "speaker": "Quill", "text": "*(The warm smile receives your failed read like a velvet wall.)* Mm. A valiant reach. *(gently.)* But you'll find, collateral, that a being who has read nine thousand years of contracts is rather difficult to *read* in return. The fine print runs the other way, you see. *(he reopens the ledger.)* Do come back when you've found a sharper instrument. I so enjoy being properly negotiated with. It happens *vanishingly* rarely, down among the desperate.", "dynamic": false, "auto": "close", "onEnter": [], "choices": []}, {"id": "close", "speaker": "Quill", "text": "*(He tips a hat he isn't wearing and recedes into the crowd, the most courteous predator in the Gilded Gate — and you understand that Varra's salvation will be won not by force or by weeping, but by being *interesting enough* to a bored old devil who has, against every clause of his nature, started to hope.)*", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "sq.taxghost.church", "file": "GateSideQuestsContent.cs", "title": "Sq · Taxghost · Church", "start": "0", "nodes": [{"id": "0", "speaker": "Deacon Mallow", "text": "*(A thin Kelemvorite deacon guards the chapel's signing-book like a miser his last coin.)* A death-certificate counter-signature. For — *(he checks the form, and his lip thins)* — Tobias Ledgerwhite, clerk, district seven. *(he sets down the pen.)* I'll save us both the time. The man *doubted.* It's in his file — forty years of muttered questions at the back of services, a clerk who balanced our tithes and never once believed the god he tithed to. *(quietly, official.)* By the doctrine, he sorts to the Wall. The Faithless do not receive the rites. I cannot sign a rest for a soul the law says was never owed one.", "dynamic": false, "auto": "1", "onEnter": [{"key": "sq.taxghost_church_begun", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "Deacon Mallow", "text": "*(He folds his hands, not unkind, only certain.)* I'm sorry. Truly. He was a tidy man and I'd no quarrel with him. But if I sign rest for one doubter, the whole sorting unravels — and then what was the Wall *for*, and what were all the others walled for, if Tobias gets a pen-stroke out? *(he looks at the form, conflicted despite himself.)* Convince me, Returned. You of all souls know what's on the other side of my signature. Tell me why I should spend the church's ink on a man the church already filed.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "[PERSUADE 17] \"He spent forty years making your tithes balance honestly. That's a faith of the hands, even when the heart had questions. The church already accepted his service. Accept his rest.\"", "next": "faith", "fail": "refuse", "checkDC": 17, "checkAbility": "Charisma"}, {"text": "[INSIGHT 16] \"You don't believe he belongs in the Wall. You believe you'll lose your post if you say so. Sign it, and I'll be the one who pushed you.\"", "next": "cover", "fail": "refuse", "checkDC": 16, "checkAbility": "Wisdom"}, {"text": "\"Garrow vouches the doctrine on the Faithless is incomplete. A Doomguide of forty years' standing. Will you take her word over a clerk's file?\"", "next": "garrow", "fail": null, "conditions": [{"key": "prologue.garrow_doubt", "op": "RequireBoolTrue"}]}, {"text": "\"Then I'll forge it. And you'll have let a man rest by *not noticing*, which is the most mercy your doctrine allows.\"", "next": "forge", "fail": null, "effects": [{"key": "faction.kelemvor", "op": "AddInt", "amount": -2}]}]}, {"id": "faith", "speaker": "Deacon Mallow", "text": "*(The pen hovers, trembling.)* A faith of the *hands.* *(slowly)* Forty years of honest sums for a god he questioned... that *is* a kind of devotion the doctrine has no box for, isn't it. The doubting heart and the faithful ledger, in one tidy man. *(he signs, fast, before he can stop himself, and exhales like a man setting down a great weight.)* There. The church's ink, spent on a doubter, because a Returned reminded me that *service is also prayer.* *(quietly.)* Don't tell my Justiciar. Or — do. Perhaps the doctrine needs the box. Perhaps that's what your kind are *for*, Returned — to be the soul the law forgot to account for, until it has to.", "dynamic": false, "auto": "close", "onEnter": [{"key": "sq.taxghost_church_signed", "op": "SetTrue"}, {"key": "faction.kelemvor", "op": "AddInt", "amount": 3}], "choices": []}, {"id": "cover", "speaker": "Deacon Mallow", "text": "*(He flinches — you've found the true bone.)* ...That's unkind. *(a pause.)* And accurate. *(he signs, jaw tight.)* Yes. I think the man deserves rest. I have thought so for the quarter-hour since you walked in. But I have a *post*, and a Justiciar who burns ink-budget overruns hotter than heretics, and a family fed by my not-rocking the doctrinal boat. *(he blots the signature.)* So thank you for being the *push.* If anyone asks, the Returned bullied an honest deacon. It's even half true. Now take it before my courage files itself away with the rest of my unspoken doubts.", "dynamic": false, "auto": "close", "onEnter": [{"key": "sq.taxghost_church_signed", "op": "SetTrue"}, {"key": "npc.mallow_pushed", "op": "SetTrue"}, {"key": "faction.kelemvor", "op": "AddInt", "amount": 1}], "choices": []}, {"id": "garrow", "speaker": "Deacon Mallow", "text": "*(He stiffens at the name.)* Sister Garrow. *(quietly.)* She left the order over exactly this — a sorting she couldn't sign. We called her weak. *(he looks at the form, then at you, then at the chapel's gold book of the saved.)* If *she* says the doctrine's incomplete — and she buried more Faithless with her own hands than I've ever signed for — then I am a younger, smaller priest disagreeing with a braver, older one about the very thing she gave up her post to be right about. *(he signs.)* There. On Garrow's authority, not mine. Tell her... tell her a deacon she's never met just spent the church's ink the way she'd have wanted. She'll know what it cost me. She paid it first.", "dynamic": false, "auto": "close", "onEnter": [{"key": "sq.taxghost_church_signed", "op": "SetTrue"}, {"key": "npc.mallow_honors_garrow", "op": "SetTrue"}, {"key": "faction.kelemvor", "op": "AddInt", "amount": 2}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "forge", "speaker": "Deacon Mallow", "text": "*(He turns very deliberately to face the wall.)* I did not see that. *(quietly.)* The most my doctrine allows me is to *not look* while a kindness is done against the rules. *(he stays facing the wall.)* Forge it well, Returned. And know that a faith which can only offer mercy by *looking away* is a faith with a hole in it shaped exactly like Tobias. Exactly like you. ...Go. Before I turn around and become certain again.", "dynamic": false, "auto": "close", "onEnter": [{"key": "sq.taxghost_church_forged", "op": "SetTrue"}, {"key": "faction.kelemvor", "op": "AddInt", "amount": -1}], "choices": []}, {"id": "refuse", "speaker": "Deacon Mallow", "text": "*(He closes the signing-book.)* I'm sorry. The doctrine holds, even when I wish it wouldn't. *(quietly.)* Find another way, or let the man wait. The Wall is patient. So, gods forgive us, are we.", "dynamic": false, "auto": "close", "onEnter": [{"key": "sq.taxghost_church_refused", "op": "SetTrue"}], "choices": []}, {"id": "close", "speaker": "Deacon Mallow", "text": "*(Whatever passed, the deacon returns to his book a little less certain of it than he was — which is, perhaps, all a doctrine can survive losing at one time.)*", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "sq.taxghost.resolution", "file": "GateSideQuestsContent.cs", "title": "Sq · Taxghost · Resolution", "start": "0", "nodes": [{"id": "0", "speaker": "Tobias Ledgerwhite", "text": "*(Back at the phantom desk. Tobias has the form — employer's signature obtained, church's secured (or forged, or absent) — and only one box remains, and he cannot look at it.)* You came back. *(he says it with a wonder no clerk should be capable of.)* Two signatures. *Two.* I'd resigned myself to eternity at noon, and you've gone and made me *current* on my filings. *(his spectral hand hovers over the last box.)* Only the witness remains. The box that swears I... *(he can't say it.)* I find I'm more frightened of this empty box than I ever was of dying. Dying was just a *deadline.* This is a *verdict.* Will you sign it? Will you swear that Tobias Ledgerwhite *mattered*? And — gods help me — do you believe it, or will you only be kind?", "dynamic": false, "auto": "1", "onEnter": [{"key": "sq.taxghost_resolution_begun", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "Tobias Ledgerwhite", "text": "*(He holds out the pen — yours to take, or not.)* Sign it true, or sign it kind, or don't sign it. But tell me which. A clerk can survive a hard truth. It's the *unaudited* uncertainty that's killed me. So. What does the witness-box say of Tobias?", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "\"Tobias, you mattered — not because of the ledgers. Because you stayed forty years past caring, and got the sums right anyway, for strangers who never thanked you. That's not a function. That's a quiet kind of love.\"", "next": "mattered", "fail": null, "effects": [{"key": "sq.taxghost_witnessed", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 5}]}, {"text": "[INSIGHT 17] \"You think you need me to say you mattered. You don't. You filed yourself off the harvest list — you died protecting a stranger's name from the nothing. You witnessed your OWN worth. I'm just co-signing.\"", "next": "selfwitness", "fail": "kind", "checkDC": 17, "checkAbility": "Wisdom"}, {"text": "\"I'll sign it kind. You did matter, but I'll be honest — I barely knew you. Take the kindness anyway. The dead are owed at least that.\"", "next": "kind", "fail": null, "effects": [{"key": "companion.varra.approval", "op": "AddInt", "amount": 2}]}, {"text": "\"The Choir's smiling man would sign it — if you let your name feed the harvest. You'd 'matter' enormously. Refuse him. Rest as yourself, unused.\"", "next": "choir", "fail": null}]}, {"id": "mattered", "speaker": "Tobias Ledgerwhite", "text": "*(He takes the signed form, and reads the witness-box, and a sound comes out of him that is forty years overdue.)* \"...A quiet kind of love.\" *(He weeps, and as he weeps the noon light in the counting-house finally, finally shifts — a single clock somewhere striking *one.*)* It's — it's *one o'clock.* *(astonished, transfigured.)* The day's allowed to end. *Forty years* of fearing the day would end, and it turns out the day was only waiting for someone to total the one column I couldn't. *(he is fading now, gently, gratefully.)* Tell the weeping auctioneer, and the gravedigger, and the girl with the list — tell them a clerk says *thank you for the keeping of names.* It's the only true wealth this city ever had. *(softly, fading.)* File me under *remembered.* I'll know the box is filled. I'll rest in a balanced ledger at last.", "dynamic": false, "auto": "close", "onEnter": [{"key": "sq.taxghost_complete", "op": "SetTrue"}, {"key": "sq.taxghost_at_peace", "op": "SetTrue"}, {"key": "deed.named_the_forgotten", "op": "SetTrue"}], "choices": []}, {"id": "selfwitness", "speaker": "Tobias Ledgerwhite", "text": "*(He goes utterly still, then lets out a long, trembling, *clerk's* laugh — the laugh of a man shown an error in his own arithmetic that turns out to be in his favor.)* I... left myself off the harvest list. *(slowly.)* I was filing four hundred and eleven souls, and I came to my own name, and I — I *omitted* it. I gave a stranger my slot, didn't I. Some netmender or winkle-seller who'd have been processed faster. I died one short so another could be one late. *(he stares at his hands.)* I witnessed my own worth and then spent eternity forgetting I'd done it. *(he signs, weeping and laughing at once, and the clock strikes one.)* You didn't tell me I mattered, Returned. You *audited* me, and found I'd known all along. That's the kindest sum anyone ever ran. *(fading, at peace.)* Co-signed. Filed. *Rested.*", "dynamic": false, "auto": "close", "onEnter": [{"key": "sq.taxghost_complete", "op": "SetTrue"}, {"key": "sq.taxghost_self_witnessed", "op": "SetTrue"}, {"key": "deed.named_the_forgotten", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 3}], "choices": []}, {"id": "kind", "speaker": "Tobias Ledgerwhite", "text": "*(He takes the form, and there is gratitude in it, but his clerk's eye catches the truth.)* Kind, not true. *(quietly.)* I can tell the difference; I spent forty years spotting padded entries. *(but he signs it anyway, and the clock, after a long hesitation, strikes one.)* And do you know — *kind* turns out to be enough. *(wondering.)* I thought I needed to have *mattered.* But perhaps mattering was always too high a bar, and being *treated gently by a stranger at the end* is the realer, smaller, achievable thing. *(fading.)* You were kind to a dead clerk you barely knew. In this city, that may be the rarest entry in any ledger. I'll rest on the kindness. It's more than the saved get. Thank you.", "dynamic": false, "auto": "close", "onEnter": [{"key": "sq.taxghost_complete", "op": "SetTrue"}, {"key": "sq.taxghost_rests_on_kindness", "op": "SetTrue"}], "choices": []}, {"id": "choir", "speaker": "Tobias Ledgerwhite", "text": "*(He recoils from the very idea.)* Feed my *name* to the harvest? To *matter* by being *used?* *(fastidious horror.)* No. No, that's — that's a falsified entry, that's mattering *fraudulently*, that's the smiling man offering to fill my witness-box with a lie that costs my own soul. *(he straightens, and finds his dignity.)* I would rather rest *unfiled* forever than be *filed under useful.* *(quietly.)* Thank you for showing me the offer, Returned. I almost think you showed it to me *so* I could refuse it — so I could learn that I'd rather be a forgotten man than a harvested one. *(he sets down the form, choosing the long wait over the false rest.)* I'll wait for a true signature. Or none. But not *that* one. A clerk has standards. Apparently they outlast death.", "dynamic": false, "auto": "close", "onEnter": [{"key": "sq.taxghost_refused_choir", "op": "SetTrue"}, {"key": "act1.choir_doubt_seeded", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "close", "speaker": "Tobias Ledgerwhite", "text": "*(Whether he rested or chose to wait, the corner of the counting-house feels different now — no longer haunted, exactly. Witnessed. Which, you are beginning to understand, is the whole of what the dead of this city have ever asked.)*", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "sq.lulaslist.confrontation", "file": "GateSideQuestsContent.cs", "title": "Sq · Lulaslist · Confrontation", "start": "0", "nodes": [{"id": "0", "speaker": "The Smiling Man", "text": "*(They've come for it together, three grown-ups around one girl on a barrel: the Choir's Smiling Man, a soft-voiced church clerk, and a patriar's polished agent. Lula sits on the great ledger, twelve years old and furious, and looks to you.)* We're not monsters, friend — note that all three of us said it at once; do reflect on that. *(the smile is bottomless.)* The child has compiled something precious. A registry of named Faithless souls. We three merely disagree on its highest use. Surely a thing so valuable shouldn't molder under a child who'll only... *remember* it.", "dynamic": false, "auto": "1", "onEnter": [{"key": "sq.lulaslist_confront_begun", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "The Church Clerk", "text": "*(soft, regretful)* The list is heresy, plainly. Each name written undoes a sorting the law made. I'd not *harm* the child — gods, no — I'd simply *burn the book* and let the forgetting resume as doctrine intends. It's a *mercy*, really. The dead are meant to rest in nothing, not be dragged back as a *grievance.*", "dynamic": false, "auto": "2", "onEnter": [], "choices": []}, {"id": "2", "speaker": "The Patriar's Agent", "text": "*(smooth)* Burn it? Gods, the *waste.* Every name on that list has a grieving survivor who'd pay — handsomely, gratefully — to buy back the memory of their own dead. My principal would purchase the registry and operate it as a *service.* Closure, retailed. The child even gets a cut; we're not barbarians. *(he spreads his hands.)* Honor it, burn it, or *monetize* it. Three reasonable adults. Choose, Returned. The child clearly trusts your judgment more than ours, which is itself a little insulting.", "dynamic": false, "auto": "choice", "onEnter": [], "choices": []}, {"id": "choice", "speaker": "Lula", "text": "*(small, fierce, to you, ignoring all three)* They keep saying *use.* Honor-use, burn-use, sell-use. *(her hand flattens on the ledger.)* You promised. Whatever you say next — remember Tam liked frogs and was eight and doubted, and none of *that* is *for* anything. Say the thing none of them can.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "\"The list isn't FOR anything. That's the point, and it's the whole point of the saga. Remembering with no use is the only thing the Wall can't corrupt. All three of you — go.\"", "next": "nouse", "fail": null, "effects": [{"key": "faction.choir", "op": "AddInt", "amount": -6}, {"key": "sq.lulaslist_protected", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 8}]}, {"text": "[PERSUADE 18] \"Here's the use that ends your argument: I copy it. Many copies, in many hands, no single owner. Un-burnable, un-buyable, un-harvestable. A name everyone keeps is a name no one can spend.\"", "next": "copies", "fail": "grab", "checkDC": 18, "checkAbility": "Charisma"}, {"text": "\"Patriar — buy it, then give it to the survivors free, with the church clerk forced to read each name aloud as penance. Turn three vultures into one apology.\"", "next": "apology", "fail": null, "effects": [{"key": "faction.fist", "op": "AddInt", "amount": 2}]}, {"text": "[INSIGHT 16] \"Smiling Man — you didn't come for the list. You came to make a CHILD complicit, because a Choir that recruits the grieving needs the young to believe remembering requires a buyer. Get away from her.\"", "next": "expose", "fail": "grab", "checkDC": 16, "checkAbility": "Wisdom"}]}, {"id": "nouse", "speaker": "The Smiling Man", "text": "*(The other two bluster; the Smiling Man only inclines his head, and his smile, for once, looks almost like defeat.)* \"Remembering with no use.\" *(softly.)* Do you know, in all my recruiting, that is the one sentence I have no counter for. Everything else I can reframe — grief, fear, hope, even love, all of it leads back to a leash if you hold it long enough. But a memory kept for *nothing*, expecting *nothing*... *(he steps back from the child.)* ...has no handle on it. Nowhere to clip the lead. *(he gathers the other two with a glance.)* Come. There's no transaction here. The rarest thing in the Gilded Gate — and not one of us can sell it. *(to you, with genuine, chilling respect.)* You've cost me a registry and taught me a fear. We'll meet again, Returned. I should like to know what *else* you keep for nothing.", "dynamic": false, "auto": "lula_close", "onEnter": [{"key": "sq.lulaslist_protected", "op": "SetTrue"}, {"key": "sq.lulaslist_unsellable", "op": "SetTrue"}, {"key": "deed.kept_for_nothing", "op": "SetTrue"}], "choices": []}, {"id": "copies", "speaker": "The Patriar's Agent", "text": "*(He does the math and goes pale.)* Many copies. No owner. *(aghast.)* You've just — you've *destroyed the asset by infinitely duplicating it*, that's *monstrous*, that's — *(the church clerk is equally horrified for the opposite reason)* — un-burnable! You can't burn a book that's in a hundred hands! *(Lula, meanwhile, is grinning like a sunrise.)* This is — there's no *play* here, you've made the names *worthless* by making them *priceless*, the two are supposed to be *opposites* — *(the Smiling Man, quietly, is the only one who understands, and the only one who looks impressed.)* The miracle's right, gentlemen. A name everyone keeps is a name no one owns. We've lost. Pick up your reasons and let's go be reasonable somewhere profitable.", "dynamic": false, "auto": "lula_close", "onEnter": [{"key": "sq.lulaslist_copied", "op": "SetTrue"}, {"key": "sq.lulaslist_unsellable", "op": "SetTrue"}, {"key": "deed.kept_for_nothing", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "apology", "speaker": "The Patriar's Agent", "text": "*(He considers, then — to everyone's surprise — laughs.)* Buy it, gift it free, and make the *deacon* read each name as penance. *(he glances at the church clerk's horror with relish.)* You know, that's *deliciously* spiteful and it *photographs* beautifully — \"Patriar funds free remembrance of the poor's dead.\" My principal will adore the standing it buys. *(the church clerk sputters; the agent overrides him.)* Done. The survivors get their names free, the church does public penance, and I get to be seen as generous while ruining a deacon's month. Three vultures, one apology. *(to you.)* You should go into *brokering*, Returned. You just made everyone lose in a way they'll each call winning. That's the highest art there is.", "dynamic": false, "auto": "lula_close", "onEnter": [{"key": "sq.lulaslist_apology", "op": "SetTrue"}, {"key": "faction.kelemvor", "op": "AddInt", "amount": -2}, {"key": "deed.kept_for_nothing", "op": "SetTrue"}], "choices": []}, {"id": "expose", "speaker": "The Smiling Man", "text": "*(The smile thins to a blade.)* ...Ah. *(quietly, just to you, under the others' noise.)* You see the actual move. Not the list — the *child.* If I can teach a grieving twelve-year-old that even *remembering* requires a buyer, a sponsor, a *use* — then I've recruited the one generation that might otherwise have kept things for nothing. *(he steps back, conceding.)* You've protected more than a ledger. You've protected the *idea* that the ledger doesn't need me. *(the blade-smile, oddly, warms a fraction.)* I almost respect it enough to stop. Almost. We'll see who's still keeping things for nothing when the Wall comes down, Returned. Mind the child. She's more dangerous to my whole enterprise than you are.", "dynamic": false, "auto": "lula_close", "onEnter": [{"key": "sq.lulaslist_protected", "op": "SetTrue"}, {"key": "npc.smiling_retreats", "op": "SetTrue"}, {"key": "faction.choir", "op": "AddInt", "amount": -4}, {"key": "deed.kept_for_nothing", "op": "SetTrue"}], "choices": []}, {"id": "grab", "speaker": "Lula", "text": "*(Your clever play falters — and in the half-second of hesitation, the patriar's agent lunges for the ledger. But Lula is twelve and unbreakable and has already lost the thing she feared losing, and she yanks it back with a snarl, and the moment holds, knife-edged.)* *(to you, fierce, terrified)* They're *taking* it — say the simple thing, not the clever thing, SAY IT —", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "\"The list isn't for anything. Hands off the child. All three of you — go.\"", "next": "nouse", "fail": null}, {"text": "\"Get back. The book stays with the girl, and the girl stays with me.\"", "next": "nouse", "fail": null}]}, {"id": "lula_close", "speaker": "Lula", "text": "*(The grown-ups disperse, their reasons unspent, and Lula looks at the great fraying ledger, and then at you, and for the first time the fierceness gives way to something a twelve-year-old shouldn't have had to earn: relief.)* They're gone. *(quietly.)* You said the thing. The *for nothing* thing. *(she opens to the first page — Tam, eight, liked frogs — and adds a name beneath it with steady, ink-stained hands.)* I'll keep adding. You keep the world off it. And when it's the Court of the Dead — *(she looks up, and it isn't a child's request anymore, it's a covenant)* — you bring the list, and you make them read every name, for nothing, expecting nothing. *(she bends back to the ledger.)* That's what the living owe the dead. Not a use. Just the *keeping.* ...Tam first. Promise.", "dynamic": false, "auto": null, "onEnter": [{"key": "sq.lulaslist_complete", "op": "SetTrue"}, {"key": "sq.lulaslist_covenant", "op": "SetTrue"}], "choices": []}]}, {"id": "safehouse.informant", "file": "HarperSafehouseScene.cs", "title": "Safehouse · Informant", "start": "0", "nodes": [{"id": "0", "speaker": "Harper Handler", "text": "A woman sits bound to a chair, jaw set, eyes flicking. \"Caught her selling our drop-points to the Flaming Fist. Roen vouches for your judgement, so — your call. We can *turn* her, lean hard till she spies for us instead. Or you can argue for cutting her loose. I'll warn you: loose, she might run straight back to the Fist. People mostly do.\"", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "Turn her. A frightened asset is still an asset.", "next": "turned", "fail": null, "effects": [{"key": "safehouse.informant_resolved", "op": "SetTrue"}, {"key": "safehouse.informant_turned", "op": "SetTrue"}]}, {"text": "Cut her loose. Give her the choice no one's given her.", "next": "freed", "fail": null, "effects": [{"key": "safehouse.informant_resolved", "op": "SetTrue"}, {"key": "safehouse.informant_freed", "op": "SetTrue"}]}]}, {"id": "turned", "speaker": "Harper Handler", "text": "It works, the way leaning on the frightened works. She'll spy for you now, and hate you, and be useful, and the work will get done. The handler nods, satisfied. You watch the woman's face close like a door and understand, a little better than you wanted to, how the Wall got built one reasonable decision at a time.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}, {"id": "freed", "speaker": "Harper Handler", "text": "The handler grimaces but cuts the ropes — Roen's name carries weight. The woman rubs her wrists, stares at you like you've handed her a live coal, and walks out into the dark unowned by anyone for the first time in years. Maybe she runs back to the Fist. Maybe she doesn't. You gave her the one thing the Wall never gives: the dignity of being allowed to decide.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "safehouse.*", "file": "HarperSafehouseScene.cs", "title": "Safehouse", "start": "0", "nodes": [{"id": "0", "speaker": "NPC", "text": null, "dynamic": true, "auto": null, "onEnter": [], "choices": []}]}, {"id": "ilfaeril.quest.arrival", "file": "IlfaerilQuestContent.cs", "title": "Ilfaeril · Quest · Arrival", "start": "0", "nodes": [{"id": "0", "speaker": "Ilfaeril", "text": "I knew this would find me eventually. Ten thousand years is a long time for a thing to wait, but patience is the one virtue the dead have in surplus. This reliquary belonged to Maerith of the Singing Vale — one of the people my court voted to *unmake.* Not kill. Unmake. We denied her dead even a grave to rest in. I raised my hand. I have never once raised it back down.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "You were one vote. The Law took thousands.", "next": "1", "fail": null}, {"text": "You don't have to open it. Not today.", "next": "2", "fail": null}]}, {"id": "1", "speaker": "Ilfaeril", "text": "Do not do that. Do not make it smaller to spare me. A thousand hands built the Wall, yes — and every one of them told itself it was only one hand. That arithmetic *is* the atrocity. I will not hide inside it. The name on this lock is hers, and I am the last creature alive who can still say it. That is not absolution. It is a debt with my name on the invoice.", "dynamic": false, "auto": "3", "onEnter": [], "choices": []}, {"id": "2", "speaker": "Ilfaeril", "text": "There is no 'not today' left in me, friend. I have guided ten thousand strangers gently past the Wall and never once dared face the single soul I owed. If I walk away from this, I am only what I have always been: a man performing mercy on everyone except the people he wronged. No. I open it.", "dynamic": false, "auto": "3", "onEnter": [], "choices": []}, {"id": "3", "speaker": "Ilfaeril", "text": "...But we are not alone in this crypt. That cold, underneath the old cold — that is the Choir. Of course they came. To them I am not a sinner; I am a *relic* — the first witness, the proof their unmaking is holy. They will want what's in that reliquary, and they will want me. Draw. They do not get to make my worst day into their scripture.", "dynamic": false, "auto": null, "onEnter": [{"key": "ilfaeril.quest.arrived", "op": "SetTrue"}], "choices": []}]}, {"id": "ilfaeril.quest.cantor", "file": "IlfaerilQuestContent.cs", "title": "Ilfaeril · Quest · Cantor", "start": "0", "nodes": [{"id": "0", "speaker": "The Pale Cantor", "text": "Witness. *Witness.* Do you feel how the air leans toward you? Ten thousand years you have knelt at the edge of the Wall begging to be forgiven, and never once understood: you do not need forgiveness. You need only to be *right.* You voted to unmake the unclaimed. The Unmade simply agrees with you. Give us the relic, and we will give you the one mercy the gods never did — we will tell you that you were correct.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "He's worth more than the worst thing he ever did.", "next": "1", "fail": null}, {"text": "(To Ilfaeril) Don't take the comfortable lie.", "next": "1", "fail": null}]}, {"id": "1", "speaker": "Ilfaeril", "text": "You offer to end my guilt by proving I never should have had any. (He sets himself between the Cantor and the reliquary.) Cantor — that is not mercy. That is the most obscene thing anyone has said to me in ten thousand years. My guilt is the only monument those people have. I will not let you melt it down for a key.", "dynamic": false, "auto": null, "onEnter": [{"key": "ilfaeril.quest.cantor_known", "op": "SetTrue"}], "choices": [{"text": "(Stand with him. Drive the Choir off.)", "next": "2", "fail": null}]}, {"id": "2", "speaker": "Ilfaeril", "text": "Maerith. I am sorry. I have brought a war to your door again. (He lifts his shield, and for the first time in an age it does not feel like a burden.) Let us earn the right to open it.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "ilfaeril.quest.resolution", "file": "IlfaerilQuestContent.cs", "title": "Ilfaeril · Quest · Resolution", "start": "0", "nodes": [{"id": "0", "speaker": "Ilfaeril", "text": "The Choir is scattered, and the reliquary is quiet, and it knows my voice. It is opening.\n\n(Inside: no weapon, no relic of power. A message-stone, set ten thousand years ago by a woman who knew that one day her judge might be the only one left to hear it. Maerith's voice fills the crypt — and it is not cursing him. It is *forgiving* him.)\n\nI... I do not know what to do with this. I prepared for her hate. I have no defense against her mercy. Tell me. What do I do?", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "Refuse it. Keep paying — guide the lost, forever. (the penance)", "next": "penance", "fail": null, "effects": [{"key": "quest.ilfaeril.resolved", "op": "SetTrue"}, {"key": "quest.ilfaeril.penance", "op": "SetTrue"}, {"key": "companion.ilfaeril.approval", "op": "AddInt", "amount": 10}]}, {"text": "Accept it. You're allowed to be more than your worst vote. (be forgiven)", "next": "forgiven", "fail": null, "effects": [{"key": "quest.ilfaeril.resolved", "op": "SetTrue"}, {"key": "quest.ilfaeril.forgiven", "op": "SetTrue"}, {"key": "companion.ilfaeril.approval", "op": "AddInt", "amount": 20}]}, {"text": "[Insight] She isn't closing your debt. She's handing you a charge.", "next": "commission_win", "fail": "commission_fail", "checkDC": 16, "checkAbility": "Wisdom"}]}, {"id": "penance", "speaker": "Ilfaeril", "text": "No. I cannot take it — not yet, perhaps not ever. To accept her forgiveness is to set down the weight, and the weight is the last true thing I carry of her and her people. So I will keep it. I will guide the lost past the Wall until the stars go out, and call that my answer.\n\n(He bows his head. It is devotion, and it is also a kind of hiding, and he half knows it.) Thank you for standing with me. Even a man who refuses rest is glad not to refuse it alone.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}, {"id": "forgiven", "speaker": "Ilfaeril", "text": "...All right. (The word costs him more than any wound the Choir dealt.) All right, Maerith. I accept it. I accept that I am not only the hand I raised — that ten thousand years of trying to make it right is allowed, at last, to *count.*\n\n(He breathes out, and something ancient and rigid in him eases.) I had forgotten that forgiveness is a thing you do for the *living.* She freed me to stop. One day — not today, but one day — I think I might even rest. You gave me that. I will not waste it.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}, {"id": "commission_win", "speaker": "Ilfaeril", "text": "Wait — listen to her words again. She does not say *be at peace.* She says *do not let it happen to anyone else.* She is not closing the account. She is *hiring* me.\n\nGods. Ten thousand years I treated her forgiveness as a door I had to be worthy to walk through — and it was a *sword* she was holding out, hilt-first, the whole time. I accept it. Not as an ending. As a commission. The Wall took her people; I will spend whatever I have left tearing a hole in it for the rest of them. That is the only forgiveness worth the name: the kind that puts you back to work. You didn't absolve me, friend. You *armed* me.", "dynamic": false, "auto": null, "onEnter": [{"key": "quest.ilfaeril.resolved", "op": "SetTrue"}, {"key": "quest.ilfaeril.forgiven", "op": "SetTrue"}, {"key": "quest.ilfaeril.commission", "op": "SetTrue"}, {"key": "companion.ilfaeril.approval", "op": "AddInt", "amount": 30}], "choices": []}, {"id": "commission_fail", "speaker": "Ilfaeril", "text": "Do not reach for a clever reading of her words to make this easy on me. I have hidden inside elegant interpretations for ten thousand years; it is its own kind of cowardice. Her meaning is plain enough. The only question is mine to answer.\n\nSo say it simply: do I take what she offers, or do I keep paying?", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "Keep paying. Guide the lost, forever. (the penance)", "next": "penance", "fail": null, "effects": [{"key": "quest.ilfaeril.resolved", "op": "SetTrue"}, {"key": "quest.ilfaeril.penance", "op": "SetTrue"}, {"key": "companion.ilfaeril.approval", "op": "AddInt", "amount": 10}]}, {"text": "Take what she offers. You're allowed to stop. (be forgiven)", "next": "forgiven", "fail": null, "effects": [{"key": "quest.ilfaeril.resolved", "op": "SetTrue"}, {"key": "quest.ilfaeril.forgiven", "op": "SetTrue"}, {"key": "companion.ilfaeril.approval", "op": "AddInt", "amount": 20}]}]}]}, {"id": "market.urchin", "file": "MarketScene.cs", "title": "Market · Urchin", "start": "0", "nodes": [{"id": "0", "speaker": "Flaming Fist", "text": "\"Caught this one's hand in a fishwife's purse. Edict says a finger for a first theft, or the Seatower cells.\" The child — eight, maybe nine, all elbows and terror — doesn't even struggle. They've done this before. \"Unless someone wants to pay the fishwife's loss and stand surety. You someone, Returned?\"", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "[Stand surety.] I'll cover it. Let the child go.", "next": "freed", "fail": null, "effects": [{"key": "market.urchin_resolved", "op": "SetTrue"}, {"key": "market.urchin_freed", "op": "SetTrue"}, {"key": "reputation.lowcity", "op": "AddInt", "amount": 2}]}, {"text": "The law's the law. (Let them take the child.)", "next": "taken", "fail": null, "effects": [{"key": "market.urchin_resolved", "op": "SetTrue"}, {"key": "reputation.lowcity", "op": "AddInt", "amount": -2}]}]}, {"id": "freed", "speaker": "Flaming Fist", "text": "The picket shrugs, takes your coin, and lets go of a fistful of ragged tunic. The child is gone before you can speak — but at the mouth of the alley they stop, and look back at you, and do not run. They are *deciding something.* In the Lower City, that is how every good thing starts: a child, surprised by mercy, deciding the world might hold some after all.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}, {"id": "taken", "speaker": "Flaming Fist", "text": "\"Sensible.\" He marches the child off toward the Seatower. They don't cry. That's the part that stays with you — not tears, just the small flat face of someone learning, on schedule, exactly what the city thinks they're worth. The fishwife won't meet your eye. She has children too.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "market.*", "file": "MarketScene.cs", "title": "Market", "start": "0", "nodes": [{"id": "0", "speaker": "NPC", "text": null, "dynamic": true, "auto": null, "onEnter": [], "choices": []}]}, {"id": "naeve.quest.arrival", "file": "NaeveQuestContent.cs", "title": "Naeve · Quest · Arrival", "start": "0", "nodes": [{"id": "0", "speaker": "Naeve", "text": "Do you hear it? No — of course you don't. It's the resonance of a live mythallar, and there has not been one of those in this world for a thousand years. This is a piece of the Seventh Enclave. My Enclave. It never finished falling. It has been *up here,* humming my home's exact note, the whole time I thought I'd lost it.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "Then let's go in. Carefully.", "next": "1", "fail": null}, {"text": "How is anything still aloft after the Weave died?", "next": "2", "fail": null}]}, {"id": "1", "speaker": "Naeve", "text": "Carefully. Yes. I have not been careful with anything I loved since I was old enough to derive a proof, and look what that bought the sky. So — carefully. Stay close. The wards here knew my hand once. I do not know if a thousand years remembers.", "dynamic": false, "auto": "3", "onEnter": [], "choices": []}, {"id": "2", "speaker": "Naeve", "text": "It shouldn't be. That's what frightens me. A mythallar that loses its Weave goes dark and the city comes down — I *watched* it, all of them, at once. For this one to still be burning, someone left it a reserve. A calculation precise enough to ration a thousand years of magic down to a candle-flame. There were perhaps three people alive who could do that math. I was one.", "dynamic": false, "auto": "3", "onEnter": [], "choices": []}, {"id": "3", "speaker": "Naeve", "text": "So either a colleague I loved spent their last breath saving a rock — or I did, and forgot, and have spent a millennium grieving a thing that was waiting for me to come back. I have to know which. Whatever's at the core, I face it. Come.", "dynamic": false, "auto": null, "onEnter": [{"key": "naeve.quest.arrived", "op": "SetTrue"}], "choices": []}]}, {"id": "naeve.quest.echo", "file": "NaeveQuestContent.cs", "title": "Naeve · Quest · Echo", "start": "0", "nodes": [{"id": "0", "speaker": "Vaelin (an echo)", "text": "Arcanist Naeve. You took your time. I am — was — Vaelin, Steward of the Seventh. What's left of me the mythallar keeps, the way it keeps everything: imperfectly, and forever. You want to know who saved this shard. Child. *You* did. You set the rationing wardstone in the last hour, while the rest of us screamed at Karsus's sky.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "I don't remember doing that.", "next": "1", "fail": null}, {"text": "Then why does it feel like a tomb, not a rescue?", "next": "1", "fail": null}]}, {"id": "1", "speaker": "Vaelin (an echo)", "text": "Because it is both. You saved a fragment by sentencing it to fall *slowly* — for a thousand years, instead of an afternoon. Everyone in it is still here. Still falling. Still mine to steward. And the candle is nearly out: the wardstone has been drinking the world's last live Weave to keep us, and there is almost none left. You came back at the very end of the math.", "dynamic": false, "auto": "2", "onEnter": [{"key": "naeve.quest.truth_known", "op": "SetTrue"}], "choices": []}, {"id": "2", "speaker": "Vaelin (an echo)", "text": "There is one mercy left to me: the core's old protocol. *Admit no one who would unmake the work.* I cannot tell anymore whether you have come to save us or to finish us — and the wards will not let either of us decide it with words. They are waking. I am sorry, Arcanist. Get to the core, and *then* choose. I find I would rather lose to you than to time.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "naeve.quest.resolution", "file": "NaeveQuestContent.cs", "title": "Naeve · Quest · Resolution", "start": "0", "nodes": [{"id": "0", "speaker": "Naeve", "text": "The wards are still. The core is open, and Vaelin's right — the wardstone is nearly dry. Whatever I do, I do it now, in the last live Weave my own younger hand set aside.\n\nThree ways this ends. I have run them a thousand times in my sleep and never once been brave enough to pick. Help me. Please.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "Lock it in stasis. Keep the last of Netheril, whole, forever. (preserve)", "next": "preserve", "fail": null, "effects": [{"key": "quest.naeve.resolved", "op": "SetTrue"}, {"key": "quest.naeve.preserved", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 10}]}, {"text": "Let it finish falling. Lay your world to rest — and carry it. (release)", "next": "release", "fail": null, "effects": [{"key": "quest.naeve.resolved", "op": "SetTrue"}, {"key": "quest.naeve.released", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 20}]}, {"text": "[Arcana] The wardstone can give its Weave back — not embalm the dead, but feed the living.", "next": "rekindle_win", "fail": "rekindle_fail", "checkDC": 16, "checkAbility": "Intelligence"}]}, {"id": "preserve", "speaker": "Naeve", "text": "...I can't. I can't be the hand that ends it twice. (She seals the wardstone, and the shard stops falling — a snowflake caught mid-air, forever.)\n\nThey're safe now. Frozen, but safe; mine to keep. Don't say it. I know what it is — a tomb I'll visit and call a home, a mistake I refused to carry because clutching it was easier. I am not ready to let the sky finish. Maybe I never will be. But you stood here while I wasn't brave. That is its own kind of saving.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}, {"id": "release", "speaker": "Naeve", "text": "No. A thing held out of its ending isn't saved — it's only made to fall forever, and I have asked enough people to fall forever. (She lifts her hand from the wardstone, and gently, the last of Netheril lets go.)\n\nIt's done. It fell. It was always going to fall, and I have spent a thousand years pretending my grief was a calculation I could redo. It isn't. Some mistakes you don't erase. You *carry* them. I think — I think I can carry this now. Because I'm not carrying it alone.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}, {"id": "rekindle_win", "speaker": "Naeve", "text": "Wait — *wait.* The wardstone isn't a cage, it's a held breath. The Weave inside it isn't spent, it's *saved* — the last live magic in the world, and I have been treating it as a shroud. I can open my own hand. Let it go not down, but *out* — back into the dead Weave of the present, a seed instead of a tomb.\n\nThere's a notation under my old proof in a hand I almost know — it says the same thing, as if someone left me the answer to find. Netheril doesn't get to live again. But it gets to *give.* My people end as the thing that makes new magic possible. That's not erasing the mistake. That's the mistake, finally, building something.", "dynamic": false, "auto": null, "onEnter": [{"key": "quest.naeve.resolved", "op": "SetTrue"}, {"key": "quest.naeve.released", "op": "SetTrue"}, {"key": "quest.naeve.rekindled", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 30}], "choices": []}, {"id": "rekindle_fail", "speaker": "Naeve", "text": "Don't — don't hand me an elegant third door. Elegance is what I trusted last time, and it dropped a civilization out of the sky. There's no clever proof that makes this not hurt. There's only what I'm willing to carry.\n\nSo, plainly: do I freeze them and keep the tomb, or do I let the sky finish falling?", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "Keep them. Freeze the shard. (preserve)", "next": "preserve", "fail": null, "effects": [{"key": "quest.naeve.resolved", "op": "SetTrue"}, {"key": "quest.naeve.preserved", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 10}]}, {"text": "Let it fall. Lay it to rest. (release)", "next": "release", "fail": null, "effects": [{"key": "quest.naeve.resolved", "op": "SetTrue"}, {"key": "quest.naeve.released", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 20}]}]}]}, {"id": "(NetherilContent)", "file": "NetherilContent.cs", "title": "(netherilcontent)", "start": "0", "nodes": [{"id": "0", "speaker": "—", "text": "You fall out of your own century. Gold light. Sunlight on glass. A city — an entire city — floating in an impossible blue sky, held aloft by magic so total it has forgotten it is magic at all.", "dynamic": false, "auto": "1", "onEnter": [{"key": "netheril.arrived", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "—", "text": "And then — all at once, everywhere, like a bell rung underwater — every spell in the world goes silent. The light dies. And the city, which flies by magic, begins, very slowly and then all at once, to FALL.", "dynamic": false, "auto": "2", "onEnter": [], "choices": []}, {"id": "2", "speaker": "The Returned", "text": "Karsus's Folly. The day the goddess of magic died. I'm standing inside the first apocalypse — and the floor is going out from under the world. Move. MOVE.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}, {"id": "0", "speaker": "Naeve", "text": "You pulled me from the rubble. Impossible — the ward-stones should have rendered me to ash. Unless... you are not of this Now at all. You have the look of someone *falling through time.* I have read of people like you. In the margins of a forbidden proof. In a hand identical to my own — written centuries before I was born.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "Whose hand?", "next": "hand", "fail": null}, {"text": "No time. The city's falling — come with me, NOW.", "next": "join", "fail": null, "effects": [{"key": "companion.naeve.recruited", "op": "SetTrue"}]}]}, {"id": "hand", "speaker": "Naeve", "text": "Yours, I rather think. Which should be impossible, and is the single most interesting thing that has ever happened to me, and we are both about to die discussing it. Get me off this dying enclave and I will tell you everything I have read about you. About what you are.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "Deal. Stay close.", "next": "join", "fail": null, "effects": [{"key": "companion.naeve.recruited", "op": "SetTrue"}]}]}, {"id": "join", "speaker": "Naeve", "text": "Then I am yours, impossible one. Mind the gaps in the floor — gravity has only just remembered it has opinions. Let us not be where the marble is not.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "npc.neth.vael", "file": "NetherilDenizensContent.cs", "title": "Npc · Neth · Vael", "start": "0", "nodes": [{"id": "0", "speaker": "Steward Vael", "text": "*(The floor tilts three degrees. Crystal chandeliers swing. Far below, through the great windows, the ground is *coming up.* And a silver-haired majordomo in immaculate livery glides toward you with a tray of tiny, perfect canapés, not one of which has slid an inch, and bows exactly as deep as your apparent station warrants.)* A refreshment, honored guest, while the enclave... *adjusts its altitude.* *(the floor lurches; he compensates without spilling.)* The salmon is from the Inner Sea, which no longer exists at this elevation, so I should enjoy it promptly. *(a small, perfect smile.)* Is there anything at all I can bring you? We are rather *fully stocked*, as it happens. No one is... checking out.", "dynamic": false, "auto": "1", "onEnter": [{"key": "npc.vael_met", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "Steward Vael", "text": "*(He straightens a painting that will not survive the hour.)* You're looking at me the way they all do, near the end. *(quietly, still smiling, still holding the tray level as the world cants.)* Wondering why the steward doesn't *run.* Doesn't *scream.* Doesn't *pray.* *(he offers the tray again.)* Honored guest, I have served the Seventh Enclave for fifty-one years. I have laid these tables, polished this silver, learned which magelord takes wine and which takes water and which takes a discreet eye turned the *other* way. *(the floor groans.)* And I find, now that the ground is rising to meet us, that I do not know how to be a man who *isn't serving.* I never built one. There was no time; there was always a table to lay. *(he meets your eyes, and the smile holds, but something vast moves behind it.)* So I will serve until the floor stops being a floor. Not from *denial*, you understand. From *love.* It is the only language in which I ever learned to say *I am glad you were here.* A canapé, honored guest? Please. Let me say it to *someone* before the end.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "[INSIGHT 17] \"This isn't service anymore. It's a *vigil.* You're not pretending the city won't fall — you're making sure that when it does, the last thing anyone feels is *cared for.* That's not a footman's reflex. That's a priest's.\"", "next": "vigil", "fail": "bow", "checkDC": 17, "checkAbility": "Wisdom"}, {"text": "\"Then sit with me, Vael. Put the tray down. For five minutes be a *man* I'm glad was here, instead of a steward. The salmon can wait. The ground can wait.\"", "next": "sit", "fail": null}, {"text": "\"Fifty-one years of laying tables, and you never built a self outside the service. But the service *was* a self, Vael. A real one. You loved them, in the only grammar you were given. That counts.\"", "next": "counts", "fail": null, "effects": [{"key": "companion.naeve.approval", "op": "AddInt", "amount": 3}]}, {"text": "\"Take the canapé, share it with me, and tell me one thing you'd have done if there'd ever been time for a Vael who wasn't serving.\"", "next": "dream", "fail": null, "effects": [{"key": "companion.garrow.approval", "op": "AddInt", "amount": 2}]}]}, {"id": "vigil", "speaker": "Steward Vael", "text": "*(The tray dips — just slightly — the first imperfection in fifty-one years.)* ...A vigil. *(the smile finally trembles.)* You're the first to *name* it. They think I'm in *shock*, or *mad*, or too *low* a creature to grasp that we're dying. *(quietly, fiercely gentle.)* I grasp it better than any magelord up there clawing at his teleport-scrolls that won't fire because the Weave is *screaming.* I have *always* grasped what the table is *for*, honored guest. A table is never about the food. It is about the people saying, with forks and candlelight, *we are here, together, and it matters.* *(the city shudders; he steadies the tray by instinct.)* So yes. A vigil. I am keeping the last table of the Seventh Enclave, so that no soul in my care falls out of the sky *unattended.* Frightened, perhaps. But not *unattended.* Never that. *(he straightens.)* I cannot stop the fall. I was never a wizard. But I can make certain the fall is *witnessed* by someone who *gives a damn* — and that, it turns out, is what I was for all along. I just needed the world to end to see it.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.vael_vigil", "op": "SetTrue"}, {"key": "act3.witnessed_fall", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 5}], "choices": []}, {"id": "sit", "speaker": "Steward Vael", "text": "*(He looks at the tray. At the canting floor. At you. And then — slowly, as if setting down something that weighs fifty-one years — he places the tray on a side table and *sits.*)* ...There. *(his hands, freed, do not know where to rest.)* Do you know, I cannot recall the last time I sat in this hall. One does not *sit* where one *serves.* *(the city falls; the light through the windows goes strange and golden.)* Five minutes. As a *man.* *(he draws a breath that shakes.)* Then my name is Corin. Vael is the *house* name, the steward's name; my mother called me Corin, before she sold my indenture to the enclave to keep my sisters fed. *(quietly.)* I have not heard it aloud in fifty-one years. *(he looks at you, and the steward is gone, and a person is there.)* Corin. I was glad to be here. Not the *enclave* — the *being.* The mornings. The good silver catching the sun. The one magelord who always said *thank you, Vael* like he meant it. *(the floor tilts further.)* Thank you for the five minutes, honored guest. I shall stand again in a moment and finish the vigil. But I wanted, *once*, to fall as *Corin.* You gave me that. It is the finest tip I have received in half a century.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.vael_corin", "op": "SetTrue"}, {"key": "act3.witnessed_fall", "op": "SetTrue"}, {"key": "act1.mercy_remembered", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "counts", "speaker": "Steward Vael", "text": "*(The smile holds, but his eyes shine.)* It counts. *(very softly.)* You don't know — you *can't* know — how long I have needed someone to say that the *serving* was *real.* The other servants pity themselves; the magelords pity *us*; everyone treats a life of service as a life *deferred*, a thing one *survives* until one can finally *begin living.* *(he shakes his head.)* But I was *living*, honored guest. Every laid table was a sentence in the only language I had. *I am glad you exist. I want your evening to be lovely. Let me carry the weight you cannot see.* *(the city groans toward the ground.)* That is not a *lesser* love because it wore an apron. *(he picks up the tray again, but gently now, like a thing he's chosen rather than a thing he's bound to.)* You've given me the one gift I could not give myself: the knowledge that my fifty-one years were not a *wait* for a life. They *were* the life. And it was a life of *love*, spoken in silver and salmon and a thousand level trays. I shall finish it level. Thank you. *Truly.*", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.vael_counts", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "dream", "speaker": "Steward Vael", "text": "*(He accepts this with a courtly tilt of the head, and shares the canapé — a small, absurd communion as the world ends.)* If there had been time for a Vael who wasn't serving. *(he considers it with genuine care, as one considers a serious question.)* ...I would have kept *bees.* *(a soft, surprised laugh.)* Isn't that *foolish.* The world is falling and I tell you I'd have kept *bees.* But I think of it often — a small house, a few hives, the patience of it, the way a bee *serves the hive* without a *master*, only the *work* and the *sweetness.* *(quietly.)* I have served *people* my whole life, and people are kind and cruel by turns. Bees are only ever *bees.* I think I would have liked tending a thing that needed me without ever *commanding* me. *(the floor lurches; he steadies the tray.)* Well. No bees, now. But it was a *good* dream, and I am glad to have spoken it aloud *once*, to someone who asked. Most people never ask the steward what he'd *dream.* You did. That is a kindness I shall carry the rest of the way down.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.vael_dream", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 3}], "choices": []}, {"id": "bow", "speaker": "Steward Vael", "text": "*(He bows, deflecting your scrutiny with fifty-one years of polished grace.)* Honored guest is kind to take an interest in the help. *(the smile is a perfect, impenetrable wall.)* But there is nothing to *name.* I am merely doing my work, as I always have, as I shall until I *can't.* *(he offers the tray.)* The salmon, truly, is exceptional. Do let me bring you something. It is what I am *for*, and I should so like to be *for* something, in the time remaining. *(and he glides on, level and luminous and utterly unreachable, to lay one more table against the falling sky.)*", "dynamic": false, "auto": "close", "onEnter": [], "choices": []}, {"id": "close", "speaker": "Steward Vael", "text": "*(The steward moves on through the canting hall — tray level, livery immaculate, the last vigil of the Seventh Enclave kept in canapés and courtesy — and whether he fell as Vael or as Corin, you carry the knowledge that the most dignified soul in a dying magocracy was never a magelord at all, but the man who decided no one in his care would fall out of the sky *unattended.*)*", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "npc.neth.apprentice", "file": "NetherilDenizensContent.cs", "title": "Npc · Neth · Apprentice", "start": "0", "nodes": [{"id": "0", "speaker": "A Boy at a Threshold", "text": "*(Outside a sealed arcane sanctum, a thin boy of perhaps fifteen stands rigid, hands clasped, staring at a door behind which the air itself screams. Through the gap you glimpse it: a man wreathed in stolen fire, reaching up toward a *spell* the size of a god. The boy does not move. His knuckles are white. He has been standing here, you sense, for a very long time, in a posture of absolute obedience, while the world ends three feet away.)*", "dynamic": false, "auto": "1", "onEnter": [{"key": "npc.apprentice_met", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "Karsus's Apprentice", "text": "*(He speaks without turning, in the flat careful voice of a child reciting a rule he cannot afford to doubt.)* You mustn't go in. *(quietly.)* The Master is *working.* He left an instruction. The last instruction. He said — *(his voice wavers, steadies)* — he said *\"Whatever you hear, whatever you see, do not interrupt me. Not for the world. Not for the sky. Not for anything.\"* And then he sealed the door, and began. *(through the gap, the screaming spell swells.)* I know what he's casting. I'm his apprentice; I read the margins of his book. He is reaching for *Mystryl's* power. To become the *god of magic.* And the Weave cannot *survive* a mortal seizing it — it will *die*, and every spell in the world with it, and the enclaves will fall, *all* of them, because we float on the Weave and the Weave is about to *stop.* *(his white knuckles tremble.)* I could open the door. I could break his concentration. I could *stop it.* The whole apocalypse. With one *word.* *(he stares at the door.)* But he *told me not to interrupt.* And he is the only person in my whole life who ever *wanted me in the room.* So I... stand here. And I don't.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "[INSIGHT 18] \"He's the only one who ever wanted you in the room — so opening that door doesn't feel like saving the world. It feels like losing the one person who ever *kept* you. You're not obeying an order. You're protecting a *love.* And it's going to kill everyone.\"", "next": "love", "fail": "recite", "checkDC": 18, "checkAbility": "Wisdom"}, {"text": "[PERSUADE 17] \"Listen to me. The deepest obedience isn't doing what he *said.* It's doing what he'd *want* if he were sane. He didn't say 'don't interrupt me while I murder the sky.' He said it before he knew. *Save him from the instruction.*\"", "next": "save", "fail": "recite", "checkDC": 17, "checkAbility": "Charisma"}, {"text": "\"What's your name? Not 'the apprentice.' Your *name.* He never used it, did he. Tell me, and I'll use it, and then you decide about the door as a *person*, not a *function*.\"", "next": "name", "fail": null, "effects": [{"key": "companion.naeve.approval", "op": "AddInt", "amount": 3}]}, {"text": "\"I'll open the door, then. You won't have disobeyed — *I* will. Stand aside, and let the disobedience be *mine*, and keep your loyalty clean.\"", "next": "mine", "fail": null, "effects": [{"key": "act3.apprentice_spared_choice", "op": "SetTrue"}]}]}, {"id": "love", "speaker": "Karsus's Apprentice", "text": "*(The boy flinches as if struck, and finally — finally — turns to look at you, and his face is breaking.)* ...The one who *kept* me. *(barely a whisper.)* Yes. *Yes.* That's — nobody understands, they say *just open the door, you stupid boy, the world is ending* — as if the world ending is *worse* than — *(he chokes.)* I was a *foundling.* Nobody wanted me. And the greatest arcanist in the *history of Netheril* looked at me, a nothing, a gutter-child, and said *you. You'll do. Stand in my room.* *(tears now, openly.)* Do you know what that *is*, to a child who was *no one*? He *chose* me. And the door is the *price.* If I open it, I save the sky and I lose the one person who ever *saw* me — because he'll know I *interrupted*, he'll know I *failed* the one instruction, and the seeing will *stop*, and I'll be *no one* again, in a falling world, alone. *(he sobs.)* So you see why I *can't.* It's not the *world* I'm choosing against. It's the *being no one again* I can't survive. *(he turns back to the door, shaking.)* Tell me it's worth it. Tell me being seen for two years is worth — *no.* No, don't. I know the answer. I just can't *make my hand move.*", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.apprentice_love", "op": "SetTrue"}, {"key": "act3.apprentice_grief", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 5}], "choices": []}, {"id": "save", "speaker": "Karsus's Apprentice", "text": "*(The boy goes very still. The argument lands somewhere the orders can't follow.)* ...What he'd *want* if he were sane. *(slowly.)* The deepest obedience. *(he stares at the screaming door, and something shifts in his ruined face — not rebellion, but a *higher* loyalty clicking into place.)* He didn't *know.* When he said *don't interrupt* — he meant *don't break my concentration on a great work.* He didn't mean *let me kill every soul who ever cast a candle-flame.* He didn't *know* the Weave would *die.* *(his voice strengthens.)* If he knew — if the Master I *know*, the one who *chose* me, could see what the spell *costs* — he would *want* to be stopped. He would *command* it. *(the boy's hand rises toward the door, trembling but *moving* now.)* So interrupting him isn't *disobeying* him. It's obeying the man he'd *be* if the hubris hadn't *blinded* him. I'm not breaking faith. I'm *keeping* it — with the *better* Master, the one who'd never want to be the god who *ended magic.* *(he grips the handle, weeping, resolute.)* Forgive me, Master. I'm interrupting you. Because you taught me to think, and *thinking* says you'd thank me. It's the most loyal thing I've ever done. *(to you, fierce through tears.)* Stand back. I'm opening the door.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.apprentice_intervenes", "op": "SetTrue"}, {"key": "act3.apprentice_opens_door", "op": "SetTrue"}, {"key": "act1.mercy_remembered", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 5}], "choices": []}, {"id": "name", "speaker": "Karsus's Apprentice", "text": "*(The question stops him cold — a thing no one has asked in two years.)* My... name. *(he says it like a word in a dead language.)* It's — *(he has to reach for it.)* — *Eshe.* I'm Eshe. *(quietly, wondering.)* He never used it. Not once. He called me *boy*, or *apprentice*, or *you.* And I told myself that was *intimacy* — that I mattered too much for a *name*, that I was just *his.* *(the screaming door, the white knuckles.)* But you asked, and I had to *dig* for it, and that — that tells me something I've been hiding from, doesn't it. *(slowly.)* A person who *kept* me would know my *name.* He kept my *use.* That's — that's not the same thing. *(he looks at the door with new, terrible clarity.)* Eshe could open that door. *The apprentice* can't — the apprentice is a *function*, and functions *obey.* But *Eshe* is a *person*, and a person can decide the sky is worth more than the one man who used him and never learned he was *Eshe.* *(he breathes.)* Thank you for my name. I think I needed it back before my hand could move. Stand aside... I have a door to open. As *Eshe.*", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.apprentice_named", "op": "SetTrue"}, {"key": "act3.apprentice_opens_door", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "mine", "speaker": "Karsus's Apprentice", "text": "*(Hope and horror war in his face.)* *You'd* — you'd open it. So I wouldn't have to have — *(he grabs at it, desperate, then falters.)* ...No. *(quietly, and it costs him everything.)* No. That's — that's *kind*, and it's a *lie* I want *so badly* to take. But if *you* open it, I'll have *let* you, and *letting* is the same as *doing*, I'm not a *child*, I know that. *(he straightens, shaking.)* And if I let you carry it, then I never *chose*, and I'll spend whatever's left of the world telling myself I'd have stood at that door forever out of *loyalty* — when the truth is I was just *afraid.* *(he meets your eyes.)* If the door opens, *I* have to be the one. Not to save the world — you could do that. To save *me* from being the boy who let someone else be brave so his *loyalty could stay clean.* *(he turns to the door.)* But... stay. Stand with me while I do it. *That* I'll take. Not your hand on the door. Just — *someone there*, when I lose him. So I'm not *no one* the *instant* it's done.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.apprentice_chooses", "op": "SetTrue"}, {"key": "act3.apprentice_opens_door", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "recite", "speaker": "Karsus's Apprentice", "text": "*(The boy shakes his head fast, retreating into the rule like a shell.)* No. No, you're *twisting* it. The instruction was *clear.* *\"Whatever you hear, whatever you see, do not interrupt.\"* *(he clamps his hands together.)* I *won't* be the apprentice who failed the one thing. I *won't.* He *chose* me, and choosing comes with *obeying*, that's — that's the *whole* of it, that's the only thing I *know* how to do well. *(the door screams; he squeezes his eyes shut.)* Go away. *Please.* Every word you say makes my hand want to move and I *can't let it*, I *can't*, because if I open that door I lose the only — *(he shudders.)* Just go. Let me obey in peace. It's all I have. It's all I've ever had.", "dynamic": false, "auto": "close", "onEnter": [], "choices": []}, {"id": "close", "speaker": "Karsus's Apprentice", "text": "*(Whatever you leave him with, the boy stands at the threshold of the end of an age — a foundling who was chosen for his *use* and never asked his name — and the apocalypse behind that door turns, in the space of one trembling hand, on the oldest question there is: whether a child can love someone enough to *disobey* them, and survive being no one again.)*", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "npc.neth.keeper", "file": "NetherilDenizensContent.cs", "title": "Npc · Neth · Keeper", "start": "0", "nodes": [{"id": "0", "speaker": "The Mythallar-Keeper", "text": "*(In the heart of the enclave, a vast crystalline engine pulses — the mythallar, the artifact that holds the whole city aloft — and its light is *wrong*, stuttering amber where it should burn white. A calm woman in keeper's robes makes small adjustments, and as nobles hurry past she calls out, warm and certain:)* \"A momentary flux, my lords! The mythallar is *recalibrating* — perfectly routine! Do enjoy the evening!\" *(they relax; they move on; they believe her. Then she sees you watching, and the warmth on her face does not change at all, but her eyes — her eyes tell you that she knows you know.)*", "dynamic": false, "auto": "1", "onEnter": [{"key": "npc.keeper_met", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "The Mythallar-Keeper", "text": "*(She keeps her voice pitched to carry comfort, but the words she gives *you* are bare.)* You're not a noble. Nobles want to be *told.* You want to *know.* *(she adjusts a failing crystal; the amber stutters.)* So: the mythallar is dying. The Weave it draws from is *screaming* — something has wounded it at the root, far away, and the wound is racing toward us. In perhaps an hour, this engine stops, and when it stops, the Seventh Enclave stops being a *city in the sky* and becomes a *very large rock that was briefly confused about gravity.* *(calmly.)* There is no fixing it. The wound is not *here*; it is in the *Weave itself.* I have known for three hours. *(she turns to you fully.)* And in those three hours, I have told *four hundred souls* that everything is *fine.* I have *lied*, beautifully, continuously, to every frightened face that passed — and I want you to understand, before you judge me, that I did not lie to *save myself.* I lied because the truth buys *nothing* but an hour of *screaming*, and the lie buys an hour of *peace*, and if these are the last hours of four hundred people, I decided they would be *calm* ones. *(her composure does not crack.)* Tell me I was wrong. People do. I have
