<style>
 *{box-sizing:border-box}
 body{margin:0;height:100vh;overflow:hidden;display:flex;flex-direction:column;
  background:radial-gradient(1100px 640px at 18% -10%,#27212f,#0a0910);
  color:#d8d2c2;font:14px/1.55 "Iowan Old Style","Palatino Linotype",Georgia,serif}
 header{padding:12px 20px;border-bottom:1px solid #2a2636;display:flex;align-items:baseline;gap:16px;flex-wrap:wrap}

 .wrap{flex:1;display:flex;min-height:0}
 /* sidebar */
 aside{width:268px;border-right:1px solid #2a2636;overflow-y:auto;padding:8px 0;background:#0d0b13}
 .find{margin:6px 10px 10px;width:calc(100% - 20px);background:#16131e;border:1px solid #2a2636;border-radius:7px;
  color:#d8d2c2;padding:7px 9px;font:13px serif}
 .grp{color:#7b7388;font-size:10.5px;text-transform:uppercase;letter-spacing:1px;margin:12px 14px 4px}
 .conv{padding:6px 14px;cursor:pointer;font-size:13px;color:#b9b1c4;border-left:2px solid transparent;line-height:1.3}
 .conv:hover{background:#16131e;color:#e7c873}
 .conv.on{background:#1c1828;color:#e7c873;border-left-color:#e7c873}
 .conv .meta{display:block;color:#6e6680;font-size:10.5px}
 /* main */
 main{flex:1;display:flex;flex-direction:column;min-width:0}
 .bar{padding:10px 18px;border-bottom:1px solid #2a2636;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
 .bar h2{margin:0;color:#e7c873;font-size:17px}
 .bar .id{color:#7b7388;font-size:11px;font-family:ui-monospace,monospace}
 .chips{display:flex;gap:6px;margin-left:auto}
 .chip{font-size:10.5px;color:#9a90a8;border:1px solid #2a2636;border-radius:5px;padding:2px 7px}
 .toggle{display:flex;border:1px solid #2a2636;border-radius:7px;overflow:hidden}
 .toggle button{background:#13111a;color:#9a90a8;border:0;padding:5px 14px;cursor:pointer;font:12px serif}
 .toggle button.on{background:#e7c873;color:#1a1622;font-weight:600}
 .view{flex:1;overflow:auto;position:relative}
 /* map */
 svg{display:block}
 .nodebox{cursor:pointer}
 .nodebox rect{fill:#17141f;stroke:#39334a;stroke-width:1.5;rx:9}
 .nodebox.start rect{stroke:#e7c873;stroke-width:2.2}
 .nodebox.sel rect{stroke:#c9a24b;fill:#211b2c}
 .nodebox .sp{fill:#e7c873;font:600 12px serif}
 .nodebox .tx{fill:#b4abc0;font:11.5px serif}
 .nodebox .eff{fill:#6f9e6a;font:10px ui-monospace,monospace}
 .edge{fill:none;stroke:#4b4460;stroke-width:1.6}
 .edge.check{stroke:#d8a73c;stroke-width:2}
 .edge.fail{stroke:#9d5252;stroke-dasharray:5 4}
 .edge.auto{stroke:#3c3850;stroke-dasharray:2 5}
 .elabel{font:10.5px serif;fill:#9a90a8}

 /* detail panel */
 .detail{position:absolute;right:0;top:0;width:340px;height:100%;background:#0e0c14ee;border-left:1px solid #2a2636;
  padding:16px 18px;overflow-y:auto;backdrop-filter:blur(3px);display:none}
 .detail.show{display:block}

 .detail .who{color:#9a90a8;font-size:11px;font-style:italic;margin-bottom:10px}
 .detail .body{color:#cfc7d8;white-space:pre-wrap;font-size:13px;border-left:2px solid #2a2636;padding-left:11px;margin-bottom:12px}
 .detail .dyn{color:#b58a5a;font-style:italic}
 .detail .lbl{color:#7b7388;font-size:10px;text-transform:uppercase;letter-spacing:1px;margin:12px 0 5px}
 .ch{border:1px solid #241f30;border-radius:7px;padding:8px 10px;margin-bottom:7px;background:#13111a}
 .ch .t{color:#d8d2c2;font-size:12.5px}
 .ch .arr{color:#6e6680;font-family:ui-monospace,monospace;font-size:10.5px;margin-top:3px}
 .tag{display:inline-block;font-size:10px;border-radius:4px;padding:1px 6px;margin:3px 4px 0 0}
 .tag.chk{background:#3a2f14;color:#e7c873;border:1px solid #5a4a1e}
 .tag.eff{background:#16281a;color:#7fbf76;border:1px solid #2c4a2e}
 .tag.cond{background:#1a2230;color:#79a0c4;border:1px solid #2c3e54}
 .x{position:absolute;top:10px;right:12px;color:#9a90a8;cursor:pointer;font-size:18px;background:none;border:0}
 /* walk */
 .walk{max-width:680px;margin:0 auto;padding:26px 22px 80px}
 .line{margin-bottom:18px}
 .line .who{color:#e7c873;font-weight:600;font-size:13px;margin-bottom:3px}
 .line .body{color:#cfc7d8;white-space:pre-wrap}
 .line.me .who{color:#79a0c4}
 .line.me .body{color:#a9c0d8;font-style:italic}
 .line.sys{color:#8d8499;font-style:italic;text-align:center;border-top:1px solid #221d2c;padding-top:14px}
 .opts{margin-top:6px}
 .opt{display:block;width:100%;text-align:left;background:#15121d;border:1px solid #2a2636;color:#d8d2c2;
  border-radius:8px;padding:10px 13px;margin-bottom:8px;cursor:pointer;font:13px serif;transition:.12s}
 .opt:hover{border-color:#e7c873;background:#1c1828}
 .opt .ck{color:#e7c873;font-size:11px;margin-top:4px}
 .flags{position:fixed;right:14px;bottom:14px;width:230px;background:#0e0c14ee;border:1px solid #2a2636;border-radius:9px;
  padding:10px 12px;font-size:11.5px;max-height:40vh;overflow-y:auto;display:none}
 .flags.show{display:block}
 .flags h4{margin:0 0 6px;color:#e7c873;font-size:11px;text-transform:uppercase;letter-spacing:1px}
 .flags .f{font-family:ui-monospace,monospace;color:#8fae8a;font-size:10.5px;line-height:1.5}
 .restart{background:#241f30;border:1px solid #3a3550;color:#e7c873;border-radius:7px;padding:7px 14px;cursor:pointer;font:13px serif;margin-top:8px}

<script>
const DATA = {"conversations": [{"id": "act2.crier", "file": "ActTwoContent.cs", "title": "Act2 · Crier", "start": "0", "nodes": [{"id": "0", "speaker": "Tamsin", "text": "The city is a story that tells itself, Returned, and lately you're a chapter of it. Ask — I'll read you back to yourself. (Only the tales the streets have actually earned will be on her lips.)", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "(A widow blesses your name.)", "next": "n_widow", "fail": null, "conditions": []}, {"text": "(You won a Faithless man his freedom.)", "next": "n_freed", "fail": null, "conditions": []}, {"text": "(You let the Fist take a godless man.)", "next": "n_lawful", "fail": null, "conditions": []}, {"text": "(They say you walked the falling city.)", "next": "n_neth", "fail": null, "conditions": []}, {"text": "(They whisper you argued the elf-courts down.)", "next": "n_crown", "fail": null, "conditions": []}, {"text": "(The grey Doomguide softened — for someone.)", "next": "n_garrow_love", "fail": null, "conditions": []}, {"text": "(Someone walked out on you, they say.)", "next": "n_left", "fail": null, "conditions": []}, {"text": "(You gave the Choir's preacher pause.)", "next": "n_choir_doubt", "fail": null, "conditions": []}, {"text": "(You set the Fist on the Choir.)", "next": "n_choir_supp", "fail": null, "conditions": []}, {"text": "(They say you spoke FOR the Unmade.)", "next": "n_choir_fav", "fail": null, "conditions": []}, {"text": "(You let the poor bury their dead free.)", "next": "n_tithe_good", "fail": null, "conditions": []}, {"text": "(You paid the poor's grave-debts yourself.)", "next": "n_tithe_good", "fail": null, "conditions": []}, {"text": "(You took a cut of the grave-tithe.)", "next": "n_tithe_bad", "fail": null, "conditions": []}, {"text": "(The quarter speaks well of you — hear the offer.)", "next": "n_boon", "fail": null, "conditions": [{"key": "reputation.lowcity", "op": "RequireIntAtLeast", "amount": 5}]}, {"text": "Just give me the ordinary word, then.", "next": "n_plain", "fail": null}, {"text": "Enough reading. (Leave.)", "next": "bye", "fail": null}]}, {"id": "n_boon", "speaker": "Tamsin", "text": "\"You've spent real kindness down here, and the Lower City pays its debts in the only coin it has: itself. Word's gone round — if it ever comes to the end of things for you, the quarter stands with you. Beggars, dockhands, the godless, the grieving. Not much. But yours.\"", "dynamic": false, "auto": "0", "onEnter": [], "choices": []}]}, {"id": "act2.widow", "file": "ActTwoContent.cs", "title": "Act2 · Widow", "start": "0", "nodes": [{"id": "0", "speaker": "Mhaere", "text": "You're the one who came back. Then you've *been* there. My boy — Edrin — he was taken in the harvest under the Cinderhaunt. He didn't worship; he was just a boy who mended nets. The grey priests say the godless don't rest. Tell me they're wrong. Please. I'll give you my last coin to tell me he's at peace.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "He's at peace. I've seen the other side — he's at peace. (a kindness)", "next": "lie", "fail": null, "effects": []}, {"text": "I won't lie to you. He doesn't rest — yet. But I will fight to change that. (truth)", "next": "truth", "fail": null, "effects": []}, {"text": "[Insight] Say his name to me. While it's spoken, the Wall hasn't won.", "next": "hope_win", "fail": "truth", "checkDC": 14, "checkAbility": "Wisdom"}]}, {"id": "hope_win", "speaker": "Mhaere", "text": "Edrin. Edrin of the nets. (You say it with her, and again, until the saying steadies her.) ...As long as someone alive still speaks him, he isn't *unmade* — only kept. That's not a priest's comfort. That's a true one. I can carry a true one. I'll say his name every morning, and you'll say it where it counts. Bargain?", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "act2.widow.after", "file": "ActTwoContent.cs", "title": "Act2 · Widow · After", "start": "0", "nodes": [{"id": "0", "speaker": "Mhaere", "text": "There you are. I keep Edrin's name on my lips each dawn now, like you taught me — or I sleep easier for what you said; the days blur. Either way the morning comes, and I meet it. That's your doing. Go safely, Returned.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "Be well, Mhaere.", "next": "bye", "fail": null}]}]}, {"id": "act2.fist", "file": "ActTwoContent.cs", "title": "Act2 · Fist", "start": "0", "nodes": [{"id": "0", "speaker": "Sergeant Kallia", "text": "Stay back, Returned — official business. I've an old beggar here the new edict says I hand to the Doomguides: no god, no temple, 'a soul unclaimed and therefore suspect.' He stole bread. That's all he did. But the writ's the writ, and my pension's the pension. ...You're looking at me like you've got an opinion.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "[Persuasion] He's no heretic. Let him walk. You know this is wrong.", "next": "freed", "fail": "fail", "checkDC": 14, "checkAbility": "Charisma"}, {"text": "Here's coin for your trouble. Lose the paperwork. (bribe)", "next": "bribe", "fail": null, "effects": []}, {"text": "The law's the law. Hand him over. (lawful)", "next": "lawful", "fail": null, "effects": []}]}, {"id": "freed", "speaker": "Sergeant Kallia", "text": "...Gods help me, you're right. I knew you were right when I cuffed him. (She strikes the irons. The old man bolts without a word.) There. I'll say he ran. Let the Doomguides chase a beggar if they've nothing better. Thank you, Returned — for making me braver than my pension.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "act2.fist.after", "file": "ActTwoContent.cs", "title": "Act2 · Fist · After", "start": "0", "nodes": [{"id": "0", "speaker": "Sergeant Kallia", "text": "Off duty, for once. Whatever you made me do at that corner — I've thought about it since. Don't get many chances to find out what kind of Fist you are. You showed me mine. Buy you a drink sometime, Returned. We'll not talk about edicts.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "Some other night, Sergeant.", "next": "bye", "fail": null}]}]}, {"id": "act2.choir", "file": "ActTwoContent.cs", "title": "Act2 · Choir", "start": "0", "nodes": [{"id": "0", "speaker": "Brother Sere", "text": "...and the gods kept a *Wall*, friends — a Wall to grind the souls of everyone who never knelt! The godless, the forgotten, the poor — *us!* But the Wall can come DOWN. (He sees you, and his eyes light like lamps.) And here — *here* — is the proof! A soul that walked back OUT of death! Tell them, Returned. Tell them the Unmade will set us free.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "[Religion] You don't know what tearing the Wall costs. I've seen it. (complicate)", "next": "doubt_win", "fail": "doubt_fail", "checkDC": 15, "checkAbility": "Intelligence"}, {"text": "This is a danger to everyone here. I'll bring the Fist. (suppress)", "next": "suppress", "fail": null, "effects": []}, {"text": "Maybe he's right. The Wall is an atrocity. (sympathize)", "next": "favored", "fail": null, "effects": []}]}, {"id": "doubt_win", "speaker": "Brother Sere", "text": "I— what? You... you've *stood* at it. (For the first time the certainty cracks.) You say the Wall is a horror — and that pulling its thread drowns the living to free the dead. That the cure is another atrocity wearing mercy's face.\n\n(The crowd murmurs and thins. He sits, suddenly young.) Then what are we supposed to *do* with all this grief? ...I'll think. Gods help me, I'll think. Thank you for not just silencing me.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "act2.choir.after", "file": "ActTwoContent.cs", "title": "Act2 · Choir · After", "start": "0", "nodes": [{"id": "0", "speaker": "(the corner)", "text": "Where the preacher stood there's only chalk now — a circle, a broken Wall scratched through it, and a single word the rain hasn't taken: REMEMBER. Whatever you chose here, the Lower City's grief didn't go anywhere. It only learned your name.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "Move on.", "next": "bye", "fail": null}]}]}, {"id": "act2.tithe", "file": "ActTwoContent.cs", "title": "Act2 · Tithe", "start": "0", "nodes": [{"id": "0", "speaker": "Collector Vane", "text": "Rest isn't free, friend. A proper consecrated grave, the rites, a name cut in stone so the soul isn't *Faithless* in the eyes of the Doom — that costs. (He taps a fat ledger of the poor's debts.) These folk can't pay, so their dead wait in the pauper's pit, unblessed, halfway to the Wall already. Sad. But the church's candles don't light themselves.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "[Persuasion] The dead don't pay tolls. Tear up the ledger. (free them)", "next": "freed", "fail": "fail", "checkDC": 15, "checkAbility": "Charisma"}, {"text": "Then I'll clear their debts myself. All of them. (pay)", "next": "paid", "fail": null, "effects": []}, {"text": "What's your cut, for a partner who looks the other way? (take a cut)", "next": "corrupt", "fail": null, "effects": []}]}, {"id": "freed", "speaker": "Collector Vane", "text": "You— you can't just— (But you can, and the way you say it leaves no daylight in it. He swallows.) ...The Doom never actually *charged* for rest. I read the canon same as anyone — I just read the part that paid me. (He closes the ledger.) Fine. The pit gets blessed. No charge. Tell them it was you. They won't believe it was me.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}, {"id": "0", "speaker": "(Vane's table)", "text": null, "dynamic": true, "auto": null, "onEnter": [], "choices": [{"text": "Move on.", "next": "bye", "fail": null}]}]}, {"id": "act2.letter", "file": "ActTwoContent.cs", "title": "Act2 · Letter", "start": "0", "nodes": [{"id": "0", "speaker": "Old Davyn", "text": "Returned. You'll do. I'm dying — don't argue, I can hear the rattle same as you. There's a letter under my cot. To a man I got killed, forty years back, by being a coward at the wrong gate. I wrote the truth of it. Never had the spine to send it. His daughter's still in the Gate.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "I'll put it in her hand. She deserves the truth. (deliver)", "next": "deliver", "fail": null, "effects": []}, {"text": "Some truths only wound. I'll burn it — let her keep her father whole. (burn)", "next": "burn", "fail": null, "effects": []}, {"text": "Let me read it back to you. You should hear it said aloud, once. (read)", "next": "read", "fail": null, "effects": []}]}]}, {"id": "act2.letter.after", "file": "ActTwoContent.cs", "title": "Act2 · Letter · After", "start": "0", "nodes": [{"id": "0", "speaker": "(Davyn's cot)", "text": "The cot is empty, the blanket folded. Old Davyn went quiet in the night — easier, the other veterans say, than a man with his ledger had any right to. Whatever you did with his letter, he went out of the world a little lighter for your visit.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "Rest, soldier.", "next": "bye", "fail": null}]}]}, {"id": "aldric.tea", "file": "AldricContent.cs", "title": "Aldric · Tea", "start": "0", "nodes": [{"id": "0", "speaker": "Aldric Morn", "text": "Sit. The tea's real — Calishite, smuggled, scandalous. That's rarer than honesty in this city, so I lead with it. You're the one who came back. I've wanted to meet you more than I've wanted anything in a long while.", "dynamic": false, "auto": "1", "onEnter": [{"key": "aldric.met", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "Aldric Morn", "text": "You know what I am — the Doomguides have papered the Gate with my face and the word HERETIC beneath it. So let me tell you the truth they won't: I mean to tear down the Wall of the Faithless. You've seen it. Then you know why.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "[INSIGHT DC 15] You're not a fanatic. You're grieving.", "next": "grief", "fail": "deflect", "checkDC": 15, "checkAbility": "Wisdom"}, {"text": "[INSIGHT DC 16] Something is using you. You're a door too, and you don't know it.", "next": "crown", "fail": "deflect", "checkDC": 16, "checkAbility": "Wisdom"}, {"text": "How many die for your crusade?", "next": "cost", "fail": null}, {"text": "You're a murderer. I knew before the tea got cold.", "next": "enemy", "fail": null, "effects": [{"key": "companion.garrow.approval", "op": "AddInt", "amount": 5}, {"key": "faction.kelemvor.reputation", "op": "AddInt", "amount": 5}, {"key": "aldric.named_monster", "op": "SetTrue"}]}]}, {"id": "grief", "speaker": "Aldric Morn", "text": "...Her name was Maerin. Sixteen. She loved the world like it was a free gift from no one. When the Pox took her I followed her into the Fugue to watch my god be merciful — and watched Him wall her in instead. You're the first to see the father before the heretic. I won't forget that.", "dynamic": false, "auto": "offer", "onEnter": [{"key": "aldric.grief_seen", "op": "SetTrue"}], "choices": []}, {"id": "crown", "speaker": "Aldric Morn", "text": "...What a strange thing to say. The Crown of Horns is a tool. A means. I've held it in my mind for twenty years.\n(But something flickers behind his eyes, and it is not entirely his own.)\n...We'll speak of it again. When you've seen more.", "dynamic": false, "auto": "offer", "onEnter": [{"key": "aldric.crown_doubt_planted", "op": "SetTrue"}], "choices": []}, {"id": "deflect", "speaker": "Aldric Morn", "text": "Don't try to read me like a chapbook, friend. Better minds have. Drink your tea.", "dynamic": false, "auto": "offer", "onEnter": [], "choices": []}, {"id": "cost", "speaker": "Aldric Morn", "text": "Thousands. I have counted every one and I will answer for them. Against an *eternity* of the Faithless dissolving into nothing, it is the smallest price ever asked for the largest mercy. You think me a monster. I think me *late.*", "dynamic": false, "auto": "offer", "onEnter": [{"key": "aldric.cost_revealed", "op": "SetTrue"}], "choices": []}, {"id": "offer", "speaker": "Aldric Morn", "text": "I'm not asking for your loyalty — I don't trust loyalty bought cheap. Just your curiosity. Walk with me a while. Decide for yourself whether I'm a monster. If you decide I am — you'll know exactly where to find me.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "I'll walk with you. For now.", "next": "ally", "fail": null, "effects": [{"key": "aldric.provisional", "op": "SetTrue"}, {"key": "faction.choir.reputation", "op": "AddInt", "amount": 5}]}, {"text": "I'll decide. But I'm watching you.", "next": "neutral", "fail": null}]}, {"id": "ally", "speaker": "Aldric Morn", "text": "Good. The tea's getting cold, and the road's long. We'll make a heretic of you yet — or you'll make an honest man of me. Either would be a mercy.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}, {"id": "neutral", "speaker": "Aldric Morn", "text": "Watching is wiser than most manage. Watch closely. I've nothing to hide — only a great deal to answer for.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}, {"id": "enemy", "speaker": "Aldric Morn", "text": "Yes. I am. I keep the count the way I once kept the names of the buried. But ask yourself, on your way to whoever you'll tell: every child in that Wall was put there by someone who also thought they were doing the smaller evil. Go with my blessing. I mean that. And my count.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "almshouse.*", "file": "AlmshouseScene.cs", "title": "Almshouse", "start": "0", "nodes": [{"id": "0", "speaker": "NPC", "text": null, "dynamic": true, "auto": null, "onEnter": [], "choices": []}]}, {"id": "almshouse.deathbed", "file": "AlmshouseScene.cs", "title": "Almshouse · Deathbed", "start": "0", "nodes": [{"id": "0", "speaker": "Hensley, dying", "text": "An old man, hours from the end, grips your hand with a strength that surprises you. \"You've an honest face. Tell me true — did my boy ever ask after me? Tomas. I drove him off, forty years gone, and I'd give the rest of my breath to know he... that he didn't hate me at the end.\" (Mother Cass, behind you, gives the smallest shake of her head. Tomas never came. Tomas never wrote. There is no record of mercy here.)", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "\"He asked after you. He forgave you. He told me so.\" (A lie, to ease him out.)", "next": "lie", "fail": null, "effects": [{"key": "almshouse.deathbed_resolved", "op": "SetTrue"}, {"key": "almshouse.deathbed_lie", "op": "SetTrue"}]}, {"text": "\"I won't lie to a dying man. He never came. But you *asked* — that counts.\"", "next": "truth", "fail": null, "effects": [{"key": "almshouse.deathbed_resolved", "op": "SetTrue"}]}]}, {"id": "lie", "speaker": "Hensley, dying", "text": "Something in his face comes untied — forty years of held breath, let go. \"He did. Of course he did. He was always the better of us.\" He is asleep before you finish, smiling. You will never know if it was the cruelest kindness or the kindest cruelty. Mother Cass squeezes your shoulder. She has made this choice a thousand times. She does not tell you which way.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}, {"id": "truth", "speaker": "Hensley, dying", "text": "He weeps, which you feared. But then — quieter — \"...I *asked,* though. After all this. That's not nothing, is it. To still be the kind of man who'd want to know.\" He holds that, instead of a comfort that wasn't his. It is a harder thing to die holding. He dies holding it anyway, and it is *his.*", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "almshouse.keeper", "file": "AlmshouseScene.cs", "title": "Almshouse · Keeper", "start": "0", "nodes": [{"id": "0", "speaker": "Mother Cass", "text": null, "dynamic": true, "auto": null, "onEnter": [{"key": "almshouse.visited", "op": "SetTrue"}, {"key": "almshouse.blessing", "op": "SetTrue"}], "choices": [{"text": "Who do you keep here?", "next": "who", "fail": null}, {"text": "What do you need?", "next": "need", "fail": null}]}, {"id": "need", "speaker": "Mother Cass", "text": null, "dynamic": true, "auto": null, "onEnter": [{"key": "almshouse.token", "op": "SetTrue"}], "choices": []}]}, {"id": "almshouse.poor", "file": "AlmshouseScene.cs", "title": "Almshouse · Poor", "start": "0", "nodes": [{"id": "0", "speaker": "The unclaimed", "text": null, "dynamic": true, "auto": null, "onEnter": [], "choices": []}]}, {"id": "almshouse.roen_witness", "file": "AlmshouseScene.cs", "title": "Almshouse · Roen · Witness", "start": "0", "nodes": [{"id": "0", "speaker": "Roen", "text": "Funny. I've cracked mansions, a palace, a god's own counting-house. But this — a room full of people the world forgot — this is the only kind of place I've ever walked into and felt my shoulders come *down.* I grew up in a room like this. Might've died in one, if the Harpers hadn't picked me out of it.", "dynamic": false, "auto": null, "onEnter": [{"key": "almshouse.roen_witnessed", "op": "SetTrue"}, {"key": "companion.roen.approval", "op": "AddInt", "amount": 5}], "choices": [{"text": "You're not that kid anymore.", "next": "close", "fail": null}, {"text": "These are still your people.", "next": "close", "fail": null}]}, {"id": "close", "speaker": "Roen", "text": null, "dynamic": true, "auto": null, "onEnter": [], "choices": []}]}, {"id": "hub.herald", "file": "BaldursGateHub.cs", "title": "Hub · Herald", "start": "0", "nodes": [{"id": "0", "speaker": "Herald of the Gate", "text": "Returned. I felt you cross back — like a bell rung in an empty cathedral. Aldric Morn would speak with you. But the Doomguides have sealed the Cinderhaunt below, where the harvest still festers. Clear it, and the road to him opens.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "Why should I trust Aldric Morn?", "next": "1", "fail": null}, {"text": "I'll clear the Cinderhaunt.", "next": "accept", "fail": null}]}, {"id": "1", "speaker": "Herald of the Gate", "text": "Trust nothing. But you've seen the Wall of the Faithless. You know the question he asks is real. Decide below — in blood and shadow, where such things are decided.", "dynamic": false, "auto": "accept", "onEnter": [], "choices": []}, {"id": "accept", "speaker": "Herald of the Gate", "text": "Descend when you're ready; the stairs are marked. Try not to die a second time.", "dynamic": false, "auto": null, "onEnter": [{"key": "prologue.herald_met", "op": "SetTrue"}], "choices": []}]}, {"id": "hub.roen", "file": "BaldursGateHub.cs", "title": "Hub · Roen", "start": "0", "nodes": [{"id": "0", "speaker": "Roen Alleywind", "text": "So you're the one who walked back out of death. Relax — I'm a friend. The kind that knows every alley, lock, and lie in this city. The Harpers sent me to keep an eye on you. I'd rather keep the rest of me on you too. Mind some company down those stairs?", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "A Harper spy. Why would I trust you?", "next": "trust", "fail": null}, {"text": "Welcome aboard. We could use the blades — and the lockpicks.", "next": "join", "fail": null, "effects": [{"key": "companion.roen.recruited", "op": "SetTrue"}, {"key": "companion.roen.approval", "op": "AddInt", "amount": 10}]}]}, {"id": "trust", "speaker": "Roen Alleywind", "text": "You don't. That's the smart play. But the Doomguides want you in a cell and Aldric wants you on an altar — and I want neither. That puts me a cut above your other options. Coming?", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "Fair enough. Join me.", "next": "join", "fail": null, "effects": [{"key": "companion.roen.recruited", "op": "SetTrue"}, {"key": "companion.roen.approval", "op": "AddInt", "amount": 15}]}, {"text": "Not yet.", "next": "later", "fail": null}]}, {"id": "join", "speaker": "Roen Alleywind", "text": "Then I'm yours. Try not to get us both killed — I've grown fond of breathing.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}, {"id": "later", "speaker": "Roen Alleywind", "text": "Suit yourself. I'll be here, looking trustworthy. Come find me when you change your mind.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "hub.varra", "file": "BaldursGateHub.cs", "title": "Hub · Varra", "start": "0", "nodes": [{"id": "0", "speaker": "Varra", "text": "Returned, are you? A soul with a hole in it. Charming. I'm Varra — I've a hole in mine too, shaped exactly like a contract I signed when I was six. Misery loves company, and company with a sword is even better. Take me along before my patron remembers I exist?", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "Welcome aboard. We've both got debts to outrun.", "next": "join", "fail": null, "effects": [{"key": "companion.varra.recruited", "op": "SetTrue"}, {"key": "companion.varra.approval", "op": "AddInt", "amount": 15}]}, {"text": "A pact-bound warlock sounds like a liability.", "next": "liability", "fail": null}]}, {"id": "liability", "speaker": "Varra", "text": "Oh, absolutely. I'm a leash with a person on the end of it, and one day someone's going to *pull.* But until then I'm the funniest liability you'll ever meet, and I throw fire. Your call.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "Fair. Come on, then.", "next": "join", "fail": null, "effects": [{"key": "companion.varra.recruited", "op": "SetTrue"}, {"key": "companion.varra.approval", "op": "AddInt", "amount": 8}]}, {"text": "Not yet.", "next": "later", "fail": null}]}, {"id": "join", "speaker": "Varra", "text": "Excellent. Don't get attached — everyone who buys me eventually gets a bill. But the interim's a riot.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}, {"id": "later", "speaker": "Varra", "text": "Mm. Hovering near the exit. Smart. I'd do the same, if I had one.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "(CrownWarsContent)", "file": "CrownWarsContent.cs", "title": "(crownwarscontent)", "start": "0", "nodes": [{"id": "0", "speaker": "—", "text": "You fall further back than you have ever fallen — ten thousand years. Silver spires. Elven banners. A high court mid-session, beautiful and cold. And the matter before the court is not land, nor crowns. It is the *souls* of a defeated people.", "dynamic": false, "auto": "1", "onEnter": [{"key": "crownwars.arrived", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "The Returned", "text": "This is it. The first verdict. The afternoon they *decided* that the godless dead deserve to be unmade — before it hardened into the law of the Wall. I'm standing at the source.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}, {"id": "0", "speaker": "Ilfaeril", "text": "You carry the chill of the Wall on you, traveller — and the look of someone unstuck from time. I am Ilfaeril. I sit in that court. And I am about to do a thing I will spend ten thousand years trying to undo. If you have come to stop it... I would not stop you.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "What thing?", "next": "thing", "fail": null}, {"text": "Then help me. Walk with me.", "next": "join", "fail": null, "effects": [{"key": "companion.ilfaeril.recruited", "op": "SetTrue"}]}]}, {"id": "thing", "speaker": "Ilfaeril", "text": "I am about to raise my hand to damn an enemy people's souls to nothing — so that not even their memory has anywhere to rest. The court calls it justice. I will call it, in time, the only sin I could never bury. Come. Perhaps a soul from the future can do what my conscience cannot.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "Then let's change the vote. With me.", "next": "join", "fail": null, "effects": [{"key": "companion.ilfaeril.recruited", "op": "SetTrue"}]}]}, {"id": "join", "speaker": "Ilfaeril", "text": "Then my sword and my long, long regret are yours. Let us see if the past can be argued with.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}, {"id": "0", "speaker": "High Lord Aelryth", "text": "You are not of this court, outsider, yet Ilfaeril vouches for you, so I will hear you. The matter stands: shall the godless dead of our fallen enemies be *unmade* — denied even a resting-place — that our victory be total? Speak. Why should mercy stay my hand?", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "[PERSUADE DC 15] A law of vengeance outlives the vengeful. You damn your own descendants.", "next": "spared", "fail": "passed", "checkDC": 15, "checkAbility": "Charisma"}, {"text": "[INSIGHT DC 15] You do not want this. You want to be *told* you mustn't.", "next": "spared", "fail": "passed", "checkDC": 15, "checkAbility": "Wisdom"}, {"text": "Their souls are yours to take. Take them.", "next": "passed", "fail": null}, {"text": "(Say nothing. Let the court decide.)", "next": "passed", "fail": null}]}, {"id": "spared", "speaker": "High Lord Aelryth", "text": "...You are right. Gods help me, you are right, and I have wanted someone to say it since the first banner fell. The motion is *withdrawn.* Let their dead rest. Let this one court, at least, be remembered for the cruelty it did NOT do.", "dynamic": false, "auto": null, "onEnter": [{"key": "crownwars.verdict_spared", "op": "SetTrue"}, {"key": "companion.ilfaeril.approval", "op": "AddInt", "amount": 20}], "choices": []}, {"id": "passed", "speaker": "High Lord Aelryth", "text": "Then it is done. Their dead are unmade, root and memory. ...The chamber feels colder than I expected. History will not record this hour. History will only inherit it.", "dynamic": false, "auto": null, "onEnter": [{"key": "crownwars.verdict_passed", "op": "SetTrue"}], "choices": []}]}, {"id": "crownwars.ilfaeril_witness", "file": "CrownWarsEra.cs", "title": "Crownwars · Ilfaeril · Witness", "start": "0", "nodes": [{"id": "0", "speaker": "Ilfaeril", "text": "I have stood in this hall ten thousand times, in nightmares. I did not think I would ever stand in it again with *feet.* There — the third bench from the dais. That is where I raised my hand. I can smell the lamp-oil. Gods help me, I can *smell* it.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "Then change it. Argue the verdict down — you have the chance now.", "next": "act", "fail": null}, {"text": "Just breathe. I'm here. You don't face it alone this time.", "next": "stay", "fail": null}]}, {"id": "close", "speaker": "Ilfaeril", "text": null, "dynamic": true, "auto": null, "onEnter": [{"key": "crownwars.ilfaeril_witnessed", "op": "SetTrue"}, {"key": "companion.ilfaeril.approval", "op": "AddInt", "amount": 5}], "choices": []}]}, {"id": "docks.ferryman", "file": "DocksScene.cs", "title": "Docks · Ferryman", "start": "0", "nodes": [{"id": "0", "speaker": "Ferryman", "text": "\"Help — please! My skiff's going under by the third piling and old Pell's still aboard, can't swim a stroke! The Fist won't come for a pauper and I can't haul him alone — *please!*\"", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "[Jump in.] Grab him — I've got the other side.", "next": "saved", "fail": null, "effects": [{"key": "docks.ferryman_resolved", "op": "SetTrue"}, {"key": "docks.ferryman_saved", "op": "SetTrue"}, {"key": "reputation.lowcity", "op": "AddInt", "amount": 2}]}, {"text": "I've no time for this. (Walk on.)", "next": "refused", "fail": null, "effects": [{"key": "docks.ferryman_resolved", "op": "SetTrue"}, {"key": "reputation.lowcity", "op": "AddInt", "amount": -1}]}]}, {"id": "saved", "speaker": "Ferryman", "text": "You go in cold and graceless and get a fist in Pell's collar; between you the old man comes over the gunwale coughing river. The ferryman can't speak for shaking. The dockfolk saw. They always see who comes for the people the city writes off.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}, {"id": "refused", "speaker": "Ferryman", "text": "\"...Aye. Of course. No one ever has.\" He turns back to the water alone. (Behind you, as you go, a splash and a younger voice swearing — someone else jumped. The Lower City keeps its own.)", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "docks.*", "file": "DocksScene.cs", "title": "Docks", "start": "0", "nodes": [{"id": "0", "speaker": "NPC", "text": null, "dynamic": true, "auto": null, "onEnter": [], "choices": []}]}, {"id": "toot.echo", "file": "EraEchoes.cs", "title": "Toot · Echo", "start": "0", "nodes": [{"id": "0", "speaker": "A Grey Gravedigger", "text": "Mind the rows, traveller — fresh ones, all of them. When the gods walk as men and die as men, the dead come faster than the prayers. I bury the claimed on the hill. The *unclaimed* — the godless, the faithless — I bury here, in the low ground, where the law says their souls go to the Wall and nowhere. You have the look of someone who has argued with that law before.", "dynamic": false, "auto": null, "onEnter": [{"key": "toot.echo_seen", "op": "SetTrue"}], "choices": [{"text": "Once. Ten thousand years ago.", "next": "close", "fail": null}]}, {"id": "close", "speaker": "A Grey Gravedigger", "text": null, "dynamic": true, "auto": null, "onEnter": [], "choices": []}]}, {"id": "spellplague.echo", "file": "EraEchoes.cs", "title": "Spellplague · Echo", "start": "0", "nodes": [{"id": "0", "speaker": "A Half-Unmade Voice", "text": "You can *see* me? Most can't, in the blue. I'm coming apart — not dying, undoing, like a word scratched out mid-sentence. The fire doesn't burn here so much as it *forgets* you. And yet you look at me and I stay. Stay a moment longer. Being looked at is the only thing keeping me a *me.*", "dynamic": false, "auto": null, "onEnter": [{"key": "spellplague.echo_seen", "op": "SetTrue"}], "choices": [{"text": "I see you. I'm not looking away.", "next": "close", "fail": null}]}, {"id": "close", "speaker": "A Half-Unmade Voice", "text": null, "dynamic": true, "auto": null, "onEnter": [], "choices": []}]}, {"id": "toot.crown_echo", "file": "EraEchoes.cs", "title": "Toot · Crown · Echo", "start": "0", "nodes": [{"id": "0", "speaker": "A Keeper of the Bone Crown", "text": "Careful where you step, pilgrim — that is not a forge-fire's heat you feel. It is *attention.* They are beating a god's skull thin and curved, and the god is still *in* it — still awake, still choosing. Most who come here feel only the cold. You feel the *looking.* You've felt it before, haven't you. Somewhere far downriver of this hammer.", "dynamic": false, "auto": null, "onEnter": [{"key": "toot.crown_echo_seen", "op": "SetTrue"}], "choices": [{"text": "I've felt it. On a gentle man's shelf.", "next": "close", "fail": null}]}, {"id": "close", "speaker": "A Keeper of the Bone Crown", "text": null, "dynamic": true, "auto": null, "onEnter": [], "choices": []}]}, {"id": "toot.garrow_witness", "file": "EraWitness.cs", "title": "Toot · Garrow · Witness", "start": "0", "nodes": [{"id": "0", "speaker": "Sister Garrow", "text": "Forty years a Doomguide and I never once let myself imagine *this.* They are beating a god of death into a crown of horns. Death itself — mortal, screaming, spent like coin. Every certainty I ever buried someone with is being forged into a tyrant's hat, right in front of me.", "dynamic": false, "auto": null, "onEnter": [{"key": "toot.garrow_witnessed", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 5}], "choices": [{"text": "What does it change, for you?", "next": "close", "fail": null}, {"text": "Steady. I'm here.", "next": "close", "fail": null}]}, {"id": "close", "speaker": "Sister Garrow", "text": null, "dynamic": true, "auto": null, "onEnter": [], "choices": []}]}, {"id": "spellplague.varra_witness", "file": "EraWitness.cs", "title": "Spellplague · Varra · Witness", "start": "0", "nodes": [{"id": "0", "speaker": "Varra", "text": "Oh, I *love* it here. Feel that? The Weave's coming apart at the seams — every rule that ever held magic in place, just... optional, in the blue fire. My pact-flame's going feral in my hands and I have never felt more *free,* which should probably frighten me more than it does.", "dynamic": false, "auto": null, "onEnter": [{"key": "spellplague.varra_witnessed", "op": "SetTrue"}, {"key": "companion.varra.approval", "op": "AddInt", "amount": 5}], "choices": [{"text": "Careful. Free isn't the same as safe.", "next": "close", "fail": null}, {"text": "What are you really thinking?", "next": "close", "fail": null}]}, {"id": "close", "speaker": "Varra", "text": null, "dynamic": true, "auto": null, "onEnter": [], "choices": []}]}, {"id": "(FugueContent)", "file": "FugueContent.cs", "title": "(fuguecontent)", "start": "0", "nodes": [{"id": "0", "speaker": "—", "text": "The grey is not a colour. It is the absence of the argument for colour. You are walking — though you don't remember choosing to — in a long grey river of the recently dead, toward a city that never gets closer. And then you see the Wall.", "dynamic": false, "auto": "1", "onEnter": [{"key": "fugue.arrived", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "The Returned", "text": "It's made of *people.* Faces in the mortar. Mouths still moving — small fragments of names, of weather, of *someone please.* The godless dead, dissolving one unremembered syllable at a time. ...And near the end of the curve: a niche. Empty. The only empty one. With my name half-carved above it.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}, {"id": "0", "speaker": "A girl in the Wall", "text": "You. You're the Returned — you can *reach* in here, I can feel it. My father's burning the whole world to pull me out of this. Don't you do it too. Whatever it costs — and it costs something, the Wall never gives without taking — I am not worth a—", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "I'm pulling you free. Hold on to me.", "next": "pull", "fail": null, "effects": [{"key": "companion.maerin.recruited", "op": "SetTrue"}, {"key": "fugue.pull_maerin", "op": "SetTrue"}]}, {"text": "...You're right. I won't pay that price.", "next": "leave", "fail": null, "effects": [{"key": "fugue.left_maerin", "op": "SetTrue"}]}]}, {"id": "pull", "speaker": "Maerin", "text": "—No. NO. The Wall — it's screaming, it won't give without taking, it's *taking someone* — I can feel the grey close on one of them — I'm sorry, I'm sorry, I didn't ask for this—\n\n(She comes free in your arms, whole and luminous and fading and *furious.* And there are fewer of you than there were a moment ago. There will be fewer of you forever.)", "dynamic": false, "auto": null, "onEnter": [], "choices": []}, {"id": "leave", "speaker": "Maerin", "text": "...Good. You're learning. Most don't. They look at a girl in a wall and stop doing arithmetic. Go. Before the grey decides it likes the look of you, too.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "fugue.soul", "file": "FugueEra.cs", "title": "Fugue · Soul", "start": "0", "nodes": [{"id": "0", "speaker": "A Faithless soul", "text": null, "dynamic": true, "auto": null, "onEnter": [{"key": "fugue.soul.met", "op": "SetTrue"}], "choices": [{"text": "There's an empty niche with my name. Why?", "next": "niche", "fail": null}, {"text": "Can anyone ever leave this Wall?", "next": "leave", "fail": null}]}, {"id": "niche", "speaker": "A Faithless soul", "text": "Because it has worn your name since before the world was young, and it is patient. The only way a soul comes *out* of this Wall is if another goes *in.* That is the oldest arithmetic there is. If you ever pull someone free of the grey — and I think you will; it's written all over you — know what the Wall asks back.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "Who would it take?", "next": "who", "fail": null}]}, {"id": "who", "speaker": "A Faithless soul", "text": null, "dynamic": true, "auto": null, "onEnter": [], "choices": []}]}, {"id": "garrow.quest.arrival", "file": "GarrowQuestContent.cs", "title": "Garrow · Quest · Arrival", "start": "0", "nodes": [{"id": "0", "speaker": "Sister Garrow", "text": "Grey stone, grey light, grey robes. Home — or what I called it for thirty years. The writ says heresy. Three counts: that I did not lay Aldric when the church bid me forget him. That I have voiced doubt of the Doom. And that I walk beside *you* — a soul no god claimed, which to them is a wound that walks.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "Doubt isn't heresy. It's the only honest prayer there is.", "next": "1", "fail": null}, {"text": "Then we leave. You owe a rigged court nothing.", "next": "2", "fail": null}]}, {"id": "1", "speaker": "Sister Garrow", "text": "My father said the same, with a spade in his hand and no god in the conversation. The church disagrees. To the Doom, certainty *is* the sacrament — and I have spent my whole life being correct, and am no longer sure correct and good are the same word.", "dynamic": false, "auto": "2", "onEnter": [], "choices": []}, {"id": "2", "speaker": "Sister Garrow", "text": "No. I came here to answer, and I will. Not because I fear the verdict — because if I run, I never learn whether the thing I served for thirty years is as monstrous as I've begun to fear. The Justiciar inside is named Veld. He taught my catechism. Whatever he says in there, stay at my shoulder. I think today I find out what I believe.", "dynamic": false, "auto": null, "onEnter": [{"key": "garrow.quest.arrived", "op": "SetTrue"}], "choices": []}]}, {"id": "garrow.quest.charge", "file": "GarrowQuestContent.cs", "title": "Garrow · Quest · Charge", "start": "0", "nodes": [{"id": "0", "speaker": "Justiciar Veld", "text": "Edda Garrow. You were the cleanest catechism I ever taught — a girl who buried the Faithless without weeping, because she understood the Wall was *just.* And here you stand reeking of compassion, with a creature beside you that the Wall itself spat back up. Kneel. Recant the doubt, disavow the Returned, and the Doom is merciful: you keep the grey.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "You weighted the scales before she walked in.", "next": "1", "fail": null}, {"text": "Ask her what she believes — don't tell her.", "next": "1", "fail": null}]}, {"id": "1", "speaker": "Justiciar Veld", "text": "Belief is not asked of a Doomguide; it is *issued.* The verdict is recorded already — it was recorded the day she chose your company over her vows. This trial is a courtesy, that she might kneel before she is broken to it. Sister. Last time. Renounce the Faithless thing, or be named one yourself.", "dynamic": false, "auto": null, "onEnter": [{"key": "garrow.quest.charge_known", "op": "SetTrue"}], "choices": [{"text": "(Stand at her shoulder. Let her refuse with steel.)", "next": "2", "fail": null}]}, {"id": "2", "speaker": "Sister Garrow", "text": "Thirty years I weighed the dead by your feather, Veld, and called the trembling in my hands *reverence.* It was grief. I will not kneel to a verdict that was written before the question. If that makes me Faithless — then draw, and we will see whose god shows up for the fight.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "garrow.quest.resolution", "file": "GarrowQuestContent.cs", "title": "Garrow · Quest · Resolution", "start": "0", "nodes": [{"id": "0", "speaker": "Sister Garrow", "text": "Veld's guard is down and the tribunal is scattered, but the temple still stands, and so does the record. They'll want my answer entered before I leave — recanted, or refused. The grey isn't a coat I can just drop; it's thirty years.\n\nSo say it with me. What do I answer the Scales?", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "Recant. Keep the grey — do the work from inside. (save her standing)", "next": "recant", "fail": null, "effects": [{"key": "quest.garrow.resolved", "op": "SetTrue"}, {"key": "quest.garrow.recanted", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 10}]}, {"text": "Walk away from the faith entirely. Lay the dead under no one's law. (her freedom)", "next": "apostate", "fail": null, "effects": [{"key": "quest.garrow.resolved", "op": "SetTrue"}, {"key": "quest.garrow.left_faith", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 20}]}, {"text": "[Religion] Put Kelemvor's own doctrine on trial — the Faithless judgment is the heresy.", "next": "doctrine_win", "fail": "doctrine_fail", "checkDC": 16, "checkAbility": "Intelligence"}]}, {"id": "recant", "speaker": "Sister Garrow", "text": "...I recant. The words taste like the order to forget Aldric did. (She kneels, and signs, and the feather pan settles smug.)\n\nThey keep their Doomguide. I keep the only thing that ever mattered — the right to be at the bedside when the priests won't come. It is a smaller faith now, and a harder one, and I will carry it brittle for the rest of my days. But I carry it. You stayed. I'll not forget that you stayed.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}, {"id": "apostate", "speaker": "Sister Garrow", "text": "Then enter it: *Faithless, and unafraid.* (She unpins the grey clasp and sets it on the empty soul-pan, and walks out from under thirty years.)\n\nGods keep ledgers. So will I — my own. I'll lay the dead the way my father did, plainly, for anyone, under no law but the one in my own two hands. I should be terrified. Instead I feel like a held breath finally let go. Thank you — for being the proof that a soul no god claims can still be *good.*", "dynamic": false, "auto": null, "onEnter": [], "choices": []}, {"id": "doctrine_win", "speaker": "Sister Garrow", "text": "*Read your own canon, Veld.* The Doom is not 'damn the unclaimed' — it is **'none shall pass unjudged.'** The Wall doesn't weigh the Faithless. It *discards* them, unweighed, ungrieved. That isn't the Doom's law. That's the church refusing to do its work — and calling its laziness scripture.\n\nThe heresy in this room was never my doubt. It's a faith that stopped reading. I don't leave the Doom and I don't kneel to its cowards. I take it *back.* From here — souls get weighed. Even the ones no god wanted. *Especially* those.", "dynamic": false, "auto": null, "onEnter": [{"key": "quest.garrow.resolved", "op": "SetTrue"}, {"key": "quest.garrow.doctrine_won", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 30}], "choices": []}, {"id": "doctrine_fail", "speaker": "Sister Garrow", "text": "Don't — don't hand me a clever reading of scripture to hide behind. I've hidden in correct answers my whole life; that's the sin that brought me here. There's no doctrine that makes this painless. There's only what I choose.\n\nSo plainly: do I kneel and keep the grey, or do I set it down and walk?", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "Keep the grey. Do the work from inside. (save her standing)", "next": "recant", "fail": null, "effects": [{"key": "quest.garrow.resolved", "op": "SetTrue"}, {"key": "quest.garrow.recanted", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 10}]}, {"text": "Set it down. Walk free. (her freedom)", "next": "apostate", "fail": null, "effects": [{"key": "quest.garrow.resolved", "op": "SetTrue"}, {"key": "quest.garrow.left_faith", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 20}]}]}]}, {"id": "safehouse.informant", "file": "HarperSafehouseScene.cs", "title": "Safehouse · Informant", "start": "0", "nodes": [{"id": "0", "speaker": "Harper Handler", "text": "A woman sits bound to a chair, jaw set, eyes flicking. \"Caught her selling our drop-points to the Flaming Fist. Roen vouches for your judgement, so — your call. We can *turn* her, lean hard till she spies for us instead. Or you can argue for cutting her loose. I'll warn you: loose, she might run straight back to the Fist. People mostly do.\"", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "Turn her. A frightened asset is still an asset.", "next": "turned", "fail": null, "effects": [{"key": "safehouse.informant_resolved", "op": "SetTrue"}, {"key": "safehouse.informant_turned", "op": "SetTrue"}]}, {"text": "Cut her loose. Give her the choice no one's given her.", "next": "freed", "fail": null, "effects": [{"key": "safehouse.informant_resolved", "op": "SetTrue"}, {"key": "safehouse.informant_freed", "op": "SetTrue"}]}]}, {"id": "turned", "speaker": "Harper Handler", "text": "It works, the way leaning on the frightened works. She'll spy for you now, and hate you, and be useful, and the work will get done. The handler nods, satisfied. You watch the woman's face close like a door and understand, a little better than you wanted to, how the Wall got built one reasonable decision at a time.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}, {"id": "freed", "speaker": "Harper Handler", "text": "The handler grimaces but cuts the ropes — Roen's name carries weight. The woman rubs her wrists, stares at you like you've handed her a live coal, and walks out into the dark unowned by anyone for the first time in years. Maybe she runs back to the Fist. Maybe she doesn't. You gave her the one thing the Wall never gives: the dignity of being allowed to decide.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "safehouse.*", "file": "HarperSafehouseScene.cs", "title": "Safehouse", "start": "0", "nodes": [{"id": "0", "speaker": "NPC", "text": null, "dynamic": true, "auto": null, "onEnter": [], "choices": []}]}, {"id": "ilfaeril.quest.arrival", "file": "IlfaerilQuestContent.cs", "title": "Ilfaeril · Quest · Arrival", "start": "0", "nodes": [{"id": "0", "speaker": "Ilfaeril", "text": "I knew this would find me eventually. Ten thousand years is a long time for a thing to wait, but patience is the one virtue the dead have in surplus. This reliquary belonged to Maerith of the Singing Vale — one of the people my court voted to *unmake.* Not kill. Unmake. We denied her dead even a grave to rest in. I raised my hand. I have never once raised it back down.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "You were one vote. The Law took thousands.", "next": "1", "fail": null}, {"text": "You don't have to open it. Not today.", "next": "2", "fail": null}]}, {"id": "1", "speaker": "Ilfaeril", "text": "Do not do that. Do not make it smaller to spare me. A thousand hands built the Wall, yes — and every one of them told itself it was only one hand. That arithmetic *is* the atrocity. I will not hide inside it. The name on this lock is hers, and I am the last creature alive who can still say it. That is not absolution. It is a debt with my name on the invoice.", "dynamic": false, "auto": "3", "onEnter": [], "choices": []}, {"id": "2", "speaker": "Ilfaeril", "text": "There is no 'not today' left in me, friend. I have guided ten thousand strangers gently past the Wall and never once dared face the single soul I owed. If I walk away from this, I am only what I have always been: a man performing mercy on everyone except the people he wronged. No. I open it.", "dynamic": false, "auto": "3", "onEnter": [], "choices": []}, {"id": "3", "speaker": "Ilfaeril", "text": "...But we are not alone in this crypt. That cold, underneath the old cold — that is the Choir. Of course they came. To them I am not a sinner; I am a *relic* — the first witness, the proof their unmaking is holy. They will want what's in that reliquary, and they will want me. Draw. They do not get to make my worst day into their scripture.", "dynamic": false, "auto": null, "onEnter": [{"key": "ilfaeril.quest.arrived", "op": "SetTrue"}], "choices": []}]}, {"id": "ilfaeril.quest.cantor", "file": "IlfaerilQuestContent.cs", "title": "Ilfaeril · Quest · Cantor", "start": "0", "nodes": [{"id": "0", "speaker": "The Pale Cantor", "text": "Witness. *Witness.* Do you feel how the air leans toward you? Ten thousand years you have knelt at the edge of the Wall begging to be forgiven, and never once understood: you do not need forgiveness. You need only to be *right.* You voted to unmake the unclaimed. The Unmade simply agrees with you. Give us the relic, and we will give you the one mercy the gods never did — we will tell you that you were correct.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "He's worth more than the worst thing he ever did.", "next": "1", "fail": null}, {"text": "(To Ilfaeril) Don't take the comfortable lie.", "next": "1", "fail": null}]}, {"id": "1", "speaker": "Ilfaeril", "text": "You offer to end my guilt by proving I never should have had any. (He sets himself between the Cantor and the reliquary.) Cantor — that is not mercy. That is the most obscene thing anyone has said to me in ten thousand years. My guilt is the only monument those people have. I will not let you melt it down for a key.", "dynamic": false, "auto": null, "onEnter": [{"key": "ilfaeril.quest.cantor_known", "op": "SetTrue"}], "choices": [{"text": "(Stand with him. Drive the Choir off.)", "next": "2", "fail": null}]}, {"id": "2", "speaker": "Ilfaeril", "text": "Maerith. I am sorry. I have brought a war to your door again. (He lifts his shield, and for the first time in an age it does not feel like a burden.) Let us earn the right to open it.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "ilfaeril.quest.resolution", "file": "IlfaerilQuestContent.cs", "title": "Ilfaeril · Quest · Resolution", "start": "0", "nodes": [{"id": "0", "speaker": "Ilfaeril", "text": "The Choir is scattered, and the reliquary is quiet, and it knows my voice. It is opening.\n\n(Inside: no weapon, no relic of power. A message-stone, set ten thousand years ago by a woman who knew that one day her judge might be the only one left to hear it. Maerith's voice fills the crypt — and it is not cursing him. It is *forgiving* him.)\n\nI... I do not know what to do with this. I prepared for her hate. I have no defense against her mercy. Tell me. What do I do?", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "Refuse it. Keep paying — guide the lost, forever. (the penance)", "next": "penance", "fail": null, "effects": [{"key": "quest.ilfaeril.resolved", "op": "SetTrue"}, {"key": "quest.ilfaeril.penance", "op": "SetTrue"}, {"key": "companion.ilfaeril.approval", "op": "AddInt", "amount": 10}]}, {"text": "Accept it. You're allowed to be more than your worst vote. (be forgiven)", "next": "forgiven", "fail": null, "effects": [{"key": "quest.ilfaeril.resolved", "op": "SetTrue"}, {"key": "quest.ilfaeril.forgiven", "op": "SetTrue"}, {"key": "companion.ilfaeril.approval", "op": "AddInt", "amount": 20}]}, {"text": "[Insight] She isn't closing your debt. She's handing you a charge.", "next": "commission_win", "fail": "commission_fail", "checkDC": 16, "checkAbility": "Wisdom"}]}, {"id": "penance", "speaker": "Ilfaeril", "text": "No. I cannot take it — not yet, perhaps not ever. To accept her forgiveness is to set down the weight, and the weight is the last true thing I carry of her and her people. So I will keep it. I will guide the lost past the Wall until the stars go out, and call that my answer.\n\n(He bows his head. It is devotion, and it is also a kind of hiding, and he half knows it.) Thank you for standing with me. Even a man who refuses rest is glad not to refuse it alone.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}, {"id": "forgiven", "speaker": "Ilfaeril", "text": "...All right. (The word costs him more than any wound the Choir dealt.) All right, Maerith. I accept it. I accept that I am not only the hand I raised — that ten thousand years of trying to make it right is allowed, at last, to *count.*\n\n(He breathes out, and something ancient and rigid in him eases.) I had forgotten that forgiveness is a thing you do for the *living.* She freed me to stop. One day — not today, but one day — I think I might even rest. You gave me that. I will not waste it.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}, {"id": "commission_win", "speaker": "Ilfaeril", "text": "Wait — listen to her words again. She does not say *be at peace.* She says *do not let it happen to anyone else.* She is not closing the account. She is *hiring* me.\n\nGods. Ten thousand years I treated her forgiveness as a door I had to be worthy to walk through — and it was a *sword* she was holding out, hilt-first, the whole time. I accept it. Not as an ending. As a commission. The Wall took her people; I will spend whatever I have left tearing a hole in it for the rest of them. That is the only forgiveness worth the name: the kind that puts you back to work. You didn't absolve me, friend. You *armed* me.", "dynamic": false, "auto": null, "onEnter": [{"key": "quest.ilfaeril.resolved", "op": "SetTrue"}, {"key": "quest.ilfaeril.forgiven", "op": "SetTrue"}, {"key": "quest.ilfaeril.commission", "op": "SetTrue"}, {"key": "companion.ilfaeril.approval", "op": "AddInt", "amount": 30}], "choices": []}, {"id": "commission_fail", "speaker": "Ilfaeril", "text": "Do not reach for a clever reading of her words to make this easy on me. I have hidden inside elegant interpretations for ten thousand years; it is its own kind of cowardice. Her meaning is plain enough. The only question is mine to answer.\n\nSo say it simply: do I take what she offers, or do I keep paying?", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "Keep paying. Guide the lost, forever. (the penance)", "next": "penance", "fail": null, "effects": [{"key": "quest.ilfaeril.resolved", "op": "SetTrue"}, {"key": "quest.ilfaeril.penance", "op": "SetTrue"}, {"key": "companion.ilfaeril.approval", "op": "AddInt", "amount": 10}]}, {"text": "Take what she offers. You're allowed to stop. (be forgiven)", "next": "forgiven", "fail": null, "effects": [{"key": "quest.ilfaeril.resolved", "op": "SetTrue"}, {"key": "quest.ilfaeril.forgiven", "op": "SetTrue"}, {"key": "companion.ilfaeril.approval", "op": "AddInt", "amount": 20}]}]}]}, {"id": "market.urchin", "file": "MarketScene.cs", "title": "Market · Urchin", "start": "0", "nodes": [{"id": "0", "speaker": "Flaming Fist", "text": "\"Caught this one's hand in a fishwife's purse. Edict says a finger for a first theft, or the Seatower cells.\" The child — eight, maybe nine, all elbows and terror — doesn't even struggle. They've done this before. \"Unless someone wants to pay the fishwife's loss and stand surety. You someone, Returned?\"", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "[Stand surety.] I'll cover it. Let the child go.", "next": "freed", "fail": null, "effects": [{"key": "market.urchin_resolved", "op": "SetTrue"}, {"key": "market.urchin_freed", "op": "SetTrue"}, {"key": "reputation.lowcity", "op": "AddInt", "amount": 2}]}, {"text": "The law's the law. (Let them take the child.)", "next": "taken", "fail": null, "effects": [{"key": "market.urchin_resolved", "op": "SetTrue"}, {"key": "reputation.lowcity", "op": "AddInt", "amount": -2}]}]}, {"id": "freed", "speaker": "Flaming Fist", "text": "The picket shrugs, takes your coin, and lets go of a fistful of ragged tunic. The child is gone before you can speak — but at the mouth of the alley they stop, and look back at you, and do not run. They are *deciding something.* In the Lower City, that is how every good thing starts: a child, surprised by mercy, deciding the world might hold some after all.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}, {"id": "taken", "speaker": "Flaming Fist", "text": "\"Sensible.\" He marches the child off toward the Seatower. They don't cry. That's the part that stays with you — not tears, just the small flat face of someone learning, on schedule, exactly what the city thinks they're worth. The fishwife won't meet your eye. She has children too.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "market.*", "file": "MarketScene.cs", "title": "Market", "start": "0", "nodes": [{"id": "0", "speaker": "NPC", "text": null, "dynamic": true, "auto": null, "onEnter": [], "choices": []}]}, {"id": "naeve.quest.arrival", "file": "NaeveQuestContent.cs", "title": "Naeve · Quest · Arrival", "start": "0", "nodes": [{"id": "0", "speaker": "Naeve", "text": "Do you hear it? No — of course you don't. It's the resonance of a live mythallar, and there has not been one of those in this world for a thousand years. This is a piece of the Seventh Enclave. My Enclave. It never finished falling. It has been *up here,* humming my home's exact note, the whole time I thought I'd lost it.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "Then let's go in. Carefully.", "next": "1", "fail": null}, {"text": "How is anything still aloft after the Weave died?", "next": "2", "fail": null}]}, {"id": "1", "speaker": "Naeve", "text": "Carefully. Yes. I have not been careful with anything I loved since I was old enough to derive a proof, and look what that bought the sky. So — carefully. Stay close. The wards here knew my hand once. I do not know if a thousand years remembers.", "dynamic": false, "auto": "3", "onEnter": [], "choices": []}, {"id": "2", "speaker": "Naeve", "text": "It shouldn't be. That's what frightens me. A mythallar that loses its Weave goes dark and the city comes down — I *watched* it, all of them, at once. For this one to still be burning, someone left it a reserve. A calculation precise enough to ration a thousand years of magic down to a candle-flame. There were perhaps three people alive who could do that math. I was one.", "dynamic": false, "auto": "3", "onEnter": [], "choices": []}, {"id": "3", "speaker": "Naeve", "text": "So either a colleague I loved spent their last breath saving a rock — or I did, and forgot, and have spent a millennium grieving a thing that was waiting for me to come back. I have to know which. Whatever's at the core, I face it. Come.", "dynamic": false, "auto": null, "onEnter": [{"key": "naeve.quest.arrived", "op": "SetTrue"}], "choices": []}]}, {"id": "naeve.quest.echo", "file": "NaeveQuestContent.cs", "title": "Naeve · Quest · Echo", "start": "0", "nodes": [{"id": "0", "speaker": "Vaelin (an echo)", "text": "Arcanist Naeve. You took your time. I am — was — Vaelin, Steward of the Seventh. What's left of me the mythallar keeps, the way it keeps everything: imperfectly, and forever. You want to know who saved this shard. Child. *You* did. You set the rationing wardstone in the last hour, while the rest of us screamed at Karsus's sky.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "I don't remember doing that.", "next": "1", "fail": null}, {"text": "Then why does it feel like a tomb, not a rescue?", "next": "1", "fail": null}]}, {"id": "1", "speaker": "Vaelin (an echo)", "text": "Because it is both. You saved a fragment by sentencing it to fall *slowly* — for a thousand years, instead of an afternoon. Everyone in it is still here. Still falling. Still mine to steward. And the candle is nearly out: the wardstone has been drinking the world's last live Weave to keep us, and there is almost none left. You came back at the very end of the math.", "dynamic": false, "auto": "2", "onEnter": [{"key": "naeve.quest.truth_known", "op": "SetTrue"}], "choices": []}, {"id": "2", "speaker": "Vaelin (an echo)", "text": "There is one mercy left to me: the core's old protocol. *Admit no one who would unmake the work.* I cannot tell anymore whether you have come to save us or to finish us — and the wards will not let either of us decide it with words. They are waking. I am sorry, Arcanist. Get to the core, and *then* choose. I find I would rather lose to you than to time.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "naeve.quest.resolution", "file": "NaeveQuestContent.cs", "title": "Naeve · Quest · Resolution", "start": "0", "nodes": [{"id": "0", "speaker": "Naeve", "text": "The wards are still. The core is open, and Vaelin's right — the wardstone is nearly dry. Whatever I do, I do it now, in the last live Weave my own younger hand set aside.\n\nThree ways this ends. I have run them a thousand times in my sleep and never once been brave enough to pick. Help me. Please.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "Lock it in stasis. Keep the last of Netheril, whole, forever. (preserve)", "next": "preserve", "fail": null, "effects": [{"key": "quest.naeve.resolved", "op": "SetTrue"}, {"key": "quest.naeve.preserved", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 10}]}, {"text": "Let it finish falling. Lay your world to rest — and carry it. (release)", "next": "release", "fail": null, "effects": [{"key": "quest.naeve.resolved", "op": "SetTrue"}, {"key": "quest.naeve.released", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 20}]}, {"text": "[Arcana] The wardstone can give its Weave back — not embalm the dead, but feed the living.", "next": "rekindle_win", "fail": "rekindle_fail", "checkDC": 16, "checkAbility": "Intelligence"}]}, {"id": "preserve", "speaker": "Naeve", "text": "...I can't. I can't be the hand that ends it twice. (She seals the wardstone, and the shard stops falling — a snowflake caught mid-air, forever.)\n\nThey're safe now. Frozen, but safe; mine to keep. Don't say it. I know what it is — a tomb I'll visit and call a home, a mistake I refused to carry because clutching it was easier. I am not ready to let the sky finish. Maybe I never will be. But you stood here while I wasn't brave. That is its own kind of saving.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}, {"id": "release", "speaker": "Naeve", "text": "No. A thing held out of its ending isn't saved — it's only made to fall forever, and I have asked enough people to fall forever. (She lifts her hand from the wardstone, and gently, the last of Netheril lets go.)\n\nIt's done. It fell. It was always going to fall, and I have spent a thousand years pretending my grief was a calculation I could redo. It isn't. Some mistakes you don't erase. You *carry* them. I think — I think I can carry this now. Because I'm not carrying it alone.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}, {"id": "rekindle_win", "speaker": "Naeve", "text": "Wait — *wait.* The wardstone isn't a cage, it's a held breath. The Weave inside it isn't spent, it's *saved* — the last live magic in the world, and I have been treating it as a shroud. I can open my own hand. Let it go not down, but *out* — back into the dead Weave of the present, a seed instead of a tomb.\n\nThere's a notation under my old proof in a hand I almost know — it says the same thing, as if someone left me the answer to find. Netheril doesn't get to live again. But it gets to *give.* My people end as the thing that makes new magic possible. That's not erasing the mistake. That's the mistake, finally, building something.", "dynamic": false, "auto": null, "onEnter": [{"key": "quest.naeve.resolved", "op": "SetTrue"}, {"key": "quest.naeve.released", "op": "SetTrue"}, {"key": "quest.naeve.rekindled", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 30}], "choices": []}, {"id": "rekindle_fail", "speaker": "Naeve", "text": "Don't — don't hand me an elegant third door. Elegance is what I trusted last time, and it dropped a civilization out of the sky. There's no clever proof that makes this not hurt. There's only what I'm willing to carry.\n\nSo, plainly: do I freeze them and keep the tomb, or do I let the sky finish falling?", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "Keep them. Freeze the shard. (preserve)", "next": "preserve", "fail": null, "effects": [{"key": "quest.naeve.resolved", "op": "SetTrue"}, {"key": "quest.naeve.preserved", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 10}]}, {"text": "Let it fall. Lay it to rest. (release)", "next": "release", "fail": null, "effects": [{"key": "quest.naeve.resolved", "op": "SetTrue"}, {"key": "quest.naeve.released", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 20}]}]}]}, {"id": "(NetherilContent)", "file": "NetherilContent.cs", "title": "(netherilcontent)", "start": "0", "nodes": [{"id": "0", "speaker": "—", "text": "You fall out of your own century. Gold light. Sunlight on glass. A city — an entire city — floating in an impossible blue sky, held aloft by magic so total it has forgotten it is magic at all.", "dynamic": false, "auto": "1", "onEnter": [{"key": "netheril.arrived", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "—", "text": "And then — all at once, everywhere, like a bell rung underwater — every spell in the world goes silent. The light dies. And the city, which flies by magic, begins, very slowly and then all at once, to FALL.", "dynamic": false, "auto": "2", "onEnter": [], "choices": []}, {"id": "2", "speaker": "The Returned", "text": "Karsus's Folly. The day the goddess of magic died. I'm standing inside the first apocalypse — and the floor is going out from under the world. Move. MOVE.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}, {"id": "0", "speaker": "Naeve", "text": "You pulled me from the rubble. Impossible — the ward-stones should have rendered me to ash. Unless... you are not of this Now at all. You have the look of someone *falling through time.* I have read of people like you. In the margins of a forbidden proof. In a hand identical to my own — written centuries before I was born.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "Whose hand?", "next": "hand", "fail": null}, {"text": "No time. The city's falling — come with me, NOW.", "next": "join", "fail": null, "effects": [{"key": "companion.naeve.recruited", "op": "SetTrue"}]}]}, {"id": "hand", "speaker": "Naeve", "text": "Yours, I rather think. Which should be impossible, and is the single most interesting thing that has ever happened to me, and we are both about to die discussing it. Get me off this dying enclave and I will tell you everything I have read about you. About what you are.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "Deal. Stay close.", "next": "join", "fail": null, "effects": [{"key": "companion.naeve.recruited", "op": "SetTrue"}]}]}, {"id": "join", "speaker": "Naeve", "text": "Then I am yours, impossible one. Mind the gaps in the floor — gravity has only just remembered it has opinions. Let us not be where the marble is not.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "netheril.naeve_witness", "file": "NetherilEra.cs", "title": "Netheril · Naeve · Witness", "start": "0", "nodes": [{"id": "0", "speaker": "Naeve", "text": "I have done the impossible arithmetic of my own life ten thousand times, and never once did it let me back *here* — the hour it fell, the air still warm with the Weave before Karsus reached too far. That balcony. I derived my first proof on that balcony. It is about to be sky.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "We can't stop the fall. But you're not watching it alone this time.", "next": "stay", "fail": null}, {"text": "Is there anything here you need to see?", "next": "see", "fail": null}]}, {"id": "close", "speaker": "Naeve", "text": null, "dynamic": true, "auto": null, "onEnter": [{"key": "netheril.naeve_witnessed", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 5}], "choices": []}]}, {"id": "lady.tally", "file": "RiddleContent.cs", "title": "Lady · Tally", "start": "0", "nodes": [{"id": "0", "speaker": "Tally (a one-eyed storyteller)", "text": "—and the hero died in the first chapter and came back *wrong.* Oh! Speak of the margin. Sit. I've a pouch for you and a question. The pouch first; you'll want it for the question. I keep a little vault between the pages — ten pedestals, a brazier, and the best company you'll ever lose a riddle to. Care to play?", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "Show me your Vault of Tens.", "next": "yes", "fail": null, "effects": [{"key": "vault.requested", "op": "SetTrue"}]}, {"text": "Who ARE you?", "next": "who", "fail": null}, {"text": "Maybe later.", "next": "later", "fail": null}]}, {"id": "who", "speaker": "Tally", "text": "A storyteller. A gambler. A note someone left in the margin of a very long book and forgot to erase. Which of those is true? *All of them, on a good day.* Now — the Vault?", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "Lead on.", "next": "yes", "fail": null, "effects": [{"key": "vault.requested", "op": "SetTrue"}]}, {"text": "Not yet.", "next": "later", "fail": null}]}, {"id": "yes", "speaker": "Tally", "text": "Wonderful. Mind the step between the pages — it's a long way down to the footnotes.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}, {"id": "later", "speaker": "Tally", "text": "Mm. I'll be here. I'm always here. That's rather the whole tragedy of me.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}, {"id": "0", "speaker": "Tally (between the pages)", "text": "Fancy meeting you here, time-walker. A quick one — no vault required: I'll not speak till I'm spoken to, and then I always have the last word. Mock me from a mountain, and you're mocked in your own voice, unheard. What am I?", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "An echo.", "next": "right", "fail": null, "effects": [{"key": "riddle.amusement", "op": "AddInt", "amount": 3}, {"key": "tally.roaming1.done", "op": "SetTrue"}]}, {"text": "A shadow.", "next": "wrong", "fail": null, "effects": [{"key": "tally.roaming1.done", "op": "SetTrue"}]}, {"text": "Silence.", "next": "wrong", "fail": null, "effects": [{"key": "tally.roaming1.done", "op": "SetTrue"}]}]}, {"id": "right", "speaker": "Tally", "text": "Mm. You'll fight a roomful of those, later — wearing the faces you love. Keep the answer. Keep the warning. I'll be three pages ahead, as ever.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}, {"id": "wrong", "speaker": "Tally", "text": "Ha — no. But you *tried*, and trying amuses me almost as much as winning. Almost. Off you go.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "roen.quest.arrival", "file": "RoenQuestContent.cs", "title": "Roen · Quest · Arrival", "start": "0", "nodes": [{"id": "0", "speaker": "Roen Alleywind", "text": "This is the safehouse the cipher named. Harper-warded, supposedly. But the wards are cold, the door's off the latch, and there's no countersign chalked on the step.\n\nSomeone I care about ran this house. I told you I had a person I'd pull from the Wall. I didn't tell you she's my sister. Wrenna. And I didn't tell you she's not in the Wall yet.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "Why lie about it?", "next": "1", "fail": null}, {"text": "Then let's get her out. Lead on.", "next": "2", "fail": null}]}, {"id": "1", "speaker": "Roen Alleywind", "text": "Because if you knew I had something to lose, you'd know exactly where to cut me. Habit. The Harpers train it into you young, and family trains it younger.", "dynamic": false, "auto": "2", "onEnter": [], "choices": []}, {"id": "2", "speaker": "Roen Alleywind", "text": "Doomguide sign on the lintel — fresh. Kelemvor's people have been here, and they don't leave witnesses, only verdicts. Knives out. Quietly.", "dyna
