candle-festival at Hollowmere, a child lit me and *said a name* — and I've forgotten it, and a candle without its name just... drifts. Have you — you've come from the warm places. Did anyone there have a name shaped like a *hole* in the talking?", "dynamic": false, "auto": "1", "onEnter": [{"key": "npc.wickless_met", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "Wickless", "text": "*(The flame settles, and its light steadies as it tells the shape of its grief.)* It's a Hollowmere custom, see. The candle-festival. You light a flame for someone you've *lost* — and you say their name, and the flame *carries* it, holds the name lit for the one night, so the lost one is *spoken* again even if just for an evening. *(it flickers.)* A child lit me. A *little* one. And she didn't say a *normal* name — she leaned in close and whispered *\"this one's for the person we're not allowed to talk about,\"* and then she said the name so *soft*, so *scared*, looking over her shoulder — and the festival ended, and I should have gone out, but I *didn't*, because I was carrying a name nobody was *allowed* to say, and a name like that *can't* go out, it has *nowhere to be set down.* *(the flame dims, grieving.)* So I drifted here. To the grey. Looking. Because the person I was lit for is *here*, somewhere — Faithless, walled, *not-allowed* — and if I could find them, I could *give the name back*, and *then* I could rest. But I forgot it on the way. The forgetting got me too.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "[INSIGHT 15] \"The child whispered it scared because the name was *forbidden* — a Faithless relative the family erased. You didn't forget it, Wickless. You're *protecting* it. You went out around the name so no one could make you say it to the wrong ears.\"", "next": "protecting", "fail": "gutter", "checkDC": 15, "checkAbility": "Wisdom"}, {"text": "\"Then we find them together. A flame that won't go out and a thing that came back from the dead — between us, we can carry one forbidden name to where it belongs.\"", "next": "together", "fail": null, "effects": [{"key": "sq.wickless_name", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 3}]}, {"text": "[ARCANA 16] \"A name spoken in grief and never set down — that's not a candle, Wickless. That's a *ward.* The Wall can't take what's still being *carried.* You've kept one soul un-walled for a whole festival's love. Don't you dare gutter.\"", "next": "ward", "fail": "gutter", "checkDC": 16, "checkAbility": "Intelligence"}, {"text": "\"Come with me, little light. Even if we never find the name — no one who's looking for someone should look alone.\"", "next": "company", "fail": null, "effects": [{"key": "companion.garrow.approval", "op": "AddInt", "amount": 2}]}]}, {"id": "protecting", "speaker": "Wickless", "text": "*(The flame flares, startled, then burns steadier than it has yet.)* ...Protecting it. *(the small voice wavers.)* Oh. *Oh.* I thought I *failed* — thought I was a *broken* candle, the one that forgot its one job — but you're saying I — *(the light strengthens.)* The child was *so scared*, looking over her shoulder, because saying the name *at all* was forbidden, and so when the festival ended and the wind came to put me out, some part of me thought: *if I go out, the name goes with me, and then they win, then the forbidding wins.* *(fiercely, tiny.)* So I didn't go out. I *drifted* instead, I forgot on *purpose*, I hid the name *from myself* so no one could ever make me *give it up.* *(the flame trembles with the weight of what it's kept.)* I'm not a *failed* candle. I'm a *locked box* with the key thrown into my own forgetting. *(softly.)* Find the person I was lit for, Returned. When I *see* them — when I see the face — the lock will know it's safe, and the name will come back, and I can finally, *finally* set it down where it can't be forbidden anymore. In the hands of the one it was *for.*", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.wickless_protecting", "op": "SetTrue"}, {"key": "sq.wickless_name", "op": "SetTrue"}, {"key": "act2.forbidden_name_carried", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "together", "speaker": "Wickless", "text": "*(The flame does a small, delighted loop, brightening.)* Together! Oh, *yes* — yes, I'll come, I'll light your way, I'm not much but I'm *warm* and I *don't go out*, that's my whole talent, *not going out.* *(it bobs to your shoulder.)* I've been looking *alone* for so long, drifting and guttering and asking the standing-still people who never even *turn*, and you're the first thing in the grey that said *we.* *(it settles, a small steady light.)* I'll know them when we find them. I have to believe that. The name's still *in* here — I can feel it, like a word on the tip of a tongue that doesn't have a tongue anymore — and the moment we find the right face, it'll *spill*, and you'll hear me say a name no one's been allowed to say in years, and the air will *remember* them, and oh — *(the flame glows)* — won't that be a *thing*, Returned. To make the air say a forbidden name out loud. Let's go make the air remember someone.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.wickless_joins", "op": "SetTrue"}, {"key": "sq.wickless_name", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 2}], "choices": []}, {"id": "ward", "speaker": "Wickless", "text": "*(The flame goes very still, then blazes — for one instant brighter than anything in the grey.)* A *ward.* *(the small voice fills with awe.)* I'm a — the Wall can't *take* them, because I'm still *carrying* — *(the light steadies into something fierce and certain.)* That's why I've felt a *pull*, all this time, a thread running off into the walled dark — it's *them*, it's the person I was lit for, and they're *not fully gone*, Returned, they *can't* be, because a candle lit in grief and never set down keeps one corner of a soul *un-walled.* *(the flame trembles with purpose.)* One frightened child, one whispered forbidden name, one little candle too stubborn to gutter — and a whole festival's worth of love has been holding one Faithless soul *partway in the light* for *years*, and *nobody knew*, because the thing doing it was *small* and *wickless* and *easy to overlook.* *(it burns.)* Don't let me go out. Follow my pull. At the end of it is a soul the Wall *almost* got, kept warm by a candle, waiting for its name. Let's finish what the child started.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.wickless_is_ward", "op": "SetTrue"}, {"key": "sq.wickless_name", "op": "SetTrue"}, {"key": "act2.cataloguing_defeats_the_wall", "op": "SetTrue"}, {"key": "act1.mercy_remembered", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "company", "speaker": "Wickless", "text": "*(The flame softens, and its light goes gentle and grateful.)* Look alone. *(quietly.)* No. You're right. No one should. *(it drifts close, warming the air by your hand.)* Maybe we never find them. Maybe the name's gone for good and I drift forever and you go on to your great terrible business with the Wall. But for a little while, in the greyest place there is, there'll be two things *looking together* instead of two things lost apart, and that's — *(the flame glows, small and sure)* — that's not *nothing*, Returned. That might be the most a candle can hope for, really. Not to find. Just to be *carried while looking.* *(it settles at your shoulder, content.)* I'll light what I can. You walk. We'll look as we go. And if the name comes — oh, if the name comes — we'll be *together* when it does, and that's the right way for a forbidden name to come home: into more than one set of hands.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.wickless_company", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 2}], "choices": []}, {"id": "gutter", "speaker": "Wickless", "text": "*(The flame dips, dims, nearly goes out — then catches, barely.)* I don't — I don't understand the big words. *(small, lost.)* I'm just a candle that forgot. Maybe there's no name. Maybe the child never said one and I made it up to have a reason to keep burning. *(it gutters.)* Don't mind me. I'll keep drifting. Something this small isn't *for* anything. *(but it doesn't go out — it never quite goes out — and it bobs away into the grey, still looking, still carrying whatever it carries, too stubborn to admit it's a ward and too lost to rest.)*", "dynamic": false, "auto": "close", "onEnter": [], "choices": []}, {"id": "close", "speaker": "Wickless", "text": "*(The little flame drifts on through the grey — wickless, nameless, and utterly unwilling to gutter — carrying a forbidden name around a frightened child's whisper, holding one walled soul a candle's-width into the light, the smallest and most stubborn act of love in the whole plane of the unjudged dead.)*", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "npc.fugue.maerin", "file": "FugueDenizensTwoContent.cs", "title": "Npc · Fugue · Maerin", "start": "0", "nodes": [{"id": "0", "speaker": "A Furious Girl in a Niche", "text": "*(In a niche of the Wall, a young woman flickers — translucent at the edges, fading, *going* — but her eyes are fierce and entirely present, and when she sees you she does not reach out in hope like the others. She *glares.*)* No. *(flatly.)* Whatever you're here for — *no.* I know that look. I've had a hundred of you come down the line with that *exact* look. You're here to *save* me. You've heard of me — *Aldric's daughter, the merchant's lost girl, fading in the dark* — and you've come to make me into the thing that makes *you* feel like a hero. *(she folds fading arms.)* I would rather *finish going out* than be one more person's *reason.* So unless you've got something better than *rescue*, keep walking.", "dynamic": false, "auto": "1", "onEnter": [{"key": "npc.maerin_met", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "Maerin", "text": "*(She keeps glaring, but the words pour out — the fury of someone who has had a great deal of time and no one worth saying it to.)* You want to know the worst part of dying Faithless? It isn't the *fading.* It's that the moment you're gone, everyone who *knew* you turns you into a *story about themselves.* My father — *(her voice cracks, hardens)* — my father will spend the rest of his life being *the man whose daughter the Wall took.* I'll be his *grief*, his *cause*, his *reason* to do brave sad things. And I won't be *Maerin* anymore. I'll be a *motivation.* *(she steps forward, flickering.)* I had *opinions*, Returned. I was *funny.* I was *unfair* to people who deserved it and *cruel* sometimes and I once made my father laugh so hard he fell off a *boat.* And all of that is about to get sanded down into *the dead girl who makes the living act.* *(fierce, fading.)* So when you go back up there — and you *will*, that's what your kind *does* — do *not* tell my father you met his *reason.* Tell him you met his *daughter*, who was *angry*, and *specific*, and *hers*, right up until the grey took the edges off.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "[INSIGHT 17] \"You're not afraid of fading. You're afraid of being *flattened* — of becoming a symbol so smooth no one remembers you had corners. So keep the corners. Be as unfair and funny and *specific* as you want. I'll carry the *girl*, not the cause.\"", "next": "corners", "fail": "snap", "checkDC": 17, "checkAbility": "Wisdom"}, {"text": "[PERSUADE 16] \"Then come back up *yourself* and be insufferable in person. You don't have to fade, Maerin. There's a road out of the niche — but it needs you *furious and alive*, not nobly gone.\"", "next": "recruit", "fail": "bristle", "checkDC": 16, "checkAbility": "Charisma"}, {"text": "\"Tell me one unfair, specific, true thing about yourself. Something a *symbol* could never survive. I'll keep it exactly as sharp as you say it.\"", "next": "specific", "fail": null, "effects": [{"key": "companion.maerin.approval", "op": "AddInt", "amount": 4}]}, {"text": "\"Your father fell off a boat. Tell me about *him* — not the grief he'll become. The man who laughed.\"", "next": "father", "fail": null, "effects": [{"key": "companion.maerin.approval", "op": "AddInt", "amount": 2}]}]}, {"id": "corners", "speaker": "Maerin", "text": "*(The glare falters — not softening, but *seen*, which is harder to defend against.)* ...Flattened. *(quietly, the fury banking into something rawer.)* Yes. That's the word. That's the *exact* word. *(she looks at her own fading hands.)* Everyone keeps trying to *comfort* me — *you'll be remembered, you'll be honored, your sacrifice* — and all of it is *sandpaper.* Remembered *smooth.* Honored *featureless.* A *sacrifice* doesn't get to have been *unfair to the fishmonger's son for no reason* — but I *was*, and I'd *do it again*, and that pettiness is *more* me than any noble fading. *(she meets your eyes, fierce and grateful and furious at being grateful.)* You said *corners.* Nobody's offered to keep the *corners.* They want the *martyr*; you're offering to carry the *brat.* *(a flickering, real laugh.)* Gods, that's the kindest thing anyone's said to me since I died. Keep the corners, Returned. All of them. The cruelty and the comedy and the boat. If I have to be carried, let me be carried *sharp.* I'd rather cut the hand that holds me than melt in it.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.maerin_corners", "op": "SetTrue"}, {"key": "sq.maerin_specific", "op": "SetTrue"}, {"key": "companion.maerin.approval", "op": "AddInt", "amount": 6}], "choices": []}, {"id": "recruit", "speaker": "Maerin", "text": "*(She stares — and for the first time the fury cracks to show what it's been *guarding*: a terror of hoping.)* A road out. *(unsteadily.)* Don't. Don't *do* that to me. Do you know how many times I've talked myself *out* of hope down here? It's the only mercy the niche offers — once you stop hoping, the fading stops *hurting.* And you walk up and say *road out* and undo *months* of — *(she stops, jaw set.)* ...Furious and alive, you said. Not nobly gone. *(a flickering, dangerous spark.)* You don't want to *rescue* me. You want to *recruit* me. That's — that's *different.* A rescue makes me cargo. A recruitment means you think I'm still *good for something* besides being grieved. *(the fury reignites, but pointed *outward* now, toward the Wall, toward the road.)* Then *yes.* Yes, gods damn you and your hope — *yes.* But understand: I don't come up there to be your *redemption arc.* I come up to be *furious in person*, at the *thing that did this*, with my *own two restored hands.* You're not saving a reason, Returned. You're *arming* one. Get me out of this niche and point me at the Wall.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.maerin_recruit", "op": "SetTrue"}, {"key": "sq.maerin_recruit", "op": "SetTrue"}, {"key": "act2.maerin_will_return", "op": "SetTrue"}, {"key": "companion.maerin.approval", "op": "AddInt", "amount": 5}], "choices": []}, {"id": "specific", "speaker": "Maerin", "text": "*(She blinks — the request disarms her more than any rescue could.)* One unfair, specific, true thing. *(a slow, fierce grin breaks through the fading.)* ...Alright. *(she leans in.)* When I was sixteen, the fishmonger's son — Tobin, sweet boy, dull as a post — gave me a carved fish for my nameday. Spent *weeks* on it. And I told him, in front of *everyone*, that it looked like a *drowned slipper*, and I watched his face *fall*, and I felt — *(she holds your eyes, refusing to flinch)* — I felt *powerful*, and *glad*, and I did *not* apologize, not then, not ever, and he married a kinder girl and I'm *certain* he's happier and I am *still*, dead and fading in the dark, *not sorry.* *(quietly, fiercely.)* *That's* me. Not the grief. Not the cause. A girl who was *cruel to a sweet boy over a carved fish and kept the cruelty her whole short life.* *(she sits back, daring you.)* A symbol can't hold *that.* So if you hold it — if you carry *the drowned slipper* — then you're carrying *me*, and not the smooth dead thing they'll try to make me. Do we have a deal?", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.maerin_specific_given", "op": "SetTrue"}, {"key": "sq.maerin_specific", "op": "SetTrue"}, {"key": "act1.mercy_remembered", "op": "SetTrue"}, {"key": "companion.maerin.approval", "op": "AddInt", "amount": 5}], "choices": []}, {"id": "father", "speaker": "Maerin", "text": "*(The fury gentles — this, she'll allow, this one thing.)* My father. *(her fading face softens, just at the edges.)* Aldric. He's a *terrible* merchant, Returned — *terrible* — because he can't lie and he can't haggle and he *cries at weddings he wasn't invited to.* *(a wet, flickering laugh.)* The boat — we were on the river, and I did an *imitation* of the harbormaster, this pompous old walrus, and my father laughed so hard he went *backward off the gunwale*, fully clothed, into the *Chionthar*, and came up *still laughing*, and the harbormaster was *right there* and saw the *whole thing.* *(she wipes a fading eye.)* That's the man. Not *the grieving father.* The man who falls off boats laughing at his daughter's cruelty to walruses. *(her voice drops, fierce again.)* And he's about to lose *that* — lose the *laughing* — and become *the man whose daughter the Wall took*, and it'll *sand him smooth* too, grief does that to the living and the dead *both.* *(she grips your gaze.)* If you do *one* thing with me, Returned: make sure my father gets to *laugh* again before they finish turning us both into a tragedy. He fell off a *boat* for me. The least the world owes him back is one more laugh.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.maerin_father", "op": "SetTrue"}, {"key": "act2.aldric_thread", "op": "SetTrue"}, {"key": "companion.maerin.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "snap", "speaker": "Maerin", "text": "*(Her edges flare, affronted.)* Don't *read* me. *(sharp.)* I didn't ask to be *understood*, I asked to be *left.* You think naming my fear *defuses* it? It just means now *you* know where to *press.* *(she turns half away, flickering.)* Go be perceptive at someone who *wants* saving. I'll do my fading *unflattened*, thank you, and *spite* will keep the corners on just fine without your *help.* *(but she doesn't tell you to leave — quite — and the glare she gives you has a question buried in it she won't ask aloud.)*", "dynamic": false, "auto": "close", "onEnter": [], "choices": []}, {"id": "bristle", "speaker": "Maerin", "text": "*(She laughs, short and bitter, the hope slamming shut.)* A *road out.* Of *course* there is. There's *always* a road out, right up until there *isn't*, and the only thing crueler than the niche is the *fool who promises an exit and can't deliver it.* *(fierce, frightened.)* I've made *peace* with going out, Returned. Don't you *dare* unmake it with a maybe. Come back when *road out* is a *door I can see*, not a *kindness you're guessing at.* Until then — *(she folds fading arms)* — I'll keep fading on schedule, and *spite*, and I won't thank you for the false dawn. Go.", "dynamic": false, "auto": "close", "onEnter": [], "choices": []}, {"id": "close", "speaker": "Maerin", "text": "*(Aldric's daughter flickers in her niche — furious, specific, fading, and absolutely refusing to be smoothed into anyone's reason — and you carry away not a cause to fight for but a *girl* to remember exactly as sharp as she insisted: cruel over a carved fish, unfair to walruses, hers right down to the corners the grey has not yet taken.)*", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "npc.fugue.mournlight", "file": "FugueDenizensTwoContent.cs", "title": "Npc · Fugue · Mournlight", "start": "0", "nodes": [{"id": "0", "speaker": "A Light That Weeps", "text": "*(Where the grey thins, a light hangs — not warm like Wickless, not cold like the Wall, but *luminous with sorrow*, a radiance that seems to weep without water, beautiful and almost unbearable to look at directly. As you approach it does not speak in words at first; it simply *brightens toward you*, testing, and you feel it reach into your chest to find out whether you are *carrying* anything it recognizes.)*", "dynamic": false, "auto": "1", "onEnter": [{"key": "npc.mournlight_met", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "The Mournlight", "text": "*(A voice arrives, made of many griefs layered into one chord.)* You may carry me. *(the light pulses.)* Or you may not. It is not your *strength* that decides it, Returned, nor your *will*, nor your *worthiness* in any way you could *earn.* I am the Mournlight — every grief for a Faithless soul that was *told it had no right to grieve.* The mother forbidden to mourn her doubting son. The widow whose husband was sorted to nothing while the priest said *do not weep, he chose it.* Ten thousand mournings that were *denied a place to land* — gathered, here, into light. *(it drifts closer.)* I can be *carried* to the Court of the Dead, where I would shine so that the gods *cannot look away* from the grief they forbade. But I will *only* let myself be lifted by hands that carry *real* grief — not performed, not borrowed, not strategic. *(gently, terribly.)* So I must look inside you. And you cannot *fake* what I'm looking for. Many have tried, with beautiful sad faces and nothing underneath, and I stayed where I am, and they walked on, lighter and emptier than they knew. Stand still. Let me see what you actually *mourn.*", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "[INSIGHT 18] \"Don't look for the *biggest* grief in me. Look for the one I've never let *land* — the one I'm not allowed to feel, the one I've been carrying *forbidden*, same as every soul you're made of. That's the one that matches you.\"", "next": "recognized", "fail": "hollow", "checkDC": 18, "checkAbility": "Wisdom"}, {"text": "\"*(stand still. Don't perform. Let it see the real one — the loss you've never spoken, the one with no permission)*\"", "next": "truegrief", "fail": null, "effects": [{"key": "companion.naeve.approval", "op": "AddInt", "amount": 3}]}, {"text": "\"I won't try to carry you if I'm carrying nothing true. Better you stay than be lifted by a lie that dims you.\"", "next": "honest", "fail": null, "effects": [{"key": "companion.garrow.approval", "op": "AddInt", "amount": 3}]}, {"text": "[ARCANA 16] \"You're the golden-path key, aren't you. The Court can dismiss an *argument* about the Faithless. It cannot dismiss *light made of the grief it forbade.* You don't persuade the gods. You *indict* them, by shining.\"", "next": "indict", "fail": "hollow", "checkDC": 16, "checkAbility": "Intelligence"}]}, {"id": "recognized", "speaker": "The Mournlight", "text": "*(The light *surges* — recognition, vast and immediate — and the weeping radiance wraps around you like something coming home.)* ...The one that never landed. *(the chord of voices trembles with relief.)* *Yes.* You *understand* me — not because you're sad, sadness is *common*, but because you carry a grief you were *forbidden to feel*, and that is the *precise* substance I am *made of.* *(the light settles into your hands, and it weighs nothing and everything.)* Every soul in me was *denied permission to mourn.* And you have, somewhere in you, a loss you've never been *allowed* to grieve — by circumstance, by duty, by a world that said *not now, not that one, not you.* *(it shines through your fingers.)* That forbidden grief is the *handle.* I fit it exactly. *(softly.)* Carry me to the Court, Returned. And when the gods say to the Faithless *you had no right to be mourned*, I will shine with ten thousand mournings that *happened anyway*, plus *yours*, and there is no doctrine in any heaven that can *un-see* a grief that bright. You found the handle by knowing you were *forbidden* too. That's why you, and not the beautiful liars. You didn't reach for me. You *recognized* me.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.mournlight_carried", "op": "SetTrue"}, {"key": "sq.carry_the_mournlight", "op": "SetTrue"}, {"key": "act2.golden_path_key", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 5}], "choices": []}, {"id": "truegrief", "speaker": "The Mournlight", "text": "*(The light moves into you slowly, reading — and then it *weeps brighter*, and lifts toward your hands.)* Oh. *(quietly, the chord catching.)* There. That one. The one you've *never said out loud.* *(the radiance gathers.)* You didn't show me your *worst* grief — you showed me your *quietest* one, the loss you've kept folded so small no one ever saw you carry it. *(it settles, weightless, luminous.)* That's the truest thing you have, Returned: not the grand sorrows you've made peace with, but the small forbidden one still *raw* because it was never *allowed* to heal in the open. *(it shines.)* I can be carried by that. Only by that. *(gently.)* You held still and didn't perform, and so I *saw*, and what I saw was *real*, and now I am yours to bear to the place where grief becomes indictment. Thank you for not *trying* to deserve me. The ones who try are the ones who can't. You simply *stood there and ached*, and the ache was *true*, and true is the only key I take.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.mournlight_truegrief", "op": "SetTrue"}, {"key": "sq.carry_the_mournlight", "op": "SetTrue"}, {"key": "act2.golden_path_key", "op": "SetTrue"}, {"key": "act1.mercy_remembered", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "honest", "speaker": "The Mournlight", "text": "*(The light stills — and then warms, approving, even as it stays where it hangs.)* You will not lift me with a lie. *(the chord softens.)* Do you know, Returned, how *rare* that is? Everyone who passes *wants* me — I am power, I am the golden key, I am the thing that moves the gods — and almost all of them *reach*, certain that *wanting* me badly enough is the same as *grieving* truly. *(it pulses gently.)* You're the first in a long while to say: *not unless it's real.* *(the radiance brightens toward you, fond.)* And *that* — that integrity, that refusal to counterfeit a grief for advantage — *that* is so close to what I'm made of that you may find, if you stand a moment longer and stop *guarding* yourself, that you *do* carry something true after all. *(softly.)* Most people who are honest enough to refuse me are honest enough to *hold* me. Don't walk away yet. The fact that you wouldn't fake it is the surest sign you wouldn't *have* to.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.mournlight_honest", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "indict", "speaker": "The Mournlight", "text": "*(The light blazes — fierce now, the sorrow edged with something like wrath.)* *Indict.* *(the chord rings.)* You see it *exactly.* The gods have *answers* for arguments. They have *doctrine*, *precedent*, ten thousand years of *because-I-said-so* dressed as cosmic law. An argument they can *win.* *(the radiance intensifies.)* But I am not an argument. I am the *grief they forbade*, made *visible.* When I shine at the Court, I do not *say* the Faithless deserved mourning — I *am* the mourning, happening, undeniable, ten thousand mothers and widows and friends weeping in *light* the gods *told them not to shed.* *(softly, terribly.)* You cannot *refute* a tear. You can only *forbid* it — and I am every tear that was forbidden *and fell anyway.* *(it turns toward you.)* But to carry an indictment that bright, Returned, the hand must be *clean* — must carry *its own* forbidden grief, or I will read the lie and *gutter* at the threshold and you will stand before the gods holding *darkness.* *(gently.)* So. Do you grieve something you were never allowed to? Then lift me. And let us go make the heavens *look at what they refused to let anyone cry about.*", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.mournlight_indict", "op": "SetTrue"}, {"key": "sq.carry_the_mournlight", "op": "SetTrue"}, {"key": "act2.golden_path_key", "op": "SetTrue"}, {"key": "act2.wall_has_no_author", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "hollow", "speaker": "The Mournlight", "text": "*(The light dims — not unkindly, but with the weariness of a thing that has been *reached for* too often by the empty.)* No. *(the chord fades.)* What you showed me was *shaped* like grief, but there was *air* inside it — a sadness *performed*, or *borrowed*, or *aimed.* You wanted me for what I could *do*, not for what I *am.* *(it drifts back to its place in the thinning grey.)* I do not blame you. The forbidden grief is the *hardest* thing to find in oneself, precisely *because* it was forbidden — you may have buried yours so deep you no longer feel it, and called the numbness *fine.* *(gently.)* Come back when something has *broken open* in you. Not when you've *practiced* a sadder face. I cannot be carried by the face. Only by the *break.*)", "dynamic": false, "auto": "close", "onEnter": [], "choices": []}, {"id": "close", "speaker": "The Mournlight", "text": "*(The Mournlight hangs in the thinning grey — luminous with ten thousand forbidden sorrows, beautiful and unbearable, waiting for hands that carry a grief they were never allowed to feel — the one thing in all the afterlife that cannot be faked, borrowed, or argued with: a tear that fell anyway, made into light.)*", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "npc.fugue.choir", "file": "FugueDenizensTwoContent.cs", "title": "Npc · Fugue · Choir", "start": "0", "nodes": [{"id": "0", "speaker": "Three Voices in Harmony", "text": "*(In the greyest reach, three shades stand close together — water still streaming from them though there is no water here, lungs that drowned still somehow *singing* — and the sound they make is the only beautiful thing you have heard in the whole plane of the dead: a low three-part harmony, wordless at first, then resolving, as you near, into *names.* They are singing *names*, one after another, an endless braided list, and they do not stop to greet you, because — you understand with a chill — they *cannot* stop.)*", "dynamic": false, "auto": "1", "onEnter": [{"key": "npc.choir_met", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "Three Shades of a Drowned Choir", "text": "*(One shade — the soprano, a girl with weed in her hair — manages to sing *to* you without breaking the list, weaving the words into the harmony so the names never cease.)* *We were a choir... on a ship called the Tern... and the Tern went down... and we kept singing... we did not know... how to do anything else.* *(the alto and bass carry the names beneath her.)* *And here in the grey... we found the names... the Faithless names... going out one by one... as the Wall takes them... and we found... that a name being* sung *is a name being* kept *... the Wall takes the carved and the written... but it cannot take the* sung *... for a song is not a thing you* have *... it is a thing you* do *... and a thing that is only ever* doing *can never be* filed.* *(her eyes find yours, desperate and luminous.)* *So we sing them. All of them. Eleven thousand. In harmony. And we cannot stop... because the moment we fall silent... the names we are holding aloft... go out.*", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "[INSIGHT 17] \"You've found the one thing the Wall can't take — a name that's only ever *being done*, never *kept.* But you've made yourselves a *second Wall*, haven't you? Eleven thousand names imprisoned in a song you can never end. There has to be a way to *set them down* without dropping them.\"", "next": "secondwall", "fail": "drown", "checkDC": 17, "checkAbility": "Wisdom"}, {"text": "[ARCANA 18] \"Teach me the harmony. If three voices can hold eleven thousand names, then thirty can hold them better, and three hundred better still — a *city* singing the Faithless can't be silenced by any god. Make me the fourth voice. Then I'll go make the fourth thousand.\"", "next": "teach", "fail": "drown", "checkDC": 18, "checkAbility": "Intelligence"}, {"text": "\"Sing me one. Just one name, lifted out of the braid, so I can carry that one *up* — out of the grey, into the warm, where it can be sung in daylight.\"", "next": "onename", "fail": null, "effects": [{"key": "sq.choir_name", "op": "SetTrue"}, {"key": "companion.choir.approval", "op": "AddInt", "amount": 3}]}, {"text": "\"Rest. Even for a breath. I'll hold the names while you do — I came back from the dead; I can hold a few names a moment. You've earned one silence.\"", "next": "rest", "fail": null, "effects": [{"key": "companion.naeve.approval", "op": "AddInt", "amount": 3}]}]}, {"id": "secondwall", "speaker": "Three Shades of a Drowned Choir", "text": "*(The harmony *shudders* — all three shades faltering for a fraction of a beat before catching the braid again, and the soprano's eyes fill.)* *A second Wall.* *(she weaves it in, anguished.)* *You see it too. We have... saved them... into a* prison *... eleven thousand names... held safe... and held* hostage *... to three drowned throats that can never... ever... rest.* *(the bass groans the names lower, grieving.)* *We thought we were... their salvation... and we are only... their* better jailers. *(the soprano's voice breaks and mends.)* *But you say... set them down without dropping them. How? A name unsung... goes out. We have tried... falling silent one at a time... and each silence... is a soul lost.* *(then her eyes widen, the harmony swelling.)* *...Unless the song is* taught. *Unless it does not live... in three throats... but in* many. *A name sung by three... dies when the three tire. A name sung by a* thousand *... is sung even while a hundred sleep... for the song never... fully... stops.* *(luminous, desperate, hoping.)* *Is that it? Is that the way out of our beautiful prison? Not to sing* harder *... but to sing it* wider *... until no one... has to sing it... alone?*", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.choir_second_wall", "op": "SetTrue"}, {"key": "sq.spread_the_song", "op": "SetTrue"}, {"key": "act2.cataloguing_defeats_the_wall", "op": "SetTrue"}, {"key": "companion.choir.approval", "op": "AddInt", "amount": 5}], "choices": []}, {"id": "teach", "speaker": "Three Shades of a Drowned Choir", "text": "*(All three shades turn toward you without breaking the braid, and something like *joy* enters the grief of the harmony.)* *The fourth voice.* *(the soprano lifts it.)* *Yes — oh, yes — come, stand, breathe with us... here is the first interval... the names rise on it... do you feel? You are holding... forty of them... already... just by* singing. *(the alto and bass open the harmony to make room for you.)* *We have wanted... for so long... a fourth... but the dead who pass... are too tired to sing... and the gods' servants... will not... and you are the first warm throat... in a hundred years... to ask for the* burden *instead of fleeing it.* *(the soprano's eyes blaze.)* *Take the harmony up into the warm world, Returned. Teach it. The candle-festival sings names for one night — but a* choir *sings them* always. *Make every griever a voice. Make the Faithless a song so* wide *the Wall cannot find its edges. We three held the line for as long as three could. Now... let the line become... a* people. *(the names soar.)* *Go. Be the fourth voice that becomes the four-thousandth.*", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.choir_teaches", "op": "SetTrue"}, {"key": "sq.spread_the_song", "op": "SetTrue"}, {"key": "act2.cataloguing_defeats_the_wall", "op": "SetTrue"}, {"key": "act1.mercy_remembered", "op": "SetTrue"}, {"key": "companion.choir.approval", "op": "AddInt", "amount": 5}], "choices": []}, {"id": "onename", "speaker": "Three Shades of a Drowned Choir", "text": "*(The soprano nods, and with terrible care, she *lifts one name clear* of the braid — singing it high and alone for one shining moment while the alto and bass close the gap beneath so the list never breaks — and presses it, somehow, into your keeping.)* *Her name was... Sariel.* *(softly, the others holding the rest aloft.)* *A weaver. She doubted... in her last winter... cold and sick and reasonable... and the Wall took her for the doubting. We have sung her... for nine years... never once... in daylight.* *(the soprano's eyes shine.)* *Take Sariel up. Sing her... or only* say *her... where there is sun. Let one name... just one... be spoken in the warm world... after nine years in the grey. And when you do... we will feel the braid... grow one name* lighter *... not because we dropped her... but because* you took her up. *(the harmony swells, almost glad.)* *Sariel the weaver. Doubted, and was real. Carry her to the light. We will hold the other ten thousand... a little easier... knowing one of them... got out.*", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.choir_one_name", "op": "SetTrue"}, {"key": "sq.choir_name", "op": "SetTrue"}, {"key": "act2.sariel_carried", "op": "SetTrue"}, {"key": "companion.choir.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "rest", "speaker": "Three Shades of a Drowned Choir", "text": "*(The three shades go very still — and for one heartbeat, *two* of them fall silent, trusting you, while the soprano alone holds the thread and you find yourself — without deciding to — *humming* the names beneath her, catching the braid, holding it aloft with her so the alto and bass can, for the first time in nine years, simply *stand* and *breathe* and *not sing.*)* *(The bass, voiceless at last, weeps freely. The alto closes her eyes. And the soprano sings on, but lighter now, sharing the weight with a warm throat that came back from the dead to spell her.)* *...You held them.* *(she breathes between names.)* *You actually... held them. Strangers say* rest *and mean* stop. *You said rest and* took up the song. *(the rested shades open their eyes, changed.)* *Nine years. That is the first breath... we have drawn... in nine years. Thank you, Returned. Now we know... it* can *be shared. We will never... fear the silence... the same way again.*", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.choir_rested", "op": "SetTrue"}, {"key": "sq.spread_the_song", "op": "SetTrue"}, {"key": "act1.mercy_remembered", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "drown", "speaker": "Three Shades of a Drowned Choir", "text": "*(The harmony wavers — your words don't fit the meter, and to answer them the soprano would have to *stop*, and she cannot stop, and the grief of that is total.)* *We... cannot... answer that... without... falling... silent...* *(she sings it desperate and apologetic, the names straining.)* *...and if we fall silent... they go out... so please... do not ask us... to* explain *... ask us... to* sing *... it is the only thing... we have left... that is not... drowning.* *(the three voices close back into the braid, and the names go on, beautiful and unbroken and unable to rest, and you understand that some griefs cannot be spoken to — only sung beside.)*", "dynamic": false, "auto": "close", "onEnter": [], "choices": []}, {"id": "close", "speaker": "Three Shades of a Drowned Choir", "text": "*(The drowned choir sings on in the greyest reach — three voices holding eleven thousand names aloft by never falling silent, the only beautiful thing in the plane of the unjudged dead — and you carry away the secret the Wall most fears: that a name being *sung* is a name being *kept*, that a song is the one thing that can never be *filed*, and that the way to defeat a Wall of the forgotten is not to break it but to make the whole world *sing.*)*", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "fugue.soul", "file": "FugueEra.cs", "title": "Fugue · Soul", "start": "0", "nodes": [{"id": "0", "speaker": "A Faithless soul", "text": null, "dynamic": true, "auto": null, "onEnter": [{"key": "fugue.soul.met", "op": "SetTrue"}], "choices": [{"text": "There's an empty niche with my name. Why?", "next": "niche", "fail": null}, {"text": "Can anyone ever leave this Wall?", "next": "leave", "fail": null}]}, {"id": "niche", "speaker": "A Faithless soul", "text": "Because it has worn your name since before the world was young, and it is patient. The only way a soul comes *out* of this Wall is if another goes *in.* That is the oldest arithmetic there is. If you ever pull someone free of the grey — and I think you will; it's written all over you — know what the Wall asks back.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "Who would it take?", "next": "who", "fail": null}]}, {"id": "who", "speaker": "A Faithless soul", "text": null, "dynamic": true, "auto": null, "onEnter": [], "choices": []}]}, {"id": "garrow.quest.arrival", "file": "GarrowQuestContent.cs", "title": "Garrow · Quest · Arrival", "start": "0", "nodes": [{"id": "0", "speaker": "Sister Garrow", "text": "Grey stone, grey light, grey robes. Home — or what I called it for thirty years. The writ says heresy. Three counts: that I did not lay Aldric when the church bid me forget him. That I have voiced doubt of the Doom. And that I walk beside *you* — a soul no god claimed, which to them is a wound that walks.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "Doubt isn't heresy. It's the only honest prayer there is.", "next": "1", "fail": null}, {"text": "Then we leave. You owe a rigged court nothing.", "next": "2", "fail": null}]}, {"id": "1", "speaker": "Sister Garrow", "text": "My father said the same, with a spade in his hand and no god in the conversation. The church disagrees. To the Doom, certainty *is* the sacrament — and I have spent my whole life being correct, and am no longer sure correct and good are the same word.", "dynamic": false, "auto": "2", "onEnter": [], "choices": []}, {"id": "2", "speaker": "Sister Garrow", "text": "No. I came here to answer, and I will. Not because I fear the verdict — because if I run, I never learn whether the thing I served for thirty years is as monstrous as I've begun to fear. The Justiciar inside is named Veld. He taught my catechism. Whatever he says in there, stay at my shoulder. I think today I find out what I believe.", "dynamic": false, "auto": null, "onEnter": [{"key": "garrow.quest.arrived", "op": "SetTrue"}], "choices": []}]}, {"id": "garrow.quest.charge", "file": "GarrowQuestContent.cs", "title": "Garrow · Quest · Charge", "start": "0", "nodes": [{"id": "0", "speaker": "Justiciar Veld", "text": "Edda Garrow. You were the cleanest catechism I ever taught — a girl who buried the Faithless without weeping, because she understood the Wall was *just.* And here you stand reeking of compassion, with a creature beside you that the Wall itself spat back up. Kneel. Recant the doubt, disavow the Returned, and the Doom is merciful: you keep the grey.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "You weighted the scales before she walked in.", "next": "1", "fail": null}, {"text": "Ask her what she believes — don't tell her.", "next": "1", "fail": null}]}, {"id": "1", "speaker": "Justiciar Veld", "text": "Belief is not asked of a Doomguide; it is *issued.* The verdict is recorded already — it was recorded the day she chose your company over her vows. This trial is a courtesy, that she might kneel before she is broken to it. Sister. Last time. Renounce the Faithless thing, or be named one yourself.", "dynamic": false, "auto": null, "onEnter": [{"key": "garrow.quest.charge_known", "op": "SetTrue"}], "choices": [{"text": "(Stand at her shoulder. Let her refuse with steel.)", "next": "2", "fail": null}]}, {"id": "2", "speaker": "Sister Garrow", "text": "Thirty years I weighed the dead by your feather, Veld, and called the trembling in my hands *reverence.* It was grief. I will not kneel to a verdict that was written before the question. If that makes me Faithless — then draw, and we will see whose god shows up for the fight.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "garrow.quest.resolution", "file": "GarrowQuestContent.cs", "title": "Garrow · Quest · Resolution", "start": "0", "nodes": [{"id": "0", "speaker": "Sister Garrow", "text": "Veld's guard is down and the tribunal is scattered, but the temple still stands, and so does the record. They'll want my answer entered before I leave — recanted, or refused. The grey isn't a coat I can just drop; it's thirty years.\n\nSo say it with me. What do I answer the Scales?", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "Recant. Keep the grey — do the work from inside. (save her standing)", "next": "recant", "fail": null, "effects": [{"key": "quest.garrow.resolved", "op": "SetTrue"}, {"key": "quest.garrow.recanted", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 10}]}, {"text": "Walk away from the faith entirely. Lay the dead under no one's law. (her freedom)", "next": "apostate", "fail": null, "effects": [{"key": "quest.garrow.resolved", "op": "SetTrue"}, {"key": "quest.garrow.left_faith", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 20}]}, {"text": "[Religion] Put Kelemvor's own doctrine on trial — the Faithless judgment is the heresy.", "next": "doctrine_win", "fail": "doctrine_fail", "checkDC": 16, "checkAbility": "Intelligence"}]}, {"id": "recant", "speaker": "Sister Garrow", "text": "...I recant. The words taste like the order to forget Aldric did. (She kneels, and signs, and the feather pan settles smug.)\n\nThey keep their Doomguide. I keep the only thing that ever mattered — the right to be at the bedside when the priests won't come. It is a smaller faith now, and a harder one, and I will carry it brittle for the rest of my days. But I carry it. You stayed. I'll not forget that you stayed.", "dynamic": false, "auto": null, "onEnter": [], "choices": []}, {"id": "apostate", "speaker": "Sister Garrow", "text": "Then enter it: *Faithless, and unafraid.* (She unpins the grey clasp and sets it on the empty soul-pan, and walks out from under thirty years.)\n\nGods keep ledgers. So will I — my own. I'll lay the dead the way my father did, plainly, for anyone, under no law but the one in my own two hands. I should be terrified. Instead I feel like a held breath finally let go. Thank you — for being the proof that a soul no god claims can still be *good.*", "dynamic": false, "auto": null, "onEnter": [], "choices": []}, {"id": "doctrine_win", "speaker": "Sister Garrow", "text": "*Read your own canon, Veld.* The Doom is not 'damn the unclaimed' — it is **'none shall pass unjudged.'** The Wall doesn't weigh the Faithless. It *discards* them, unweighed, ungrieved. That isn't the Doom's law. That's the church refusing to do its work — and calling its laziness scripture.\n\nThe heresy in this room was never my doubt. It's a faith that stopped reading. I don't leave the Doom and I don't kneel to its cowards. I take it *back.* From here — souls get weighed. Even the ones no god wanted. *Especially* those.", "dynamic": false, "auto": null, "onEnter": [{"key": "quest.garrow.resolved", "op": "SetTrue"}, {"key": "quest.garrow.doctrine_won", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 30}], "choices": []}, {"id": "doctrine_fail", "speaker": "Sister Garrow", "text": "Don't — don't hand me a clever reading of scripture to hide behind. I've hidden in correct answers my whole life; that's the sin that brought me here. There's no doctrine that makes this painless. There's only what I choose.\n\nSo plainly: do I kneel and keep the grey, or do I set it down and walk?", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "Keep the grey. Do the work from inside. (save her standing)", "next": "recant", "fail": null, "effects": [{"key": "quest.garrow.resolved", "op": "SetTrue"}, {"key": "quest.garrow.recanted", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 10}]}, {"text": "Set it down. Walk free. (her freedom)", "next": "apostate", "fail": null, "effects": [{"key": "quest.garrow.resolved", "op": "SetTrue"}, {"key": "quest.garrow.left_faith", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 20}]}]}]}, {"id": "npc.gate.twocups", "file": "GateDenizensContent.cs", "title": "Npc · Gate · Twocups", "start": "0", "nodes": [{"id": "0", "speaker": "Jonn Tallow", "text": "*(A round, anxious man behind a counter of candles, drinking from two cups at once — one tea, one something stronger, alternating.)* Customer! Gods, a customer, a live one — most of mine lately have that *look*, you know the look, the harvest-look, like they've already got one foot in the — anyway. Candles. Beeswax, tallow, scented, funereal, I do a lovely funereal. Half the Lower City's burying somebody. Business is, ah. Business is *grim*, is what business is.", "dynamic": false, "auto": "1", "onEnter": [{"key": "npc.twocups_met", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "Jonn Tallow", "text": "*(He drinks from the wrong cup, grimaces, corrects.)* Why two cups? Tea calms the nerves, the other settles the tea. My physician says it's a \"concerning system.\" My physician also owes me four crowns and is, I notice, never sober when he says it. *(He leans in, conspiratorial.)* Listen — you look like someone who *does* things. Can I ask you a thing? A worry thing? I've a worry, and Pellingham up the hill says worries are for the poor, and I says, lady, I *am* the poor, it's practically my trade.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "\"Go on. What's the worry?\"", "next": "worry", "fail": null}, {"text": "\"Two cups is one cup short of a problem, friend.\"", "next": "joke", "fail": null, "effects": [{"key": "companion.garrow.approval", "op": "AddInt", "amount": 1}]}, {"text": "\"Sorry. I do things, but not *worry* things.\"", "next": "decline", "fail": null}]}, {"id": "worry", "speaker": "Jonn Tallow", "text": "*(He lowers his voice to a whisper that everyone can hear.)* I've a *standing order*. Big one. Best customer I've got — a chandler's chandler, kettle always on, very particular about the wax, pays in old coin, never haggles. And I heard a thing. I heard the man with the kettle is — *(he can't quite say it)* — is the one the Doomguides have papered the walls about. The Heretic. *(He drinks from both cups at once, which is new.)* And I don't know if I'm supplying a saint or a monster, and either way I rather need the four crowns.", "dynamic": false, "auto": null, "onEnter": [{"key": "npc.twocups_suspects_aldric", "op": "SetTrue"}, {"key": "sq.kettle_available", "op": "SetTrue"}], "choices": [{"text": "\"He's the man trying to tear down the Wall of the Faithless. Decide for yourself what that makes him.\"", "next": "truth", "fail": null}, {"text": "[INSIGHT 13] \"You already know. You just wanted someone to make it harder to keep selling to him.\"", "next": "insight", "fail": "deflect", "checkDC": 13, "checkAbility": "Wisdom"}, {"text": "\"Keep selling. Coin's coin, and Aldric's the least of this city's monsters.\"", "next": "keepselling", "fail": null, "effects": [{"key": "companion.garrow.approval", "op": "AddInt", "amount": -1}]}, {"text": "\"Stop supplying him. Tell the Flaming Fist about the order.\"", "next": "snitch", "fail": null, "effects": [{"key": "faction.fist", "op": "AddInt", "amount": 3}, {"key": "sq.kettle_betrayed", "op": "SetTrue"}]}]}, {"id": "truth", "speaker": "Jonn Tallow", "text": "*(He sits down heavily on a crate of funereal beeswax.)* Tear down the *Wall*. *(quietly)* My mother's in that Wall, friend. Doubted her whole life, sweet as anything, never hurt a soul, and they sorted her to the nothing for it. *(He looks at his two cups.)* So now I find out my best customer's the only man in the Realms trying to get her *out*, and he might burn down half the city to do it, and I'm sat here worried about four crowns. *(a wet laugh)* Gods, what a small man a worry makes you. ...Sell to him. And if you ever speak to him — tell him there's a candle here that doesn't cost. For the kettle. From a son.", "dynamic": false, "auto": "close", "onEnter": [{"key": "sq.kettle_blessing", "op": "SetTrue"}, {"key": "npc.twocups_mother_in_wall", "op": "SetTrue"}], "choices": []}, {"id": "insight", "speaker": "Jonn Tallow", "text": "*(He stares at you, then deflates like a bellows.)* ...That's a horrible thing to be right about. *(He pushes one cup away — the strong one — a small, real act of courage.)* Yes. I knew. I've known a week. I just wanted somebody else to hold the knowing, so it'd weigh less. *(He doesn't pick the cup back up.)* It doesn't, by the way. Weigh less. But thank you for being the somebody.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.twocups_honest", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 2}], "choices": []}, {"id": "deflect", "speaker": "Jonn Tallow", "text": "Just a worried man and his candles, friend. Forget I said anything. *(He drinks from both cups.)*", "dynamic": false, "auto": "close", "onEnter": [], "choices": []}, {"id": "keepselling", "speaker": "Jonn Tallow", "text": "*(Relief, then a flicker of shame at the relief.)* ...Aye. Coin's coin. *(He doesn't sound convinced, but he writes the order anyway.)* You're probably right. Probably. *(He'll tell himself that for years.)*", "dynamic": false, "auto": "close", "onEnter": [], "choices": []}, {"id": "snitch", "speaker": "Jonn Tallow", "text": "*(He goes pale.)* The Fist. Gods. I — aye, that's the *right* thing, isn't it, the lawful thing — *(he's already regretting it)* — only the lawful thing in this city wears Vayle's face and a torch, and now I've handed it a name. *(quietly)* I hope it was right. I'll not sleep wondering.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.twocups_regret", "op": "SetTrue"}], "choices": []}, {"id": "joke", "speaker": "Jonn Tallow", "text": "*(He brightens for exactly one second.)* Ha! One cup short of a problem. I'll have that on my headstone. *(deflates)* Which, the rate the harvest's going, I should probably order now while I can still pick the wax.", "dynamic": false, "auto": "1", "onEnter": [], "choices": []}, {"id": "decline", "speaker": "Jonn Tallow", "text": "Fair, fair. Everyone's got a full plate and a half-empty city. *(He raises both cups.)* Candles when you need them. You'll need them. Everyone needs them, lately.", "dynamic": false, "auto": "close", "onEnter": [], "choices": []}, {"id": "close", "speaker": "Jonn Tallow", "text": "*(He resumes his two-cup vigil, a small anxious man at the exact center of an enormous question, which is, you reflect, where most of us live.)*", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "npc.gate.pellingham", "file": "GateDenizensContent.cs", "title": "Npc · Gate · Pellingham", "start": "0", "nodes": [{"id": "0", "speaker": "Lady Pellingham", "text": "*(Silk, three rings per finger, and the specific predatory delight of the very rich encountering something they cannot yet purchase.)* Oh. *Oh.* You're the dead one, aren't you. The Returned. *(She circles you like an auction lot.)* I simply must have you at my salon. Tuesday. The de Lancie woman had a genuine archdevil last season — a tedious creature, all contracts and ennui — but a person who has *seen the afterlife and come back to gossip*? Darling, you'd be the *event* of the year.", "dynamic": false, "auto": "1", "onEnter": [{"key": "npc.pellingham_met", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "Lady Pellingham", "text": "*(She produces a tiny enameled notebook.)* Just a few questions for the invitations. Is the Wall as *dreadful* as they say? Did you see anyone *important*? And — this is the one everyone will ask, so do prepare a witty answer — what is death actually *like*? Make it pithy. My guests have the attention spans of mayflies and twice the jewelry.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "\"It's like being filed under nothing while you're still awake to feel it. Pithy enough?\"", "next": "pithy", "fail": null}, {"text": "[PERSUADE 15] \"I'll come to your salon — if you fund Mother Cass's almshouse for a year. Authenticity has a price.\"", "next": "patron", "fail": "offended", "checkDC": 15, "checkAbility": "Charisma"}, {"text": "\"Your archdevil was bored because the rich are the same on both sides of death. Good day.\"", "next": "insult", "fail": null, "effects": [{"key": "companion.varra.approval", "op": "AddInt", "amount": 3}]}, {"text": "\"I'm not a curiosity, Lady Pellingham.\"", "next": "notcurio", "fail": null}]}, {"id": "pithy", "speaker": "Lady Pellingham", "text": "*(For one instant — one — the predatory delight slips, and a frightened old woman looks out.)* ...Filed under nothing. *(She writes it down, hand not quite steady.)* That's — yes. That's very pithy. *(She closes the notebook.)* I shall be ninety next spring, you know. I have spent a great deal of money on the assumption that death is something that happens to *other* people, and you've just informed me, over the price of a salon invitation, that I have been *misinvested.* *(She rallies, because rallying is all she has.)* Tuesday. Eight o'clock. I'll seat you near the brandy. We frightened people drink near the brandy.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.pellingham_frightened", "op": "SetTrue"}, {"key": "sq.salon_available", "op": "SetTrue"}], "choices": []}, {"id": "patron", "speaker": "Lady Pellingham", "text": "*(She blinks, genuinely caught off guard, then laughs — a real one, surprised out of her.)* A *ransom* for my own party. Oh, I like you. The almshouse — that's Cass's grubby little place by the docks, the one that smells of cabbage and dignity? *(She waves a ringed hand.)* Done. A year. Cheaper than the archdevil and far better gossip. *(She makes a note.)* \"Funded a charity to secure a dead person for Tuesday.\" Darling, I'll dine out on the *hypocrisy* alone for a month.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.pellingham_patron", "op": "SetTrue"}, {"key": "almshouse.funded", "op": "SetTrue"}, {"key": "faction.fist", "op": "AddInt", "amount": 1}], "choices": []}, {"id": "insult", "speaker": "Lady Pellingham", "text": "*(She gasps, delighted and offended in equal measure — to the rich these are the same emotion.)* The *same* on both sides! *(She fans herself.)* You horrid creature, that's going on the invitations whether you come or not. \"An evening of mortal honesty — the Returned says we're all equally damned.\" They'll faint. They'll *adore* it. Go, go, be appalling somewhere else, you've made my entire season.", "dynamic": false, "auto": "close", "onEnter": [], "choices": []}, {"id": "offended", "speaker": "Lady Pellingham", "text": "*(The ringed hand stops mid-air; the warmth, such as it was, frosts over.)* A *condition* on attending MY salon. *(She draws herself up to her considerable hauteur.)* Darling, one does not *negotiate* one's way into society — one is *admitted* to it, or one is *furniture* at it, and you have just upholstered yourself. *(She turns away.)* Pity. You had the makings of an anecdote. Now you're merely a *cause*, and causes are so terribly Tuesday-after-next.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.pellingham_snubbed", "op": "SetTrue"}], "choices": []}, {"id": "notcurio", "speaker": "Lady Pellingham", "text": "*(She tilts her head, uncomprehending, the way a cat regards a closed door.)* Not a curiosity. *(slowly)* Darling, *everything* is a curiosity, given enough money. That's what the money is *for.* *(But something flickers.)* ...Though I suppose a thing that insists it isn't for sale is the rarest curiosity of all. *(She tucks the notebook away.)* Come Tuesday or don't. But you've made me curious about being un-buyable, and at my age, a new curiosity is worth more than a salon. Hmf. Off with you.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.pellingham_intrigued", "op": "SetTrue"}], "choices": []}, {"id": "close", "speaker": "Lady Pellingham", "text": "*(She glides off toward someone less unsettling, already rewriting the anecdote into something that flatters her, which is the patriar's truest magic.)*", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "npc.gate.grud", "file": "GateDenizensContent.cs", "title": "Npc · Gate · Grud", "start": "0", "nodes": [{"id": "0", "speaker": "Grud", "text": "*(A vast half-orc leaning on a shovel, beaming, in a graveyard that is doing record business.)* Beautiful day for it! *(He gestures at the rows of fresh-turned earth like a proud gardener.)* Look at that drainage. Look at that *loam.* You know most folk see a graveyard and think sad thoughts? I see a *neighborhood.* Quiet neighbors. Never complain about the noise. Property values only go up — well. Down. But *up*, spiritually. *(He extends a hand the size of a dinner plate.)* Grud. I plant people. Best in the Gate.", "dynamic": false, "auto": "1", "onEnter": [{"key": "npc.grud_met", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "Grud", "text": "*(He pats a headstone affectionately.)* This here's Old Merrow. Cheated me at dice for thirty years. Now he's under my shovel and I win every game, on account of he can't reach the cup. *(He laughs, then sobers, just slightly.)* Lot of harvest folk coming through lately, though. Them I don't joke about. Them I plant *careful.* A man's got to know which deaths are funny and which are just... Tuesday. *(He brightens again.)* You need planting? You look spry, but I'm a patient man, and I do a discount for repeat customers. ...You being a Returned and all. *(beat)* That were a joke. Mostly.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "\"How do you stay so cheerful surrounded by all this?\"", "next": "cheerful", "fail": null}, {"text": "[INSIGHT 14] \"You're not cheerful. You're *defended*. The jokes are how you survive the careful ones.\"", "next": "defended", "fail": "laugh", "checkDC": 14, "checkAbility": "Wisdom"}, {"text": "\"The harvest folk — anyone come through you'd want me to know about?\"", "next": "harvest", "fail": null}, {"text": "\"Plant me when I'm done, Grud. Loam like that, who could refuse.\"", "next": "plantme", "fail": null, "effects": [{"key": "companion.varra.approval", "op": "AddInt", "amount": 2}]}]}, {"id": "cheerful", "speaker": "Grud", "text": "*(He considers this seriously, leaning on the shovel.)* Way I figure it — somebody's got to be glad to see them. *(He looks out over the rows.)* They come to me on the worst day anybody's having, carried by people too cried-out to speak. And I can be one more grey face doing a grim job, or I can be the big daft fellow who tells them Old Merrow can't reach the dice cup, and gives the children a job holding the marker, and makes the worst day have *one* warm thing in it. *(He shrugs, mountainous.)* Cheerful's not how I feel. Cheerful's the *service.* Anybody can dig a hole. I dig a *kindness.*", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.grud_philosophy", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 3}], "choices": []}, {"id": "defended", "speaker": "Grud", "text": "*(The beam falters, and for a moment the half-orc is just tired, the way only the relentlessly cheerful get tired.)* ...You're a sharp one. *(quietly)* Aye. I planted my whole family in a fortnight, in the last bad winter. Eight of them. And I found that if I stopped smiling even once, I'd not get it started again, and then who'd be glad to see the next ones? *(He squares his shoulders, and the beam comes back, but you've seen behind it now.)* So I decided to be glad on purpose. Forever. It's the only fight I know how to keep winning. Don't tell the children. They like Old Merrow's dice story.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.grud_grief", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 4}], "choices": []}, {"id": "harvest", "speaker": "Grud", "text": "*(His face goes still and careful — the planting-careful.)* Aye. One. Young fella, sorted to the Wall, but his sister couldn't afford a Choir burial nor a church one, so she brought him to me with nothing but his name on a scrap. *(He nods at a plain marker.)* I planted him free. Wrote the name myself. *(He looks at you.)* The church says the Faithless don't get markers — that's the *point*, the forgetting. So if you're the sort who pokes the church in the eye, you might tell that girl her brother's got a marker after all. Lula, her name is. Keeps a list of the forgotten. Find her if you've a heart for it.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.grud_points_to_lula", "op": "SetTrue"}, {"key": "sq.lulaslist_hinted", "op": "SetTrue"}], "choices": []}, {"id": "plantme", "speaker": "Grud", "text": "*(He roars with delight.)* HA! \"Loam like that, who could refuse!\" *(He claps you on the shoulder, nearly felling you.)* Oh, I *like* you. Tell you what — you die again, you come straight to Grud, no waiting list, premium plot, and I'll cheat Old Merrow out of his dice in your honor. *(He wipes his eyes.)* Spry AND funny. The good ones always plant well. Off you go. Try not to need me too soon.", "dynamic": false, "auto": "close", "onEnter": [], "choices": []}, {"id": "laugh", "speaker": "Grud", "text": "*(He just laughs, big and uncomplicated.)* Defended! From a *graveyard!* Friend, the only thing I'm defending is this loam from amateurs. Go on with you.", "dynamic": false, "auto": "close", "onEnter": [], "choices": []}, {"id": "close", "speaker": "Grud", "text": "*(He returns to his shovel, whistling something that might be a hymn or might be a drinking song — with Grud, you suspect, there was never much difference.)*", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "npc.gate.pib", "file": "GateDenizensContent.cs", "title": "Npc · Gate · Pib", "start": "0", "nodes": [{"id": "0", "speaker": "Pib", "text": "*(A wiry man with a sack, a stick, and a single enormous rat riding on his shoulder with the bearing of a small unpleasant king.)* Shh! *(He holds up a hand.)* Wee Pib is *thinking.* He thinks better than three guildmasters and a magistrate, do Wee Pib, on account of he's got no distractions, being a rat. *(The rat regards you with cold contempt.)* We're ratcatchers. Well. *I'm* the ratcatcher. Wee Pib's the consultant. Strategic vermin acquisition. He shows me where the others are. Professional courtesy, see. Rat solidarity, but for *money.*", "dynamic": false, "auto": "1", "onEnter": [{"key": "npc.pib_met", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "Pib", "text": "*(He lowers his voice; the rat leans in too, uncannily.)* Here's the thing nobody'll credit. Since the harvest started, the rats've gone *strange.* Won't go near the Cinderhaunt. Won't cross where the Choir's been. Wee Pib reckons — and I trust him absolute — that the rats can *smell* the unmaking. The nothing. They run from where souls get filed. *(He taps his nose.)* Rats know death like you know your own hand. And lately they're running from places that look perfectly ordinary to you and me. Makes a fella think. Makes Wee Pib *furious*, which is his resting state, but extra.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "\"You're telling me your rat is a... soul-detector.\"", "next": "detector", "fail": null}, {"text": "[ARCANA 13] \"He's not wrong. Vermin flee thinning Weave — they feel the holes the harvest leaves.\"", "next": "arcane", "fail": "scoff", "checkDC": 13, "checkAbility": "Intelligence"}, {"text": "\"Where, specifically, are the rats refusing to go?\"", "next": "where", "fail": null}, {"text": "\"I'm going to pet the rat now.\"", "next": "pet", "fail": null}]}, {"id": "detector", "speaker": "Pib", "text": "*(Affronted on the rat's behalf.)* *Soul-detector.* He's not a *device*, he's a *colleague.* *(The rat preens.)* But — aye. In essence. Wee Pib's the finest unmaking-sniffer in the Lower City, and his rates are reasonable, being he works for cheese and the occasional act of recognition such as you have *signally failed to provide.* *(He sighs.)* Look. You're a Returned. You're a great big walking hole in death's bookkeeping. *(He squints.)* Wee Pib won't even look at you direct. That's either a very bad sign or he's sulking. With Wee Pib it's genuinely hard to tell.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.pib_wee_pib_avoids_you", "op": "SetTrue"}], "choices": []}, {"id": "arcane", "speaker": "Pib", "text": "*(He grabs your sleeve, electrified.)* You — you *believe* me! A learned person, believing PIB! *(The rat sits up, vindicated.)* Holes the harvest leaves! That's it, that's the words, Wee Pib's been trying to tell me for a *month* and he's got no mouth-parts for the technical terms! *(He's nearly weeping.)* Do you know what it is to be *right* for years and have only a rat agree with you? It is *lonely*, friend. It is professionally lonely. *(He composes himself.)* Here. Wee Pib's map. The places the rats won't go. Might be the harvest's spread. Might be where they'll strike next. We give it free, to the one person who didn't laugh.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.pib_gives_map", "op": "SetTrue"}, {"key": "sq.harvest_map_obtained", "op": "SetTrue"}, {"key": "companion.naeve.approval", "op": "AddInt", "amount": 2}], "choices": []}, {"id": "where", "speaker": "Pib", "text": "*(He unrolls a filthy, surprisingly detailed map, the rat supervising.)* Here, here, and — this one'll trouble you — *here*, under the Kelemvorite chapel. The *church's own floor.* Rats run from it like it's afire. *(He taps it.)* Now either the good Doomguides have got something unmaking in their cellar, or the harvest's reached holier ground than anyone'll admit. *(quietly, for once not performing.)* I'm a ratcatcher, friend. Nobody listens to ratcatchers. But you might. Somebody ought to look under that chapel before more rats are right about it than people.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.pib_chapel_warning", "op": "SetTrue"}, {"key": "sq.chapel_cellar_hinted", "op": "SetTrue"}], "choices": []}, {"id": "pet", "speaker": "Pib", "text": "*(Both man and rat freeze in identical horror.)* I would not. *(Wee Pib bares teeth that are far too large.)* He's a *consultant*, not a — he's bitten a magistrate, friend. The magistrate apologized. *To the rat.* *(beat)* ...But you can give him cheese. He respects cheese. It's the only thing he respects. Him and me both, if we're honest, which we're contractually not.", "dynamic": false, "auto": "close", "onEnter": [], "choices": []}, {"id": "scoff", "speaker": "Pib", "text": "*(crushed)* ...Aye. Course. Madman and his rat. Heard it before. *(The rat looks away, wounded in its tiny cold heart.)* Go on. We've vermin to consult.", "dynamic": false, "auto": "close", "onEnter": [], "choices": []}, {"id": "close", "speaker": "Pib", "text": "*(He shoulders his sack; the rat resumes its throne; and the two of them stalk off to be vindicated by no one, which is, you sense, the great tragedy and the only joy of Pib's entire career.)*", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "npc.gate.auctioneer", "file": "GateDenizensContent.cs", "title": "Npc · Gate · Auctioneer", "start": "0", "nodes": [{"id": "0", "speaker": "Corval the Auctioneer", "text": "*(A dapper man at a podium, gavel in hand, tears running freely down his face the entire time, voice perfectly steady.)* Lot forty-one — a child's shoe, single, good condition, owner regrettably *(his voice does not waver; his eyes do not stop)* filed to the Wall. Do I hear two coppers. Two coppers for a shoe with nowhere left to walk. *(He sees you.)* Ah. A browser. Browse freely. Everything here belonged to someone the city decided to forget. I sell their forgetting back to them at a markup. *(The tears fall.)* It is the worst job in the Realms and I am very, very good at it.", "dynamic": false, "auto": "1", "onEnter": [{"key": "npc.auctioneer_met", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "Corval the Auctioneer", "text": "*(He sets down the shoe with terrible gentleness.)* You're wondering why I weep. Everyone wonders. The simple folk think it's an act, for the crowd. The clever folk think I've a condition. *(He wipes his face with a black-bordered handkerchief and it does no good at all.)* The truth is duller and worse: I started weeping at the first harvest auction nine months ago and I have not stopped since. Not sleeping, not eating, not — *(small, awful laugh)* — not *auctioning.* The body decided. The body was right. I'm the only honest mourner in a city that's made forgetting into commerce, and I cannot even quit, because if I don't sell them gently, *(he gestures at the goblins and pawnbrokers circling)* — *they* will sell them cruelly.", "dynamic": false, "auto": null, "onEnter": [], "choices": [{"text": "\"Then stop selling. Walk away. Let it be cruel and let the cruelty be theirs, not yours.\"", "next": "walk", "fail": null}, {"text": "[PERSUADE 16] \"Give me your ledger of the harvested. Every name, every lot. I'll make the forgetting cost the city something.\"", "next": "ledger", "fail": "compose", "checkDC": 16, "checkAbility": "Charisma"}, {"text": "\"You're not a mourner, Corval. You're a profiteer who cries. The tears don't refund the markup.\"", "next": "cruel", "fail": null, "effects": [{"key": "companion.garrow.approval", "op": "AddInt", "amount": -2}]}, {"text": "\"Who buys a dead child's shoe?\"", "next": "whobuys", "fail": null}]}, {"id": "walk", "speaker": "Corval the Auctioneer", "text": "*(He laughs, and it dislodges fresh tears, an endless supply.)* Walk away. *(quietly)* I have a daughter. She's nine. She's *alive*, gods keep it, but she eats, and the rent is the rent, and this is the only trade that's hiring in a city that's mostly funerals now. *(He picks up the gavel, hating it.)* So no. I can't walk away. I can only do the unforgivable thing *kindly*, which is no virtue, I know it's no virtue, it's just the shape my cowardice takes. *(He meets your eyes, streaming.)* But thank you for thinking I could. For one moment you made me a man with a choice. I'll keep that one. Lot forty-one, two coppers, do I hear two coppers...", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.auctioneer_daughter", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 2}], "choices": []}, {"id": "ledger", "speaker": "Corval the Auctioneer", "text": "*(He stops. The gavel lowers. For the first time the steady voice cracks.)* Make the forgetting *cost* them. *(He produces a thick, tear-warped ledger from beneath the podium, clutched like a relic.)* Every name. Every lot. Nine months of the disappeared, recorded by the one fool who couldn't stop crying long enough to look away. *(He presses it into your hands.)* Take it. Read them aloud somewhere it'll embarrass a patriar. Nail it to the church door. I don't care. I have been the city's *receipt* for its sins — *(the tears come faster, but there's something under them now, fierce)* — make me its *evidence* instead. Please. I should so love to be evidence before I'm a customer.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.auctioneer_gives_ledger", "op": "SetTrue"}, {"key": "sq.harvest_ledger_obtained", "op": "SetTrue"}, {"key": "act1.mercy_remembered", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 5}], "choices": []}, {"id": "cruel", "speaker": "Corval the Auctioneer", "text": "*(He absorbs it without flinching, the way only a man who's said it to himself nightly can.)* The tears don't refund the markup. *(He nods, streaming.)* No. They don't. You're entirely right, and I've no defense, only a nine-year-old who'd like to keep eating. *(steady again, terribly)* You may be the first honest thing said to me at this podium. I'll remember you said it. I remember everything; it's my curse. Lot forty-one. A shoe. Two coppers. Going once.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.auctioneer_judged", "op": "SetTrue"}], "choices": []}, {"id": "whobuys", "speaker": "Corval the Auctioneer", "text": "*(He gestures, weeping, at the crowd.)* Three sorts. Collectors, who want the *frisson* of owning a forgotten thing. Profiteers, who'll resell it. And — *(his voice finally, fractionally breaks)* — *survivors.* Now and then a mother buys back her own son's shoe, at a markup, from a weeping man, because the city sold her grief and this is the only counter that'll sell it back. *(He composes himself by main force.)* Those, I let win the bid. Quietly. It's the one larceny I commit, and I'd hang for it gladly, and no one's noticed yet. Don't tell the goblins. They'd want a cut.", "dynamic": false, "auto": "close", "onEnter": [{"key": "npc.auctioneer_secret_kindness", "op": "SetTrue"}, {"key": "companion.garrow.approval", "op": "AddInt", "amount": 3}], "choices": []}, {"id": "compose", "speaker": "Corval the Auctioneer", "text": "*(He shakes his head, clutching the ledger closer, not yet, not for this.)* No. Not — not yet. I'm sorry. The ledger is the last of them I have left to protect. Convince me it'll be *evidence* and not just spectacle, and it's yours. But not for a clever word. They deserve better than to be a clever word. *(He resumes, streaming.)* Lot forty-one...", "dynamic": false, "auto": "close", "onEnter": [], "choices": []}, {"id": "close", "speaker": "Corval the Auctioneer", "text": "*(The gavel falls. Somewhere a mother quietly wins a shoe. Corval weeps, and sells, and weeps, the city's one honest accountant of its own forgetting.)*", "dynamic": false, "auto": null, "onEnter": [], "choices": []}]}, {"id": "npc.gate.threnody", "file": "GateDenizensContent.cs", "title": "Npc · Gate · Threnody", "start": "0", "nodes": [{"id": "0", "speaker": "Old Threnody", "text": "*(A blind old woman on a chapel step, a cracked viol across her knees, playing something that makes the air feel like the inside of a grave.)* Sit, if you're sitting. Don't, if you're the sort that doesn't. *(She doesn't stop playing.)* I only know the one kind of song, child. Dirges. Have done since the Wall started getting *loud.* Oh, you can't hear it. Nobody can hear it but me and the dogs and the one mad ratcatcher. But it sings, the Wall does. A million voices and not one tune among them. I just put words to what I'm already hearing. Someone ought.", "dynamic": false, "auto": "1", "onEnter": [{"key": "npc.threnody_met", "op": "SetTrue"}], "choices": []}, {"id": "1", "speaker": "Old Threnody", "text": "*(The viol moans.)* You, now. *You* I can hear different. *(Her clouded eyes find you with unsettling precision.)* The Wall sings a held note for everyone it's keeping — a long, flat, waiting s
